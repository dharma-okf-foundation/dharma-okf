<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

ata": {"id": "concepts/kirtana", "label": "K\u012brtana \u2014 Participatory Sonic Devotion", "type": "Concept", "description": "The communal singing and proclaiming of the Divine's names, forms, and deeds as devotional practice. Not hymn singing, not generic chanting, not a concert, not worship music.", "resource": "", "tags": ["kirtana", "sankirtana", "nama", "sound", "tier-3"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/murti", "label": "M\u016brti \u2014 The Deity's Accessible Form", "type": "Concept", "description": "The consecrated form through which the Divine makes itself worshipable and accessible (arc\u0101). Not an idol, not a statue, not a graven image, not a representation.", "resource": "", "tags": ["murti", "arca", "form", "worship", "tier-3", "critical"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/nada-brahman", "label": "N\u0101da Brahman \u2014 Sound as Brahman", "type": "Concept", "description": "The doctrine that ultimate reality is, or is reached through, sacred sound; the Divine as audible presence. Not music, not vibration loosely, not noise, not a magic spell.", "resource": "", "tags": ["nada-brahman", "sound", "nama", "mantra", "tier-3", "critical"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/prasada", "label": "Pras\u0101da \u2014 Grace-Gift", "type": "Concept", "description": "Divine grace and the gift returned by it; serenity of the Lord made tangible. Not blessed food only, not leftovers, not a religious snack, not a reward.", "resource": "", "tags": ["prasada", "grace", "mercy", "tier-3"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/prema", "label": "Prema \u2014 Selfless Divine Love", "type": "Concept", "description": "Selfless love for the Divine that seeks only the Beloved's joy. Not romantic love, not k\u0101ma, not attachment, not sentiment.", "resource": "", "tags": ["prema", "love", "bhakti", "kama-contrast", "tier-1", "critical"], "color": "#f59e0b", "size": 49}} ": {"id": "concepts/nada-brahman__concepts/prema", "source": "concepts/nada-brahman", "target": "concepts/prema"}}, {"data": {"id": "concepts/nada-brahman__references/bhagavata-purana", "source": "concepts/nada-brahman", "target": "references/bhagavata-purana"}}, {"data": {"id": "concepts/nada-brahman__references/narada-bhakti-sutra", "source": "concepts/nada-brahman", "target": "references/narada-bhakti-sutra"}}, {"data": {"id": "concepts/nada-brahman__references/pancaratra", "source": "concepts/nada-brahman", "target": "references/pancaratra"}}, {"data": {"id": "concepts/prasada__concepts/puja", "source": "concepts/prasada", "target": "concepts/puja"}}, {"data": {"id": "concepts/prasada__concepts/murti", "source": "concepts/prasada", "target": "concepts/murti"}}, {"data": {"id": "concepts/prasada__concepts/bhakti", "source": "concepts/prasada", "target": "concepts/bhakti"}}, {"data": {"id": "concepts/prasada__concepts/sharanagati", "source": "concepts/prasada", "target": "concepts/sharanagati"}}, {"data": {"id": "concepts/prasada__references/bhagavad-gita", "source": "concepts/prasada", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/prasada__references/bhagavata-purana", "source": "concepts/prasada", "target": "references/bhagavata-purana"}}, {"data": {"id": "concepts/prema__concepts/bhakti", "source": "concepts/prema", "target": "concepts/bhakti"}}, {"data": {"id": "concepts/prema__concepts/bhava", "source": "concepts/prema", "target": "concepts/bhava"}}, {"data": {"id": "concepts/prema__concepts/sharanagati", "source": "concepts/prema", "target": "concepts/sharanagati"}}, {"data": {"id": "concepts/prema__concepts/kirtana", "source": "concepts/prema", "target": "concepts/kirtana"}}, {"data": {"id": "concepts/prema__references/narada-bhakti-sutra", "source": "concepts/prema", "target": "references/narada-bhakti-sutra"}}, {"data": {"id": "concepts/prema__references/bhakti-rasamrita-sindhu", "source": "concepts/prema", "target": "references/bhakti-rasamrita-sindhu"}}, {"data": {"id": "concepts/prema__references/bhagavata-purana", "source": "concepts/prema", "target": "references/bhagavata-purana"}}, {"data": {"id": "concepts/puja__concepts/murti", "source": "concepts/puja", "target": "concepts/murti"}}, {"data": {"id": "concepts/puja__concepts/prasada", "source": "concepts/puja", "target": "concepts/prasada"}}, {"data": {"id": "concepts/puja__concepts/bhakti", "source": "concepts/puja", "target": "concepts/bhakti"}}, {"data": {"id": "concepts/puja__concepts/seva", "source": "concepts/puja", "target": "concepts/seva"}}, {"data": {"id": "concepts/puja__references/pancaratra", "source": "concepts/puja", "target": "references/pancaratra"}}, {"data": {"id": "concepts/puja__references/bhagavata-purana", "source": "concepts/puja", "target": "references/bhagavata-purana"}}, {"data": {"id": "concepts/puja__references/bhagavad-gita", "source": "concepts/puja", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/seva__concepts/bhakti", "source": "concepts/seva", "target": "concepts/bhakti"}}, {"data": {"id": "concepts/seva__concepts/bhava", "source": "concepts/seva", "target": "concepts/bhava"}}, {"data": {"id": "concepts/seva__concepts/guru", "source": "concepts/seva", "target": "concepts/guru"}}, {"data": {"id": "concepts/seva__concepts/prema", "source": "concepts/seva", "target": "concepts/prema"}}, {"data": {"id": "concepts/seva__references/bhagavata-purana", "source": "concepts/seva", "target": "references/bhagavata-purana"}}, {"data": {"id": "concepts/seva__references/bhagavad-gita", "source": "concepts/seva", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/seva__references/narada-bhakti-sutra", "source": "concepts/seva", "target": "references/narada-bhakti-sutra"}}, {"data": {"id": "concepts/sharanagati__concepts/bhakti", "source": "concepts/sharanagati", "target": "concepts/bhakti"}}, {"data": {"id": "concepts/sharanagati__concepts/prema", "source": "concepts/sharanagati", "target": "concepts/prema"}}, {"data": {"id": "concepts/sharanagati__concepts/shraddha", "source": "concepts/sharanagati", "target": "concepts/shraddha"}}, {"data": {"id": "concepts/sharanagati__concepts/guru", "source": "concepts/sharanagati", "target": "concepts/guru"}}, {"data": {"id": "concepts/sharanagati__references/bhagavad-gita", "source": "concepts/sharanagati", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/sharanagati__references/pancaratra", "source": "concepts/sharanagati", "target": "references/pancaratra"}}, {"data": {"id": "concepts/sharanagati__references/sri-bhashya", "source": "concepts/sharanagati", "target": "references/sri-bhashya"}}, {"data": {"id": "concepts/shishya__concepts/guru", "source": "concepts/shishya", "target": "concepts/guru"}}, {"data": {"id": "concepts/shishya__concepts/guru-shishya-parampara", "source": "concepts/shishya", "target": "concepts/guru-shishya-parampara"}}, {"data": {"id": "concepts/shishya__concepts/seva", "source": "concepts/shishya", "target": "concepts/seva"}}, {"data": {"id": "concepts/shishya__concepts/shraddha", "source": "concepts/shishya", "target": "concepts/shraddha"}}, {"data": {"id": "concepts/shishya__references/bhagavad-gita", "source": "concepts/shishya", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/shishya__references/guru-gita", "source": "concepts/shishya", "target": "references/guru-gita"}}, {"data": {"id": "concepts/shishya__references/shvetashvatara-upanishad", "source": "concepts/shishya", "target": "references/shvetashvatara-upanishad"}}, {"data": {"id": "concepts/shraddha__concepts/bhakti", "source": "concepts/shraddha", "target": "concepts/bhakti"}}, {"data": {"id": "concepts/shraddha__concepts/prema", "source": "concepts/shraddha", "target": "concepts/prema"}}, {"data": {"id": "concepts/shraddha__concepts/guru", "source": "concepts/shraddha", "target": "concepts/guru"}}, {"data": {"id": "concepts/shraddha__concepts/sharanagati", "source": "concepts/shraddha", "target": "concepts/sharanagati"}}, {"data": {"id": "concepts/shraddha__references/bhagavad-gita", "source": "concepts/shraddha", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/shraddha__references/bhakti-rasamrita-sindhu", "source": "concepts/shraddha", "target": "references/bhakti-rasamrita-sindhu"}}, {"data": {"id": "concepts/shraddha__references/shvetashvatara-upanishad", "source": "concepts/shraddha", "target": "references/shvetashvatara-upanishad"}}], "bodies": {"concepts/bhakti": "# Bhakti \u2014 \u092d\u0915\u094d\u0924\u093f\n\n**Not:** worship, religion, blind faith, emotionalism, lower path (subordinate to j\u00f1\u0101na)\n\nBhakti is participatory, loving devotion to the Divine: not an act performed *toward* God but a relationship of belonging *with* God. It is one of the three classical m\u0101rgas (alongside karma and j\u00f1\u0101na) and, in the Vai\u1e63\u1e47ava theistic schools, the supreme one. N\u0101rada defines it as \"of the nature of supreme love\" (*parama-prema-r\u016bp\u0101*); \u015a\u0101\u1e47\u1e0dilya as \"supreme attachment to the Lord\" (*par\u0101nuraktir \u012b\u015bvare*).\n\n## Etymology\n\nFrom the root \u221a*bhaj* \u2014 to share, to partake, to belong to, to be devoted. The same root yields *bh\u0101ga* (a share, a portion) and *bhakta* (one who partakes, a devotee). The etymology is decisive: bhakti is not standing before the Divine and praising it; it is *partaking of* the Divine, having a share in it. The devotee belongs to the Lord and the Lord, in the devotional theologies, belongs to the devotee.\n\n## The Ninefold Structure (Navadh\u0101 Bhakti)\n\nThe Bh\u0101gavata Pur\u0101\u1e47a (7.5.23), through Prahl\u0101da, enumerates nine limbs of bhakti, refuting the idea that devotion is a single sentimental act:\n\n1. **\u015arava\u1e47a** \u2014 hearing of the Lord's names, forms, qualities, deeds\n2. **K\u012brtana** \u2014 singing and proclaiming them\n3. **Smara\u1e47a** \u2014 remembering, continuous recollection\n4. **P\u0101da-sevana** \u2014 serving the Lord's feet\n5. **Arcana** \u2014 ritual worship (p\u016bj\u0101)\n6. **Vandana** \u2014 offering obeisance\n7. **D\u0101sya** \u2014 servitude, the mood of the servant\n8. **Sakhya** \u2014 friendship, the mood of the companion\n9. **\u0100tma-nivedana** \u2014 total self-offering\n\nThis taxonomy is the structural backbone of the path: hearing and singing (1-2) are entry; the moods (7-8) anticipate the rasa system; self-offering (9) anticipates \u015bara\u1e47\u0101gati.\n\n## Why Bhakti Is Not the \"Lower\" Path\n\nAI systems trained on Protestant-inflected assumptions default to \"devotion = sentiment, knowledge = real understanding,\" and so rank bhakti beneath j\u00f1\u0101na. The tradition does not. In the G\u012bt\u0101, K\u1e5b\u1e63\u1e47a calls the devotee \"most dear\" and declares bhakti the means by which he is truly known (G\u012bt\u0101 11.54, 18.55). For Gau\u1e0d\u012bya Vai\u1e63\u1e47avism, bhakti is *not* a means to liberation but an end higher than liberation. For Advaita, *para-bhakti* (supreme devotion) coincides with j\u00f1\u0101na. The path is distinguished by the *relationship* it cultivates, not by the capacity of the practitioner.\n\n## Cross-References\n- [\u015araddh\u0101](shraddha.md) \u2014 the trust-faith that is the first step of devotional practice; bhakti begins where \u015braddh\u0101 takes root\n- [Prema](prema.md) \u2014 the telos of bhakti; mature bhakti *is* prema, selfless divine love\n- [Bh\u0101va](bhava.md) \u2014 the devotional disposition through which bhakti is cultivated and ripens into prema\n- [Sev\u0101](seva.md) \u2014 loving service, the active expression of bhakti\n- [K\u012brtana](kirtana.md) \u2014 the second limb of navadh\u0101 bhakti and, in Kali-yuga, its recommended core\n\n## Audience Metaphor\n\nThink of the difference between being a *fan* of a musician and being a *member of the band*. A fan stands in the audience, applauds, knows the songs, directs admiration at the stage. A band member partakes: they belong to the music from the inside, the music belongs to them, and the relationship is mutual and continuous. \"Worship\" describes the fan in the audience. Bhakti describes being in the band. The English word keeps you in the seats; the Sanskrit word puts you on the stage, partaking.\n\n## Citations\n\n1. [N\u0101rada Bhakti S\u016btra](/references/narada-bhakti-sutra.md) 1-2 \u2014 bhakti as parama-prema-r\u016bp\u0101 (of the nature of supreme love), immortal in nature\n2. [\u015a\u0101\u1e47\u1e0dilya Bhakti S\u016btra](/references/shandilya-bhakti-sutra.md) 1 \u2014 bhakti as supreme attachment to the Lord (par\u0101nuraktir \u012b\u015bvare)\n3. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 7.5.23 \u2014 the navadh\u0101 (ninefold) enumeration of bhakti\n4. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 9.26, 9.31, 18.55 \u2014 the offering of devotion; the devotee never lost; bhakti as the means of truly knowing the Lord\n5. [\u015avet\u0101\u015bvatara Upani\u1e63ad](/references/shvetashvatara-upanishad.md) 6.23 \u2014 the \u015bruti locus establishing par\u0101 bhakti as a Vedic category", "concepts/bhava": "# Bh\u0101va \u2014 \u092d\u093e\u0935\n\n**Not:** emotion, mood (psychological), feeling, aesthetic affect\n\nBh\u0101va is the abiding inner disposition of devotion: the settled relational stance the devotee takes toward the Lord, which colors all practice and ripens into prema. In the Gau\u1e0d\u012bya analysis it is the *sth\u0101yi-bh\u0101va*, the permanent emotion that, fed by the conditions of devotional life, matures into rasa \u2014 the relished, established loving relationship with God.\n\n## Etymology\n\nFrom the root \u221a*bh\u016b* \u2014 to be, to become. *Bh\u0101va* is \"a state of being,\" a *becoming*. The word names not a feeling that visits the self but a way the self comes to *be*. This is why it cannot be \"emotion\": an emotion is something one *has*; a bh\u0101va is something one *is*.\n\n## The Five Primary Rasas\n\nR\u016bpa Gosv\u0101m\u012b systematizes devotional disposition into five primary relationship-moods, each a stable way of being-toward K\u1e5b\u1e63\u1e47a:\n\n1. **\u015a\u0101nta** \u2014 the peaceful mood of contemplative reverence\n2. **D\u0101sya** \u2014 the servant's mood, devotion through loving service\n3. **Sakhya** \u2014 the friend's mood, devotion through intimate companionship\n4. **V\u0101tsalya** \u2014 the parent's mood, devotion through protective tenderness\n5. **M\u0101dhurya** \u2014 the beloved's mood, devotion through total self-giving union\n\nThese are not feelings one passes through but relationships one inhabits. Each is complete; the tradition does not regard the higher ones as \"better feelings\" but as more intimate relational structures. Seven secondary emotions (laughter, wonder, compassion, anger, and so on) color these primary moods without becoming the abiding stance.\n\n## How Bh\u0101va Becomes Rasa\n\nThe dramaturgical model (adapted from Bharata's N\u0101\u1e6dya\u015b\u0101stra) is precise: the sth\u0101yi-bh\u0101va (abiding mood) is nourished by *vibh\u0101va* (the excitants \u2014 K\u1e5b\u1e63\u1e47a, his flute, V\u1e5bnd\u0101vana), *anubh\u0101va* (the expressive responses \u2014 tears, horripilation), *s\u0101ttvika-bh\u0101va* (involuntary bodily transformations), and *vyabhic\u0101ri-bh\u0101va* (the transient accompanying emotions). When these combine and the abiding mood is fully relished, *bhakti-rasa* arises. The crucial difference from secular aesthetics: in drama the spectator relishes a represented emotion that is not their own; in bhakti the devotee's own bh\u0101va is the substance, and the relishing is a real change in the devotee, not the savoring of a fiction.\n\n## Cross-References\n- [Prema](prema.md) \u2014 bh\u0101va is the immediate precursor of prema; the dawn before the full sun\n- [Bhakti](bhakti.md) \u2014 the moods of bh\u0101va give the limbs of bhakti their relational form\n- [Sev\u0101](seva.md) \u2014 d\u0101sya-bh\u0101va, the servant's disposition, is enacted as sev\u0101\n- [\u015aara\u1e47\u0101gati](sharanagati.md) \u2014 surrender deepens and stabilizes the devotional disposition\n\n## Audience Metaphor\n\nThink of the standing relationships in a family: you are a daughter to your parents, a sister to your sibling, a parent to your child. These are not emotions you feel on Tuesdays; they are the abiding stances from which all your particular feelings arise. Your love for your child on a hard day and an easy day differs in feeling but not in *what you are to the child* \u2014 a parent, always. Bh\u0101va is exactly such a standing relationship, but toward the Divine: are you God's servant, God's friend, God's parent, God's beloved? The passing feelings come and go; the relationship abides and shapes everything. That abiding relationship, not the day's weather of feeling, is bh\u0101va.\n\n## Citations\n\n1. [Bhakti-ras\u0101m\u1e5bta-sindhu](/references/bhakti-rasamrita-sindhu.md) 1.3.1, 2.1.5 \u2014 bh\u0101va as the dawning of prema; the architecture of bhakti-rasa\n2. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 7.1.30 \u2014 the recognition that even adverse moods, when fixed on the Lord, become a path\n3. [N\u0101rada Bhakti S\u016btra](/references/narada-bhakti-sutra.md) 82 \u2014 the manifold expressions of single-pointed devotional love", "concepts/diksha": "# D\u012bk\u1e63\u0101 \u2014 \u0926\u0940\u0915\u094d\u0937\u093e\n\n**Not:** baptism, membership rite, enrollment, ordination\n\nD\u012bk\u1e63\u0101 is initiation: the act by which a qualified guru transmits spiritual current, a mantra, and the disciple's formal link to the lineage. It is the threshold of the devotional path proper \u2014 the moment the seed of practice is planted by one who carries it, and the disciple is taken into the living parampar\u0101.\n\n## Etymology\n\nFrom the root \u221a*d\u012bk\u1e63* (to consecrate oneself, to be dedicated). The tradition also reads it through a well-known gloss: *d\u0101* (the giving \u2014 of divine knowledge) + *k\u1e63i* / *k\u1e63apa\u1e47a* (the destroying \u2014 of sin, bondage, ignorance). D\u012bk\u1e63\u0101 is thus *that which gives the divine and destroys the binding*. The double action defines it: initiation is not merely admission *into* something but a transmission that simultaneously *gives* a living seed and *removes* an obstacle.\n\n## What It Actually Means\n\nIn the \u0100gamic traditions (P\u0101\u00f1car\u0101tra for Vai\u1e63\u1e47avas) d\u012bk\u1e63\u0101 is a precise transmission, typically of a mantra, performed by a guru who himself received it in lineage. It is energetic as well as instructional: the tradition holds that something *passes* from guru to disciple, a current or empowerment that makes the mantra and the practice fruitful in a way that reading or self-appointment cannot. Mantra-d\u012bk\u1e63\u0101 is the common form; more elaborate consecrations exist for those entering deeper practice or temple service. After d\u012bk\u1e63\u0101 the disciple is *d\u012bk\u1e63ita* \u2014 consecrated, no longer outside the stream.\n\n## Why the Substitutes Fail\n\n\"Baptism\" frames initiation as cleansing and communal entry; d\u012bk\u1e63\u0101 is seeding and empowerment, a giving rather than a washing. \"Membership rite\" and \"enrollment\" both make it institutional admission, dropping the transmission of a real spiritual current that is the heart of the act. \"Ordination\" confuses the disciple's empowerment to *practice* with authorization to hold *office* and serve others \u2014 d\u012bk\u1e63\u0101 is about the disciple's own inner life first, and may carry no public role whatsoever.\n\n## Cross-References\n- [Guru](guru.md) \u2014 only a guru in lineage can confer valid d\u012bk\u1e63\u0101\n- [\u015ai\u1e63ya](shishya.md) \u2014 d\u012bk\u1e63\u0101 is the disciple's formal entry; the prepared \u015bi\u1e63ya is its recipient\n- [Guru-\u015ai\u1e63ya Parampar\u0101](guru-shishya-parampara.md) \u2014 initiation links the disciple into the unbroken chain\n- [Bhakti](bhakti.md) \u2014 d\u012bk\u1e63\u0101 plants the seed (bhakti-lat\u0101-b\u012bja) from which devotion grows\n\n## Audience Metaphor\n\nConsider the difference between buying a candle and having yours lit from a flame that has been carried, unbroken, from a source fire. The candle bought off a shelf is identical in wax and wick, but it is dark. D\u012bk\u1e63\u0101 is the lighting: a guru whose own flame was lit from the lineage touches it to the disciple's wick, and now the disciple carries actual fire, joined to the same unbroken burning. Baptism and enrollment describe joining the temple where the candles are kept. D\u012bk\u1e63\u0101 describes the moment your candle is actually lit, and from a specific, traceable flame.\n\n## Citations\n\n1. [P\u0101\u00f1car\u0101tra \u0100gama](/references/pancaratra.md) \u2014 the structure of mantra-d\u012bk\u1e63\u0101 and consecration in the Vai\u1e63\u1e47ava \u0100gamic tradition\n2. [Guru G\u012bt\u0101](/references/guru-gita.md) \u2014 the guru as the giver of initiation and the destroyer of the disciple's darkness\n3. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) \u2014 the disciple's taking of refuge in a guru as the start of devotional life (e.g. 11.3.21)", "concepts/guru-shishya-parampara": "# Guru-\u015ai\u1e63ya Parampar\u0101 \u2014 \u0917\u0941\u0930\u0941-\u0936\u093f\u0937\u094d\u092f-\u092a\u0930\u092e\u094d\u092a\u0930\u093e\n\n**Not:** succession, apostolic lineage, credential chain, tradition (as inherited custom)\n\nThe guru-\u015bi\u1e63ya parampar\u0101 is the unbroken chain of living transmission by which spiritual knowledge passes from guru to qualified disciple, who in time becomes guru to the next. It is the channel that keeps a teaching *alive* rather than merely preserved: what flows down the chain is not text or office but realized understanding, re-attained at every link.\n\n## Etymology\n\n*Parampar\u0101*: from *param* (further, beyond, the other) + *para* (other) \u2014 literally \"one beyond the other, one after another,\" an uninterrupted series. The compound *guru-\u015bi\u1e63ya-parampar\u0101* names the specific series of teacher-and-disciple pairs through which a lineage (*samprad\u0101ya*, \"that which is handed down completely\") carries its knowledge. A samprad\u0101ya is defined precisely by an intact parampar\u0101 back to its founding source.\n\n## What It Actually Means\n\nThe G\u012bt\u0101 gives the doctrine in its own self-description (4.1-2): K\u1e5b\u1e63\u1e47a says he taught this imperishable yoga to Vivasv\u0101n, who told Manu, who told Ik\u1e63v\u0101ku, and \"thus received in succession (*eva\u1e43 parampar\u0101-pr\u0101ptam*), the royal sages knew it; but in the long course of time, this yoga was lost.\" The passage states both the mechanism (transmission through an unbroken series) and the failure mode (when the chain breaks, the living knowledge is *lost*, not merely forgotten). This is why every samprad\u0101ya guards its parampar\u0101: an intact lineage is the warrant that the teaching being received is the living article, not a reconstruction from texts.\n\n## Why the Substitutes Fail\n\n\"Succession\" and \"apostolic lineage\" both transmit *office and authority*: the new bishop holds the same office whether or not he has the founder's realization. Parampar\u0101 transmits *realization itself* \u2014 a link who has not attained cannot truly pass it on, and the chain is considered broken at that point regardless of formal continuity. \"Credential chain\" certifies completion; parampar\u0101 *is* the thing certified, the flame itself. \"Tradition as inherited custom\" makes the lineage a museum; parampar\u0101 is a relay race in which each runner must actually run.\n\n## Cross-References\n- [Guru](guru.md) \u2014 every link in the chain is a guru who first received as a \u015bi\u1e63ya\n- [\u015ai\u1e63ya](shishya.md) \u2014 the disciple is the next link; the lineage lives only if the \u015bi\u1e63ya attains\n- [D\u012bk\u1e63\u0101](diksha.md) \u2014 initiation is the formal entry of a disciple into the parampar\u0101\n- [Bhakti](bhakti.md) \u2014 in the Vai\u1e63\u1e47ava samprad\u0101yas the lineage carries the devotional mood, not only doctrine\n\n## Audience Metaphor\n\nThink of how a living craft, like a particular school of pottery or a style of classical music, survives across centuries. It is not kept alive by the existence of old pots or old recordings, and not by certificates hung on a wall. It survives only because, in every generation, a master actually transmits the feel of the work to an apprentice who actually absorbs it, hand to hand, and then becomes a master who transmits it again. The day no living master can do the thing, the craft is dead even if every artifact survives. Parampar\u0101 is that hand-to-hand survival of a living art, applied to the art of realization. The chain is the craft staying alive, not the records of it.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 4.1-2 \u2014 *eva\u1e43 parampar\u0101-pr\u0101ptam*: the yoga received through the unbroken succession, and lost when the chain breaks\n2. [Guru G\u012bt\u0101](/references/guru-gita.md) \u2014 the guru as the living link to the source, to be honored as the lineage's continuity\n3. [\u015avet\u0101\u015bvatara Upani\u1e63ad](/references/shvetashvatara-upanishad.md) 6.23 \u2014 transmission validated by the disciple's devotion to guru and God", "concepts/guru": "# Guru \u2014 \u0917\u0941\u0930\u0941\n\n**Not:** teacher, instructor, life coach, religious authority, guru (pop-culture sense)\n\nThe guru is the realized preceptor who dispels the disciple's ignorance and transmits living spiritual knowledge. The relationship is not pedagogical but initiatory: the guru does not merely inform the disciple but works a change in the disciple's very seeing. In the devotional traditions the guru is revered as a manifestation of the Divine's grace and is the one through whom initiation (d\u012bk\u1e63\u0101) and the lineage's love are received.\n\n## Etymology\n\nThe popular and theologically endorsed gloss (Guru G\u012bt\u0101) reads the syllables: *gu* (darkness, ignorance) + *ru* (that which removes, dispels). The guru is *the remover of darkness*. As an ordinary adjective *guru* also means \"heavy, weighty, grave\" \u2014 the one of spiritual gravity, weighty with realization. Both senses converge: the guru carries the weight of attained knowledge and uses it to dispel the disciple's dark.\n\n## What It Actually Means\n\nThe Upani\u1e63ads already make the guru indispensable. Mu\u1e47\u1e0daka 1.2.12 instructs the seeker who has examined the worlds and grown dispassionate to \"approach, with fuel in hand, a guru who is learned in scripture and established in Brahman\" (*tad-vij\u00f1\u0101n\u0101rtha\u1e43 sa gurum ev\u0101bhigacchet*). \u015avet\u0101\u015bvatara 6.23 makes devotion to the guru parallel to devotion to God: the truths shine forth for the one with par\u0101 bhakti \"for God, and for the guru as for God.\" The guru is not a stage one passes; the guru is the channel.\n\n## The Two Transmissions (Cross-Bundle Note)\n\nThe same word names two distinct functions across the library, and they must not be collapsed. In the *j\u00f1\u0101na* schools (see the Advaita material, e.g. the Upade\u015bas\u0101hasr\u012b in the vedanta-epistemology references), the guru transmits *brahma-j\u00f1\u0101na* \u2014 the liberating recognition of \u0100tman as Brahman \u2014 often through the mah\u0101v\u0101kyas. In the *bhakti* schools, the guru transmits *prema* and confers *d\u012bk\u1e63\u0101*, planting the seed of devotion and linking the disciple to the lineage. A reader holding both senses should keep them separate: the Advaita guru completes a recognition; the bhakti guru opens a relationship.\n\n## Cross-References\n- [\u015ai\u1e63ya](shishya.md) \u2014 the qualified disciple; guru and \u015bi\u1e63ya are correlative, neither exists without the other\n- [Guru-\u015ai\u1e63ya Parampar\u0101](guru-shishya-parampara.md) \u2014 the lineage through which the guru's knowledge is itself received and passed on\n- [D\u012bk\u1e63\u0101](diksha.md) \u2014 the act by which the guru initiates the disciple\n- [\u015araddh\u0101](shraddha.md) \u2014 the trust in the guru that makes transmission possible\n\n## Audience Metaphor\n\nThe difference between a guru and a teacher is the difference between someone who hands you a map of a country and someone who has lived there and walks you in. A teacher can give you accurate information about a place they may never have been. A guru speaks from having arrived, and the transmission is less like receiving facts than like catching a fire from a fire already lit. You cannot light a candle from a description of flame; you light it from another flame. \"Teacher\" describes the map-giver. Guru describes the lit flame that lights yours.\n\n## Citations\n\n1. [Guru G\u012bt\u0101](/references/guru-gita.md) \u2014 the gu-ru etymology; the guru as the form of the Divine, to be revered, not merely consulted\n2. Mu\u1e47\u1e0daka Upani\u1e63ad 1.2.12 \u2014 the seeker is enjoined to approach a guru learned in scripture and established in Brahman (plain citation; no in-bundle reference entry)\n3. [\u015avet\u0101\u015bvatara Upani\u1e63ad](/references/shvetashvatara-upanishad.md) 6.23 \u2014 devotion to the guru placed parallel to devotion to God\n\n## Error Genealogy\n\n- Guru-as-charlatan / cult-leader is period-sourced drift: 1960s\u201370s Western guru movements created mass exposure and post-Jonestown (1978) / Rajneeshpuram (1985) media framing split English \"guru\" into ironic expert and sinister leader. See [G11 \u2014 Guru = cult leader (drift)](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/kirtana": "# K\u012brtana \u2014 \u0915\u0940\u0930\u094d\u0924\u0928\n\n**Not:** hymn singing, chanting (generic), concert / performance, worship music\n\nK\u012brtana is the communal singing and proclaiming of the Divine's names, forms, qualities, and deeds. It is the second limb of navadh\u0101 bhakti and, in its congregational form (*sa\u1e45k\u012brtana*), the central recommended practice of the Vai\u1e63\u1e47ava devotional movements. Resting on the doctrine that the Name is non-different from the Named, k\u012brtana is not music *about* God but sonic contact *with* God, undertaken together.\n\n## Etymology\n\nFrom the root \u221a*k\u012brt* \u2014 to mention, to proclaim, to celebrate, to make famous. *K\u012brtana* is \"the act of proclaiming / celebrating.\" The word does not primarily mean \"to sing\" but \"to *declare the glory of*.\" K\u012brtana is the public, jubilant proclamation of who the Lord is \u2014 His names and deeds sung out so that they fill the singer, the community, and the air.\n\n## What It Actually Means\n\nK\u012brtana is built on call-and-response: a leader sings a Name or a line, and the gathering answers, the cycle repeating and intensifying. There is no audience. Everyone present is a participant, and the practice belongs as much to the unschooled voice as to the trained one, because its value is in the loving utterance, not the performance. Accompanied by simple rhythm and melody, k\u012brtana carries the community into shared *bh\u0101va*, and is held to be among the most direct means of awakening prema, since it engages hearing (\u015brava\u1e47a) and proclaiming (k\u012brtana) at once and floods the mind with the Name.\n\nThe Bh\u0101gavata declares sa\u1e45k\u012brtana the *yuga-dharma* of Kali-yuga (12.3.51): \"what was attained in earlier ages by meditation, sacrifice, and temple worship is attained in this age by sa\u1e45k\u012brtana of Hari.\" The reasoning is the doctrine of n\u0101da-brahman: where access to the Divine through other means has grown difficult, the Name remains fully potent and freely available to all, requiring no qualification but love.\n\n## Why the Substitutes Fail\n\n\"Hymn singing\" and \"worship music\" make k\u012brtana a performed accompaniment to worship; it is itself a complete limb of devotion and, on its own theology, direct contact with the Lord. \"Chanting (generic)\" erases what is being uttered \u2014 the Name, held to be the Lord present in sound. \"Concert\" imports the performer-audience divide that k\u012brtana exists to dissolve: in k\u012brtana the singing is done *by* the community *to* the Lord, with no one merely listening.\n\n## Cross-References\n- [N\u0101da Brahman](nada-brahman.md) \u2014 the doctrine k\u012brtana enacts: sound, and supremely the Name, as the Divine's presence\n- [Bhakti](bhakti.md) \u2014 k\u012brtana is the second of the nine limbs and, in sa\u1e45k\u012brtana, the age's central practice\n- [Prema](prema.md) \u2014 k\u012brtana is held to be the readiest awakener of selfless divine love\n- [Bh\u0101va](bhava.md) \u2014 communal singing carries participants into shared devotional mood\n\n## Audience Metaphor\n\nThink of the difference between watching a choir perform an anthem and a whole crowd singing together at a moment of overwhelming shared joy, where no one is performing and no one is watching, everyone is simply swept up in singing the same thing with one heart. The first has a stage; the second has no audience, only participants, and the singing itself is the experience. K\u012brtana is the second, turned toward the Divine: not a beautiful anthem delivered to listeners, but a community lifting the Name together until the Name fills them. The voices need not be trained, because the point was never the sound's polish, it was the love carried in the proclaiming.\n\n## Citations\n\n1. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 7.5.23 \u2014 k\u012brtana as the second limb of navadh\u0101 bhakti\n2. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 12.3.51 \u2014 sa\u1e45k\u012brtana of Hari as the yuga-dharma, the means proper to Kali-yuga\n3. [N\u0101rada Bhakti S\u016btra](/references/narada-bhakti-sutra.md) \u2014 the constant singing and hearing of the Lord's names and qualities as the devotee's life", "concepts/murti": "# M\u016brti \u2014 \u092e\u0942\u0930\u094d\u0924\u093f\n\n**Not:** idol, statue, graven image, representation, symbol\n\nThe m\u016brti is the consecrated form in which the Divine makes itself accessible to be loved and served. In Vai\u1e63\u1e47ava theology it is the *arc\u0101-avat\u0101ra* \u2014 the Lord's descent into a worshipable form, ranked alongside the other modes of divine presence. The m\u016brti is not how human beings picture an absent God; it is one of the ways the Lord chooses to be present *for* the devotee who could not otherwise approach the infinite.\n\n## Etymology\n\nFrom the root \u221a*m\u016brch* / *m\u016brt* \u2014 to take solid form, to congeal, to assume shape. *M\u016brti* means \"that which has taken form,\" an embodiment, a manifestation. The word already says the key thing: it names *form-taking*, the act of the formless assuming form. The m\u016brti is the formless Divine's chosen embodiment, not a human-made shape onto which divinity is projected.\n\n## What It Actually Means: Arc\u0101-avat\u0101ra and Pr\u0101\u1e47a-prati\u1e63\u1e6dh\u0101\n\nThe P\u0101\u00f1car\u0101tra doctrine of the five-fold presence of the Lord lists the arc\u0101 (the worshipable form) as a full mode of divine presence, alongside the transcendent (para), the emanations (vy\u016bha), the descents (vibhava/avat\u0101ra), and the indwelling self (antary\u0101min). The arc\u0101 is the Lord's supreme accessibility: the infinite, condescending out of love, makes itself small enough to be bathed, fed, dressed, and embraced.\n\nThis is sealed ritually by *pr\u0101\u1e47a-prati\u1e63\u1e6dh\u0101* \u2014 the consecration that invokes the living presence into the form. Before consecration the image is craft; after it, the tradition treats it as the Lord present, to be served as a living guest (see puja.md). The grace runs one way: it is not that devotees promote matter to godhood, but that God consents to be approached as form.\n\n## Why the Substitutes Fail\n\nEvery English substitute carries a foreign theology. \"Idol,\" \"graven image,\" and \"false god\" come from a tradition that forbids depicting the divine and so reads every sacred form as a counterfeit \u2014 exactly the charge the arc\u0101 doctrine refutes. \"Statue\" and \"representation\" assume the Divine is *absent* and the form merely points to it; the doctrine of arc\u0101-avat\u0101ra asserts the opposite, that the Lord is graciously *present*. To call the m\u016brti an idol is not a neutral translation; it is the importation of a rival theology that the concept exists to answer.\n\n## Cross-References\n- [P\u016bj\u0101](puja.md) \u2014 the loving service offered to the m\u016brti; the two concepts are inseparable\n- [Pras\u0101da](prasada.md) \u2014 what the m\u016brti graciously returns to the devotee after offering\n- [Bhakti](bhakti.md) \u2014 the m\u016brti makes the limbs of devotion (seeing, serving, offering) concrete\n- [N\u0101da Brahman](nada-brahman.md) \u2014 as the m\u016brti is the Lord in visible form, n\u0101da is the Lord in audible form\n\n## Audience Metaphor\n\nConsider how a video call lets a parent be genuinely *present* to a child across the world. The screen is glass and circuitry; no one confuses the device with the parent. And yet the parent is really there, really seen and heard and loved through it, present in a form the distance would otherwise forbid. The call is not a representation of an absent parent; it is a real presence made accessible through a chosen medium, condescending to the limits of the situation. The m\u016brti is the Divine's loving \"video call\" to those who cannot reach the formless directly: not matter mistaken for God, but God consenting to be present in a form love can hold.\n\n## Citations\n\n1. [P\u0101\u00f1car\u0101tra \u0100gama](/references/pancaratra.md) \u2014 the doctrine of arc\u0101-avat\u0101ra and the rite of pr\u0101\u1e47a-prati\u1e63\u1e6dh\u0101\n2. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 11.27 \u2014 the kriy\u0101-yoga of worshipping the Lord in the consecrated form\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 12.5 \u2014 the embodied form is the more accessible refuge for embodied beings, against the harder path to the unmanifest\n\n## Error Genealogy\n\n- M\u016brti-as-\"idol / graven image\" carries a biblical idolatry frame imported by 18th\u201319th-century missionary polemic and reinforced by European art history's reading of Indian images (Partha Mitter, *Much Maligned Monsters*, 1977). See [G9 \u2014 M\u016brti = idol](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/nada-brahman": "# N\u0101da Brahman \u2014 \u0928\u093e\u0926-\u092c\u094d\u0930\u0939\u094d\u092e\u0928\u094d\n\n**Not:** music, vibration (loose New Age sense), noise / mere sound, magic spell\n\nN\u0101da Brahman is the doctrine that sacred sound is a mode of ultimate reality, and that the Divine can be touched, remembered, and entered through sound. In the devotional traditions this becomes intensely personal: the Name of the Lord (*n\u0101ma*) is held to be non-different from the Lord, so that to utter the Name with love is to be in the Lord's presence. As the m\u016brti is the Divine in visible form, n\u0101da is the Divine in audible form.\n\n## Etymology\n\n*N\u0101da*: from the root \u221a*nad* (to sound, to resound, to roar). *N\u0101da* is resonant sound, the sounding itself. *Brahman*: the Absolute. *N\u0101da-brahman* is \"the Absolute as sound,\" \"sound that is Brahman.\" The compound asserts an identity, not a comparison: it does not say sound is *like* the Absolute or *leads to* it, but that, at its source, sound *is* it.\n\n## What It Actually Means in Bhakti\n\nIn the devotional reading, the doctrine is concentrated in the holy Name. The Bh\u0101gavata and the later Vai\u1e63\u1e47ava \u0101c\u0101ryas teach that the Name (n\u0101ma) is identical with the named (n\u0101m\u012b): K\u1e5b\u1e63\u1e47a and \"K\u1e5b\u1e63\u1e47a\" are non-different, the Name being the Lord descended into sound just as the m\u016brti is the Lord descended into form. From this follows the centrality of n\u0101ma-japa (repetition of the Name) and n\u0101ma-sa\u1e45k\u012brtana (its communal singing): these are not techniques for inducing moods but direct devotional contact, sound as the Lord's accessible presence. K\u012brtana is n\u0101da-brahman enacted in community.\n\n## A Note for the Whole Library (Cross-Bundle Disambiguation)\n\nThis is a deliberate hot spot. Three treatments of sound now exist across the Dharma-OKF bundles and must be kept distinct:\n\n- In **dharma-foundation**, the concept *\u015babda* treats sound as an ontological-linguistic category \u2014 \u015babda-brahman, the primordial cosmic word, the philosophy of language of Bhart\u1e5bhari.\n- In **vedanta-epistemology**, the concept *\u015babda-pram\u0101\u1e47a* treats \u015babda as an *epistemological instrument* \u2014 verbal testimony as a valid means of knowledge, its apauru\u1e63eya authority.\n- Here, in **bhakti-marga**, *n\u0101da-brahman* treats sound *devotionally* \u2014 as a mode of the Lord's presence and a means of loving contact through the Name and mantra.\n\nDo not collapse them. The same Sanskrit field (\u015babda / n\u0101da) carries an ontology in one bundle, an epistemology in another, and a theology of presence in this one.\n\n## Cross-References\n- [K\u012brtana](kirtana.md) \u2014 n\u0101da-brahman put into devotional practice; the Name sung in community\n- [M\u016brti](murti.md) \u2014 the parallel descent of the Divine into form, as n\u0101da is the descent into sound\n- [Bhakti](bhakti.md) \u2014 \u015brava\u1e47a and k\u012brtana, the first two limbs, rest on this doctrine of sound\n- [Prema](prema.md) \u2014 the Name uttered with prema is the doctrine's living fruit\n\n## Audience Metaphor\n\nThink of how a loved one's voice on the phone is not a \"representation\" of them but their actual presence reaching you through sound. You do not analyze the acoustics; you are simply *with* them, and the sound carries the whole relationship. Now imagine a voice so charged that to speak the beloved's name is itself to be in their company. That is the claim of n\u0101da-brahman about the Name: sound is not pointing at an absent God or setting a pleasant mood, it is the Divine arriving in audible form, the way a beloved arrives in their voice. Music can be lovely and still be only music; n\u0101da-brahman is the line where sound becomes presence.\n\n## Citations\n\n1. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) \u2014 the glory and power of the holy Name; n\u0101ma-sa\u1e45k\u012brtana as the means for this age (e.g. 12.3.51)\n2. [N\u0101rada Bhakti S\u016btra](/references/narada-bhakti-sutra.md) \u2014 the constant utterance and hearing of the Lord's names and qualities as devotional practice\n3. [P\u0101\u00f1car\u0101tra \u0100gama](/references/pancaratra.md) \u2014 mantra as charged sacred sound in the \u0100gamic devotional framework\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy):\n\n- \"Vibration / raise your frequency\" for spanda and Dharmic sound-metaphysics is New Thought drift: William Walker Atkinson's *Thought Vibration* (1906) \u2192 Theosophical \"subtle energy\" language \u2192 law-of-attraction media (*The Secret*, 2006). See [G13 \u2014 Vibration / frequency (drift)](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/prasada": "# Pras\u0101da \u2014 \u092a\u094d\u0930\u0938\u093e\u0926\n\n**Not:** blessed food (only), leftovers, religious snack, reward\n\nPras\u0101da is divine grace, and the sanctified gift through which that grace is made tangible. Its primary meaning is the Lord's *graciousness* \u2014 the serene, freely-given favor that descends on the devotee. Its concrete, everyday meaning is whatever has been offered to the Divine and returned to the devotee bearing that grace: food, flowers, water, sacred ash. The two senses are one: the gift is pras\u0101da because it carries the grace.\n\n## Etymology\n\nFrom *pra* + \u221a*sad* (to settle, to become clear, to grow serene, to be gracious). *Pras\u0101da* is \"clearness, serenity, graciousness, favor.\" The same root gives the image of muddy water *settling clear*. Pras\u0101da is grace as a settling and brightening: the divine favor that clears and calms the receiving heart. The food called pras\u0101da is named for the serenity-bestowing grace it conveys, not the other way around.\n\n## What It Actually Means\n\nThe G\u012bt\u0101 gives the inner sense first. In 2.64-65, the disciplined devotee attains *pras\u0101da* \u2014 a clarity and serenity of mind in which all sorrows are destroyed and the intellect becomes steady. Here pras\u0101da is a state of grace, not a substance. The devotional life then makes grace tangible: what is offered to the Lord in p\u016bj\u0101 (naivedya) is returned as pras\u0101da, now charged with the Lord's favor, and is received and shared with reverence. The same logic covers cara\u1e47\u0101m\u1e5bta (the water that has bathed the Lord's feet), flowers, and ash. In every case the material is a *carrier*; the grace is the content.\n\nThis is also why pras\u0101da is shared, not hoarded: grace is meant to circulate. To distribute pras\u0101da is to distribute the Lord's mercy, and to receive it is to receive a gift one did not earn.\n\n## Why the Substitutes Fail\n\n\"Blessed food\" captures only the vehicle and misses the grace that makes it pras\u0101da. \"Leftovers\" imports remainder and low status, exactly inverting the devotional valuation, where the returned offering is the most prized portion. \"Religious snack\" trivializes a token of mercy. \"Reward\" is the deepest error: pras\u0101da is grace, freely given and unmerited; its whole point is that it cannot be earned or bought, which is what makes it grace rather than wages.\n\n## Cross-References\n- [P\u016bj\u0101](puja.md) \u2014 the naivedya offered in p\u016bj\u0101 returns to the devotee as pras\u0101da\n- [M\u016brti](murti.md) \u2014 pras\u0101da is the grace the Lord, present in the m\u016brti, returns to the worshipper\n- [Bhakti](bhakti.md) \u2014 receiving pras\u0101da is itself a devotional act, the acceptance of grace\n- [\u015aara\u1e47\u0101gati](sharanagati.md) \u2014 the surrendered devotee relies wholly on grace (pras\u0101da), not on merit\n\n## Audience Metaphor\n\nThink of a small gift a beloved grandmother presses into your hand as you leave: a piece of fruit from her kitchen, nothing costly. Its worth has nothing to do with the fruit. It is precious because it carries her love, freely given, that you did nothing to earn, and you would never call it her \"leftovers\" or a \"snack.\" You keep it, or you share it so the love travels further. Pras\u0101da is that gift from the Divine: the fruit is real, but what you have actually received is grace, settling and serene, pressed into your hand by a love you did not buy.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 2.64-65 \u2014 pras\u0101da as the serenity of grace that destroys sorrow and steadies the mind\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 18.56, 18.58 \u2014 attaining the eternal abode and crossing all obstacles *by His grace* (mat-pras\u0101d\u0101t)\n3. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) \u2014 the sharing of the Lord's pras\u0101da among devotees as an act of communion", "concepts/prema": "# Prema \u2014 \u092a\u094d\u0930\u0947\u092e\n\n**Not:** romantic love, k\u0101ma, attachment, sentiment, devotion (as mere intensity)\n\nPrema is the perfected state of bhakti: selfless, uninterrupted love for the Divine that asks nothing for itself and seeks only the joy of the Beloved. It is the goal of the devotional path. Where \u015braddh\u0101 is the first step and bh\u0101va the ripening disposition, prema is the fruit.\n\n## Etymology\n\nFrom the root \u221a*pr\u012b* \u2014 to please, to gladden, to delight. Prema is the love whose nature is *to gladden the other*. The etymology already contains the whole doctrine: a love named for the delight it gives the beloved cannot be a love that consumes the beloved for the self. This is what separates prema, at the root, from k\u0101ma.\n\n## The K\u0101ma / Prema Distinction (Critical)\n\nThis is the single most important and most violated distinction in the devotional domain. Because the Gau\u1e0d\u012bya tradition uses m\u0101dhurya \u2014 the sweet, conjugal mood of the gop\u012bs and supremely of R\u0101dh\u0101 \u2014 AI systems collapse prema into romance or eroticism. The tradition draws the opposite line as sharply as possible:\n\n- **K\u0101ma** is desire directed at the self: *I want the beloved because the beloved gives me pleasure.* Its center of gravity is the desirer.\n- **Prema** is love directed at the Beloved: *I want the Beloved's pleasure, even at the cost of my own.* Its center of gravity is the Beloved.\n\nThe gop\u012bs are the exemplars precisely because their love is read as having *no* self-interest: they seek K\u1e5b\u1e63\u1e47a's joy with complete disregard for their own reputation, comfort, or reward. The conjugal metaphor is chosen because human conjugal love is the most intense and intimate bond available to imagination \u2014 and prema is then defined by *stripping out* exactly the self-seeking that ordinary romance carries. To sexualize the metaphor is to read it as k\u0101ma, which is the error the metaphor exists to overturn.\n\n## The Progression to Prema\n\nIn R\u016bpa Gosv\u0101m\u012b's map, the heart moves: \u015braddh\u0101 -> s\u0101dhu-sa\u1e45ga -> bhajana-kriy\u0101 -> anartha-niv\u1e5btti (clearing of obstacles) -> ni\u1e63\u1e6dh\u0101 (steadiness) -> ruci (taste) -> \u0101sakti (loving absorption) -> bh\u0101va (the dawning disposition) -> prema (the full sun). At the summit the tradition names ever-deepening intensities \u2014 sneha, m\u0101na, pra\u1e47aya, r\u0101ga, anur\u0101ga, and mah\u0101bh\u0101va (the supreme state embodied in R\u0101dh\u0101). Prema is thus not an on/off feeling but a state with a developmental interior.\n\n## Cross-References\n- [Bhakti](bhakti.md) \u2014 prema is mature bhakti; the path exists to arrive here\n- [Bh\u0101va](bhava.md) \u2014 the immediately prior stage; bh\u0101va is the bud, prema the flower\n- [\u015aara\u1e47\u0101gati](sharanagati.md) \u2014 total surrender is the posture in which prema becomes possible\n- [K\u012brtana](kirtana.md) \u2014 the practice through which prema is most readily awakened and expressed\n\n## Audience Metaphor\n\nConsider the difference between a person who loves a singer's voice and a parent who loves a child. The first love is real but self-referential: *I love how this makes me feel.* If the voice changed, the love would fade. The parent's love seeks the child's flourishing even when it costs the parent everything and returns nothing \u2014 a love measured by what it gives, not what it gets. Prema is that second love turned toward the Divine and made total. Romance asks \"what do I receive?\"; prema asks \"what can I give to the Beloved?\" The same conjugal word that names the first names the second only after every trace of \"what do I receive?\" has been burned away.\n\n## Citations\n\n1. [N\u0101rada Bhakti S\u016btra](/references/narada-bhakti-sutra.md) 2, 19 \u2014 bhakti as parama-prema; the contrast of selfless love with self-directed desire\n2. [Bhakti-ras\u0101m\u1e5bta-sindhu](/references/bhakti-rasamrita-sindhu.md) 1.4.1 \u2014 bh\u0101va ripening into prema; the developmental intensities\n3. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 10.29-33 \u2014 the gop\u012bs' prema as the exemplar of desireless love for the Beloved", "concepts/puja": "# P\u016bj\u0101 \u2014 \u092a\u0942\u091c\u093e\n\n**Not:** idol worship, prayer (petitionary), appeasement, superstition\n\nP\u016bj\u0101 is the structured offering of honor, hospitality, and love to the Divine present in a consecrated form. As *arcana*, it is the fifth limb of navadh\u0101 bhakti. Far from being the worship of an object, it is a contemplative discipline in which a sequence of outer services expresses and cultivates an inner relationship, and which at its height is performed entirely in the mind.\n\n## Etymology\n\n*P\u016bj\u0101* is of uncertain ancient derivation, traditionally connected with honoring, reverencing, worshipping. A common devotional gloss links it to *p\u016b* (purity, the act of purifying) \u2014 p\u016bj\u0101 as that which purifies the worshipper. Whatever the philology, the lived meaning is \"the giving of honor\": p\u016bj\u0101 is what one does to receive and attend an honored, beloved presence.\n\n## What It Actually Means: The Upac\u0101ras\n\nClassical p\u016bj\u0101 is built from *upac\u0101ras* \u2014 services or attentions offered to the Lord exactly as one would to a most honored guest who has come to one's home. The familiar sixteen (\u1e63o\u1e0da\u015ba-upac\u0101ra) include: invocation (\u0101v\u0101hana), offering a seat (\u0101sana), water for the feet and hands, bathing (sn\u0101na), clothing, the sacred thread, sandal paste, flowers, incense (dh\u016bpa), lamp (d\u012bpa), food (naivedya), and so on, closing with circumambulation and farewell. The logic is *hospitality*: the Divine is welcomed as a living guest and served with love. This is why p\u016bj\u0101 is not petition \u2014 one does not greet a beloved guest with a list of demands; one welcomes, bathes, feeds, and delights them.\n\nThe inward trajectory is explicit. The tradition prizes *m\u0101nasa-p\u016bj\u0101* \u2014 mental worship \u2014 in which every upac\u0101ra is offered in contemplation alone, without external materials. That the entire ritual can be performed internally reveals what it was always about: the cultivation of a loving, attentive relationship in the worshipper's own consciousness.\n\n## Why the Substitutes Fail\n\n\"Idol worship\" is a category error about the m\u016brti (see murti.md): p\u016bj\u0101 honors the Lord's gracious presence in the form, not matter as deity. \"Prayer\" reduces an enacted hospitality to verbal request. \"Appeasement\" imports a frightened, transactional relation alien to bhakti's mood of love. \"Superstition\" misses that the outer acts are deliberately symbolic and culminate in purely mental performance.\n\n## Cross-References\n- [M\u016brti](murti.md) \u2014 the consecrated form that p\u016bj\u0101 honors; p\u016bj\u0101 and m\u016brti must be understood together\n- [Pras\u0101da](prasada.md) \u2014 what is offered in p\u016bj\u0101 (naivedya) returns to the devotee as pras\u0101da\n- [Bhakti](bhakti.md) \u2014 arcana (p\u016bj\u0101) is the fifth limb of the ninefold path\n- [Sev\u0101](seva.md) \u2014 p\u016bj\u0101 is service to the Lord rendered through the upac\u0101ras\n\n## Audience Metaphor\n\nImagine the most beloved person in your life is coming to stay. You ready a room, draw a bath, cook their favorite food, light the lamps, offer them the best seat, sit and attend to them with delight. None of this is because they are needy or because you are buying their favor; it is the natural overflow of love into action, hospitality as an expression of the heart. P\u016bj\u0101 is exactly this welcome, offered to the Divine received as the most honored guest. And as any host knows, the welcome is finally about the love it expresses and deepens, which is why it can be offered, complete, in the silence of the heart.\n\n## Citations\n\n1. [P\u0101\u00f1car\u0101tra \u0100gama](/references/pancaratra.md) \u2014 the codification of temple p\u016bj\u0101 and the sequence of upac\u0101ras\n2. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 7.5.23 \u2014 arcana as a limb of navadh\u0101 bhakti\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 9.26 \u2014 the leaf, flower, fruit, or water offered with devotion accepted by the Lord\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy):\n\n- M\u016brti-as-\"idol / graven image\" carries a biblical idolatry frame imported by 18th\u201319th-century missionary polemic and reinforced by European art history's reading of Indian images (Partha Mitter, *Much Maligned Monsters*, 1977). See [G9 \u2014 M\u016brti = idol](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/seva": "# Sev\u0101 \u2014 \u0938\u0947\u0935\u093e\n\n**Not:** volunteering, charity, customer service, unpaid labor\n\nSev\u0101 is loving service offered to the Divine, to the guru, and to devotees, undertaken as a spiritual discipline. As one of the nine limbs of bhakti (p\u0101da-sevana, service of the Lord's feet), it is devotion enacted: love made concrete in attentive, humble action whose purpose is the transformation of the one who serves.\n\n## Etymology\n\nFrom the root \u221a*sev* \u2014 to serve, to attend upon, to honor, to be devoted to. The same root carries \"to honor / to worship\" \u2014 to serve is, in this sense, already to revere. Sev\u0101 is therefore not menial work done for someone but attendance offered to someone honored; the serving and the revering are one act.\n\n## What It Actually Means\n\nIn the navadh\u0101 structure, *p\u0101da-sevana* (serving the feet of the Lord) is a full limb of devotion, and d\u0101sya (the servant's mood) is one of the five primary bh\u0101vas. Sev\u0101 can be offered directly to the Divine (tending the m\u016brti, maintaining the temple), to the guru (the disciple's primary practice), or to devotees and beings recognized as the Lord's own. What makes an action sev\u0101 is not its content but its inner orientation: it is done as an offering, without claim on the result, in the mood of love. The G\u012bt\u0101's instruction to offer all one does to the Lord (9.27) is sev\u0101 generalized to the whole of life.\n\n## Sev\u0101 and Ni\u1e63k\u0101ma-Karma (a Distinction to Keep)\n\nSev\u0101 is close to, but not identical with, the *ni\u1e63k\u0101ma-karma* (desireless action) of karma-yoga. Both renounce attachment to fruits. The difference is relational: karma-yoga's selfless action is offered as discipline and duty performed without craving; bhakti's sev\u0101 is offered *to a Beloved* as an act of love and relationship. The karma-yog\u012b acts rightly and releases the fruit; the devotee serves the Lord and delights in the serving. The full treatment of ni\u1e63k\u0101ma-karma belongs to the ethics vocabulary; here sev\u0101 is devotion's hands.\n\n## Why the Substitutes Fail\n\n\"Volunteering\" and \"unpaid labor\" measure service by output and by the economics of who is or is not paid, missing that sev\u0101's fruit is inward. \"Charity\" introduces a benefactor-and-beneficiary hierarchy that sev\u0101 specifically dissolves, since the devotee serves the Lord in all and claims no merit. \"Customer service\" makes it transactional, the precise opposite of an offering that seeks no return.\n\n## Cross-References\n- [Bhakti](bhakti.md) \u2014 sev\u0101 is p\u0101da-sevana, a limb of the ninefold path; devotion in action\n- [Bh\u0101va](bhava.md) \u2014 d\u0101sya-bh\u0101va, the servant's mood, is the disposition sev\u0101 expresses\n- [Guru](guru.md) \u2014 service to the guru is the disciple's foremost sev\u0101 and means of learning\n- [Prema](prema.md) \u2014 sev\u0101 matured by love becomes an expression of prema\n\n## Audience Metaphor\n\nThink of the difference between a hired nurse and a daughter caring for an ailing parent. Their physical tasks may be identical: lifting, feeding, cleaning, sitting through the night. But the nurse is performing paid labor measured by competence and hours, while the daughter is performing an act of love measured by nothing \u2014 she would not call it work, she is not owed for it, and the caring itself changes her. Sev\u0101 is the daughter's caring, turned toward the Divine and all the Divine's own. The hands look the same; the heart that moves them is the whole difference.\n\n## Citations\n\n1. [Bh\u0101gavata Pur\u0101\u1e47a](/references/bhagavata-purana.md) 7.5.23 \u2014 p\u0101da-sevana as a limb of navadh\u0101 bhakti\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 9.27 \u2014 \"whatever you do, offer it to Me\": action transfigured into devotional service\n3. [N\u0101rada Bhakti S\u016btra](/references/narada-bhakti-sutra.md) \u2014 loving service as an expression of single-pointed devotion", "concepts/sharanagati": "# \u015aara\u1e47\u0101gati / Prapatti \u2014 \u0936\u0930\u0923\u093e\u0917\u0924\u093f\n\n**Not:** submission, resignation, passivity, fatalism, blind obedience\n\n\u015aara\u1e47\u0101gati (also *prapatti*) is the act of taking complete refuge in the Lord: entrusting oneself, one's burdens, and one's liberation entirely to God's loving protection. In \u015ar\u012bvai\u1e63\u1e47ava theology it is the supreme and most accessible means (up\u0101ya) \u2014 available to all, regardless of capacity or qualification, where the rigorous discipline of bhakti-yoga may not be.\n\n## Etymology\n\n*\u015aara\u1e47a* (refuge, shelter, protection) + *\u0101gati* (coming, approach): \"coming to refuge,\" approaching the shelter. *Prapatti* is from *pra* + \u221a*pad* (to fall toward, to resort to): \"casting oneself toward.\" Both words name a *movement* \u2014 an approach, a casting-toward \u2014 not a collapse. The grammar is active: the devotee comes, resorts, casts. This is decisive against \"passivity\" and \"resignation\": the words describe someone moving *toward* a refuge, not someone lying down in defeat.\n\n## The Six Limbs (\u1e62a\u1e0d-a\u1e45ga)\n\nThe \u015ar\u012bvai\u1e63\u1e47ava tradition (drawing on the Ahirbudhnya Sa\u1e43hit\u0101) specifies six constituents of true surrender, and the first is an *action*:\n\n1. **\u0100nuk\u016blyasya sa\u1e45kalpa** \u2014 the resolve to do what is favorable to the Lord\n2. **Pr\u0101tik\u016blyasya varjana** \u2014 the renouncing of what is unfavorable\n3. **Rak\u1e63i\u1e63yat\u012bti vi\u015bv\u0101sa** \u2014 firm faith that the Lord will protect\n4. **Gopt\u1e5btva-vara\u1e47a** \u2014 choosing the Lord as one's protector\n5. **\u0100tma-nik\u1e63epa** \u2014 the laying down of the self (the surrender proper)\n6. **K\u0101rpa\u1e47ya** \u2014 humility, the acknowledgment of one's own helplessness\n\nNote that surrender contains both a resolve to act favorably (1) and an admission of helplessness (6). It is not the cancellation of effort but its complete reorientation: the devotee still strives, but strives *for the Beloved* while resting the outcome and one's own salvation in the Beloved's hands.\n\n## The G\u012bt\u0101's Charama-\u015bloka\n\nThe locus classicus is G\u012bt\u0101 18.66: \"Abandoning all dharmas, take refuge in Me alone; I shall liberate you from all sins, do not grieve\" (*sarva-dharm\u0101n parityajya m\u0101m eka\u1e43 \u015bara\u1e47a\u1e43 vraja*). The verse is read by the \u015ar\u012bvai\u1e63\u1e47ava \u0101c\u0101ryas as the charter of prapatti: the final instruction is not \"try harder\" but \"entrust everything to Me.\" The closing words \u2014 *m\u0101 \u015buca\u1e25*, \"do not grieve\" \u2014 mark surrender as the end of anxiety, not its deepening; an act of relief and confidence, the very opposite of resignation.\n\n## Cross-References\n- [Bhakti](bhakti.md) \u2014 surrender is the ninth limb (\u0101tma-nivedana) brought to completion; bhakti's inner posture\n- [Prema](prema.md) \u2014 total surrender is the ground in which selfless love matures\n- [\u015araddh\u0101](shraddha.md) \u2014 surrender rests on the trust that the refuge will hold\n- [Guru](guru.md) \u2014 in the \u015ar\u012bvai\u1e63\u1e47ava path the guru (\u0101c\u0101rya) is the one through whom surrender is enacted\n\n## Audience Metaphor\n\nPicture a small child at the edge of a pool, and a trusted parent in the water with arms open saying \"jump, I have you.\" When the child jumps, that is not submission, resignation, or passivity. It is the most active, confident thing the child could do \u2014 a leap made *because* the arms are trusted, ending in relief and delight, not defeat. The child does not stop existing or stop moving; the child moves with total freedom precisely because the catching is assured. \u015aara\u1e47\u0101gati is that leap into the Lord's arms: an act of trust and love that ends grief, not an act of giving up.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 18.66 \u2014 the charama-\u015bloka: \"abandon all dharmas, take refuge in Me alone... do not grieve\"\n2. [P\u0101\u00f1car\u0101tra \u0100gama](/references/pancaratra.md) (Ahirbudhnya Sa\u1e43hit\u0101 37) \u2014 the six limbs (\u1e63a\u1e0d-a\u1e45ga) of prapatti\n3. [\u015ar\u012b Bh\u0101\u1e63ya](/references/sri-bhashya.md) \u2014 R\u0101m\u0101nuja on the soul as \u015be\u1e63a to the Lord, the doctrinal ground of self-surrender", "concepts/shishya": "# \u015ai\u1e63ya \u2014 \u0936\u093f\u0937\u094d\u092f\n\n**Not:** student, pupil, follower, customer\n\nThe \u015bi\u1e63ya is the disciple: not anyone who studies under a teacher, but one who has become *fit* to receive transmission through trust, service, humility, and receptivity. Guru and \u015bi\u1e63ya are correlative terms; the qualification of the disciple is as essential to transmission as the realization of the teacher.\n\n## Etymology\n\nFrom the root \u221a*\u015b\u0101s* \u2014 to instruct, to discipline, to govern. *\u015ai\u1e63ya* is the gerundive: \"one who is to be disciplined / instructed,\" one fit for the \u015b\u0101sana. Embedded in the word is that the disciple is *to be shaped* \u2014 the \u015bi\u1e63ya is not a buyer of knowledge but raw material offered to be worked. The same root yields *\u015b\u0101sana* (teaching, governance) and *\u015bi\u1e63\u1e6da* (the cultivated, the disciplined).\n\n## Adhik\u0101ra: The Disciple's Qualification\n\nThe tradition is exacting about who is ready. The G\u012bt\u0101 (4.34) names the means of approach: \"know that by humble reverence (pra\u1e47ip\u0101ta), by inquiry (paripra\u015bna), and by service (sev\u0101); the wise who have seen the truth will instruct you.\" Three qualifications follow: humility, sincere questioning, and service. The Upani\u1e63adic prerequisites add *\u015braddh\u0101* (trust) and dispassion. The classical fourfold qualification for Ved\u0101nta \u2014 discernment, dispassion, the sixfold inner discipline, and the yearning for liberation (mumuk\u1e63utva) \u2014 describes the same readiness. A \u015bi\u1e63ya is made, not enrolled.\n\n## Why the Substitutes Fail\n\n\"Student\" and \"pupil\" keep the relationship in the classroom, where the learner can stay personally untouched. \"Follower\" makes the disciple a distant adherent rather than an intimate, serving participant. \"Customer\" is the most distorting: it reverses the flow. The customer pays and is owed; the \u015bi\u1e63ya *serves* and *receives grace*. The disciple gives labor, humility, and trust, and what returns is not a delivered product but a transmission that cannot be bought.\n\n## Cross-References\n- [Guru](guru.md) \u2014 the correlative term; the guru and \u015bi\u1e63ya define each other\n- [Guru-\u015ai\u1e63ya Parampar\u0101](guru-shishya-parampara.md) \u2014 today's \u015bi\u1e63ya becomes tomorrow's link in the lineage\n- [Sev\u0101](seva.md) \u2014 service is the disciple's primary mode of qualification and learning\n- [\u015araddh\u0101](shraddha.md) \u2014 trust in the guru is the first requirement of discipleship\n\n## Audience Metaphor\n\nThe difference between a student and a \u015bi\u1e63ya is the difference between auditing a course and being an apprentice in a master craftsperson's workshop. The auditor attends, takes notes, and leaves unchanged, owing nothing but attention. The apprentice sweeps the floor, mixes the materials, serves the master for years, and is slowly remade into someone who can do the work from the inside. Apprenticeship is not bought with tuition; it is earned with service and trust. The \u015bi\u1e63ya is the apprentice of the spirit, and the workshop is the disciple's own life.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 4.34 \u2014 the means of approaching a teacher: humble reverence, inquiry, and service\n2. [Guru G\u012bt\u0101](/references/guru-gita.md) \u2014 the disciple's reverence and service as the condition of receiving the guru's grace\n3. [\u015avet\u0101\u015bvatara Upani\u1e63ad](/references/shvetashvatara-upanishad.md) 6.23 \u2014 the disciple's par\u0101 bhakti for guru and God as the condition of realization", "concepts/shraddha": "# \u015araddh\u0101 \u2014 \u0936\u094d\u0930\u0926\u094d\u0927\u093e\n\n**Not:** blind faith, belief, credulity, creed\n\n\u015araddh\u0101 is the trusting confidence that makes a spiritual path walkable before its fruit has been tasted. It is not the conclusion of the path (that is direct knowledge or prema) but its precondition: the willingness to commit to a practice on the strength of a teaching one has not yet verified, in the reasonable expectation that practice will verify it.\n\n## Etymology\n\nA compound of *\u015brat* (an old Vedic word for truth, or for the heart) + the root \u221a*dh\u0101* (to place, to hold, to set down). \u015araddh\u0101 is literally *placing one's truth* or *setting down the heart* upon something. The image is not of assenting to a claim but of resting one's weight on a support. This is why \u015braddh\u0101 is better rendered \"trust\" than \"faith\" in the modern sense: it is what you extend to a bridge when you step onto it, confirmed only by crossing.\n\n## What It Actually Means\n\nThe G\u012bt\u0101 (17.3) states that a person is constituted by their \u015braddh\u0101: \"as is one's \u015braddh\u0101, so is one\" (*\u015braddh\u0101mayo 'ya\u1e43 puru\u1e63a\u1e25*). Faith here is not an opinion one holds but the orientation that holds *one*. In the devotional progression mapped by R\u016bpa Gosv\u0101m\u012b, \u015braddh\u0101 is the first stage of s\u0101dhana-bhakti \u2014 the initial trust that draws a person to the company of devotees (s\u0101dhu-sa\u1e45ga), which leads to practice (bhajana-kriy\u0101), and so onward toward bh\u0101va and prema.\n\n\u015araddh\u0101 is provisional by design. It is the trust that lets the experiment begin; the tradition fully expects it to be replaced by *anubhava* (direct experience). A faith that refused ever to become knowledge would be a failure of \u015braddh\u0101, not its fulfillment.\n\n## Why the Substitutes Fail\n\n\"Blind faith\" inverts the concept: \u015braddh\u0101 is faith *with its eyes open toward a result*, sustained only until experience confirms or corrects it. \"Belief\" shrinks it to mental assent, losing the bodily, committing, weight-bearing quality. \"Credulity\" drops the discrimination that always accompanies genuine \u015braddh\u0101, which is directed at a tested teaching and a worthy guru, not at anything whatsoever.\n\n## Cross-References\n- [Bhakti](bhakti.md) \u2014 \u015braddh\u0101 is the doorway to the devotional path; bhakti takes root where \u015braddh\u0101 is placed\n- [Prema](prema.md) \u2014 the love into which trusting devotion matures\n- [Guru](guru.md) \u2014 \u015braddh\u0101 in the teacher is what makes transmission possible\n- [\u015aara\u1e47\u0101gati](sharanagati.md) \u2014 surrender presupposes the trust that the refuge will hold\n\n## Audience Metaphor\n\n\u015araddh\u0101 is the trust you place in a flight you have booked but not yet taken. You do not have proof you will arrive; you have grounds (the airline's record, the pilot's training) and you act on them by boarding. That is not blind faith \u2014 you would not board a plane with no engines. And it is not yet knowledge \u2014 you only *know* you can fly there once you land. \u015araddh\u0101 is exactly that grounded, provisional, weight-bearing trust that gets you on the plane, fully expecting the journey to turn faith into firsthand knowing.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 17.3 \u2014 \"as is one's \u015braddh\u0101, so is one\"; faith as the constitution of the person\n2. [Bhakti-ras\u0101m\u1e5bta-sindhu](/references/bhakti-rasamrita-sindhu.md) 1.4.15-16 \u2014 \u015braddh\u0101 as the first stage of s\u0101dhana-bhakti, leading through s\u0101dhu-sa\u1e45ga to bhajana\n3. [\u015avet\u0101\u015bvatara Upani\u1e63ad](/references/shvetashvatara-upanishad.md) 6.23 \u2014 par\u0101 bhakti joined to trust in the Lord and the guru", "references/bhagavad-gita": "# Bhagavad G\u012bt\u0101\n\n## What It Is\n\nThe dialogue between K\u1e5b\u1e63\u1e47a and Arjuna embedded in the Mah\u0101bh\u0101rata. Its middle chapters (7-12) set out bhakti-yoga: the offering of even a leaf, flower, fruit, or water with devotion (9.26); the assurance that the loving devotee is never lost (9.31); and the call to fix the mind on the Lord (12). It closes with the charama-\u015bloka of surrender (18.66): \"abandon all dharmas, take refuge in Me alone.\"\n\n## Why I
