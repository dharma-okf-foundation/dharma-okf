t Matters Here\n\nThe most widely shared scriptural ground for `bhakti`, `sharanagati`, `seva`, and `shraddha`. Cited as the text that locates devotion at the center of the path without subordinating it to knowledge.", "references/bhagavata-purana": "# Bh\u0101gavata Pur\u0101\u1e47a (\u015ar\u012bmad Bh\u0101gavatam)\n\n## What It Is\n\nThe foremost devotional Pur\u0101\u1e47a, centered on Vi\u1e63\u1e47u-K\u1e5b\u1e63\u1e47a. It gives the canonical ninefold (navadh\u0101) enumeration of bhakti through Prahl\u0101da's speech (7.5.23): hearing (\u015brava\u1e47a), chanting (k\u012brtana), remembering (smara\u1e47a), serving the feet (p\u0101da-sevana), worship (arcana), obeisance (vandana), servitude (d\u0101sya), friendship (sakhya), and self-offering (\u0101tma-nivedana). It also narrates the gop\u012bs' prema as the highest devotional exemplar.\n\n## Why It Matters Here\n\nThe source text for the navadh\u0101 structure in `bhakti`, the prema exemplars, `kirtana`, `puja`/`arcana`, and `seva`. Cited bundle-wide.", "references/bhakti-rasamrita-sindhu": "# Bhakti-ras\u0101m\u1e5bta-sindhu (R\u016bpa Gosv\u0101m\u012b)\n\n## What It Is\n\nR\u016bpa Gosv\u0101m\u012b's sixteenth-century systematic treatise that gives bhakti a complete aesthetic-theological architecture. It defines the highest devotion (*uttam\u0101 bhakti*) as the cultivation of favorable service to K\u1e5b\u1e63\u1e47a, free of ulterior desire and uncovered by j\u00f1\u0101na or karma (1.1.11). It charts the progression \u015braddh\u0101 -> s\u0101dhana -> bh\u0101va -> prema and the five primary devotional moods (rasas): \u015b\u0101nta, d\u0101sya, sakhya, v\u0101tsalya, m\u0101dhurya.\n\n## Why It Matters Here\n\nThe grounding text for `bhava`, `prema`, the rasa taxonomy, and the s\u0101dhana-to-prema progression. Cited where the Gau\u1e0d\u012bya formalization of devotional emotion is needed.", "references/guru-gita": "# Guru G\u012bt\u0101\n\n## What It Is\n\nA devotional dialogue between \u015aiva and P\u0101rvat\u012b, transmitted within the Skanda Pur\u0101\u1e47a, devoted entirely to the nature, glory, and worship of the guru. It is the popular source of the syllabic gloss *gu* (darkness) + *ru* (remover) and of the teaching that the guru is to be regarded as the very form of the Divine, not as a human instructor.\n\n## Why It Matters Here\n\nThe grounding text for `guru`, `shishya`, `guru-shishya-parampara`, and `diksha`. Cited where the devotional (not merely pedagogical) status of the teacher is established.", "references/narada-bhakti-sutra": "# N\u0101rada Bhakti S\u016btra\n\n## What It Is\n\nA short text of devotional aphorisms (s\u016btra-s) attributed to the sage N\u0101rada, one of the two classical Bhakti S\u016btra texts. It opens by defining bhakti as \"of the nature of supreme love for That [the Divine]\" (*s\u0101 tvasmin parama-prema-r\u016bp\u0101*) and as immortal in nature, and it sharply distinguishes selfless devotional love from k\u0101ma (self-directed desire).\n\n## Why It Matters Here\n\nThe grounding text for `bhakti`, `prema`, and the k\u0101ma/prema contrast. Cited across the bhakti-marga bundle for the definition of devotion and the eleven forms of supreme love.", "references/pancaratra": "# P\u0101\u00f1car\u0101tra \u0100gama (S\u0101tvata / Ahirbudhnya Sa\u1e43hit\u0101)\n\n## What It Is\n\nThe Vai\u1e63\u1e47ava \u0100gama (Tantra) corpus that codifies the ritual life of devotion: the doctrine of the vy\u016bhas, the arc\u0101-avat\u0101ra (the Lord's descent into the worshipable image), the consecration of the m\u016brti through pr\u0101\u1e47a-prati\u1e63\u1e6dh\u0101, the sequence of upac\u0101ras in p\u016bj\u0101, and the structure of d\u012bk\u1e63\u0101 (initiation). The S\u0101tvata, Pau\u1e63kara, and Jay\u0101khya Sa\u1e43hit\u0101s are core; the Ahirbudhnya Sa\u1e43hit\u0101 is a key source for \u015bara\u1e47\u0101gati's limbs.\n\n## Why It Matters Here\n\nThe grounding text for `murti`, `puja`, `diksha`, and `prasada`, and a source for `sharanagati`. Cited where the \u0100gamic-ritual basis of devotional practice is needed.", "references/shandilya-bhakti-sutra": "# \u015a\u0101\u1e47\u1e0dilya Bhakti S\u016btra\n\n## What It Is\n\nThe second of the two classical Bhakti S\u016btra texts, attributed to the sage \u015a\u0101\u1e47\u1e0dilya. Its opening aphorism defines bhakti as \"supreme attachment to the Lord\" (*s\u0101 par\u0101nuraktir \u012b\u015bvare*) and argues that bhakti, not j\u00f1\u0101na alone, is the direct means to the highest goal.\n\n## Why It Matters Here\n\nGrounds `bhakti` and `shraddha`, and the bundle's refusal to rank bhakti below j\u00f1\u0101na. Cited where the definition of devotion-as-attachment is needed.", "references/shvetashvatara-upanishad": "# \u015avet\u0101\u015bvatara Upani\u1e63ad\n\n## What It Is\n\nA theistic Upani\u1e63ad of the Yajurveda. Its closing verse (6.23) is the earliest \u015bruti locus joining devotion and the teacher: \"to the one who has the highest devotion (par\u0101 bhakti) for God, and for the guru as for God, these truths declared shine forth.\" It also develops the personal, worshipable aspect of Brahman (Rudra-\u012a\u015bvara) alongside the impersonal.\n\n## Why It Matters Here\n\nThe \u015bruti anchor for `bhakti`, `guru`, and `shraddha` \u2014 the verse that establishes bhakti as a Vedic, not merely Pur\u0101\u1e47ic, category. Cited where scriptural antiquity of devotion is needed.", "references/sri-bhashya": "# \u015ar\u012b Bh\u0101\u1e63ya (R\u0101m\u0101nuja)\n\n## What It Is\n\nR\u0101m\u0101nuja's commentary on the Brahma S\u016btras and the foundational text of Vi\u015bi\u1e63\u1e6d\u0101dvaita (qualified non-dualism). It establishes the Lord as the inner self of all, the soul's relation as eternal servant (\u015be\u1e63a) to the Lord (\u015be\u1e63in), and devotion (bhakti) as continuous loving meditation. The \u015ar\u012bvai\u1e63\u1e47ava tradition develops from it the doctrine of prapatti (loving self-surrender) as the accessible means for those unable to sustain rigorous bhakti-yoga.\n\n## Why It Matters Here\n\nThe doctrinal ground for `sharanagati` and the school-specific framing of `bhakti`, `guru`, and `seva` in Vi\u015bi\u1e63\u1e6d\u0101dvaita. Cited where the \u015ar\u012bvai\u1e63\u1e47ava reading is foregrounded."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
