<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

"description": "The daily regimen: a physician-designed sequence aligning physiology with the day cycle, from waking through hygiene, exercise, and meals to sleep; NOT a morning-routine listicle, NOT self-optimization content, NOT one-size ritual.", "resource": "", "tags": ["dinacharya", "regimen", "prevention", "ayurveda"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/dosha", "label": "Do\u1e63a", "type": "Concept", "description": "One of the three functional bio-regulatory principles (v\u0101ta, pitta, kapha) whose dynamic equilibrium constitutes health and whose vitiation drives disease; NOT a bodily humor, NOT a body type, NOT a personality category.", "resource": "", "tags": ["dosha", "tridosha", "ayurveda", "constitution"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/guna", "label": "Gu\u1e47a", "type": "Concept", "description": "In \u0100yurveda, the twenty gurv\u0101di properties in ten opposed pairs (heavy-light, cold-hot, unctuous-dry, and so on), the working vocabulary connecting substances to physiological effect; NOT the Vai\u015be\u1e63ika category of quality treated in nyaya-vaisheshika v0.9, NOT the three cosmological gu\u1e47as of cosmology-creation v0.7, NOT vague qualities.", "resource": "", "tags": ["guna", "gurvadi", "pharmacology", "ayurveda", "school-contrast"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/kapha", "label": "Kapha", "type": "Concept", "description": "The cohesive-structural do\u1e63a, the principle of stability, binding, lubrication, and endurance, the substrate of tissue strength and resilience; NOT phlegm, NOT water retention, NOT a lazy personality type.", "resource": "", "tags": ["kapha", "dosha", "cohesion", "ayurveda"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/manas", "label": "Manas", "type": "Concept", "description": "The mind as medical faculty: atomic, one per person, the coordinator standing between senses and self, itself capable of health and disease; NOT the brain, NOT an emergent neural property, NOT the full anta\u1e25kara\u1e47a analysis of dharma-foundation v0.1.", "resource": "", "tags": ["manas", "mind", "psychology", "ayurveda"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/manasa-dosha", "label": "M\u0101nasa-Do\u1e63a", "type": "Concept", "description": "Rajas and tamas as the two vitiating principles of the mind, with sattva as the healthy unvitiating state, the psychiatric axis of the do\u1e63a system; NOT the three cosmological gu\u1e47as of cosmology-creation v0.7, NOT mood labels, NOT moral vices.", "resource": "", "tags": ["manasa-dosha", "rajas", "tamas", "psychiatry", "ayurveda"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/ojas", "label": "Ojas", "type": "Concept", "description": "The culminating vital essence of complete tissue transformation, the substrate of strength, resilience, and luster, with a para form of eight drops seated in the heart whose loss is death; NOT immunity in the biomedical sense, NOT energy, NOT a supplement target.", "resource": "", "tags": ["ojas", "vitality", "bala", "ayurveda"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/panchakarma", "label": "Pa\u00f1cakarma", "type": "Concept", "description": "The five classical purification procedures (emesis, purgation, enema, errhine, bloodletting) applied to a prepared body under physician judgment; NOT a detox spa package, NOT a wellness retreat format, NOT karma in the moral, physical, or ritual senses treated elsewhere in the corpus.", "resource": "", "tags": ["panchakarma", "purification", "therapy", "ayurveda", "karma"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/pitta", "label": "Pitta", "type": "Concept", "description": "The transformative do\u1e63a, the principle of conversion and processing, governing digestion, metabolism, thermoregulation, vision, and discriminative cognition; NOT bile, NOT body heat as such, NOT an angry personality type.", "resource": "", "tags": ["pitta", "dosha", "transformation", "ayurveda"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/prajnaparadha", "label": "Praj\u00f1\u0101par\u0101dha", "type": "Concept", "description": "Offense against wisdom: volitional action taken while judgment, restraint, and memory are impaired, formally counted among the fundamental causes of disease; NOT sin, NOT ignorance in general, NOT lifestyle mistakes moralized.", "resource": "", "tags": ["prajnaparadha", "etiology", "cognition", "ayurveda", "consciousness"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/prakriti", "label": "Prak\u1e5bti", "type": "Concept", "description": "In \u0100yurveda, the individual psychophysical constitution fixed at conception by the do\u1e63a configuration of the parental seed and the womb conditions, the lifelong baseline against which imbalance is measured; NOT the S\u0101\u1e43khya primordial materiality treated in dharma-foundation v0.1, NOT a quiz result, NOT something a regimen changes.", "resource": "", "tags": ["prakriti", "constitution", "ayurveda", "school-contrast"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/prana-tejas-ojas", "label": "Pr\u0101\u1e47a-Tejas-Ojas", "type": "Concept", "description": "The vitality triad: pr\u0101\u1e47a the animating vital current, tejas the metabolic and perceptual brilliance, ojas the sustaining essence, taught as the refined counterparts of v\u0101ta, pitta, and kapha; NOT subtle energy in the New Age sense, NOT the yogic pr\u0101\u1e47a treatment of dharma-foundation v0.1, NOT three supplements.", "resource": "", "tags": ["prana", "tejas", "ojas", "vitality", "ayurveda"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/rasa", "label": "Rasa", "type": "Concept", "description": "In \u0100yurveda, the six tastes (sweet, sour, salty, pungent, bitter, astringent) as therapeutic categories predicting the action of substances, and also the first dh\u0101tu, the nutrient fluid; NOT the aesthetic-devotional rasa folded into bh\u0101va in bhakti-marga v0.4, NOT flavor as sensory pleasure, NOT juice generically.", "resource": "", "tags": ["rasa", "six-tastes", "pharmacology", "ayurveda", "school-contrast"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/rasayana", "label": "Ras\u0101yana", "type": "Concept", "description": "Rejuvenation therapy: the discipline that renews tissue quality, strengthens agni, and builds ojas, including conduct itself as a ras\u0101yana; NOT anti-aging supplements, NOT biohacking, NOT a product category.", "resource": "", "tags": ["rasayana", "rejuvenation", "ojas", "ayurveda"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/ritucharya", "label": "\u1e5atucary\u0101", "type": "Concept", "description": "The seasonal regimen: diet and conduct adjusted season by season to the cycle of do\u1e63a accumulation, aggravation, and pacification; NOT seasonal self-care content, NOT a diet plan, NOT folklore about weather.", "resource": "", "tags": ["ritucharya", "seasons", "prevention", "ayurveda"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/sadvritta", "label": "Sadv\u1e5btta", "type": "Concept", "description": "Right conduct prescribed as preventive medicine: the code of personal, social, and mental behavior given by the physician for the sake of health of body and mind together; NOT etiquette, NOT moralism, NOT religious commandment.", "resource": "", "tags": ["sadvritta", "conduct", "prevention", "ayurveda", "consciousness"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/sattvavajaya", "label": "Sattv\u0101vajaya", "type": "Concept", "description": "Mind-mastery therapeutics: the classical psychotherapy that withdraws the mind from unwholesome objects and retrains judgment, restraint, and memory, one of the three classical classes of treatment; NOT positive thinking, NOT suppression of feeling, NOT a modern psychotherapy equivalence claim.", "resource": "", "tags": 8}}, {"data": {"id": "concepts/vikriti", "label": "Vik\u1e5bti", "type": "Concept", "description": "The current deviation from ones constitutional baseline, the actual object of diagnosis and treatment; NOT a second body type, NOT interchangeable with prak\u1e5bti, NOT a permanent condition.", "resource": "", "tags": ["vikriti", "imbalance", "diagnosis", "ayurveda"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "references/ashtanga-hridaya", "label": "A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya (V\u0101gbha\u1e6da)", "type": "Reference", "description": "V\u0101gbha\u1e6da synthesis of the Charaka and Su\u015bruta traditions in polished verse, the standard teaching text, source of the trido\u1e63a summary, the daily and seasonal regimens, and the formation of \u0101ma.", "resource": "", "tags": ["reference", "ashtanga-hridaya", "vagbhata"], "color": "#10b981", "size": 32}}, {"data": {"id": "references/ashtanga-samgraha", "label": "A\u1e63\u1e6d\u0101\u1e45ga Sa\u1e43graha (V\u0101gbha\u1e6da)", "type": "Reference", "description": "The longer prose-and-verse companion of the A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya, expanding the same synthesis of the Charaka and Su\u015bruta traditions across the eight limbs of medicine.", "resource": "", "tags": ["reference", "ashtanga-samgraha", "vagbhata"], "color": "#10b981", "size": 32}}, {"data": {"id": "references/bhavaprakasha", "label": "Bh\u0101vaprak\u0101\u015ba", "type": "Reference", "description": "The 16th-century compendium of Bh\u0101vami\u015bra, bridge of the classical system toward early modern practice, with its celebrated glossary (nigha\u1e47\u1e6du) and restatements of constitution and regimen.", "resource": "", "tags": ["reference", "bhavaprakasha", "nighantu"], "color": "#10b981", "size": 32}}, {"data": {"id": "references/charaka-samhita", "label": "Charaka Sa\u1e43hit\u0101", "type": "Reference", "description": "The foundational compendium of internal medicine (k\u0101yacikits\u0101), redacted by Charaka fr vega-dharana", "target": "concepts/prajnaparadha"}}, {"data": {"id": "concepts/vega-dharana__concepts/vata", "source": "concepts/vega-dharana", "target": "concepts/vata"}}, {"data": {"id": "concepts/vega-dharana__concepts/sadvritta", "source": "concepts/vega-dharana", "target": "concepts/sadvritta"}}, {"data": {"id": "concepts/vikriti__references/charaka-samhita", "source": "concepts/vikriti", "target": "references/charaka-samhita"}}, {"data": {"id": "concepts/vikriti__references/ashtanga-hridaya", "source": "concepts/vikriti", "target": "references/ashtanga-hridaya"}}, {"data": {"id": "concepts/vikriti__concepts/prakriti", "source": "concepts/vikriti", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/vikriti__concepts/dosha", "source": "concepts/vikriti", "target": "concepts/dosha"}}, {"data": {"id": "concepts/vikriti__concepts/svastha", "source": "concepts/vikriti", "target": "concepts/svastha"}}], "bodies": {"concepts/agni": "# Agni -- \u0905\u0917\u094d\u0928\u093f\n\n**Not:** digestion, metabolism as calorie arithmetic, the Vedic fire deity\n\n## What It Actually Means\n\nAgni is the fire that turns other into self. Food, sensation, even information arrive as foreign material; agni is the graded system of conversions that transforms them into tissue, energy, immunity, and understanding. The gut fire (j\u0101\u1e6dhar\u0101gni) leads: classical texts make it the master switch on which the other twelve depend. Five elemental fires (bh\u016bt\u0101gni) refine the digested material; seven tissue fires (dh\u0101tvagni) govern the sequential building of each dh\u0101tu from the previous one. Health tracks the state of agni: balanced (sama) fire builds clean tissue, while sharp, mild, or irregular fire leaves the job half-done, and the half-done residue is \u0101ma, the starting point of most pathology. This is why the tradition calls disease the child of weakened fire and treats the fire before the symptom.\n\n## Audience Metaphor\n\nA pottery works with one great kiln and a line of smaller finishing kilns. If the great kiln underfires, every piece down the line carries hidden damp, and no amount of glazing fixes clay that never cured. Agni is the kiln-line of the body, and \u0101ma is the damp that rides through when any kiln runs cool.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na 15 on j\u0101\u1e6dhar\u0101gni, bh\u016bt\u0101gni, and dh\u0101tvagni -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 27 on the primacy of the digestive fire -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/ama": "# \u0100ma -- \u0906\u092e\n\n**Not:** toxins, ordinary waste, a detox target\n\n## What It Actually Means\n\n\u0100ma is what happens to input the fire could not finish. When j\u0101\u1e6dhar\u0101gni or the deeper agnis run weak, the intermediate product of digestion is neither nutrient nor excretable waste: it is a heavy, sticky, unripe residue that the texts describe with the word for uncooked. Because it is neither usable nor evacuable, \u0101ma seeps into the channel system (srotas), obstructs flow, blends with vitiated do\u1e63as, and becomes the substrate on which disease patterns organize; a large share of classical pathology is narrated as do\u1e63a plus \u0101ma lodged in a channel. The concept also extends to the mind: undigested experience behaves the same way. The therapeutic logic follows the etiology: strengthen the fire and stop feeding it beyond its capacity, because \u0101ma is manufactured at home, not imported.\n\n## Audience Metaphor\n\n\u0100ma is the grease in a restaurant ventilation duct. Nobody carried grease into the building; it is the residue of ten thousand meals cooked on a flame that never burned quite hot enough, condensing where you cannot see it until the airflow chokes. You do not solve it by buying a fan; you fix the fire and clean the duct.\n\n## Citations\n\n1. A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya S\u016btrasth\u0101na 13.25 on the formation of \u0101ma from impaired agni -- see [references/ashtanga-hridaya.md](../references/ashtanga-hridaya.md)\n2. Charaka Sa\u1e43hit\u0101 Vim\u0101nasth\u0101na 5 on channel obstruction in pathogenesis -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/ayus": "# \u0100yus -- \u0906\u092f\u0941\u0938\u094d\n\n**Not:** lifespan as a number, biological life excluding consciousness, a longevity project\n\n## What It Actually Means\n\n\u0100yus is the answer to the question what is \u0100yurveda the veda of. Charaka defines it in the opening chapter: life is the sa\u1e43yoga, the sustained conjunction, of four factors, the body, the senses, the mind (sattva), and the self (\u0101tman). The definition is doing deliberate work: it makes consciousness a constituent of the medical object, not a complication of it. A medicine of \u0101yus therefore must address conduct, cognition, and emotion as physiology, which is exactly what the rest of the system does, from praj\u00f1\u0101p\u0101radha as etiology to sattv\u0101vajaya as therapy. Charaka immediately grades life on two axes, beneficial and happy, extending medicine into ethics. The corpus already treats \u0101tman elsewhere (dharma-foundation v0.1, upanishadic-core v0.6, nyaya-vaisheshika v0.9, mimamsa-dharma v0.10); this bundle does not re-theorize it, it documents the medical fact that \u0100yurveda writes the self into the definition of life.\n\n## Audience Metaphor\n\nA chord is not any of its notes and not the seconds it rings; it is notes sounding together, and it ends when they stop sounding together. \u0100yus is life as chord: body, senses, mind, and self held in one sustained sounding, with medicine as the art of keeping the chord in tune, not merely long.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 1.42 defining \u0101yus as the conjunction of body, senses, mind, and self -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 1.41 on \u0100yurveda as the knowledge of beneficial and harmful life -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/dhatu": "# Dh\u0101tu -- \u0927\u093e\u0924\u0941\n\n**Not:** generic body tissue, energy layers, the chakra system\n\n## What It Actually Means\n\nThe dh\u0101tus are the seven stations of embodiment: rasa (nutrient fluid), rakta (blood), m\u0101\u1e43sa (muscle), medas (fat), asthi (bone), majj\u0101 (marrow and nerve), \u015bukra (reproductive essence). Each is manufactured from the one before it by a dedicated tissue-fire (dh\u0101tvagni), so the series is a dependency chain: poor rasa starves everything downstream, and a defect at any station propagates forward. The chain terminates beyond itself in ojas, the culminating essence of the whole sequence. Nourishment therefore takes time to reach the deep tissues, which is why classical therapeutics thinks in weeks and seasons rather than doses and days, and why depletion or excess of a specific dh\u0101tu, not a lab value, is the classical unit of structural diagnosis.\n\n## Audience Metaphor\n\nSeven workshops in a single supply chain, each taking the previous workshop output as its only raw material. A flaw in the first workshop batch shows up in the seventh as a mystery defect nobody can trace on-site. Dh\u0101tu theory is the supply-chain map that makes the tracing possible.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na 15.16 on the sequential formation of the seven dh\u0101tus -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 S\u016btrasth\u0101na 14 on the dh\u0101tu series and its refinement -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/dinacharya": "# Dinacary\u0101 -- \u0926\u093f\u0928\u091a\u0930\u094d\u092f\u093e\n\n**Not:** a morning-routine listicle, self-optimization content, a one-size ritual\n\n## What It Actually Means\n\nDinacary\u0101 is medicine practiced before anything is wrong. The classical day is read as a do\u1e63a clock: kapha dominates the early morning and evening, pitta the midday and midnight, v\u0101ta the transitions, and the regimen sequences the days acts to ride that cycle rather than fight it. Rise in the v\u0101ta hours before dawn when the mind is subtle; evacuate and clean the senses while kapha is heavy; exercise to half strength in the kapha morning; take the main meal at pitta noon when the fire is highest; wind toward sleep as kapha returns. Each item in the A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya chapter carries its medical reason, and the whole is calibrated to the individual constitution. The logic is compounding: a physiology aligned daily accumulates order the way a misaligned one accumulates \u0101ma, which makes dinacary\u0101 the cheapest therapy in the system.\n\n## Audience Metaphor\n\nSailors do not argue with the tide table; they schedule the harbor around it and spend the saved fuel elsewhere. Dinacary\u0101 is the tide table of the body, and following it is not discipline for its own sake but seamanship.\n\n## Citations\n\n1. A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya S\u016btrasth\u0101na 2 on the daily regimen -- see [references/ashtanga-hridaya.md](../references/ashtanga-hridaya.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 5 on the measured intake and daily conduct -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/dosha": "# Do\u1e63a -- \u0926\u094b\u0937\n\n**Not:** a bodily humor, a body type, a personality category\n\n## What It Actually Means\n\nDo\u1e63a names the three regulatory principles that govern every physiological and psychological process: v\u0101ta (movement and transmission), pitta (transformation), kapha (cohesion and stability). They are not substances to be located under a microscope but functional patterns inferred from their effects, the way a physicist infers a force from acceleration. In balance they sustain the body; vitiated, they become the agents of disease, which is why the word itself carries the sense of fault-liability. Health in \u0100yurveda is defined through their equilibrium (sama-do\u1e63a), and every diagnostic and therapeutic move in the system is phrased in terms of which do\u1e63a has moved, where, and why. The three-do\u1e63a frame is the load-bearing wall of the entire vocabulary in this bundle.\n\n## Audience Metaphor\n\nThink of a city that runs on three utilities: transport, power, and water-plus-masonry. None of them is a thing you can point at in one place; each is a function running through the whole city. The city fails differently depending on which utility fails. Do\u1e63as are the utilities of the body-mind, and diagnosis is reading which grid is down.\n\n## Citations\n\n1. A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya S\u016btrasth\u0101na 1.6-7 on v\u0101yu, pitta, kapha as the three do\u1e63as -- see [references/ashtanga-hridaya.md](../references/ashtanga-hridaya.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 18.49-51 on the functions of the three do\u1e63as -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/guna": "# Gu\u1e47a -- \u0917\u0941\u0923\n\n**Not:** the Vai\u015be\u1e63ika quality category of v0.9, the cosmological gu\u1e47as of v0.7, vague qualities\n\n## What It Actually Means\n\nThe gurv\u0101di gu\u1e47as are the twenty dials of \u0100yurvedic pharmacology, arranged as ten opposed pairs: heavy-light, cold-hot, unctuous-dry, dull-sharp, stable-mobile, soft-hard, clear-sticky, smooth-rough, subtle-gross, dense-liquid. Every substance, activity, season, and state can be read on these dials, and the system runs on one law: sam\u0101nya-vi\u015be\u1e63a, like increases like and opposites reduce. Heavy food increases the heavy in you; dry weather increases the dry. Because do\u1e63as, tissues, and drugs are all described in the same twenty-property vocabulary, the physician can compute a correction: read the derangement as a property profile, prescribe the opposing profile. This is the third distinct referent the word gu\u1e47a carries in this corpus, after the Vai\u015be\u1e63ika ontological category (v0.9) and the cosmological strands (v0.7), and it is the flagship demonstration that school-contrast scales: one word, three theoretical instruments, no single canonical home.\n\n## Audience Metaphor\n\nTwenty sliders on a mixing desk, in ten linked pairs: push one up and its partner drops. Every ingredient of a life, meals, weather, work, sleep, slides some fader. The physician is the sound engineer reading the mix and pulling the opposing fader until the track sits right.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 25.36 listing the twenty \u015b\u0101r\u012bra gu\u1e47as -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 1.44 on sam\u0101nya and vi\u015be\u1e63a, like increasing like -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n3. Cross-bundle note: the cosmological trigu\u1e47a this file distinguishes itself from (item 2 in the not: field) now has its doctrinal source-school treatment at sankhya-darshana v0.13's guna-samkhya.md -- still a fourth, unrelated referent to this \u0100yurvedic pharmacological sense", "concepts/kapha": "# Kapha -- \u0915\u092b\n\n**Not:** phlegm, water retention, a lazy personality type\n\n## What It Actually Means\n\nKapha is the do\u1e63a of cohesion: it binds, cushions, lubricates, and stabilizes. Where v\u0101ta moves and pitta transforms, kapha holds, giving the body its mass, its joints their glide, its stomach its protective lining, and the mind its capacity for patience, affection, and steadiness. Classical texts link kapha to bala, the strength-resilience of the organism, and its most refined expression connects to ojas, the culminating vital essence. Its subdivisions map the holding sites: avalambaka supporting the chest, kledaka moistening digestion, bodhaka enabling taste, tarpa\u1e47a nourishing the senses, \u015ble\u1e63aka lubricating the joints. Deranged, the same holding power becomes heaviness, congestion, and attachment. Kapha is structure and steadfastness, not slime.\n\n## Audience Metaphor\n\nA great library is not its catalog activity or its reading-room debates; it is first of all shelves, mortar, and a roof that does not leak. Kapha is the body as architecture: the shelving, binding, and weatherproofing that let all the moving and transforming happen somewhere safe.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 18.51 on the functions of kapha (\u015ble\u1e63man) -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 S\u016btrasth\u0101na 21 on kapha subdivisions and seats -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/manas": "# Manas -- \u092e\u0928\u0938\u094d\n\n**Not:** the brain, an emergent property of neurons, the anta\u1e25kara\u1e47a analysis of v0.1\n\n## What It Actually Means\n\nCharaka gives the mind a precise job description. Manas is a\u1e47u, atomic, which explains why attention is serial: you seem to do five things at once, but the one-pointed instrument is switching. It is eka, one per person, so the multiplicity of mental life is a multiplicity of objects and states, not of minds. It stands between the senses and the self: no perception, thought, or action happens without its conjunction, which makes it the gatekeeper of everything that enters the system, including the causes of disease. And it is itself a patient: manas has objects (thinkable things), proper and improper use, and two vitiating qualities, rajas and tamas. That last move is the important one. By giving the mind its own do\u1e63a grammar, \u0100yurveda made psychiatric disorder a lawful medical object two millennia before the category existed elsewhere.\n\n## Audience Metaphor\n\nManas is the single-channel control tower of a busy airport. Every landing and takeoff, every sense report and motor order, routes through one tower that switches fast enough to look parallel. Tower error is its own class of accident, distinct from engine failure, and the system is only safe when both are managed.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 \u015a\u0101r\u012brasth\u0101na 1.18-19 on the atomicity and singleness of manas -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 8 on manas coordinating the senses -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/manasa-dosha": "# M\u0101nasa-Do\u1e63a -- \u092e\u093e\u0928\u0938\u0926\u094b\u0937\n\n**Not:** the cosmological gu\u1e47as of v0.7, mood labels, moral vices\n\n## What It Actually Means\n\nThe three bodily do\u1e63as get a two-membered mental counterpart. Charaka states it in the opening chapter: v\u0101yu, pitta, and kapha are the do\u1e63as of the body; rajas and tamas are the do\u1e63as of the mind. Rajas vitiates as agitation, the mind driven, grasping, scattered, angry; tamas vitiates as obscuration, the mind dull, deluded, inert, unable to see or move. Sattva, the third member of the cosmological triad, is deliberately NOT a mental do\u1e63a: it names the clear, steady state that the other two disturb, which is why the word sattva also serves Charaka as a synonym for mind at its healthiest. The clinical yield is a complete psychiatric grammar parallel to the somatic one: mental constitutions are typed by sattva-rajas-tamas dominance, mental disease is narrated as rajas or tamas vitiation, and therapy has its own arm, sattv\u0101vajaya, aimed exactly here.\n\n## Audience Metaphor\n\nA radio signal has one healthy condition, clear reception, and two characteristic failures: static that drowns the signal and fade that loses it. Rajas is the static, tamas the fade, sattva the clear channel. The repair manual for the receiver is a different document from the cosmology of radio waves, even though the words overlap.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 1.57 naming rajas and tamas as the do\u1e63as of the mind -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 \u015a\u0101r\u012brasth\u0101na 4 on mental constitutions typed by sattva, rajas, and tamas -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/ojas": "# Ojas -- \u0913\u091c\u0938\u094d\n\n**Not:** immunity, energy, a supplement target\n\n## What It Actually Means\n\nOjas is what the whole assembly line is for. When agni is strong and the seven dh\u0101tus form cleanly, the sequence yields a final refined essence that the texts treat as the substrate of bala: strength, resilience, immunological steadiness, luster of skin and eye, and the composure of a mind that does not shatter under load. Su\u015bruta distinguishes para ojas, eight drops seated in the heart whose destruction is death, from the apara ojas pervading the body. Ojas is depleted by overexertion, unprocessed grief, starvation, and excess discharge, and it is built the slow way, by digestion completed at every level. It is the closest thing the system has to a stored summary of how well you have lived in your body, which is why ras\u0101yana, the rejuvenative discipline, is finally an ojas project.\n\n## Audience Metaphor\n\nOjas is the aged reserve in a solera cask: the concentrated outcome of every vintage the house ever blended, drawn down in crisis and impossible to fake with new wine. A cellar is judged by that cask, and a constitution by its ojas.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 30.6-7 on ojas seated in the heart -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 S\u016btrasth\u0101na 15 on para and apara ojas and their loss -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/panchakarma": "# Pa\u00f1cakarma -- \u092a\u091e\u094d\u091a\u0915\u0930\u094d\u092e\n\n**Not:** a detox spa package, a wellness retreat format, karma in the other corpus senses\n\n## What It Actually Means\n\nPa\u00f1cakarma is the interventional arm of classical therapeutics: five evacuative procedures, vamana (emesis), virecana (purgation), basti (medicated enema, itself the v\u0101ta therapy par excellence), nasya (errhine, through the nose), and raktamok\u1e63a\u1e47a (bloodletting, in the Su\u015bruta enumeration), each matched to the do\u1e63a and site it evacuates. The five sit inside a strict architecture: p\u016brvakarma prepares the body by oleation and sudation so that lodged do\u1e63as and \u0101ma return to the gut for removal, the karma proper evacuates them, and pa\u015bc\u0101tkarma rebuilds digestion by graded diet. The texts are as precise about contraindication as indication, which is exactly what the spa-package framing deletes. Note the word karma: here it means a therapeutic procedure, the fourth distinct sense the corpus now carries alongside the moral, kinetic, and ritual senses. This file names the procedures and deliberately contains no instruction.\n\n## Audience Metaphor\n\nA city does not dredge its river as a festival, and dredging is not sweeping the streets. It is scheduled engineering: survey first, water levels prepared, equipment matched to the silt, traffic rerouted, and the channel rebuilt to flow afterward. Pa\u00f1cakarma is dredging, not housekeeping, and it is commissioned, not consumed.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 2 on the five procedures and their preparations -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na on the five karmas including raktamok\u1e63a\u1e47a -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/pitta": "# Pitta -- \u092a\u093f\u0924\u094d\u0924\n\n**Not:** bile, body heat, an angry personality type\n\n## What It Actually Means\n\nPitta is the do\u1e63a of transformation. Wherever the body converts one thing into another, food into nutrient, nutrient into tissue, photon into perception, percept into judgment, pitta is the operating principle. It works hand in glove with agni, the fire of transformation: classical texts treat pitta as the vessel and agent through which agni acts in the body. Its five subdivisions map the conversion sites: p\u0101caka in the gut, ra\u00f1jaka in blood formation, \u0101locaka in the eye, bhr\u0101jaka in the skin, s\u0101dhaka in the heart-mind complex, where it powers discrimination and courage. Pitta imbalance therefore shows up as much in inflamed judgment as in inflamed tissue, which is exactly the mind-body integration the humoral reading loses.\n\n## Audience Metaphor\n\nA kitchen is not its stove flame, but nothing in it becomes a meal without controlled fire. Pitta is the whole kitchen discipline of the body: the flame, the chef timing the conversions, and the plating, everything that turns raw into ready, from breakfast to a decision.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 18.50 on the functions of pitta -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 S\u016btrasth\u0101na 21 on pitta subdivisions and seats -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/prajnaparadha": "# Praj\u00f1\u0101par\u0101dha -- \u092a\u094d\u0930\u091c\u094d\u091e\u093e\u092a\u0930\u093e\u0927\n\n**Not:** sin, ignorance in general, moralized lifestyle mistakes\n\n## What It Actually Means\n\nCharaka lists three fundamental causes of disease: wrong contact of senses with objects, time and season, and praj\u00f1\u0101par\u0101dha, and later texts and commentaries treat the third as the principal one. The claim is radical and precise: a defined failure mode of cognition is a formal cause of illness. Acting against your own better knowledge, suppressing what should be released, forcing what should rest, indulging what you know harms, is not a character flaw in this system; it is an etiological event with a mechanism (the derangement of dh\u012b, dh\u1e5bti, and sm\u1e5bti) and consequences (the immediate vitiation of all do\u1e63as, bodily and mental). Nothing else in the corpus, and little in the history of medicine, states a cognitive etiology this formally. It is the keystone of the consciousness payload of this bundle: mind is not adjacent to disease causation, it is inside it.\n\n## The Three Faculties\n\nDh\u012b is judgment, the capacity to discriminate what is beneficial from what is harmful. Dh\u1e5bti is restraint, the will that holds a course against impulse. Sm\u1e5bti is recall, the retrieval of relevant knowledge and experience at the moment of action. Charaka derives praj\u00f1\u0101par\u0101dha from their joint derangement (dh\u012b-dh\u1e5bti-sm\u1e5bti-vibhra\u1e63\u1e6da): the person misjudges, or judges rightly and cannot hold, or could hold but does not recall. Every unwholesome act decomposes into a failure of one or more of the three, which is what makes the category diagnostic rather than rhetorical.\n\n## Audience Metaphor\n\nAn experienced driver, licensed and sober, runs a red light he plainly saw: misread the intersection, or could not brake his own impatience, or forgot the school crossing he passes daily. No mechanical fault will be found in the car. Praj\u00f1\u0101par\u0101dha is the crash report that names the failure in the driver, and the system files it under causes, not under blame.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 \u015a\u0101r\u012brasth\u0101na 1.102 on praj\u00f1\u0101par\u0101dha as impaired dh\u012b, dh\u1e5bti, and sm\u1e5bti -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 11.43 on the three-fold causation of disease -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/prakriti": "# Prak\u1e5bti -- \u092a\u094d\u0930\u0915\u0943\u0924\u093f\n\n**Not:** the S\u0101\u1e43khya primordial nature, a quiz result, a changeable body state\n\n## What It Actually Means\n\n\u0100yurvedic prak\u1e5bti is your constitutional signature: the proportion of v\u0101ta, pitta, and kapha established at conception, which then colors your build, digestion, temperament, disease susceptibility, and response to treatment for life. It is the baseline, not the pathology. The working pair is prak\u1e5bti against vik\u1e5bti: a physician reads the current state (vik\u1e5bti) against the constitutional norm (prak\u1e5bti), because the same measurement can be healthy for one constitution and diseased for another. This is individualized medicine stated two millennia early, and it is precisely what the one-size body-type quiz flattens. Note the school contrast: this is not the prak\u1e5bti of S\u0101\u1e43khya cosmology, the unmanifest source of the world; the two senses share a word and a root logic of primary configuration, nothing more.\n\n## Audience Metaphor\n\nPrak\u1e5bti is the factory calibration of an instrument. Every barometer leaves the works with its own zero-point, and an honest reading is always the needle relative to that zero, not to some universal dial. Treatment that ignores prak\u1e5bti is like recalibrating every instrument in the fleet to one factory sticker.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 Vim\u0101nasth\u0101na 8.95 on the formation and types of prak\u1e5bti -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 \u015a\u0101r\u012brasth\u0101na 4 on constitution arising at conception -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/prana-tejas-ojas": "# Pr\u0101\u1e47a-Tejas-Ojas -- \u092a\u094d\u0930\u093e\u0923-\u0924\u0947\u091c\u0938\u094d-\u0913\u091c\u0938\u094d\n\n**Not:** subtle energy, the yogic pr\u0101\u1e47a of dharma-foundation v0.1, three supplements\n\n## What It Actually Means\n\nThe triad states the do\u1e63a system at its refined pole. Pr\u0101\u1e47a is the vital current that animates: the master v\u0101yu whose ten seats Charaka lists and whose failure is the first emergency of medicine. Tejas is the brilliance of transformation: metabolic fire showing up as perceptual clarity, courage, and radiance. Ojas is the sustaining essence: the reserve that lets body and mind hold their form under stress. Where v\u0101ta, pitta, and kapha describe everyday regulation that can vitiate, the triad names the same three functions in their most refined, health-constituting expression. It is the vocabulary \u0100yurveda uses when the question is not which do\u1e63a is deranged but how much life the person has to work with.\n\n## Textual Basis Note\n\nPr\u0101\u1e47a and ojas are thoroughly classical: Charaka names the ten seats of pr\u0101\u1e47a (S\u016btrasth\u0101na 29) and treats ojas at S\u016btrasth\u0101na 30; Su\u015bruta gives para and apara ojas. Tejas as a named third member is textually thinner, rooted in the fire vocabulary rather than in a fixed triadic doctrine. The triad AS A SYSTEM, presented as the subtle counterparts of the three do\u1e63as, is a later systematization made standard by modern teaching lineages. The bundle records the triad because contemporary discourse uses it constantly, and records honestly where the classical anchors are firm and where they are reconstructive.\n\n## Audience Metaphor\n\nA lamp needs a current of air, a burning flame, and oil in the reservoir. Pr\u0101\u1e47a is the draft, tejas the flame, ojas the oil: cut the air and the lamp dies now, run the flame too high and it gutters, exhaust the oil and nothing anyone does with air or flame will keep it lit.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 29 on the ten seats of pr\u0101\u1e47a -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 30 on ojas as the essence sustaining life -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n3. Su\u015bruta Sa\u1e43hit\u0101 S\u016btrasth\u0101na 15 on para and apara ojas -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/rasa": "# Rasa -- \u0930\u0938\n\n**Not:** the aesthetic rasa of v0.4, flavor as sensory pleasure, juice generically\n\n## What It Actually Means\n\nRasa carries two linked technical senses in medicine. First, the six tastes: madhura (sweet), amla (sour), lava\u1e47a (salty), ka\u1e6du (pungent), tikta (bitter), ka\u1e63\u0101ya (astringent). Each taste is a compressed report of elemental composition, and therefore a predictor of action: the tradition derives from each taste its effect on each do\u1e63a (sweet pacifies v\u0101ta and pitta and grows kapha; pungent does the reverse), making the tongue a first-pass pharmacology lab. Prescription balances the six across a meal and a season. Second, rasa is the first dh\u0101tu, the nutrient fluid pressed out of digested food that feeds the whole tissue chain, and the pun is deliberate: taste is where nourishment begins. Neither sense is the relished mood of poetry and devotion; that rasa lives in the aesthetic register the corpus treats in bhakti-marga v0.4.\n\n## Audience Metaphor\n\nA winemaker reads a barrel with one sip: acidity, sugar, tannin, salt, each detected on the tongue and each predicting what the wine will do with ten more years. The six rasas are that trained sip applied to everything edible, with the body as the cellar the prediction is for.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 26 on the six rasas and their actions on the do\u1e63as -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na 15.16 on rasa as the first dh\u0101tu -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/rasayana": "# Ras\u0101yana -- \u0930\u0938\u093e\u092f\u0928\n\n**Not:** anti-aging supplements, biohacking, a product category\n\n## What It Actually Means\n\nRas\u0101yana names the path (ayana) of the rasa, the nutrient stream: therapy that improves the quality of what the tissue chain is built from, so that every downstream dh\u0101tu forms at its best and the sequence completes into abundant ojas. Charaka devotes the opening of the Cikits\u0101sth\u0101na to it, listing fruits that are cognitive as much as somatic: long life, memory, intelligence, health, youthfulness of luster and voice. The discipline is staged, classically given after purification, adjusted to constitution and age, and it explicitly includes \u0101c\u0101ra-ras\u0101yana, the rejuvenation of conduct: the person of truthfulness, compassion, cleanliness, and equanimity is said to receive the fruits of ras\u0101yana without taking a single preparation. That teaching is the anti-supplement stated inside the tradition itself: the deepest tonic in the pharmacopoeia is a way of living. This file documents the concept and includes no preparations, doses, or protocols.\n\n## Audience Metaphor\n\nYou can restore an old violin two ways: swap parts, or improve everything the instrument is continuously made of, the humidity it lives in, the hands that play it, the strings it is fed. Ras\u0101yana is the second way applied to a body: not a part swapped in, but the whole supply and conduct of the instrument raised until the tone comes back.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na 1 on ras\u0101yana and its fruits -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na 1.4 on \u0101c\u0101ra-ras\u0101yana, conduct as rejuvenative -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/ritucharya": "# \u1e5atucary\u0101 -- \u090b\u0924\u0941\u091a\u0930\u094d\u092f\u093e\n\n**Not:** seasonal self-care content, a diet plan, weather folklore\n\n## What It Actually Means\n\n\u1e5atucary\u0101 extends the do\u1e63a clock from the day to the year. Each season loads a do\u1e63a (caya), the next season provokes it (prakopa), and a later one settles it (pra\u015bama): v\u0101ta accumulates in the hot dry season, erupts in the rains, settles in autumn; pitta accumulates in the rains, erupts in autumn; kapha accumulates in late winter, erupts in spring. The seasonal chapters legislate the interception: adjust diet, exertion, and conduct so that the accumulating do\u1e63a is drained at the accumulation stage, before it flares into disease. Agni also swings with the year, strong in winter, weak in summer, and the regimen scales food to the fire actually available. The deep claim is ecological: the body is a seasonal system inside larger seasonal systems, and health is phase-alignment between the two.\n\n## Audience Metaphor\n\nA groundskeeper treats the lawn for grubs in early spring, not when the birds are tearing it up in July; by eruption the cheap intervention is gone. \u1e5atucary\u0101 is grub-calendar medicine: act at accumulation, and the eruption never books an appointment.\n\n## Citations\n\n1. A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya S\u016btrasth\u0101na 3 on the seasonal regimens -- see [references/ashtanga-hridaya.md](../references/ashtanga-hridaya.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 6 on seasonal conduct -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/sadvritta": "# Sadv\u1e5btta -- \u0938\u0926\u094d\u0935\u0943\u0924\u094d\u0924\n\n**Not:** etiquette, moralism, religious commandment\n\n## What It Actually Means\n\nSadv\u1e5btta is where the medicine of conduct is written out. Charaka S\u016btrasth\u0101na 8 prescribes it the way another chapter prescribes diet: speak truth measured and timely, restrain anger, honor teachers and guests, keep the body and senses clean, avoid harm, study, rest, neither hoard nor squander, and govern the traffic of the mind. The stated purpose is medical: the practitioner of sadv\u1e5btta gains control of the senses and freedom from the self-inflicted causes of disease, which loops the code directly back to praj\u00f1\u0101par\u0101dha, its diagnostic twin. Read with \u0101c\u0101ra-ras\u0101yana (conduct as rejuvenative) and sattv\u0101vajaya (mind-mastery as therapy), a design emerges: conduct in this system is a therapeutic substance with sustained release, the one drug taken all day every day. This bundle documents the code as vocabulary; the ethical theory itself lives with \u0101c\u0101ra and the yamas in dharmic-ethics v0.5.\n\n## Audience Metaphor\n\nHospitals learned that hand-washing is not a courtesy but the cheapest intervention in medicine. Sadv\u1e5btta generalizes the insight: conduct is hand-washing for the whole of life, an aseptic technique for the mind and its channels, prescribed because it measurably keeps pathology from being introduced.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 8 on the code of right conduct -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 Cikits\u0101sth\u0101na 1.4 on conduct as ras\u0101yana -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/sattvavajaya": "# Sattv\u0101vajaya -- \u0938\u0924\u094d\u0924\u094d\u0935\u093e\u0935\u091c\u092f\n\n**Not:** positive thinking, suppression of feeling, a modern-psychotherapy equivalence claim\n\n## What It Actually Means\n\nCharaka divides all therapy into three classes: daiva-vyap\u0101\u015braya (rite and observance), yukti-vyap\u0101\u015braya (the rational medicine of diet and drug), and sattv\u0101vajaya, defined as restraining the mind from unwholesome objects. The word means victory of sattva, the win of clarity over agitation and dullness. Its instruments are stated plainly: j\u00f1\u0101na (knowledge), vij\u00f1\u0101na (applied understanding), dhairya (steadiness), sm\u1e5bti (recall), sam\u0101dhi (collectedness); the commentarial tradition adds replacing one emotion by another under the physician's direction, assurance, and the deliberate cultivation of wholesome company and objects. Because praj\u00f1\u0101par\u0101dha, the cognitive etiology, is what breaks dh\u012b, dh\u1e5bti, and sm\u1e5bti, sattv\u0101vajaya is its designed repair: the therapy that retrains exactly the faculties whose failure causes disease. This is a complete loop, cause and cure both stated in terms of consciousness, inside a medical system.\n\n## Audience Metaphor\n\nA physiotherapy program for the mind. After an injury you do not lecture the knee or cheer it up; you retrain it against graded resistance until it bears load again. Sattv\u0101vajaya is graded load-bearing for judgment, restraint, and recall, prescribed and progressed the way a therapist progresses an exercise plan.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 11.54 on the three classes of therapy including sattv\u0101vajaya -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 1.58 on the treatment of mental do\u1e63as by knowledge, steadiness, and collectedness -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/srotas": "# Srotas -- \u0938\u094d\u0930\u094b\u0924\u0938\u094d\n\n**Not:** meridians, blood vessels only, metaphorical plumbing\n\n## What It Actually Means\n\nSrotas are the transport infrastructure of the organism. Charaka defines them by cargo: channels carrying pr\u0101\u1e47a, food, water, each of the seven dh\u0101tus, the three wastes, and the mind, thirteen families in the classical count, each with origin points and signs of derangement. The channel is where physiology becomes pathology: do\u1e63as vitiate, \u0101ma lodges, and the resulting srotodu\u1e63\u1e6di takes four canonical forms, excess flow, blockage, growths, and flow diverted from its proper path. Much of treatment is channel logic, clearing what is blocked, redirecting what has strayed, before rebuilding what is depleted. The inclusion of a mind channel matters: it lets one grammar of obstruction and flow describe both a congested liver and an obsessive thought pattern, which is the systemic mind-body integration this bundle keeps meeting.\n\n## Audience Metaphor\n\nA city is its road, rail, water, power, and data networks before it is any building. Traffic engineers classify failures the same four ways: overload, blockage, illegal construction on the right-of-way, and traffic rerouted where it should never go. Srotas theory is that engineering manual for the body.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 Vim\u0101nasth\u0101na 5.3 on the channel families and their vitiation -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Su\u015bruta Sa\u1e43hit\u0101 \u015a\u0101r\u012brasth\u0101na 9 on srotas and their injuries -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)", "concepts/svastha": "# Svastha -- \u0938\u094d\u0935\u0938\u094d\u0925\n\n**Not:** the absence of disease, a wellness aesthetic, normal lab values\n\n## What It Actually Means\n\nSvastha is built from sva (own) and stha (established): the healthy person is one who abides in themselves. Su\u015bruta gives the canonical definition: the do\u1e63as in equilibrium, the fire kindled and even, the seven dh\u0101tus formed properly, the wastes moving as they should, and, in the same breath, the \u0101tman, senses, and mind prasanna, clear and serene. The definition legislates the mind-body unity the rest of the system assumes: no account of health can stop at the body, because the definition itself does not. It is also individually indexed: sama means balanced for this constitution, not average for the population. The word carries philosophical weight the English health cannot: to be well is to be at home in oneself, which quietly connects the medical goal to the contemplative one without collapsing the two.\n\n## Audience Metaphor\n\nA house is sound not because no beam has yet cracked but because it sits true on its foundation: load paths even, drainage running, rooms lit, and the owner actually at home in it, not a stranger pacing someone elses floor. Svastha is the owner at home in a true-sitting house.\n\n## Citations\n\n1. Su\u015bruta Sa\u1e43hit\u0101 S\u016btrasth\u0101na 15.41, the definition of the svastha -- see [references/sushruta-samhita.md](../references/sushruta-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 9 on the aims of the healthy and the ailing -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/vata": "# V\u0101ta -- \u0935\u093e\u0924\n\n**Not:** wind, the air element in the body, a nervous personality type\n\n## What It Actually Means\n\nV\u0101ta is the do\u1e63a of motion: it moves breath, food, blood, waste, nerve impulse, and attention. Charaka calls it the impeller, the one that leads the other two do\u1e63as, because transformation (pitta) and cohesion (kapha) both depend on things being moved into place. It operates through five named currents (v\u0101yus): pr\u0101\u1e47a governing intake and vital function, ud\u0101na governing speech and upward action, vy\u0101na governing circulation, sam\u0101na governing the digestive middle, ap\u0101na governing downward elimination. Because it initiates, v\u0101ta is also first to derange, and classical pathology attributes to it the largest share of disorders. None of this is meteorology; it is a functional physiology of movement stated in a pre-mechanistic idiom.\n\n## Audience Metaphor\n\nIn an orchestra, the conductor produces no sound, yet every entrance, tempo, and cutoff is the conductor moving. V\u0101ta is the conductor of the body: silent itself, visible only in everything that starts, moves, and stops on time, and the first thing you notice when it falters.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 18.49 on the functions of v\u0101ta -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 12 (V\u0101takal\u0101kal\u012bya) on the powers of v\u0101ta -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/vega-dharana": "# Vegadh\u0101ra\u1e47a -- \u0935\u0947\u0917\u0927\u093e\u0930\u0923\n\n**Not:** prudish body-talk, bathroom trivia, license for every impulse\n\n## What It Actually Means\n\nCharaka S\u016btrasth\u0101na 7 legislates a distinction modern readers keep missing: some urges must never be suppressed, and some must always be. The thirteen adh\u0101ra\u1e47\u012bya vegas are the bodys non-negotiable signals, and holding them back, the text specifies disorder by disorder, deranges v\u0101ta first and then the system: suppressed urine has its disease list, suppressed sleep its own, suppressed tears its own. Against these stand the dh\u0101ra\u1e47\u012bya vegas, the impulses of mind, speech, and body (greed, grief, fear, anger, harsh speech, violence) whose restraint is the beginning of conduct. One word, vega, urge, split into a physiology you must obey and a psychology you must govern. The pairing is the whole ethic of the system in miniature: health is neither obedience to every impulse nor war against the body, but knowing which class of signal you are looking at.\n\n## Audience Metaphor\n\nA cockpit has two kinds of lights. Some are sensor warnings you must never override, silencing the low-fuel alarm does not refuel the plane, it schedules a crash. Others are impulses from the passengers to fly lower over the beach, which you must always override. Airmanship, and vega discipline, is never confusing the two panels.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 7 on the thirteen non-suppressible urges and their disorders -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. Charaka Sa\u1e43hit\u0101 S\u016btrasth\u0101na 7.26-30 on the urges that should be restrained -- see [references/charaka-samhita.md](../references/charaka-samhita.md)", "concepts/vikriti": "# Vik\u1e5bti -- \u0935\u093f\u0915\u0943\u0924\u093f\n\n**Not:** a second body type, interchangeable with prak\u1e5bti, a permanent condition\n\n## What It Actually Means\n\nVik\u1e5bti is the state you are actually in, named against the state you were built as. The examination protocols of Charaka read the patient twice: once for the constitutional signature (prak\u1e5bti) and once for the present configuration of do\u1e63a, agni, tissue, and mind, and the clinically meaningful object is the difference between the two readings. The same pulse, appetite, or temperament can be baseline for one person and derangement for another, so no symptom means anything until it is indexed to the constitution. All of therapeutics aims here: you treat the vik\u1e5bti, you never treat the prak\u1e5bti, in the same way a navigator corrects the deviation from course rather than redesigning the ship. The prak\u1e5bti-vik\u1e5bti pair is the conceptual machinery of individualized medicine, and it is precisely the machinery the one-quiz-one-label industry throws away.\n\n## Audience Metaphor\n\nA ship has a designed trim, and the pilot reads the list of the deck against that trim, not against some fleet-wide average. Three degrees of list is nothing for one hull design and an emergency for another. Vik\u1e5bti is the list; prak\u1e5bti is the designed trim the reading only makes sense against.\n\n## Citations\n\n1. Charaka Sa\u1e43hit\u0101 Vim\u0101nasth\u0101na 8 on examining constitution and current state -- see [references/charaka-samhita.md](../references/charaka-samhita.md)\n2. A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya S\u016btrasth\u0101na 1 on do\u1e63a equilibrium and its disturbance -- see [references/ashtanga-hridaya.md](../references/ashtanga-hridaya.md)", "references/ashtanga-hridaya": "# A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya (V\u0101gbha\u1e6da)\n\nThe A\u1e63\u1e6d\u0101\u1e45ga H\u1e5bdaya of V\u0101gbha\u1e6da (around the 7th century CE) condenses the two great compendia into the most widely taught verse text of the tradition. This bundle cites it for the opening statement of the three do\u1e63as (S\u016btrasth\u0101na 1.6-7), the daily regimen (S\u016btrasth\u0101na 2), the seasonal regimen (S\u016btrasth\u0101na 3), and the formation of \u0101ma from impaired agni (S\u016btrasth\u0101na 13.25). Its aphoristic verse forms are the shape in which most practitioners memorize the system.", "references/ashtanga-samgraha": "# A\u1e63\u1e6d\u0101\u1e45ga Sa\u1e43graha (V\u0101gbha\u1e6da)\n\nThe A\u1e63\u1e6d\u0101\u1e45ga Sa\u1e43graha, attributed to the same V\u0101gbha\u1e6da lineage as the H\u1e5bdaya, presents the eight-limbed medicine in a fuller prose-heavy form. Where the H\u1e5bdaya compresses, the Sa\u1e43graha explains, and commentarial tradition reads the two together. The bundle lists it as the expansion layer behind the H\u1e5bdaya citations on regimen, do\u1e63a physiology, and the therapeutics of the mind.", "references/bhavaprakasha": "# Bh\u0101vaprak\u0101\u015ba\n\nThe Bh\u0101vaprak\u0101\u015ba of Bh\u0101vami\u015bra (16th century CE) is the last of the so-called lesser triad of great compendia, valued for its systematic restatement of the classical doctrine and its nigha\u1e47\u1e6du, the drug-and-substance glossary that became a standard of early modern pharmacy. The bundle lists it as the maturity layer of the tradition: evidence of how the do\u1e63a, gu\u1e47a, and ras\u0101yana vocabulary continued as a living technical language into the early modern period.", "references/charaka-samhita": "# Charaka Sa\u1e43hit\u0101\n\nThe Charaka Sa\u1e43hit\u0101 (redacted around the early centuries CE from the older Agnive\u015ba Tantra, with a later completion by D\u1e5b\u1e0dhabala) is the principal classical text of \u0100yurvedic internal medicine. Its eight sections (sth\u0101nas) supply most of the doctrinal anchors in this bundle: the definition of life as the four-fold conjunction (S\u016btrasth\u0101na 1.42), rajas and tamas as the mental do\u1e63as (S\u016btrasth\u0101na 1.57), the non-suppressible urges (S\u016btrasth\u0101na 7), the code of conduct (S\u016btrasth\u0101na 8), the three-fold therapy including sattv\u0101vajaya (S\u016btrasth\u0101na 11), the twenty gu\u1e47as (S\u016btrasth\u0101na 25), the six rasas (S\u016btrasth\u0101na 26), ojas (S\u016btrasth\u0101na 30), the channel system (Vim\u0101nasth\u0101na 5), constitution (Vim\u0101nasth\u0101na 8), the mind and praj\u00f1\u0101p\u0101radha (\u015a\u0101r\u012brasth\u0101na 1), and ras\u0101yana (Cikits\u0101sth\u0101na 1). This bundle cites it wherever the root formulation carries the point.", "references/kashyapa-samhita": "# K\u0101\u015byapa Sa\u1e43hit\u0101\n\nThe K\u0101\u015byapa Sa\u1e43hit\u0101, the root text of kaum\u0101rabh\u1e5btya (pediatrics, obstetrics, and the care of mother and child), survives incompletely but preserves the application of the constitutional and nourishment doctrines from conception through childhood: prak\u1e5bti set at conception, the building of dh\u0101tus in the growing body, and regimen scaled to the young. The bundle lists it as the life-beginning witness of the vocabulary.", "references/madhava-nidana": "# M\u0101dhava Nid\u0101na\n\nThe M\u0101dhava Nid\u0101na (Rogavini\u015bcaya) of M\u0101dhavakara (around the 8th century CE) became the standard text of diagnosis, so authoritative that the tradition says for nid\u0101na, M\u0101dhava. It organizes disease by definition, etiology, prodrome, and signs, operating the vocabulary this bundle documents: do\u1e63a vitiation, \u0101ma, channel obstruction, and the staging of pathogenesis. It is cited here as the pathology-side consumer of the concepts rather than for new doctrine.", "references/sarngadhara-samhita": "# \u015a\u0101r\u1e45gadhara Sa\u1e43hit\u0101\n\nThe \u015a\u0101r\u1e45gadhara Sa\u1e43hit\u0101 (around the 13th-14th century CE) is the compact manual through which much of later practice learned its pharmacy and its quick physiology. For this bundle it matters for the systematized do\u1e63a periodization, the phases of the day, the night, digestion, and life dominated in turn by kapha, pitta, and v\u0101ta, that underwrites dinacary\u0101 and \u1e5btucary\u0101 as alignment disciplines.", "references/sushruta-samhita": "# Su\u015bruta Sa\u1e43hit\u0101\n\nThe Su\u015bruta Sa\u1e43hit\u0101 is the root text of the \u015balya (surgical) tradition, attributed to Su\u015bruta of the Dhanvantari school. Beyond surgery, this bundle draws on it for three loads: the definition of the svastha (S\u016btrasth\u0101na 15.41), which writes serenity of self, senses, and mind into health itself; the treatment of ojas including the para ojas of the heart whose loss is death (S\u016btrasth\u0101na 15); and the enumeration of the five purification procedures that counts raktamok\u1e63a\u1e47a among them. Its \u015a\u0101r\u012brasth\u0101na also supplies the account of constitution at conception and the anatomy of the channels."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
