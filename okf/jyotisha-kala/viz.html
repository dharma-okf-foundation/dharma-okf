<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "jyotisha-kala";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/ayana", "label": "Ayana", "type": "Concept", "description": "The Sun\u2019s half-year course: uttar\u0101ya\u1e47a northward from winter solstice, dak\u1e63i\u1e47\u0101yana southward from summer solstice, the coarsest solar division of the ritual year; NOT a month pair, NOT fixed to Makara Sa\u1e45kr\u0101nti, NOT a life-phase metaphor.", "resource": "", "tags": ["ayana", "solstice", "calendrics", "jyotisha", "kala"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/ayanamsha", "label": "Ayan\u0101\u1e43\u015ba", "type": "Concept", "description": "The accumulating angular difference between sidereal and tropical zodiacs caused by the precession of the equinoxes, near 24\u00b0 today; the hinge on which every sidereal computation turns; NOT a fudge factor, NOT a single agreed number, NOT irrelevant trivia.", "resource": "", "tags": ["ayanamsha", "precession", "sidereal", "ganita", "jyotisha"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/bhava-jyotisha", "label": "Bh\u0101va (Jyoti\u1e63a)", "type": "Concept", "description": "The twelve houses of the chart: divisions counted from the lagna, each assigned a domain of life in hor\u0101 \u015b\u0101stra; NOT the devotional bh\u0101va of bhakti-marga v0.4, NOT a r\u0101\u015bi, NOT rooms of fate.", "resource": "", "tags": ["bhava", "houses", "hora", "chart", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/dasha", "label": "Da\u015b\u0101", "type": "Concept", "description": "Planetary-period systems partitioning a life into graha-ruled spans, most prominently the 120-year Vi\u1e43\u015bottar\u012b sequence seeded by the natal Moon\u2019s nak\u1e63atra; NOT a doom timetable, NOT a single system, NOT an endorsed predictive method.", "resource": "", "tags": ["dasha", "vimshottari", "hora", "periods", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/ganita", "label": "Ga\u1e47ita", "type": "Concept", "description": "The computational branch of Jyoti\u1e63a: arithmetic, algebra, trigonometry, and spherical astronomy developed to compute the calendar and the sky, one of the three skandhas; NOT Vedic-maths tricks, NOT numerology, NOT a sideline.", "resource": "", "tags": ["ganita", "mathematics", "astronomy", "skandha", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/ghatika", "label": "Gha\u1e6dik\u0101", "type": "Concept", "description": "The 24-minute unit, sixty to a day-night, named for the sinking water-bowl (gha\u1e6d\u012b-yantra) that measured it; with pala and vipala it forms the sexagesimal ladder of practical timekeeping; NOT an hour, NOT a poetic flourish, NOT interchangeable with muh\u016brta.", "resource": "", "tags": ["ghatika", "time-unit", "water-clock", "calendrics", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/gochara", "label": "Gocara", "type": "Concept", "description": "Transit: the grahas\u2019 current motion read against a natal reference, classically from the Moon sign; the hor\u0101 frame for ongoing time; NOT retrograde-panic content, NOT a physical-force claim, NOT an endorsed predictive method.", "resource": "", "tags": ["gochara", "transit", "hora", "graha", "jyotisha"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/graha", "label": "Graha", "type": "Concept", "description": "The nine \u201cseizers\u201d of Jyoti\u1e63a: Sun, Moon, Mars, Mercury, Jupiter, Venus, Saturn, and the shadow-nodes R\u0101hu and Ketu, a functional category defined by grip on calendar and chart; NOT astronomical planets, NOT simple deities, NOT astrological energies.", "resource": "", "tags": ["graha", "navagraha", "celestial", "jyotisha", "ganita"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/hora", "label": "Hor\u0101", "type": "Concept", "description": "The horoscopic skandha of Jyoti\u1e63a (glossed from ahor\u0101tra): the interpretive discipline of the chart, distinct from ga\u1e47ita computation and sa\u1e43hit\u0101 omen-reading; also the planetary hour and the half-sign; NOT the whole of Jyoti\u1e63a, NOT a straight-from-the-Veda system, NOT an endorsed predictive science.", "resource": "", "tags": ["hora", "horoscopy", "skandha", "hellenistic", "jyotisha"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/jataka", "label": "J\u0101taka", "type": "Concept", "description": "Natal horoscopy: the hor\u0101 genre that reads the chart cast for a birth moment, lagna, bh\u0101vas, graha placements, da\u015b\u0101s; NOT the Buddhist J\u0101taka tales, NOT a personality quiz, NOT an endorsed predictive method.", "resource": "", "tags": ["jataka", "natal", "hora", "chart", "jyotisha"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/kala-jyotisha", "label": "K\u0101la (Jyoti\u1e63a)", "type": "Concept", "description": "Time as the measurable in Jyoti\u1e63a: the graded ladder of units from tru\u1e6di and nime\u1e63a through gha\u1e6dik\u0101 and muh\u016brta to ayana and sa\u1e43vatsara, with the m\u016brta/am\u016brta distinction; NOT the cosmic yuga-time of cosmology-creation v0.7, NOT abstract absolute time, NOT destroyer rhetoric.", "resource": "", "tags": ["kala", "time-units", "calendrics", "jyotisha", "ganita"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/karana", "label": "Kara\u1e47a", "type": "Concept", "description": "The half-tithi: eleven kara\u1e47as, seven movable repeating eight times each and four fixed standing once each per lunar month; NOT half a solar day, NOT a redundant subdivision, NOT an omen in isolation.", "resource": "", "tags": ["karana", "panchanga", "calendrics", "tithi", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/lagna", "label": "Lagna", "type": "Concept", "description": "The ascendant: the point of the ecliptic rising on the eastern horizon at a given moment and place, the axis from which the chart\u2019s houses are counted; NOT a sun sign, NOT a personality label, NOT a whole horoscope.", "resource": "", "tags": ["lagna", "ascendant", "hora", "jyotisha", "chart"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/masa", "label": "M\u0101sa", "type": "Concept", "description": "The lunar month of the religious calendar: about 29.53 days counted in tithis, ending at new moon (am\u0101nta) or full moon (p\u016br\u1e47im\u0101nta) by region, kept solar-true by the intercalary adhika-m\u0101sa; NOT a Gregorian month, NOT a fixed thirty days, NOT regionally uniform.", "resource": "", "tags": ["masa", "lunar-month", "intercalation", "calendrics", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/muhurta", "label": "Muh\u016brta", "type": "Concept", "description": "Both the unit (one-thirtieth of a day-night, about 48 minutes, two gha\u1e6dik\u0101s) and the electional discipline of choosing a qualified time for an undertaking; NOT a vague moment, NOT an outcome guarantee, NOT shubh-muhurat sales copy.", "resource": "", "tags": ["muhurta", "time-unit", "election", "calendrics", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/nakshatra", "label": "Nak\u1e63atra", "type": "Concept", "description": "One of the 27 lunar mansions: equal 13\u00b020\u2032 arcs of the ecliptic the Moon crosses in about a day, India\u2019s oldest working celestial coordinate grid; NOT a star sign, NOT a constellation image, NOT a personality type.", "resource": "", "tags": ["nakshatra", "lunar-mansion", "panchanga", "calendrics", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/panchanga", "label": "Pa\u00f1c\u0101\u1e45ga", "type": "Concept", "description": "The five-limbed almanac of Hindu timekeeping: tithi, v\u0101ra, nak\u1e63atra, yoga, and kara\u1e47a together specify a day\u2019s position in the interlocking solar and lunar cycles; NOT a horoscope, NOT a festival list, NOT astrology-app luck copy.", "resource": "", "tags": ["panchanga", "almanac", "calendrics", "jyotisha", "kala"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/rahu-ketu", "label": "R\u0101hu-Ketu", "type": "Concept", "description": "The ascending and descending nodes of the Moon\u2019s orbit, the two shadow-grahas (ch\u0101y\u0101-graha) at which eclipses occur; NOT a Sun-swallowing demon, NOT physical bodies, NOT karmic-point content.", "resource": "", "tags": ["rahu", "ketu", "nodes", "eclipse", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/rashi", "label": "R\u0101\u015bi", "type": "Concept", "description": "One of the twelve 30\u00b0 signs of the sidereal zodiac, Me\u1e63a to M\u012bna, fixed against the stars; NOT a tropical sun-sign, NOT a constellation image, NOT a personality box.", "resource": "", "tags": ["rashi", "zodiac", "sidereal", "jyotisha", "hora"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/ritu", "label": "\u1e5atu", "type": "Concept", "description": "The six seasons of the ritual year, vasanta, gr\u012b\u1e63ma, var\u1e63\u0101, \u015barad, hemanta, \u015bi\u015bira, two solar months each, meshed with the ayana structure; NOT a four-season template, NOT weather commentary, NOT literary ornament only.", "resource": "", "tags": ["ritu", "seasons", "calendrics", "jyotisha", "kala"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/samvatsara", "label": "Sa\u1e43vatsara", "type": "Concept", "description": "The year in Jyoti\u1e63a reckoning, especially the sixty named years of the B\u1e5bhaspati cycle (Prabhava to Ak\u1e63aya) used in inscriptions and almanacs; NOT a universal Hindu year, NOT an era count, NOT a trivia list.", "resource": "", "tags": ["samvatsara", "year", "jupiter-cycle", "calendrics", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/siddhanta", "label": "Siddh\u0101nta", "type": "Concept", "description": "The genre of complete astronomical treatises, S\u016brya Siddh\u0101nta to Siddh\u0101nta \u015airoma\u1e47i: systems computing mean and true positions, eclipses, and time from a fixed epoch; NOT scripture, NOT astrology books, NOT a single fixed canon.", "resource": "", "tags": ["siddhanta", "astronomy", "ganita", "treatise", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/tithi", "label": "Tithi", "type": "Concept", "description": "The lunar day: the time in which the Moon gains twelve degrees of elongation on the Sun, thirty to a synodic month; NOT a solar day, NOT a calendar date, NOT a fixed length of time.", "resource": "", "tags": ["tithi", "lunar-day", "panchanga", "calendrics", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/vara", "label": "V\u0101ra", "type": "Concept", "description": "The planetary weekday, running sunrise to sunrise, its order generated by the hor\u0101 rule of hour-lords; NOT a midnight-boundary day, NOT an arbitrary name list, NOT interchangeable with tithi.", "resource": "", "tags": ["vara", "weekday", "panchanga", "hora", "jyotisha"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/vedanga-jyotisha", "label": "Ved\u0101\u1e45ga Jyoti\u1e63a", "type": "Concept", "description": "Jyoti\u1e63a as the sixth limb of the Veda, the \u201ceye of the Veda\u201d: Lagadha\u2019s treatise on the five-year yuga calendar that fixes the times of ritual, the oldest extant Indian astronomical text; NOT astrology, NOT a horoscope manual, NOT a minor appendix.", "resource": "", "tags": ["vedanga", "jyotisha", "lagadha", "calendrics", "history"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/yoga-panchanga", "label": "Yoga (pa\u00f1c\u0101\u1e45ga)", "type": "Concept", "description": "The 27 luni-solar yogas of the almanac: arcs of 13\u00b020\u2032 measured on the SUM of the longitudes of Sun and Moon, Vi\u1e63kambha to Vaidh\u1e5bti; NOT the yoga of practice, NOT the dar\u015bana, NOT a horoscopic planetary combination.", "resource": "", "tags": ["yoga", "panchanga", "calendrics", "jyotisha", "kala"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "references/aryabhatiya", "label": "\u0100ryabha\u1e6d\u012bya", "type": "Reference", "description": "\u0100ryabha\u1e6da\u2019s compact system of 499 CE: the sine table, place-value arithmetic in verse, time reckoning (K\u0101lakriy\u0101), and the spherics (Gola) behind rising times and the ascendant.", "resource": "", "tags": ["reference", "aryabhata", "ganita", "astronomy"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/brihat-jataka", "label": "B\u1e5bhat J\u0101taka", "type": "Reference", "description": "Var\u0101hamihira\u2019s compendium of hor\u0101: the classical Indian statement of the natal-chart apparatus, r\u0101\u015bi, lagna, bh\u0101va, graha significations, with its acknowledgment of Yavana authorities.", "resource": "", "tags": ["reference", "varahamihira", "hora", "jataka"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/brihat-samhita", "label": "B\u1e5bhat Sa\u1e43hit\u0101", "type": "Reference", "description": "Var\u0101hamihira\u2019s encyclopedia of the sa\u1e43hit\u0101 skandha: planetary courses as public omens, the R\u0101hu chapter weighing eclipse causation against the demon narrative, and the sixty-year Jupiter cycle.", "resource": "", "tags": ["reference", "varahamihira", "samhita", "omens"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/lagadha-vedanga-jyotisha", "label": "Ved\u0101\u1e45ga Jyoti\u1e63a (Lagadha)", "type": "Reference", "description": "The oldest extant Indian astronomical text, preserved in \u1e5ak and Yajus recensions: the arithmetic of a five-year yuga (1,830 days, 62 synodic months, 1,860 tithis) built to fix the times of Vedic ritual. Contains no horoscopy.", "resource": "", "tags": ["reference", "lagadha", "vedanga-jyotisha", "calendrics"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/muhurta-chintamani", "label": "Muh\u016brta Cint\u0101ma\u1e47i", "type": "Reference", "description": "R\u0101ma Daivaj\u00f1a\u2019s manual (c. 1600 CE), the standard treatise of electional astrology: the pa\u00f1c\u0101\u1e45ga limbs, lagna, and graha positions applied to choosing times for named undertakings.", "resource": "", "tags": ["reference", "muhurta", "election", "daivajna"], "color": "#10b981", "size": 32}}, {"data": {"id": "references/panchasiddhantika", "label": "Pa\u00f1casiddh\u0101ntik\u0101", "type": "Reference", "description": "Var\u0101hamihira\u2019s sixth-century comparative summary of five earlier siddh\u0101ntas (Pait\u0101maha, V\u0101si\u1e63\u1e6dha, Pauli\u015ba, Romaka, Saura), the key witness to the genre\u2019s plurality and to pre-S\u016brya-Siddh\u0101nta astronomy.", "resource": "", "tags": ["reference", "varahamihira", "siddhanta", "history"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/siddhanta-shiromani", "label": "Siddh\u0101nta \u015airoma\u1e47i", "type": "Reference", "description": "Bh\u0101skara II\u2019s synthesis of 1150 CE in four parts (L\u012bl\u0101vat\u012b, B\u012bjaga\u1e47ita, Grahaga\u1e47ita, Gol\u0101dhy\u0101ya): the mature statement of the ga\u1e47ita tradition, cited here for time units and precession.", "resource": "", "tags": ["reference", "bhaskara", "ganita", "astronomy"], "color": "#10b981", "size": 32}}, {"data": {"id": "references/surya-siddhanta", "label": "S\u016brya Siddh\u0101nta", "type": "Reference", "description": "The most influential of the classical astronomical treatises: time divisions from tru\u1e6di to kalpa, mean and true planetary motions, eclipse computation, and the pa\u00f1c\u0101\u1e45ga quantities this bundle cites most.", "resource": "", "tags": ["reference", "surya-siddhanta", "astronomy", "ganita"], "color": "#10b981", "size": 33}}], "edges": [{"data": {"id": "concepts/ayana__references/lagadha-vedanga-jyotisha", "source": "concepts/ayana", "target": "references/lagadha-vedanga-jyotisha"}}, {"data": {"id": "concepts/ayana__references/surya-siddhanta", "sour pts/hora", "source": "concepts/vara", "target": "concepts/hora"}}, {"data": {"id": "concepts/vara__concepts/tithi", "source": "concepts/vara", "target": "concepts/tithi"}}, {"data": {"id": "concepts/vedanga-jyotisha__references/lagadha-vedanga-jyotisha", "source": "concepts/vedanga-jyotisha", "target": "references/lagadha-vedanga-jyotisha"}}, {"data": {"id": "concepts/vedanga-jyotisha__references/surya-siddhanta", "source": "concepts/vedanga-jyotisha", "target": "references/surya-siddhanta"}}, {"data": {"id": "concepts/vedanga-jyotisha__concepts/kala-jyotisha", "source": "concepts/vedanga-jyotisha", "target": "concepts/kala-jyotisha"}}, {"data": {"id": "concepts/vedanga-jyotisha__concepts/tithi", "source": "concepts/vedanga-jyotisha", "target": "concepts/tithi"}}, {"data": {"id": "concepts/vedanga-jyotisha__concepts/nakshatra", "source": "concepts/vedanga-jyotisha", "target": "concepts/nakshatra"}}, {"data": {"id": "concepts/vedanga-jyotisha__concepts/ganita", "source": "concepts/vedanga-jyotisha", "target": "concepts/ganita"}}, {"data": {"id": "concepts/yoga-panchanga__references/surya-siddhanta", "source": "concepts/yoga-panchanga", "target": "references/surya-siddhanta"}}, {"data": {"id": "concepts/yoga-panchanga__references/muhurta-chintamani", "source": "concepts/yoga-panchanga", "target": "references/muhurta-chintamani"}}, {"data": {"id": "concepts/yoga-panchanga__concepts/panchanga", "source": "concepts/yoga-panchanga", "target": "concepts/panchanga"}}, {"data": {"id": "concepts/yoga-panchanga__concepts/tithi", "source": "concepts/yoga-panchanga", "target": "concepts/tithi"}}, {"data": {"id": "concepts/yoga-panchanga__concepts/nakshatra", "source": "concepts/yoga-panchanga", "target": "concepts/nakshatra"}}], "bodies": {"concepts/ayana": "# Ayana -- \u0905\u092f\u0928\n\n**Not:** a month pair, fixed to Makara Sankranti, a life-phase metaphor\n\n## What It Actually Means\n\nAyana is the Sun\u2019s half-year course: uttar\u0101ya\u1e47a, the northward run from winter solstice to summer solstice, and dak\u1e63i\u1e47\u0101yana, the southward return. It is the calendar\u2019s coarsest solar division, older in Indian usage than the r\u0101\u015bi zodiac: the Ved\u0101\u1e45ga Jyoti\u1e63a structures its five-year yuga by ayanas. Ritual valence attaches to the northward course, and election prefers it for auspicious rites. The definition is solstitial; the once-exact identification of uttar\u0101ya\u1e47a with Makara Sa\u1e45kr\u0101nti has drifted apart by the accumulating ayan\u0101\u1e43\u015ba, which makes this term a calendrical instance of the sidereal-tropical problem treated in its own file.\n\n## Audience Metaphor\n\nThe year\u2019s two long breaths: six months the Sun climbs north, six it descends south, an inhale and an exhale, solstice to solstice. They are the largest gears in the calendar\u2019s gearbox, and every smaller gear, season, month, fortnight, meshes inside them.\n\n## Citations\n\n1. Ved\u0101\u1e45ga Jyoti\u1e63a structuring the yuga by ayanas -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)\n2. S\u016brya Siddh\u0101nta 14 on ayana and the solar divisions -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/ayanamsha": "# Ayan\u0101\u1e43\u015ba -- \u0905\u092f\u0928\u093e\u0902\u0936\n\n**Not:** a fudge factor, a single agreed number, irrelevant trivia\n\n## What It Actually Means\n\nPrecession swings the equinox slowly backward along the ecliptic, about 50.3 arcseconds a year, so a zodiac anchored to the seasons (tropical) and one anchored to the stars (sidereal) drift apart roughly a degree every 72 years. The ayan\u0101\u1e43\u015ba is the accumulated gap, near 24 degrees today, and it is the declared constant that converts tropical positions into sidereal ones. Classical siddh\u0101ntas modeled the motion as trepidation; the modern Indian ephemeris fixes the Lahiri (Citrapak\u1e63a) ayan\u0101\u1e43\u015ba, anchored on the star Citr\u0101, as the official standard, with rival ayan\u0101\u1e43\u015bas in use across the hor\u0101 tradition. It is the single most consequential technical parameter in sidereal astronomy\u2019s toolkit.\n\n## Audience Metaphor\n\nTwo rulers laid along the same sky, one nailed to the stars and one to the seasons, drifting apart a hair each year for two thousand years: the gap is now almost a full sign wide. Every sidereal computation begins by declaring how wide it takes the gap to be, and that declaration has a name.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 3 on the motion of the equinoxes (trepidation) -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Siddh\u0101nta \u015airoma\u1e47i on precession in the later ga\u1e47ita tradition -- see [references/siddhanta-shiromani.md](../references/siddhanta-shiromani.md)", "concepts/bhava-jyotisha": "# Bh\u0101va -- \u092d\u093e\u0935\n\n**Not:** the devotional bhava of bhakti-marga v0.4, a rashi, rooms of fate\n\n## What It Actually Means\n\nIn hor\u0101 \u015b\u0101stra the twelve bh\u0101vas are the houses of the chart: divisions counted from the lagna, each assigned a domain of life, self, wealth, siblings, and onward through the twelfth. Houses are local: they are anchored to the horizon at the birth moment, so the signs rotate through them daily; whole-sign, equal, and quadrant house systems divide the details differently within the tradition. The word collides head-on with the bhakti-marga v0.4 bh\u0101va, cultivated devotional feeling, with which it shares etymology (bh\u016b, to become) and no technical content. This file is the hor\u0101 referent only.\n\n## Audience Metaphor\n\nTwelve rooms counted from the front door, the lagna, each room assigned a department of life by the school\u2019s rulebook. The signs are wallpaper patterns rotating through the rooms daily; the rooms stay put, fixed to the horizon. And none of them is the bh\u0101va a devotee cultivates: that word lives in another building.\n\n## Citations\n\n1. B\u1e5bhat J\u0101taka 1 on the twelve bh\u0101vas from the lagna -- see [references/brihat-jataka.md](../references/brihat-jataka.md)\n2. Muh\u016brta Cint\u0101ma\u1e47i applying house considerations in election -- see [references/muhurta-chintamani.md](../references/muhurta-chintamani.md)", "concepts/dasha": "# Da\u015b\u0101 -- \u0926\u0936\u093e\n\n**Not:** a doom timetable, a single system, an endorsed predictive method\n\n## What It Actually Means\n\nA da\u015b\u0101 system partitions a lifetime into successive periods ruled by grahas. The dominant scheme, Vi\u1e43\u015bottar\u012b, totals 120 years across nine periods, Ketu 7, \u015aukra 20, Ravi 6, Candra 10, Ma\u1e45gala 7, R\u0101hu 18, Guru 16, \u015aani 19, Budha 17, entered at a point determined by the natal Moon\u2019s nak\u1e63atra, with each mah\u0101da\u015b\u0101 subdividing into antarda\u015b\u0101s by the same proportions. The classical hor\u0101 literature treats several da\u015b\u0101 schemes side by side; the elaborate Vi\u1e43\u015bottar\u012b orthodoxy is consolidated in the Par\u0101\u015bara tradition. This file documents the machinery: what seeds it, how it subdivides, and that it is one interpretive architecture among several, endorsed here for none of its predictive claims.\n\n## Audience Metaphor\n\nA relay schedule for a lifetime: 120 years split into nine legs of fixed lengths, the first runner chosen by the Moon\u2019s position at birth. The schedule itself is exact and ancient. Whether the runners deliver what the commentators promise is a claim this corpus does not adjudicate.\n\n## Citations\n\n1. B\u1e5bhat J\u0101taka da\u015b\u0101 chapters on period systems -- see [references/brihat-jataka.md](../references/brihat-jataka.md)\n2. B\u1e5bhat Sa\u1e43hit\u0101 on the graha apparatus the periods draw on -- see [references/brihat-samhita.md](../references/brihat-samhita.md)", "concepts/ganita": "# Ga\u1e47ita -- \u0917\u0923\u093f\u0924\n\n**Not:** Vedic-maths tricks, numerology, a sideline\n\n## What It Actually Means\n\nGa\u1e47ita, computation, names the mathematical branch of Jyoti\u1e63a in the tradition\u2019s own three-skandha taxonomy: siddh\u0101nta-ga\u1e47ita (computational astronomy), hor\u0101 (charts), sa\u1e43hit\u0101 (the world-reading compendia). Under this heading Indian mathematicians built sine tables (\u0100ryabha\u1e6da\u2019s, in 499 CE), place-value arithmetic, algebra to solve astronomical equations, and the spherical trigonometry that turns ecliptic positions into local risings. The motivation was calendrical and astronomical throughout: the mathematics exists so the pa\u00f1c\u0101\u1e45ga can be printed and the eclipse called to the gha\u1e6dik\u0101. Jyoti\u1e63a\u2019s ga\u1e47ita is thus a chapter of the history of mathematics, not of divination.\n\n## Audience Metaphor\n\nThe engine room of the tradition: sine tables, epoch constants, spherical triangles. Strip it out and no almanac can be printed and no eclipse called. The storefront \u201cVedic maths\u201d speed-trick books are a twentieth-century pamphlet wearing the engine room\u2019s name.\n\n## Citations\n\n1. \u0100ryabha\u1e6d\u012bya Ga\u1e47itap\u0101da on the mathematical toolkit -- see [references/aryabhatiya.md](../references/aryabhatiya.md)\n2. Siddh\u0101nta \u015airoma\u1e47i (L\u012bl\u0101vat\u012b and Ga\u1e47it\u0101dhy\u0101ya) as the mature ga\u1e47ita corpus -- see [references/siddhanta-shiromani.md](../references/siddhanta-shiromani.md)", "concepts/ghatika": "# Gha\u1e6dik\u0101 -- \u0918\u091f\u093f\u0915\u093e\n\n**Not:** an hour, a poetic flourish, interchangeable with muhurta\n\n## What It Actually Means\n\nThe gha\u1e6dik\u0101 (also gha\u1e6d\u012b, n\u0101\u1e0d\u012b, n\u0101\u1e0dik\u0101) is one-sixtieth of a day-night: 24 minutes. It divides sexagesimally, 60 palas to the gha\u1e6dik\u0101 and 60 vipalas to the pala, mirroring the degree-minute-second ladder the ga\u1e47ita texts use for arc. The name is the instrument\u2019s: the gha\u1e6d\u012b-yantra, a pierced copper bowl floating on water, sinks in exactly one gha\u1e6dik\u0101 and served as the standard timekeeper of observatory, court, and temple. Sixty gha\u1e6dik\u0101s to the day and two to the muh\u016brta anchor the practical end of the k\u0101la ladder, the units in which siddh\u0101nta results were actually delivered and checked.\n\n## Audience Metaphor\n\nA kitchen timer that is itself a bowl sinking in water: when it goes under, a gha\u1e6dik\u0101 has passed; refloat it and count again. Sixty sinkings make a day. The unit is exactly as operational as the instrument that defined it.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 1.11 on sixty n\u0101\u1e0d\u012bs to the day -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Siddh\u0101nta \u015airoma\u1e47i on the sexagesimal unit ladder -- see [references/siddhanta-shiromani.md](../references/siddhanta-shiromani.md)", "concepts/gochara": "# Gocara -- \u0917\u094b\u091a\u0930\n\n**Not:** retrograde-panic content, a physical-force claim, an endorsed predictive method\n\n## What It Actually Means\n\nGocara, literally the going of the cows, idiomatically the grahas\u2019 pasture-walk, names the current positions of the grahas read against a natal reference point, classically the Moon\u2019s sign (janma-r\u0101\u015bi). Hor\u0101 practice evaluates each graha\u2019s transit by the house it occupies counted from that reference, with codified favorable and unfavorable positions, and popular observances like Sade Sati (\u015aani\u2019s roughly seven-and-a-half-year passage over the natal Moon and its neighbors) are gocara doctrines. The sa\u1e43hit\u0101 literature separately tracks graha-c\u0101ra, planetary courses, as public omens. This file documents the frame and its vocabulary; the predictive weight any school gives it stays with the school.\n\n## Audience Metaphor\n\nWeather moving over a fixed house: the natal chart is the house, today\u2019s sky is the weather crossing it. The classical texts catalog what each passage is said to signify; they do not supply a force by which a passage compels. The physics is the reader\u2019s import, not the text\u2019s.\n\n## Citations\n\n1. B\u1e5bhat Sa\u1e43hit\u0101 on planetary courses (graha-c\u0101ra) -- see [references/brihat-samhita.md](../references/brihat-samhita.md)\n2. B\u1e5bhat J\u0101taka on reading positions from the natal reference -- see [references/brihat-jataka.md](../references/brihat-jataka.md)", "concepts/graha": "# Graha -- \u0917\u094d\u0930\u0939\n\n**Not:** astronomical planets, simple deities, astrological energies\n\n## What It Actually Means\n\nGraha means seizer, and the navagraha are nine: S\u016brya, Candra, Ma\u1e45gala, Budha, Guru, \u015aukra, \u015aani, and the two nodes R\u0101hu and Ketu. The category is functional, what grips the calendar and the chart, which is why it happily contains a star, a satellite, five planets, and two mathematical points, and why it excludes bodies with no traditional role. In the siddh\u0101ntas each graha is a computational object with mean motion, equation of center, and stated positions; in hor\u0101 each carries significations. The word does double duty across ga\u1e47ita and hor\u0101, and the membership list is fixed by tradition, not by astronomy.\n\n## Audience Metaphor\n\nA committee of nine seated by function, not by species: the chairman is a star, five members are planets, one is a satellite, and two are empty chairs at the exact places where eclipses happen, chairs the committee treats as full members because the calendar must.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 2 on computing the grahas\u2019 true places -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. B\u1e5bhat J\u0101taka 2 on the grahas and their significations -- see [references/brihat-jataka.md](../references/brihat-jataka.md)", "concepts/hora": "# Hor\u0101 -- \u0939\u094b\u0930\u093e\n\n**Not:** the whole of Jyotisha, a straight-from-the-Veda system, an endorsed predictive science\n\n## What It Actually Means\n\nHor\u0101 names the horoscopic branch of Jyoti\u1e63a: the discipline that casts and reads charts, whose classical Indian monument is Var\u0101hamihira\u2019s B\u1e5bhat J\u0101taka. The tradition glosses the word from ahor\u0101tra (day-night, trimmed at both ends); it also names the planetary hour that generates the weekday order, and the half-sign division. Hor\u0101 is one of three skandhas, beside ga\u1e47ita (computation) and sa\u1e43hit\u0101 (omens and the world), and it is the historically youngest major layer: its sign-house-aspect apparatus enters with Hellenistic contact, a debt Var\u0101hamihira records. This bundle intercepts hor\u0101\u2019s high-traffic terms and documents them; endorsement of predictive claims is explicitly out of scope.\n\n## Audience Metaphor\n\nOne branch of a three-branch tree wearing the whole tree\u2019s name-tag. Hor\u0101 is the birth-chart branch; ga\u1e47ita computes, sa\u1e43hit\u0101 reads the world. Marketing that calls the branch \u201cVedic astrology\u201d staples the Ved\u0101\u1e45ga\u2019s prestige onto the one branch the Ved\u0101\u1e45ga does not contain.\n\n## Citations\n\n1. B\u1e5bhat J\u0101taka 1 on hor\u0101, its scope, and its etymology -- see [references/brihat-jataka.md](../references/brihat-jataka.md)\n2. Pa\u00f1casiddh\u0101ntik\u0101 situating computation apart from hor\u0101 -- see [references/panchasiddhantika.md](../references/panchasiddhantika.md)", "concepts/jataka": "# J\u0101taka -- \u091c\u093e\u0924\u0915\n\n**Not:** the Buddhist Jataka tales, a personality quiz, an endorsed predictive method\n\n## What It Actually Means\n\nJ\u0101taka, from j\u0101ta (born), names natal horoscopy: the branch of hor\u0101 that casts a chart for the moment and place of birth and reads it, lagna and bh\u0101vas, graha placements and their configurations, and the da\u015b\u0101 periods unfolding from the natal Moon. Var\u0101hamihira\u2019s B\u1e5bhat J\u0101taka is the genre\u2019s classical Indian monument, and its opening acknowledges the computational (ga\u1e47ita) base the chart is cast from. The layers are worth keeping distinct: what the chart records is astronomy, positions at a timestamp; what the reading asserts is the school\u2019s interpretive system. This bundle supplies the vocabulary for both layers and endorses the predictive claims of neither.\n\n## Audience Metaphor\n\nA photograph of the sky at first breath, then developed into a reading. The genre shares a name with the Buddha\u2019s birth-stories and nothing else. The photograph\u2019s content, positions at a timestamp, is astronomy; what the developer prints from it is the school\u2019s claim, and this corpus documents without endorsing it.\n\n## Citations\n\n1. B\u1e5bhat J\u0101taka 1 on the scope of natal horoscopy -- see [references/brihat-jataka.md](../references/brihat-jataka.md)\n2. Muh\u016brta Cint\u0101ma\u1e47i as the electional counterpart of the natal genre -- see [references/muhurta-chintamani.md](../references/muhurta-chintamani.md)", "concepts/kala-jyotisha": "# K\u0101la -- \u0915\u093e\u0932\n\n**Not:** cosmic yuga-time, abstract absolute time, destroyer rhetoric\n\n## What It Actually Means\n\nJyoti\u1e63a treats time as a measurable and builds a graded ladder of units: tru\u1e6di and nime\u1e63a at the fine end, k\u0101\u1e63\u1e6dh\u0101 and kal\u0101, the gha\u1e6dik\u0101 (24 minutes), the muh\u016brta (48 minutes), the ahor\u0101tra (day-night), pak\u1e63a, m\u0101sa, \u1e5btu, ayana, sa\u1e43vatsara. S\u016brya Siddh\u0101nta opens by distinguishing m\u016brta time, embodied and measurable, from am\u016brta time too fine for instruments. This is the same word treated in cosmology-creation v0.7 in a different register: there k\u0101la frames the cosmos in yugas and kalpas; here it is what the water-clock holds. The bundle takes the instrumental register throughout.\n\n## The Unit Ladder\n\nThe practical rungs: 60 vipalas = 1 pala; 60 palas = 1 gha\u1e6dik\u0101 (24 min); 2 gha\u1e6dik\u0101s = 1 muh\u016brta (48 min); 30 muh\u016brtas (60 gha\u1e6dik\u0101s) = 1 ahor\u0101tra; 15 ahor\u0101tras = 1 pak\u1e63a; 2 pak\u1e63as = 1 m\u0101sa; 2 m\u0101sas = 1 \u1e5btu; 3 \u1e5btus = 1 ayana; 2 ayanas = 1 sa\u1e43vatsara. Finer sub-second units (tru\u1e6di, nime\u1e63a, k\u0101\u1e63\u1e6dh\u0101, kal\u0101) vary somewhat by text; the sexagesimal middle of the ladder is stable across the siddh\u0101ntas.\n\n## Audience Metaphor\n\nA carpenter\u2019s tape measure versus a geologist\u2019s epochs. The v0.7 k\u0101la is the epochs: vast, cosmic, framing everything. Jyoti\u1e63a k\u0101la is the tape: graduated, instrumental, checked against a sinking water-bowl, and existing so that the work starts on the mark.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 1.10-11 on m\u016brta and am\u016brta time and the unit ladder -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Siddh\u0101nta \u015airoma\u1e47i on time divisions in the ga\u1e47ita tradition -- see [references/siddhanta-shiromani.md](../references/siddhanta-shiromani.md)", "concepts/karana": "# Kara\u1e47a -- \u0915\u0930\u0923\n\n**Not:** half a solar day, a redundant subdivision, an omen in isolation\n\n## What It Actually Means\n\nA kara\u1e47a is half a tithi: sixty per synodic month. Eleven names cover the sixty: seven movable kara\u1e47as (Bava, B\u0101lava, Kaulava, Taitila, Gara, Va\u1e47ija, Vi\u1e63\u1e6di) cycle eight times each, and four fixed ones (\u015aakuni, Catu\u1e63pada, N\u0101ga, Ki\u1e43stughna) stand once each around the month\u2019s dark end. The scheme matters operationally: Vi\u1e63\u1e6di, also called Bhadr\u0101, is the standing exclusion in election, and almanacs flag it daily. The kara\u1e47a is the fifth limb of the pa\u00f1c\u0101\u1e45ga, a computed quantity with rule-governed uses, not a floating omen.\n\n## Audience Metaphor\n\nHalf-bricks paving a lunar month: each tithi splits into two kara\u1e47as, seven patterns repeating down the road and four odd-shaped ones set at the month\u2019s dark corner. The election manuals read the paving under a day before letting you build on it, and one brick (Vi\u1e63\u1e6di) is marked: do not build here.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 2.67-69 on the kara\u1e47a scheme -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Muh\u016brta Cint\u0101ma\u1e47i on the Vi\u1e63\u1e6di exclusion -- see [references/muhurta-chintamani.md](../references/muhurta-chintamani.md)", "concepts/lagna": "# Lagna -- \u0932\u0917\u094d\u0928\n\n**Not:** a sun sign, a personality label, a whole horoscope\n\n## What It Actually Means\n\nThe lagna is the ascendant: the degree of the ecliptic rising on the eastern horizon at a stated moment and place. Because the earth\u2019s rotation carries the whole zodiac past the horizon daily, the lagna moves through all twelve r\u0101\u015bis in a day, changing sign roughly every two hours, and computing it belongs to spherical astronomy: the siddh\u0101ntas derive rising times of the signs by latitude. In hor\u0101 the lagna is the chart\u2019s first axis, the point from which the twelve bh\u0101vas are counted, and its computation is the precise step that makes a birth chart a function of both time and place.\n\n## Audience Metaphor\n\nThe eastern horizon as a clock hand sweeping the whole zodiac once a day: the lagna is where the hand points at the moment that matters. Two births two hours apart in the same ward get different lagnas; it is the chart\u2019s here-and-now axis, not its headline.\n\n## Citations\n\n1. B\u1e5bhat J\u0101taka 1 on the lagna as the chart\u2019s reference -- see [references/brihat-jataka.md](../references/brihat-jataka.md)\n2. S\u016brya Siddh\u0101nta 3 on rising times and the ascendant computation -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/masa": "# M\u0101sa -- \u092e\u093e\u0938\n\n**Not:** a Gregorian month, a fixed thirty days, regionally uniform\n\n## What It Actually Means\n\nThe m\u0101sa of the religious calendar is lunar: a synodic month of about 29.53 days counted as thirty tithis, named Caitra through Ph\u0101lguna. Two architectures divide India: am\u0101nta months ending at new moon, dominant in the south and west, and p\u016br\u1e47im\u0101nta months ending at full moon in the north, so a single tithi can belong to differently named months by region. Because twelve lunar months run about eleven days short of the solar year, an intercalary adhika-m\u0101sa is inserted roughly every 32.5 months, classically defined as a lunar month containing no sa\u1e45kr\u0101nti, holding the festivals to their seasons. Solar m\u0101sas, sa\u1e45kr\u0101nti to sa\u1e45kr\u0101nti, coexist in regional calendars.\n\n## Audience Metaphor\n\nA month that ends on the new moon in one province and the full moon in the next, while everyone still agrees which month it is: the name rides the Moon, not the mayor\u2019s decree. And every two or three years the calendar hires an extra month (adhika-m\u0101sa) to pay off its solar debt.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 1 on lunar months and intercalation -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Ved\u0101\u1e45ga Jyoti\u1e63a counting 62 synodic months to the five-year yuga -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)", "concepts/muhurta": "# Muh\u016brta -- \u092e\u0941\u0939\u0942\u0930\u094d\u0924\n\n**Not:** a vague moment, an outcome guarantee, shubh-muhurat sales copy\n\n## What It Actually Means\n\nThe muh\u016brta is first a unit: one-thirtieth of a day-night, 48 minutes, two gha\u1e6dik\u0101s. On the unit stands the discipline of the same name: electing a qualified time for a named undertaking, marriage, travel, foundation-laying, upanayana, by codified rules over the pa\u00f1c\u0101\u1e45ga limbs, the lagna, and graha positions, systematized in manuals like the Muh\u016brta Cint\u0101ma\u1e47i. The discipline is old and internally rigorous. What this file asserts is vocabulary, a defined unit and a rule-governed selection practice built on it; what it does not assert is that the practice controls outcomes.\n\n## Audience Metaphor\n\nA day tiled in thirty 48-minute tiles; the electional discipline is choosing which tile to lay a foundation stone on, by written rules. What a tile IS is exact and computable. Whether choosing the right tile changes what the building becomes is a claim this corpus leaves to its sources.\n\n## Citations\n\n1. Ved\u0101\u1e45ga Jyoti\u1e63a dividing the day into thirty parts -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)\n2. Muh\u016brta Cint\u0101ma\u1e47i as the standard electional manual -- see [references/muhurta-chintamani.md](../references/muhurta-chintamani.md)", "concepts/nakshatra": "# Nak\u1e63atra -- \u0928\u0915\u094d\u0937\u0924\u094d\u0930\n\n**Not:** a zodiac sign or star sign, a constellation image, a personality type\n\n## What It Actually Means\n\nThe 27 nak\u1e63atras divide the ecliptic into equal arcs of 13\u00b020\u2032, each named for its marker star or asterism: A\u015bvin\u012b through Revat\u012b. The Moon crosses roughly one per day, which made the system India\u2019s working celestial coordinate grid from the Vedic period onward: the Ved\u0101\u1e45ga Jyoti\u1e63a computes with it, ritual texts date observances by it, and the almanac still lists the Moon\u2019s nak\u1e63atra daily. It is a lunar system, older in Indian usage than the twelve solar r\u0101\u015bis and independent of them. The commercial layer of birth-star readings rides on the calendrical system but is not it.\n\n## Audience Metaphor\n\nMile markers on a ring road: 27 equal arcs the Moon drives past, about one a night. Asking which nak\u1e63atra is asking which marker the Moon is passing, not which billboard picture stands near it (the star figure), and not which of twelve highway districts it is in (the r\u0101\u015bis).\n\n## Citations\n\n1. Ved\u0101\u1e45ga Jyoti\u1e63a computing lunar and solar positions by nak\u1e63atra -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)\n2. B\u1e5bhat Sa\u1e43hit\u0101 on the nak\u1e63atra apparatus in the sa\u1e43hit\u0101 tradition -- see [references/brihat-samhita.md](../references/brihat-samhita.md)", "concepts/panchanga": "# Pa\u00f1c\u0101\u1e45ga -- \u092a\u091e\u094d\u091a\u093e\u0919\u094d\u0917\n\n**Not:** a horoscope, a festival list, astrology-app luck copy\n\n## What It Actually Means\n\nPa\u00f1c\u0101\u1e45ga means five limbs. For any locality and day the almanac states five computed quantities: the tithi (lunar day), the v\u0101ra (weekday), the nak\u1e63atra the Moon occupies, the yoga (a luni-solar sum), and the kara\u1e47a (half-tithi). Together they locate the day in the interlocking solar and lunar cycles, which is what Hindu ritual timing runs on: a festival is defined by m\u0101sa and tithi, an observance by nak\u1e63atra, an election by the whole set. The pa\u00f1c\u0101\u1e45ga is the public interface of the ga\u1e47ita apparatus: siddh\u0101nta-grade computation delivered as a daily table, recomputable by anyone with the same equations.\n\n## Audience Metaphor\n\nA pilot\u2019s pre-flight sheet: wind, visibility, pressure, runway, traffic. Five independent readings that together say what kind of hour this is for flying. The pa\u00f1c\u0101\u1e45ga is that sheet for a day, computed from the sky rather than guessed, and the election manuals are the flight rules written over it.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 2 on computing tithi, nak\u1e63atra, yoga, and kara\u1e47a -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Muh\u016brta Cint\u0101ma\u1e47i on election over the five limbs -- see [references/muhurta-chintamani.md](../references/muhurta-chintamani.md)", "concepts/rahu-ketu": "# R\u0101hu-Ketu -- \u0930\u093e\u0939\u0941-\u0915\u0947\u0924\u0941\n\n**Not:** a Sun-swallowing demon, physical bodies, karmic-point content\n\n## What It Actually Means\n\nThe Moon\u2019s orbit is tilted about five degrees to the ecliptic; the two points where the paths cross are the ascending node (R\u0101hu) and descending node (Ketu). Eclipses occur only when Sun and Moon stand near a node, which is why the tradition classes the nodes among the nine grahas: nothing shines there, but the calendar of eclipses lives there. The siddh\u0101ntas compute the nodes\u2019 retrograde cycle of about 18.6 years and devote chapters to eclipse computation from them, a fact that sits beside, and corrects, the Pur\u0101\u1e47ic story of the severed demon. Ch\u0101y\u0101-graha, shadow-seizer, is the tradition\u2019s own label for their bodiless status.\n\n## Audience Metaphor\n\nTwo crossing-points where the Moon\u2019s tilted track cuts the Sun\u2019s road: nothing stands there, but when both travelers reach one together, the light goes out. The myth posts a demon at the crossing; the siddh\u0101nta posts coordinates and an 18.6-year timetable.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 4 on lunar eclipse computation from the nodes -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. B\u1e5bhat Sa\u1e43hit\u0101 5 (R\u0101hu-c\u0101ra) weighing eclipse causation against the demon narrative -- see [references/brihat-samhita.md](../references/brihat-samhita.md)", "concepts/rashi": "# R\u0101\u015bi -- \u0930\u093e\u0936\u093f\n\n**Not:** a tropical sun-sign, a constellation image, a personality box\n\n## What It Actually Means\n\nThe twelve r\u0101\u015bis divide the ecliptic into equal 30\u00b0 signs, Me\u1e63a through M\u012bna, counted in Jyoti\u1e63a against a sidereally fixed frame: the ring is nailed to the stars, not to the seasons. Each r\u0101\u015bi spans two and a quarter nak\u1e63atras, and the two grids, twelve solar signs and twenty-seven lunar mansions, run in parallel throughout the almanac and the chart. The names and the twelvefold scheme entered Indian usage with Hellenistic contact and were fully naturalized by Var\u0101hamihira\u2019s time. The sidereal anchoring is what separates a Jyoti\u1e63a r\u0101\u015bi from the tropical sign of Western popular astrology, and the accumulated gap between the rings is the ayan\u0101\u1e43\u015ba.\n\n## Audience Metaphor\n\nTwelve equal stalls around a circular racetrack, with the stall numbers painted on the ground. The Western tropical track uses the same stall names but rotates its numbering with the seasons; the two numbering schemes have slid about 24 degrees apart. Same names, different addresses: always ask which track.\n\n## Citations\n\n1. B\u1e5bhat J\u0101taka 1 on the r\u0101\u015bi apparatus -- see [references/brihat-jataka.md](../references/brihat-jataka.md)\n2. S\u016brya Siddh\u0101nta on positions referred to the sidereal frame -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/ritu": "# \u1e5atu -- \u090b\u0924\u0941\n\n**Not:** a four-season template, weather commentary, literary ornament only\n\n## What It Actually Means\n\nThe Indian year has six \u1e5btus: vasanta (spring), gr\u012b\u1e63ma (summer), var\u1e63\u0101 (monsoon), \u015barad (autumn), hemanta (early winter), \u015bi\u015bira (late winter), two solar months each. The sixfold division is Vedic, structures the ritual year, and resists the four-season template on principle: the monsoon is not a variant of summer but a season with its own name, rites, and regimen. Three \u1e5btus fill each ayana, and the m\u0101sa scheme meshes beneath them. \u0100yurveda\u2019s seasonal regimen runs on the same wheel and is treated medically in ayurveda-consciousness v0.11; here the \u1e5btu is the calendar structure itself.\n\n## Audience Metaphor\n\nSix spokes on the year\u2019s wheel, not four: the monsoon gets its own spoke, as anyone under it will confirm. Two months to a spoke, three spokes to each half-year breath of the Sun, and both the ritual calendar and the physician\u2019s regimen read which spoke is up.\n\n## Citations\n\n1. Ved\u0101\u1e45ga Jyoti\u1e63a on the yuga\u2019s seasonal structure -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)\n2. S\u016brya Siddh\u0101nta 14 on seasons within the solar divisions -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/samvatsara": "# Sa\u1e43vatsara -- \u0938\u0902\u0935\u0924\u094d\u0938\u0930\n\n**Not:** a universal Hindu year, an era count, a trivia list\n\n## What It Actually Means\n\nSa\u1e43vatsara is the year, and in Jyoti\u1e63a usage especially the named year: the sixty-year cycle from Prabhava to Ak\u1e63aya, classically tied to B\u1e5bhaspati (Jupiter) stepping through the zodiac, its roughly twelve-year period run through five rounds. B\u1e5bhat Sa\u1e43hit\u0101 gives the cycle its classical treatment, and inscriptions and almanac colophons across India date themselves by cycle name. The names cycle; eras count linearly; a complete traditional date stacks era, sa\u1e43vatsara, m\u0101sa, pak\u1e63a, tithi, and v\u0101ra. Multiple new-year conventions coexist by region and calendar type, so the term names a reckoning system, not a single anniversary.\n\n## Audience Metaphor\n\nSixty named years cycling like a very long week: Prabhava, Vibhava, on to Ak\u1e63aya, then round again. An inscription naming its sa\u1e43vatsara dates itself the way \u201cTuesday the 3rd\u201d narrows a date: by position in a cycle, with the era number doing the linear counting.\n\n## Citations\n\n1. B\u1e5bhat Sa\u1e43hit\u0101 8 on the sixty-year Jupiter cycle -- see [references/brihat-samhita.md](../references/brihat-samhita.md)\n2. S\u016brya Siddh\u0101nta 1 on year reckonings -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/siddhanta": "# Siddh\u0101nta -- \u0938\u093f\u0926\u094d\u0927\u093e\u0928\u094d\u0924\n\n**Not:** scripture, astrology books, a single fixed canon\n\n## What It Actually Means\n\nA siddh\u0101nta (settled conclusion, established system) is a complete astronomical treatise: definitions of time units from the fine to the cosmic, mean motions from a fixed epoch, corrections to true positions, eclipse computation, risings and settings, and instruments. The S\u016brya Siddh\u0101nta is the most influential; Var\u0101hamihira\u2019s Pa\u00f1casiddh\u0101ntik\u0101 summarizes and compares five earlier ones; \u0100ryabha\u1e6da, Brahmagupta, and Bh\u0101skara II wrote systems that corrected their predecessors\u2019 constants and methods. The genre\u2019s defining habits, stated parameters, worked derivations, revision of forebears, make it the computational backbone of Jyoti\u1e63a and one of the great technical literatures of the ancient world.\n\n## Audience Metaphor\n\nNot scripture but a textbook lineage: each siddh\u0101nta shows its equations, and the next corrects the constants. Var\u0101hamihira reviewing five rival systems and scoring their accuracy reads less like theology and more like a journal\u2019s benchmark paper.\n\n## Citations\n\n1. Pa\u00f1casiddh\u0101ntik\u0101 comparing the five siddh\u0101ntas -- see [references/panchasiddhantika.md](../references/panchasiddhantika.md)\n2. Siddh\u0101nta \u015airoma\u1e47i as the mature synthesis of the genre -- see [references/siddhanta-shiromani.md](../references/siddhanta-shiromani.md)", "concepts/tithi": "# Tithi -- \u0924\u093f\u0925\u093f\n\n**Not:** a solar day, a calendar date, a fixed length of time\n\n## What It Actually Means\n\nA tithi is the time in which the Moon gains twelve degrees of elongation on the Sun. Thirty make a synodic month: fifteen bright (\u015bukla-pak\u1e63a), new moon to full, fifteen dark (k\u1e5b\u1e63\u1e47a-pak\u1e63a). Because lunar speed varies, tithis stretch and shrink, producing the k\u1e63aya and v\u1e5bddhi phenomena that make Hindu calendrics genuinely technical. The Ved\u0101\u1e45ga Jyoti\u1e63a already counts 1,860 tithis in its five-year yuga, and virtually the whole ritual calendar, ek\u0101da\u015b\u012b fasts, festival days, \u015br\u0101ddha timing, is keyed to tithi rather than to solar date.\n\n## Audience Metaphor\n\nA lap measured by distance gained, not by the stopwatch: the runner (Moon) completes a tithi when it has gained a fixed lead over the pacer (Sun), however long that takes. Some laps are fast, some slow; the count of laps, not the clock, is what the ritual calendar reads.\n\n## Citations\n\n1. Ved\u0101\u1e45ga Jyoti\u1e63a on the five-year yuga of 1,860 tithis -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)\n2. S\u016brya Siddh\u0101nta 2 on tithi from elongation -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/vara": "# V\u0101ra -- \u0935\u093e\u0930\n\n**Not:** a midnight-boundary day, an arbitrary name list, interchangeable with tithi\n\n## What It Actually Means\n\nThe v\u0101ra is the weekday, sunrise to sunrise. Its sequence is generated by the hor\u0101 rule: order the seven classical grahas by decreasing apparent period (\u015aani, Guru, Ma\u1e45gala, Ravi, \u015aukra, Budha, Soma), assign one to each of the twenty-four hours in rotation, and the lord of a day\u2019s first hour names the day; the familiar week order falls out automatically. The planetary week is a system India shares with the Hellenistic world, integrated into Indian timekeeping in the early centuries CE and fully naturalized: the v\u0101ra is one of the five limbs of the pa\u00f1c\u0101\u1e45ga and carries its own electional rules.\n\n## Audience Metaphor\n\nA workshop where seven foremen rotate hour by hour in a fixed order: name the foreman of the day\u2019s first hour and you have named the day. The week is not a list somebody chose; it is the schedule the rotation produces, and the shift changes at sunrise, not midnight.\n\n## Citations\n\n1. \u0100ryabha\u1e6d\u012bya K\u0101lakriy\u0101p\u0101da on hour-lords generating the week order -- see [references/aryabhatiya.md](../references/aryabhatiya.md)\n2. S\u016brya Siddh\u0101nta 1 on the divisions of civil time -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/vedanga-jyotisha": "# Ved\u0101\u1e45ga Jyoti\u1e63a -- \u0935\u0947\u0926\u093e\u0919\u094d\u0917\u091c\u094d\u092f\u094b\u0924\u093f\u0937\n\n**Not:** astrology, a horoscope manual, a minor appendix\n\n## What It Actually Means\n\nThe Ved\u0101\u1e45ga Jyoti\u1e63a, attributed to Lagadha and preserved in \u1e5ak and Yajus recensions, is the oldest extant Indian astronomical text, with an internal astronomical dating in the second millennium BCE. Its scope is exactly what the Ved\u0101\u1e45ga institution implies: auxiliary science in service of ritual, here the arithmetic of a five-year yuga containing 1,830 civil days, 62 synodic months, and 1,860 tithis, with rules for locating Sun and Moon by nak\u1e63atra and fixing the parvans. It contains no horoscopy. The famous self-description makes Jyoti\u1e63a the eye of the Veda: the limb that lets ritual see its times.\n\n## Audience Metaphor\n\nThe Veda\u2019s wristwatch: a limb whose entire job is telling ritual when. Lagadha\u2019s manual holds no fortunes, only the arithmetic of a five-year calendar cycle, which is precisely what the eye of the Veda was praised for seeing.\n\n## Citations\n\n1. Ved\u0101\u1e45ga Jyoti\u1e63a on the five-year yuga and its counts -- see [references/lagadha-vedanga-jyotisha.md](../references/lagadha-vedanga-jyotisha.md)\n2. S\u016brya Siddh\u0101nta as the later siddh\u0101ntic development of the same calendrical program -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)", "concepts/yoga-panchanga": "# Yoga -- \u092f\u094b\u0917\n\n**Not:** the yoga of practice, a horoscopic combination, a loose union metaphor\n\n## What It Actually Means\n\nThe almanac yoga is a computed arc: add the longitudes of Sun and Moon, and every 13\u00b020\u2032 of the sum is one of 27 named yogas, Vi\u1e63kambha to Vaidh\u1e5bti. Yoga here means addition, the sum; it answers no question about practice or union. It is the fourth limb of the pa\u00f1c\u0101\u1e45ga, with auspicious and inauspicious members codified in the election manuals (Vyat\u012bp\u0101ta and Vaidh\u1e5bti are standing exclusions). The corpus now holds several referents of this one word: the s\u0101dhana discipline (dharma-foundation v0.1), the dar\u015bana (yoga-darshana v0.2), the horoscopic combination noted under hor\u0101, and this calendrical sum. They share a root and nothing else.\n\n## Audience Metaphor\n\nTwo runners on a circular track, and a scoreboard that tracks the SUM of their distances: a combined odometer that ticks over a new name every 13\u00b020\u2032. It shares a spelling with the gym, the philosophy school, and the chart pattern, and shares nothing else with any of them.\n\n## Citations\n\n1. S\u016brya Siddh\u0101nta 2.65-66 on the yoga computed from the sum of longitudes -- see [references/surya-siddhanta.md](../references/surya-siddhanta.md)\n2. Muh\u016brta Cint\u0101ma\u1e47i on avoided yogas in election -- see [references/muhurta-chintamani.md](../references/muhurta-chintamani.md)", "references/aryabhatiya": "# \u0100ryabha\u1e6d\u012bya\n\nComposed at Kusumapura in 499 CE, the \u0100ryabha\u1e6d\u012bya compresses a complete astronomical system into 121 verses across four p\u0101das: G\u012btik\u0101 (parameters), Ga\u1e47ita (mathematics, including the sine table and root extractions), K\u0101lakriy\u0101 (time reckoning, epochs, hour-lords), and Gola (spherics, including the earth\u2019s rotation, which \u0100ryabha\u1e6da asserts). It is the fountainhead of the classical ga\u1e47ita lineage that runs through Brahmagupta to Bh\u0101skara II. This bundle cites its K\u0101lakriy\u0101 for the hour-lord generation of the weekday and its Ga\u1e47ita as the exemplar of computation in the tradition\u2019s own taxonomy.", "references/brihat-jataka": "# B\u1e5bhat J\u0101taka\n\nThe B\u1e5bhat J\u0101taka is the classical Indian compendium of hor\u0101 (natal horoscopy): the r\u0101\u015bi and lagna apparatus, the twelve bh\u0101vas, graha significations and configurations, and da\u015b\u0101 material, stated with Var\u0101hamihira\u2019s characteristic compression. Its opening glosses hor\u0101 from ahor\u0101tra, and the text acknowledges the Yavanas as respected authorities in the field, the tradition\u2019s own record of the horoscopic layer\u2019s Hellenistic contact. This bundle cites it as the defining text of the gateway tier: the source that shows what the horoscopic vocabulary classically meant, distinct from both the Ved\u0101\u1e45ga\u2019s calendrics and modern commercial astrology.", "references/brihat-samhita": "# B\u1e5bhat Sa\u1e43hit\u0101\n\nThe B\u1e5bhat Sa\u1e43hit\u0101 is the classical monument of the sa\u1e43hit\u0101 skandha: the world-reading branch that treats planetary courses (graha-c\u0101ra), eclipses and their alleged effects, meteorology, architecture, iconography, and much else, as public rather than natal matters. This bundle cites chapter 5 (R\u0101hu-c\u0101ra), where Var\u0101hamihira discusses eclipse causation by the nodes against the Svarbh\u0101nu narrative, and chapter 8 for the classical treatment of the sixty-year B\u1e5bhaspati (Jupiter) cycle of sa\u1e43vatsara names. The text also anchors the bundle\u2019s claim that the three skandhas are the tradition\u2019s own taxonomy, not a modern imposition.", "references/lagadha-vedanga-jyotisha": "# Ved\u0101\u1e45ga Jyoti\u1e63a (Lagadha)\n\nAttributed to Lagadha and carrying an internal astronomical dating in the second millennium BCE, the Ved\u0101\u1e45ga Jyoti\u1e63a survives in two recensions (\u1e5ak, 36 verses; Yajus, 43-45 verses, evidently edited later). Its program is ritual calendrics: the five-year yuga with its counts of days, months, tithis, and nak\u1e63atra visits of Sun and Moon, intercalation, and rules for locating the luminaries by nak\u1e63atra so the parvans and sacrifices land on the right day. This bundle cites it as the anchor of the Ved\u0101\u1e45ga stratum: calendrical, computational, and entirely without the horoscopic apparatus of later hor\u0101 literature.", "references/muhurta-chintamani": "# Muh\u016brta Cint\u0101ma\u1e47i\n\nThe Muh\u016brta Cint\u0101ma\u1e47i of R\u0101ma Daivaj\u00f1a (composed c. 1600 CE, with the P\u012by\u016b\u1e63adh\u0101r\u0101 commentary) is the standard manual of muh\u016brta, the electional discipline: codified rules over tithi, v\u0101ra, nak\u1e63atra, yoga, and kara\u1e47a, together with lagna and graha considerations, for timing marriage, travel, construction, sa\u1e43sk\u0101ras, and other named undertakings, including the standing exclusions (Vi\u1e63\u1e6di kara\u1e47a, Vyat\u012bp\u0101ta and Vaidh\u1e5bti yogas). This bundle cites it as the codification of election, documenting the rule system while endorsing none of its efficacy claims.", "references/panchasiddhantika": "# Pa\u00f1casiddh\u0101ntik\u0101\n\nVar\u0101hamihira\u2019s Pa\u00f1casiddh\u0101ntik\u0101 (mid-sixth century CE) summarizes and compares five siddh\u0101ntas current in his day, ranking the Saura (an earlier S\u016brya Siddh\u0101nta) most accurate, and preserving systems otherwise lost, including the Romaka with its Hellenistic affiliations. The work is this bundle\u2019s witness for two claims: that the siddh\u0101nta genre was plural and self-comparing rather than a fixed canon, and that Indian astronomy in the period openly assimilated and evaluated foreign parameters. Var\u0101hamihira wrote across all three skandhas, which makes him the tradition\u2019s own proof that computation, horoscopy, and omen-reading were distinct undertakings.", "references/siddhanta-shiromani": "# Siddh\u0101nta \u015airoma\u1e47i\n\nBh\u0101skara II\u2019s Siddh\u0101nta \u015airoma\u1e47i (1150 CE) is the mature synthesis of the classical ga\u1e47ita tradition: L\u012bl\u0101vat\u012b (arithmetic), B\u012bjaga\u1e47ita (algebra), Grahaga\u1e47ita (planetary computation), and Gol\u0101dhy\u0101ya (spherics), with Bh\u0101skara\u2019s own commentary. It refines the unit ladder, treats precession with parameters closer to the modern value than the older trepidation models, and openly corrects predecessors, exemplifying the genre\u2019s self-revising habit. This bundle cites it for the sexagesimal time ladder and for precession handling in the later tradition.", "references/surya-siddhanta": "# S\u016brya Siddh\u0101nta\n\nThe S\u016brya Siddh\u0101nta, in its received form a text of the mid-first millennium CE with later revision, is the standard siddh\u0101nta of medieval Indian calendrics. Chapter 1 defines the ladder of time units (including the m\u016brta/am\u016brta distinction) and mean motions from epoch; chapter 2 derives true positions and the pa\u00f1c\u0101\u1e45ga quantities (tithi, nak\u1e63atra, yoga, kara\u1e47a); chapter 3 treats the gnomon, directions, and the motion of the equinoxes; chapters 4-5 compute lunar and solar eclipses from the nodes; chapter 14 treats the solar divisions of the year. Most pa\u00f1c\u0101\u1e45ga computation into the modern period descends from its methods, and this bundle cites it wherever the siddh\u0101ntic formulation carries the point."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
