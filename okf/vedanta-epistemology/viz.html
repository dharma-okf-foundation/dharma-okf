rest, the city-person encounters an animal and perceives its resemblance to a domestic cow. At that moment, the cognition arises: *\"This is what is called a gavaya.\"* That cognition \u2014 the recognition of what the name 'gavaya' refers to \u2014 is upam\u0101na.\n\n## Etymology\n\nFrom Sanskrit *upa* (near, secondary, resembling) + *m\u0101na* (knowing, measuring, from root *m\u0101*). Literally: knowing that which is near-to or resembles; knowledge through proximity-resemblance. The *upa-* prefix appears in words like *up\u0101ya* (near-way, means), *upani\u1e63ad* (sitting near), *upade\u015ba* (instruction given in proximity) \u2014 consistently marking closeness or secondary relation.\n\n## What Upam\u0101na Produces and Why It Is Not Inference\n\nThe upam\u0101na cognition produces one specific type of knowledge: **sa\u1e43j\u00f1\u0101-sa\u1e43j\u00f1i-sambandha-j\u00f1\u0101na** \u2014 knowledge of the relation between a name (*sa\u1e43j\u00f1\u0101*) and its referent (*sa\u1e43j\u00f1in*). In the gavaya example: the name 'gavaya' and the referent (this animal before me) are related. I now know what 'gavaya' names.\n\nThis is irreducible to:\n\n**Inference (anum\u0101na):** Anum\u0101na requires vy\u0101pti \u2014 invariable concomitance that has been independently established. In the gavaya case, there is no vy\u0101pti of the form \"wherever there is an animal resembling a cow, it is called a gavaya.\" The resemblance alone is not a vy\u0101pti-establishing mark; there is no general rule that animals resembling cows are gavalyas. What drives the cognition is the specific prior description combined with the specific current observation.\n\n**Perception (pratyak\u1e63a):** Perception gives me the animal's form, colour, and features \u2014 including its resemblance to a cow. But pratyak\u1e63a alone does not give me the knowledge \"this is what 'gavaya' refers to.\" The name-referent knowledge requires the prior description as a necessary component.\n\n**Verbal testimony (\u015babda):** The forester's description \"a gavaya looks like a cow\" provides the prior knowledge. But the upam\u0101na cognition itself arises later, in the forest, when the resemblance is perceived \u2014 not at the moment of hearing the description. \u015aabda delivers the description; upam\u0101na is the cognitive event of applying that description to a currently perceived resemblance.\n\nThe independence of upam\u0101na is established precisely by this gap: something new arises when the description meets the perception. That new cognitive event \u2014 the name-referent recognition \u2014 is the specific product of upam\u0101na.\n\n## School Positions on Upam\u0101na\n\nCross-dar\u015bana disagreement on upam\u0101na is sharp:\n\n**Ny\u0101ya:** Accepts upam\u0101na as the fourth independent pram\u0101\u1e47a. The Ny\u0101ya analysis focuses on the gavaya-type example and grounds the pram\u0101\u1e47a in the prior testimony plus current resemblance-perception.\n\n**M\u012bm\u0101\u1e43s\u0101:** Accepts upam\u0101na as independent. Kum\u0101rila Bha\u1e6d\u1e6da (\u015alokavarttika) defends it against reduction to inference. The M\u012bm\u0101\u1e43s\u0101 analysis is particularly concerned with establishing that upam\u0101na is not a subspecies of anum\u0101na.\n\n**Advaita Ved\u0101nta:** Accepts upam\u0101na, following the M\u012bm\u0101\u1e43s\u0101 position. Dharmar\u0101ja Adhvarin (Ved\u0101ntaparibh\u0101\u1e63\u0101) treats it as a genuine sixth pram\u0101\u1e47a (in the Advaita six-pram\u0101\u1e47a list, upam\u0101na is fourth). The Advaita interest in upam\u0101na is partly textual: certain Upani\u1e63adic passages use resemblance-language (*iva*, 'as it were') to describe Brahman \u2014 this generates hermeneutic questions that upam\u0101na-theory addresses.\n\n**S\u0101\u1e43khya-Yoga:** Reduces upam\u0101na to either inference or testimony; not accepted as independent in the Yoga S\u016btras' three-pram\u0101\u1e47a schema.\n\n**C\u0101rv\u0101ka:** Rejects all pram\u0101\u1e47as except pratyak\u1e63a; upam\u0101na is rejected as inference-dependent.\n\n**Advaita vs. Ny\u0101ya \u2014 Subtle Divergence:** Ny\u0101ya grounds upam\u0101na in the forester's testimony as a necessary prior component. Advaita (following M\u012bm\u0101\u1e43s\u0101) locates the upam\u0101na moment more precisely in the recognition-event in the forest: the cognition \"this resembles what was described\" is the functional basis, and the resulting knowledge \"this is called a gavaya\" is genuinely new rather than merely recalled. The distinction affects how upam\u0101na is bounded against \u015babda.\n\n## Upam\u0101na and Brahman-Knowledge\n\nUpam\u0101na is not a significant pram\u0101\u1e47a for Brahman-knowledge in Advaita. Brahman is beyond resemblance \u2014 there is no prior description of the form \"Brahman resembles X\" that could ground a resemblance-perception and produce name-referent knowledge. Upam\u0101na operates in the domain of perceptible worldly objects and their naming.\n\nWhere upam\u0101na enters Advaita hermeneutics: the Upani\u1e63ads use *iva* (\"as if,\" \"like\") constructions \u2014 \"Brahman appears *iva* (as if) with qualities.\" These *iva* usages are not upam\u0101na-as-pram\u0101\u1e47a; they are grammatical qualifications indicating appearance without asserting a genuine resemblance. The distinction between upam\u0101na (a pram\u0101\u1e47a for knowledge) and *iva*-constructions (grammatical devices) is maintained carefully in \u015aa\u1e45kara's commentaries.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 upam\u0101na is the fourth pram\u0101\u1e47a in the Advaita six-pram\u0101\u1e47a list\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 the perceptual component of upam\u0101na (the current resemblance-perception); necessary but not sufficient\n- [Anum\u0101na](anumana.md) \u2014 the pram\u0101\u1e47a most often confused with upam\u0101na; distinguished by vy\u0101pti-structure vs. description-plus-resemblance structure\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the prior description that is a necessary component of upam\u0101na; but the upam\u0101na cognition is distinct from the \u015babda cognition\n- [Arth\u0101patti](arthapatti.md) \u2014 the fifth pram\u0101\u1e47a; postulation; also frequently confused with inference\n\n## Audience Metaphor\n\nLike being told 'the new visiting professor looks like her more famous sibling' \u2014 then walking into the seminar room and immediately recognizing her without anyone pointing her out. The moment of recognition ('this is who they meant') is a distinct cognitive event: neither a recollection of what you were told, nor a fresh perception without that preparation, nor an inference. The told-resemblance and the seen-resemblance together produce a new unit of knowledge: the name-reference.\n\n## Citations\n\n1. [Tarkasa\u1e43graha](/references/tarkasangraha.md) \u00a7\u00a721\u201322 \u2014 Annambha\u1e6d\u1e6da's concise analysis of upam\u0101na and its classic example (gavaya recognition)\n2. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.4 \u2014 Dharmar\u0101ja Adhvarin's treatment of upam\u0101na as a genuine pram\u0101\u1e47a in Advaita\n3. Ny\u0101yadar\u015bana 1.1.6 \u2014 Gautama's definition of upam\u0101na as knowledge of a referent through resemblance to a known\n4. [\u015alokavarttika](/references/slokavarttika.md) \u2014 Kum\u0101rila Bha\u1e6d\u1e6da's M\u012bm\u0101\u1e43s\u0101 analysis of upam\u0101na and its difference from inference", "concepts/vivartavada": "# Vivartav\u0101da \u2014 \u0935\u093f\u0935\u0930\u094d\u0924\u0935\u093e\u0926\n\n**Not:** transformation theory, emanation, creation (ex nihilo), manifestation (New Age / perennialist usage), unfolding, illusion (as a sufficient translation)\n\nVivartav\u0101da is Advaita Ved\u0101nta's theory of how the world appears from Brahman \u2014 specifically, the claim that the world is an *appearance* (vivarta) of Brahman rather than a real transformation (pari\u1e47\u0101ma) of it. The cause (Brahman) remains entirely unchanged; the effect (the world) is not a real product but an apparent one \u2014 real at the vy\u0101vah\u0101rika level, but without independent p\u0101ram\u0101rthika existence.\n\nVivartav\u0101da is defined in direct contrast to pari\u1e47\u0101mav\u0101da (real-transformation theory, held by S\u0101\u1e43khya and Vi\u015bi\u1e63\u1e6d\u0101dvaita). Building these two files together is essential \u2014 vivartav\u0101da cannot be understood without understanding what it rejects. See [Pari\u1e47\u0101mav\u0101da](parinamavada.md).\n\n## The Rival Pair: Vivartav\u0101da vs. Pari\u1e47\u0101mav\u0101da\n\n| Feature | **Vivartav\u0101da** (Advaita) | **Pari\u1e47\u0101mav\u0101da** (S\u0101\u1e43khya / Vi\u015bi\u1e63\u1e6d\u0101dvaita) |\n|---------|--------------------------|----------------------------------------------|\n| **What the cause does** | Remains entirely unchanged | Actually transforms into the effect |\n| **What the effect is** | An appearance on the unchanged cause | A real, new modification of the cause |\n| **Paradigm example** | Rope \u2192 snake (snake is appearance only; rope unchanged) | Milk \u2192 curd (curd is real; milk-state is gone) |\n| **Causal status of world** | Mithy\u0101 (appearance on Brahman substratum) | P\u0101ram\u0101rthika / vy\u0101vah\u0101rika real (genuinely existent) |\n| **Can the cause be recovered?** | Yes \u2014 the rope is unchanged; the snake was never real | Not directly \u2014 curd cannot return to milk by cognition |\n| **Liberation mechanism** | Brahma-j\u00f1\u0101na reveals unchanged Brahman; world-appearance dissolves | Isolation of Puru\u1e63a from Prak\u1e5bti (S\u0101\u1e43khya-Yoga); realization of divine identity (Vi\u015bi\u1e63\u1e6d\u0101dvaita) |\n| **Primary proponent** | \u015aa\u1e45kara, Gau\u1e0dap\u0101da (Advaita) | \u012a\u015bvarak\u1e5b\u1e63\u1e47a (S\u0101\u1e43khya); R\u0101m\u0101nuja (brahma-pari\u1e47\u0101mav\u0101da) |\n\n## Etymology\n\nFrom Sanskrit *vivarta* (an appearance, turning around, reverting \u2014 from *vi* + *varta*, turning, from root *v\u1e5bt*, to turn, to exist) + *v\u0101da* (theory, thesis, position \u2014 from root *vad*, to speak). Literally: the theory of (mere) appearance or turning-around; the thesis that what appears to be produced is in fact only a turning or showing of what was already there.\n\nThe term *vivarta* contrasts with *pari\u1e47\u0101ma* (transformation, modification \u2014 from *pari* + *n\u0101ma*, from root *nam*, to bend, to change). Pari\u1e47\u0101ma implies actual change in the cause; vivarta implies only a change in *appearance* from the perceiver's side, with no actual change in the cause.\n\n## The Canonical Example: Rope and Snake\n\nThe rope-snake (rajju-sarpa) example is the standard pedagogical illustration of vivartav\u0101da:\n\n1. **Setup:** A coiled rope lies in dim light. An observer sees a snake.\n2. **The apparent causation:** It *seems* as though the rope produced or became a snake.\n3. **What actually happened:** The rope changed not at all. The snake-appearance arose from a cognitive error \u2014 the perceiver's memory of snake-form was superimposed on the rope (see adhyasa.md). The snake is an appearance *in* the rope, not a product *of* the rope.\n4. **The substratum:** The rope is the adhi\u1e63\u1e6dh\u0101na (substratum) of the snake-appearance. The snake depends on the rope; the rope does not depend on the snake.\n5. **Sublation:** Better light dissolves the snake-appearance immediately. The rope was never a snake. The rope emerges from the sublation entirely unchanged.\n6. **The analogy:** Brahman is the rope; the world is the snake. The world appears *in* Brahman without Brahman producing it, changing, or being modified. Liberation (brahma-j\u00f1\u0101na) dissolves the world-appearance the way better light dissolves the snake \u2014 revealing the unchanged Brahman.\n\nNote: the snake-rope analogy is a pr\u0101tibh\u0101sika-level illustration applied structurally to the vy\u0101vah\u0101rika-level relationship between Brahman and the world. The world is vy\u0101vah\u0101rika (not pr\u0101tibh\u0101sika) \u2014 it is not sublatable by mere attention or better perception, only by brahma-j\u00f1\u0101na. The *structure* of the causation (appearance without transformation) is what the analogy illustrates.\n\n## Why Advaita Requires Vivartav\u0101da\n\n\u015aa\u1e45kara's argument against pari\u1e47\u0101mav\u0101da applied to Brahman:\n\n**Premise 1:** Brahman is nirgu\u1e47a (without attributes/qualities) and nirvik\u0101ra (without modification).\n\n**Premise 2:** In real transformation (pari\u1e47\u0101ma), the cause undergoes actual modification \u2014 it changes its state (milk becomes curd; the milk-state is depleted).\n\n**Conclusion:** A nirgu\u1e47a, nirvik\u0101ra entity cannot be the subject of real transformation. If Brahman pari\u1e47\u0101med into the world, Brahman would have to undergo modification \u2014 which contradicts its very definition as unchanging, undivided, without qualities.\n\n**The liberation problem:** If Brahman had really transformed into the world (brahma-pari\u1e47\u0101mav\u0101da), there would be no pure, unchanged Brahman remaining to be realized. Liberation (the realization \"I am Brahman\") would have no object \u2014 the Brahman that was there before creation would no longer exist in its pure form. Vivartav\u0101da is the only cosmological theory compatible with Advaita's soteriology: there must be an unchanged p\u0101ram\u0101rthika Brahman available for the liberated j\u012bva to realize.\n\n## Gau\u1e0dap\u0101da's Aj\u0101tiv\u0101da\n\nGau\u1e0dap\u0101da's M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 3.27\u201328 takes vivartav\u0101da to its most radical form \u2014 *aj\u0101tiv\u0101da* (no-origination theory):\n\nFrom the p\u0101ram\u0101rthika standpoint, nothing is ever born, nothing is ever created, nothing originates at all. The appearance of origination (the world coming into existence) is itself part of the vivarta \u2014 it is not a real event, not a real temporal process. The question \"when did Brahman become the world?\" is as ill-formed as the question \"when did the rope become the snake?\"\n\nAj\u0101tiv\u0101da is more radical than vivartav\u0101da in the sense that it denies even the appearance of origination from the p\u0101ram\u0101rthika standpoint \u2014 it affirms only that Brahman is, and that what appears to be origination is not even a real appearance from the highest perspective. \u015aa\u1e45kara's formulation is somewhat less radical, maintaining the distinction between the p\u0101ram\u0101rthika and vy\u0101vah\u0101rika standpoints: from the vy\u0101vah\u0101rika standpoint, the appearance of the world is real as appearance; from the p\u0101ram\u0101rthika standpoint, only Brahman is.\n\n## Vivartav\u0101da and Mithy\u0101\n\nVivartav\u0101da is the cosmological application of mithy\u0101. If the world is mithy\u0101 (b\u0101dhyatva \u2014 sublatable while substratum persists), then its \"emergence\" from Brahman must be an appearance, not a real transformation. The two doctrines are mutually entailing:\n- If the world is mithy\u0101 \u2192 its causation must be vivarta (not pari\u1e47\u0101ma)\n- If the causation is vivarta \u2192 the world's status must be mithy\u0101 (not p\u0101ram\u0101rthika)\n\nThis is why vivartav\u0101da cannot be understood in isolation from mithy\u0101 (see mithya.md) and pari\u1e47\u0101mav\u0101da (its rival, see parinamavada.md). Together they constitute Advaita's ontological core.\n\n## Cross-References\n- [Pari\u1e47\u0101mav\u0101da](parinamavada.md) \u2014 the rival theory; must be built together with this file; S\u0101\u1e43khya's and Vi\u015bi\u1e63\u1e6d\u0101dvaita's real-transformation account\n- [Mithy\u0101](mithya.md) \u2014 the ontological status of the vivarta-world; mithy\u0101 and vivartav\u0101da are mutually entailing\n- [P\u0101ram\u0101rthika](paramarthika.md) \u2014 the level at which only Brahman exists; vivartav\u0101da is the explanation of how Brahman alone can be p\u0101ram\u0101rthika while a world appears\n- [Vy\u0101vah\u0101rika](vyavaharika.md) \u2014 the level at which the vivarta-world is real; vivartav\u0101da does not deny vy\u0101vah\u0101rika reality\n- [Pr\u0101tibh\u0101sika](pratibhasika.md) \u2014 the snake-rope example is pr\u0101tibh\u0101sika; the world is not pr\u0101tibh\u0101sika but vy\u0101vah\u0101rika; the snake illustrates the structure of vivarta, not the level of the world\n- [Adhy\u0101sa](adhyasa.md) \u2014 the cognitive mechanism that makes the vivarta-world appear; adhy\u0101sa is how the snake \"appears in\" the rope; adhy\u0101sa applied to Brahman-world is how the world \"appears in\" Brahman\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 the sublation that dissolves the vivarta-appearance; brahma-j\u00f1\u0101na is the b\u0101dha of the world's apparent independent reality\n\n## Audience Metaphor\n\nA rope lies coiled on the floor in dim light. You see a snake. The 'snake-causing' that happened \u2014 did the rope become a snake? No. The rope is entirely unchanged. The snake is an appearance that happened in your perception, not a product that the rope produced. The rope did not produce the snake, did not lose anything, did not change. The snake is real as an appearance (it scared you), but it is not a real product of the rope. Vivartav\u0101da says Brahman's relationship to the world is exactly this: the world appears in Brahman without Brahman producing it, losing anything, or changing in the slightest. This is why liberation is possible \u2014 there is an unchanged Brahman to realize. If Brahman had really become the world, there would be no pure Brahman left to realize.\n\n## Citations\n\n1. [M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101](/references/mandukya-karika.md) 3.27\u201328 (Gau\u1e0dap\u0101da) \u2014 aj\u0101tiv\u0101da (no-origination): from the p\u0101ram\u0101rthika standpoint, nothing is ever born, nothing is ever created; the appearance of origination is itself a vivarta; the most radical statement of the vivartav\u0101da position\n2. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.26\u201327 (\u015aa\u1e45kara) \u2014 explicit rejection of pari\u1e47\u0101mav\u0101da (S\u0101\u1e43khya-style real transformation) as applied to Brahman; argument: a nirgu\u1e47a, nirvik\u0101ra cause cannot undergo real modification; the effect must therefore be appearance (vivarta) not transformation\n3. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) v.108 (\u015aa\u1e45kara) \u2014 rope-snake as canonical vivarta illustration; the snake is not produced from the rope, it merely appears in the rope; rope is unchanged; this is the structural analog of Brahman-world", "concepts/vyavaharika": "# Vy\u0101vah\u0101rika \u2014 \u0935\u094d\u092f\u093e\u0935\u0939\u093e\u0930\u093f\u0915\n\n**Not:** conventional, pragmatic, phenomenal (Kantian), ordinary language, consensus reality, social construction\n\nVy\u0101vah\u0101rika is the conventional or transactional level of reality in Advaita Ved\u0101nta's three-level ontology \u2014 the level at which ordinary empirical experience occurs, at which the pram\u0101\u1e47as operate and produce valid knowledge, and at which all causality, natural law, social relation, and cognitive function are fully real. It is the primary level of the world's mithy\u0101 status: the world is not merely apparent (pr\u0101tibh\u0101sika) but genuinely operative within the empirical frame, and not absolutely real (p\u0101ram\u0101rthika) because its existence depends on Brahman as substratum.\n\nVy\u0101vah\u0101rika is the intermediate position in the three-level structure:\n\n| Level | Term | Status | Sublated by |\n|-------|------|---------|-------------|\n| Absolute | P\u0101ram\u0101rthika | Trik\u0101l\u0101b\u0101dhita (never sublated) | Nothing \u2014 uncancellable |\n| Empirical | **Vy\u0101vah\u0101rika** | **Real within its frame; sublated at liberation** | **Brahma-j\u00f1\u0101na** |\n| Apparent | Pr\u0101tibh\u0101sika | Real only from a deluded standpoint | Immediate corrective cognition |\n\n## Etymology\n\nFrom Sanskrit *vyavah\u0101ra* (transaction, everyday dealing, business, convention, practical usage \u2014 from *vi* + *ava* + root *h\u1e5b*, to carry out, to do) + suffix *-ika* (pertaining to, belonging to, connected with). Literally: that which pertains to or functions at the level of transactional dealing; the real of everyday practical engagement.\n\nThe term *vyavah\u0101ra* in Sanskrit carries connotations of business, legal transaction, social custom, and practical conduct \u2014 the actual world in which people live, trade, make contracts, bear children, and die. Vy\u0101vah\u0101rika captures this: the level at which practical engagement is meaningful, binding, and real.\n\n## What Is and Is Not Vy\u0101vah\u0101rika\n\nVy\u0101vah\u0101rika includes all of the following:\n- The natural world: fire, water, earth, air, space, bodies, birth, death\n- Causal laws: seed-sprout, action-result, cause-effect sequences\n- Social and moral relations: dharma, karma, karma-phala (fruits of action)\n- Mathematical and logical truths: the Pythagorean theorem is vy\u0101vah\u0101rika\n- The pram\u0101\u1e47as themselves and their results: pratyak\u1e63a, anum\u0101na, etc. operate at the vy\u0101vah\u0101rika level and produce valid vy\u0101vah\u0101rika knowledge\n- The teachings and instruments of Ved\u0101nta, including \u015aruti and the path of inquiry: these are vy\u0101vah\u0101rika instruments for the removal of adhy\u0101sa, which is itself a vy\u0101vah\u0101rika-level structure\n\nVy\u0101vah\u0101rika does NOT include:\n- The snake in the rope (that is pr\u0101tibh\u0101sika \u2014 apparent, not even intersubjectively consistent)\n- The sky-lotus or the son of a barren woman (those are asat \u2014 non-existent entirely)\n\n## The Key Distinguishing Feature: Intersubjective Consistency\n\nThe technical criterion separating vy\u0101vah\u0101rika from pr\u0101tibh\u0101sika is *intersubjective consistency* \u2014 what is vy\u0101vah\u0101rika is experienced consistently by all persons under the same conditions.\n\n- The rope is seen as a rope by everyone looking with adequate light: vy\u0101vah\u0101rika.\n- The snake is seen only by the person in poor lighting with the right prior conditioning: pr\u0101tibh\u0101sika.\n- The waking world's mountains, rivers, people, and buildings are experienced consistently across all observers: vy\u0101vah\u0101rika.\n- The dream-world's contents are accessible only to the dreamer: pr\u0101tibh\u0101sika.\n\nThis is why the Advaita answer to \"is the world an illusion?\" is always \"no\" \u2014 the world is vy\u0101vah\u0101rika (empirically real, intersubjectively consistent, causally operative), not pr\u0101tibh\u0101sika (apparent, subjective, immediately sublatable by corrective cognition). Calling the world \"an illusion\" collapses the vy\u0101vah\u0101rika/pr\u0101tibh\u0101sika distinction and produces exactly the misreading \u015aa\u1e45kara's framework is designed to prevent.\n\n## Vy\u0101vah\u0101rika and the Pram\u0101\u1e47as\n\nAll six pram\u0101\u1e47as (pratyak\u1e63a, anum\u0101na, upam\u0101na, arth\u0101patti, anupalabdhi, \u015babda) operate at the vy\u0101vah\u0101rika level. Their results are valid at that level \u2014 the knowledge they produce is ab\u0101dhita (uncontradicted) within the vy\u0101vah\u0101rika frame. The mithy\u0101tva of the world does not undermine this validity: the pot that pratyak\u1e63a establishes is genuinely there; the fire that anum\u0101na establishes from smoke is genuinely burning.\n\nWhat the pram\u0101\u1e47as cannot do is operate at the p\u0101ram\u0101rthika level to establish Brahman's nature \u2014 because their very operation presupposes a pram\u0101t\u0101 (knower) who is already at the vy\u0101vah\u0101rika level, already in adhy\u0101sa, already identifying consciousness with a mind-body complex. For p\u0101ram\u0101rthika knowledge, only \u015babda as apauru\u1e63eya \u015aruti can serve (see shabda-pramana.md and adhyasa.md).\n\n## Vy\u0101vah\u0101rika and Karma\n\nKarma (action and its fruits) operates entirely within the vy\u0101vah\u0101rika frame. The moral order \u2014 cause and effect in the ethical domain \u2014 is a vy\u0101vah\u0101rika reality. This means:\n\n1. Karma is real and binding for all beings who remain within the vy\u0101vah\u0101rika frame (i.e., all beings in adhy\u0101sa).\n2. Liberation (mok\u1e63a) removes the j\u012bva from the domain of karma not by destroying karma but by dissolving the adhy\u0101sic identification that made karma applicable \u2014 the j\u012bvanmukta's actions produce no new karma because there is no aha\u1e43k\u0101ra (ego) to be their agent.\n3. The teaching that \"karma is unreal because the world is mithy\u0101\" is a misread: mithy\u0101 does not mean karma is inoperative; it means karma is operative within a frame whose ultimate status is dependent on Brahman.\n\n## The Sublation Event\n\nVy\u0101vah\u0101rika reality is sublated by brahma-j\u00f1\u0101na (direct realization of Brahman as the only reality). This sublation is not phenomenological \u2014 the j\u012bvanmukta continues to experience the empirical world, continues to feel hunger and see mountains. What is sublated is the *aha\u1e43k\u0101ric identification* \u2014 the \"I am this body-mind\" claim that made the vy\u0101vah\u0101rika world appear as independently real.\n\nThe technical term: *b\u0101dha* (sublation \u2014 see badha-badhita.md). The world is *b\u0101dhita* by brahma-j\u00f1\u0101na \u2014 not destroyed, not made to disappear, but cognized as mithy\u0101 \u2014 dependent on Brahman, without independent standing.\n\n## Cross-References\n- [Mithy\u0101](mithya.md) \u2014 the ontological status of which vy\u0101vah\u0101rika is the primary level; the world is mithy\u0101 precisely because it is vy\u0101vah\u0101rika rather than p\u0101ram\u0101rthika\n- [P\u0101ram\u0101rthika](paramarthika.md) \u2014 the absolute level; what vy\u0101vah\u0101rika is not; Brahman alone\n- [Pr\u0101tibh\u0101sika](pratibhasika.md) \u2014 the apparent level; lower than vy\u0101vah\u0101rika; the snake in the rope, the dream-world\n- [Pram\u0101\u1e47a](pramana.md) \u2014 all pram\u0101\u1e47as operate at the vy\u0101vah\u0101rika level; their validity is real within this frame\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 the sublation of the vy\u0101vah\u0101rika frame by brahma-j\u00f1\u0101na\n- [Adhy\u0101sa](adhyasa.md) \u2014 the structural superimposition that makes the vy\u0101vah\u0101rika appear as independently real rather than as Brahman's dependent appearance\n\n## Audience Metaphor\n\nLike the operating rules of a dream that, from within the dream, are completely binding \u2014 if you jump off a building in the dream, you fall. Fire burns. Cause and effect hold. From within the dream, these are not optional or 'merely conventional.' They are real in every sense that matters for navigation. But they are not real the way the sleeping consciousness is real. Vy\u0101vah\u0101rika is exactly that: real in every sense that matters for navigation, but not real in the deepest sense. The analogy breaks in one direction: we cannot 'wake up' from the vy\u0101vah\u0101rika world by a simple act of attention \u2014 only brahma-j\u00f1\u0101na dissolves its ultimate status, and even then the body lives on.\n\n## Citations\n\n1. [M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101](/references/mandukya-karika.md) 2.16 (Gau\u1e0dap\u0101da) \u2014 the empirical world as consistently experienced in waking state; the vy\u0101vah\u0101rika-pr\u0101tibh\u0101sika distinction via waking-dream comparison\n2. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.7\u20138 (Vidy\u0101ra\u1e47ya) \u2014 formal statement of the three-level ontology; vy\u0101vah\u0101rika as real within its frame, sublated at liberation\n3. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.14 (\u015aa\u1e45kara) \u2014 anirvacan\u012bya (indescribable-as-sat-or-asat) status of the empirical world; why this avoids both nihilism and naive realism", "references/advaitasiddhi": "# Advaitasiddhi (Madhus\u016bdana Sarasvat\u012b)\n\n## What It Is\n\nMadhus\u016bdana's defense of Advaita; absence-cognition and the reality-levels.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/aparokshanubhuti": "# Aparok\u1e63\u0101nubh\u016bti (\u015aa\u1e45kara)\n\n## What It Is\n\nShort prakara\u1e47a attributed to \u015aa\u1e45kara; aparok\u1e63a-anubh\u016bti as the liberating direct recognition.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/brahmasutra-bhasya": "# Brahmas\u016btra Bh\u0101\u1e63ya (\u015aa\u1e45kara)\n\n## What It Is\n\n\u015aa\u1e45kara's commentary on the Brahma S\u016btras; the foundational Advaita text, opening with the Adhy\u0101sa-bh\u0101\u1e63ya.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/mandukya-karika": "# M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 (Gau\u1e0dap\u0101da)\n\n## What It Is\n\nGau\u1e0dap\u0101da's k\u0101rik\u0101 on the M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad; aj\u0101tiv\u0101da and the levels of reality.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/mimamsa-sutra": "# M\u012bm\u0101\u1e43s\u0101 S\u016btra (Jaimini)\n\n## What It Is\n\nJaimini's root text of P\u016brva-M\u012bm\u0101\u1e43s\u0101; the source of apauru\u1e63eyatva and svata\u1e25pr\u0101m\u0101\u1e47ya.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/mundaka-upanishad": "# Mu\u1e47\u1e0daka Upani\u1e63ad\n\n## What It Is\n\nAn Atharvaveda Upani\u1e63ad; 'the knower of Brahman becomes Brahman' (3.2.9).\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/nyaya-bhasya": "# Ny\u0101ya Bh\u0101\u1e63ya (V\u0101tsy\u0101yana)\n\n## What It Is\n\nV\u0101tsy\u0101yana's commentary on the Ny\u0101ya S\u016btras; the nirvikalpaka/savikalpaka exposition.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/nyaya-sutra": "# Ny\u0101ya S\u016btra (Gautama)\n\n## What It Is\n\nGautama's root text of the Ny\u0101ya dar\u015bana; the canonical definitions of the pram\u0101\u1e47as.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/nyayakusumanjali": "# Ny\u0101yakusum\u0101\u00f1jali (Udayana)\n\n## What It Is\n\nUdayana's Ny\u0101ya work; the argument for \u012a\u015bvara as the supreme \u0101pta.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/panchadashi": "# Pa\u00f1cada\u015b\u012b (Vidy\u0101ra\u1e47ya)\n\n## What It Is\n\nVidy\u0101ra\u1e47ya's verse manual of Advaita; the three-level ontology and the two powers of avidy\u0101.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/samkhya-karika": "# S\u0101\u1e43khya K\u0101rik\u0101 (\u012a\u015bvarak\u1e5b\u1e63\u1e47a)\n\n## What It Is\n\n\u012a\u015bvarak\u1e5b\u1e63\u1e47a's classical S\u0101\u1e43khya text; satk\u0101ryav\u0101da and pari\u1e47\u0101mav\u0101da.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/slokavarttika": "# \u015alokav\u0101rttika (Kum\u0101rila Bha\u1e6d\u1e6da)\n\n## What It Is\n\nKum\u0101rila's M\u012bm\u0101\u1e43s\u0101 work; arth\u0101patti, anupalabdhi, and svata\u1e25pr\u0101m\u0101\u1e47ya.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/taittiriya-upanishad": "# Taittir\u012bya Upani\u1e63ad\n\n## What It Is\n\nA Yajurveda Upani\u1e63ad; Brahman as Sat-Chit-\u0100nanda and the pa\u00f1cako\u015ba.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/tarkasangraha": "# Tarkasa\u1e43graha (Annambha\u1e6d\u1e6da)\n\n## What It Is\n\nAnnambha\u1e6d\u1e6da's primer of Ny\u0101ya-Vai\u015be\u1e63ika logic and epistemology.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/tattvabodha": "# Tattvabodha (\u015aa\u1e45kara)\n\n## What It Is\n\nIntroductory Advaita primer attributed to \u015aa\u1e45kara; the pram\u0101\u1e47a-triad.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/upadeshasahasri": "# Upade\u015bas\u0101hasr\u012b (\u015aa\u1e45kara)\n\n## What It Is\n\n\u015aa\u1e45kara's independent Advaita treatise; the guru-\u015bi\u1e63ya transmission of brahma-j\u00f1\u0101na.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/vedantaparibhasha": "# Ved\u0101ntaparibh\u0101\u1e63\u0101 (Dharmar\u0101ja Adhvarin)\n\n## What It Is\n\nDharmar\u0101ja Adhvarin's systematic manual of Advaita epistemology \u2014 the pram\u0101\u1e47as in the Advaita frame.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/vedantasara": "# Ved\u0101ntas\u0101ra (Sad\u0101nanda)\n\n## What It Is\n\nSad\u0101nanda's concise Advaita primer; the standard definition of mithy\u0101tva as traik\u0101lika-b\u0101dha.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle.", "references/vivekachudamani": "# Vivekac\u016b\u1e0d\u0101ma\u1e47i\n\n## What It Is\n\nAdvaita prakara\u1e47a attributed to \u015aa\u1e45kara on discrimination (viveka) and \u0100tman-Brahman identity.\n\n## Why It Matters Here\n\nCited across the vedanta-epistemology bundle."}, "types": ["Concept", <script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
