\u00f1jala Yoga)\n\nThe terms **nirvikalpaka** and **savikalpaka** designate two stages or modes of pratyak\u1e63a (direct perception) that Indian epistemologists \u2014 especially in the Ny\u0101ya tradition \u2014 distinguish within a single perceptual event. Together they address the question: does all perceptual cognition arrive pre-packaged with conceptual structure (names, kinds, qualities, relations), or is there a prior, pre-structural moment of contact from which the conceptual cognition is built?\n\n- **Nirvikalpaka** (from *nir-* [without] + *vi-* [apart, differentiated] + *kalpa* [construction, conceptual form]) \u2014 **indeterminate perception**: the initial, pre-classificatory moment of perceptual contact in which the object is cognized in its pure particularity, without the overlay of name, kind, quality, or relational structure.\n- **Savikalpaka** (from *sa-* [with] + same root) \u2014 **determinate perception**: the fully articulated, conceptually structured perceptual cognition in which the object is cognized as \"this is a cow,\" \"this is white,\" \"this has dewlap and horns\" \u2014 with name, kind, quality, and relations.\n\n## The Epistemological Problem\n\nEvery ordinary perceptual cognition arrives with conceptual structure. We do not typically see a shapeless this; we see a cow, a red wall, a tall man. Conceptual structure (names, kinds, qualities) is already present in the cognition as we are aware of it.\n\nBut: conceptual structure requires that the mind already possess the relevant universals (j\u0101ti \u2014 cow-ness, redness) and has applied them to the object. This application \u2014 a cognitive act \u2014 must have an input: the object as it is prior to conceptual application. What is that input?\n\nNy\u0101ya posits **nirvikalpaka** as the answer: the object is cognized in its pure particularity (svalak\u1e63a\u1e47a \u2014 its unique individual character) at a moment prior to conceptual application. The senses are in contact with this particular object; the initial cognition grasps it without any j\u0101ti-overlaid. Then, in savikalpaka, the buddhi applies the stored universals (from previous experience + sa\u1e43sk\u0101ra) to form the determinate cognition.\n\n## The Ny\u0101ya Account\n\nThe Ny\u0101yas\u016btra 1.1.4 defines pratyak\u1e63a as:\n\n> *indriy\u0101rthasannikar\u1e63otpanna\u1e43 j\u00f1\u0101nam avyapade\u015byam avyabhic\u0101ri vyavas\u0101y\u0101tmakam pratyak\u1e63am*\n\n\"Cognition produced from sense-organ-object contact, which is non-verbal (*avyapade\u015byam*), non-errant (*avyabhic\u0101ri*), and of the nature of determination (*vyavas\u0101y\u0101tmaka*), is direct perception.\"\n\nCommentators use this definition to anchor the distinction:\n\n| Feature | **Nirvikalpaka** | **Savikalpaka** |\n|---------|-----------------|-----------------|\n| **Cognitive content** | The object's pure particularity (*svalak\u1e63a\u1e47a*) | Object + universal (*j\u0101ti*) + quality (*gu\u1e47a*) + name (*n\u0101ma*) |\n| **Linguistic expressibility** | Ineffable (*avyapade\u015bya*) \u2014 cannot be verbalized | Verbal \u2014 can be expressed in sentences |\n| **Recallability** | Cannot be independently recalled (no word-hook) | Recalled as \"I saw a cow\" |\n| **Epistemic role** | Foundation for savikalpaka; guarantees the object is \"this particular\" | Full perceptual cognition as experienced |\n| **Correspondence to NS 1.1.4** | The *avyapade\u015byam* (non-verbal) aspect | The *vyavas\u0101y\u0101tmaka* (determinate) aspect |\n| **Ny\u0101ya validity** | Valid cognition (real pram\u0101) | Valid cognition (real pram\u0101) |\n\nBoth stages are **valid pram\u0101\u1e47as** within Ny\u0101ya \u2014 nirvikalpaka is not mere noise; it is the epistemically real but cognitively recessive contact that grounds the savikalpaka which follows.\n\n## Jayanta's Defense of Nirvikalpaka\n\nJayanta Bha\u1e6d\u1e6da (9th century, Ny\u0101yama\u00f1jar\u012b) offers the strongest Ny\u0101ya defense of nirvikalpaka against the M\u012bm\u0101\u1e43s\u0101 challenge. His argument:\n\n1. When we recognize a previously seen particular object \u2014 say, a specific pot \u2014 we recognize it *as the very same pot*, not merely as *a pot*. This \"very same\" recognition requires that in the original perception, the object was cognized as this individual particular, not merely as a cow- or pot-instance.\n2. If original perception were savikalpaka all the way down \u2014 if it only cognized the object as a token of a type \u2014 there would be no ground for individual-recognition (re-identification of particulars).\n3. Therefore, there must be a stage of perception that grasps the particular as such, prior to type-classification. This is nirvikalpaka.\n\n## The M\u012bm\u0101\u1e43s\u0101 Objection\n\n**Prabh\u0101kara's school** disputes nirvikalpaka's status as a separate pram\u0101\u1e47a. The argument:\n- We cannot recall nirvikalpaka cognition separately. When we remember a perceptual event, we remember savikalpaka content (\"I saw a cow\"). There is no memorial residue of the prior nirvikalpaka stage.\n- A cognition that leaves no trace and cannot be recalled cannot be confirmed as having occurred.\n- Therefore, positing nirvikalpaka as a separate cognitive stage is unnecessary. What Ny\u0101ya calls nirvikalpaka may simply be savikalpaka at a very rapid, non-noticed stage of processing.\n\n**The Ny\u0101ya response:** The inability to recall nirvikalpaka separately does not prove it did not occur. Recall operates on verbally tagged cognitions (name-kind structure provides the hook for memory). Nirvikalpaka, being ineffable, has no such hook \u2014 but this epistemic recessiveness is a consequence of its pre-verbal character, not evidence against its occurrence. The savikalpaka itself requires that the particular was already available, which implies the nirvikalpaka contact.\n\n## The Buddhist Alternative (Dign\u0101ga-Dharmak\u012brti)\n\nThe Dign\u0101ga-Dharmak\u012brti school draws a cognate distinction but with a different architectural consequence. Dign\u0101ga defines pratyak\u1e63a as *kalpan\u0101po\u1e0dha* \u2014 free from conceptual construction (kalpan\u0101). What is kalpan\u0101? The import of names and universals. Pure pratyak\u1e63a grasps only the svalak\u1e63a\u1e47a (unique momentary particular); any cognition that involves names, kinds, or universals is kalpan\u0101 \u2014 and kalpan\u0101, for Dign\u0101ga, falls under **anum\u0101na** (inference-like conceptual cognition), not pratyak\u1e63a.\n\n| | **Ny\u0101ya Position** | **Dign\u0101ga-Dharmak\u012brti Position** |\n|--|-------------------|----------------------------------|\n| Nirvikalpaka | Valid pratyak\u1e63a | True pratyak\u1e63a (their *kalpan\u0101po\u1e0dha*) |\n| Savikalpaka | Valid pratyak\u1e63a | Not pratyak\u1e63a \u2014 conceptual/inference-like (*kalpan\u0101*) |\n| Object of pure pratyak\u1e63a | Svalak\u1e63a\u1e47a (particular) | Svalak\u1e63a\u1e47a (momentary particular) |\n| Object of savikalpaka/kalpan\u0101 | S\u0101m\u0101nyalak\u1e63a\u1e47a (universal) | S\u0101m\u0101nyalak\u1e63a\u1e47a |\n\nFor Ny\u0101ya, savikalpaka remains **pratyak\u1e63a** \u2014 its conceptual structure is added to a perceptual cognition, not separable from it into a different pram\u0101\u1e47a. For the Buddhist school, the conceptual overlay is precisely what places savikalpaka-type cognition outside the pram\u0101\u1e47a-scope of pratyak\u1e63a.\n\nThis is one of the classical debates in Indian epistemology: is a perceptual cognition still pratyak\u1e63a when it is conceptually structured, or does conceptual structure necessarily move cognition into the anum\u0101na domain?\n\n## Advaita Application: Nirvikalpa Quality of Brahma-J\u00f1\u0101na\n\nAdvaita Ved\u0101nta appropriates the nirvikalpaka/savikalpaka distinction to characterize the epistemic quality of brahma-j\u00f1\u0101na (aparok\u1e63a-anubh\u016bti \u2014 see aparoksha-anubhuti.md). The key claim: the realization \"aham brahm\u0101smi\" (I am Brahman) or the recognition of \u0101tman-Brahman identity in \"tat tvam asi\" does not have the savikalpaka form \"\u0101tman is such-and-such\" (predication of a property to a subject). It has the nirvikalpa form \u2014 direct, non-predicative, not structured by the subject-object or subject-predicate split.\n\nWhy nirvikalpa?\n- A savikalpaka cognition maintains the subject-object structure: a subject (pram\u0101t\u1e5b) predicates a property of an object (prameya). But Brahman-as-\u0101tman is not an object \u2014 it is the cognizer's own nature (svaya\u1e43prak\u0101\u015ba, self-luminous). A savikalpaka \"Brahman is X\" still treats Brahman as an object of predication.\n- Aparok\u1e63a-anubh\u016bti is the recognition that dissolves the very subject-object structure. This dissolution cannot take the form of a savikalpaka cognition, which inherits that structure.\n- Hence Vivekac\u016b\u1e0d\u0101ma\u1e47i and Pa\u00f1cada\u015b\u012b describe brahma-j\u00f1\u0101na as *nirvikalpa* \u2014 not because it is empty, but because it is without the conceptual differentiation that separates knower from known.\n\n**Advaita's nirvikalpa brahma-j\u00f1\u0101na vs. Ny\u0101ya's nirvikalpaka pratyak\u1e63a:**\n\n| | Ny\u0101ya Nirvikalpaka | Advaita Nirvikalpa Brahma-j\u00f1\u0101na |\n|--|-------------------|----------------------------------|\n| Object | External particular (pot, cow) | \u0101tman = Brahman (the subject's own nature) |\n| Subject-object structure | Maintained (perceiver perceives) | Dissolved in the recognition |\n| Status | Foundation for savikalpaka pratyak\u1e63a | Does not give rise to a savikalpaka overlay \u2014 it is the terminus |\n| Occasion | Every perceptual event | The event of aparok\u1e63a-anubh\u016bti |\n| Result | Ordinary valid cognition (pram\u0101) | Mok\u1e63a (liberation from sa\u1e43s\u0101ra) |\n\nThe Advaita use is analogical: \"nirvikalpa\" indicates the absence of the subject-predicate, knower-known structure \u2014 but the concept is transposed from the theory of ordinary perception to the theory of liberation-knowledge.\n\n## Cross-References\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 direct perception; nirvikalpaka and savikalpaka are the two stages of pratyak\u1e63a as analyzed in Ny\u0101ya; the whole account belongs within the pratyak\u1e63a pram\u0101\u1e47a\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the epistemological framework; the question of whether nirvikalpaka is a distinct pram\u0101\u1e47a (Ny\u0101ya: yes, as the foundation of savikalpaka pratyak\u1e63a; Buddhist: yes, as the only true pratyak\u1e63a; Prabh\u0101kara-M\u012bm\u0101\u1e43s\u0101: disputed) is a central debate\n- [Pram\u0101](prama.md) \u2014 veridical cognition; both nirvikalpaka and savikalpaka are pram\u0101s in the Ny\u0101ya account (valid, object-corresponding, non-sublated cognitions)\n- [Anum\u0101na](anumana.md) \u2014 inference; the Buddhist debate about whether savikalpaka cognition is really inference-like (kalpan\u0101-laden) rather than genuine pratyak\u1e63a\n- [Aparok\u1e63a-anubh\u016bti](aparoksha-anubhuti.md) \u2014 the Advaita application of the nirvikalpa concept to describe brahma-j\u00f1\u0101na's non-predicative, non-conceptually-structured character\n- [Spho\u1e6da](sphota.md) \u2014 the Bhart\u1e5bhari philosophy of language has a related distinction: pratibh\u0101 (the flash of sentential meaning) is immediate and whole rather than built up compositionally, which parallels the nirvikalpaka character of direct apprehension vs. the compositional character of savikalpaka/explicit articulation\n\n## Audience Metaphor\n\nConsider how you might hear a voice and immediately know 'that's my friend Priya' \u2014 the recognition is instantaneous, felt rather than reasoned, and happens before you could articulate why or how you recognized her. That moment of pure recognition, before you say to yourself 'that voice has those specific characteristics that mark it as Priya's' \u2014 that's something like nirvikalpaka. When you then articulate 'yes, that's Priya, her voice is distinctive in these ways' \u2014 that's something like savikalpaka. The recognition happened before the articulation; the articulation is the cognition made explicit and verbal. Nirvikalpaka is what the savikalpaka rests on.\n\n## Citations\n\n1. [Ny\u0101yas\u016btra](/references/nyaya-sutra.md) 1.1.4 \u2014 the foundational definition of pratyak\u1e63a, cited above; the avyapade\u015byam [non-verbal] character of pratyak\u1e63a in this definition is glossed by commentators as pointing to the nirvikalpaka stage as the true perceptual core; 'vyavas\u0101y\u0101tmaka' [determinate] points to the savikalpaka stage\n2. V\u0101tsy\u0101yana's [Ny\u0101yabh\u0101\u1e63ya](/references/nyaya-bhasya.md) on NS 1.1.4 \u2014 nirvikalpaka defined as the initial cognition arising at the moment of sense-object contact; it grasps the object without imposing any name or kind; savikalpaka is the subsequent articulate cognition 'this is a cow' or 'this is white'\n3. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b 1 \u2014 extended defense of nirvikalpaka as a genuine pram\u0101\u1e47a against M\u012bm\u0101\u1e43s\u0101 objections; argues that nirvikalpaka must be real because savikalpaka presupposes a prior contact with the object's particularity; one cannot recognize a previously seen particular unless one had first cognized it as a particular (not merely as a cow-instance)\n4. Dign\u0101ga, Pram\u0101\u1e47asamuccaya 1.3 \u2014 kalpan\u0101po\u1e0dham abhyanta\u1e43 pratyak\u1e63am \u2014 pratyak\u1e63a is that which is free from conceptual construction (kalpan\u0101); this is the Buddhist version; for Dign\u0101ga, kalpan\u0101 (conceptual construction) imports names (n\u0101ma) and kinds (j\u0101ti); pure pratyak\u1e63a grasps the svalak\u1e63a\u1e47a without any such import; what Ny\u0101ya calls savikalpaka would not be pratyak\u1e63a for Dign\u0101ga but would be kalpan\u0101-tainted\n5. Dharmak\u012brti, Ny\u0101yabindu 1.14 \u2014 the svalak\u1e63a\u1e47a (unique particular, momentary) is the proper object of pratyak\u1e63a; the s\u0101m\u0101nyalak\u1e63a\u1e47a (universal characteristic) is the object of anum\u0101na; this svalak\u1e63a\u1e47a/s\u0101m\u0101nyalak\u1e63a\u1e47a distinction parallels Ny\u0101ya's nirvikalpaka/savikalpaka but within a very different ontological framework (Buddhist momentariness vs. Ny\u0101ya substance-quality ontology)\n6. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv. 373\u2013378 (\u015aa\u1e45kara attr.) \u2014 the \u0101tmaj\u00f1\u0101na (self-knowledge) that constitutes brahma-j\u00f1\u0101na is of the nirvikalpa type: it is not of the form 'I am Brahman' in the sense of predicating a property of a subject (which would be savikalpaka) but the direct recognition without subject-predicate structure", "concepts/paramarthika": "# P\u0101ram\u0101rthika \u2014 \u092a\u093e\u0930\u092e\u093e\u0930\u094d\u0925\u093f\u0915\n\n**Not:** transcendental (Kantian), metaphysical (analytic philosophy usage), supernatural, noumenal (Kantian), absolute idealism (Hegel), ground of being (Tillich), ultimate reality (generic)\n\nP\u0101ram\u0101rthika is the level of absolute, ultimate reality in Advaita Ved\u0101nta's three-level ontology \u2014 the level at which only Brahman exists, unsublatable at any time, in any state, by any cognition. It is not one level among three in a graduated hierarchy where all three have some kind of real existence; it is the only level that is genuinely, unconditionally real. The vy\u0101vah\u0101rika and pr\u0101tibh\u0101sika levels have their reality from it and depend on it \u2014 they are mithy\u0101, dependent appearances on the p\u0101ram\u0101rthika substratum.\n\nThe three-level structure:\n\n| Level | Term | What exists here | Criterion |\n|-------|------|-----------------|-----------|\n| Absolute | **P\u0101ram\u0101rthika** | **Brahman alone (Sat-Cit-\u0100nanda)** | **Trik\u0101l\u0101b\u0101dhita \u2014 unsublatable in all three times** |\n| Empirical | Vy\u0101vah\u0101rika | The world, j\u012bvas, pram\u0101\u1e47as | Real within its frame; sublated by brahma-j\u00f1\u0101na |\n| Apparent | Pr\u0101tibh\u0101sika | Snake-in-rope, dream-objects | Real only to the deluded observer; immediately sublatable |\n\n## Etymology\n\nFrom Sanskrit *parama* (highest, ultimate, supreme \u2014 superlative from *para*, far, other, beyond) + *artha* (meaning, purpose, object, end) + suffix *-ika* (pertaining to, of). Literally: pertaining to the highest meaning or the highest object; of the ultimate purpose or end. In the philosophical context: the level that is real in the most ultimate, final, and unconditional sense \u2014 the level of the highest artha.\n\n*Artha* in the tradition also carries the sense of \"that which is cognized\" \u2014 the object-side of cognition. P\u0101ram\u0101rthika is therefore also: the real as cognized at the ultimate level, by the ultimate mode of cognition (not pram\u0101\u1e47a-based, but self-revealing).\n\n## The Defining Criterion: Trik\u0101l\u0101b\u0101dhita\n\nThe technical criterion for p\u0101ram\u0101rthika status is *trik\u0101l\u0101b\u0101dhita*: that which is uncancellable (ab\u0101dhita) at all three times \u2014 past, present, future. What cannot be sublated in any possible state of cognition is p\u0101ram\u0101rthika.\n\nIn Advaita, only Brahman satisfies this criterion:\n- In the waking state: Brahman (as witness-consciousness) is present.\n- In the dream state: Brahman (as consciousness) is what the dream appears in.\n- In deep sleep (su\u1e63upti): the individual appearance dissolves; only Brahman persists.\n- After liberation: the world's apparent reality is sublated; Brahman remains.\n- Before creation (in the cosmological analysis): Brahman alone exists.\n\nNo sublating cognition is possible that would cancel Brahman's existence. Even the sublation of the dream by waking \u2014 which cancels all dream-objects \u2014 does not cancel the consciousness that was dreaming. At every level of sublation, Brahman (consciousness, sat) is what remains.\n\nContrast: the world (vy\u0101vah\u0101rika) is sublated by brahma-j\u00f1\u0101na; the snake-in-rope (pr\u0101tibh\u0101sika) is sublated by corrective perception; the sky-lotus (asat) was never even sublated because it never appeared. Only Brahman survives all possible sublations \u2014 trik\u0101l\u0101b\u0101dhita.\n\n## What P\u0101ram\u0101rthika Does Not Mean\n\nThe most common AI-generated errors when translating p\u0101ram\u0101rthika:\n\n**It does not mean \"the highest level in a range\":** Saying p\u0101ram\u0101rthika is \"the most real\" or \"higher on the reality scale\" implies a continuum of reality. Advaita's position is more radical: only the p\u0101ram\u0101rthika is real in an absolute sense; the others are mithy\u0101 (dependent) and asat (non-existent). It is not a matter of degree but of an unbridgeable ontological distinction.\n\n**It does not mean God in the theistic sense:** Brahman is p\u0101ram\u0101rthika; \u012a\u015bvara (Brahman with attributes, the personal God, the creator) is not strictly p\u0101ram\u0101rthika from the ultimate standpoint \u2014 \u012a\u015bvara involves the superimposition of the power of m\u0101y\u0101 on Brahman; from the p\u0101ram\u0101rthika viewpoint, even \u012a\u015bvara is within the vy\u0101vah\u0101rika frame. This is one of the most counterintuitive features of Advaita from a theistic perspective, and the source of much inter-Ved\u0101nta disagreement.\n\n**It does not mean unknowable:** Unlike Kant's noumena, p\u0101ram\u0101rthika Brahman is *svaya\u1e43prak\u0101\u015ba* \u2014 self-luminous, self-revealing. Brahman is not revealed by an instrument (pram\u0101\u1e47a) operating on it from outside; it is the very consciousness in which all pram\u0101\u1e47a results appear. The Mah\u0101v\u0101kyas of \u015aruti (tat tvam asi \u2014 you are that; aham brahm\u0101smi \u2014 I am Brahman) do not generate inferential knowledge of a hidden object; they remove the adhy\u0101sa that conceals what was already, always, self-evidently present.\n\n## P\u0101ram\u0101rthika and the Pram\u0101\u1e47as\n\nNo pram\u0101\u1e47a directly establishes Brahman as p\u0101ram\u0101rthika through ordinary cognition \u2014 because all pram\u0101\u1e47as operate within the vy\u0101vah\u0101rika frame, presupposing a pram\u0101t\u0101 (knower), a pram\u0101\u1e47a (instrument), and a prameya (object). This tripartite structure is itself vy\u0101vah\u0101rika. To cognize the p\u0101ram\u0101rthika via this structure would require treating Brahman as an object, which it is not.\n\nThe path to p\u0101ram\u0101rthika knowledge is via *\u015babda* as apauru\u1e63eya \u015aruti \u2014 Vedic Mah\u0101v\u0101kyas that function not by generating a new cognition but by removing the adhy\u0101sa that obscures what is already self-evident. The Mah\u0101v\u0101kya does not produce brahma-j\u00f1\u0101na in the way anum\u0101na produces inferential knowledge of fire from smoke; it removes the obstructing ignorance (avidy\u0101 / adhy\u0101sa), leaving Brahman's self-luminous reality apparent. This is why the result is called *aparok\u1e63\u0101nubh\u016bti* (direct, non-mediated realization) rather than any of the standard pram\u0101\u1e47a-results.\n\n## P\u0101ram\u0101rthika and Nirgu\u1e47a Brahman\n\nIn Advaita, the p\u0101ram\u0101rthika level is occupied exclusively by *nirgu\u1e47a Brahman* \u2014 Brahman without attributes (gu\u1e47as). Sagu\u1e47a Brahman (Brahman with attributes \u2014 omniscience, omnipotence, the creator \u012a\u015bvara) belongs to the vy\u0101vah\u0101rika frame. The attributes (omniscience, creativity, compassion) presuppose a world of which they are attributes \u2014 they are relational, and relationality belongs to the vy\u0101vah\u0101rika level.\n\nThis is expressed in the Vivekac\u016b\u1e0d\u0101ma\u1e47i mah\u0101v\u0101kya paraphrase: *brahma satya\u1e43* \u2014 Brahman (nirgu\u1e47a) is *satyam* (real, p\u0101ram\u0101rthika). Not \"God\" in the theistic, volitional sense, not the creator, but the undivided sat-cit-\u0101nanda \u2014 existence, consciousness, bliss \u2014 which appears to become the world through vivartav\u0101da (appearance-causation) without actually undergoing transformation.\n\n## P\u0101ram\u0101rthika and Liberation\n\nMok\u1e63a (liberation) in Advaita is the recognition \u2014 not the attainment \u2014 of what is already p\u0101ram\u0101rthika. The j\u012bva does not become p\u0101ram\u0101rthika at liberation; it recognizes that it was never other than Brahman. Sa\u1e43s\u0101ra is the vy\u0101vah\u0101rika appearance of Brahman as many j\u012bvas in a world; mok\u1e63a is the recognition of the p\u0101ram\u0101rthika unity underlying that appearance.\n\nThe j\u012bvanmukta (liberated while living) continues to function in the vy\u0101vah\u0101rika world \u2014 the body eats, the mind thinks, the eyes see. But the identification with the vy\u0101vah\u0101rika (the \"I am this body-mind\" adhy\u0101sa) is dissolved. From the p\u0101ram\u0101rthika standpoint, there are not, and were not, any j\u012bvas \u2014 *j\u012bvo brahmaiva n\u0101para\u1e25* (the j\u012bva is Brahman alone, nothing else \u2014 Vivekac\u016b\u1e0d\u0101ma\u1e47i v.20c).\n\n## Cross-References\n- [Mithy\u0101](mithya.md) \u2014 the ontological status (neither-sat-nor-asat) of what is vy\u0101vah\u0101rika and pr\u0101tibh\u0101sika; mithy\u0101 is defined in contrast to p\u0101ram\u0101rthika\n- [Vy\u0101vah\u0101rika](vyavaharika.md) \u2014 the empirical level; the world in its working reality; mithy\u0101, not p\u0101ram\u0101rthika\n- [Pr\u0101tibh\u0101sika](pratibhasika.md) \u2014 the apparent level; lower than vy\u0101vah\u0101rika; immediately sublatable\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the only instrument capable of pointing to the p\u0101ram\u0101rthika; Mah\u0101v\u0101kyas remove adhy\u0101sa rather than establishing Brahman as an object of cognition\n- [Adhy\u0101sa](adhyasa.md) \u2014 the structural overlay that makes the p\u0101ram\u0101rthika appear as the vy\u0101vah\u0101rika; what brahma-j\u00f1\u0101na dissolves\n- [Vivartav\u0101da](vivartavada.md) \u2014 the Advaita theory of how the p\u0101ram\u0101rthika Brahman \"appears as\" the world without actually undergoing transformation\n\n## Audience Metaphor\n\nIn the dream, there is a fire that burns a house. The fire is real within the dream \u2014 it is not the dream-version of a non-existent thing, it genuinely affects the dream-house. But the fire is not real the way the sleeping consciousness is real. Wake up and the fire has vanished, but the consciousness that was dreaming continues, untouched. P\u0101ram\u0101rthika is the sleeping consciousness \u2014 not the fire, not even the good things in the dream, but what was there before the dream began and remains after it ends, and was never actually in it. In Advaita's own framing: what survives all possible sublation is p\u0101ram\u0101rthika.\n\n## Citations\n\n1. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.2 (\u015aa\u1e45kara) \u2014 jij\u00f1\u0101s\u0101 (inquiry into Brahman); Brahman as sat, cit, \u0101nanda; p\u0101ram\u0101rthika status as the issue all of Ved\u0101nta addresses\n2. [M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101](/references/mandukya-karika.md) 3.18 (Gau\u1e0dap\u0101da) \u2014 aj\u0101ti (no-origination doctrine); Brahman as never undergoing birth, change, or dissolution; the p\u0101ram\u0101rthika is precisely what survives all sublation\n3. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) v.20 (\u015aa\u1e45kara) \u2014 brahma satya\u1e43 jagat mithy\u0101: Brahman is satyam (real, p\u0101ram\u0101rthika); the world is mithy\u0101 (vy\u0101vah\u0101rika-pr\u0101tibh\u0101sika)\n4. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.7 (Vidy\u0101ra\u1e47ya) \u2014 explicit three-level taxonomy: p\u0101ram\u0101rthika, vy\u0101vah\u0101rika, pr\u0101tibh\u0101sika", "concepts/parinamavada": "# Pari\u1e47\u0101mav\u0101da \u2014 \u092a\u0930\u093f\u0923\u093e\u092e\u0935\u093e\u0926\n\n**Not:** evolution theory, emergence, manifestation, emanation, transformation theory (when used without qualification), pantheism\n\nPari\u1e47\u0101mav\u0101da is the philosophical position that effects are real transformations of their causes \u2014 the cause genuinely modifies itself into the effect. In Indian philosophy, this theory defines the S\u0101\u1e43khya cosmology (Prak\u1e5bti actually transforms into the twenty-four tattvas) and the Vi\u015bi\u1e63\u1e6d\u0101dvaita cosmology (Brahman actually transforms, as body, into the world). Advaita Ved\u0101nta explicitly rejects pari\u1e47\u0101mav\u0101da applied to the Brahman\u2192world relation in favor of vivartav\u0101da (appearance-causation). Understanding pari\u1e47\u0101mav\u0101da requires understanding both what it claims and the Advaita argument against it. Build with [Vivartav\u0101da](vivartavada.md).\n\n## The Rival Pair: Pari\u1e47\u0101mav\u0101da vs. Vivartav\u0101da\n\n| Feature | **Pari\u1e47\u0101mav\u0101da** (S\u0101\u1e43khya / Vi\u015bi\u1e63\u1e6d\u0101dvaita) | **Vivartav\u0101da** (Advaita) |\n|---------|---------------------------------------------|--------------------------|\n| **What the cause does** | Actually transforms into the effect | Remains entirely unchanged |\n| **What the effect is** | A real, new modification of the cause | An appearance on the unchanged cause |\n| **Paradigm example** | Milk \u2192 curd (curd is real; milk-state is gone) | Rope \u2192 snake (snake is appearance only; rope unchanged) |\n| **Causal status of world** | P\u0101ram\u0101rthika / vy\u0101vah\u0101rika real (genuinely existent) | Mithy\u0101 (appearance on Brahman substratum) |\n| **The cause after effect** | Transformed \u2014 cannot return to prior state via cognition | Unchanged \u2014 substratum fully recovered on sublation |\n| **Liberation mechanism** | Isolation of Puru\u1e63a from Prak\u1e5bti (S\u0101\u1e43khya); realization of Brahman-as-\u0101tman (Vi\u015bi\u1e63\u1e6d\u0101dvaita) | Brahma-j\u00f1\u0101na dissolves the world-appearance; unchanged Brahman recognized |\n| **Primary proponents** | \u012a\u015bvarak\u1e5b\u1e63\u1e47a (S\u0101\u1e43khya); R\u0101m\u0101nuja (brahma-pari\u1e47\u0101mav\u0101da, Vi\u015bi\u1e63\u1e6d\u0101dvaita) | \u015aa\u1e45kara, Gau\u1e0dap\u0101da (Advaita) |\n\n## Etymology\n\nFrom Sanskrit *pari\u1e47\u0101ma* (transformation, modification, change of form \u2014 from *pari*, around/completely + *n\u0101ma*, from root *nam*, to bend, to change; thus: a thorough/complete bending/changing) + *v\u0101da* (theory, thesis \u2014 from root *vad*, to speak). Literally: the theory of real transformation; the thesis that the cause actually changes into the effect.\n\n*Pari\u1e47\u0101ma* in Sanskrit also carries the sense of ripening, maturation \u2014 the way a mango ripens from unripe to ripe. This is not a mere appearance of ripeness; the mango genuinely changes its chemical constitution. Pari\u1e47\u0101mav\u0101da generalizes this to all causation and, in S\u0101\u1e43khya and Vi\u015bi\u1e63\u1e6d\u0101dvaita, to the cosmological causation of Prak\u1e5bti or Brahman becoming the world.\n\n## The Paradigm: Milk Becoming Curd (Dugdha-Dadhi D\u1e5b\u1e63\u1e6d\u0101nta)\n\nThe standard illustration of pari\u1e47\u0101mav\u0101da is the transformation of milk (dugdha) into curd (dadhi):\n\n1. **The milk is the up\u0101d\u0101na-k\u0101ra\u1e47a** (material cause) \u2014 the substance out of which the effect is made.\n2. **The curd is the real effect** \u2014 it is genuinely new as a state; curd has properties that milk does not have (different texture, taste, digestibility, biological behavior).\n3. **The milk-as-milk is gone** \u2014 after the transformation, there is no pure milk in the vessel; the substance has actually changed its state. You cannot recover the milk by *thinking* about it differently.\n4. **The transformation is irreversible by cognition** \u2014 this is the key contrast with vivartav\u0101da: you cannot dissolve the curd-appearance and find the original milk by gaining better knowledge. The transformation was real.\n\nThis is why pari\u1e47\u0101mav\u0101da implies the genuine reality of the effect \u2014 if the world is a real pari\u1e47\u0101ma of Brahman or Prak\u1e5bti, then the world has its own genuine reality and is not mithy\u0101.\n\n## S\u0101\u1e43khya's Prak\u1e5bti-Pari\u1e47\u0101mav\u0101da\n\nIn the S\u0101\u1e43khya-Yoga dar\u015bana (S\u0101\u1e43khyak\u0101rik\u0101 16, \u012a\u015bvarak\u1e5b\u1e63\u1e47a), pari\u1e47\u0101mav\u0101da is grounded in *satk\u0101ryav\u0101da* \u2014 the doctrine that the effect (k\u0101rya) pre-exists in the cause (k\u0101ra\u1e47a) in potential form:\n\n**Satk\u0101ryav\u0101da argument:** Why does oil come from sesame and not from sand? Because oil is already present in potential in sesame but not in sand. The cause contains the effect; production is the actualization of what was latent, not the creation of something entirely new (which would be asatk\u0101ryav\u0101da \u2014 the Buddhist and Ny\u0101ya position that the effect is genuinely new).\n\n**Prak\u1e5bti's modifications:** From *Prak\u1e5bti* (the primordial, trigu\u1e47a material principle), the following cascade of real transformations occurs:\n- Mahat / Buddhi (cosmic intelligence)\n- Aha\u1e43k\u0101ra (cosmic individuation)\n- Manas (mind), five j\u00f1\u0101nendriyas (sense-capacities), five karmendriyas (action-capacities)\n- Five tanm\u0101tr\u0101s (subtle elements)\n- Five mah\u0101bh\u016btas (gross elements)\n\nEach of these is a real pari\u1e47\u0101ma \u2014 Prak\u1e5bti actually modifying itself through successive states. Puru\u1e63a (pure consciousness) is not involved in any of this transformation; it is the witness (s\u0101k\u1e63in) who, by proximity to Prak\u1e5bti, appears to be involved. Liberation (kaivalya) in S\u0101\u1e43khya-Yoga is the recognition that Puru\u1e63a was never actually transformed or bound \u2014 it was always the uninvolved witness.\n\nNote: in S\u0101\u1e43khya, the pari\u1e47\u0101mav\u0101da concerns Prak\u1e5bti, not Puru\u1e63a. Puru\u1e63a itself does not transform. There is thus a structural parallel with Advaita: the pure consciousness (Puru\u1e63a/Brahman) does not transform. The difference is that in S\u0101\u1e43khya, the world is a real transformation of a second eternal substance (Prak\u1e5bti), while in Advaita, there is no second eternal substance \u2014 only Brahman \u2014 so the world's causation must be vivarta, not pari\u1e47\u0101ma.\n\n## Vi\u015bi\u1e63\u1e6d\u0101dvaita's Brahma-Pari\u1e47\u0101mav\u0101da\n\nR\u0101m\u0101nuja's Vi\u015bi\u1e63\u1e6d\u0101dvaita (\u015ar\u012b Bh\u0101\u1e63ya 2.1.26) develops a distinctive form of pari\u1e47\u0101mav\u0101da \u2014 *brahma-pari\u1e47\u0101mav\u0101da* \u2014 in which Brahman itself is the material cause (up\u0101d\u0101na-k\u0101ra\u1e47a) of the world:\n\n**The \u015aar\u012bra-\u0100tman (Body-Soul) Model:** The world and all j\u012bvas are the *\u015bar\u012bra* (body) of Brahman, who is the *\u0101tman* (inner controller) of the whole. Brahman pervades, sustains, and controls everything from within. The world is not a separate substance but the dependent body of the one Brahman.\n\n**How it is pari\u1e47\u0101mav\u0101da:** The world is a *real* modification \u2014 Brahman's body actually transforms through creation, sustenance, and dissolution. The j\u012bvas and the world are real, not mithy\u0101. They are genuinely different from Brahman (vi\u015be\u1e63a\u1e47a \u2014 qualifying attributes), yet inseparable from Brahman (aprthaksiddha \u2014 incapable of existing separately). This is why the school is named Vi\u015bi\u1e63\u1e6d\u0101dvaita: qualified (vi\u015bi\u1e63\u1e6da) non-duality \u2014 not simple monism (Advaita) but unity-in-difference.\n\n**R\u0101m\u0101nuja's critique of vivartav\u0101da:** R\u0101m\u0101nuja explicitly argues that vivartav\u0101da is philosophically incoherent: if the world were merely an appearance (vivarta) of Brahman with no real causal relation, there would be no explanation for why this appearance arises (not any appearance, but *this* world with *these* features), no account of how Brahman remains unchanged while the appearance exists in it, and no intelligible sense in which the substratum (Brahman) is the cause at all. Real causation requires real transformation.\n\n## Advaita's Rejection: Why Brahman Cannot Be the Pari\u1e47\u0101min\n\n\u015aa\u1e45kara's argument (Brahmas\u016btra Bh\u0101\u1e63ya 2.1.26\u201327) against brahma-pari\u1e47\u0101mav\u0101da rests on Brahman's essential characteristics:\n\n**Argument from nirgu\u1e47atva (absence of qualities):**\nReal transformation presupposes qualities that can change (milk's fluidity changes; clay's formlessness changes). Brahman is nirgu\u1e47a \u2014 without qualities. A qualityless entity has nothing that could change. Therefore Brahman cannot be a pari\u1e47\u0101min (transformer).\n\n**Argument from nirvik\u0101ratva (absence of modification):**\n*Vik\u0101ra* (modification) is definitionally what happens to a pari\u1e47\u0101m\u012b cause. Brahman is explicitly nirvik\u0101ra \u2014 declared by \u015aruti to be unchanging. To ascribe pari\u1e47\u0101ma to Brahman contradicts \u015aruti's most direct declarations.\n\n**The soteriology argument:**\nIf Brahman pari\u1e47\u0101med into the world, the pre-creation pure Brahman would no longer exist \u2014 it would have become the world (as milk becomes curd and the milk-state is gone). There would be no unchanged Brahman to realize at liberation. Mok\u1e63a as the recognition \"I am Brahman\" would be impossible \u2014 the Brahman that was there before the world is no longer there. Liberation requires an unchanged, eternally available p\u0101ram\u0101rthika Brahman, which only vivartav\u0101da can provide.\n\n**The causality circle problem:**\nIf Brahman is the material cause of the world and the world is Brahman-transformed, then Brahman knowing the world would be a case of a transformation knowing its own transforming cause \u2014 creating paradoxes about the knowing relation that Advaita's vivartav\u0101da avoids by keeping Brahman entirely outside the world's causal structure.\n\n## Pari\u1e47\u0101mav\u0101da and the Mithy\u0101 Question\n\nThe most important consequence of the Advaita-pari\u1e47\u0101mav\u0101da debate is about the ontological status of the world:\n\n| Position | World's status | Why |\n|----------|---------------|-----|\n| **S\u0101\u1e43khya pari\u1e47\u0101mav\u0101da** | Real (real Prak\u1e5bti-modification) | Prak\u1e5bti is eternal; its transformations are genuine; Puru\u1e63a remains untouched |\n| **Vi\u015bi\u1e63\u1e6d\u0101dvaita brahma-pari\u1e47\u0101mav\u0101da** | Real (Brahman's body) | Real causal relation between Brahman-\u0101tman and world-\u015bar\u012bra; j\u012bvas are genuinely distinct from Brahman |\n| **Advaita vivartav\u0101da** | Mithy\u0101 (appearance on Brahman) | Brahman is nirgu\u1e47a, nirvik\u0101ra \u2014 cannot genuinely transform; the world's arising is vivarta; the world depends on Brahman but Brahman does not depend on the world |\n\nIf pari\u1e47\u0101mav\u0101da is correct for the Brahman\u2192world relation, the world is real and mithy\u0101 is false. If vivartav\u0101da is correct, the world is mithy\u0101 and liberation is possible by cognition alone. This is the deepest stake of the rival_view_pair.\n\n## Cross-References\n- [Vivartav\u0101da](vivartavada.md) \u2014 the Advaita rival; the theory that the world is an appearance rather than a real transformation of Brahman; build with this file as rival_view_pair\n- [Mithy\u0101](mithya.md) \u2014 what the world is if vivartav\u0101da is correct; what it is NOT if pari\u1e47\u0101mav\u0101da is correct; the ontological stake of the rival pair\n- [P\u0101ram\u0101rthika](paramarthika.md) \u2014 the level at which Brahman alone exists; only vivartav\u0101da is compatible with Brahman alone being p\u0101ram\u0101rthika; pari\u1e47\u0101mav\u0101da implies the world shares real status with Brahman\n- [Vy\u0101vah\u0101rika](vyavaharika.md) \u2014 in both Vi\u015bi\u1e63\u1e6d\u0101dvaita and S\u0101\u1e43khya, the world is at minimum vy\u0101vah\u0101rika-real; in Advaita, vy\u0101vah\u0101rika reality is compatible with mithy\u0101tva (real-as-appearance) \u2014 the level itself is not the dispute\n- [Adhy\u0101sa](adhyasa.md) \u2014 in Advaita, what makes the world appear at all is adhy\u0101sa (superimposition); in pari\u1e47\u0101mav\u0101da, there is no adhy\u0101sa \u2014 the world is really there because it really came from a real transformation\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 the sublation mechanism; sublation (b\u0101dha) is appropriate to mithy\u0101 (the vivartav\u0101da world); in pari\u1e47\u0101mav\u0101da, liberation is not sublation of the world but either isolation (S\u0101\u1e43khya) or recognition of the \u0101tman-\u015bar\u012bra relationship (Vi\u015bi\u1e63\u1e6d\u0101dvaita) \u2014 the mechanism differs fundamentally\n\n## Audience Metaphor\n\nA potter's clay becomes a pot. This is pari\u1e47\u0101mav\u0101da. The clay actually changes \u2014 it is no longer merely clay; it is now a pot. The clay-as-mere-clay no longer exists in that state. The pot is a real new object, a genuine modification of the clay. Now compare this to the rope-snake (vivartav\u0101da): the rope does not become the snake. The snake appears in the rope without the rope changing. The rope-as-rope still fully exists after the snake-appearance. There is no new product \u2014 only an apparent one. S\u0101\u1e43khya says Prak\u1e5bti (the primordial nature) is the clay \u2014 it really becomes the world through successive modifications. Vi\u015bi\u1e63\u1e6d\u0101dvaita says Brahman is like the clay \u2014 it becomes the world as a real modification (while remaining Brahman as the \u0101tman of that world-body). Advaita says Brahman is the rope \u2014 it appears as the world without any change, and the world's reality is borrowed, dependent, sublatable. The real question is: what kind of causation can a nirgu\u1e47a, unchanging Brahman have? Advaita says: only vivarta \u2014 appearance without transformation.\n\n## Citations\n\n1. [S\u0101\u1e43khyak\u0101rik\u0101](/references/samkhya-karika.md) 16 (\u012a\u015bvarak\u1e5b\u1e63\u1e47a) \u2014 satk\u0101ryav\u0101da: the effect (k\u0101rya) pre-exists in the cause (k\u0101ra\u1e47a); nothing can be produced that is not already present in potential form; this is the metaphysical grounding of S\u0101\u1e43khya pari\u1e47\u0101mav\u0101da; Prak\u1e5bti's modifications (vik\u1e5bti) are real transformations of a single primordial substance\n2. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.26\u201327 (\u015aa\u1e45kara) \u2014 the pivotal Advaita critique: a nirgu\u1e47a, nirvik\u0101ra Brahman cannot be the up\u0101d\u0101na-k\u0101ra\u1e47a (material cause) of a real transformation; the 'effect' (world) must therefore be vivarta (appearance), not pari\u1e47\u0101ma (real transformation); \u015aa\u1e45kara here defines the Advaita position against S\u0101\u1e43khya\n3. \u015ar\u012b Bh\u0101\u1e63ya 2.1.26 (R\u0101m\u0101nuja) \u2014 brahma-pari\u1e47\u0101mav\u0101da: Brahman, along with its body (the world and j\u012bvas), genuinely transforms; the world is not mithy\u0101 but the real body-state of Brahman; the Vi\u015bi\u1e63\u1e6d\u0101dvaita defense of pari\u1e47\u0101mav\u0101da against Advaita's vivartav\u0101da; R\u0101m\u0101nuja's explicit argument against the vivartav\u0101da position as philosophically incoherent", "concepts/prama": "# Pram\u0101 \u2014 \u092a\u094d\u0930\u092e\u093e\n\n**Not:** truth (propositional), justified true belief (JTB), knowledge (generic English), belief (doxastic), correct perception, apram\u0101 (invalid cognition)\n\n**Pram\u0101** is the Sanskrit epistemological term for **veridical cognition** \u2014 the valid result produced when a pram\u0101\u1e47a (instrument of valid cognition) operates on a prameya (object of cognition) and delivers a cognition that corresponds to its object. It is the *phala* (result, outcome) of the pram\u0101\u1e47a-triad: pram\u0101t\u1e5b (knowing subject) + pram\u0101\u1e47a (instrument) + prameya (object) \u2192 pram\u0101 (valid cognition).\n\nThe term appears in its most technically precise form in the Ny\u0101ya-Vai\u015be\u1e63ika and M\u012bm\u0101\u1e43s\u0101 traditions but is foundational to Advaita Ved\u0101nta's epistemological architecture as well. The Tattvabodha (attributed to \u015aa\u1e45kara) introduces the pram\u0101\u1e47a-triad as the basic structure of Advaita epistemology: the student must know how the instruments of valid cognition work before understanding how brahma-j\u00f1\u0101na \u2014 the liberative pram\u0101 \u2014 operates within and ultimately overturns that framework.\n\n## Etymology\n\nFrom Sanskrit *pra-* (prefix: forward, complete, fully) + *m\u0101na* (from root *m\u0101*, to measure, to cognize) \u2192 *pram\u0101*: a completed, fully effected cognition; a cognition that has measured (arrived at) its object as it actually is. The *pra-* prefix distinguishes *pram\u0101* (successful, veridical cognition) from mere *m\u0101na* (measuring attempt) and from *apram\u0101* (invalid, non-corresponding cognition; *a-pram\u0101* \u2014 the negation).\n\n## The Pram\u0101\u1e47a-Triad and Pram\u0101 as Phala\n\nAdvaita Ved\u0101nta (following M\u012bm\u0101\u1e43s\u0101 and Ny\u0101ya) analyzes every valid epistemic event into four structural elements:\n\n| Element | Sanskrit | Role |\n|---------|----------|------|\n| **Knower** | Pram\u0101t\u1e5b | The cognitive subject; the witness-awareness operating through the anta\u1e25kara\u1e47a (mind-complex) |\n| **Instrument** | Pram\u0101\u1e47a | The means by which the object is cognized: pratyak\u1e63a, anum\u0101na, \u015babda, upam\u0101na, arth\u0101patti, anupalabdhi |\n| **Object** | Prameya | What is cognized; the domain of the pram\u0101\u1e47a; differs by pram\u0101\u1e47a type |\n| **Valid cognition** | Pram\u0101 | The result: the cognition that corresponds to its object |\n\nPram\u0101 is thus not the pram\u0101\u1e47a itself (the instrument) but the cognitive result produced when the instrument functions correctly on its object. The distinction matters: a valid pram\u0101\u1e47a that is obstructed by do\u1e63a (defect) does not produce pram\u0101. A defective instrument (miscalibrated sense organ, do\u1e63a-laden mind) produces apram\u0101 even when the object is present.\n\n## Definition: Three Conditions for Pram\u0101\n\nThe Ved\u0101ntaparibh\u0101\u1e63\u0101 Ch.1 builds the Advaita definition of pram\u0101 from three conditions:\n\n**Condition 1: Anubhava (non-mnemonic cognition)** \u2014 pram\u0101 must be a fresh cognitive event, not a recollection. Sm\u1e5bti (memory of \"the fire I saw yesterday\") is not pram\u0101 even if accurate, because it is recollection of a prior cognition, not a new epistemic contact.\n\n**Condition 2: Yath\u0101rthatva (object-correspondence)** \u2014 the cognition must correspond to its object: it must cognize the object as it actually is, not as other than it is (anyath\u0101khy\u0101ti). Cognizing the rope as a snake is anyath\u0101-khy\u0101ti \u2014 cognizing something as other than it is \u2014 and is therefore apram\u0101.\n\n**Condition 3: Non-sublation (ab\u0101dhitatva)** \u2014 the cognition must not be subsequently sublated (b\u0101dhita) by a higher or stronger cognition. A cognition of silver in a shell (\u015bukti-rajata) appears veridical until closer inspection reveals the shell: the shell-silver cognition is retroactively b\u0101dhita and revealed as apram\u0101. A cognition that survives all subsequent investigation is pram\u0101.\n\n## Pram\u0101 and Svata\u1e25pr\u0101m\u0101\u1e47ya\n\nThe Advaita-M\u012bm\u0101\u1e43s\u0101 position (see svatahpramanya.md) holds that pram\u0101 is self-validating (*svata\u1e25pr\u0101m\u0101\u1e47ya*): the validity of a pram\u0101 is intrinsic to the cognition itself, not dependent on external confirmation. When a pram\u0101 arises (say, the cognition \"this is fire\"), its validity is not produced by a subsequent meta-cognition (\"my cognition of fire is valid\"); the fire-cognition is self-warranted by its arising.\n\nThis is in contrast to the Ny\u0101ya position (parata\u1e25pr\u0101m\u0101\u1e47ya): that the validity of a cognition requires external confirmation \u2014 a subsequent checking-cognition or the track record of the instrument. The Advaita-M\u012bm\u0101\u1e43s\u0101 argument: if validity required an external validator, that validator would itself require validation, producing an infinite regress; svata\u1e25pr\u0101m\u0101\u1e47ya blocks the regress.\n\nThe practical consequence: a pram\u0101 needs no independent justification. It is valid until b\u0101dhita. The burden of proof falls on the b\u0101dha, not on the pram\u0101.\n\n## Pram\u0101 vs. Apram\u0101: The Advaita Soteriological Stakes\n\nThe pram\u0101/apram\u0101 distinction carries enormous soteriological weight in Advaita:\n\n**Avidy\u0101 as the source of systematic apram\u0101:** Every cognition of the j\u012bva as a separate self in an independently real world is, from the p\u0101ram\u0101rthika standpoint, apram\u0101 \u2014 it cognizes the appearance (mithy\u0101 j\u012bva, mithy\u0101 jagat) as if it were the ultimately real. The cognition \"I am this body-mind\" is apram\u0101 because the body-mind is not the ultimate reality of the cognizer.\n\n**Brahma-j\u00f1\u0101na as the definitive pram\u0101:** The liberative cognition \"aham brahm\u0101smi\" (I am Brahman) is the pram\u0101 that b\u0101dhita-s all prior apram\u0101s about the self. It corresponds to the object (Brahman, which is the actual nature of the cognizer) without the distortion of avidy\u0101, meets the three conditions (it is anubhava; it is yath\u0101rtha \u2014 it corresponds to Brahman as the actual reality; it is the trik\u0101l\u0101b\u0101dhita cognition, never sublatable), and is self-validating.\n\n**The paradox:** From the vy\u0101vah\u0101rika standpoint, brahma-j\u00f1\u0101na is a pram\u0101 \u2014 a valid cognition produced by the \u015babda-pram\u0101\u1e47a (Mah\u0101v\u0101kya-\u015babda) on the prameya (Brahman). From the p\u0101ram\u0101rthika standpoint, brahma-j\u00f1\u0101na dissolves the pram\u0101t\u1e5b-pram\u0101\u1e47a-prameya-pram\u0101 structure itself \u2014 because Brahman is neither subject to knowing nor an object of knowing but the awareness in which all such structures appear. The pram\u0101 framework is vy\u0101vah\u0101rika scaffolding that is dismantled in the very act of successful brahma-j\u00f1\u0101na.\n\n## Pram\u0101 Across the Six Pram\u0101\u1e47as\n\nEach pram\u0101\u1e47a produces pram\u0101 within its domain:\n\n| Pram\u0101\u1e47a | Domain | Example pram\u0101 |\n|---------|--------|---------------|\n| Pratyak\u1e63a | Perceptible present objects | \"This fire is hot\" (tactile-thermal) |\n| Anum\u0101na | Inferrable facts via li\u1e45ga | \"There is fire on that hill\" (inferring from smoke) |\n| \u015aabda / \u0100gama | Testimony of valid speakers; Vedic statements | \"\u0100tman is Brahman\" (Mah\u0101v\u0101kya-\u015babda) |\n| Upam\u0101na | Analogical cognition: similarity-based | \"The wild cow is like a domestic cow\" |\n| Arth\u0101patti | Postulation from incongruent facts | \"Devadatta must eat at night\" (because he is fat but eats nothing by day) |\n| Anupalabdhi | Cognition from non-apprehension | \"There is no pot on the table\" |\n\nThe pram\u0101 produced by each pram\u0101\u1e47a carries the scope and authority of that pram\u0101\u1e47a. Pratyak\u1e63a-produced pram\u0101 covers the domain of sensible present objects. \u015aabda-produced pram\u0101 covers what language can validly transmit \u2014 including, in the M\u012bm\u0101\u1e43s\u0101-Advaita view, the Mah\u0101v\u0101kyas' transmission of the \u0101tman-Brahman identity.\n\n## The Vy\u0101vah\u0101rika Persistence of Pram\u0101 After Aparok\u1e63a-anubh\u016bti\n\nA key Advaita position: after aparok\u1e63a-anubh\u016bti, the j\u012bvanmukta continues to operate in the vy\u0101vah\u0101rika world, which means the ordinary pram\u0101\u1e47as continue to produce ordinary pram\u0101s. The j\u012bvanmukta sees fire, infers rain from clouds, hears instruction. These pram\u0101s operate normally. What has changed is the root context: these pram\u0101s no longer occur within the superimposed framework of \"I am a separate self in an independently real world.\" The j\u012bvanmukta has the pram\u0101 \"this is fire\" without the accompanying adhy\u0101sic context \"and I am a body that can be burned by this fire as an ultimate ontological reality.\"\n\nThe vy\u0101vah\u0101rika pram\u0101s remain; the adhy\u0101sic metadata that surrounded them is removed.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the instrument that produces pram\u0101; pram\u0101\u1e47a and pram\u0101 are logically paired; all six pram\u0101\u1e47as are defined by what pram\u0101 they produce and in what domain\n- [Pram\u0101t\u1e5b](pramata.md) \u2014 the knowing subject; pram\u0101 is produced by the operation of pram\u0101\u1e47a by pram\u0101t\u1e5b on prameya; pram\u0101t\u1e5b is the subject-element of the triad\n- [Prameya](prameya.md) \u2014 the object known; pram\u0101 is the cognition of the prameya; what makes a cognition pram\u0101 is that it corresponds to the prameya as it actually is\n- [Anubhava](anubhava.md) \u2014 the broader category: anubhava is any non-mnemonic cognition (valid or invalid); pram\u0101 is the subset of anubhava that is yath\u0101rtha (object-corresponding) and non-sublated\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 the Advaita-M\u012bm\u0101\u1e43s\u0101 position that pram\u0101's validity is intrinsic and does not require external validation; the theory that grounds why pram\u0101 does not require justification beyond itself\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 the sublation that retroactively reveals a cognition as apram\u0101 (the rope-cognition b\u0101dhita-s the snake-cognition); brahma-j\u00f1\u0101na as the trik\u0101l\u0101b\u0101dhita pram\u0101 \u2014 the cognition that is never sublated\n- [Adhy\u0101sa](adhyasa.md) \u2014 the mechanism that produces apram\u0101; adhy\u0101sa generates cognitions of the self-as-body-mind and world-as-independently-real that are systematically apram\u0101; brahma-j\u00f1\u0101na is the pram\u0101 that removes the root adhy\u0101sa\n- [Avidy\u0101](avidya.md) \u2014 the deeper condition that makes adhy\u0101sa-produced apram\u0101 possible; avidy\u0101 as the epistemic condition that surrounds all vy\u0101vah\u0101rika cognition with the superimposed context of separate-self reality\n\n## Audience Metaphor\n\nA surveyor's measurement of a plot of land is pram\u0101 if it corresponds to the actual dimensions of the plot \u2014 the measurement instrument (theodolite, measuring tape) worked correctly, the conditions were adequate, and the result matches the land. An incorrect measurement (instrument miscalibrated, tape kinked) is apram\u0101 \u2014 it does not correspond to the object. The Advaita move: the surveyor's measurements of the j\u012bva ('this body-mind complex is my self') and the world ('these objects are independently real') are systematic apram\u0101, produced not by kinked tape but by avidy\u0101. Brahma-j\u00f1\u0101na is the survey that finally measures correctly \u2014 and in measuring correctly, discovers that the entire territory was Brahman, and the surveyor was too.\n\n## Citations\n\n1. [Ny\u0101yas\u016btra](/references/nyaya-sutra.md) 1.1.1 (Gautama) \u2014 the first Ny\u0101ya-S\u016btra establishes the central project: the means of valid cognition (pram\u0101\u1e47a) and their results (pram\u0101); pram\u0101\u1e47a and pram\u0101 are logically paired from the start; all subsequent Ny\u0101ya epistemology elaborates what counts as pram\u0101\u1e47a and what constitutes its pram\u0101-result\n2. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.1 (Dharmar\u0101j\u0101dhvar\u012bndra) \u2014 the Advaita definitional account: pram\u0101 is anubhava (non-mnemonic cognition) that is yath\u0101rtha (corresponding to its object) and that is not subsequently b\u0101dhita (sublated by a higher cognition); the definition builds in three conditions: fresh cognition + object-correspondence + non-sublation\n3. [Tattvabodha](/references/tattvabodha.md) (attributed to \u015aa\u1e45kara) \u2014 the pedagogical introduction of the pram\u0101\u1e47a-triad in Advaita Ved\u0101nta: pram\u0101t\u1e5b (knowing subject), pram\u0101\u1e47a (instrument of valid cognition), prameya (object to be known), pram\u0101 (valid cognition as result); these four are the structural elements of every valid epistemic event\n4. [Ny\u0101yakusum\u0101\u00f1jali](/references/nyayakusumanjali.md) 1.1 (Udayana) \u2014 pram\u0101 as yath\u0101rtha-j\u00f1\u0101na: cognition that corresponds to (yath\u0101rtha) its object; a cognition of pot that corresponds to the pot is pram\u0101; a cognition of snake in what is a rope is apram\u0101", "concepts/pramana": "# Pram\u0101\u1e47a \u2014 \u092a\u094d\u0930\u092e\u093e\u0923\n\n**Not:** proof, evidence, logical demonstration, epistemological method, scientific verification, criterion of truth, justification condition\n\nPram\u0101\u1e47a is an instrument of valid knowledge (pram\u0101-kara\u1e47a) \u2014 the operative cognitive source through which a non-erroneous, non-previously-known cognition arises. It is not the knowledge itself, and it is not a standard against which claims are tested. It is the cause of a specific type of knowing-event.\n\nThe classical Indian pram\u0101\u1e47a \u015b\u0101stra (science of valid sources of knowledge) takes the pram\u0101\u1e47a as its central object: what kinds of cognitive instruments produce genuine knowledge, and how many are irreducibly distinct?\n\n## Etymology\n\nFrom Sanskrit *pra* (forward, forth) + *m\u0101* (to measure, to know, from root *m\u0101* \u2014 cognate with *m\u0101na*, measuring) + *a\u1e47a* (instrument suffix). Literally: that which measures forth, i.e., the instrument by which genuine cognitive contact with a domain is achieved. The related term *pram\u0101* names the result \u2014 valid cognition. The knower is *pram\u0101t\u0101*; the object known is *prameya*.\n\nThe triad pram\u0101\u1e47a / pram\u0101 / pram\u0101t\u0101 (instrument / result / agent) frames the entire epistemological inquiry. Western epistemology typically focuses on the result and its conditions (when is a belief true and justified?). Indian pram\u0101\u1e47a theory focuses on the operative cause: what type of instrument produced this cognition, and is that instrument valid in this domain?\n\n## What Pram\u0101\u1e47a Is (and Is Not)\n\nPram\u0101\u1e47a is not evidence. Evidence is a proposition (or set of propositions) that counts in favour of another proposition. Pram\u0101\u1e47a is a cognitive instrument \u2014 the channel through which knowing occurs. Pratyak\u1e63a (direct perceptual contact), anum\u0101na (inference via vy\u0101pti), and \u015babda (authoritative verbal testimony) are not three grades of support for a claim. They are three distinct types of cognitive operation, each generating knowledge in its own domain.\n\nPram\u0101\u1e47a is not proof. Proof (in the Western logical or mathematical sense) is a sequence of propositions that entail a conclusion. Anum\u0101na (the inferential pram\u0101\u1e47a) involves something like reasoning, but the Indian structure (the pa\u00f1c\u0101vayava argument) is not a proof in the deductive sense \u2014 it is a verbal expression of the inferential cognition that has already occurred in the inferring agent.\n\nPram\u0101\u1e47a is not a method. You do not apply pram\u0101\u1e47as the way you apply a research methodology. Each pram\u0101\u1e47a operates when the appropriate conditions obtain: pratyak\u1e63a operates when the sense organs make contact with an object; anum\u0101na operates when a linga (mark) whose vy\u0101pti with the s\u0101dhya (inferable) has been established is perceived; \u015babda operates when words of an \u0101pta (competent reliable speaker) are heard and their meaning understood.\n\n## The Schools and Their Pram\u0101\u1e47a Lists\n\nCross-dar\u015bana disagreement on pram\u0101\u1e47a count is philosophically significant \u2014 each school's list encodes its ontological commitments:\n\n| School | Pram\u0101\u1e47as Accepted | Count |\n|--------|-------------------|-------|\n| C\u0101rv\u0101ka | Pratyak\u1e63a only | 1 |\n| Vai\u015be\u1e63ika (early) | Pratyak\u1e63a, Anum\u0101na | 2 |\n| S\u0101\u1e43khya-Yoga | Pratyak\u1e63a, Anum\u0101na, \u0100gama | 3 |\n| Ny\u0101ya | Pratyak\u1e63a, Anum\u0101na, Upam\u0101na, \u015aabda | 4 |\n| Advaita Ved\u0101nta | Pratyak\u1e63a, Anum\u0101na, Upam\u0101na, \u015aabda, Arth\u0101patti, Anupalabdhi | 6 |\n| M\u012bm\u0101\u1e43s\u0101 | Pratyak\u1e63a, Anum\u0101na, Upam\u0101na, \u015aabda, Arth\u0101patti, Anupalabdhi | 6 |\n\nThe Advaita list follows M\u012bm\u0101\u1e43s\u0101 precisely \u2014 this is not coincidence. Advaita shares M\u012bm\u0101\u1e43s\u0101's commitment to \u015aruti as an independent and supreme pram\u0101\u1e47a (not reducible to inference or testimony-in-the-ordinary-sense), and consequently accepts the full M\u012bm\u0101\u1e43s\u0101 list. Ny\u0101ya's reduction to four reflects its materialist-adjacent tendency to reduce postulation (arth\u0101patti) to inference and absence-cognition (anupalabdhi) to perception.\n\n## Pram\u0101\u1e47a and Brahman: The Central Advaita Move\n\nThe question that drives Advaita's pram\u0101\u1e47a theory is not abstract: **Which pram\u0101\u1e47a is valid for the knowledge of Brahman?**\n\n\u015aa\u1e45kara's answer (Brahmas\u016btra Bh\u0101\u1e63ya 1.1.1): neither pratyak\u1e63a nor anum\u0101na can reach Brahman. Pratyak\u1e63a requires an object that stands before the sense organs \u2014 Brahman is not an object. Anum\u0101na requires a perceptual base for vy\u0101pti \u2014 there is no perceived correlation that could ground inference to the nature of Brahman. Therefore \u015aruti (verbal testimony of the \u1e5b\u1e63is, understood as apauru\u1e63eya) is the only operative pram\u0101\u1e47a for Brahman-knowledge.\n\nThis is not a faith position. It is a pram\u0101\u1e47a-theoretical argument: Brahman's nature is not accessible through any instrument that operates on objects, and \u015aruti (as \u015babda-pram\u0101\u1e47a in the Advaita sense) is the instrument that conveys what direct realization has established. See *shabda-pramana.md* for the full treatment.\n\n## Pram\u0101\u1e47a-phala: The Result Criterion\n\nA pram\u0101\u1e47a is valid only if it produces *pram\u0101* \u2014 valid, non-erroneous, non-previously-known cognition. This three-part criterion matters:\n\n1. **Non-erroneous (ab\u0101dhita):** The cognition must not be sublated (b\u0101dhita) by a subsequent cognition. A rope mistaken for a snake does not produce pram\u0101 \u2014 it is bhr\u0101nti (erroneous cognition). The subsequent cognition \"it is a rope\" sublates the prior.\n2. **Non-previously-known (anadhigata):** Pram\u0101\u1e47a produces new knowledge. Recalling what is already known is not a pram\u0101\u1e47a operation \u2014 it is sm\u1e5bti (memory), which is not a pram\u0101\u1e47a.\n3. **Valid (pram\u0101, not apram\u0101):** Distinguished from invalid cognitions \u2014 illusion, doubt, error, memory.\n\n## Cross-References\n- [Pram\u0101](prama.md) \u2014 the valid cognition produced by pram\u0101\u1e47a; the result, not the instrument\n- [Pram\u0101t\u0101](pramata.md) \u2014 the knowing subject; the agent in the pram\u0101\u1e47a triad\n- [Prameya](prameya.md) \u2014 the knowable object; the domain of a given pram\u0101\u1e47a\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 direct-contact cognition; first and most basic pram\u0101\u1e47a\n- [Anum\u0101na](anumana.md) \u2014 inferential cognition; second pram\u0101\u1e47a\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 verbal testimony; the pram\u0101\u1e47a for Brahman-knowledge\n- [Upam\u0101na](upamana.md) \u2014 comparison-cognition; fourth pram\u0101\u1e47a\n- [Arth\u0101patti](arthapatti.md) \u2014 postulation; fifth pram\u0101\u1e47a\n- [Anupalabdhi](anupalabdhi.md) \u2014 non-cognition of the perceptible; sixth pram\u0101\u1e47a\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 M\u012bm\u0101\u1e43s\u0101/Advaita doctrine that validity is intrinsic, not established by external verification\n\n## Audience Metaphor\n\nLike asking whether you learned something from reading (\u015babda), seeing it yourself (pratyak\u1e63a), or reasoning it through (anum\u0101na) \u2014 these are different cognitive instruments, not different grades of courtroom evidence. The instrument itself, not the conclusion it supports, is what pram\u0101\u1e47a names.\n\n## Citations\n\n1. [Tarkasa\u1e43graha](/references/tarkasangraha.md) \u00a71 \u2014 Annambha\u1e6d\u1e6da's definition: pram\u0101\u1e47a is the instrument of valid cognition (pram\u0101kara\u1e47am)\n2. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.1 \u00a71 \u2014 Dharmar\u0101ja Adhvarin on the six pram\u0101\u1e47as of Advaita Ved\u0101nta\n3. Ny\u0101yadar\u015bana 1.1.3 \u2014 Gautama's four-pram\u0101\u1e47a list with commentary\n4. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.1 \u2014 \u015aa\u1e45kara on \u015aruti as the only pram\u0101\u1e47a adequate to Brahman-knowledge\n5. Cross-bundle note: this file's own table already lists the S\u0101\u1e43khya-Yoga three-pram\u0101\u1e47a count; sankhya-darshana v0.13's pramana-samkhya.md is now the third school-scoped full treatment (after this Advaita-foregrounded entry and nyaya-vaisheshika v0.9's four-pram\u0101\u1e47a Ny\u0101ya treatment)", "concepts/pramata": "# Pram\u0101t\u1e5b \u2014 \u092a\u094d\u0930\u092e\u093e\u0924\u0943\n\n**Not:** ego (psychoanalytic), transcendental subject (Kantian), agent (kart\u1e5b), self (generic), witness (s\u0101k\u1e63in)\n\n**Pram\u0101t\u1e5b** is the knowing subject \u2014 the first structural element of the pram\u0101\u1e47a-triad in Indian epistemology. The triad: pram\u0101t\u1e5b (knower) + pram\u0101\u1e47a (instrument of valid cognition) + prameya (object known) \u2192 pram\u0101 (valid cognition). Every valid epistemic event is analyzed through this four-element structure. The pram\u0101t\u1e5b is the entity that employs the pram\u0101\u1e47a to cognize the prameya and thereby obtains the pram\u0101.\n\nIn Advaita Ved\u0101nta, the pram\u0101t\u1e5b carries a critical double character: at the vy\u0101vah\u0101rika (conventional) level, the pram\u0101t\u1e5b is the j\u012bva operating through the anta\u1e25kara\u1e47a (inner organ); at the p\u0101ram\u0101rthika (ultimate) level, the apparent pram\u0101t\u1e5b is revealed to be the product of adhy\u0101sa \u2014 a superimposition of pure consciousness (Brahman/\u0101tman) with the mind-body complex. This Advaita deconstruction of the pram\u0101t\u1e5b is one of its most architecturally distinctive moves: the framework of subject-object cognition is vy\u0101vah\u0101rika scaffolding, valid within its level, but resting on a superimposed structure that brahma-j\u00f1\u0101na dissolves.\n\n## Etymology\n\nFrom Sanskrit *pra-m\u0101tr\u0325* (or *pram\u0101-tr\u0325*): the agent noun from *pra + m\u0101* (to measure, to cognize validly) with the agent suffix *-tr\u0325* (the one who does). Literally: the one who measures/cognizes validly; the valid-cognition-obtainer; the knowing-agent. Feminine form: *pram\u0101t\u1e5b* (same stem). The term is parallel in formation to *kart\u1e5b* (agent-of-action) and *bhokt\u1e5b* (experiencer-of-enjoyment/suffering) \u2014 all three are attributed to the j\u012bva in Advaita's vy\u0101vah\u0101rika analysis.\n\n## The Vy\u0101vah\u0101rika Pram\u0101t\u1e5b: J\u012bva Through Anta\u1e25kara\u1e47a\n\nAt the vy\u0101vah\u0101rika level, the pram\u0101t\u1e5b is the j\u012bva \u2014 the individual self constituted by the superimposition of \u0101tman-consciousness on the anta\u1e25kara\u1e47a (inner organ). The anta\u1e25kara\u1e47a has four functions:\n\n- **Manas** (mind): doubt, deliberation, the sense-synthesizing function\n- **Buddhi** (intellect): determination, decision, the faculty of definite judgment (the seat of pram\u0101-formation)\n- **Aha\u1e43k\u0101ra** (ego-sense): self-arrogation, the \"I-maker\" that identifies the cognitive process as \"mine\"\n- **Citta** (memory-faculty): the storehouse of impressions (sa\u1e43sk\u0101ras)\n\nThe cognition-event proceeds: the sense organ contacts its object \u2192 the sensory information reaches manas \u2192 buddhi resolves it into a definite cognition \u2192 aha\u1e43k\u0101ra attributes the cognition to the self (\"I see fire\") \u2192 the cognition is the pram\u0101. Throughout this process, pure consciousness (\u0101tman) illumines the anta\u1e25kara\u1e47a's modifications \u2014 without \u0101tman's illumining presence, no cognition would arise. But \u0101tman does not \"do\" the cognizing; the anta\u1e25kara\u1e47a is the instrument, the j\u012bva (\u0101tman-as-identified-with-anta\u1e25kara\u1e47a) is the pram\u0101t\u1e5b.\n\n## The P\u0101ram\u0101rthika Deconstruction: Adhy\u0101sabh\u0101\u1e63ya\n\nThe Brahmas\u016btra Bh\u0101\u1e63ya introduction (Adhy\u0101sabh\u0101\u1e63ya) is \u015aa\u1e45kara's analysis of how the pram\u0101t\u1e5b-prameya structure arises. His argument:\n\n1. The \u0101tman is pure consciousness \u2014 self-luminous (*svaya\u1e43prak\u0101\u015ba*), not an object of any cognition, not the product of any pram\u0101\u1e47a, itself the ground of all illumination.\n\n2. The body-mind complex (an\u0101tman) is the domain of objects \u2014 inert, constituted by the three gu\u1e47as, the object of cognition.\n\n3. Adhy\u0101sa (mutual superimposition): \u0101tman's properties (consciousness, existence, bliss) are superimposed on the an\u0101tman (\"I am a conscious body\"), and an\u0101tman's properties (mortality, limitation, suffering) are superimposed on the \u0101tman (\"I am mortal, finite, limited\"). This mutual superimposition creates the apparent individual subject \u2014 the pram\u0101t\u1e5b.\n\n4. **The pram\u0101t\u1e5b is therefore a product of adhy\u0101sa**: it is the appearance of a \"knower\" that arises when pure consciousness is superimposed with the anta\u1e25kara\u1e47a. The pram\u0101t\u1e5b exists and functions validly at the vy\u0101vah\u0101rika level; it is mithy\u0101 (not ultimately real) at the p\u0101ram\u0101rthika level.\n\n## The D\u1e5bg-D\u1e5b\u015bya-Viveka: Hierarchy of Seer and Seen\n\nThe Pa\u00f1cada\u015b\u012b (Ch.6, Vidy\u0101ra\u1e47ya) develops the *d\u1e5bg-d\u1e5b\u015bya-viveka* \u2014 the discrimination of seer (d\u1e5bk) from seen (d\u1e5b\u015bya):\n\n| Level | As d\u1e5bk (seer/pram\u0101t\u1e5b) | As d\u1e5b\u015bya (seen/prameya) |\n|-------|----------------------|------------------------|\n| Physical objects | The sense organs see objects | Physical objects are seen |\n| Sense organs | The mind cognizes sense-impressions | Sense impressions are objects for mind |\n| Mind | The intellect (buddhi) determines what mind presents | Mental states are objects for intellect |\n| Intellect | The \u0101tman illumines intellect's determinations | Intellectual states are objects for \u0101tman |\n| \u0100tman | \u2014 (never the seen; always the seer) | \u2014 |\n\nThe key: at each level, what was the d\u1e5bk (subject) at one level becomes the d\u1e5b\u015bya (object) at the next. The body-mind-sense complex is progressively objectified. Only \u0101tman is never objectified \u2014 it is the always-already-seer that can never become seen because it is the very awareness in which all seeing occurs.\n\nThis analysis reveals why the \u0101tman is not, properly speaking, a pram\u0101t\u1e5b: a pram\u0101t\u1e5b is a subject that faces an object and employs a pram\u0101\u1e47a. But \u0101tman, as the final witness that is never itself witnessed, does not face objects \u2014 objects appear within it. Saying \"\u0101tman is the pram\u0101t\u1e5b\" is a vy\u0101vah\u0101rika approximation; the more precise statement is that \u0101tman is the s\u0101k\u1e63in (witness) \u2014 the luminous presence that makes all pram\u0101t\u1e5b-ship possible without itself being a pram\u0101t\u1e5b.\n\n## The Advaita Paradox: Who Has Brahma-J\u00f1\u0101na?\n\nAparok\u1e63a-anubh\u016bti (direct realization of \u0101tman-Brahman identity) is attributed to the j\u012bva \u2014 the mithy\u0101 empirical self \u2014 yet what it reveals is that the j\u012bva was never the ultimate pram\u0101t\u1e5b. This creates Advaita's central paradox:\n\n- If brahma-j\u00f1\u0101na is obtained by the j\u012bva (mithy\u0101 pram\u0101t\u1e5b), and brahma-j\u00f1\u0101na reveals the j\u012bva to be mithy\u0101, then the \"obtaining\" is itself part of the mithy\u0101 frame.\n- The text's answer (Vivekac\u016b\u1e0d\u0101ma\u1e47i vv.473\u2013479): brahma-j\u00f1\u0101na is described from within the vy\u0101vah\u0101rika framework as the j\u012bva's cognition; from the p\u0101ram\u0101rthika perspective, there was no j\u012bva-pram\u0101t\u1e5b to obtain anything \u2014 there was only Brahman, and the appearance of a j\u012bva-pram\u0101t\u1e5b obtaining liberation was the final moment of the adhy\u0101sa before its dissolution.\n- The language of \"the j\u012bva attains mok\u1e63a\" is vy\u0101vah\u0101rika necessity \u2014 the only language available \u2014 but it describes, from within, an event that dissolves the very subject doing the describing.\n\n## Pram\u0101t\u1e5b and the Problem of Kart\u1e5btva\n\nAdvaita carefully distinguishes:\n- **Pram\u0101t\u1e5btva** (being the cognitive subject): knowing, inferring, hearing\n- **Kart\u1e5btva** (agenthood): doing, acting, initiating\n- **Bhokt\u1e5btva** (experiencer-ship): enjoying, suffering\n\nAll three are attributed to the j\u012bva at the vy\u0101vah\u0101rika level. All three are removed by brahma-j\u00f1\u0101na. The \u0101tman is akart\u1e5b (non-agent), abhokt\u1e5b (non-experiencer), and, in the deepest sense, apram\u0101t\u1e5b (not-a-knower-in-the-subject-facing-object sense) \u2014 it is the ground of cognition, not a cognizer.\n\nThis is why the Bhagavad G\u012bt\u0101's teaching (3.27) \"gu\u1e47\u0101 gu\u1e47e\u1e63u vartante\" (the gu\u1e47as operate on gu\u1e47as) finds its epistemological parallel in Advaita: the anta\u1e25kara\u1e47a (constituted by the gu\u1e47as of prak\u1e5bti) does the cognizing; \u0101tman merely illumines the result. The attribution of cognition to \u0101tman is itself the root adhy\u0101sa.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the instrument employed by the pram\u0101t\u1e5b; pram\u0101\u1e47a and pram\u0101t\u1e5b are paired: the pram\u0101t\u1e5b is the user of the pram\u0101\u1e47a\n- [Pram\u0101](prama.md) \u2014 the valid cognition obtained by the pram\u0101t\u1e5b; the result of the pram\u0101t\u1e5b's successful use of pram\u0101\u1e47a on prameya\n- [Prameya](prameya.md) \u2014 the object cognized by the pram\u0101t\u1e5b; the third element of the triad\n- [Adhy\u0101sa](adhyasa.md) \u2014 the mechanism by which the vy\u0101vah\u0101rika pram\u0101t\u1e5b arises; the mutual superimposition of \u0101tman-consciousness and an\u0101tman-body that creates the appearance of a knowing subject facing known objects\n- [Avidy\u0101](avidya.md) \u2014 the deeper condition (nescience) that makes adhy\u0101sa-generated pram\u0101t\u1e5b-ship possible; without avidy\u0101, the superimposition that creates the apparent pram\u0101t\u1e5b could not arise\n- [Anubhava](anubhava.md) \u2014 the cognitive event produced by the pram\u0101t\u1e5b's pram\u0101\u1e47a-use; anubhava is the fresh, non-mnemonic cognition that is the pram\u0101t\u1e5b's epistemic output\n- [Aparok\u1e63a-anubh\u016bti](aparoksha-anubhuti.md) \u2014 the liberative recognition that dissolves the pram\u0101t\u1e5b's apparent self-standing reality; after aparok\u1e63a-anubh\u016bti, the pram\u0101t\u1e5b-structure continues at the vy\u0101vah\u0101rika level but the j\u012bvanmukta knows its mithy\u0101 status\n\n## Audience Metaphor\n\nConsider the projector in a cinema. The images appear on the screen \u2014 the movie's characters have conversations, make decisions, cognize and act. The projector-light makes all of them visible, but the light itself does not appear as a character on the screen. The movie's hero (the empirical pram\u0101t\u1e5b) is visible on the screen, knowledges things, makes inferences, hears testimony. The projector-light (\u0101tman-Brahman, pure cit) illumines all of it but is never itself the hero or subject of cognition in the story. The Advaita move: the hero in the story is the vy\u0101vah\u0101rika pram\u0101t\u1e5b \u2014 real at the movie level; the projector-light that makes the whole screen possible is the p\u0101ram\u0101rthika 'subject' that is not subject at all. Brahma-j\u00f1\u0101na is the recognition that you are the projector-light, not the hero.\n\n## Citations\n\n1. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) Introduction (Adhy\u0101sabh\u0101\u1e63ya) (\u015aa\u1e45kara) \u2014 the definitive Advaita text on how the pram\u0101t\u1e5b-prameya structure arises through adhy\u0101sa; \u015aa\u1e45kara's opening move: the entire empirical frame of subject-object cognition rests on the mutual superimposition (itaretar\u0101dhy\u0101sa) of \u0101tman (pure consciousness) and an\u0101tman (body-mind-world); the pram\u0101t\u1e5b is the product of this superimposition, not its ground\n2. [Tattvabodha](/references/tattvabodha.md) (attributed to \u015aa\u1e45kara) \u2014 pedagogical exposition of the pram\u0101\u1e47a-triad: the four elements pram\u0101t\u0101 (knower), pram\u0101\u1e47a (instrument), prameya (object), pram\u0101 (valid cognition); used in Advaita instruction to introduce the epistemological framework before the student's understanding of it is subsequently deconstructed by the p\u0101ram\u0101rthika analysis\n3. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.1 (Dharmar\u0101j\u0101dhvar\u012bndra) \u2014 systematic account of how the j\u012bva, operating through the anta\u1e25kara\u1e47a (inner organ: manas, buddhi, aha\u1e43k\u0101ra, citta), functions as the vy\u0101vah\u0101rika pram\u0101t\u1e5b; the anta\u1e25kara\u1e47a takes on the form (\u0101k\u0101ra) of the object cognized; consciousness (cit) illumines this modification and the cognition is the result\n4. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 6 (Vidy\u0101ra\u1e47ya) \u2014 the d\u1e5bg-d\u1e5b\u015bya-viveka (discrimination of seer from seen): at each level of the cognitive hierarchy (sensory objects \u2192 senses \u2192 mind \u2192 intellect \u2192 \u0101tman), what was previously the cognizing subject (d\u1e5bk) becomes the cognized object (d\u1e5b\u015bya) from the next higher perspective; the \u0101tman alone is never the d\u1e5b\u015bya \u2014 it is always the d\u1e5bk, the witness; this is the Advaita account of why the ultimate pram\u0101t\u1e5b cannot be an object", "concepts/prameya": "# Prameya \u2014 \u092a\u094d\u0930\u092e\u0947\u092f\n\n**Not:** thing (generic), fact or proposition, physical object only, phenomenon (Kantian), Brahman (as prameya\n\n**Prameya** is the known object \u2014 the third structural element of the pram\u0101\u1e47a-triad in Indian epistemology. The triad: pram\u0101t\u1e5b (knowing subject) + pram\u0101\u1e47a (instrument of valid cognition) + prameya (object to be known) \u2192 pram\u0101 (valid cognition). The prameya is the domain toward which a pram\u0101\u1e47a is directed; its correct cognition produces pram\u0101.\n\nEach pram\u0101\u1e47a has its own prameya-domain: pratyak\u1e63a (perception) cognizes present sensory objects; anum\u0101na (inference) cognizes entities accessible via their marks (li\u1e45gas); \u015babda (verbal testimony) cognizes the referents of valid speakers' words; upam\u0101na (comparison) cognizes similarity-relations; arth\u0101patti (postulation) cognizes unexpressed facts required to explain apparent incongruities; anupalabdhi (non-apprehension) cognizes absences (abh\u0101va). The premeya-domain of each pram\u0101\u1e47a defines what it is and is not competent to establish.\n\n## Etymology\n\nFrom Sanskrit *pra + m\u0101* (to cognize validly) + *-eya* (gerundive suffix: that which ought to be, that which is to be done or known). Literally: *prameya* = \"that which is to be known validly,\" or \"that which is the proper object of valid cognition.\" The gerundive form places prameya in relation to the epistemic act: it is defined by being available to a pram\u0101\u1e47a.\n\n## The Prameya-Domain of Each Pram\u0101\u1e47a (Advaita Six-Pram\u0101\u1e47a Framework)\n\n| Pram\u0101\u1e47a | Premeya-domain | Example |\n|---------|----
