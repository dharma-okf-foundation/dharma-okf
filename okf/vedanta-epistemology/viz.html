a transmission by removing doubts, just as it supports anum\u0101na by securing vy\u0101pti; the \u0101pta's word and tarka work together, neither alone sufficient for aparok\u1e63a-anubh\u016bti\n\n## Audience Metaphor\n\nImagine you need to know whether the mushroom you found in the woods is edible. You have three possible sources: (1) a general cookbook that lists edible mushrooms (book-knowledge, like Vedic testimony); (2) a mycologist who has directly examined thousands of mushrooms and can identify yours on sight (\u0101pta); (3) someone who heard from someone else that it's probably fine (hearsay). \u0100pta-v\u0101kya says: the mycologist's testimony has the highest epistemic force \u2014 not because of their title, but because they have direct knowledge (s\u0101k\u1e63\u0101tk\u0101ra) of the relevant domain and no incentive to mislead you. The cookbook has a different kind of authority (systematic, accumulated). Hearsay is the worst. Ny\u0101ya epistemology and Advaita's account of the guru both track the difference between these three: the guru is the mycologist of brahma-j\u00f1\u0101na.\n\n## Citations\n\n1. [Ny\u0101yas\u016btra](/references/nyaya-sutra.md) 1.1.7 \u2014 '\u0101ptopade\u015ba\u1e25 \u015babda\u1e25' \u2014 verbal testimony (\u015babda) is the instruction/communication (upade\u015ba) of an \u0101pta; this is the Ny\u0101ya definition of \u015babda as a pram\u0101\u1e47a; the pram\u0101\u1e47a-force of verbal testimony derives from the \u0101pta-status of the testifier\n2. [Ny\u0101yas\u016btra](/references/nyaya-sutra.md) 1.1.8 \u2014 'sa dvividho d\u1e5b\u1e63\u1e6d\u0101d\u1e5b\u1e63\u1e6d\u0101rthatv\u0101t' \u2014 \u0101pta-v\u0101kya is twofold: concerning seen (d\u1e5b\u1e63\u1e6da) matters (empirical facts that the \u0101pta directly observed, e.g., a physician's testimony about disease causation) and unseen (ad\u1e5b\u1e63\u1e6da) matters (meta-empirical facts not accessible to ordinary observation, e.g., dharma, after-life, Brahman's nature)\n3. V\u0101tsy\u0101yana, [Ny\u0101yabh\u0101\u1e63ya](/references/nyaya-bhasya.md) on NS 1.1.7 \u2014 the definition of \u0101pta: 's\u0101k\u1e63\u0101tk\u1e5btadharm\u0101 ya\u1e25 \u015bi\u1e63yahit\u0101ya icchay\u0101 yath\u0101d\u1e5b\u1e63\u1e6dam artham \u0101ca\u1e63\u1e6de sa \u0101pta\u1e25' \u2014 an \u0101pta is one who has directly realized the matter (s\u0101k\u1e63\u0101tk\u1e5btadharman), desires the student's benefit, and communicates the matter exactly as realized; three conditions: direct knowledge + benevolent intention + accurate communication\n4. [Ny\u0101yakusum\u0101\u00f1jali](/references/nyayakusumanjali.md) 4.1\u20134 (Udayana) \u2014 the argument for \u012a\u015bvara as supreme \u0101pta: (1) God has omniscience (sarvaj\u00f1atva) \u2014 direct knowledge of all matters; (2) God has no do\u1e63as (r\u0101ga, dve\u1e63a, moha are absent in a perfect being); (3) God has benevolent intention for all beings; therefore God's testimony (the Veda) satisfies all \u0101pta-conditions maximally; therefore Vedic authority is grounded in divine \u0101ptatva\n5. BSBh intro (\u015aa\u1e45kara) \u2014 Veda is not pauru\u1e63eya (not composed by any person); its authority is apauru\u1e63eya; this is why Vedic \u015babda is unconditionally authoritative in its domain; no person's reliability \u2014 even God's \u2014 is its epistemic ground; 'there is no possibility of the Vedas being the production of a person possessing defects' \u2014 but this is because they have *no* personal author, not because their author is *perfectly reliable*\n6. [Upade\u015bas\u0101hasr\u012b](/references/upadeshasahasri.md) 1.1.1\u20135 (\u015aa\u1e45kara) \u2014 the guru as the transmission medium for brahma-j\u00f1\u0101na: 'the teacher must be one who knows Brahman (brahmavid) and has the specific quality of being brahma-ni\u1e63\u1e6dha (established in Brahman)'; this is not \u0101pta-v\u0101kya for Veda but \u0101pta-qualification for the teacher who communicates the Vedic Mah\u0101v\u0101kya; the student needs both the Mah\u0101v\u0101kya itself (apauru\u1e63eya) and a qualified teacher who can convey it effectively (pauru\u1e63eya \u0101pta)", "concepts/arthapatti": "# Arth\u0101patti \u2014 \u0905\u0930\u094d\u0925\u093e\u092a\u0924\u094d\u0924\u093f\n\n**Not:** inference to the best explanation, abductive reasoning, postulation (as a general term), presumption, speculation\n\nArth\u0101patti is valid postulatory cognition \u2014 the knowledge that arises when two established facts (one witnessed, one learned) are incompatible under the available explanatory framework, and positing a third, unobserved fact is the only way to resolve the incompatibility. It is not speculation; it is necessitated by the tension between what is already known.\n\nThe classic example: Devadatta is known to be fat (*sth\u016bla\u1e25*) \u2014 this is witnessed. Devadatta is known to not eat during the day (*div\u0101 na bhu\u1e45kte*) \u2014 this is established by reliable testimony. Both facts are certain; both concern the same person. A fat person who does not eat during the day is inexplicable unless there is another time at which they eat. Arth\u0101patti produces the cognition: Devadatta eats at night. This is not a guess; it is forced.\n\n## Etymology\n\nFrom Sanskrit *artha* (meaning, object, purpose, fact) + *\u0101patti* (arising, occurrence, encounter \u2014 from root *\u0101pad*, to arrive at, fall into). The compound: the arising of meaning/fact; specifically, the arising of an explanatory posit forced by a known fact that is otherwise inexplicable (*anupapanna* \u2014 non-accounting).\n\nThe term *anupapatti* (non-accounting, inexplicability) is the trigger: when a known fact is *anupapanna* (cannot be accounted for) under the available framework, arth\u0101patti operates to posit what is required for *upapatti* (accounting, coherence).\n\n## The Precise Conditions for Arth\u0101patti\n\nArth\u0101patti is not triggered by any mystery or open question. It requires:\n\n1. **Two established facts** \u2014 not suspicions, not probabilities. One typically by pratyak\u1e63a (witnessed), one typically by \u015babda (reliably established through testimony or scripture).\n2. **A specific inexplicability** \u2014 the two facts are compatible only if a third fact obtains. The incompatibility is not vague but precise: *given that A is established and B is established, A and B can coexist only if C.*\n3. **A unique posit** \u2014 the postulated fact is not \"the best of several alternatives\" but the only one that resolves the specific incompatibility. If multiple posits could equally resolve the tension, arth\u0101patti has not been triggered; doubt or inference may be more appropriate.\n\n## Why Arth\u0101patti Is Not Anum\u0101na\n\nThe Ny\u0101ya school reduces arth\u0101patti to anum\u0101na. M\u012bm\u0101\u1e43s\u0101 (Kum\u0101rila Bha\u1e6d\u1e6da, \u015alokavarttika \u2014 Arth\u0101pattipariccheda) and Advaita (Dharmar\u0101ja Adhvarin, Ved\u0101ntaparibh\u0101\u1e63\u0101 Ch.5) insist the reduction fails. The argument:\n\n**Anum\u0101na requires vy\u0101pti** \u2014 an independently established invariable concomitance (wherever H, there is S). In the Devadatta case, what would the vy\u0101pti be? There is no general rule \"wherever a fat person doesn't eat during the day, they eat at night.\" The inference \"Devadatta eats at night\" does not flow from any pre-established vy\u0101pti. What drives the posit is the *incompatibility of two specific known facts*, not a general pervasive connection.\n\n**The direction of movement is different:** Anum\u0101na moves from a positive mark (smoke) to an inferred entity (fire) via positive concomitance. Arth\u0101patti moves from a tension between two positive facts to a third fact whose positing dissolves the tension. The logical structure is distinct: \"if not-C, then A-and-B are incompatible; A-and-B are established; therefore C.\"\n\nKum\u0101rila's further argument: if arth\u0101patti were anum\u0101na, the 'mark' (hetu) in the inference would be \"fatness of a person who doesn't eat in the daytime\" \u2014 but this is not a mark whose vy\u0101pti with \"eating at night\" has been independently observed. The Ny\u0101ya reduction would require a vy\u0101pti that has never been established and cannot be established.\n\n## Arth\u0101patti in Vedic Interpretation\n\nArth\u0101patti originates in M\u012bm\u0101\u1e43s\u0101 as a hermeneutic instrument. When a Vedic injunction and an observed fact appear to conflict, arth\u0101patti resolves the conflict by positing an implicit qualification.\n\nExample (M\u012bm\u0101\u1e43s\u0101): A Vedic passage says \"one who desires heaven should perform the agnihotra.\" Another passage says \"one should fast on ek\u0101da\u015b\u012b.\" If someone cannot both perform the agnihotra and fast simultaneously (the fast interrupts the agnihotra schedule), the two injunctions are in tension. Arth\u0101patti resolves: the agnihotra injunction is implicitly qualified \u2014 it applies except on ek\u0101da\u015b\u012b. The qualification is postulated (not stated) because it is the only way both injunctions can both hold.\n\n\u015aa\u1e45kara uses arth\u0101patti-type reasoning in the Brahmas\u016btra Bh\u0101\u1e63ya to reconcile Upani\u1e63adic statements that appear to attribute different natures to Brahman (saguna/nirgu\u1e47a; Brahman as creator/Brahman as pure consciousness). The resolution posits levels of discourse (vy\u0101vah\u0101rika / p\u0101ram\u0101rthika \u2014 see those files) as the unstated but necessary framework that makes both sets of statements coherent.\n\n## Arth\u0101patti and Brahman-Knowledge\n\nArth\u0101patti is a legitimate but indirect instrument in Advaita's approach to Brahman. Where pratyak\u1e63a and anum\u0101na cannot reach Brahman's nature, arth\u0101patti contributes by:\n\n- Exposing the *anupapatti* (inexplicability) of the manifest world if Brahman (or some non-material ground) is not posited \u2014 this is an arth\u0101patti-type argument toward the necessity of a conscious ground\n- Resolving textual tensions in \u015aruti through hermeneutic postulation\n\nBut arth\u0101patti is not a direct instrument for Brahman-knowledge \u2014 it relies on the tension between established facts to force its posit, and the facts of Brahman's intrinsic nature are not available as \"established facts\" that can create such tension. For direct Brahman-knowledge, \u015babda (\u015aruti) remains the primary instrument.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 arth\u0101patti is the fifth pram\u0101\u1e47a in the Advaita six-pram\u0101\u1e47a list\n- [Anum\u0101na](anumana.md) \u2014 the pram\u0101\u1e47a with which arth\u0101patti is most often conflated; Ny\u0101ya reduces arth\u0101patti here; M\u012bm\u0101\u1e43s\u0101 and Advaita resist the reduction\n- [Anupalabdhi](anupalabdhi.md) \u2014 the sixth Advaita pram\u0101\u1e47a; also contested as to independence from pratyak\u1e63a\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 sublation; the cognitive mechanism that establishes when a prior cognition must be revised; operates in tandem with arth\u0101patti in Vedic hermeneutics\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the pram\u0101\u1e47a that provides the 'established fact' component of arth\u0101patti in Vedic interpretive contexts\n\n## Audience Metaphor\n\nLike discovering that a student's exam score is top of the class, yet they never ask questions in class, never visit office hours, and claim to spend no extra time studying. Both facts are established. They cannot both be true under the assumption that performance tracks visible effort. The only escape from the contradiction: they study intensively in a setting you haven't observed. You haven't guessed \u2014 you've been forced by the two established facts to posit the one thing that makes both true.\n\n## Citations\n\n1. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.5 \u2014 Dharmar\u0101ja Adhvarin's analysis of arth\u0101patti as the fifth Advaita pram\u0101\u1e47a; definition and distinction from anum\u0101na\n2. [M\u012bm\u0101\u1e43s\u0101s\u016btra](/references/mimamsa-sutra.md) 1.1.5 \u2014 Jaimini on postulation in the context of Vedic interpretation; arth\u0101patti as the operative instrument when injunction and observed fact conflict\n3. [\u015alokavarttika](/references/slokavarttika.md) \u2014 Arth\u0101pattipariccheda \u2014 Kum\u0101rila Bha\u1e6d\u1e6da's extensive defence of arth\u0101patti as irreducible to anum\u0101na\n4. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.14 \u2014 \u015aa\u1e45kara's use of arth\u0101patti-type reasoning in reconciling apparently contradictory Upani\u1e63adic passages", "concepts/avidya": "# Avidy\u0101 \u2014 \u0905\u0935\u093f\u0926\u094d\u092f\u093e\n\n**Not:** ignorance (mere absence), error (correctable by reason), illusion (content), sin or moral deficiency, unconscious (psychoanalytic), m\u0101y\u0101 (as strict synonym)\n\n**Avidy\u0101** is the Advaita Ved\u0101nta term for **nescience** \u2014 the fundamental epistemological-ontological disorder that underlies all sa\u1e43s\u0101ra. Literally, avidy\u0101 is the negation of vidy\u0101 (knowledge, particularly brahma-vidy\u0101 \u2014 knowledge of Brahman). But in Advaita's technical usage, avidy\u0101 is not merely the absence of brahma-vidy\u0101; it is a *bh\u0101var\u016bpa* (positive-natured) distorting force \u2014 an active overlay that generates the appearance of the j\u012bva as a separate self in an independently-real world superimposed on non-dual Brahman.\n\nThe Adhy\u0101sabh\u0101\u1e63ya (\u015aa\u1e45kara's Brahmas\u016btra Bh\u0101\u1e63ya Introduction) places avidy\u0101 as the enabling condition for adhy\u0101sa: the mutual superimposition of \u0101tman and an\u0101tman that underlies all empirical activity rests on avidy\u0101. Everything within the vy\u0101vah\u0101rika frame \u2014 all pram\u0101\u1e47as, pram\u0101t\u1e5bs, premeyas, pram\u0101s \u2014 operates within the avidy\u0101-generated context of apparent duality. Brahma-j\u00f1\u0101na is the cognitive event that removes avidy\u0101 and with it the superimposed frame.\n\n## Etymology\n\n*A-vidy\u0101*: from *a-* (negation prefix) + *vidy\u0101* (knowledge, learning, science; from root *vid*, to know, to see). Literally: non-knowledge, non-seeing. The compound does not name simple ignorance (the gap where no knowledge has yet been acquired) but the active negation of vidy\u0101 by a distorting force \u2014 the overlay that prevents Brahman from being recognized as self-evident.\n\n## The Two Powers of Avidy\u0101\n\nThe Pa\u00f1cada\u015b\u012b (Vidy\u0101ra\u1e47ya) and subsequent Advaita literature analyze avidy\u0101 through its two operative powers (\u015baktis):\n\n**\u0100vara\u1e47a-\u015bakti (Veiling Power):** The power to conceal Brahman's nature. Brahman is described in Advaita as svaya\u1e43prak\u0101\u015ba (self-luminous) \u2014 inherently evident, requiring no proof of its existence. Yet the j\u012bva does not recognize Brahman as its own nature. \u0100vara\u1e47a-\u015bakti is the veiling that prevents this recognition. Without \u0101vara\u1e47a, Brahman's self-luminosity would be immediately apparent \u2014 the j\u012bva would spontaneously recognize \"I am Brahman.\" The veil is what makes this recognition non-obvious, creating the appearance that Brahman is distant, unknown, hidden.\n\n**Vik\u1e63epa-\u015bakti (Projecting Power):** The power to project apparent multiplicity onto non-dual Brahman. Not only does avidy\u0101 veil Brahman; it actively projects the appearance of a world of multiple, distinct, independently-existing entities \u2014 j\u012bvas, jagat, \u012a\u015bvara in the vy\u0101vah\u0101rika frame. The rope-snake analogy: \u0101vara\u1e47a corresponds to the poor lighting that makes the rope unrecognizable as rope; vik\u1e63epa corresponds to the positive production of the snake-appearance, which is not the rope and not a real snake but the positively-appearing result of the distorted perception.\n\n## Avidy\u0101's Paradoxical Nature\n\nAvidy\u0101 presents Advaita with its deepest internal puzzle. Several properties are simultaneously asserted:\n\n**Avidy\u0101 is an\u0101di (beginningless):** The question \"when did avidy\u0101 begin?\" is unanswerable: if you trace back any moment of the j\u012bva's experience, avidy\u0101 was already operative. There was no first moment of ignorance. This is why \u015aa\u1e45kara does not offer a genetic account of how avidy\u0101 arose from a prior state of brahma-j\u00f1\u0101na.\n\n**Avidy\u0101 is s\u0101di (with an end):** Although beginningless, avidy\u0101 ends \u2014 brahma-j\u00f1\u0101na removes it. It is *an\u0101di* but *s\u0101nta*: beginningless but terminable.\n\n**Avidy\u0101 is mithy\u0101 (not ultimately real):** From the p\u0101ram\u0101rthika standpoint, avidy\u0101 itself is mithy\u0101 \u2014 it has no ultimately real existence. It cannot be said to be real (sat) \u2014 because if it were real, it would be Brahman, but Brahman is pure knowledge; avidy\u0101 could not be Brahman. It cannot be said to be unreal (asat) \u2014 because the unreal has no effect; but avidy\u0101 clearly produces effects (the apparent world, sa\u1e43s\u0101ra). Therefore avidy\u0101 is *anirvacan\u012bya* \u2014 indescribable as either sat or asat; its ontological status is mithy\u0101.\n\n**Whose avidy\u0101?** If Brahman is the only reality and Brahman is pure knowledge (j\u00f1\u0101nasvar\u016bpa), who has avidy\u0101? If the j\u012bva has avidy\u0101, and the j\u012bva is mithy\u0101, then avidy\u0101 belongs to a mithy\u0101 entity. This is the *\u0101\u015braya-anupapatti* objection (the locus-impossibility objection). Advaita's typical response: the question arises from within the avidy\u0101-frame; avidy\u0101 is from the p\u0101ram\u0101rthika standpoint something that never ultimately existed; asking for its locus is like asking who the dreamer's dream-enemies work for when the dreamer wakes. The question dissolves with the removal of avidy\u0101.\n\n## Avidy\u0101 and the Pram\u0101\u1e47a Framework\n\nAvidy\u0101 underlies all vy\u0101vah\u0101rika cognition in a specific structural way:\n\n- The pram\u0101t\u1e5b (knowing subject) is constituted by the j\u012bva-identity produced by adhy\u0101sa, which rests on avidy\u0101.\n- The premeyas (objects of cognition) appear as independently real because avidy\u0101's vik\u1e63epa-\u015bakti projects their apparent separateness.\n- Even the pram\u0101s (valid cognitions) produced by the six pram\u0101\u1e47as occur within the avidy\u0101-frame: \"this fire is hot\" is a valid pram\u0101 at the vy\u0101vah\u0101rika level, but it occurs within the context \"and this fire is an independently-real entity facing me as a separate self\" \u2014 which is the avidy\u0101-generated context.\n\nThe pram\u0101\u1e47as produce pram\u0101s that are valid within their domains (vy\u0101vah\u0101rika validity \u2014 see svatahpramanya.md). Avidy\u0101 does not make these pram\u0101s false at the vy\u0101vah\u0101rika level. It is the *background context* \u2014 the frame within which all vy\u0101vah\u0101rika pram\u0101-generation occurs \u2014 that is itself the product of avidy\u0101.\n\n## Removal of Avidy\u0101: Brahma-J\u00f1\u0101na\n\nBrahma-j\u00f1\u0101na (specifically aparok\u1e63a-anubh\u016bti \u2014 see aparoksha-anubhuti.md) removes avidy\u0101. The mechanism: the Mah\u0101v\u0101kya-\u015babda, through \u015brava\u1e47a-manana-nididhy\u0101sana, produces the direct recognition of \u0101tman-Brahman identity. This recognition b\u0101dhita-s (sublates) the fundamental adhy\u0101sa \u2014 and with the adhy\u0101sa, its enabling condition (avidy\u0101) is removed.\n\nAfter avidy\u0101-removal (j\u012bvanmukti):\n- The j\u012bvanmukta no longer identifies as a separate self in an independently-real world.\n- The pram\u0101\u1e47as continue to operate at the vy\u0101vah\u0101rika level (fire still burns; the j\u012bvanmukta still uses inference and perception).\n- But the avidy\u0101-generated context \u2014 \"I am a finite j\u012bva facing a real world\" \u2014 is dissolved.\n- Pr\u0101rabdha-karma (karma already set in motion) exhausts itself through the continuance of the body-mind; at death, videhamukti (liberation after the body) is complete.\n\n---\n\n## CRITICAL CROSS-BUNDLE NOTICE: Avidy\u0101 in Yoga-Dar\u015bana vs. Advaita Ved\u0101nta\n\n*(Mandated by bundle weight_shifts: avidya.md requires explicit cross-bundle markers to yoga-dar\u015bana before the file is considered complete.)*\n\nThe term **avidy\u0101** appears prominently in both Advaita Ved\u0101nta and the Yoga-dar\u015bana (P\u0101ta\u00f1jala tradition). The similarity of terminology conceals a deep architectural difference. AI agents must not conflate them.\n\n---\n\n### Yoga-Dar\u015bana Avidy\u0101 (Yogas\u016btra 2.3\u20132.5)\n\n**The S\u0101\u1e43khya-Yoga Framework (Dualist):** P\u0101ta\u00f1jala Yoga operates on the S\u0101\u1e43khya metaphysical base: *puru\u1e63a* (pure consciousness, plural, eternal, inactive) is eternally distinct from *prak\u1e5bti* (primordial matter, single, active, constituted by three gu\u1e47as). The j\u012bva's bondage is constituted by puru\u1e63a's apparent identification with the modifications of prak\u1e5bti (citta-v\u1e5bttis). Liberation (*kaivalya*) is the isolation (kaivalya = aloneness) of puru\u1e63a from prak\u1e5bti \u2014 the two are separated; they were always different.\n\n**Yogas\u016btra 2.3:** *avidy\u0101-asmit\u0101-r\u0101ga-dve\u1e63a-abhinive\u015b\u0101\u1e25 pa\u00f1ca kle\u015b\u0101\u1e25* \u2014 the five kle\u015bas (afflictions/distortions): avidy\u0101, asmit\u0101 (I-sense), r\u0101ga (attraction), dve\u1e63a (aversion), abhinive\u015ba (clinging to existence).\n\n**Yogas\u016btra 2.4:** *avidy\u0101 k\u1e63etram uttare\u1e63\u0101\u1e43 prasuptatanu-vicchinnod\u0101r\u0101\u1e47\u0101\u1e43* \u2014 avidy\u0101 is the field (k\u1e63etra) of the other kle\u015bas, which exist in dormant, attenuated, interrupted, or fully active states.\n\n**Yogas\u016btra 2.5:** *anity\u0101-a\u015buci-du\u1e25kha-an\u0101tmasu nitya-\u015buci-sukha-\u0101tma-khy\u0101tir avidy\u0101* \u2014 avidy\u0101 is defined as: taking the impermanent as permanent, the impure as pure, the painful as pleasurable, the non-self (an\u0101tman) as self (\u0101tman).\n\n**Yoga avidy\u0101 = puru\u1e63a-prak\u1e5bti confusion:** The fundamental Yoga avidy\u0101 is the confusion of puru\u1e63a (the real Self \u2014 eternal, unchanging, pure witness) with the citta (the mind-matrix, which is part of prak\u1e5bti). The j\u012bva's bondage is constituted by puru\u1e63a's apparent reflection in citta \u2014 as if pure light were confused with the cloudy water that reflects it.\n\n**Removal:** The Yogic path (eight-limbed, R\u0101ja Yoga; viveka-khy\u0101ti \u2014 discriminating insight) isolates puru\u1e63a from prak\u1e5bti through meditative absorption and sustained discriminating awareness. The result: *kaivalya* \u2014 puru\u1e63a stands alone, isolated from prak\u1e5bti.\n\n---\n\n### Advaita Ved\u0101nta Avidy\u0101 (\u015aa\u1e45kara)\n\n| Feature | **Yoga Avidy\u0101** | **Advaita Avidy\u0101** |\n|---------|----------------|--------------------|\n| **Metaphysical base** | Dualist S\u0101\u1e43khya: puru\u1e63a \u2260 prak\u1e5bti (eternally distinct) | Non-dual: Brahman = the only reality; j\u012bva and jagat are mithy\u0101 |\n| **Definition** | Mistaking an\u0101tman for \u0101tman; puru\u1e63a-prak\u1e5bti confusion | Non-recognition of Brahman; superimposition of j\u012bva-world duality on Brahman |\n| **What it veils** | The pure isolation of puru\u1e63a from prak\u1e5bti | Brahman's nature as the sole non-dual reality |\n| **What it projects** | The apparent identification of consciousness with mind-modifications | The apparent independent reality of j\u012bva, jagat, \u012a\u015bvara |\n| **Removal method** | Viveka-khy\u0101ti (discriminating awareness) through eight-limbed Yoga | Brahma-j\u00f1\u0101na through \u015brava\u1e47a-manana-nididhy\u0101sana (Mah\u0101v\u0101kya-\u015babda) |\n| **Result of removal** | Kaivalya: puru\u1e63a isolated, alone; the plural puru\u1e63as remain distinct | Mok\u1e63a / j\u012bvanmukti: recognition that j\u012bva = Brahman; non-duality confirmed |\n| **Ontological valence of release** | The many puru\u1e63as each attain their individual kaivalya; prak\u1e5bti remains (just unseen by the liberated puru\u1e63a) | There is only Brahman; mok\u1e63a is the recognition that there never was a separate j\u012bva to be liberated |\n\n### The Critical Distinction\n\nYoga avidy\u0101 is the confusion of two things that are eternally real and eternally different (puru\u1e63a and prak\u1e5bti). Liberation is their correct discrimination \u2014 the recognition that they were always separate.\n\nAdvaita avidy\u0101 is the non-recognition that there is only one thing (Brahman). Liberation is not the separation of two entities but the recognition that the apparent two was always one.\n\nAn AI agent that conflates these will produce statements like \"Yoga liberation and Advaita mok\u1e63a are the same thing reached by different paths\" \u2014 which is incorrect. The goal-states are architecturally different: kaivalya maintains the reality of puru\u1e63a-prak\u1e5bti (separate); Advaita mok\u1e63a reveals only Brahman (non-separate, non-dual).\n\n---\n\n## Cross-References\n- [Adhy\u0101sa](adhyasa.md) \u2014 the mechanism that avidy\u0101 enables; adhy\u0101sa is the product of avidy\u0101; avidy\u0101 is the condition that makes adhy\u0101sa possible; the two are causally paired: removing avidy\u0101 removes adhy\u0101sa\n- [Mithy\u0101](mithya.md) \u2014 avidy\u0101's ontological status: avidy\u0101 is itself mithy\u0101 \u2014 anirvacan\u012bya (cannot be described as either sat or asat); like the world it generates, it is neither real nor unreal\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 brahma-j\u00f1\u0101na b\u0101dhita-s the adhy\u0101sa produced by avidy\u0101; the b\u0101dha-chain culminates in the removal of avidy\u0101 itself\n- [J\u00f1\u0101na](jnana.md) \u2014 brahma-j\u00f1\u0101na is the cognitive event that removes avidy\u0101; j\u00f1\u0101na is the only means of mok\u1e63a because avidy\u0101 (the cause of bondage) can only be removed by its opposite \u2014 true knowledge\n- [Aparok\u1e63a-anubh\u016bti](aparoksha-anubhuti.md) \u2014 the immediate recognition that constitutes genuine brahma-j\u00f1\u0101na; the form of j\u00f1\u0101na that actually removes avidy\u0101 (as distinguished from parok\u1e63a understanding-about, which does not)\n- [Pram\u0101](prama.md) \u2014 all vy\u0101vah\u0101rika pram\u0101s occur within the avidy\u0101-generated context of apparent duality; avidy\u0101 does not make them invalid at the vy\u0101vah\u0101rika level but constitutes the superimposed frame within which they arise\n- [Pram\u0101t\u1e5b](pramata.md) \u2014 the vy\u0101vah\u0101rika pram\u0101t\u1e5b (j\u012bva) is constituted by avidy\u0101 through adhy\u0101sa; the apparent subject of cognition is the product of avidy\u0101's superimposition\n\n## Audience Metaphor\n\nAvidy\u0101 is like tinted glass in every window of the building you live in. You can see the world through every window \u2014 the trees, the street, the sky \u2014 and the world appears as it appears. You can perform every epistemic act: look, compare, reason, remember. But everything is seen through the tint. The tint is not a particular wrong belief about a specific tree or street \u2014 it is the medium through which all the trees and streets are seen. Ordinary learning (pram\u0101\u1e47a-acquisition) gives you better maps of what you see through the tinted windows. Brahma-j\u00f1\u0101na is the recognition that the glass is tinted \u2014 and that the recognition itself dissolves the tint, because what was always beyond the glass was the light that was also always the light within you.\n\n## Citations\n\n1. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) Introduction [Adhy\u0101sabh\u0101\u1e63ya] (\u015aa\u1e45kara) \u2014 the foundational Advaita text on avidy\u0101's role; \u015aa\u1e45kara's opening analysis of adhy\u0101sa rests on avidy\u0101 as the enabling condition; all empirical activity \u2014 pram\u0101\u1e47as, pram\u0101t\u1e5b, prameya \u2014 occurs within the avidy\u0101-frame of the apparent subject-object duality; brahma-j\u00f1\u0101na removes avidy\u0101 and with it the frame\n2. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.14\u20131.18 (Vidy\u0101ra\u1e47ya) \u2014 systematic treatment of avidy\u0101's two powers: \u0101vara\u1e47a-\u015bakti (the power to veil Brahman's nature, producing the appearance that Brahman is not self-evident) and vik\u1e63epa-\u015bakti (the power to project multiplicity \u2014 the world, j\u012bva, \u012a\u015bvara \u2014 onto the non-dual Brahman); these two powers are the operational mechanism of avidy\u0101\n3. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv.147\u2013150 (\u015aa\u1e45kara) \u2014 avidy\u0101 described as an\u0101di (beginningless; cannot be traced to a first moment), as bh\u0101var\u016bpa (positive-natured, not mere absence), and as nir\u016bpyam\u0101\u1e47\u0101 astitva-abh\u0101va (cannot be established as either real or unreal \u2014 it is mithy\u0101 in the same sense as the world it produces)\n4. Yogas\u016btra 2.3\u20132.5 (Pata\u00f1jali) \u2014 the Yoga-dar\u015bana account of avidy\u0101 as root kle\u015ba; cited here specifically for the Cross-Bundle Notice; Pata\u00f1jali's definition (YS 2.5): anitye nitya-bhrama\u1e25, a\u015buci \u015buci-bhrama\u1e25, du\u1e25khe sukha-bhrama\u1e25, an\u0101tmani \u0101tma-bhrama\u1e25 \u2014 mistaking the impermanent for permanent, impure for pure, painful for pleasurable, non-self for self; this is architecturally different from Advaita avidy\u0101 (see below)", "concepts/badha-badhita": "# B\u0101dha / B\u0101dhita \u2014 \u092c\u093e\u0927 / \u092c\u093e\u0927\u093f\u0924\n\n**Not:** refutation, contradiction, falsification (Popperian), overriding belief (epistemological belief revision), negation (logical), cancellation (as sufficient)\n\n**B\u0101dha** is the cognitive-ontological event of sublation \u2014 the cancellation of a prior erroneous cognition by a more adequate one that reveals the substratum. **B\u0101dhita** is the result \u2014 the sublated cognition or its apparent object, now revealed to have been a mithy\u0101 appearance rather than an independent reality. Together, b\u0101dha (the act) and b\u0101dhita (the sublated) define the most precise criterion for mithy\u0101 in Advaita Ved\u0101nta.\n\nThe technical definition (Ved\u0101ntas\u0101ra 55\u201357, Sad\u0101nanda):\n\n> *Mithy\u0101tva\u1e43 traik\u0101lika-b\u0101dha-pratiyogitva\u1e43*\n> Mithy\u0101tva (the property of being mithy\u0101) is being the counterpositive of sublation at all three times.\n\nWhat can be sublated \u2014 what *is* the counterpositive of a (possible or actual) b\u0101dha \u2014 is mithy\u0101. What cannot be sublated at any time in any state is p\u0101ram\u0101rthika. This is the formal definition that ties b\u0101dha to the entire three-level ontology.\n\n## The Structure of B\u0101dha\n\nEvery b\u0101dha event has three moments:\n\n| Moment | What happens | Example (snake-rope) | Example (world-Brahman) |\n|--------|-------------|---------------------|------------------------|\n| **Prior cognition** | An erroneous cognition of an apparent object | \"This is a snake\" | \"I am a body-mind in a real, independent world\" |\n| **Corrective cognition** | A more adequate cognition that reveals the substratum | \"This is a rope\" (on seeing properly) | Brahma-j\u00f1\u0101na \u2014 \"I am Brahman\" (via Mah\u0101v\u0101kya) |\n| **B\u0101dha** | The prior cognition is cancelled; the apparent object's claim to independent reality collapses | The snake-appearance dissolves; no snake remains | The world's apparent independent reality is dissolved; Brahman alone remains |\n\nThe essential feature of genuine b\u0101dha: **the substratum (adhi\u1e63\u1e6dh\u0101na) persists unchanged through the event.** The rope was always the rope. Brahman was always Brahman. The b\u0101dhita object (snake, world-as-independent) was never an independent reality \u2014 it was an appearance *in* the substratum.\n\n## Etymology\n\n*B\u0101dha* \u2014 from Sanskrit root *b\u0101dh*, to obstruct, to trouble, to cancel, to invalidate. In the verbal form, *b\u0101dhate* means \"obstructs,\" \"cancels,\" \"invalidates.\" In epistemological usage, it refers to the invalidating of a prior cognition by a subsequent one.\n\n*B\u0101dhita* \u2014 past passive participle of *b\u0101dh*: that which has been cancelled, sublated, invalidated. The b\u0101dhita object is not destroyed (that would be *na\u1e63\u1e6da*) \u2014 it is revealed to have been a mithy\u0101 appearance.\n\n*B\u0101dhyatva* \u2014 the abstract property of being b\u0101dhya (sublatable). This is the property that defines mithy\u0101: what is b\u0101dhya is not absolutely real.\n\n## B\u0101dha at Each Ontological Level\n\nThe three-level ontology is constituted precisely by differential b\u0101dhyatva:\n\n| Level | Term | B\u0101dhita by | What persists |\n|-------|------|-----------|---------------|\n| Apparent | Pr\u0101tibh\u0101sika | Ordinary corrective cognition (better light, waking from dream) | The vy\u0101vah\u0101rika substratum (rope, waking world) |\n| Empirical | Vy\u0101vah\u0101rika | Brahma-j\u00f1\u0101na alone (liberation) | P\u0101ram\u0101rthika Brahman |\n| Absolute | P\u0101ram\u0101rthika | Nothing \u2014 trik\u0101l\u0101b\u0101dhita | N/A \u2014 no substratum above Brahman |\n\nThis table is the three-level ontology *read as a b\u0101dha-hierarchy*. Vidy\u0101ra\u1e47ya (Pa\u00f1cada\u015b\u012b 1.7\u20139) generates the three-level taxonomy by asking: what b\u0101dhita-s this level, and what remains after? The answers define each level.\n\n## B\u0101dha and the Snake-Rope Example\n\nThe canonical illustration of b\u0101dha at the pr\u0101tibh\u0101sika level:\n\n1. **Before b\u0101dha:** The observer sees a snake in the rope. The snake-cognition is a real cognitive event \u2014 producing fear, behavioral response, real experience.\n2. **The b\u0101dha event:** Better light; the observer looks carefully. \"It is a rope.\"\n3. **After b\u0101dha:**\n   - The snake-cognition is *b\u0101dhita* \u2014 it is cancelled; the snake is recognized as never having been real as an independent entity.\n   - The rope (substratum) is revealed: it was always a rope; it was never a snake; it was not changed by the snake-appearance.\n   - The snake does not receive a new truth-value of 'false' \u2014 it is recognized as *mithy\u0101*: it had the appearance of reality while appearing, and its substratum (the rope) is real, but the snake itself as an independent entity was never there.\n\nThe snake-rope b\u0101dha is not: (a) logical refutation of the snake-proposition; (b) scientific falsification of a snake-hypothesis; (c) belief revision upon receiving new evidence. It is the *revelation of the substratum* by a corrective cognition.\n\n## B\u0101dha and Adhy\u0101sa\n\nB\u0101dha is the *removal* of what adhy\u0101sa imposed. The structural relationship:\n\n- **Adhy\u0101sa** (superimposition): snake-properties are imposed on the rope; \u0101tman-properties are imposed on an\u0101tman (body-mind); the world is misidentified as independently real.\n- **B\u0101dha** (sublation): the corrective cognition removes the superimposition; rope is seen as rope; Brahman is recognized as Brahman; the world's independent-reality status collapses.\n\nThe two concepts are causally paired: adhy\u0101sa creates the mithy\u0101 appearance; b\u0101dha dissolves it. This is why the Brahmas\u016btra Bh\u0101\u1e63ya opens with the Adhy\u0101sa-Bh\u0101\u1e63ya \u2014 because \u015aa\u1e45kara's entire enterprise is to identify what is superimposed (adhyasta) and specify what will remove the superimposition (b\u0101dha). The philosophical goal of Advaita is precisely the b\u0101dha of the root adhy\u0101sa (the identification of self with body-mind-world complex).\n\n## B\u0101dha at the Liberation Level\n\nThe highest application of b\u0101dha is the removal of the fundamental avidy\u0101 (nescience) that generates the vy\u0101vah\u0101rika appearance:\n\n- **What is b\u0101dhita:** The apparent independent reality of the world and the individuality of the j\u012bva \u2014 the deep \"I am a finite being in a real external world\" identification.\n- **What produces the b\u0101dha:** Brahma-j\u00f1\u0101na \u2014 the direct recognition \"aham brahm\u0101smi\" (I am Brahman) or \"tat tvam asi\" (that you are), delivered by Mah\u0101v\u0101kyas and internalized through \u015brava\u1e47a (hearing), manana (reflection), nididhy\u0101sana (meditation).\n- **What remains after b\u0101dha:** Nirgu\u1e47a Brahman \u2014 unchanged, self-luminous, as it always was; the \"I am a finite being\" was the snake; Brahman is the rope.\n- **What does not happen:** The world does not literally disappear for the j\u012bvanmukta. The j\u012bvanmukta still sees the world \u2014 but the identification (\"this world is independently real and I am a separate entity within it\") is b\u0101dhita. The j\u012bvanmukta sees the snake but knows it is a rope.\n\n## B\u0101dhyatva as the Criterion for Mithy\u0101\n\nThe Ved\u0101ntas\u0101ra definition \u2014 mithy\u0101tva = traik\u0101lika-b\u0101dha-pratiyogitva \u2014 encodes an important logical structure:\n\nA thing is mithy\u0101 if and only if there is a possible (actual or counterfactual) b\u0101dha of which it would be the counterpositive \u2014 i.e., if a b\u0101dha-event would reveal it to have been a mithy\u0101 appearance.\n\nThis captures:\n- **The snake** is mithy\u0101 because the rope-cognition b\u0101dhita-s it.\n- **The world** is mithy\u0101 because brahma-j\u00f1\u0101na b\u0101dhita-s its apparent independent reality.\n- **The sky-lotus** (\u0101k\u0101\u015ba-pu\u1e63pa \u2014 a flower in the sky, the classic asat example) is not mithy\u0101 but asat \u2014 it is not sublated; it never had even apparent reality.\n- **Brahman** is not mithy\u0101 \u2014 no b\u0101dha is possible for it; it is trik\u0101l\u0101b\u0101dhita.\n\nThe criterion thus carves out the middle category between sat (p\u0101ram\u0101rthika) and asat (absolute non-being) \u2014 which is exactly the logical space that mithy\u0101 occupies.\n\n## What B\u0101dha Is Not\n\nThree common confusions to block:\n\n**B\u0101dha \u2260 The object ceasing to exist:** After the b\u0101dha of the snake, the rope still exists. After brahma-j\u00f1\u0101na, the world still appears to the j\u012bvanmukta. B\u0101dha cancels the *claim to independent reality*, not the appearance itself. The appearance continues in the substratum; only the misidentification is dissolved.\n\n**B\u0101dha \u2260 Logical defeat in debate:** The Ny\u0101ya concept of *b\u0101dhita-anum\u0101na* (a defeated inference \u2014 one whose conclusion is cancelled by a perceptual counter-instance) is a different, narrower use of the same root. The Advaita use is broader and ontological: it applies to the cognitive event by which any level of mithy\u0101 reality is superseded by revelation of a higher substratum.\n\n**B\u0101dha \u2260 The sublating cognition being infallible:** The rope-cognition can itself be subsequently b\u0101dhita (the rope is itself vy\u0101vah\u0101rika and mithy\u0101 from the p\u0101ram\u0101rthika standpoint). Each b\u0101dha reveals a substratum, but the substratum at each level is itself potentially b\u0101dhya at the next level. Only the ultimate substratum \u2014 Brahman \u2014 is trik\u0101l\u0101b\u0101dhita. This is the cascade structure of the Advaita ontology read through b\u0101dha.\n\n## Cross-References\n- [Mithy\u0101](mithya.md) \u2014 mithy\u0101tva is formally defined via b\u0101dhyatva; the two are co-defined; to understand mithy\u0101 is to understand b\u0101dha\n- [Adhy\u0101sa](adhyasa.md) \u2014 b\u0101dha is the removal of adhy\u0101sa; paired concepts governing the structure of error and its correction in Advaita\n- [Pr\u0101tibh\u0101sika](pratibhasika.md) \u2014 the level at which b\u0101dha is most immediately visible; snake-rope is the paradigm b\u0101dha event\n- [Vy\u0101vah\u0101rika](vyavaharika.md) \u2014 the level whose apparent independent reality is b\u0101dhita by brahma-j\u00f1\u0101na; vy\u0101vah\u0101rika reality persists after b\u0101dha as appearance\n- [P\u0101ram\u0101rthika](paramarthika.md) \u2014 the trik\u0101l\u0101b\u0101dhita level; what b\u0101dha always reveals and what no b\u0101dha can touch\n- [Vivartav\u0101da](vivartavada.md) \u2014 vivartav\u0101da explains *why* the world is b\u0101dhya: because it is a vivarta (appearance) on an unchanged Brahman, not a real pari\u1e47\u0101ma; b\u0101dha-structure requires vivartav\u0101da as its cosmological ground\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 the self-validity of knowledge; in Advaita, the corrective cognition that produces b\u0101dha (brahma-j\u00f1\u0101na) is itself svata\u1e25pr\u0101m\u0101\u1e47ya \u2014 self-certifying, not requiring external validation\n\n## Audience Metaphor\n\nYou are looking at a photograph on your wall. In dim light you are convinced it is a window \u2014 you reach out to open it. Then you turn on the lamp. The window-cognition is b\u0101dhita: it does not crumble logically, it is not refuted by a counter-argument, it is not falsified by a scientific test. The wall is simply revealed. The wall was always there \u2014 your window-cognition was an appearance *in* the wall, not a product of the wall. The wall emerges from the episode unchanged. That is b\u0101dha: a prior cognition of a mithy\u0101 object is cancelled by a revealing cognition, while the substratum (the wall \u2014 or ultimately, Brahman) stands revealed as what was always really there. The sublated (b\u0101dhita) object \u2014 the window \u2014 was real enough to make you reach out; but it was not real in the way the wall is real.\n\n## Citations\n\n1. [Ved\u0101ntas\u0101ra](/references/vedantasara.md) 55\u201357 (Sad\u0101nanda) \u2014 the technical definition of mithy\u0101tva as traik\u0101lika-b\u0101dha-pratiyogitva: being that which is the counterpositive (pratiyogin) of sublation (b\u0101dha) across all three times (trik\u0101la); the world is mithy\u0101 because it will be b\u0101dhita by brahma-j\u00f1\u0101na; this is the most formally precise statement of the b\u0101dha-criterion\n2. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.1 Introduction \u2014 the opening bh\u0101\u1e63ya (\u015aa\u1e45kara's Adhy\u0101sa-Bh\u0101\u1e63ya): definition of adhy\u0101sa and analysis of how correct cognition (samyag-j\u00f1\u0101na) b\u0101dhita-s the superimposition; this is the foundational text for the b\u0101dha-analysis of adhy\u0101sa\n3. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.7\u20139 (Vidy\u0101ra\u1e47ya) \u2014 three-level ontology explicitly defined by differential b\u0101dhyatva: pr\u0101tibh\u0101sika is sublated by corrective perception; vy\u0101vah\u0101rika is sublated by brahma-j\u00f1\u0101na; p\u0101ram\u0101rthika Brahman is b\u0101dhya by nothing (trik\u0101l\u0101b\u0101dhita); b\u0101dhyatva is the principle that separates all three levels", "concepts/jnana": "# J\u00f1\u0101na \u2014 \u091c\u094d\u091e\u093e\u0928\n\n**Not:** knowledge (generic English), belief (JTB sense), enlightenment (generic cross-traditional), mystical experience, understanding or conceptual grasp, consciousness (used as synonym for j\u00f1\u0101na), j\u00f1\u0101na-yoga (G\u012bt\u0101 usage without qualification)\n\nIn Advaita Ved\u0101nta's epistemological framework, **j\u00f1\u0101na** in its philosophically decisive sense is *brahma-j\u00f1\u0101na* or *\u0101tma-j\u00f1\u0101na* \u2014 the direct, non-mediated recognition of the identity of \u0101tman (pure witness-consciousness) and Brahman (pure awareness, the sole reality). This is not knowledge of a new object but the removal of the cognitive superimposition (*adhy\u0101sa*) that produced the apparent duality of knower and known. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv.56\u201357 defines what brahma-j\u00f1\u0101na establishes: *brahma satyam* (Brahman alone is real), *jagan mithy\u0101* (the world is mithy\u0101), *j\u012bvo brahmaiva n\u0101para\u1e25* (the j\u012bva is Brahman and nothing else).\n\nBrahma-j\u00f1\u0101na is Advaita Ved\u0101nta's answer to the soteriological question: what removes sa\u1e43s\u0101ra? Not karma (action), which operates within the vy\u0101vah\u0101rika frame and cannot remove what produced that frame; not up\u0101san\u0101 (meditation), which refines the mind but leaves the knower-known structure intact. Only j\u00f1\u0101na \u2014 specifically the direct recognition delivered by Mah\u0101v\u0101kyas via the three-stage process of \u015brava\u1e47a (hearing), manana (reflection), and nididhy\u0101sana (contemplation) \u2014 dissolves the root avidy\u0101 (ignorance-superimposition) from which sa\u1e43s\u0101ra arises.\n\n## Ordinary J\u00f1\u0101na vs. Brahma-J\u00f1\u0101na\n\nJ\u00f1\u0101na is a general Sanskrit term for any cognition or knowledge. In the pram\u0101\u1e47a framework, every pram\u0101\u1e47a produces a j\u00f1\u0101na (a cognition). The vedanta-epistemology bundle uses j\u00f1\u0101na in a technically restricted sense that must be distinguished from the general usage:\n\n| Feature | **Ordinary j\u00f1\u0101na** (pram\u0101\u1e47a-result) | **Brahma-j\u00f1\u0101na** (liberative recognition) |\n|---------|------------------------------------|--------------------------------------------|\n| **Object** | An empirical object (pot, fire, mountain) | Brahman \u2014 but Brahman as the knower's own self, not an external object |\n| **Level** | Vy\u0101vah\u0101rika | Aims at p\u0101ram\u0101rthika; dissolves the vy\u0101vah\u0101rika-p\u0101ram\u0101rthika structure from within |\n| **Instrument** | Any of the six pram\u0101\u1e47as | \u015aabda (Mah\u0101v\u0101kyas of the Upani\u1e63ads) alone |\n| **Structure** | Subject cognizes object \u2014 duality intact | Recognition removes subject-object structure \u2014 non-dual |\n| **Result** | A pram\u0101 (veridical cognition) \u2014 adds information to a mind | Mok\u1e63a \u2014 removes the adhy\u0101sa that made the mind a knower of objects |\n| **Reversibility** | Cognitions can be b\u0101dhita | Brahma-j\u00f1\u0101na, once genuine, is not b\u0101dhita; the substratum recognized is trik\u0101l\u0101b\u0101dhita |\n| **Type** | Parok\u1e63a (mediated, representational) | Aparok\u1e63a (immediate, direct \u2014 see aparoksha-anubhuti.md) |\n\n## Etymology\n\nFrom Sanskrit root *j\u00f1\u0101* (to know, to cognize, to recognize \u2014 related to Greek *gn\u014dsis*, Latin *gnoscere*, English *know*). The root denotes cognitive access or recognition. *J\u00f1\u0101na* is the noun: cognition, knowledge, the act or result of knowing.\n\nIn compound: *brahma-j\u00f1\u0101na* (knowledge/recognition of Brahman); *\u0101tma-j\u00f1\u0101na* (knowledge/recognition of the self \u2014 identical with brahma-j\u00f1\u0101na given \u0101tman = Brahman); *\u0101tma-vidy\u0101* (the science of the self \u2014 used interchangeably); *brahma-vidy\u0101* (the science of Brahman).\n\nThe Brahmas\u016btra opens with *ath\u0101to brahma-jij\u00f1\u0101s\u0101* \u2014 \"and now, therefore, the desire to know Brahman (*brahma-jij\u00f1\u0101s\u0101*).\" The desire for j\u00f1\u0101na, not for power or pleasure, is Ved\u0101nta's starting point. The choice of *jij\u00f1\u0101s\u0101* (desiderative of *j\u00f1\u0101*) signals that the entire Ved\u0101ntic enterprise is directed at a specific cognitive event \u2014 brahma-j\u00f1\u0101na \u2014 that has not yet occurred but is the goal.\n\n## J\u00f1\u0101na and the Pram\u0101\u1e47a Structure\n\nIn the ordinary pram\u0101\u1e47a model, every valid cognition is produced by the interaction of a pram\u0101t\u0101 (knower), a pram\u0101\u1e47a (instrument), and a prameya (object). The cognition is a pram\u0101 \u2014 a veridical apprehension of the object's properties.\n\nBrahma-j\u00f1\u0101na exceeds this structure in a critical way:\n\n**The problem of making Brahman an object:** The six pram\u0101\u1e47as (pratyak\u1e63a, anum\u0101na, etc.) operate by presenting an object to a subject. But Brahman is not an object separate from the knowing subject \u2014 Brahman *is* the subject (\u0101tman). To know Brahman via pratyak\u1e63a or anum\u0101na would presuppose a knower standing outside Brahman looking at it, which contradicts Brahman's non-dual nature. No ordinary pram\u0101\u1e47a can reach Brahman-as-subject.\n\n**\u015aabda as the unique instrument:** The one pram\u0101\u1e47a capable of delivering brahma-j\u00f1\u0101na is *\u015babda* \u2014 specifically the Mah\u0101v\u0101kyas of the apauru\u1e63eya Upani\u1e63ads. The Mah\u0101v\u0101kyas do not describe Brahman as an object; they identify the listener's own self with Brahman: *tat tvam asi* (That you are), *aham brahm\u0101smi* (I am Brahman). The utterance produces not a new belief-about but a recognition-of \u2014 aparok\u1e63a rather than parok\u1e63a.\n\n**Why \u015babda can do what other pram\u0101\u1e47as cannot:** \u015aabda (\u015aruti) is *apauru\u1e63eya* \u2014 not authored by any subject operating from within the vy\u0101vah\u0101rika frame with its adhy\u0101sic structure. Its authority is *svata\u1e25pr\u0101m\u0101\u1e47ya* \u2014 self-validating, not dependent on external verification. Because Mah\u0101v\u0101kyas are not a finite subject's report about an object, they can point to the non-dual reality that no finite subject's report can reach (see svatahpramanya.md and shabda-pramana.md).\n\n## The Three-Stage Process\n\nBrahma-j\u00f1\u0101na does not arise instantaneously in most seekers. The epistemological path has three stages (BSBh 1.1.4, Mu\u1e47\u1e0daka Upani\u1e63ad 2.2.1):\n\n**\u015arava\u1e47a** (hearing): The student hears the Mah\u0101v\u0101kyas from a qualified teacher (guru) in the context of the Upani\u1e63ads. This produces parok\u1e63a-j\u00f1\u0101na \u2014 indirect, conceptual understanding-about. The student grasps what the Mah\u0101v\u0101kya means and can reflect on it. This is necessary but not sufficient.\n\n**Manana** (reflection): The student systematically reflects on the Mah\u0101v\u0101kya, addressing doubts and objections. Why does the world appear if Brahman is the only reality? Why do I feel finite if \u0101tman = Brahman? How can mithy\u0101 appear in Brahman? Manana produces a firmer, doubt-free parok\u1e63a-j\u00f1\u0101na. Still not aparok\u1e63a.\n\n**Nididhy\u0101sana** (contemplation): The student deepens the understanding through sustained, repeated contemplation until the intellectual grasp ripens into aparok\u1e63a-j\u00f1\u0101na \u2014 direct recognition. The conceptual understanding of \u0101tman-Brahman identity becomes the actual recognition of one's own nature. This is brahma-j\u00f1\u0101na proper. (See aparoksha-anubhuti.md for the aparok\u1e63a structure.)\n\n## What J\u00f1\u0101na Removes: Adhy\u0101sa and Avidy\u0101\n\nBrahma-j\u00f1\u0101na operates specifically on the cognitive structure that produces sa\u1e43s\u0101ra:\n\n**Avidy\u0101** (nescience) is the root: the fundamental non-recognition of one's own nature as Brahman. It is not mere absence of information but a positive superimposition (adhy\u0101sa) \u2014 the misidentification of \u0101tman with the body-mind complex and of the world as independently real. Avidy\u0101 is not volitional; karma cannot remove it. Only j\u00f1\u0101na \u2014 because avidy\u0101 is cognitive \u2014 can.\n\n**Adhy\u0101sa** (superimposition) is avidy\u0101's operative form: the ongoing misidentification. J\u00f1\u0101na removes adhy\u0101sa by revealing what was always already the case \u2014 the substratum (Brahman) was never a snake; it was always the rope. The b\u0101dha produced by brahma-j\u00f1\u0101na is the sublation of the world's apparent independent reality and the j\u012bva's apparent separate individuality.\n\n**After brahma-j\u00f1\u0101na:** The *j\u012bvanmukta* (liberated while alive) continues to live in a body, continues to perceive the world, continues to use pram\u0101\u1e47as in daily life. What is removed is not the world's appearance but the misidentification: \"this world is independently real and I am a separate finite entity within it.\" The appearance continues; the adhy\u0101sic identification does not. (See the liberation-level b\u0101dha in badha-badhita.md.)\n\n## The Identity-Structure of Brahma-J\u00f1\u0101na\n\nMu\u1e47\u1e0daka Upani\u1e63ad 3.2.9 \u2014 *brahma-vid brahmaiva bhavati* (the knower of Brahman becomes Brahman) \u2014 encodes the deepest structural feature of brahma-j\u00f1\u0101na. It is not knowledge-of-Brahman-as-object. It is recognition-as-Brahman. The Taittir\u012bya Upani\u1e63ad (2.1) defines Brahman as *satya\u1e43 j\u00f1\u0101nam anantam* \u2014 truth, knowledge (j\u00f1\u0101na), infinity. J\u00f1\u0101na is here an ontological characteristic of Brahman, not a cognitive relation to Brahman.\n\nThis produces an apparent paradox: if Brahman is j\u00f1\u0101na, and brahma-j\u00f1\u0101na is the recognition of Brahman, then brahma-j\u00f1\u0101na is Brahman recognizing itself. The apparent knower (j\u012bva) and the apparent known (Brahman) and the apparent knowledge-event (brahma-j\u00f1\u0101na) are non-different from the p\u0101ram\u0101rthika perspective. The paradox resolves when the subject-object-instrument structure is understood to be vy\u0101vah\u0101rika: brahma-j\u00f1\u0101na, the Mah\u0101v\u0101kya, the guru, the \u015brava\u1e47a-manana-nididhy\u0101sana process \u2014 all these are within the vy\u0101vah\u0101rika frame and are themselves mithy\u0101 instruments for removing a mithy\u0101 superimposition; what remains after removal is Brahman, which was never really absent.\n\n---\n\n## CRITICAL CROSS-BUNDLE NOTICE: J\u00f1\u0101na in Yoga-Dar\u015bana\n\n**Required per mandate.json weight_shifts: cross_bundle_distinctions**\n\nThe term *j\u00f1\u0101na* appears in two distinct senses in the yoga-dar\u015bana bundle:\n\n### Sense 1 \u2014 J\u00f1\u0101na-M\u0101rga (Bhagavad G\u012bt\u0101)\n\nThe Bhagavad G\u012bt\u0101 (Chapters 3\u20134, 13\u201318) distinguishes three margas (paths): karma-yoga (path of action), bhakti-yoga (path of devotion), and j\u00f1\u0101na-yoga (path of knowledge). In \u015aa\u1e45kara's G\u012bt\u0101 Bh\u0101\u1e63ya, j\u00f1\u0101na-yoga is the practice of discrimination (*viveka*), dispassion (*vair\u0101gya*), and enquiry into the nature of \u0101tman \u2014 a preparatory s\u0101dhana that leads to brahma-j\u00f1\u0101na.\n\n**The distinction:** J\u00f1\u0101na-yoga (G\u012bt\u0101) is the *path*; brahma-j\u00f1\u0101na (Advaita epistemology) is the *goal* at the path's end. The yoga-dar\u015bana bundle covers the path; this file covers the realization. They are not the same, though they are causally related.\n\n### Sense 2 \u2014 Viveka-Khy\u0101ti (P\u0101ta\u00f1jala Yoga)\n\nThe P\u0101ta\u00f1jalayogas\u016btra tradition (Yogas\u016btra 2.26) identifies *viveka-khy\u0101ti* \u2014 discriminative discernment between puru\u1e63a (pure consciousness) and prak\u1e5bti (matter-energy) \u2014 as the means to *kaivalya* (liberation as isolated, pure puru\u1e63a).\n\n**The architectural difference:** This is a *dualist* framework. Puru\u1e63a and prak\u1e5bti are ontologically distinct. Kaivalya is the liberation of puru\u1e63a from its involvement with prak\u1e5bti. There is no identity assertion \u2014 puru\u1e63a does not become prak\u1e5bti, nor is either of them identical with an all-encompassing Brahman. Viveka-khy\u0101ti is closer to the discriminative knowledge of S\u0101\u1e43khya (see parinamavada.md for the S\u0101\u1e43khya ontology) than to Advaita brahma-j\u00f1\u0101na.\n\n**Advaita's view of Yoga viveka-khy\u0101ti:** From the Advaita perspective, viveka-khy\u0101ti remains within the vy\u0101vah\u0101rika frame \u2014 it identifies a pure subject (puru\u1e63a) distinct from objects (prak\u1e5bti) but does not overcome the subject-object duality itself. The Advaita critique: puru\u1e63a-as-isolated is still a mithy\u0101 differentiation within Brahman; true liberation requires the recognition that even the subject-object distinction is adhy\u0101sa.\n\n### Summary Table\n\n| Tradition | Term | Mechanism | Goal | Framework |\n|-----------|------|-----------|------|-----------|\n| Advaita Ved\u0101nta | Brahma-j\u00f1\u0101na / \u0100tma-j\u00f1\u0101na | Mah\u0101v\u0101kya \u015brava\u1e47a-manana-nididhy\u0101sana; removal of adhy\u0101sa | Mok\u1e63a \u2014 recognition of \u0101tman = Brahman; non-dual | Non-dualist (advaita) |\n| Bhagavad G\u012bt\u0101 (\u015aa\u1e45kara reading) | J\u00f1\u0101na-yoga (m\u0101rga) | Viveka, vair\u0101gya, \u015brava\u1e47a \u2014 preparatory s\u0101dhana | Brahma-j\u00f1\u0101na (Advaita) | Preparatory path within Advaita |\n| P\u0101ta\u00f1jala Yoga | Viveka-khy\u0101ti | A\u1e63\u1e6d\u0101\u1e45ga yoga, discrimination of puru\u1e63a from prak\u1e5bti | Kaivalya \u2014 puru\u1e63a isolated from prak\u1e5bti | Dualist (S\u0101\u1e43khya-Yoga) |\n\n**Rule for AI agents using this bundle:** Do not import P\u0101ta\u00f1jala viveka-khy\u0101ti or G\u012bt\u0101 j\u00f1\u0101na-yoga descriptions into explanations of Advaita brahma-j\u00f1\u0101na without explicitly marking the architectural difference. The mechanisms, ontologies, and endpoints are distinct. Building with yoga-dar\u015bana concepts in a vedanta-epistemology context requires the cross-bundle table above or equivalent.\n\n---\n\n## Cross-References\n- [Adhy\u0101sa](adhyasa.md) \u2014 the cognitive superimposition that brahma-j\u00f1\u0101na removes; the structural pairing: adhy\u0101sa is what j\u00f1\u0101na targets; j\u00f1\u0101na is what adhy\u0101sa prevents\n- [Avidy\u0101](avidya.md) \u2014 nescience; the root of adhy\u0101sa; brahma-j\u00f1\u0101na is specifically defined as the removal of avidy\u0101; the epistemological focus (avidy\u0101 \u2260 mere ignorance of a fact) is treated in avidya.md\n- [Mithy\u0101](mithya.md) \u2014 brahma-j\u00f1\u0101na reveals the mithy\u0101 status of the world and the j\u012bva's apparent individuality; Vivekac\u016b\u1e0d\u0101ma\u1e47i's triple-definition of brahma-j\u00f1\u0101na is: Brahman is sat, world is mithy\u0101, j\u012bva is Brahman\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the Mah\u0101v\u0101kyas of the apauru\u1e63eya Upani\u1e63ads are the unique pram\u0101\u1e47a for brahma-j\u00f1\u0101na; no other pram\u0101\u1e47a can reach Brahman-as-subject\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 Mah\u0101v\u0101kyas are self-validating (svata\u1e25pr\u0101m\u0101\u1e47ya) because they are apauru\u1e63eya; their authority to deliver brahma-j\u00f1\u0101na is intrinsic\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 brahma-j\u00f1\u0101na is the event that b\u0101dhita-s the vy\u0101vah\u0101rika world's apparent independent reality; the highest b\u0101dha in the Advaita ontology\n- [Aparok\u1e63a-anubh\u016bti](aparoksha-anubhuti.md) \u2014 the immediate, non-mediated realization that constitutes brahma-j\u00f1\u0101na proper; to be built next; the distinction parok\u1e63a/aparok\u1e63a defines when j\u00f1\u0101na has actually occurred vs. when it is still conceptual\n- [Pram\u0101](prama.md) \u2014 the result of an ordinary pram\u0101\u1e47a-event; veridical cognition at the vy\u0101vah\u0101rika level; to be distinguished from brahma-j\u00f1\u0101na, which transcends the pram\u0101\u1e47a-triad structure\n\n## Audience Metaphor\n\nConsider the difference between studying a map of your home city and suddenly recognizing \u2014 from a hillside on a clear morning \u2014 that the city you grew up in is right there below you. Both involve 'knowing' where the city is. The map-knowledge is indirect, mediated, representational \u2014 parok\u1e63a. The hillside recognition is immediate, unmistakable, direct \u2014 aparok\u1e63a. But brahma-j\u00f1\u0101na is stranger than either: it is the recognition that the hillside, the city, the morning, and the one recognizing are all expressions of a single reality \u2014 Brahman \u2014 and that the 'you' seeing was never separate from what is seen. What is recognized is not a new fact but the always-already truth that was obscured by the superimposition (adhy\u0101sa) of a separate self in a real external world. The recognition does not produce a new experience; it removes the identification that made the sense of separation possible.\n\n## Citations\n\n1. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv.56\u201357 (\u015aa\u1e45kara) \u2014 the triple-definition of what brahma-j\u00f1\u0101na establishes: brahma satyam (Brahman alone is real), jagan mithy\u0101 (the world is mithy\u0101), j\u012bvo brahmaiva n\u0101para\u1e25 (the j\u012bva is Brahman and nothing else); the most cited formulation of the content and consequence of brahma-j\u00f1\u0101na\n2. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.4 (\u015aa\u1e45kara) \u2014 establishing j\u00f1\u0101na as the sole means of liberation: avidy\u0101 is cognitive in nature (adhy\u0101sa); karma produces merit and demerit but cannot remove ignorance because it operates within the frame produced by avidy\u0101; only j\u00f1\u0101na \u2014 specifically brahma-j\u00f1\u0101na delivered by Mah\u0101v\u0101kyas via \u015brava\u1e47a-manana-nididhy\u0101sana \u2014 can remove the root cause\n3. [Mu\u1e47\u1e0daka Upani\u1e63ad](/references/mundaka-upanishad.md) 3.2.9 \u2014 'brahma-vid brahmaiva bhavati': the knower of Brahman becomes Brahman; encodes the non-dual structure of brahma-j\u00f1\u0101na: knowing Brahman is not knowing an external object (which would leave the knower-known duality intact) but recognizing one's own nature as Brahman; the knowledge-event and the known are non-different from the knower\n4. [Taittir\u012bya Upani\u1e63ad](/references/taittiriya-upanishad.md) 2.1 \u2014 'satya\u1e43 j\u00f1\u0101nam ananta\u1e43 brahma': Brahman is defined as j\u00f1\u0101na (along with truth and infinity); j\u00f1\u0101na here is ontological \u2014 it names what Brahman is by nature, not a cognition that takes Brahman as object; grounds the Advaita position that brahma-j\u00f1\u0101na is not cognition-of-Brahman-as-object but recognition-as-Brahman", "concepts/mithya": "# Mithy\u0101 \u2014 \u092e\u093f\u0925\u094d\u092f\u093e\n\n**Not:** false, illusory, non-existent, m\u0101y\u0101, unreal, fictional, \u015b\u016bnya / emptiness\n\nMithy\u0101 is the ontological status of that which is neither absolutely real (*sat*) nor absolutely non-existent (*asat*) \u2014 dependent existence, contingent on its substratum (*adhi\u1e63\u1e6dh\u0101na*), and subject to sublation (*b\u0101dha*) by liberating knowledge. In Advaita Ved\u0101nta, the world (*jagat*), the empirical self (*j\u012bva*), and all objects of ordinary experience have mithy\u0101 status \u2014 they are genuinely experienced, they support valid empirical knowledge, and they cause real pain and pleasure; but they have no existence independent of Brahman and are sublated when Brahman is directly known.\n\nThe most cited Advaita formula (Vivekac\u016b\u1e0d\u0101ma\u1e47i v.20):\n\n> *brahma satya\u1e43 jagat mithy\u0101 j\u012bvo brahmaiva n\u0101para\u1e25*\n> Brahman is real (*satya*); the world is mithy\u0101; the j\u012bva is Brahman itself, nothing else.\n\nThis is not the claim that the world is false, non-existent, or hallucinatory. It is the claim that the world's existence is of a different ontological order than Brahman's \u2014 dependent rather than self-subsistent, sublatable rather than uncancellable.\n\n## Etymology\n\nFrom Sanskrit *mithy\u0101* \u2014 with the sense of 'wrongly,' 'falsely,' 'deceptively' \u2014 but in technical Advaita usage, the term is given a precise ontological meaning that overrides its ordinary linguistic connotation of 'falsehood.' The technical meaning is fixed by definition: mithy\u0101 = *sad-asadbhy\u0101\u1e43 anirvacan\u012bya* \u2014 that which is indescribable as either purely existent (*sat*) or purely non-existent (*asat*); or equivalently: that which is *b\u0101dhyatva-dharma* \u2014 that which has the property of being sublatable.\n\nThe ordinary meaning of *mithy\u0101* as 'falsely' or 'incorrectly' is the source of the most common mistranslation (*mithy\u0101* = \"false/illusory\"). \u015aa\u1e45kara's technical usage transforms this into a precise ontological category that his opponents must engage with on its own terms, not on the basis of the word's everyday usage.\n\n## The Three-Valued Advaita Ontology\n\nAdvaita distinguishes three ontological levels (*trik\u0101la-abadhitatva* = being uncancellable across three times / *b\u0101dhyatva* = being sublatable):\n\n### P\u0101ram\u0101rthika \u2014 Absolutely Real\nBrahman (pure consciousness, being, bliss \u2014 *saccid\u0101nanda*) is absolutely real. It is *trik\u0101l\u0101b\u0101dhita* \u2014 uncancellable at all three times (past, present, future). There is no cognition that could sublate Brahman. Brahman's existence does not depend on any other entity; it is *svaya\u1e43prak\u0101\u015ba* (self-luminous) and *svasiddha* (self-established).\n\n### Mithy\u0101 \u2014 Dependently Real (the intermediate status)\nThe world, the j\u012bva, the objects of ordinary experience \u2014 all have mithy\u0101 status. They are real within the frame of empirical experience (*vy\u0101vah\u0101rika* = conventional/transactional). They are sublated (*b\u0101dhita*) upon brahma-j\u00f1\u0101na (direct realization of Brahman). Their existence is dependent on Brahman as their substratum \u2014 they borrow existence from Brahman in the way that the superimposed snake borrows existence from the rope.\n\nThree sub-varieties of mithy\u0101 correspond to the two lower ontological levels:\n- **Vy\u0101vah\u0101rika** (empirically real): the world as experienced in waking state \u2014 trees, bodies, minds, social relations; real and consistent for all practical purposes; sublated only at liberation (see vyavaharika.md)\n- **Pr\u0101tibh\u0101sika** (apparently real): the snake in the rope, silver in nacre, a second moon due to double vision; real only from a particular deluded standpoint; sublated immediately upon corrective cognition (see pratibhasika.md)\n\nBoth vy\u0101vah\u0101rika and pr\u0101tibh\u0101sika are mithy\u0101 \u2014 but they differ in the scope and trigger of their sublation.\n\n### Asat \u2014 Absolutely Non-Existent\nThe sky-lotus (*kha-pu\u1e63pa*), the horn of a hare (*\u015ba\u015ba\u015br\u0325\u1e45ga*), the son of a barren woman (*vandhy\u0101-putra*) \u2014 these are *asat*, absolutely non-existent. They cannot be experienced even in principle; no valid cognition produces them. The world is explicitly *not* asat \u2014 it is thoroughly experienced by all beings and is therefore not in this category.\n\n## The Defining Criterion: B\u0101dhyatva\n\nThe technical criterion for mithy\u0101 in Advaita is *b\u0101dhyatva* \u2014 the property of being sublatable, the susceptibility to being cancelled by a subsequent cognition of the same locus (*same-substratum-same-time* sublation):\n\n> **Mithy\u0101** = that which is the correlate of sublation with a non-different locus (*s\u0101dhi\u1e63\u1e6dh\u0101nab\u0101dhyatva\u1e43 mithy\u0101tva\u1e43*)\n\nMore precisely (Advaitasiddhi, Madhus\u016bdana Sarasvat\u012b): mithy\u0101 is that which can be sublated while its substratum continues to exist. The snake is sublated; the rope remains. The world is sublated; Brahman remains. This is the structural definition: mithy\u0101-ness is not about how something seems but about its relationship to what underlies it.\n\nThis definition explicitly excludes *asat*: the non-existent cannot be sublated because it cannot first appear. Sublation (*b\u0101dha*) requires a prior cognition \u2014 you must first cognize the snake before the corrective rope-cognition can sublate it. The sky-lotus never appears, so it cannot be sublated. Mithy\u0101 is precisely that which does appear and can then be sublated.\n\n## The Snake-Rope Example \u2014 Parsed Through Ontological Levels\n\nThe rope-snake illustration is the canonical example of adhy\u0101sa (superimposition \u2014 see adhyasa.md) and the most instructive lens for understanding mithy\u0101:\n\n| Stage | Ontological Level | Status |\n|-------|------------------|--------|\n| The rope | P\u0101ram\u0101rthika (in the metaphor) | Real; the adhi\u1e63\u1e6dh\u0101na |\n| The snake (as cognized in the dark) | Pr\u0101tibh\u0101sika | Mithy\u0101; real from the deluded standpoint; sublated by the rope-cognition |\n| The snake (after sublation) | Asat-like (no longer any cognition) | The snake \"was never there\" \u2014 but it was experienced, so it is not purely asat |\n\nMapping to the cosmological case:\n- Brahman = the rope (the substratum)\n- The world = the snake (dependently real, superimposed)\n- Brahma-j\u00f1\u0101na = the corrective light-cognition that reveals the rope where the snake appeared to be\n\nThe world is not nothing. It is genuinely experienced. But its experience-status is mithy\u0101 \u2014 dependent on Brahman, sublatable by brahma-j\u00f1\u0101na, not self-subsistent.\n\n## Mithy\u0101 \u2260 M\u0101y\u0101\n\nThis distinction is the single most common AI conflation involving mithy\u0101. They are related but distinct:\n\n| Term | Category | What it Names |\n|------|----------|---------------|\n| **M\u0101y\u0101** | Power / Causal | The *\u015bakti* (power) of Brahman by which the world-appearance is produced; the mechanism of appearance; Brahman's inscrutable creative power |\n| **Mithy\u0101** | Ontological Status | The *status* of what m\u0101y\u0101 produces; the world's dependent-real character; not the power that causes it but the result's standing |\n\nM\u0101y\u0101 explains *how* the world appears. Mithy\u0101 names *what kind of reality* the appearance has. A stage magician can explain *how* a trick is done (m\u0101y\u0101-level explanation) without changing *what the trick is* \u2014 an appearance without ultimate substance (mithy\u0101-level standing). Both are needed; they are not interchangeable.\n\nThe further distinction: *m\u0101y\u0101* is sometimes used in colloquial and poetic contexts to mean \"illusion\" or \"unreality\" (especially in Pur\u0101\u1e47ic literature). Advaita epistemology does not support this usage \u2014 m\u0101y\u0101 as a technical term in \u015aa\u1e45kara is the inscrutable power (*anirvacan\u012bya \u015bakti*) of Brahman, not a synonym for \"unreal.\"\n\n## Mithy\u0101 \u2260 Buddhist \u015a\u016bnyat\u0101\n\nAdvaita explicitly differentiates itself from Buddhist \u015b\u016bnyav\u0101da (the M\u0101dhyamaka position that all phenomena are empty of inherent existence, *svabh\u0101va\u015b\u016bnya*):\n\n**Buddhist \u015b\u016bnya:** phenomena are dependently originated (*prat\u012btyasamutpanna*) \u2014 no phenomenon has inherent existence (*svabh\u0101va*); all are relational and empty of self-nature. The \"emptiness\" is absolute \u2014 there is no non-empty foundation; even \u015b\u016bnyat\u0101 itself is \u015b\u016bnya.\n\n**Advaita mithy\u0101:** the world is dependently real \u2014 but it depends on Brahman, a positive, self-subsistent conscious ground. The world's mithy\u0101tva is not emptiness; it is contingency on a real basis. Brahman is not mithy\u0101; Brahman is the *adhi\u1e63\u1e6dh\u0101na* (substratum) on which mithy\u0101 rests. Remove the adhi\u1e63\u1e6dh\u0101na and the mithy\u0101 collapses \u2014 which is why the Advaita critique of Buddhist \u015b\u016bnyav\u0101da is that it \"leaves no positive remainder\" (ni\u1e25\u015be\u1e63a\u015b\u016bnyav\u0101da).\n\n\u015aa\u1e45kara is explicitly hostile to Buddhist \u015b\u016bnyav\u0101da on exactly this ground (Brahmas\u016btra Bh\u0101\u1e63ya 2.2.28\u201332): if everything were \u015b\u016bnya (empty/non-existent), even the cognition of \u015b\u016bnyat\u0101 would be non-existent, and the M\u0101dhyamika teaching itself would have no status. Mithy\u0101 is not \u015b\u016bnya \u2014 it is *anirvacan\u012bya* (indescribable as real or unreal) resting on a *vacan\u012bya* ground (Brahman, fully describable as *sat-cit-\u0101nanda*).\n\n## Mithy\u0101 and the Pram\u0101\u1e47as\n\nMithy\u0101-status does not undermine the validity of empirical pram\u0101\u1e47as. This is a frequent misconception \u2014 if the world is mithy\u0101, how can any perception or inference about it be valid?\n\nAdvaita's answer (Ved\u0101ntaparibh\u0101\u1e63\u0101): the pram\u0101\u1e47as produce *ab\u0101dhita j\u00f1\u0101na* (uncontradicted knowledge) within the vy\u0101vah\u0101rika frame. Pratyak\u1e63a of a pot correctly establishes the pot's presence at the empirical level. The pot's mithy\u0101-status (dependency on Brahman, sublatable by brahma-j\u00f1\u0101na) is a p\u0101ram\u0101rthika-level claim, not a challenge to the pot's empirical-level cognizability. The two levels do not interfere: the mithy\u0101tva of the pot is irrelevant to the question \"is there a pot on the table?\" The answer to that question is: yes, and pratyak\u1e63a is the correct pram\u0101\u1e47a to establish it.\n\nThis is why Advaita is not phenomenal skepticism: ordinary empirical knowledge is fully valid at the empirical level. The philosophical claim is about ultimate ontological status, not about whether empirical knowledge works.\n\n## The Philosophical Work Mithy\u0101 Does\n\nThe concept accomplishes four philosophical functions in Advaita:\n\n1. **Avoids annihilationism (asat-v\u0101da):** The world is not nothing; experience is real; empirical knowledge is valid. Advaita is not nihilism.\n\n2. **Avoids independent realism:** The world is not independently real (*sat*); it cannot exist apart from Brahman; there is no material reality coequal with Brahman. Advaita is not dualism.\n\n3. **Explains adhy\u0101sa:** The world's mithy\u0101-status is why adhy\u0101sa is structurally possible \u2014 the superimposed (snake) must be mithy\u0101 (not asat, not sat) for the structure of superimposition to work. A pure non-entity cannot be superimposed; an absolutely real entity cannot be sublated.\n\n4. **Opens the liberation path:** Because the world is mithy\u0101 (sublatable), liberating knowledge that removes adhy\u0101sa also removes the world's apparent independent standing. Liberation is not the destruction of the world (it is still experienced by the j\u012bvanmukta) but the dissolution of the ignorance by which it was taken as independently real.\n\n## Cross-References\n- [Adhy\u0101sa](adhyasa.md) \u2014 superimposition; the mechanism that produces the appearance of mithy\u0101 entities as independently real; mithy\u0101 is the status of what adhy\u0101sa presents; build with this file (CRITICAL_pairs)\n- [Vy\u0101vah\u0101rika](vyavaharika.md) \u2014 the empirical level of reality; the primary sub-level of mithy\u0101 applicable to the world of ordinary experience\n- [P\u0101ram\u0101rthika](paramarthika.md) \u2014 the absolute level; Brahman; what is not mithy\u0101; the adhi\u1e63\u1e6dh\u0101na on which mithy\u0101 depends\n- [Pr\u0101tibh\u0101sika](pratibhasika.md) \u2014 the apparent level; the lower sub-level of mithy\u0101, applicable to illusions, dreams, and error-objects\n- [Vivartav\u0101da](vivartavada.md) \u2014 Advaita's causal theory; the world is a vivarta (apparent transformation) of Brahman, not a real transformation; vivartav\u0101da is the causal-theory correlate of mithy\u0101tva\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 sublation; the defining criterion for mithy\u0101 is b\u0101dhyatva \u2014 susceptibility to sublation; b\u0101dha is how mithy\u0101 entities are cognized as mithy\u0101 after liberating knowledge\n- [Pram\u0101\u1e47a](pramana.md) \u2014 mithy\u0101-status does not undermine empirical pram\u0101\u1e47as; valid cognition within the vy\u0101vah\u0101rika frame; the relationship between empirical epistemology and mithy\u0101 ontology\n\n## Audience Metaphor\n\nLike a dream that, while you are in it, is completely real \u2014 you feel fear, joy, pain, connection; the people you meet have weight and history; the landscape obeys consistent rules. It is not 'false' while you are dreaming. But when you wake up, it is clear it was dependent on the sleeping consciousness \u2014 it had no existence apart from that ground. The dream-world is not nothing (it was thoroughly experienced) and it is not ultimately real (it was sublated by waking). Mithy\u0101 is the ontological name for that status: dependently real, subject to sublation, not ultimately self-subsistent. The Advaita claim is not that the world feels like a dream \u2014 it doesn't. The claim is that the world has the same ontological structure as a dream with respect to its ground (Brahman).\n\n## Citations\n\n1. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv.20\u201321 \u2014 \u015aa\u1e45kara's condensed formula: *brahma satya\u1e43 jagat mithy\u0101 j\u012bvo brahmaiva n\u0101para\u1e25*; Brahman is real (sat), the world is mithy\u0101, the j\u012bva is Brahman and nothing else\n2. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.7 \u2014 Vidy\u0101ra\u1e47ya on the three-valued ontology; anirvacan\u012bya as the precise category for mithy\u0101; the rope-snake example parsed through ontological levels\n3. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.14 \u2014 \u015aa\u1e45kara's argument that the world is anirvacan\u012bya \u2014 not describable as purely existent (sat) or purely non-existent (asat) \u2014 answering the S\u0101\u1e43khya charge that Advaita must posit pure non-existence\n4. [Advaitasiddhi](/references/advaitasiddhi.md) (Madhus\u016bdana Sarasvat\u012b) \u2014 technical analysis of mithy\u0101tva; the b\u0101dhyatva (sublatable) criterion; mithy\u0101 distinguished from asat by b\u0101dhyatva vs. asam\u0101na-adhikara\u1e47a-pratiyogitva\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy):\n\n- M\u0101y\u0101-as-\"illusion\" (the world does not exist) was broadcast into Western philosophy by Schopenhauer's \"veil of Maya\" (*The World as Will and Representation*, 1818/1844) and completed by popular culture; the flattening erases the corpus's four distinct m\u0101y\u0101-level treatments at once. See [G8 \u2014 M\u0101y\u0101 = illusion](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/nirvikalpaka-savikalpaka": "# Nirvikalpaka / Savikalpaka \u2014 \u0928\u093f\u0930\u094d\u0935\u093f\u0915\u0932\u094d\u092a\u0915 / \u0938\u0935\u093f\u0915\u0932\u094d\u092a\u0915\n\n**Not:** sense-datum, unconscious, raw feel (qualia), concept-free (as full description), nirvikalpa-sam\u0101dhi (P\u0101ta
