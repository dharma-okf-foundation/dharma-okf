<style>
* { box-sizing: border-box; }
body {

}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {

}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

hpramanya", "target": "references/brahmasutra-bhasya"}}, {"data": {"id": "concepts/svatahpramanya__references/nyaya-bhasya", "source": "concepts/svatahpramanya", "target": "references/nyaya-bhasya"}}, {"data": {"id": "concepts/tarka__concepts/anumana", "source": "concepts/tarka", "target": "concepts/anumana"}}, {"data": {"id": "concepts/tarka__concepts/pramana", "source": "concepts/tarka", "target": "concepts/pramana"}}, {"data": {"id": "concepts/tarka__concepts/shabda-pramana", "source": "concepts/tarka", "target": "concepts/shabda-pramana"}}, {"data": {"id": "concepts/tarka__concepts/svatahpramanya", "source": "concepts/tarka", "target": "concepts/svatahpramanya"}}, {"data": {"id": "concepts/tarka__concepts/aptavakya", "source": "concepts/tarka", "target": "concepts/aptavakya"}}, {"data": {"id": "concepts/tarka__references/nyaya-bhasya", "source": "concepts/tarka", "target": "references/nyaya-bhasya"}}, {"data": {"id": "concepts/tarka__references/vivekachudamani", "source": "concepts/tarka", "target": "references/vivekachudamani"}}, {"data": {"id": "concepts/upamana__concepts/pramana", "source": "concepts/upamana", "target": "concepts/pramana"}}, {"data": {"id": "concepts/upamana__concepts/pratyaksha", "source": "concepts/upamana", "target": "concepts/pratyaksha"}}, {"data": {"id": "concepts/upamana__concepts/anumana", "source": "concepts/upamana", "target": "concepts/anumana"}}, {"data": {"id": "concepts/upamana__concepts/shabda-pramana", "source": "concepts/upamana", "target": "concepts/shabda-pramana"}}, {"data": {"id": "concepts/upamana__concepts/arthapatti", "source": "concepts/upamana", "target": "concepts/arthapatti"}}, {"data": {"id": "concepts/upamana__references/tarkasangraha", "source": "concepts/upamana", "target": "references/tarkasangraha"}}, {"data": {"id": "concepts/upamana__references/vedantaparibhasha", "source": "concepts/upamana", "target": "references/vedantaparibhasha"}}, {"data": {"id": "concepts/upamana__references/slokavarttika", "source": "concepts/upamana", "target": "references/slokavarttika"}}, {"data": {"id": "concepts/vivartavada__concepts/parinamavada", "source": "concepts/vivartavada", "target": "concepts/parinamavada"}}, {"data": {"id": "concepts/vivartavada__concepts/mithya", "source": "concepts/vivartavada", "target": "concepts/mithya"}}, {"data": {"id": "concepts/vivartavada__concepts/paramarthika", "source": "concepts/vivartavada", "target": "concepts/paramarthika"}}, {"data": {"id": "concepts/vivartavada__concepts/vyavaharika", "source": "concepts/vivartavada", "target": "concepts/vyavaharika"}}, {"data": {"id": "concepts/vivartavada__concepts/pratibhasika", "source": "concepts/vivartavada", "target": "concepts/pratibhasika"}}, {"data": {"id": "concepts/vivartavada__concepts/adhyasa", "source": "concepts/vivartavada", "target": "concepts/adhyasa"}}, {"data": {"id": "concepts/vivartavada__concepts/badha-badhita", "source": "concepts/vivartavada", "target": "concepts/badha-badhita"}}, {"data": {"id": "concepts/vivartavada__references/mandukya-karika", "source": "concepts/vivartavada", "target": "references/mandukya-karika"}}, {"data": {"id": "concepts/vivartavada__references/brahmasutra-bhasya", "source": "concepts/vivartavada", "target": "references/brahmasutra-bhasya"}}, {"data": {"id": "concepts/vivartavada__references/vivekachudamani", "source": "concepts/vivartavada", "target": "references/vivekachudamani"}}, {"data": {"id": "concepts/vyavaharika__concepts/mithya", "source": "concepts/vyavaharika", "target": "concepts/mithya"}}, {"data": {"id": "concepts/vyavaharika__concepts/paramarthika", "source": "concepts/vyavaharika", "target": "concepts/paramarthika"}}, {"data": {"id": "concepts/vyavaharika__concepts/pratibhasika", "source": "concepts/vyavaharika", "target": "concepts/pratibhasika"}}, {"data": {"id": "concepts/vyavaharika__concepts/pramana", "source": "concepts/vyavaharika", "target": "concepts/pramana"}}, {"data": {"id": "concepts/vyavaharika__concepts/badha-badhita", "source": "concepts/vyavaharika", "target": "concepts/badha-badhita"}}, {"data": {"id": "concepts/vyavaharika__concepts/adhyasa", "source": "concepts/vyavaharika", "target": "concepts/adhyasa"}}, {"data": {"id": "concepts/vyavaharika__references/mandukya-karika", "source": "concepts/vyavaharika", "target": "references/mandukya-karika"}}, {"data": {"id": "concepts/vyavaharika__references/panchadashi", "source": "concepts/vyavaharika", "target": "references/panchadashi"}}, {"data": {"id": "concepts/vyavaharika__references/brahmasutra-bhasya", "source": "concepts/vyavaharika", "target": "references/brahmasutra-bhasya"}}], "bodies": {"concepts/adhyasa": "# Adhy\u0101sa \u2014 \u0905\u0927\u094d\u092f\u093e\u0938\n\n**Not:** mistake, misperception, confusion, projection, category error, illusion, delusion, superimposition (in Western philosophy)\n\nAdhy\u0101sa is the mutual superimposition of \u0100tman (the witness-Self, pure consciousness) and an\u0101tman (the not-Self: body, senses, mind, ego) by which each appears to have the properties of the other. It is \u015aa\u1e45kara's technical term for the foundational cognitive-ontological error that makes sa\u1e43s\u0101ra possible \u2014 not a particular mistake but the structural condition within which all particular experience occurs.\n\n\u015aa\u1e45kara defines it in the opening lines of the Brahmas\u016btra Bh\u0101\u1e63ya (the Adhy\u0101sa-bh\u0101\u1e63ya): *\"Adhy\u0101sa is the appearance of something remembered in something present \u2014 the appearance of a previously cognized form in something other than what it is, like the appearance of silver in mother-of-pearl.\"* (*sm\u1e5btir\u016bpa\u1e25 paratra p\u016brvadr\u0325\u1e63\u1e6d\u0101vabh\u0101sa\u1e25* \u2014 Adhy\u0101sa-bh\u0101\u1e63ya, opening.)\n\nThe example: you see a shining disc on the ground and cognize it as silver \u2014 what is actually present (the *pratyak\u1e63a* object) is nacre (mother of pearl); the form of silver is superimposed from memory. This is ordinary error. Adhy\u0101sa as it applies to \u0100tman-an\u0101tman is structurally similar but operates at a far deeper level \u2014 the superimposition constitutes the very framework of ordinary selfhood.\n\n## Etymology\n\nFrom Sanskrit *adhi* (upon, over, on top of \u2014 prefix indicating position or superiority) + *\u0101sa* (being placed, sitting, appearing \u2014 from root *\u0101s*, to sit, to be positioned). Literally: being placed upon, that which sits on top of \u2014 what appears *on top of* or *in* something that is actually other than it.\n\nThe verbal root *adhy\u0101s-* (to superimpose) also gives *adhy\u0101sita* (that which has been superimposed) and *adhy\u0101sin* (one who superimposes). The circularity embedded in the term: the *adhy\u0101sin* (the j\u012bva who performs adhy\u0101sa) is itself a product of adhy\u0101sa \u2014 the ego that appears to do the superimposing is already constituted by superimposition.\n\n## \u015aa\u1e45kara's Definition \u2014 Four Analytical Points\n\nThe Adhy\u0101sa-bh\u0101\u1e63ya introduction is the most technically precise text on adhy\u0101sa. Four features of \u015aa\u1e45kara's definition:\n\n### 1. Sm\u1e5btir\u016bpa (Memory-Form)\nWhat is superimposed is a *sm\u1e5btir\u016bpa* \u2014 a form retained in memory or cognitive tendency, not a purely fresh perception. In the nacre-silver case, the form of silver is carried from prior encounters with silver; it appears *in* the nacre. In the \u0100tman case, the ego-sense (\"I am this body, this mind\") is built from the accumulated cognitive tendency to take the body-mind complex as oneself.\n\n### 2. Paratra (In Something Other)\nThe superimposed form appears *paratra* \u2014 in something else, in something that is genuinely other than the superimposed object. Silver appears *in* nacre; body-mind-ego appears *in* \u0100tman. The substratum (the nacre, the \u0100tman) is real; what appears *on* it is the superimposition.\n\n### 3. The Bidirectional Structure (Mutual Superimposition)\n\u015aa\u1e45kara specifies that the \u0100tman-an\u0101tman adhy\u0101sa is *itaretara-adhy\u0101sa* \u2014 mutual superimposition. Two directions operate simultaneously:\n\n- **An\u0101tman-on-\u0100tman:** Body-properties (birth, growth, hunger, fatigue, pain, death) appear to belong to the \u0100tman. \"I am tired.\" \"I am old.\" \"I will die.\" These are body-properties attributed to the witness-consciousness that in fact has none of these properties.\n\n- **\u0100tman-on-an\u0101tman:** Consciousness, existence, and the sense of being-a-subject appear to belong to the body-mind-ego complex. \"The body is conscious,\" \"the mind is aware.\" Consciousness is \u0100tman's nature; its apparent presence in the body-mind is a reverse superimposition.\n\nThis bidirectional structure produces the *aha\u1e43k\u0101ra* (ego) \u2014 the sense of being a specific, bounded, conscious individual \u2014 which is the condensed result of both directions of superimposition operating together.\n\n### 4. An\u0101di (Beginningless)\nAdhy\u0101sa is *an\u0101di* \u2014 it has no beginning in time. \u015aa\u1e45kara addresses the obvious objection: if adhy\u0101sa is an error, who made it and when? The answer: the j\u012bva who would have made it is itself constituted by adhy\u0101sa. There is no prior moment of clarity from which the error departed. Adhy\u0101sa and the sa\u1e43s\u0101ric order co-arise; asking when it began is like asking when the rope became a snake \u2014 the snake never had a beginning because it never was.\n\n## Adhy\u0101sa vs. Ordinary Error\n\nAdhy\u0101sa is analogous to but importantly different from *bhr\u0101nti* (ordinary perceptual error) in three ways:\n\n**Scope:** Bhr\u0101nti is particular \u2014 the silver-in-nacre error concerns a particular shining disc on a particular day. Adhy\u0101sa is universal and constant \u2014 the body-mind-Self confusion operates in every moment of ordinary experience without exception.\n\n**Correction:** Bhr\u0101nti is corrected by re-observation (you look closely and see nacre). Adhy\u0101sa is not corrected by any perceptual act or any ordinary pram\u0101\u1e47a-result. Even the philosopher who has correctly understood Advaita doctrine continues to say \"I am hungry,\" \"I am tired\" \u2014 *vy\u0101vah\u0101rika* identification persists until *aparok\u1e63\u0101nubh\u016bti* (direct, immediate realization of \u0100tman), not just intellectual knowledge.\n\n**Operator:** Bhr\u0101nti has a clear subject who errs (the person who saw silver). Adhy\u0101sa produces its own apparent subject (the j\u012bva) \u2014 the \"one who\" is in adhy\u0101sa is itself a product of adhy\u0101sa.\n\n## Adhy\u0101sa and the Pram\u0101\u1e47as\n\nA crucial implication for the epistemology of this bundle: all ordinary pram\u0101\u1e47as (pratyak\u1e63a, anum\u0101na, upam\u0101na, arth\u0101patti, anupalabdhi) operate *within* the frame of adhy\u0101sa. They presuppose a pram\u0101t\u0101 (knower) who is already identified with the empirical mind-body \u2014 a pram\u0101t\u0101 who is already in adhy\u0101sa.\n\nThis is why ordinary pram\u0101\u1e47as can generate valid empirical knowledge while being unable to produce liberating knowledge of Brahman (brahma-j\u00f1\u0101na). They operate inside the structure they would need to dissolve. To use \u015aa\u1e45kara's own framing (Brahmas\u016btra Bh\u0101\u1e63ya 2.1.14): the pram\u0101\u1e47as are valid in their domain, but their domain is the domain *constituted by* adhy\u0101sa. For the knowledge that removes adhy\u0101sa, only \u015babda as apauru\u1e63eya \u015aruti can serve \u2014 because \u015aruti alone is not produced by a pram\u0101t\u0101 already situated within adhy\u0101sa.\n\nThis is the deepest argument for why Ved\u0101nta inquiry is necessary and why it cannot be replaced by rational investigation alone: rationality and perception are tools whose user is already the thing that needs to be understood.\n\n## The Liberation Connection\n\nAdhy\u0101sa is removed by *j\u00f1\u0101na* \u2014 specifically by *aparok\u1e63\u0101nubh\u016bti* (direct, non-mediated realization of \u0100tman as Brahman). This removal is not gradual improvement but sudden reversal \u2014 the rope is seen, and the snake dissolves. The snake does not become slightly less snake-like over time.\n\nThe technical term for this removal is *b\u0101dha* (sublation \u2014 see badha-badhita.md): the prior cognition (body = Self) is overridden by the new cognition (\u0100tman alone is real; the body is mithy\u0101 superimposition). Post-sublation, the body continues to function, but the *adhy\u0101sa* (the identification, the \"I am this body\" claim) is gone. This is the state of the *j\u012bvanmukta* \u2014 liberated while living.\n\n## Cross-References\n- [Mithy\u0101](mithya.md) \u2014 the ontological status of what adhy\u0101sa presents; the superimposed (silver, the empirical world) is mithy\u0101 \u2014 neither fully real nor fully non-existent; build with this file (CRITICAL_pairs)\n- [Avidy\u0101 (epistemological)](avidya.md) \u2014 adhy\u0101sa is avidy\u0101 in its operational, functional form; avidy\u0101 is the ignorance, adhy\u0101sa is what that ignorance produces as cognitive-experiential structure\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 the pram\u0101\u1e47a within whose operation adhy\u0101sa is most visible; all \"perception of self as body\" is adhy\u0101sic; pratyak\u1e63a operates within the adhy\u0101sic frame\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 sublation; the cognitive event that removes adhy\u0101sa; liberating knowledge (brahma-j\u00f1\u0101na) is the b\u0101dha of the adhy\u0101sa-cognition\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the only pram\u0101\u1e47a capable of operating outside the adhy\u0101sic frame (apauru\u1e63eya); the instrument of adhy\u0101sa-removal\n- [Aparok\u1e63\u0101nubh\u016bti](aparoksha-anubhuti.md) \u2014 the direct realization that removes adhy\u0101sa; the terminal event in the Advaita epistemological path\n\n## Audience Metaphor\n\nLike wearing glasses you've forgotten you have on \u2014 not prescription glasses that blur things, but lenses that add a layer to everything you see: this body is you, this mind is you, this ego is you. The lenses don't distort specific objects incorrectly; they shape the entire field of experience. You can correctly identify chairs and trees and people while wearing them. The problem is not that they make you confused about chairs \u2014 it's that you've forgotten they're there, and everything you know yourself to be is shaped by the fact that you're wearing them.\n\n## Citations\n\n1. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) \u2014 Adhy\u0101sa-bh\u0101\u1e63ya \u2014 \u015aa\u1e45kara's introduction to the Brahmas\u016btra Bh\u0101\u1e63ya; the most precise technical definition of adhy\u0101sa in the Advaita corpus; definition, the nacre-silver example, mutual superimposition, the role of adhy\u0101sa in making Ved\u0101nta inquiry necessary\n2. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv.131\u2013137 \u2014 \u015aa\u1e45kara on adhy\u0101sa as the co-mingling (mithy\u0101madhy\u0101ropita) of \u0100tman and an\u0101tman; the body-mind-intellect complex taken as 'I'\n3. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.7\u20138 (Vidy\u0101ra\u1e47ya) \u2014 adhy\u0101sa producing aha\u1e43k\u0101ra (ego) and the cycle of sa\u1e43s\u0101ra\n4. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.14 \u2014 \u015aa\u1e45kara on why pram\u0101\u1e47as operate within the frame of adhy\u0101sa and therefore cannot dissolve it", "concepts/anubhava": "# Anubhava \u2014 \u0905\u0928\u0941\u092d\u0935\n\n**Not:** experience (generic phenomenological), intuition (Kantian or Bergsonian), feeling (emotional register), perception (as adequate translation), empirical experience\n\n**Anubhava** is the Sanskrit epistemological term for direct cognition \u2014 a cognition that is not a recollection of a prior cognition but a fresh cognitive event, produced directly by contact with its object (or, in the case of liberative j\u00f1\u0101na, by the Mah\u0101v\u0101kya pointing to the non-objective Brahman). In Advaita Ved\u0101nta's epistemological framework, anubhava plays a double role: (1) at the vy\u0101vah\u0101rika level, it is the general term for any fresh non-mnemonic cognition produced by the pram\u0101\u1e47as; (2) at the p\u0101ram\u0101rthika level, it names the criterion of authenticity for brahma-j\u00f1\u0101na \u2014 the direct recognition that is not conceptual understanding-about but genuine aparok\u1e63a-anubh\u016bti (immediate non-mediated realization).\n\nThe Brahmas\u016btra Bh\u0101\u1e63ya 1.1.2 states that Ved\u0101nta inquiry (*brahma-jij\u00f1\u0101s\u0101*) has *anubhava* as its terminus \u2014 *anubhav\u0101vas\u0101natv\u0101t*. This is a central epistemological claim: the process of studying scripture, engaging teachers, and engaging in \u015brava\u1e47a-manana-nididhy\u0101sana culminates in anubhava \u2014 direct recognition \u2014 not in a refined conceptual belief. Without anubhava, the process is incomplete.\n\n## Etymology\n\nFrom Sanskrit *anu* (following, after; or along, according to \u2014 prefix with multiple senses depending on context) + *bhava* (from root *bh\u016b*, to become, to be; noun: being, occurrence, arising). Literally: what arises along with (the cognitive event); what follows or accompanies cognition.\n\nThe nominal form *anubh\u016bti* (stronger, more abstract) is used in compounds like *aparok\u1e63a-anubh\u016bti* (immediate, non-mediated realization). Both *anubhava* and *anubh\u016bti* are used in Advaita literature; *anubh\u016bti* tends to appear in soteriological contexts and *anubhava* in broader epistemological ones.\n\n## Anubhava in the Pram\u0101\u1e47a Framework\n\nAt the vy\u0101vah\u0101rika level, anubhava is the general term for any cognition produced by the six pram\u0101\u1e47as that is not a recollection. The Ved\u0101ntaparibh\u0101\u1e63\u0101 (Ch.1) uses this as the technical definition: anubhava = any non-mnemonic cognition (*asm\u1e5bti*). This distinguishes fresh pram\u0101\u1e47a-results from memory (sm\u1e5bti), which merely reactivates a prior cognition without producing a new epistemic contact.\n\n| Type | Definition | Example |\n|------|-----------|---------|\n| **Anubhava** | Fresh cognition \u2014 not a recollection; produced by pram\u0101\u1e47a-event | Seeing the fire (pratyak\u1e63a); inferring it from smoke (anum\u0101na) |\n| **Sm\u1e5bti** (memory) | Recollection of a prior cognition | Remembering the fire you saw yesterday |\n| **Aparok\u1e63a-anubh\u016bti** | Direct, non-mediated anubhava \u2014 the liberative form | Recognition of \u0101tman = Brahman via Mah\u0101v\u0101kya |\n\nThe distinction from sm\u1e5bti is philosophically important in the Advaita-M\u012bm\u0101\u1e43s\u0101 debate about the authority of Vedic testimony: if \u015babda (Vedic testimony) merely recalled prior human knowledge, it would be sm\u1e5bti rather than anubhava, and its authority would derive from its original human source (paratahpr\u0101m\u0101\u1e47ya). The M\u012bm\u0101\u1e43s\u0101-Advaita position: apauru\u1e63eya \u015aruti is not a recollection at all \u2014 it is anubhava (or the direct vehicle of anubhava), and its validity is svata\u1e25pr\u0101m\u0101\u1e47ya.\n\n## Two Functions of Anubhava in Advaita\n\n### Function 1: Epistemological Criterion (Vy\u0101vah\u0101rika Level)\n\nAnubhava serves as the baseline cognitive category against which all Advaita epistemology is measured. A claim is epistemically grounded when it traces back to anubhava \u2014 either a direct perceptual event, a valid inferential conclusion, or an Upani\u1e63adic transmission.\n\nThis is why Advaita commentators invoke anubhava as a check against over-reliance on scripture-study alone: \u015b\u0101stra-v\u0101kya (scriptural statements) must be heard, reflected upon, and ultimately produce anubhava \u2014 direct recognition. Without anubhava, the scriptural statements remain parok\u1e63a.\n\n### Function 2: Liberative Criterion (P\u0101ram\u0101rthika Level)\n\nAt the p\u0101ram\u0101rthika level, anubhava is the criterion for distinguishing genuine brahma-j\u00f1\u0101na from its approximations:\n\n- **\u015arava\u1e47a** (hearing the Mah\u0101v\u0101kyas) produces parok\u1e63a-j\u00f1\u0101na: understanding-about brahma-j\u00f1\u0101na. This is not yet anubhava in the full sense.\n- **Manana** (reflection, resolving doubts) deepens the parok\u1e63a-j\u00f1\u0101na but does not produce anubhava.\n- **Nididhy\u0101sana** (contemplation) is the practice that ripens parok\u1e63a into aparok\u1e63a \u2014 that converts conceptual understanding into anubhava.\n- **Aparok\u1e63a-anubh\u016bti** \u2014 the immediate realization \u2014 is anubhava in its liberative form: the direct recognition of \u0101tman-Brahman identity that constitutes mok\u1e63a.\n\nVivekac\u016b\u1e0d\u0101ma\u1e47i v.5 makes this explicit: scripture study (*\u015b\u0101str\u0101dhyayana*) is preparation; the realization itself is anubhava. A student who has read all the Upani\u1e63ads and can explain advaita perfectly but has not had the anubhava has not yet reached the goal. The goal is not intellectual mastery but direct recognition.\n\n## Anubhava and Adhy\u0101sa\n\nThe relationship between anubhava and adhy\u0101sa is the key to Advaita's epistemological logic:\n\n- **Adhy\u0101sa** (superimposition) produces mithy\u0101 cognitions: the snake-cognition in poor light is a cognition that *appears* to be anubhava (it is not sm\u1e5bti \u2014 you are not recalling a past snake) but is produced by a do\u1e63a-infected instrument (poor lighting + prior conditioning). It is a case of pseudo-anubhava \u2014 it has the phenomenological structure of fresh cognition but is produced by avidy\u0101-tinged conditions.\n- **Genuine anubhava** at the vy\u0101vah\u0101rika level is produced without do\u1e63a \u2014 adequate light, well-functioning sense organs, correct conditions. The rope-cognition in good light is genuine anubhava.\n- **Brahma-j\u00f1\u0101na as anubhava** removes the root adhy\u0101sa \u2014 not a particular instance of superimposition (like the snake) but the fundamental superimposition of \u0101tman with body-mind-world. The anubhava that removes adhy\u0101sa is the aparok\u1e63a-anubh\u016bti.\n\n## The Paradox of Trans-Objective Anubhava\n\nAnubhava typically involves a cognizer having direct contact with an object. But brahma-j\u00f1\u0101na, as anubhava, is paradoxical: Brahman is not an object of cognition (it is the cognizer's own nature), and the cognizer (j\u012bva) is itself mithy\u0101 from the p\u0101ram\u0101rthika perspective. So what is the structure of this anubhava?\n\n**Advaita's answer:** The anubhava of brahma-j\u00f1\u0101na dissolves the cognizer-cognized structure rather than completing it. It is the recognition that the structure was always superimposed on what is actually non-dual Brahman. The language of \"anubhava\" is vy\u0101vah\u0101rika language applied to a p\u0101ram\u0101rthika recognition \u2014 the only language available within the frame that is being dissolved. After the recognition, there is no residual experiencer having an experience of Brahman; there is only Brahman. The anubhava-language is like the stick used to stir the funeral pyre that is then consumed in the same fire.\n\n## Anubhava Across Schools\n\nM\u012bm\u0101\u1e43s\u0101, Ny\u0101ya, and Advaita each use anubhava, but with distinct emphases:\n\n| School | Primary use of anubhava | Key distinction |\n|--------|------------------------|-----------------|\n| **M\u012bm\u0101\u1e43s\u0101** | Cognition that precedes memory; used to establish that Vedic cognition is not sm\u1e5bti and therefore has independent authority | Focused on the sm\u1e5bti/anubhava distinction for Vedic apauru\u1e63eya |\n| **Ny\u0101ya** | General term for any non-mnemonic cognition, valid or invalid; pram\u0101 is the subset that is valid | Neutral \u2014 includes both valid and invalid cognitions |\n| **Advaita** | Both the general epistemological usage AND the liberative criterion; anubhava is what \u015brava\u1e47a-manana-nididhy\u0101sana aims at; aparok\u1e63a-anubh\u016bti is brahma-j\u00f1\u0101na | Extends anubhava from the vy\u0101vah\u0101rika to the p\u0101ram\u0101rthika level |\n\n## Cross-References\n- [J\u00f1\u0101na](jnana.md) \u2014 brahma-j\u00f1\u0101na is the liberative j\u00f1\u0101na; anubhava is the criterion that distinguishes genuine brahma-j\u00f1\u0101na (aparok\u1e63a) from parok\u1e63a conceptual understanding; anubhava and j\u00f1\u0101na are related as criterion and content\n- [Aparok\u1e63a-anubh\u016bti](aparoksha-anubhuti.md) \u2014 the immediate, non-mediated realization; anubhava in its full p\u0101ram\u0101rthika form; to be built next; the compound makes the aparok\u1e63a structure explicit\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 direct sensory perception is the paradigm vy\u0101vah\u0101rika anubhava; the epistemological structure of pratyak\u1e63a \u2014 direct contact without mediating inference \u2014 informs what anubhava means at the vy\u0101vah\u0101rika level\n- [Pram\u0101](prama.md) \u2014 the valid cognition that is the result of a pram\u0101\u1e47a-event; anubhava (non-mnemonic cognition) is the broader category; pram\u0101 is anubhava that is veridical and uncontradicted\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the instruments that produce anubhava at the vy\u0101vah\u0101rika level; anubhava is what the pram\u0101\u1e47as deliver; brahma-j\u00f1\u0101na-anubhava requires the unique pram\u0101\u1e47a of Mah\u0101v\u0101kya-\u015babda\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the Mah\u0101v\u0101kyas are the instrument that produces aparok\u1e63a-anubh\u016bti; their apauru\u1e63eya nature grounds their capacity to produce anubhava of a trans-objective Brahman\n- [Adhy\u0101sa](adhyasa.md) \u2014 anubhava is what adhy\u0101sa distorts at the vy\u0101vah\u0101rika level (producing pseudo-anubhava like the snake-cognition) and what brahma-j\u00f1\u0101na-anubhava removes at the root\n\n## Audience Metaphor\n\nThere is knowing that fire burns from a physics textbook, knowing it from watching someone get burned, and knowing it because you touched the stove. These are all 'knowing that fire burns' \u2014 but the epistemic quality differs markedly. Anubhava is the third kind: the knowing that is inseparable from the event, where the distinction between knowing and what is known collapses. Brahma-j\u00f1\u0101na as anubhava goes further still: not merely 'I directly cognized Brahman' (which would still leave a cognizer facing Brahman-as-object) but 'the cognizer recognized itself as Brahman' \u2014 the event dissolves the gap between knower and known that made it look like an event at all.\n\n## Citations\n\n1. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.2 (\u015aa\u1e45kara) \u2014 'anubhav\u0101vas\u0101natv\u0101t' (because Ved\u0101nta inquiry culminates in anubhava): establishes that the process of \u015brava\u1e47a-manana-nididhy\u0101sana aims at anubhava, not just conceptual understanding; anubhava is the criterion distinguishing genuine brahma-j\u00f1\u0101na from its preparatory stages\n2. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) v.5 (\u015aa\u1e45kara) \u2014 scripture-study (\u015b\u0101stra) is only the means; anubhava is the end: parok\u1e63a-j\u00f1\u0101na produced by \u015b\u0101stra-reading is necessary but cannot itself be liberation; the text draws the critical distinction between knowing-about and knowing-directly\n3. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.1 (Dharmar\u0101j\u0101dhvar\u012bndra) \u2014 the technical distinction between anubhava and sm\u1e5bti (memory): anubhava is any cognition that is not a recollection of a previous cognition; this is the general epistemological definition shared across Advaita and M\u012bm\u0101\u1e43s\u0101; used to demarcate fresh cognitions from recombinations of previous material\n4. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) v.486 (\u015aa\u1e45kara) \u2014 aparok\u1e63a-anubh\u016bti as the liberative form: direct recognition of Brahman as one's own nature; the compound aparok\u1e63a (non-indirect) + anubh\u016bti (experience/cognition \u2014 stronger nominal form of anubhava) designates the culminating form of anubhava that constitutes mok\u1e63a", "concepts/anumana": "# Anum\u0101na \u2014 \u0905\u0928\u0941\u092e\u093e\u0928\n\n**Not:** syllogism, deductive reasoning, inductive generalization, abductive inference, formal logic, Mill's methods\n\nAnum\u0101na is valid inferential cognition \u2014 knowledge that arises not from direct contact with an object but from the perception of a mark (li\u1e45ga or hetu) whose invariable concomitance (vy\u0101pti) with the inferred entity (s\u0101dhya) has been established. It is the second major pram\u0101\u1e47a, operative wherever direct perception ends and where scriptural testimony does not apply.\n\nAnum\u0101na is a cognition, not an argument form. Its verbal expression in the five-membered pa\u00f1c\u0101vayava is a pedagogical device for conveying an inference to another \u2014 the inference itself is a mental event in the inferring agent.\n\n## Etymology\n\nFrom Sanskrit *anu* (after, following) + *m\u0101na* (knowing, measuring \u2014 from root *m\u0101*, to measure). Literally: knowing that which follows, knowledge that comes in the wake of \u2014 specifically, in the wake of perceiving a mark. Anum\u0101na follows pratyak\u1e63a (perception of the li\u1e45ga) and depends on previously established vy\u0101pti (the invariable connection), but its conclusion reaches what perception cannot directly contact.\n\n## The Structure of Anum\u0101na\n\n### The Three Components\n\nEvery valid anum\u0101na requires:\n\n1. **Vy\u0101pti** (invariable concomitance): the established necessary connection between the hetu (reason/mark) and s\u0101dhya (what is to be inferred). *Wherever there is smoke, there is fire.* Vy\u0101pti is not correlation; it expresses a pervasive, causally grounded relation. Its establishment requires *tarka* (hypothetical reasoning \u2014 see tarka.md) and prior observation, but it is not itself an induction.\n\n2. **Pak\u1e63adharmat\u0101** (the mark being present in the subject): the hetu is perceived in the pak\u1e63a (the subject of inference). *The mountain has smoke.*\n\n3. **S\u0101dhanavy\u0101pti** (conjunction of vy\u0101pti and pak\u1e63adharmat\u0101): from the two established premises, the inferential cognition arises: *Therefore the mountain has fire.*\n\n### The Five-Membered Argument (Pa\u00f1c\u0101vayava)\n\nThe verbal expression of anum\u0101na for communication has five limbs (in Ny\u0101ya; other schools use three):\n\n1. **Pratij\u00f1\u0101** (thesis): \"The mountain has fire.\"\n2. **Hetu** (reason): \"Because it has smoke.\"\n3. **Ud\u0101hara\u1e47a** (example with rule): \"Wherever there is smoke, there is fire \u2014 as in a kitchen hearth.\"\n4. **Upanaya** (application): \"The mountain has smoke \u2014 like the kitchen hearth.\"\n5. **Nigamana** (conclusion): \"Therefore the mountain has fire.\"\n\nThis is not a deductive syllogism. The ud\u0101hara\u1e47a (example) is not a major premise \u2014 it is an appeal to the established vy\u0101pti through a well-known case. The five-membered form is adapted for another's understanding, not required for the inference to occur in the inferring agent (who may need only three limbs for personal inference \u2014 sv\u0101rth\u0101num\u0101na vs. par\u0101rth\u0101num\u0101na).\n\n### Types of Anum\u0101na\n\nThe Ny\u0101ya-Vai\u015be\u1e63ika tradition distinguishes three types by the direction of inference:\n\n1. **P\u016brvavat** (fore-like): from cause to effect (seeing dark clouds, inferring imminent rain)\n2. **\u015ae\u1e63avat** (residue-like): from effect to cause (seeing a swollen river, inferring upstream rain)\n3. **S\u0101m\u0101nyatod\u1e5b\u1e63\u1e6da** (known through general correlation): inference that is neither causal in either direction \u2014 seeing the movement of a chariot from afar and inferring movement of the wheel\n\nAdvaita does not reject this taxonomy but does not build its epistemology around it. The Ved\u0101ntaparibh\u0101\u1e63\u0101 focuses instead on the structure of vy\u0101pti-establishment and the conditions under which anum\u0101na produces valid cognition.\n\n## The Role of Anum\u0101na in Advaita Ved\u0101nta\n\nAnum\u0101na is legitimate and important in Advaita \u2014 but it is strictly secondary to \u015aruti for any knowledge touching Brahman's nature.\n\n**Where anum\u0101na works well in Advaita:**\n- Establishing that a cause must exist for the manifest world (cosmological reasoning toward Brahman as ground)\n- Demonstrating the inadequacy of purely materialist explanations of consciousness\n- Establishing logical consistency of Advaita positions (tarka as ancillary to anum\u0101na)\n- Refuting rival philosophical positions (the Brahmas\u016btra Bh\u0101\u1e63ya uses anum\u0101na extensively in the *p\u016brvapak\u1e63a*-*siddh\u0101nta* dialectic)\n\n**Where anum\u0101na fails in Advaita:**\n- Brahman's *svar\u016bpa* (intrinsic nature) cannot be reached by anum\u0101na. Anum\u0101na requires vy\u0101pti \u2014 an established pervasive connection observed in some perceptible domain, then extended to the inferred case. Brahman's nature (pure consciousness, non-dual, without attributes) cannot be the s\u0101dhya of any inference because there is no perceptible domain in which Brahman has been correlated with any hetu. \u015aa\u1e45kara is explicit: inference can point toward a first cause but cannot characterize the nature of that cause \u2014 for that, \u015aruti alone is the instrument.\n\nThis is the crucial Advaita epistemological claim: the pram\u0101\u1e47as are domain-specific. Anum\u0101na cannot exceed its domain (the world of perceptible regularities and their extensions). For a domain that lies entirely beyond perceptible regularities, only a pram\u0101\u1e47a that is itself not object-dependent \u2014 \u015babda as apauru\u1e63eya testimony \u2014 can serve.\n\n## Vy\u0101pti Is Not Induction\n\nThe most common AI error: rendering *vy\u0101pti* as 'inductive generalization.' This collapses the distinction between Indian and Western inference theory.\n\nIn Humean induction, past regularities provide evidence for future regularities, but no necessary connection is established \u2014 constant conjunction is all that is available. Vy\u0101pti in Indian logic is not probabilistic or based on constant conjunction alone. It is established by *vyabhic\u0101ra-dar\u015bana-abh\u0101va* \u2014 the *absence* of any counterexample, combined with *tarka* (hypothetical reasoning that shows the connection would fail if the necessity did not hold). The goal is necessary connection, not high probability.\n\nThis matters for AI: rendering \"anum\u0101na\" as \"inductive reasoning\" imports the Humean problem of induction (why trust past regularities?) into a framework that is explicitly built to avoid it. The import is not a translation; it is a structural misreading.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 anum\u0101na is the second pram\u0101\u1e47a in the Advaita list\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 the direct cognition that provides vy\u0101pti-confirmation and the perceptual base for inference\n- [Tarka](tarka.md) \u2014 hypothetical reasoning that supports but does not replace anum\u0101na\n- [Arth\u0101patti](arthapatti.md) \u2014 postulation; related to but structurally distinct from anum\u0101na\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the pram\u0101\u1e47a that supplements anum\u0101na for Brahman-knowledge; what inference cannot reach, \u015aruti addresses\n- Vy\u0101pti \u2014 [v0.9 ny\u0101ya-vai\u015be\u1e63ika] \u2014 the invariable concomitance on which anum\u0101na depends; Ny\u0101ya-specific analysis deferred to v0.9\n\n## Audience Metaphor\n\nLike seeing smoke on a distant mountain and knowing there must be fire \u2014 not because you've seen this particular fire, but because fire and smoke are inseparably connected in a way that has been established over time. You're not guessing; you're following a track that is causally laid. The sign and what it signifies are bound together, not merely correlated.\n\n## Citations\n\n1. [Tarkasa\u1e43graha](/references/tarkasangraha.md) \u00a7\u00a714\u201320 \u2014 Annambha\u1e6d\u1e6da's analysis of anum\u0101na, the five-membered argument (pa\u00f1c\u0101vayava), and the types of hetu (reason)\n2. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.3 \u2014 Dharmar\u0101ja Adhvarin's treatment of anum\u0101na within Advaita epistemology, including its scope and limits relative to Brahman-knowledge\n3. Ny\u0101yadar\u015bana 1.1.5 \u2014 Gautama's definition of anum\u0101na\n4. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.6 \u2014 \u015aa\u1e45kara on the limits of anum\u0101na in establishing Brahman's nature\n\n## Cross-Dar\u015bana Note (Ny\u0101ya anum\u0101na)\n\nThe same term is treated from its source school in **nyaya-vaisheshika (v0.9)**, where anum\u0101na is a full pram\u0101\u1e47a yielding certainty, five-membered, resting on a real vy\u0101pti. Here in Advaita epistemology anum\u0101na is finally subordinate to \u015babda and cannot by itself reach the non-dual. Same word, different dar\u015bana \u2014 this is school-contrast, not duplication. See [nyaya-vaisheshika anum\u0101na](../../nyaya-vaisheshika/concepts/anumana.md).", "concepts/anupalabdhi": "# Anupalabdhi \u2014 \u0905\u0928\u0941\u092a\u0932\u092c\u094d\u0927\u093f\n\n**Not:** absence, non-existence, privation, emptiness, the perception of nothing, negative perception\n\nAnupalabdhi is valid cognition of absence \u2014 the cognitive operation by which the absence of a perceptible object in a perceptible locus is itself established as a positive piece of knowledge. It is the sixth and most contested pram\u0101\u1e47a in the Advaita Ved\u0101nta list. It produces a specific type of cognition: *\"There is no pot on this floor\"* \u2014 not as a failed perception, but as a genuine, informative cognition of a specific absence.\n\nThe crucial condition: anupalabdhi applies only when the absent object is *perceptible* \u2014 i.e., it would be perceivable by the relevant sense organ if it were present in that locus. You cannot use anupalabdhi to establish the absence of an imperceptible object.\n\n## Etymology\n\nFrom Sanskrit *an-* (negation prefix) + *upa* (upon, in contact with \u2014 the same *upa* that appears in *upam\u0101na*) + *labdhi* (obtaining, grasping, cognizing \u2014 from root *labh*, to obtain, to reach). Literally: non-obtaining, non-grasping \u2014 the failing-to-reach that is itself a valid cognitive act when it concerns a perceptible object in a perceptible field.\n\nThe *labdhi* in the compound is essential: this is a form of *labdhi* (cognitive contact) \u2014 the *an-* negates the content of what is obtained, not the obtaining itself. Anupalabdhi is still a valid *upalapdhi* (obtaining) of knowledge \u2014 what is obtained is the knowledge of an absence.\n\n## The Perceptibility Condition\n\nThe defining constraint of anupalabdhi: the absent entity must be *upalabdhi-yogya* \u2014 fit to be perceived, perceptible. This is what distinguishes anupalabdhi from:\n\n- Mere failure to perceive (I did not look, or did not look carefully)\n- Cognizing the absence of something imperceptible (air, Brahman, atoms)\n- Doubting whether something is present\n\n**Examples where anupalabdhi operates:**\n- \"There is no pot on this floor\" \u2014 a pot is visible to the eye; the floor is within the visual field; the conditions for pot-perception are satisfied; I look and do not find. This structured non-finding is anupalabdhi.\n- \"There is no sound in this room\" \u2014 sound is audible; the room is within auditory range; conditions for sound-perception are met; I listen and do not find. Valid anupalabdhi.\n- \"There is no fire here\" \u2014 fire is visible; the locus is within visual range; conditions are met; I look and find no fire. Valid anupalabdhi.\n\n**Examples where anupalabdhi does NOT operate:**\n- \"There is no Brahman here\" \u2014 Brahman is not perceptible by sense organs; the perceptibility condition fails. Anupalabdhi cannot establish Brahman's absence.\n- \"There is no air in this sealed room\" \u2014 air is not normally visible; the perceptibility condition for air by vision is not met. A different instrument (inference from physical criteria, or special perception) would be needed.\n- \"There is no mind in the brain\" \u2014 mind (manas) in the Advaita sense is the inner organ; not perceptible in the way a pot is; anupalabdhi cannot establish this absence.\n\nThe perceptibility condition protects against misuse of anupalabdhi as a global instrument for establishing absences wherever convenient.\n\n## Why Anupalabdhi Is Not Pratyak\u1e63a\n\nThe Ny\u0101ya school subsumes anupalabdhi under pratyak\u1e63a. The Ny\u0101ya argument: when I perceive the floor and see no pot, the absence is included in the perception of the floor as a qualified object (\"the empty floor,\" \"the potless floor\"). Absence-cognition is a feature of the perceptual event, not a separate pram\u0101\u1e47a.\n\nM\u012bm\u0101\u1e43s\u0101 (Kum\u0101rila Bha\u1e6d\u1e6da) and Advaita (Dharmar\u0101ja Adhvarin, Ved\u0101ntaparibh\u0101\u1e63\u0101 Ch.6) resist this:\n\n**The phenomenological argument:** Perceiving a floor and perceiving that no pot is on the floor are different cognitive events. In the first, the floor is the object of cognition. In the second, the *absence of the pot* is the object. The floor is merely the *locus* (adhikara\u1e47a) of the absence \u2014 it is not itself what is cognized as absent. Absence (abh\u0101va) is a distinct ontological category in Ny\u0101ya-Vai\u015be\u1e63ika and in M\u012bm\u0101\u1e43s\u0101; its cognition is a distinct epistemological event.\n\n**The causal argument:** Pratyak\u1e63a arises from sense-object contact (indriya-artha-sannikar\u1e63a). But there is no sense-organ contact with an absence \u2014 you cannot touch or see an absence. What causes the anupalabdhi-cognition is precisely the failure of such contact to occur in conditions where it should have. This causal structure is different from any pratyak\u1e63a causal structure.\n\n**The m\u0101nasa argument:** For objects of inner experience (the absence of doubt, the absence of grief \u2014 \"I am no longer anxious\"), the anupalabdhi involves the internal organ (anta\u1e25kara\u1e47a), not the external senses. Reducing this to pratyak\u1e63a requires expanding pratyak\u1e63a so broadly that it loses its distinctive meaning.\n\n## Anupalabdhi in Advaita \u2014 The Liberation Application\n\nThe most philosophically significant application in Advaita: anupalabdhi is the operative instrument for cognizing the *absence of avidy\u0101 (ignorance)* in the liberated state.\n\nAvidy\u0101 (in its epistemological function \u2014 see avidya-epistemological.md) is the ignorance that superimposes individual selfhood on pure consciousness. Liberation (mok\u1e63a) involves the removal of avidy\u0101. But if avidy\u0101 is removed, how is its removal cognized? By what instrument does the liberated j\u00f1\u0101nin know that avidy\u0101 is no longer operative?\n\nMadhus\u016bdana Sarasvat\u012b (Advaitasiddhi) addresses this: the absence of avidy\u0101 is not inferred; it is not perceived through any external sense; it is cognized by anupalabdhi \u2014 the positive cognitive event of \"there is no avidy\u0101 here (in this consciousness)\" under conditions where avidy\u0101 would be operative if present. This is a subtle but important application: anupalabdhi as the sixth pram\u0101\u1e47a covers the cognition of absences that are cognitively significant in liberation contexts.\n\n## Types of Abh\u0101va (Absence) \u2014 The Objects of Anupalabdhi\n\nNy\u0101ya-Vai\u015be\u1e63ika distinguishes four types of absence (*abh\u0101va*), all potentially cognizable via anupalabdhi when the perceptibility condition is met:\n\n1. **Pr\u0101gabh\u0101va** (prior absence): the absence of a thing before it comes into existence \u2014 the absence of a pot before the potter makes it\n2. **Pradhva\u1e43sabh\u0101va** (posterior absence): the absence after a thing has been destroyed \u2014 the absence of the pot after it is broken\n3. **Atyant\u0101bh\u0101va** (absolute absence): the absence of a thing in a locus where it never has been and never will be \u2014 the absence of colour in air\n4. **Anyony\u0101bh\u0101va** (mutual absence): the absence of one thing in another \u2014 the absence of a cloth in a pot (and vice versa)\n\nOf these, anupalabdhi is most clearly operative for pradhva\u1e43sabh\u0101va (you look for the pot after the accident and cognize its absence) and atyant\u0101bh\u0101va (you look for colour in the air). Pr\u0101gabh\u0101va is trickier since you are cognizing the absence of something not yet made.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 anupalabdhi is the sixth and final pram\u0101\u1e47a in the Advaita list\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 the pram\u0101\u1e47a to which Ny\u0101ya reduces anupalabdhi; Advaita/M\u012bm\u0101\u1e43s\u0101 maintain the distinction\n- [Arth\u0101patti](arthapatti.md) \u2014 the fifth pram\u0101\u1e47a; also frequently debated as reducible vs. independent\n- [Avidy\u0101 (epistemological)](avidya.md) \u2014 the ignorance whose absence in liberation is cognized via anupalabdhi\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 sublation; the related operation by which a prior cognition is overridden by a new one; anupalabdhi can establish the absence of what was previously cognized\n- [Adhy\u0101sa](adhyasa.md) \u2014 superimposition; avidy\u0101 in its operative form; the thing whose anupalabdhi is relevant to liberation\n\n## Audience Metaphor\n\nLike checking a classroom for an absent student \u2014 you don't simply fail to see her; you actively look, establish that she would be visible from this vantage point if she were here, and then cognize: she is not present. The not-seeing is a structured, informative cognitive event \u2014 not a blank in your awareness. That structured cognition of absence is anupalabdhi.\n\n## Citations\n\n1. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.6 \u2014 Dharmar\u0101ja Adhvarin's formal treatment of anupalabdhi as the sixth Advaita pram\u0101\u1e47a; the perceptibility condition; distinction from pratyak\u1e63a\n2. [Advaitasiddhi](/references/advaitasiddhi.md) \u2014 Madhus\u016bdana Sarasvat\u012b on anupalabdhi in the context of cognizing the absence of avidy\u0101 in liberation\n3. [\u015alokavarttika](/references/slokavarttika.md) \u2014 Kum\u0101rila Bha\u1e6d\u1e6da's defence of anupalabdhi as independent from pratyak\u1e63a in M\u012bm\u0101\u1e43s\u0101\n4. Ny\u0101yadar\u015bana commentary \u2014 V\u0101tsy\u0101yana on why Ny\u0101ya reduces absence-cognition to pratyak\u1e63a", "concepts/aparoksha-anubhuti": "# Aparok\u1e63a-anubh\u016bti \u2014 \u0905\u092a\u0930\u094b\u0915\u094d\u0937\u093e\u0928\u0941\u092d\u0942\u0924\u093f\n\n**Not:** direct perception (pratyak\u1e63a), mystical vision or divine vision, revelation (theological), sam\u0101dhi (P\u0101ta\u00f1jala Yoga), enlightenment event (temporally bounded), parok\u1e63a-j\u00f1\u0101na\n\n**Aparok\u1e63a-anubh\u016bti** is the Advaita Ved\u0101nta term for the immediate, non-mediated realization of \u0101tman-Brahman identity \u2014 the direct recognition that constitutes brahma-j\u00f1\u0101na when it has achieved its full liberative form. The compound is built from *a-parok\u1e63a* (non-indirect, non-mediated, direct) and *anubh\u016bti* (experience, realization, cognition \u2014 the nominal form of *anubhava*). It names the qualitative shift in which intellectual understanding-about Brahman (*parok\u1e63a-j\u00f1\u0101na*) becomes the direct recognition-as-Brahman that produces mok\u1e63a.\n\nThe Aparok\u1e63\u0101nubh\u016bti (the short prakara\u1e47a text attributed to \u015aa\u1e45kara) opens by stating the central epistemological claim: *aparok\u1e63a-anubh\u016btir eva mok\u1e63a\u1e25 na tu parok\u1e63a-j\u00f1\u0101nam* \u2014 \"It is aparok\u1e63a-anubh\u016bti alone that is liberation, not parok\u1e63a-j\u00f1\u0101na.\" This single statement encodes the entire structure of Advaita's soteriological epistemology: the path of Ved\u0101nta study produces parok\u1e63a-j\u00f1\u0101na (necessary but insufficient); the path culminates in aparok\u1e63a-anubh\u016bti (the sufficient condition for mok\u1e63a).\n\n## Etymology\n\n*A-parok\u1e63a*: from *a-* (not, negation) + *parok\u1e63a* (indirect, mediated, that which requires inference or report from another \u2014 literally \"beyond sight,\" from *para* [other, beyond] + *ak\u1e63a* [eye]). Parok\u1e63a is what cannot be directly seen; a-parok\u1e63a is what does not require the mediation of inference, report, or memory \u2014 what is directly present.\n\n*Anubh\u016bti*: from *anu-* (along with, following) + *bh\u016bti* (from *bh\u016b*, to be/become; noun: arising, being, occurrence). The term suggests what arises in the cognitive event \u2014 what is cognized directly. Stronger nominal form than *anubhava*; typically used in more formally philosophical contexts.\n\nTogether: *aparok\u1e63a-anubh\u016bti* \u2014 the direct, non-mediated arising of cognition; the cognition that is not dependent on inference, scripture-mediation, or any other intermediate step, but is the immediate recognition itself.\n\n## The Parok\u1e63a / Aparok\u1e63a Distinction\n\nThis distinction is the key epistemological axis in Advaita's account of how brahma-j\u00f1\u0101na works:\n\n| Feature | **Parok\u1e63a-j\u00f1\u0101na** (indirect knowledge) | **Aparok\u1e63a-anubh\u016bti** (direct realization) |\n|---------|----------------------------------------|---------------------------------------------|\n| **Means** | \u015aruti-instruction, teacher, scripture-study | Nididhy\u0101sana culminating in direct recognition |\n| **Structure** | Cognition-about: knower understands a claim about Brahman | Recognition-as: knower recognizes itself as Brahman |\n| **Qualification** | Can be held by anyone with adequate study | Requires preparation (viveka, vair\u0101gya) + nididhy\u0101sana |\n| **Soteriological value** | Necessary preparatory stage; does not itself produce mok\u1e63a | Sufficient for mok\u1e63a when genuine |\n| **Residual doubt** | Doubts remain \u2014 can be addressed by manana | No doubt remains \u2014 the recognition is complete |\n| **Analogy** | Knowing from a map that Paris is on the Seine | Standing on the banks of the Seine in Paris |\n| **Time of arising** | During \u015brava\u1e47a (hearing) and manana (reflection) | During or after nididhy\u0101sana (contemplation) |\n\n## The Path: From Parok\u1e63a to Aparok\u1e63a\n\nThe three-stage path (\u015brava\u1e47a \u2192 manana \u2192 nididhy\u0101sana) is precisely the path from parok\u1e63a to aparok\u1e63a:\n\n**\u015arava\u1e47a** (hearing): The student hears the Mah\u0101v\u0101kyas (*tat tvam asi*, *aham brahm\u0101smi*, etc.) from a qualified teacher in the context of the Upani\u1e63ads. This produces *parok\u1e63a-j\u00f1\u0101na* \u2014 the student understands what the Mah\u0101v\u0101kya claims. The understanding is indirect because it is mediated by the teacher's instruction and the student's conceptual apparatus. It is necessary but produces only a cognitive grasp.\n\n**Manana** (reflection): The student addresses doubts systematically \u2014 philosophical, logical, and empirical objections to the non-dual claim. Why does the world appear if Brahman is the only reality? How can mithy\u0101 arise if Brahman is unchanging? This deepens the parok\u1e63a-j\u00f1\u0101na into a robust, doubt-free intellectual grasp. Still parok\u1e63a \u2014 mediated by reasoning and conceptual work.\n\n**Nididhy\u0101sana** (contemplation): The student repeatedly and intensely dwells on the Mah\u0101v\u0101kya \u2014 not to think-about it further but to let the intellectual grasp ripen into direct recognition. Nididhy\u0101sana is *aparok\u1e63\u0101-nubh\u016bti-s\u0101dhanam* \u2014 the means of producing aparok\u1e63a-anubh\u016bti (Ved\u0101ntas\u0101ra 47). The transition it enables is not a further conceptual step but a qualitative shift \u2014 like the difference between understanding musically why a chord is dissonant and actually hearing the dissonance.\n\n## What Makes Aparok\u1e63a-anubh\u016bti \"Direct\"\n\nThe quality of non-mediacy (*a-parok\u1e63atva*) in aparok\u1e63a-anubh\u016bti differs from ordinary pratyak\u1e63a (direct sensory perception) in an important way:\n\nOrdinary pratyak\u1e63a is direct in the sense that it involves unmediated causal contact between the sense organ and the object \u2014 no inference, no report from another, no memory-retrieval. But it still involves a subject perceiving an object. The subject-object structure is intact.\n\nAparok\u1e63a-anubh\u016bti is direct in a stronger sense: it is not mediated by inference, report, or memory \u2014 AND it dissolves the subject-object structure that would leave it as a cognition-of-Brahman-from-outside. The Advaita texts describe it as *\u0101tma-s\u0101k\u1e63\u0101tk\u0101ra* \u2014 literally \"directly witnessing (s\u0101k\u1e63\u0101t) the self (\u0101tman).\" The witness and the witnessed are not-two. This is why the Aparok\u1e63\u0101nubh\u016bti is not modeled on perceptual analogy but on the self-luminous (svaya\u1e43prak\u0101\u015ba) nature of consciousness itself: Brahman knows itself by being itself, not by cognizing itself as an object.\n\n## \u0100tma-S\u0101k\u1e63\u0101tk\u0101ra: The Event of Self-Recognition\n\nVivekac\u016b\u1e0d\u0101ma\u1e47i vv.473\u2013479 describes the culminating moment as *\u0101tma-s\u0101k\u1e63\u0101tk\u0101ra* \u2014 the direct witnessing of the self. \u015aa\u1e45kara commands the disciple: *s\u0101k\u1e63\u0101tkuru* \u2014 \"recognize directly, now.\" The imperative form suggests that aparok\u1e63a-anubh\u016bti is achievable, not a distant or arbitrary grace-event. But it is not achievable by further intellectual effort alone \u2014 it is the ripening of intensive contemplation.\n\nWhat is \"directly witnessed\"? Not the empirical self (the body-mind complex) \u2014 that is visible without any Ved\u0101ntic inquiry. What is directly recognized is \u0101tman as pure awareness (*cit*), self-luminous, unconditioned, not born and not dying, identical with Brahman. The recognition: \"this awareness that I am is not a property of my body-mind complex but is the very nature of Brahman, within which the body-mind complex appears.\"\n\n## Aparok\u1e63a-anubh\u016bti and B\u0101dha\n\nAparok\u1e63a-anubh\u016bti is the cognitive event that produces the highest b\u0101dha \u2014 the sublation of the fundamental adhy\u0101sa (see badha-badhita.md). The snake-rope analogy: the moment of \"it's a rope\" \u2014 with adequate light, looking clearly \u2014 is the b\u0101dha of the snake-cognition. Aparok\u1e63a-anubh\u016bti is the p\u0101ram\u0101rthika equivalent: the moment of \"\u0101tman is Brahman\" \u2014 after \u015brava\u1e47a-manana-nididhy\u0101sana \u2014 b\u0101dhita-s the root adhy\u0101sa of \"I am this body-mind in a real external world.\"\n\nAfter the b\u0101dha:\n- The apparent snake (individual j\u012bva as separate reality) is dissolved.\n- The rope (Brahman as the sole reality) is what was always there.\n- The j\u012bvanmukta continues to function in the vy\u0101vah\u0101rika world but without the adhy\u0101sic identification that made the world appear independently real.\n\n## The Self-Validating Character\n\nAparok\u1e63a-anubh\u016bti is *svata\u1e25pr\u0101m\u0101\u1e47ya* \u2014 self-validating. Its authority does not come from external confirmation (a teacher's certificate, a philosophical argument that the recognition was correct, a repeated occurrence). The recognition carries its validity intrinsically because what is recognized is Brahman \u2014 which is trik\u0101l\u0101b\u0101dhita, never sublated (see svatahpramanya.md). A Mah\u0101v\u0101kya-produced aparok\u1e63a-anubh\u016bti does not need to be verified by further inquiry; its self-validating quality is precisely what distinguishes it from the preparatory parok\u1e63a stages.\n\n## The J\u012bvanmukta: Life After Aparok\u1e63a-anubh\u016bti\n\nThe j\u012bvanmukta (liberated while alive) has had aparok\u1e63a-anubh\u016bti. What changes and what persists?\n\n**What is removed:** The root adhy\u0101sa \u2014 \"I am a finite self in a real external world.\" The identification with the body-mind complex as one's ultimate nature. The sense of being a separate agent accumulating karma.\n\n**What persists:** The body-mind complex continues functioning until pr\u0101rabdha-karma (karma already set in motion) is exhausted. The j\u012bvanmukta continues to perceive the world, use pram\u0101\u1e47as, engage in activity. The world continues to appear. But its appearance is no longer accompanied by the adhy\u0101sic identification.\n\n**The analogy:** The j\u012bvanmukta sees the snake in the rope (the world) but knows it is the rope (Brahman). The seeing persists; the misidentification does not.\n\n## Cross-References\n- [J\u00f1\u0101na](jnana.md) \u2014 brahma-j\u00f1\u0101na is the content; aparok\u1e63a-anubh\u016bti is the quality required for that content to be genuinely liberative; aparok\u1e63a-anubh\u016bti is brahma-j\u00f1\u0101na that has achieved the aparok\u1e63a quality\n- [Anubhava](anubhava.md) \u2014 anubhava is the general term for non-mnemonic direct cognition; anubh\u016bti (aparok\u1e63a-anubh\u016bti) is the specific nominalization used when the cognition achieves the liberative-direct quality\n- [Adhy\u0101sa](adhyasa.md) \u2014 aparok\u1e63a-anubh\u016bti is the cognitive event that removes adhy\u0101sa; the two are causally paired: adhy\u0101sa is what is removed; aparok\u1e63a-anubh\u016bti is what removes it\n- [Mithy\u0101](mithya.md) \u2014 aparok\u1e63a-anubh\u016bti reveals the mithy\u0101 status of the j\u012bva's individuality and the world's independent reality; the Vivekac\u016b\u1e0d\u0101ma\u1e47i triple-definition (brahma satyam, jagan mithy\u0101, j\u012bvo brahmaiva) is the content of what aparok\u1e63a-anubh\u016bti recognizes\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 Mah\u0101v\u0101kyas are the pram\u0101\u1e47a that initiates and catalyzes the path to aparok\u1e63a-anubh\u016bti; without \u015brava\u1e47a of the Mah\u0101v\u0101kya, nididhy\u0101sana has no object to contemplate\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 aparok\u1e63a-anubh\u016bti is self-validating; its authority requires no external confirmation because what it recognizes is Brahman, which is trik\u0101l\u0101b\u0101dhita\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 aparok\u1e63a-anubh\u016bti is the cognitive event that produces the highest b\u0101dha: the sublation of the fundamental adhy\u0101sa; the b\u0101dhita object is the j\u012bva's apparent separate reality; what persists is Brahman\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 ordinary direct perception is the model for understanding the 'directness' quality (a-parok\u1e63atva) of aparok\u1e63a-anubh\u016bti; but the two differ in that pratyak\u1e63a involves subject-object contact while aparok\u1e63a-anubh\u016bti dissolves that structure\n\n## Audience Metaphor\n\nYou have read every map of India that has ever been made, studied satellite imagery, memorized every river and mountain range, and can draw the subcontinent from memory. This is parok\u1e63a-j\u00f1\u0101na: complete, accurate, indirect. Now suppose you stand on a headland at the southern tip of the continent, sea on three sides, the land stretching north behind you, and you feel in your bones that you are standing on this particular piece of earth in its actual weight and texture and smell. The map knowledge and the standing-on-land knowledge are both real and both true. But the second is aparok\u1e63a. Aparok\u1e63a-anubh\u016bti of Brahman is the second kind \u2014 but more radical: it is the recognition that the headland, the sea, the body standing on it, and the consciousness recognizing it are all Brahman; and that the 'you' who thought it was looking at Brahman was Brahman all along. The parok\u1e63a preparation (\u015brava\u1e47a-manana) built the map; nididhy\u0101sana is walking to the headland; aparok\u1e63a-anubh\u016bti is the moment the feet touch the ground.\n\n## Citations\n\n1. [Aparok\u1e63\u0101nubh\u016bti](/references/aparokshanubhuti.md) v.1 (attributed to \u015aa\u1e45kara) \u2014 opening verse: 'b\u0101labodhana-san\u0101rtha-laghuv\u1e5btty\u0101 pradar\u015byate' \u2014 written for the instruction of beginners; but the title itself (aparok\u1e63a-anubh\u016bti = immediate direct realization) states the goal: liberation is not parok\u1e63a conceptual knowledge but aparok\u1e63a direct cognition of \u0101tman\n2. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv.473\u2013479 (\u015aa\u1e45kara) \u2014 the distinction between \u015brava\u1e47a-produced understanding and \u0101tma-s\u0101k\u1e63\u0101tk\u0101ra (direct self-recognition); 's\u0101k\u1e63\u0101tkuru' (recognize directly, right now) commands the disciple; the entire nididhy\u0101sana section aims at transforming parok\u1e63a into aparok\u1e63a\n3. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.3.28 (\u015aa\u1e45kara) \u2014 aparok\u1e63a-j\u00f1\u0101na vs. parok\u1e63a-j\u00f1\u0101na in the context of how Brahman-knowledge operates; the commentarial tradition uses this passage to establish that the Ved\u0101nta texts aim at aparok\u1e63a recognition, not mere parok\u1e63a instruction\n4. [Ved\u0101ntas\u0101ra](/references/vedantasara.md) 47 (Sad\u0101nanda) \u2014 the three stages of \u015brava\u1e47a, manana, nididhy\u0101sana as the path from parok\u1e63a to aparok\u1e63a; nididhy\u0101sana is explicitly described as 'aparok\u1e63\u0101-nubh\u016bti-s\u0101dhanam' \u2014 the means of producing aparok\u1e63a-anubh\u016bti", "concepts/aptavakya": "# \u0100pta-v\u0101kya \u2014 \u0906\u092a\u094d\u0924\u0935\u093e\u0915\u094d\u092f\n\n**Not:** testimony (generic Western epistemology), authority (social, institutional), witness testimony (legal), scripture, hearsay\n\n**\u0100pta-v\u0101kya** (\u0101pta = trustworthy/reliable; v\u0101kya = speech/statement) is the technical term in Ny\u0101ya epistemology for **testimony of a person qualified by direct knowledge** \u2014 the word of someone who has directly realized the matter they communicate, who intends to communicate it accurately, and who is free from the cognitive defects (*do\u1e63as*) that cause false or distorted speech.\n\nIn Ny\u0101ya, \u0101pta-v\u0101kya is the foundational form of *\u015babda* as a pram\u0101\u1e47a (Ny\u0101yas\u016btra 1.1.7: *\u0101ptopade\u015ba\u1e25 \u015babda\u1e25* \u2014 \"verbal testimony is the instruction of an \u0101pta\"). The pram\u0101\u1e47a-force of testimony \u2014 what makes someone's word a source of valid cognition rather than mere noise \u2014 is grounded in the *\u0101pta-status* of the testifier.\n\n## The Three Conditions of \u0100pta-Status\n\nV\u0101tsy\u0101yana's *Ny\u0101yabh\u0101\u1e63ya* (on NS 1.1.7) specifies three conditions an \u0101pta must satisfy:\n\n| Condition | Term | Content |\n|-----------|------|---------|\n| Direct knowledge | *S\u0101k\u1e63\u0101tk\u1e5btadharman* | The \u0101pta has directly realized the matter in the relevant domain \u2014 not book-knowledge or inference from others, but immediate realization |\n| Benevolent intention | *\u015ai\u1e63ya-hit\u0101ya icch\u0101* | The \u0101pta desires the student's/listener's benefit, not personal gain or social status |\n| Accurate communication | *Yath\u0101d\u1e5b\u1e63\u1e6dam \u0101khy\u0101na* | The \u0101pta communicates the matter exactly as realized, without distortion, omission, or exaggeration |\n\nFailure of any condition removes \u0101pta-status: one who has direct knowledge but communicates inaccurately (for whatever reason) is not an \u0101pta for epistemic purposes; one who has benevolent intention but only indirect knowledge cannot yield pram\u0101 on matters beyond ordinary inference.\n\nThe cognitive defects (*do\u1e63as*) that destroy \u0101pta-status are:\n- **R\u0101ga** (passion/attachment) \u2014 the testifier may shade the truth in favor of what they desire\n- **Dve\u1e63a** (aversion/hatred) \u2014 they may shade it against what they dislike\n- **Moha** (confusion/delusion) \u2014 their knowledge may itself be distorted at the source\n\n## D\u1e5b\u1e63\u1e6da and Ad\u1e5b\u1e63\u1e6da Testimony (NS 1.1.8)\n\nNy\u0101yas\u016btra 1.1.8 distinguishes two domains of \u0101pta-v\u0101kya:\n\n**D\u1e5b\u1e63\u1e6da-artha** (seen/empirical matters): \u0101pta testimony about facts accessible in principle to ordinary observation \u2014 the physician who testifies to disease causation, the geographer who testifies to distant terrain. The listener could in principle verify this through their own perception; the \u0101pta's testimony shortcuts this process. Such testimony is assessed by checking against available observation and by the \u0101pta's track record.\n\n**Ad\u1e5b\u1e63\u1e6da-artha** (unseen/meta-empirical matters): \u0101pta testimony about matters not accessible to ordinary observation \u2014 dharma (what actions lead to good/bad outcomes in future lives), the nature of Brahman, the effects of ritual. Here the listener cannot independently verify; they depend entirely on the \u0101pta's direct realization. This is the epistemologically more demanding and interesting category: how does one identify an \u0101pta for *ad\u1e5b\u1e63\u1e6da* matters?\n\nFor Ny\u0101ya, the solution involves examining:\n- Whether the testifier's *d\u1e5b\u1e63\u1e6da* testimony is reliable (track record)\n- Whether the testifier shows the behavioral markers consistent with claiming direct realization of the *ad\u1e5b\u1e63\u1e6da*\n- Whether the teaching is internally consistent and free from contradiction\n\n## The Ny\u0101ya Theistic Account (Udayana)\n\nUdayana's *Ny\u0101yakusum\u0101\u00f1jali* (4th century) builds the argument that **God (\u012a\u015bvara) is the supreme \u0101pta** and that Vedic authority is grounded in divine \u0101ptatva:\n\n1. Veda pertains primarily to *ad\u1e5b\u1e63\u1e6da* matters (dharma, the nature of the self, liberated states)\n2. *Ad\u1e5b\u1e63\u1e6da* matters require an \u0101pta with direct realization of them\n3. No finite human has such comprehensive direct realization\n4. God is omniscient (sarvaj\u00f1a), benevolent (sarvabh\u016btahita), and free from all do\u1e63as\n5. Therefore God is the supreme \u0101pta; Veda is God's testimony; Vedic authority rests on divine \u0101ptatva\n\nThis argument ties Vedic authority to theism \u2014 a move M\u012bm\u0101\u1e43s\u0101 and Advaita both resist.\n\n## The M\u012bm\u0101\u1e43s\u0101 Rejection\n\nM\u012bm\u0101\u1e43s\u0101 (Kum\u0101rila, Prabh\u0101kara) rejects the \u0101pta-v\u0101kya account of Vedic authority entirely:\n\n- **Apauru\u1e63eyatva:** Veda has no author \u2014 human or divine. It is not the testimony of any person. Its authority (*pr\u0101m\u0101\u1e47ya*) is therefore not derivative from any individual's reliability.\n- **Why this matters:** If Veda were God's testimony, its authority would depend on God's reliability. But God's reliability must itself be established \u2014 by what? By testimony? By inference? This generates a regress or circularity. The M\u012bm\u0101\u1e43s\u0101 position cuts this knot: Veda's authority is intrinsic (*svata\u1e25*), not derived from a testifier.\n- **\u0100pta-v\u0101kya is pauru\u1e63eya:** All person-authored testimony is in principle fallible (even if a specific \u0101pta is reliable). Vedic authority must be unconditional; therefore it cannot rest on \u0101pta-status.\n\nM\u012bm\u0101\u1e43s\u0101 does use \u0101pta-v\u0101kya for non-Vedic testimony (medical texts, authoritative teachers in secular domains) \u2014 but not for the Veda itself.\n\n## Advaita's Position: Apauru\u1e63eyatva + Guru-\u0100pta\n\nAdvaita follows M\u012bm\u0101\u1e43s\u0101 on Vedic apauru\u1e63eyatva (BSBh intro, BSBh 1.1.3): the Veda is not the testimony of God or any person; its authority is intrinsic and unconditional. \u015aa\u1e45kara explicitly rejects Udayana's argument that God-as-\u0101pta grounds Vedic authority.\n\n**But Advaita develops a parallel \u0101pta-v\u0101kya concept for the guru:** The *guru* (teacher) who has realized Brahman through *aparok\u1e63a-anubh\u016bti* is an \u0101pta in the domain of brahma-j\u00f1\u0101na. The student who approaches a qualified guru receives the Mah\u0101v\u0101kya \u2014 the Vedic teaching of non-duality \u2014 through the guru's transmission. This transmission has the structure of \u0101pta-v\u0101kya:\n\n- The guru has direct realization (*brahma-ni\u1e63\u1e6dha*) \u2014 satisfying *s\u0101k\u1e63\u0101tk\u1e5btadharman*\n- The guru desires the student's liberation (*\u015bi\u1e63ya-hit\u0101ya icch\u0101*)\n- The guru communicates exactly what they have realized (*yath\u0101d\u1e5b\u1e63\u1e6dam \u0101khy\u0101na*)\n\n\u015aa\u1e45kara's *Upade\u015bas\u0101hasr\u012b* specifies the guru-qualification: \"*\u015brotriya brahma-ni\u1e63\u1e6dha*\" \u2014 versed in scripture (providing access to apauru\u1e63eya Vedic knowledge) and established in Brahman (providing the \u0101pta-qualification for conveying that knowledge effectively).\n\n**The two-level structure in Advaita:**\n\n| Level | Type of authority | Source | Epistemological ground |\n|-------|------------------|--------|----------------------|\n| Veda (Mah\u0101v\u0101kya) | Apauru\u1e63eya | No author | Intrinsic svata\u1e25pr\u0101m\u0101\u1e47ya |\n| Guru's transmission | Pauru\u1e63eya \u0101pta-v\u0101kya | Guru with aparok\u1e63a-anubh\u016bti | Guru's s\u0101k\u1e63\u0101tk\u0101ra + freedom from do\u1e63as |\n\nThe student needs both: the apauru\u1e63eya Veda is the ultimate source, but the \u0101pta-guru is the transmission context that makes the Mah\u0101v\u0101kya operative. A student who reads \"tat tvam asi\" in a book without a qualified teacher's guidance has access to the words but not to the effective \u015brava\u1e47a that the guru's \u0101pta-transmission enables.\n\n## \u0100pta-v\u0101kya and Svata\u1e25pr\u0101m\u0101\u1e47ya\n\nIn the M\u012bm\u0101\u1e43s\u0101-Advaita framework, the relationship between \u0101pta-v\u0101kya and svata\u1e25pr\u0101m\u0101\u1e47ya is nuanced:\n\n- For **non-Vedic \u0101pta-v\u0101kya** (testimony of a human teacher about empirical or meta-empirical matters), *parata\u1e25pr\u0101m\u0101\u1e47ya* applies \u2014 the testimony's validity is established *from outside*, by verifying the \u0101pta's qualifications and track record.\n- For **Vedic \u015babda**, *svata\u1e25pr\u0101m\u0101\u1e47ya* applies \u2014 validity is intrinsic; it does not require external verification of an author's reliability (there is no author).\n- For the **guru's transmission** of Vedic Mah\u0101v\u0101kya, the \u0101pta-qualification of the guru is assessed (parata\u1e25), but the Mah\u0101v\u0101kya content itself carries intrinsic Vedic authority (svata\u1e25).\n\nThis layering \u2014 parata\u1e25 qualification of the human transmitter, svata\u1e25 authority of the Vedic content being transmitted \u2014 is characteristic of Advaita's sophisticated integration of the two frameworks.\n\n## Cross-References\n- [\u015aabda-pram\u0101\u1e47a](shabda-pramana.md) \u2014 verbal testimony as a pram\u0101\u1e47a; \u0101pta-v\u0101kya is the Ny\u0101ya analysis of *why* verbal testimony can be a pram\u0101\u1e47a (because of the \u0101pta-status of the testifier); \u015babda-pram\u0101\u1e47a is the broader category; \u0101pta-v\u0101kya is the theoretical grounding for the pauru\u1e63eya (person-authored) sub-type\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 the contrast between svata\u1e25 (intrinsic) and parata\u1e25 (externally established) validity is directly relevant to how \u0101pta-v\u0101kya and apauru\u1e63eya Vedic testimony differ in their epistemic grounding\n- [Aparok\u1e63a-anubh\u016bti](aparoksha-anubhuti.md) \u2014 the direct realization that constitutes the guru's \u0101pta-qualification in the domain of brahma-j\u00f1\u0101na; the guru's \u0101ptatva for Brahman-knowledge requires aparok\u1e63a-anubh\u016bti (not mere parok\u1e63a/conceptual knowledge)\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the general epistemological framework; \u0101pta-v\u0101kya situates within the \u015babda sub-category of the pram\u0101\u1e47a framework\n- [Tarka](tarka.md) \u2014 hypothetical reasoning that supports testimony; in Advaita's manana stage, tarka supports the \u0101pta-guru's Mah\u0101v\u0101ky
