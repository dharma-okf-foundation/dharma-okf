-----------|---------|\n| **Pratyak\u1e63a** (perception) | Present sensory objects: color, form, sound, taste, smell, touch; mental states directly apprehended | The redness of fire; the heat of the stove |\n| **Anum\u0101na** (inference) | Entities accessible via a li\u1e45ga (mark): fire via smoke, the self via memory, future events via signs | Fire on the hill, inferred from smoke |\n| **\u015aabda / \u0100gama** (testimony) | What valid speakers report; Vedic Mah\u0101v\u0101kyas' referents | \"Devadatta is in his house\"; \"\u0100tman is Brahman\" |\n| **Upam\u0101na** (comparison) | Similarity-relations; the referent of comparative descriptions | The gavaya (wild ox) resembles a domestic cow |\n| **Arth\u0101patti** (postulation) | The unexpressed fact required to explain an otherwise incongruent observation | Devadatta's nocturnal eating (postulated to explain his obesity despite daytime fasting) |\n| **Anupalabdhi** (non-apprehension) | Absences (abh\u0101va): the non-presence of an expected entity | The absence of a pot on the table |\n\nThe scope-matching of pram\u0101\u1e47a and prameya is the foundation of the Advaita position that different means of valid cognition cannot be extended beyond their proper domains: pratyak\u1e63a cannot establish Brahman (which is not a sensory object), nor can anum\u0101na (which requires a universally-known vy\u0101pti relation that cannot include Brahman as a term), nor can upam\u0101na. Only \u015babda \u2014 specifically the apauru\u1e63eya Vedic Mah\u0101v\u0101kyas \u2014 has the premeya-domain that reaches the \u0101tman-Brahman relationship.\n\n## The Ny\u0101ya Twelve Premeyas\n\nNy\u0101yas\u016btra 1.1.9 enumerates twelve premeyas as the objects whose correct knowledge leads to liberation (in the Ny\u0101ya system):\n\n1. \u0100tman (self)\n2. \u015aar\u012bra (body)\n3. Indriya (sense organs)\n4. Artha (sense objects)\n5. Buddhi (intellect/cognition)\n6. Manas (mind)\n7. Prav\u1e5btti (activity)\n8. Do\u1e63a (faults: r\u0101ga, dve\u1e63a, moha)\n9. Pretyabh\u0101va (rebirth)\n10. Phala (results/fruits of karma)\n11. Du\u1e25kha (suffering)\n12. Apavarga (liberation)\n\nThis list reveals the Ny\u0101ya soteriology: liberation comes from correct knowledge (pram\u0101) about the nature of these twelve entities \u2014 particularly understanding that suffering arises from do\u1e63a, which arises from mistaken cognitions about self and objects. The Ny\u0101ya project is to provide correct pram\u0101s about these premeyas as the path to liberation.\n\nAdvaita does not reject this framework but places it within the vy\u0101vah\u0101rika domain: the twelve premeyas are valid objects of vy\u0101vah\u0101rika inquiry. The Advaita correction: the j\u012bva who correctly knows all twelve premeyas still operates within the framework of adhy\u0101sa \u2014 the apparently separate self knowing apparently separate objects. Brahma-j\u00f1\u0101na dissolves the frame, not just the particular mistaken cognitions within it.\n\n## The Problem of Brahman as Premeya\n\nThe central epistemological puzzle for Advaita is: **Can Brahman be a premeya?**\n\nIf Brahman could be a premeya in the ordinary sense, it would be an object facing a subject (the j\u012bva as pram\u0101t\u1e5b). But:\n\n1. **Brahman is the \u0101tman** \u2014 the very subject. A subject cannot face itself as an external object without already presupposing the subject-object duality that brahma-j\u00f1\u0101na dissolves.\n\n2. **Brahman has no distinguishing mark (li\u1e45ga)** \u2014 anum\u0101na requires a vy\u0101pti (pervasion relation) between a li\u1e45ga and what is inferred. Brahman, as all-pervasive (vibhu) and without qualities distinguishing it from what it permeates, cannot serve as the target of inferential cognition.\n\n3. **Brahman is not a sensory object** \u2014 pratyak\u1e63a is limited to what the sense organs, operating via the anta\u1e25kara\u1e47a, can contact. Brahman is not an object in the sensory field.\n\n**The Advaita solution:** Brahman is not a premeya in the ordinary sense but the *vi\u1e63aya* (subject-matter) of a special \u015babda-pram\u0101\u1e47a (Mah\u0101v\u0101kya-\u015babda). The Mah\u0101v\u0101kya does not operate by delivering a cognition of Brahman-as-external-object; instead, it uses lak\u1e63a\u1e47\u0101 (the secondary/implied sense) to point the j\u012bva's consciousness toward its own nature. The primary (v\u0101cya) meaning of \"tat tvam asi\" would yield two different entities \u2014 Brahman and j\u012bva \u2014 which is not the intended meaning; lak\u1e63a\u1e47\u0101 reveals the implied meaning: the identity of the witness-consciousness in the j\u012bva with Brahman.\n\nThe result: the Mah\u0101v\u0101kya's \"premeya\" is the j\u012bva's own \u0101tman \u2014 the pram\u0101t\u1e5b itself. This is why BSBh 1.1.1 says Brahman is \"already known as the self\" (*\u0101tmeti tu prasiddha\u1e25*) \u2014 the inquiry is not into an unknown object but into the nature of the very subject conducting the inquiry.\n\n## Premeya and Mithy\u0101\n\nAt the p\u0101ram\u0101rthika level, all vy\u0101vah\u0101rika premeyas are mithy\u0101 \u2014 they have dependent reality (they appear and function within the conventional frame) but no independent existence (they have no reality apart from Brahman in which they appear). The world of objects (sarva prameyas) is jagat mithy\u0101 \u2014 the second line of the Advaita mah\u0101v\u0101kya-summary: *brahma satyam, jagan mithy\u0101, j\u012bvo brahmaiva n\u0101para\u1e25*.\n\nThis does not mean vy\u0101vah\u0101rika premeyas are unreal in the sense of non-appearing or causally non-efficacious: fire burns, water quenches thirst, pot holds grain. But their apparent independent reality \u2014 their seeming to exist as standalone entities apart from the awareness that cognizes them \u2014 is the superimposition that adhy\u0101sa maintains and brahma-j\u00f1\u0101na removes.\n\nAfter brahma-j\u00f1\u0101na: the j\u012bvanmukta continues to cognize premeyas at the vy\u0101vah\u0101rika level (fire still burns). The premeyas continue to appear. But they appear within the recognition that their appearance is in Brahman \u2014 they are Brahman-appearing-as-apparent-multiplicity. Their mithy\u0101 status is known but does not prevent their vy\u0101vah\u0101rika function.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the instrument that delivers valid cognition of the premeya; each pram\u0101\u1e47a has its own competent premeya-domain; the scope-matching of pram\u0101\u1e47a and premeya defines the boundaries of each instrument\n- [Pram\u0101](prama.md) \u2014 the valid cognition of the premeya; the result of the pram\u0101\u1e47a-triad operating correctly; pram\u0101 corresponds to its premeya as it actually is\n- [Pram\u0101t\u1e5b](pramata.md) \u2014 the knowing subject who employs the pram\u0101\u1e47a to cognize the premeya; in brahma-j\u00f1\u0101na, the pram\u0101t\u1e5b and the \"premeya\" are the same entity \u2014 the j\u012bva recognizes its own nature as Brahman\n- [Adhy\u0101sa](adhyasa.md) \u2014 the mechanism that generates the apparent premeya-multiplicity; adhy\u0101sa superimposes the appearance of an independently-real object-world on what is Brahman; the premeyas of vy\u0101vah\u0101rika cognition are constituted by this superimposition\n- [Mithy\u0101](mithya.md) \u2014 the ontological status of vy\u0101vah\u0101rika premeyas; they are mithy\u0101 \u2014 not utterly non-existent (asat) but not ultimately real (sat) \u2014 they have dependent being in Brahman\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the pram\u0101\u1e47a whose premeya is Brahman-the-\u0101tman; the Mah\u0101v\u0101kya-\u015babda operates via lak\u1e63a\u1e47\u0101 to reveal the \u0101tman's nature, producing the unique \"premeya-cognition\" where object and subject are non-two\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 the pram\u0101\u1e47a with the most restricted premeya-domain (present sensory objects); its domain's restriction is the reason brahma-j\u00f1\u0101na cannot be pratyak\u1e63a-based\n- [Anum\u0101na](anumana.md) \u2014 the pram\u0101\u1e47a whose premeya includes inferred entities accessible via marks (li\u1e45gas); its premeya-domain cannot reach Brahman because Brahman has no li\u1e45ga separable from what it pervades\n\n## Audience Metaphor\n\nImagine the instruments in an orchestra: each plays within its own register \u2014 the violin cannot play a tuba's lowest notes, the tuba cannot produce the violin's upper harmonics. Each instrument has its own prameya (the tonal range it can validly sound). Now imagine that the conductor's baton \u2014 which coordinates all the instruments \u2014 is itself not in anyone's range; it doesn't produce a note; it enables all the notes. Brahman is like the conductor's baton: not an instrument-domain (premeya), but the enabling presence that makes all instrument-domains possible. The Mah\u0101v\u0101kya-\u015babda, rather than producing another 'note,' points the music toward the silence out of which all notes arise. This is why the Mah\u0101v\u0101kya's 'premeya' is the pram\u0101t\u1e5b's own nature \u2014 the pointing turns inward.\n\n## Citations\n\n1. [Ny\u0101yas\u016btra](/references/nyaya-sutra.md) 1.1.9 (Gautama) \u2014 the central Ny\u0101ya text on prameya: lists the twelve pad\u0101rthas as prameyas; establishes that the correct understanding of premeya (in combination with correct understanding of pram\u0101\u1e47a and the fruit of inquiry) is a means to liberation in the Ny\u0101ya system; Ny\u0101ya's approach: liberation comes from correct knowledge of what actually exists, which requires knowing the correct premeyas\n2. [Tattvabodha](/references/tattvabodha.md) (attributed to \u015aa\u1e45kara) \u2014 the pedagogical pram\u0101\u1e47a-triad introduction: pram\u0101t\u0101 (knower), pram\u0101\u1e47a (instrument), prameya (object), pram\u0101 (valid cognition); the Advaita student must first learn the general framework before understanding how Brahman-inquiry modifies it\n3. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.1 (\u015aa\u1e45kara) \u2014 'ath\u0101to brahma-jij\u00f1\u0101s\u0101' (now therefore the inquiry into Brahman): \u015aa\u1e45kara's commentary establishes that Brahman is both the subject-matter (vi\u1e63aya) of Ved\u0101nta-inquiry and \u2014 crucially \u2014 that this inquiry cannot be conducted as a standard pram\u0101\u1e47a-event seeking an external prameya; Brahman, as the \u0101tman, is already known (self-evident); the inquiry aims at removing avidy\u0101, not at first-time discovery of an unknown object\n4. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.1 (Dharmar\u0101j\u0101dhvar\u012bndra) \u2014 systematic Advaita account of prameya-domains for each pram\u0101\u1e47a; each pram\u0101\u1e47a cognizes its own premeya \u2014 pratyak\u1e63a cognizes present sensory objects, anum\u0101na inferred facts, \u015babda the referents of words, etc.; the account that most precisely captures how the \u015babda-pram\u0101\u1e47a (Mah\u0101v\u0101kya) has Brahman as its prameya while acknowledging the non-standard character of this object-relation", "concepts/pratibhasika": "# Pr\u0101tibh\u0101sika \u2014 \u092a\u094d\u0930\u093e\u0924\u093f\u092d\u093e\u0938\u093f\u0915\n\n**Not:** hallucination, illusion (general), subjective experience (phenomenological sense), apparition, merely subjective, phenomenal (when used to contrast with noumenal)\n\nPr\u0101tibh\u0101sika is the lowest of the three ontological levels in Advaita Ved\u0101nta \u2014 the level of appearances that are real only from the standpoint of the particular observer undergoing a specific cognitive error. The paradigm cases: the snake seen in a rope in poor lighting, the silver seen in mother-of-pearl (nacre), the second moon seen in diplopia, objects in the dream-state. These appearances are:\n\n1. **Real in the moment of appearance** \u2014 the fear-response to the snake is genuine; the appearance is a structured event, not nothing\n2. **Dependent on a real substratum** \u2014 the snake appears *in* the rope; the dream-world appears *in* consciousness; there is an adhi\u1e63\u1e6dh\u0101na (substratum) that is not itself an error\n3. **Immediately sublatable by corrective cognition** \u2014 not by brahma-j\u00f1\u0101na (as vy\u0101vah\u0101rika is) but by simple re-observation, better lighting, or waking up\n4. **Not intersubjectively consistent** \u2014 the snake is seen only by this observer at this moment; others looking at the same rope do not see a snake\n\nThe three-level structure as Pr\u0101tibh\u0101sika fits within it:\n\n| Level | Term | Examples | Sublated by | Intersubjective? |\n|-------|------|---------|-------------|-----------------|\n| Absolute | P\u0101ram\u0101rthika | Brahman alone | Nothing | N/A (not an object of ordinary cognition) |\n| Empirical | Vy\u0101vah\u0101rika | World, bodies, fire, cause-effect | Brahma-j\u00f1\u0101na (at liberation) | Yes \u2014 consistently experienced by all observers |\n| **Apparent** | **Pr\u0101tibh\u0101sika** | **Snake-in-rope, nacre-silver, dream-world** | **Immediate corrective cognition** | **No \u2014 private to the deluded observer** |\n\n## Etymology\n\nFrom Sanskrit *pratibh\u0101sa* (appearance, semblance, reflected light \u2014 from *prati*, against/toward + *bh\u0101sa*, shining, appearing, from root *bh\u0101\u1e63*, to shine, to appear) + suffix *-ika* (pertaining to, characterized by). Literally: pertaining to or characterized by semblance or reflected appearance; what has the character of an appearance-only, a seeming.\n\nThe root *bh\u0101sa* emphasizes the shining, reflected quality of the appearance \u2014 it is not that there is nothing (the rope is there), but that what appears is a *reflected* or *refracted* appearance imposed on a substratum. The pr\u0101tibh\u0101sika object shines with borrowed light: it appears to be what it is by taking its character (snake-ness, silver-ness) from the perceiver's cognitive history, superimposed onto the real substratum.\n\n## The Snake-in-Rope Parsed at All Three Levels\n\nThe standard Advaita example \u2014 seeing a snake in a coiled rope at dusk \u2014 provides the clearest illustration of how the three-level ontology functions:\n\n**The rope itself (vy\u0101vah\u0101rika):**\nThe rope is a vy\u0101vah\u0101rika object. It is intersubjectively real \u2014 anyone with adequate lighting will see a rope. It persists through the snake-appearance and after it. It is the adhi\u1e63\u1e6dh\u0101na (substratum) of the snake-appearance. Its mithy\u0101tva is not established by the snake-rope example but by the broader Advaita argument: the rope is itself an appearance on the ultimately real Brahman.\n\n**The snake (pr\u0101tibh\u0101sika):**\nThe snake appears to this observer, in this light, at this moment. It produces real fear and real behavioral response (jumping back, calling for help). It is real *as an appearance* \u2014 there is a structured cognitive event here, not nothing. But:\n- No one else present sees a snake\n- Better lighting dissolves it immediately\n- The substratum (the rope) was not a snake at any point and did not change\n- After sublation (\"oh, it's just a rope!\") the snake-cognition is cancelled, and the rope-cognition replaces it\n\nThis is the paradigm of b\u0101dha (sublation) at the pr\u0101tibh\u0101sika level: the corrective cognition (this is a rope) overrides the erroneous cognition (this is a snake), while the substratum (the actual rope in the world) continues unchanged.\n\n**The substratum's substratum (p\u0101ram\u0101rthika):**\nThe rope itself is mithy\u0101 \u2014 it is real at the vy\u0101vah\u0101rika level but not absolutely real; it depends on Brahman as its ultimate substratum. The snake depends on the rope; the rope depends on Brahman; only Brahman is trik\u0101l\u0101b\u0101dhita. This nested structure is what the Advaita ontological analysis reveals.\n\n| Object | Status | Substratum | Sublated by |\n|--------|--------|-----------|-------------|\n| Snake | Pr\u0101tibh\u0101sika | Rope | Corrective perception (better light) |\n| Rope | Vy\u0101vah\u0101rika | Brahman | Brahma-j\u00f1\u0101na |\n| Brahman | P\u0101ram\u0101rthika | None (self-luminous) | Nothing \u2014 trik\u0101l\u0101b\u0101dhita |\n\n## The Dream World as Pr\u0101tibh\u0101sika\n\nGau\u1e0dap\u0101da (M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 2.3\u20135) employs the dream state as the key example of pr\u0101tibh\u0101sika reality. Dream-objects are:\n- Real within the dream \u2014 the dream-fire burns the dream-house; the dream-fear is phenomenologically genuine\n- Accessible only to the dreamer \u2014 no other observer shares the dream-world\n- Sublated entirely upon waking \u2014 all dream-objects vanish; the consciousness that was dreaming persists\n\nGau\u1e0dap\u0101da's argument: the waking world's relationship to Brahman is structurally analogous to the dream world's relationship to waking consciousness. The waking world (vy\u0101vah\u0101rika) is therefore also mithy\u0101 \u2014 though sublatable only by brahma-j\u00f1\u0101na rather than the simple act of waking. The dream-analogy is the most powerful pedagogical argument for the mithy\u0101tva of the vy\u0101vah\u0101rika world.\n\nNote: this argument does NOT collapse vy\u0101vah\u0101rika into pr\u0101tibh\u0101sika. The waking world is intersubjectively consistent; the dream world is not. The *structural* relationship (appearance in consciousness, mithy\u0101 status) is analogous; the *level* is different.\n\n## Pr\u0101tibh\u0101sika and B\u0101dha\n\nThe pr\u0101tibh\u0101sika is the clearest illustration of b\u0101dha (sublation \u2014 see badha-badhita.md):\n- The erroneous cognition (snake) is cancelled by the corrective cognition (rope)\n- The substratum (rope) is not destroyed \u2014 it was never the snake\n- The erroneous cognition is rendered b\u0101dhita (sublated): its claim to reality is cancelled\n\nThe pr\u0101tibh\u0101sika level thus provides the *paradigm case* from which the criterion of mithy\u0101 (b\u0101dhyatva \u2014 sulatability while substratum persists) is derived. The world is mithy\u0101 *because* it stands in the same relationship to Brahman that the snake stands in to the rope: dependent, appearance-like, sublatable by the right kind of cognition.\n\n## What Pr\u0101tibh\u0101sika Avoids\n\nThe three-level ontology with pr\u0101tibh\u0101sika as a distinct category serves a specific philosophical function: it blocks two opposite errors simultaneously.\n\n**Error 1 \u2014 Naive realism:** If the snake and the dream-world are treated as fully real (no mithy\u0101 analysis at all), Advaita cannot explain why liberating knowledge dissolves the world but corrective perception does not.\n\n**Error 2 \u2014 Nihilism / \u015a\u016bnyat\u0101 conflation:** If the snake and the world are treated as simply non-existent (asat), Advaita cannot explain the causal efficacy of appearances (the snake produces real fear) or give an account of why Brahman remains after sublation. The pr\u0101tibh\u0101sika category preserves the appearance as real *at its own level*, dependent on a real substratum.\n\nThe pr\u0101tibh\u0101sika level is the precise instrument that keeps Advaita from collapsing into either naive realism or nihilism \u2014 the same structural function that mithy\u0101 serves between sat and asat at the broadest level.\n\n## Cross-References\n- [Mithy\u0101](mithya.md) \u2014 pr\u0101tibh\u0101sika objects are mithy\u0101 at the lowest level; the criterion b\u0101dhyatva (sulatability while substratum persists) is illustrated most vividly by pr\u0101tibh\u0101sika cases\n- [Vy\u0101vah\u0101rika](vyavaharika.md) \u2014 the level above pr\u0101tibh\u0101sika; intersubjectively consistent; sublated only by brahma-j\u00f1\u0101na, not by ordinary corrective cognition\n- [P\u0101ram\u0101rthika](paramarthika.md) \u2014 the absolute level; the ultimate substratum of the vy\u0101vah\u0101rika, which is itself the substratum of the pr\u0101tibh\u0101sika\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 the sublation event; pr\u0101tibh\u0101sika is the paradigm level at which b\u0101dha is most visible and immediate\n- [Adhy\u0101sa](adhyasa.md) \u2014 pr\u0101tibh\u0101sika appearances are instances of adhy\u0101sa at the most local level (snake-properties superimposed on the rope); \u0100tman-an\u0101tman adhy\u0101sa operates at the vy\u0101vah\u0101rika level with the same structure\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 the pr\u0101tibh\u0101sika level is where pratyak\u1e63a \"fails\" \u2014 the perceptual instrument delivers a cognition (snake) that is immediately contradicted by better conditions; the analysis of pratyak\u1e63a-error at this level informs the broader epistemology\n\n## Audience Metaphor\n\nImagine seeing a face in a cloud formation. The face is really there as an appearance \u2014 it shapes your perception, holds your attention, perhaps makes you feel something. But it is not there in the way the cloud is there. The cloud is vy\u0101vah\u0101rika \u2014 it will still be a cloud to anyone who looks. The face is pr\u0101tibh\u0101sika \u2014 visible as a face only to you right now, at this angle, in this moment; someone else sees a different pattern, and ten minutes later you no longer see the face either. Most importantly: the cloud (the substratum) was never destroyed by the appearance of the face, and the face-appearance was never actually part of the cloud. That is pr\u0101tibh\u0101sika: an appearance that depends on a real substratum but is itself not real at the level of that substratum.\n\n## Citations\n\n1. [Pa\u00f1cada\u015b\u012b](/references/panchadashi.md) 1.7 (Vidy\u0101ra\u1e47ya) \u2014 explicit three-level taxonomy: pr\u0101tibh\u0101sika (snake-rope, dream), vy\u0101vah\u0101rika (waking world), p\u0101ram\u0101rthika (Brahman)\n2. [M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101](/references/mandukya-karika.md) 2.3\u20135 (Gau\u1e0dap\u0101da) \u2014 dream objects as real within the dream-state and sublated by waking; the waking-dream parallel as the key argument for vy\u0101vah\u0101rika being similarly mithy\u0101\n3. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 2.1.14 (\u015aa\u1e45kara) \u2014 snake-rope example as the paradigm for ontological analysis; the three-valued ontology implicit in the treatment of anirvacan\u012bya", "concepts/pratyaksha": "# Pratyak\u1e63a \u2014 \u092a\u094d\u0930\u0924\u094d\u092f\u0915\u094d\u0937\n\n**Not:** perception (Western sense-data model), sense impression, empirical observation, qualia, raw sensation, phenomenal experience\n\nPratyak\u1e63a is valid cognition that arises through direct contact between a sense organ (indriya) and its object (artha). It is the first and most foundational pram\u0101\u1e47a, operative when the knower's cognitive organ is in direct contact with what is to be known \u2014 whether that object is external (a pot, a sound, a colour) or internal (joy, doubt, the desire to know).\n\nPratyak\u1e63a does not mean \"sensory data.\" It names the entire cognitive event of valid direct-contact knowing, including the contribution of the anta\u1e25kara\u1e47a (inner organ) that takes on the form of the object (v\u1e5btti).\n\n## Etymology\n\nFrom Sanskrit *prati* (before, against, in relation to) + *ak\u1e63a* (eye, sense organ; also 'axle,' the hub around which experience revolves). The compound means: that which stands directly before the sense organ, in immediate contact. The English \"ocular\" is a distant cognate (both from Proto-Indo-European *h\u2083ok\u02b7-*, to see).\n\nThe term foregrounds *contact* \u2014 not passivity. Pratyak\u1e63a is not mere exposure; it is cognitive contact that produces valid knowing.\n\n## The Structure of Pratyak\u1e63a in Advaita Ved\u0101nta\n\nAdvaita's analysis follows and extends the Ny\u0101ya account. The standard Ny\u0101ya definition (Ny\u0101yadar\u015bana 1.1.4): pratyak\u1e63a is cognition produced by *indriya-artha-sannikar\u1e63a* (sense-object contact) that is non-erroneous (avyabhic\u0101ra), definite (vyavas\u0101y\u0101tmaka), and free from doubt.\n\nAdvaita adds: the internal organ (*anta\u1e25kara\u1e47a* \u2014 manas, buddhi, aha\u1e43k\u0101ra, citta collectively) functions as an additional sense organ for objects not accessible to the five external senses. This means that knowledge of one's own mental states (\"I am happy,\" \"I doubt,\" \"I remember\") is a form of pratyak\u1e63a \u2014 not inference.\n\n### The Two Stages of Pratyak\u1e63a\n\n**Nirvikalpaka pratyak\u1e63a** (indeterminate direct cognition): The initial contact in which the object is grasped but not yet identified by name or categorized by quality. This is direct contact prior to the overlaying of concepts such as \"pot,\" \"red,\" \"mine.\" Nirvikalpaka pratyak\u1e63a is philosophically contested: Naiy\u0101yikas question whether it constitutes genuine cognition at all, since cognition seems to require predication. Advaita (following Madhus\u016bdana Sarasvat\u012b in the Advaitasiddhi) defends nirvikalpaka as genuine pram\u0101\u1e47a-generated cognition \u2014 the indeterminacy is epistemological, not a sign of cognitive failure.\n\n**Savikalpaka pratyak\u1e63a** (determinate direct cognition): The cognition in which the object is grasped with its name and qualities: \"This is a blue pot.\" Savikalpaka is direct contact *plus* conceptual placement. This is the form most people mean when they say \"I saw it\" \u2014 but it already includes interpretation layered on the initial contact.\n\nThe distinction matters because *Adhy\u0101sa* (superimposition \u2014 see adhyasa.md) typically operates at the savikalpaka level or between the two: a prior error (mistaking a rope for a snake) is a case where nirvikalpaka contact with a rope becomes savikalpaka cognition of \"snake\" due to the superimposition of a memory-form.\n\n### The Six Types of Sense-Object Contact (Sannikar\u1e63a)\n\nAnnambha\u1e6d\u1e6da (Tarkasa\u1e43graha) lists six types of contact relation (sannikar\u1e63a) through which pratyak\u1e63a arises:\n\n1. **Sanyoga** \u2014 direct physical contact (eye sees a pot directly)\n2. **Sanyukta-samav\u0101ya** \u2014 contact via inherence (eye sees colour that inheres in the pot)\n3. **Sanyukta-samav\u0101ya-samav\u0101ya** \u2014 contact via double inherence (eye sees universal 'potness' that inheres in colour which inheres in pot)\n4. **Samav\u0101ya** \u2014 inherence alone (ear 'inherits' sound as the sound is in relation to it)\n5. **Samav\u0101ya-samav\u0101ya** \u2014 inherence via inherence (ear hears sound-universal through the particular sound)\n6. **Vi\u015be\u1e63a\u1e47at\u0101** \u2014 qualifier relation (mind perceives absence as a qualifier of a locus)\n\nAdvaita modifies this taxonomy but retains the core insight: pratyak\u1e63a is not one uniform mode of contact but a family of cognitive events united by the feature of directness.\n\n### M\u0101nasa Pratyak\u1e63a \u2014 Internal Direct Cognition\n\nCrucially for Advaita: *m\u0101nasa pratyak\u1e63a* (mental/inner direct cognition) is how the inner organ (anta\u1e25kara\u1e47a) perceives its own states. Joy, grief, desire, doubt \u2014 these are directly cognized, not inferred. \"I am happy\" is not an inference from behaviour or physiology; it is direct m\u0101nasa pratyak\u1e63a.\n\nThis has consequences for the Advaita understanding of \u0100tman: while \u0100tman itself is not an object of pratyak\u1e63a (it cannot be placed before a sense organ), the *s\u0101k\u1e63i* (witness consciousness) that illumines all cognitions is sometimes described as *svaya\u1e43prak\u0101\u015ba* \u2014 self-luminous, self-cognizing in a mode analogous to but distinct from pratyak\u1e63a. See *sakshi.md* for that distinction.\n\n## What Pratyak\u1e63a Cannot Do\n\nThe boundaries of pratyak\u1e63a define what the other pram\u0101\u1e47as must cover:\n\n- Pratyak\u1e63a cannot reach *Brahman* \u2014 Brahman is not an object that can stand before a sense organ. Brahman is the very ground of the cognizing subject (the witness behind every pratyak\u1e63a). Therefore \u015aabda (\u015aruti) must serve as the pram\u0101\u1e47a for Brahman-knowledge.\n- Pratyak\u1e63a cannot reach what is *not present* \u2014 the pot in another room, yesterday's event, tomorrow's occurrence. Anum\u0101na covers indirect knowing; sm\u1e5bti (memory, not a pram\u0101\u1e47a) covers the past.\n- Pratyak\u1e63a cannot reach *absence as such* \u2014 whether the absence of a perceptible object in a perceptible locus generates a distinct pram\u0101\u1e47a (anupalabdhi) or is subsumed under pratyak\u1e63a is the contested question that distinguishes Advaita/M\u012bm\u0101\u1e43s\u0101 from Ny\u0101ya.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the genus of which pratyak\u1e63a is the first and foundational species\n- [Anum\u0101na](anumana.md) \u2014 inferential cognition; where pratyak\u1e63a ends, anum\u0101na begins\n- [Nirvikalpaka / Savikalpaka](nirvikalpaka-savikalpaka.md) \u2014 the two stages of pratyak\u1e63a analysed in depth\n- [Adhy\u0101sa](adhyasa.md) \u2014 superimposition; the cognitive error that pratyak\u1e63a at the savikalpaka level can produce when prior impressions override fresh contact\n- [Anupalabdhi](anupalabdhi.md) \u2014 non-cognition of the perceptible; contested relative to pratyak\u1e63a as either reducible to it or genuinely distinct\n- [Anubhava](anubhava.md) \u2014 direct experience in the liberative sense; related to but distinct from pratyak\u1e63a as pram\u0101\u1e47a\n\n## Audience Metaphor\n\nLike the difference between raw video footage of an unfamiliar face (nirvikalpaka \u2014 contact before recognition) and the moment you realize 'that's my colleague from the 2019 conference' (savikalpaka \u2014 contact with conceptual placement). The recognition is a second cognitive act layered on the first contact, not a 'better' or 'more accurate' version of it.\n\n## Citations\n\n1. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.2 \u2014 Dharmar\u0101ja Adhvarin's full analysis of pratyak\u1e63a in Advaita, including external and internal (m\u0101nasa) pratyak\u1e63a\n2. [Advaitasiddhi](/references/advaitasiddhi.md) \u2014 Madhus\u016bdana Sarasvat\u012b on nirvikalpaka pratyak\u1e63a and its status as genuine pram\u0101\u1e47a\n3. Ny\u0101yadar\u015bana 1.1.4 \u2014 Gautama's definition of pratyak\u1e63a as indriya-artha-sannikar\u1e63a-ja (born of sense-object contact)\n4. [Tarkasa\u1e43graha](/references/tarkasangraha.md) \u00a7\u00a76\u201313 \u2014 Annambha\u1e6d\u1e6da's detailed analysis of the six types of sannikar\u1e63a (contact relations)", "concepts/shabda-pramana": "# \u015aabda / \u0100gama (as Pram\u0101\u1e47a) \u2014 \u0936\u092c\u094d\u0926 / \u0906\u0917\u092e (\u092a\u094d\u0930\u092e\u093e\u0923)\n\n**Not:** verbal testimony, hearsay, religious tradition, scripture in Western sense, oral history, authoritative source\n\n**Critical cross-bundle notice:** This file treats *\u015babda* exclusively in its pram\u0101\u1e47a-theoretic role \u2014 as a valid cognitive instrument (specifically: verbal testimony from a reliable source). This is distinct from *\u015babda* as an ontological category of sound (covered in dharma-foundation bundle, v0.1). The same Sanskrit word operates in two entirely different frameworks; mapping between them without marking the distinction produces serious conceptual errors.\n\n\u015aabda (also called \u0101gama \u2014 \"that which has come down\") is the pram\u0101\u1e47a that consists in the verbal instruction of a trustworthy, competent speaker (\u0101pta). In Advaita Ved\u0101nta, its most critical application is as the only operative pram\u0101\u1e47a for knowledge of Brahman \u2014 the domain that neither perception (pratyak\u1e63a) nor inference (anum\u0101na) can reach.\n\n## Etymology\n\n**\u015aabda:** from Sanskrit root *\u015babd* (to sound, to make sound) + suffix *a*; means sound, word, verbal expression. As a pram\u0101\u1e47a it refers not to sound as a category but to verbal communication as a vehicle of knowledge.\n\n**\u0100gama:** from *\u0101* (toward, unto) + *gam* (to come, root \u221agam); literally \"that which has come toward\" \u2014 received, transmitted, that which has arrived. \u0100gama as pram\u0101\u1e47a emphasizes the received-tradition dimension: what has been passed down from one who knew. \u0100gama is sometimes preferred in Advaita contexts to emphasize the transmission lineage (Guru-parampar\u0101).\n\nThe two terms are used near-interchangeably as names for the third pram\u0101\u1e47a in the cross-dar\u015bana literature (Ny\u0101ya uses *\u015babda*, Advaita and M\u012bm\u0101\u1e43s\u0101 use both). The Yoga S\u016btras use *\u0101gama* in the three-pram\u0101\u1e47a list of 1.7.\n\n## The Structure of \u015aabda-Pram\u0101\u1e47a\n\n### \u0100pta-V\u0101kya \u2014 The Words of a Reliable, Competent Speaker\n\nFor \u015babda to function as a pram\u0101\u1e47a (rather than as mere hearsay or testimony of uncertain reliability), the speaker must be an *\u0101pta* \u2014 one who:\n\n1. Has direct knowledge of the domain they speak about (j\u00f1\u0101nav\u0101n \u2014 knowledgeable)\n2. Is honest and desires to convey their knowledge accurately (satya-k\u0101ma \u2014 truth-desiring)\n3. Has the competence to translate their knowledge into words that the listener can understand\n\nWhen these conditions obtain, the words of the \u0101pta are not merely probable indicators of truth \u2014 they are a genuine instrument of knowledge. The listener's cognition, arising from understanding the \u0101pta's words, is valid pram\u0101\u1e47a-generated knowledge.\n\n### Apauru\u1e63eya \u2014 The Uniqueness of \u015aruti\n\nOrdinary \u0101pta-v\u0101kya (words of a reliable person) generates valid knowledge in everyday and specialized domains. But in Advaita, \u015aruti (the Vedas, particularly the Upani\u1e63ads) occupies a unique position: it is *apauru\u1e63eya* \u2014 not of personal authorship.\n\nThe M\u012bm\u0101\u1e43s\u0101 position (and Advaita inherits this): the Vedas were not composed by any person, including God as a personal creator-deity. They are eternal and self-validating. The \u1e5b\u1e63is are *dra\u1e63\u1e6d\u0101ras* (seers) \u2014 those who perceived the Vedic mantras, not authors who composed them.\n\nThis is not the claim that God dictated the Vedas. It is the more radical claim: no person's intent, limitation, or perspective distorts or conditions the Vedic teaching. Ordinary testimony is reliable only insofar as the speaker is \u0101pta; the possibility of error is never fully excluded. Apauru\u1e63eya removes this source of uncertainty: \u015aruti is not testimony-of-a-person but a self-luminous instrument that operates in the domain it specifies.\n\n### Why \u015aruti Is the Only Pram\u0101\u1e47a for Brahman\n\n\u015aa\u1e45kara's argument (Brahmas\u016btra Bh\u0101\u1e63ya 1.1.3) is not a faith argument \u2014 it is a pram\u0101\u1e47a-theoretic argument:\n\n**Premise 1:** Pratyak\u1e63a (perception) operates through sense-organ contact with an object. Brahman is not an object that can be placed before a sense organ \u2014 Brahman is the very consciousness that is the substratum of the sense organs. Pratyak\u1e63a cannot be its own ground.\n\n**Premise 2:** Anum\u0101na (inference) requires vy\u0101pti \u2014 an invariable connection observed in some perceptible domain, then extended to the inferred. There is no perceptible domain in which Brahman has been observed in connection with any inferential mark. Inference can gesture toward a ground of the world but cannot characterize the nature of that ground.\n\n**Conclusion:** Only an instrument that is not object-dependent and that operates in the domain of Brahman-knowledge can serve. \u015aruti, understood as apauru\u1e63eya and as direct testimony of those who realized Brahman, is that instrument. When the student hears \"Tat Tvam Asi\" (Thou art That) from a competent Guru in the right context, the \u015babda-pram\u0101\u1e47a operates: a direct cognition of Brahman as one's own nature (aparok\u1e63\u0101nubh\u016bti) arises \u2014 or its conditions are established.\n\n## \u015aabda-Pram\u0101\u1e47a vs. \u015aabda as Ontological Category (Cross-Bundle Distinction)\n\n| Dimension | \u015aabda as Pram\u0101\u1e47a (this file \u2014 v0.3) | \u015aabda as Sound-Category (dharma-foundation v0.1) |\n|-----------|--------------------------------------|--------------------------------------------------|\n| Domain | Epistemology \u2014 valid sources of knowing | Ontology \u2014 what sound and language are |\n| Question | How does verbal testimony produce valid knowledge? | What is the nature of sound as a reality-category? |\n| Advaita context | \u015aruti as apauru\u1e63eya instrument for Brahman-knowledge | N\u0101da, Sphota, V\u0101k \u2014 the metaphysics of language |\n| Key texts | Brahmas\u016btra Bh\u0101\u1e63ya 1.1.3; Ved\u0101ntaparibh\u0101\u1e63\u0101 | Spho\u1e6dasiddhi; V\u0101kyapad\u012bya (Bhart\u1e5bhari) |\n| AI risk | Reducing to 'testimony' or 'scripture' | Reducing to 'sound waves' or 'verbal communication' |\n\nUsing \"\u015aabda as pram\u0101\u1e47a\" to mean \"the Vedas are authoritative because they are scripture\" is an error in both directions: it imports Western theology's 'authority of scripture' into a framework that operates on pram\u0101\u1e47a-theoretic grounds, and it obscures the apauru\u1e63eya claim that is doing the actual epistemological work.\n\n## \u015aabda in Other Schools\n\nThe school-scope matters here:\n\n- **Ny\u0101ya:** \u015aabda is the fourth pram\u0101\u1e47a \u2014 \u0101pta-v\u0101kya; no apauru\u1e63eya claim. Reliability depends entirely on the speaker's \u0101pta-status.\n- **M\u012bm\u0101\u1e43s\u0101:** \u015aabda is the primary pram\u0101\u1e47a for dharma (ritual injunction); apauru\u1e63eya claim; Vedas are self-validating (svata\u1e25pr\u0101m\u0101\u1e47ya). Advaita inherits this but redirects the application from dharma to brahma-j\u00f1\u0101na.\n- **S\u0101\u1e43khya-Yoga:** \u0100gama is the third pram\u0101\u1e47a (after pratyak\u1e63a and anum\u0101na); primary reference is to the words of realized sages, not specifically to Vedic apauru\u1e63eya.\n- **C\u0101rv\u0101ka:** Rejects \u015babda as pram\u0101\u1e47a entirely \u2014 only pratyak\u1e63a is valid.\n\n## Cross-References\n- [Pram\u0101\u1e47a](pramana.md) \u2014 \u015babda/\u0101gama is the third pram\u0101\u1e47a in the Advaita list\n- [\u0100ptav\u0101kya](aptavakya.md) \u2014 words of the reliable, competent speaker; the proximate mechanism of \u015babda-pram\u0101\u1e47a\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 the doctrine that \u015aruti's validity is intrinsic, not derived from external verification\n- [Aparok\u1e63\u0101nubh\u016bti](aparoksha-anubhuti.md) \u2014 direct realization of Brahman; what \u015babda-pram\u0101\u1e47a (as \u015aruti-instruction) aims to produce\n- [Anum\u0101na](anumana.md) \u2014 the pram\u0101\u1e47a that \u015babda supplements for Brahman-knowledge\n- *\u015aabda (dharma-foundation, v0.1)* \u2014 the ontological-sound category; NOT this file \u2014 cross-bundle distinction mandatory\n\n## Audience Metaphor\n\nLike trusting a master ceramicist's description of how to center clay \u2014 not because you're taking their word for something you could check another way, but because their words convey direct-experience-based knowledge that you cannot yet access through your own hands. The ceramicist's words are the only instrument that carries that knowledge to you; no amount of looking at pots or reasoning about clay would substitute.\n\n## Citations\n\n1. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.3 \u2014 \u015aa\u1e45kara's argument that Vedic testimony is the only valid pram\u0101\u1e47a for Brahman-knowledge; neither perception nor inference can reach Brahman's nature\n2. Upadesas\u0101hasr\u012b 1.1 \u2014 \u015aa\u1e45kara on how \u015aruti functions as upade\u015ba (instruction) that operates directly on the student's understanding to produce brahma-j\u00f1\u0101na\n3. [Ved\u0101ntaparibh\u0101\u1e63\u0101](/references/vedantaparibhasha.md) Ch.6 \u2014 Dharmar\u0101ja Adhvarin's formal analysis of \u015babda-pram\u0101\u1e47a, including the \u0101pta-v\u0101kya requirement\n4. [M\u012bm\u0101\u1e43s\u0101s\u016btra](/references/mimamsa-sutra.md) 1.1.2 \u2014 Jaimini's definition: codan\u0101lak\u1e63a\u1e47o'rtho dharma\u1e25 \u2014 dharma is what is indicated by Vedic injunction; grounds M\u012bm\u0101\u1e43s\u0101 claim for \u015aruti's independence as pram\u0101\u1e47a", "concepts/sphota": "# Spho\u1e6da \u2014 \u0938\u094d\u092b\u094b\u091f\n\n**Not:** sound (acoustic), word (ordinary), phoneme, meaning (semantic content), logos (Greek)\n\n**Spho\u1e6da** is the term in the Vy\u0101kara\u1e47a (grammatical-philosophical) tradition for the **eternal, unitary linguistic unit** that the physical sounds (*dhvanis*) of speech manifest but do not constitute. The concept is central to Bhart\u1e5bhari's philosophy of language as articulated in the *V\u0101kyapad\u012bya* (c. 5th century CE) and represents his answer to the question: what is the real bearer of linguistic meaning?\n\nThe term is derived from the root *sphu\u1e6d* (to burst forth, to flash into appearance, to become evident). A spho\u1e6da is what \"bursts forth\" \u2014 the meaning-bearing linguistic entity that flashes into cognitive apprehension when the appropriate dhvani-sequence is produced. The spho\u1e6da was there before the sounds; the sounds reveal it, as a lamp reveals a pot that was there before the lamp was lit.\n\n## The Foundational Problem: How Does Sequential Sound Yield Unified Meaning?\n\nBhart\u1e5bhari's spho\u1e6dav\u0101da is an answer to a genuine epistemological puzzle in the philosophy of language: sounds are produced sequentially, one after another, and are each individually transient. By the time the final phoneme of a word or sentence is heard, the first phoneme has disappeared. Yet the listener cognizes the word or sentence as a unity \u2014 not as a sequence of remnants \u2014 and derives meaning from it as a whole.\n\nIf meaning were simply the sum of individual phonemes, how does it arise at a moment when no individual phoneme is present (they have all passed)? How does the \"word\" as a unified meaning-bearing entity persist when its component sounds are sequential and transient?\n\n**The spho\u1e6dav\u0101da answer:** There is an eternal, unitary linguistic entity \u2014 the spho\u1e6da \u2014 that is distinct from the physical sounds. The sounds (dhvanis) produced by the speaker manifest (abhivya\u00f1jaka) the spho\u1e6da without constituting it. The listener's cognitive apparatus, upon hearing the dhvani-sequence, cognizes the spho\u1e6da \u2014 the eternal linguistic unit \u2014 and through the spho\u1e6da, the meaning (artha). The spho\u1e6da bridges sequential acoustic production and unified meaning-apprehension.\n\n## Spho\u1e6da vs. Dhvani: The Foundational Distinction\n\n| Feature | **Dhvani** (physical sound) | **Spho\u1e6da** (linguistic unit) |\n|---------|----------------------------|------------------------------|\n| **Nature** | Transient, produced, acoustic | Eternal, unproduced, cognitive-linguistic |\n| **Source** | Speaker's vocal activity | Always already present; manifested, not produced |\n| **Multiplicity** | Multiple (each phoneme is separate) | Unitary (the whole word/sentence is one spho\u1e6da) |\n| **Role** | Manifests (abhivya\u00f1jaka) the spho\u1e6da | Is what the dhvanis reveal |\n| **Cognitive apprehension** | Heard as sequential acoustic events | Cognized as a unitary meaning-bearer |\n| **Variation** | Loud/soft, fast/slow dhvanis differ | The same spho\u1e6da is manifested by varied dhvanis |\n\nThe last point is important: a given word has the same meaning whether spoken loudly or softly, quickly or slowly, in a high or low pitch, by different speakers. The acoustic dhvanis vary; the spho\u1e6da (and its associated meaning) remains constant. For Bhart\u1e5bhari, this constancy across acoustic variation is evidence that the meaning-bearer (spho\u1e6da) is distinct from and independent of the acoustic variation.\n\n## The Primacy of the Sentence (V\u0101kya)\n\nV\u0101kyapad\u012bya K\u0101\u1e47\u1e0da 2 (the V\u0101kyak\u0101\u1e47\u1e0da) develops the thesis that **the sentence (v\u0101kya) is the primary linguistic unit** \u2014 not the individual word (pada) and not the phoneme (var\u1e47a). Words and phonemes are analytical abstractions from the primary speech-event, which is sentential.\n\nThe meaning of a sentence is grasped as a whole in what Bhart\u1e5bhari calls **pratibh\u0101** \u2014 a flash of insight or illumination, a direct non-inferential grasp of the complete meaning. This is not a summation of word-meanings followed by a synthetic step; it is an immediate cognitive event in which the meaning of the whole sentence is present at once.\n\nThis sentence-primacy thesis has significant consequences for the Advaita epistemology of the Mah\u0101v\u0101kyas:\n- A Mah\u0101v\u0101kya like \"tat tvam asi\" is not properly understood as the sum of three word-meanings (that + you + are) plus syntactic combination. It is a single v\u0101kya whose complete meaning \u2014 the \u0101tman-Brahman identity \u2014 must be grasped as a whole through \u015brava\u1e47a followed by the pratibh\u0101 that arises in the prepared (citta-\u015buddha) student.\n- The Mah\u0101v\u0101kya operates via lak\u1e63a\u1e47\u0101 (implication, the secondary sense) to point past the literal three-word meaning to the whole intended meaning. This is a sentential operation, not a word-by-word construction.\n\n## \u015aabda-Brahman: Spho\u1e6da and Metaphysics\n\nV\u0101kyapad\u012bya 1.1 opens with a metaphysical assertion: *an\u0101dinidhanam brahma \u015babdatattva\u1e43 yad ak\u1e63aram* \u2014 \"Beginningless and endless Brahman, the essence of the word (*\u015babda-tattva*), the imperishable \u2014 from it the world unfolds in differentiated meaning-forms.\" \n\nFor Bhart\u1e5bhari, the philosophy of language and metaphysics are inseparable: \u015babda (the Word, the linguistic absolute) is Brahman \u2014 the ultimate reality. All differentiation in the world is the unfolding (vivarta or parispanda) of the primordial linguistic Brahman. This is the concept of **\u015babda-Brahman**: not merely an analogy between word and world, but an identification \u2014 the world is the cosmic Word articulating itself in differentiated forms.\n\nThis moves well beyond the spho\u1e6da-dhvani distinction in individual linguistic events and makes the philosophy of language into a metaphysical-epistemological program: to understand language correctly is to understand the nature of ultimate reality.\n\n## The M\u012bm\u0101\u1e43s\u0101 Rejection (P\u016brvapak\u1e63a)\n\nKum\u0101rila Bha\u1e6d\u1e6da's *\u015alokav\u0101rttika* (Spho\u1e6dav\u0101da chapter) offers the central M\u012bm\u0101\u1e43s\u0101 objection:\n\n**The var\u1e47a alternative:** The individual phonemes (var\u1e47as) are the eternal entities that carry meaning. Each var\u1e47a (e.g., the phoneme \"k\", \"a\", \"t\") is eternal and self-identical \u2014 the same phoneme recognized by different speakers in different utterances is the same eternal var\u1e47a. Meaning is associated with sequences of these eternal var\u1e47as. There is no need to posit a separate spho\u1e6da.\n\n**The cognitive unity objection to spho\u1e6dav\u0101da:** Kum\u0101rila argues that even if we grant that the listener cognizes a unity, this can be explained by the successive recognition of var\u1e47as and their assembly by the mind (by sa\u1e43sk\u0101ra, mental impressions left by each phoneme) \u2014 no eternal unitary spho\u1e6da is required.\n\n**The Bhart\u1e5bhari response:** The var\u1e47a-theory faces the same puzzle: var\u1e47as are sequential; by the time the last var\u1e47a is heard, the previous ones are gone; a sequence of remembered and present entities cannot constitute a unitary present cognition of a word. The spho\u1e6da is the explanation for why the listener cognizes the word as a present unity, not a remembered sequence.\n\n## Advaita Ved\u0101nta and Spho\u1e6da\n\nAdvaita does not formally adopt spho\u1e6dav\u0101da as a required position, but the philosophical relationship is significant:\n\n1. **Apauru\u1e63eyatva support:** The Vedic word's non-human-authored (apauru\u1e63eya) character is supported by the idea that \u015babda-entities are eternal \u2014 they were not invented by any human speaker; they manifest an eternal structure. Bhart\u1e5bhari's spho\u1e6da and \u015babda-Brahman concepts provide philosophical support for the M\u012bm\u0101\u1e43s\u0101-Advaita claim that Vedic \u015babda has svata\u1e25pr\u0101m\u0101\u1e47ya because it is not derived from a fallible human source.\n\n2. **Mah\u0101v\u0101kya epistemology:** The sentence-primacy and pratibh\u0101 (flash of insight) concepts align well with how Advaita describes the Mah\u0101v\u0101kya's operation: the student who hears \"tat tvam asi\" from a qualified teacher does not process it word-by-word but is meant to receive the whole sentence's implied meaning in a single cognitive event \u2014 the pratibh\u0101 that ripens into aparok\u1e63a-anubh\u016bti through nididhy\u0101sana.\n\n3. **Ontological parallelism:** Bhart\u1e5bhari's \u015babda-Brahman (the universe as the self-articulation of the primordial Word) has a structural parallel with Advaita's Brahman-as-vivartop\u0101d\u0101na (the world as the apparent transformation/unfoldment of Brahman). Both posit a single ultimate reality from which apparent multiplicity arises.\n\n## Cross-References\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the epistemological use of linguistic testimony as a pram\u0101\u1e47a; spho\u1e6dav\u0101da provides one philosophical account of why \u015babda-entities (Vedic words) have an eternal, non-derived character that grounds their apauru\u1e63eya status\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 direct perception; in the spho\u1e6da theory, the cognition of spho\u1e6da is sometimes described as having the immediacy of pratyak\u1e63a (the listener \"sees\" the word, not infers it) \u2014 though the philosophical status of this claim is debated\n- [Anum\u0101na](anumana.md) \u2014 inference; the spho\u1e6dav\u0101da debate partly turns on whether the unitary word (spho\u1e6da) needs to be inferred from the sequential dhvanis or is directly cognized; Bhart\u1e5bhari's pratibh\u0101-account favors direct cognition rather than inference\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 the self-validating authority of cognitions; the spho\u1e6da-theory supports the self-validating character of Vedic \u015babda-knowledge by explaining why the eternal Vedic word (spho\u1e6da-Brahman) carries its own authority and does not derive it from a human speaker's intention\n\n## Audience Metaphor\n\nWhen an orchestra plays a melody, you hear the individual notes \u2014 each produced by an instrument at a moment in time. But you hear the melody as a whole, not as a sequence of isolated notes. The melody is not any single note, nor is it simply the sum of the notes (you could play the same notes in a different order and get no recognizable melody). What you hear as 'the melody' \u2014 the unified musical event \u2014 is the analog of spho\u1e6da: the whole that the individual sounds (dhvanis) manifest but do not constitute. M\u012bm\u0101\u1e43s\u0101 says the notes are primary and the melody is derivative. Bhart\u1e5bhari says the melody is primary and the notes are analytical abstractions from it. The difference matters for how we understand meaning: is meaning built up from atoms (phonemes/words), or is it grasped whole and then analyzed into atoms?\n\n## Citations\n\n1. V\u0101kyapad\u012bya 1.1 (Bhart\u1e5bhari) \u2014 'anadinidhanam brahma \u015babdatattva\u1e43 yad ak\u1e63aram / vivartate'rthabhedena prakriy\u0101 jagato yata\u1e25' \u2014 Beginningless and endless, Brahman, the essence of the word, the imperishable; from it the world unfolds in differentiated forms of meaning-entities; the opening verse establishes \u015babda-Brahman as the metaphysical ground; all differentiation (the world) is the unfolding (vivarta) of the primordial linguistic Brahman\n2. V\u0101kyapad\u012bya 1.44\u20131.56 (Bhart\u1e5bhari) \u2014 the spho\u1e6da account: the dhvani-sequence (physical sounds produced by speaker) manifests (abhivya\u00f1jaka) the spho\u1e6da; spho\u1e6da is eternal, unitary, and not constituted by the sequence; the listener cognizes the word (spho\u1e6da) through the dhvanis; spho\u1e6da is the linguistic real, dhvani the acoustic vehicle\n3. V\u0101kyapad\u012bya 2.143\u20132.145 (Bhart\u1e5bhari) \u2014 the sentence (v\u0101kya/sphota at the sentence-level) as the primary unit of linguistic meaning; individual words and phonemes are analytical abstractions from the primary speech-event; meaning is grasped as a whole (pratibh\u0101 \u2014 a flash of insight) rather than built up compositionally from parts\n4. [\u015alokav\u0101rttika](/references/slokavarttika.md) 'Spho\u1e6dav\u0101da' chapter (Kum\u0101rila Bha\u1e6d\u1e6da) \u2014 the M\u012bm\u0101\u1e43s\u0101 p\u016brvapak\u1e63a (objection) to spho\u1e6dav\u0101da: detailed critique of Bhart\u1e5bhari's theory; Kum\u0101rila argues that the var\u1e47as themselves are eternal and that there is no need to posit a separate spho\u1e6da; the var\u1e47a-theory suffices; the spho\u1e6dav\u0101da debate between Bhart\u1e5bhari and Kum\u0101rila is one of the foundational debates in classical Indian philosophy of language", "concepts/svatahpramanya": "# Svata\u1e25pr\u0101m\u0101\u1e47ya \u2014 \u0938\u094d\u0935\u0924\u0903\u092a\u094d\u0930\u093e\u092e\u093e\u0923\u094d\u092f\n\n**Not:** self-evidence (Cartesian), foundationalism, incorrigible belief, infallibility, coherentism, a priori knowledge (Kantian)\n\nSvata\u1e25pr\u0101m\u0101\u1e47ya is the epistemological thesis that the validity (*pr\u0101m\u0101\u1e47ya*) of a cognition (*j\u00f1\u0101na*) arises intrinsically (*svata\u1e25*) \u2014 from the same causal conditions that produce the cognition itself \u2014 rather than requiring a separate, external act of verification. The opposing thesis \u2014 held by Ny\u0101ya-Vai\u015be\u1e63ika and S\u0101\u1e43khya \u2014 is *paratahpr\u0101m\u0101\u1e47ya*: validity is established by something external to the cognition (successful practice, inferential confirmation, correspondence check).\n\nThe debate between these positions is one of the central disputes in Indian epistemology, with major consequences for how Vedic testimony (\u015babda-pram\u0101\u1e47a) is justified, how perception's authority is grounded, and how brahma-j\u00f1\u0101na (liberating knowledge) works in Advaita.\n\n## The Core Thesis and Its Two Parts\n\nKum\u0101rila Bha\u1e6d\u1e6da (M\u012bm\u0101\u1e43s\u0101, \u015alokav\u0101rttika S\u016btra 2) states the thesis in two parts:\n\n**Part 1 \u2014 Svata\u1e25 pr\u0101m\u0101\u1e47ya:** *Pr\u0101m\u0101\u1e47ya* (validity, the property of being a pram\u0101 \u2014 a veridical cognition) arises co-terminously with the cognition itself, from the very same causal conditions (s\u0101magr\u012b) that produce the cognition.\n\n**Part 2 \u2014 Paratah apr\u0101m\u0101\u1e47ya:** *Apr\u0101m\u0101\u1e47ya* (invalidity, the property of being an erroneous or non-veridical cognition) arises from external factors \u2014 specifically from *do\u1e63as* (defects, flaws) in the causal conditions: defective sense organs, obstructions, interference, cognitive errors.\n\nThe asymmetry is critical: **validity is the default state of any cognition; invalidity is an exceptional state that requires explanation by external do\u1e63a.** We never need to *prove* that a cognition is valid \u2014 it is presumed valid unless a do\u1e63a is discovered. We need to *explain* why a cognition is invalid by pointing to the do\u1e63a.\n\n## The Contrast: Paratahpr\u0101m\u0101\u1e47ya (Ny\u0101ya)\n\nThe Ny\u0101ya position (Ny\u0101yas\u016btra 2.1.16, Gautama): both pr\u0101m\u0101\u1e47ya and apr\u0101m\u0101\u1e47ya are established by external factors. A perception of fire is valid only when confirmed: by a second observation, by successful action (water is fetched and fire is extinguished), by coherence with other established beliefs.\n\n| Feature | **Svata\u1e25pr\u0101m\u0101\u1e47ya** (M\u012bm\u0101\u1e43s\u0101 / Advaita) | **Paratahpr\u0101m\u0101\u1e47ya** (Ny\u0101ya) |\n|---------|----------------------------------------|----------------------------|\n| **Where validity comes from** | The cognition's own causal conditions | External verification factors |\n| **Default state of a cognition** | Valid, unless a do\u1e63a is found | Indeterminate, until verified |\n| **What requires explanation** | Invalidity (the do\u1e63a must be found) | Validity (verification must succeed) |\n| **Consequence for action** | Can act on a perception immediately | Should verify before acting |\n| **Consequence for \u015aruti** | \u015aruti self-authoritative (no human author needed) | \u015aruti requires external grounding |\n| **Primary proponent** | Kum\u0101rila Bha\u1e6d\u1e6da, Prabh\u0101kara (M\u012bm\u0101\u1e43s\u0101); \u015aa\u1e45kara (Advaita) | Gautama, V\u0101tsy\u0101yana, Uddyotakara (Ny\u0101ya) |\n\n## Svata\u1e25pr\u0101m\u0101\u1e47ya Applied to Perception\n\nSvata\u1e25pr\u0101m\u0101\u1e47ya holds that *all* pram\u0101\u1e47as, including pratyak\u1e63a (perception), have intrinsic validity. When perception is operating without do\u1e63a \u2014 adequate light, functioning sense organs, absence of obstructions, attentive mind \u2014 the resulting cognition is valid and carries its validity without requiring further confirmation.\n\nThe apparent counter-example: the snake-in-rope error. Surely this shows that perception can be invalid \u2014 and if perception can be invalid, shouldn't we always verify?\n\n**The svata\u1e25pr\u0101m\u0101\u1e47ya reply:** The snake-cognition was not valid perception. The do\u1e63a \u2014 poor lighting \u2014 produced an avidy\u0101-influenced cognition, not a genuine pratyak\u1e63a. When the do\u1e63a (poor light) is removed and the rope is seen clearly, the rope-cognition is a genuine pratyak\u1e63a and is intrinsically valid. We know the snake-cognition was invalid not because we ran an external verification protocol but because we discovered the do\u1e63a (the poor light). Invalidity is established by the do\u1e63a; validity remains intrinsic to genuine cognitions.\n\n## Svata\u1e25pr\u0101m\u0101\u1e47ya and Vedic Authority (M\u012bm\u0101\u1e43s\u0101)\n\nThe M\u012bm\u0101\u1e43s\u0101 school's primary application of svata\u1e25pr\u0101m\u0101\u1e47ya is to Vedic testimony (\u015babda). M\u012bm\u0101\u1e43s\u0101 holds that the Vedas are *apauru\u1e63eya* \u2014 not authored by any person (human or divine). Because the Vedas have no author:\n\n- Their validity cannot be established by the author's credibility (as it might be for a human's testimony).\n- Their validity cannot be established by inference from the author's track record.\n- They must, therefore, be self-validating \u2014 svata\u1e25pr\u0101m\u0101\u1e47ya.\n\nFor M\u012bm\u0101\u1e43s\u0101, svata\u1e25pr\u0101m\u0101\u1e47ya is the epistemological ground of the entire Vedic canon. The Vedic injunctions (vidhi) regarding ritual action (karma-k\u0101\u1e47\u1e0da) are authoritative because their authority arises intrinsically from the Vedic texts themselves, not from external confirmation.\n\n## Svata\u1e25pr\u0101m\u0101\u1e47ya in Advaita Ved\u0101nta\n\nAdvaita inherits svata\u1e25pr\u0101m\u0101\u1e47ya from M\u012bm\u0101\u1e43s\u0101 and extends it in the direction of the j\u00f1\u0101na-k\u0101\u1e47\u1e0da (knowledge portion of the Vedas \u2014 the Upani\u1e63ads). For \u015aa\u1e45kara:\n\n**\u015aruti as svata\u1e25pr\u0101m\u0101\u1e47ya:** The Upani\u1e63ads and their Mah\u0101v\u0101kyas (tat tvam asi, aham brahm\u0101smi) are apauru\u1e63eya and therefore svata\u1e25pr\u0101m\u0101\u1e47ya. Their validity is not established by the credibility of a speaker, by inference, or by correspondence with independently established facts. They are self-authoritative.\n\n**The consequence for brahma-j\u00f1\u0101na:** If Mah\u0101v\u0101kyas were paratahpr\u0101m\u0101\u1e47ya \u2014 requiring external verification \u2014 then the knowledge of Brahman would need to be established by some other pram\u0101\u1e47a (perception? inference?) before \u015aruti could confirm it. But Brahman is not accessible by pratyak\u1e63a or anum\u0101na (which operate within the vy\u0101vah\u0101rika frame). If Mah\u0101v\u0101kyas required external validation, they could never ground brahma-j\u00f1\u0101na. Svata\u1e25pr\u0101m\u0101\u1e47ya is therefore essential to Advaita's soteriology: Mah\u0101v\u0101kyas can deliver liberating knowledge precisely because their authority is intrinsic, not dependent on external confirmation.\n\n**Svata\u1e25pr\u0101m\u0101\u1e47ya and b\u0101dha:** A cognition's intrinsic validity does not make it incorrigible. The cognition remains valid unless and until b\u0101dhita \u2014 sublated by a more adequate cognition that reveals a do\u1e63a or reveals the higher substratum. The rope-cognition is svata\u1e25pr\u0101m\u0101\u1e47ya; it is also itself mithy\u0101 at the vy\u0101vah\u0101rika level and would be b\u0101dhita by brahma-j\u00f1\u0101na. Svata\u1e25pr\u0101m\u0101\u1e47ya governs the *origin* of validity; b\u0101dha governs the *cancellation* of an appearance's validity from a higher perspective. The two are compatible.\n\n## Svata\u1e25pr\u0101m\u0101\u1e47ya and the Criterion Problem\n\nThe Ny\u0101ya objection: if all cognitions are initially valid (svata\u1e25pr\u0101m\u0101\u1e47ya), then the snake-cognition and the rope-cognition are both initially valid. How do we adjudicate between them?\n\n**The M\u012bm\u0101\u1e43s\u0101-Advaita response:** By the subsequent discovery of do\u1e63a. The snake-cognition is retrospectively revealed as invalid (apr\u0101m\u0101\u1e47ya) when the do\u1e63a (poor lighting) is identified. The rope-cognition has no such do\u1e63a and retains its validity. *Apr\u0101m\u0101\u1e47ya is always paratah* (from external do\u1e63a); *pr\u0101m\u0101\u1e47ya is always svata\u1e25.* This asymmetry resolves the adjudication problem: we do not need an external verification loop for every cognition; we only need do\u1e63a-detection when something goes wrong.\n\nThis is pragmatically superior to paratahpr\u0101m\u0101\u1e47ya: if we needed to externally verify every cognition before acting, we could never begin to act at all. Svata\u1e25pr\u0101m\u0101\u1e47ya grounds the rationality of prima facie trust in cognition while allowing for correction when do\u1e63as emerge.\n\n## Cross-References\n- [\u015aabda / \u0100gama (pram\u0101\u1e47a)](shabda-pramana.md) \u2014 the pram\u0101\u1e47a most centrally grounded by svata\u1e25pr\u0101m\u0101\u1e47ya; \u015aruti's authority is self-originating because it is apauru\u1e63eya\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the general framework of valid cognition; svata\u1e25pr\u0101m\u0101\u1e47ya is a thesis about the *source* of a pram\u0101\u1e47a's validity, applicable across all pram\u0101\u1e47a types\n- [Pratyak\u1e63a](pratyaksha.md) \u2014 perception; svata\u1e25pr\u0101m\u0101\u1e47ya holds that perception's validity is intrinsic; the snake-rope counter-example handled via do\u1e63a analysis\n- [Anum\u0101na](anumana.md) \u2014 inference; svata\u1e25pr\u0101m\u0101\u1e47ya applies equally to inference; a valid inference carries its own authority without external confirmation\n- [B\u0101dha / B\u0101dhita](badha-badhita.md) \u2014 sublation; the external event by which a cognition's apparent validity is cancelled; svata\u1e25pr\u0101m\u0101\u1e47ya and b\u0101dha together constitute a complete account of how knowledge is valid by default and corrected when do\u1e63a emerges; apr\u0101m\u0101\u1e47ya is established by the b\u0101dhita status of a cognition\n- [Adhy\u0101sa](adhyasa.md) \u2014 the cognitive superimposition that produces invalid cognitions (apr\u0101m\u0101\u1e47ya arising from do\u1e63a); adhy\u0101sa is the do\u1e63a at the level of fundamental avidy\u0101\n\n## Audience Metaphor\n\nWhen you open your eyes in good light and see a mango on the table, you do not think: 'I see something, but is this seeing-event valid? I must now run a separate check to verify that my perception is trustworthy.' You simply see the mango and know it is there. The perception carries its own validity \u2014 it does not wait for an external certificate. This is svata\u1e25pr\u0101m\u0101\u1e47ya applied to perception. Extend this: when \u015aruti says 'tat tvam asi,' the statement carries its own authority \u2014 it does not need a human author's credential to validate it, nor an external inference to confirm it. Its validity arises with the statement itself. The Ny\u0101ya philosopher says: but perception can be wrong (the snake-rope error!) \u2014 so shouldn't we always check? The M\u012bm\u0101\u1e43s\u0101-Advaita answer: yes, cognitions can be b\u0101dhita later, but their *initial* validity arises intrinsically; what requires external discovery is the *defect* (do\u1e63a), not the validity. Validity is the default; invalidity needs explanation.\n\n## Citations\n\n1. [\u015alokav\u0101rttika](/references/slokavarttika.md), S\u016btra 2 (Kum\u0101rila Bha\u1e6d\u1e6da) \u2014 the locus classicus: 'svata\u1e25 sarvasya pr\u0101m\u0101\u1e47yam' (the validity of all cognitions arises intrinsically); pr\u0101m\u0101\u1e47ya co-arises with the cognition from the same causal factors; apr\u0101m\u0101\u1e47ya (invalidity) arises from external do\u1e63as (defects); the two-part thesis\n2. [Brahmas\u016btra Bh\u0101\u1e63ya](/references/brahmasutra-bhasya.md) 1.1.3 (\u015aa\u1e45kara) \u2014 \u015aruti (Vedic testimony) is svata\u1e25pr\u0101m\u0101\u1e47ya: its authority is self-originating, not dependent on a human author's credibility or on external verification; this grounds the Advaita use of Mah\u0101v\u0101kyas as autonomous pram\u0101\u1e47a\n3. Ny\u0101yas\u016btra 2.1.16 and [Ny\u0101yabh\u0101\u1e63ya](/references/nyaya-bhasya.md) (Gautama / V\u0101tsy\u0101yana) \u2014 paratahpr\u0101m\u0101\u1e47ya: validity is established by something external to the cognition (verification, correspondence, successful action); the rival position that defines svata\u1e25pr\u0101m\u0101\u1e47ya by contrast", "concepts/tarka": "# Tarka \u2014 \u0924\u0930\u094d\u0915\n\n**Not:** inference (anum\u0101na), reductio ad absurdum (RAA, logical), debate (v\u0101da, jalpa, vita\u1e47\u1e0d\u0101), logic (generic), speculation\n\n**Tarka** is the technical term in Indian epistemology for **hypothetical or indirect reasoning** \u2014 a form of inference-supporting cognition in which one shows that the *denial* of a proposed thesis (or the denial of the vy\u0101pti/pervasion that an inference requires) would lead to unacceptable consequences. It functions structurally like a *reductio ad absurdum*: assume the opponent's position; derive a contradiction or absurdity; conclude the opponent's position is untenable.\n\nCrucially, tarka in the Ny\u0101ya system is **not a pram\u0101\u1e47a** \u2014 it does not independently establish a positive cognition of a new fact. It is a supporting (upak\u0101raka) device that secures what anum\u0101na needs: the invariable concomitance (vy\u0101pti) between the inferential reason (li\u1e45ga/hetu) and what is inferred (li\u1e45gin/s\u0101dhya). Without tarka to show that the denial of vy\u0101pti is untenable, the vy\u0101pti relationship rests only on observation of positive and negative instances \u2014 which an opponent can always challenge.\n\n## The Logical Structure\n\nThe standard operation of tarka in supporting an inference:\n\n**The inference:** \"The mountain has fire; because it has smoke; wherever there is smoke, there is fire (vy\u0101pti); this mountain has smoke; therefore it has fire.\"\n\n**The opponent's challenge:** \"Why should we accept the vy\u0101pti? Could there not be smoke without fire?\"\n\n**The tarka response:** \"Suppose (hypothetically) smoke could exist without fire. Then consider our kitchen: there is smoke; but no fire (by our supposition). But we observe that when smoke is removed from the kitchen, fire is already absent. This contradicts the supposition. The supposition that smoke can exist without fire generates an absurdity. Therefore, the vy\u0101pti stands: wherever smoke, fire.\"\n\nThe tarka move is:\n1. Assume the negation of the vy\u0101pti (smoke can exist without fire)\n2. Derive a consequence that contradicts observation or is otherwise unacceptable\n3. Conclude the negation of the vy\u0101pti is untenable\n4. The vy\u0101pti is secured; anum\u0101na proceeds\n\n## Tarka and Anum\u0101na: The Critical Distinction\n\n| | **Tarka** | **Anum\u0101na** (inference) |\n|--|-----------|------------------------|\n| **Epistemological status** | Not a pram\u0101\u1e47a; a supporting device | Independent pram\u0101\u1e47a |\n| **Direction of reasoning** | From the denial of a thesis \u2192 to its unacceptability | From a known reason (li\u1e45ga) \u2192 to an inferred conclusion |\n| **What it establishes** | That the alternative is untenable; clears the opponent | A positive new fact (the mountain has fire) |\n| **Product** | Secured vy\u0101pti; eliminated rival hypothesis | New pram\u0101 (veridical cognition) |\n| **Dependence** | Depends on what is to be supported (the thesis or vy\u0101pti) | Self-standing pram\u0101\u1e47a-event |\n\nTarka and anum\u0101na work in tandem. Anum\u0101na provides the positive concluding cognition; tarka removes the obstacles (rival hypotheses, challenged vy\u0101pti) that would block anum\u0101na from delivering that cognition. Neither alone constitutes the full epistemological achievement.\n\n## Tarka in Ny\u0101ya's 16 Pad\u0101rthas\n\nThe Ny\u0101yas\u016btra establishes 16 pad\u0101rthas (categories/topics) as the objects of inquiry constituting the Ny\u0101ya system. Tarka is the fifth:\n\n1. *Pram\u0101\u1e47a* \u2014 sources of valid knowledge\n2. *Prameya* \u2014 objects of valid knowledge\n3. *Sa\u1e43\u015baya* \u2014 doubt\n4. *Prayojana* \u2014 purpose\n5. **Tarka** \u2014 hypothetical reasoning (the present topic)\n6. *Nir\u1e47aya* \u2014 determination/conclusion\n7. *V\u0101da* \u2014 honest debate\n8\u201316. *Jalpa, Vita\u1e47\u1e0d\u0101, Hetv\u0101bh\u0101sa, Chala, J\u0101ti, Nigrahasth\u0101na*... (debate-theory categories)\n\nTarka's placement after sa\u1e43\u015baya (doubt) and prayojana (purpose) but before nir\u1e47aya (conclusion) is significant: tarka is what operates between doubt and determination. When we doubt a thesis (or a vy\u0101pti), tarka is what resolves the doubt by eliminating the doubt's rival hypotheses, making way for nir\u1e47aya.\n\n## Types of Unacceptable Consequences That Tarka Invokes\n\nIndian tarka-reasoning identifies several types of absurdity that the hypothetical assumption of an opponent's thesis would generate:\n\n- **Anavasth\u0101** (infinite regress) \u2014 if X requires Y, and Y requires X, the explanation never terminates\n- **\u0100tm\u0101\u015braya** (self-dependence) \u2014 the thesis depends for its establishment on what it is meant to establish (circularity)\n- **Anyony\u0101\u015braya** (mutual dependence) \u2014 A depends on B and B on A\n- **Cakraprasa\u1e45ga** (circular chain) \u2014 a closed loop of mutual dependence that provides no ground\n- **Virodha** (direct contradiction) \u2014 the hypothesis contradicts an established fact\n- **D\u1e5b\u1e63\u1e6davirodha** (contradiction with observation) \u2014 the hypothesis would make what is observed impossible\n\nWhen a hypothesis leads to any of these, tarka has done its work: the hypothesis is shown to be untenable, and the supported thesis is cleared of that particular opponent.\n\n## Advaita's Use of Tarka: Auxiliary to \u015aabda\n\n\u015aa\u1e45kara and the Advaita tradition take a distinctive and restricted position on tarka:\n\n**The restriction (BSBh 2.1.6):** Independent tarka cannot establish the nature of Brahman. The reason: when the domain of inquiry exceeds what can be established through perception and inference (as Brahman's nature does \u2014 Brahman is not an object of ordinary pram\u0101\u1e47as), any reasoner can produce an internally coherent argument for a position, and an equally clever opponent can produce an equally coherent counter-argument. Independent tarka is thus inconclusive in the Brahman-domain:\n\n> \"Brahman is apprehended only from the \u015b\u0101stra (scripture). And it is not possible to apprehend [Brahman's nature] by tarka [alone]. For the object of this inquiry is not accessible to the [ordinary] instruments of cognition.\"\n\nThis echoes Ka\u1e6dhopani\u1e63ad 1.2.9: *nai\u1e63\u0101 tarke\u1e47a matir \u0101pan\u012by\u0101* \u2014 \"this [knowledge] cannot be obtained by tarka alone.\"\n\n**The permitted use (anuv\u0101da-tarka):** Once \u015babda-pram\u0101\u1e47a (Vedic testimony) has established the conclusion \u2014 Brahman is non-dual, \u0101tman is Brahman \u2014 tarka is both legitimate and necessary:\n\n1. **In the manana stage:** After \u015brava\u1e47a (hearing the Mah\u0101v\u0101kya), the student uses tarka (manana-reasoning) to examine doubts: \"If \u0101tman and Brahman are identical, what is the j\u012bva? If Brahman is one, how does multiplicity appear?\" Tarka here shows that these doubts can be resolved (the j\u012bva is the result of adhy\u0101sa; multiplicity is mithy\u0101) \u2014 not by establishing new facts but by showing that the doubts presuppose categories (like real multiplicity) that the Vedic teaching has already undermined.\n\n2. **Against opponent theses:** When a S\u0101\u1e43khya or Buddhist opponent proposes a rival account of reality, Advaita uses tarka to show that the rival account generates unacceptable consequences \u2014 anavasth\u0101 (in the case of S\u0101\u1e43khya's dualism: who perceives the plural puru\u1e63as?) or virodha (in the case of momentariness: if there is no persistent self, memory and recognition are impossible).\n\n**The Advaita formula:** Tarka is *\u015bruti-saha* (with scripture) or *\u015bruti-anuk\u0101ra* (re-voicing scripture), not *\u015bruti-virodha* (against scripture). Tarka that supports and articulates what \u015babda establishes is legitimate and necessary; tarka that claims to establish Brahman-knowledge independently is epistemologically overreaching.\n\n## Cross-References\n- [Anum\u0101na](anumana.md) \u2014 inference; the pram\u0101\u1e47a that tarka supports; the tarka-anum\u0101na relationship is the primary context in which tarka operates technically\n- [Pram\u0101\u1e47a](pramana.md) \u2014 the epistemological framework; tarka's status as not-a-pram\u0101\u1e47a but a pram\u0101\u1e47a-supporting device is basic to understanding it\n- [\u015aabda-pram\u0101\u1e47a](shabda-pramana.md) \u2014 Vedic testimony; the pram\u0101\u1e47a to which Advaita subordinates tarka; tarka is anuv\u0101da-tarka (testimony-supporting) in the Advaita framework\n- [Svata\u1e25pr\u0101m\u0101\u1e47ya](svatahpramanya.md) \u2014 self-validity; tarka plays a role in securing svata\u1e25pr\u0101m\u0101\u1e47ya by showing that challenges to a cognition's validity do not generate tenable alternatives\n- [\u0100pta-v\u0101kya](aptavakya.md) \u2014 testimony of a trustworthy person; the relation between tarka and \u0101ptav\u0101kya mirrors the Advaita relation between tarka and \u015babda-pram\u0101\u1e47a: tarka supports what the trusted testifier says, rather than replacing it\n\n## Audience Metaphor\n\nA detective has gathered witness testimony (\u015babda) that the culprit was person X. The testimony is solid. But a rival investigator proposes: 'What if the real culprit was Y, not X?' Tarka is what the original detective uses to demolish the Y-hypothesis: 'If Y were the culprit, then the alibi evidence, the footprint size, and the motive all become inexplicable \u2014 the Y-hypothesis generates absurdities.' This doesn't independently establish X as the culprit (the testimony already did that); it shows that the alternative hypothesis is untenable. Tarka is the reasoning that clears the field, not the reasoning that lays the foundation.\n\n## Citations\n\n1. Ny\u0101yas\u016btra 1.1.40 and V\u0101tsy\u0101yana's [Ny\u0101yabh\u0101\u1e63ya](/references/nyaya-bhasya.md) \u2014 tarka defined and its role articulated; tarka functions by showing: if the vy\u0101pti (pervasion \u2014 wherever smoke, fire) were denied, what we observe (pot-smoke) would be impossible; since pot-smoke is observed, the denial of vy\u0101pti is untenable; therefore vy\u0101pti holds; anum\u0101na then proceeds on the secured vy\u0101pti\n2. BSBh 2.1.6 (\u015aa\u1e45kara) \u2014 'tarke\u1e47\u0101pari\u015bodhyatv\u0101t' \u2014 [Brahman's nature] cannot be determined by tarka alone; the context is \u015aa\u1e45kara's response to the claim that independent reasoning can establish Brahman's nature; his argument: on any topic where scripture is the sole pram\u0101\u1e47a (like Brahman's ultimate nature), reasoning will produce rival conclusions that are each internally coherent but mutually contradictory; no purely reason-based inquiry can settle between them; only \u015babda can settle the matter, and tarka then serves only to show that the scriptural conclusion, once accepted, is internally coherent and that its denial is untenable\n3. Ka\u1e6dhopani\u1e63ad 1.2.9 \u2014 'nai\u1e63\u0101 tarke\u1e47a matir \u0101pan\u012by\u0101' \u2014 this [\u0101tma-j\u00f1\u0101na] cannot be obtained by tarka [alone]; cited by \u015aa\u1e45kara as scriptural support for the epistemological limitation of independent reasoning in the domain of Brahman\n4. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) vv.58\u201365 (\u015aa\u1e45kara attr.) \u2014 tarka as the necessary companion of \u015brava\u1e47a-manana-nididhy\u0101sana; without tarka (manana-stage reasoning), doubts about the Vedic teaching remain and impede nididhy\u0101sana; tarka removes doubts, not by establishing the conclusion anew, but by showing that doubts are inconsistent with what is already established through \u015babda", "concepts/upamana": "# Upam\u0101na \u2014 \u0909\u092a\u092e\u093e\u0928\n\n**Not:** analogy, metaphor, simile, comparison as argument, inference from similarity\n\nUpam\u0101na is valid cognition that arises from the combination of a prior description of resemblance and the current perception of that resemblance, producing a specific kind of new knowledge: the recognition of the name-referent relation. It is the fourth pram\u0101\u1e47a in the Ny\u0101ya and Advaita lists \u2014 accepted as genuine and irreducible to perception or inference.\n\nThe classic example: A person from a city is told by a forester, \"A gavaya (wild cow/nilgai) looks like a domestic cow.\" Later, in the fo
