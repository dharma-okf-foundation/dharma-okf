<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "mimamsa-dharma";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/abhihitanvaya", "label": "Abhihit\u0101nvaya", "type": "Concept", "description": "The Bh\u0101\u1e6d\u1e6da theory of sentence meaning: words first express their individual meanings, which are then connected into a sentence-sense by a further operation, so word-meaning is primary and sentence-meaning derived; NOT modern compositionality, NOT the claim that sentences are meaningless, NOT syntax.", "resource": "", "tags": ["abhihitanvaya", "mimamsa", "bhatta", "sentence-meaning"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/adhikara", "label": "Adhik\u0101ra", "type": "Concept", "description": "The eligibility or qualification that makes a person the addressee of a given injunction and the recipient of its fruit, fixed by desire-for-the-result and capacity; NOT authority over others, NOT a legal right, NOT caste status by itself.", "resource": "", "tags": ["adhikara", "mimamsa", "eligibility", "ritual-agent"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/anga-pradhana", "label": "A\u1e45ga-Pradh\u0101na", "type": "Concept", "description": "The for-the-sake-of relation between subsidiary acts (a\u1e45ga) and the principal rite (pradh\u0101na), analysed as \u015be\u1e63a-\u015be\u1e63in (accessory-principal); the structure that orders a complex sacrifice; NOT a ranking of importance, NOT physical part and whole, NOT a hierarchy of persons.", "resource": "", "tags": ["anga-pradhana", "sesa-sesin", "mimamsa", "ritual-structure"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/anvitabhidhana", "label": "Anvit\u0101bhidh\u0101na", "type": "Concept", "description": "The Pr\u0101bh\u0101kara theory of sentence meaning: words denote only as already connected with the other words'' meanings, so sentence-sense is primary and isolated word-meaning an abstraction; NOT the denial of word-meaning, NOT modern holism as a general theory, NOT syntax-first grammar.", "resource": "", "tags": ["anvitabhidhana", "mimamsa", "prabhakara", "sentence-meaning"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/apauruseyatva", "label": "Apauru\u1e63eyatva", "type": "Concept", "description": "The authorlessness of the Veda: the doctrine that the Veda has no author, human or divine, being an eternal, uncreated relation of word and meaning; NOT divine revelation, NOT scripture written by God, NOT prophecy.", "resource": "", "tags": ["apauruseyatva", "mimamsa", "authorless", "veda"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/apurva", "label": "Ap\u016brva", "type": "Concept", "description": "The unseen after-potency by which a completed, momentary rite produces its remote result; the Bh\u0101\u1e6d\u1e6da answer to how a sacrifice now yields heaven later; NOT merit-points, NOT a karmic bank balance, NOT divine reward.", "resource": "", "tags": ["apurva", "mimamsa", "unseen-potency", "bhatta"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/arthavada", "label": "Arthav\u0101da", "type": "Concept", "description": "The explanatory and eulogistic statements of the Veda that praise an enjoined act or blame a forbidden one; subordinate to injunction and read as one sentence with it, NOT independent assertions of fact, NOT literal doctrine, NOT mere decoration.", "resource": "", "tags": ["arthavada", "hermeneutics", "ekavakyata", "mimamsa"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/atman", "label": "\u0100tman (M\u012bm\u0101\u1e43s\u0101)", "type": "Concept", "description": "In M\u012bm\u0101\u1e43s\u0101, the real, plural, permanent self that performs enjoined acts and persists to enjoy their fruits in a later life, inferred because the ritual economy requires an enduring agent-enjoyer; NOT the Advaita non-dual Self, NOT a momentary bundle-self, NOT the body or mind.", "resource": "", "tags": ["atman", "mimamsa", "self", "realism"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/autpattika", "label": "Autpattika", "type": "Concept", "description": "The doctrine that the relation of a word to its meaning is inherent and non-conventional, not established by anyone''s agreement; the ground on which Vedic words mean reliably without an institutor; NOT arbitrary convention, NOT a social contract of language.", "resource": "", "tags": ["autpattika", "mimamsa", "word-meaning", "inherent-relation"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/bhavana", "label": "Bh\u0101van\u0101", "type": "Concept", "description": "The productive urging toward a result that the Bh\u0101\u1e6d\u1e6da school takes to be the core meaning of a Vedic injunction, analysed by its object, instrument, and procedure; NOT manifestation in the wish-fulfilment sense, NOT emotion, NOT Buddhist meditative cultivation.", "resource": "", "tags": ["bhavana", "mimamsa", "injunction", "bhatta"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/codana", "label": "Codan\u0101", "type": "Concept", "description": "The Vedic injunction or impulsion, the impersonal imperative force (borne by the injunctive verb-forms) that both reveals dharma and prompts the agent to act; NOT a command from a commander, NOT advice, NOT mere motivation.", "resource": "", "tags": ["codana", "injunction", "mimamsa", "dharma"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/dharma", "label": "Dharma (M\u012bm\u0101\u1e43s\u0101)", "type": "Concept", "description": "In P\u016brva-M\u012bm\u0101\u1e43s\u0101, dharma is codan\u0101-lak\u1e63a\u1e47a artha, the good knowable only through Vedic injunction; NOT religion, NOT ethics-by-reason, NOT the general sustaining-order, NOT autonomous duty.", "resource": "", "tags": ["dharma", "mimamsa", "codana", "injunction"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/jati", "label": "J\u0101ti (M\u012bm\u0101\u1e43s\u0101)", "type": "Concept", "description": "The real universal, the eternal generic property inhering in each of its particulars, which grounds the fixed word-meaning relation; M\u012bm\u0101\u1e43s\u0101 realism about kinds; NOT a mental concept, NOT a class understood as its collection, NOT a nominal label.", "resource": "", "tags": ["jati", "mimamsa", "universal", "realism"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/karya", "label": "K\u0101rya (Pr\u0101bh\u0101kara)", "type": "Concept", "description": "In Pr\u0101bh\u0101kara M\u012bm\u0101\u1e43s\u0101, the to-be-done, the noetic content of an injunction that the enjoined agent apprehends as needing to be accomplished, the correlate of niyoga; NOT a desired goal, NOT the physical action or product, NOT k\u0101rya-as-effect in the Ny\u0101ya sense.", "resource": "", "tags": ["karya", "mimamsa", "prabhakara", "to-be-done"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/kratvartha-purusartha", "label": "Kratvartha and Puru\u1e63\u0101rtha", "type": "Concept", "description": "The distinction between what is done for the sake of the sacrifice (kratvartha) and what is done for the sake of the agent (puru\u1e63\u0101rtha); the criterion sorting subsidiary acts from fruit-bearing ones; NOT selfless versus selfish, NOT sacred versus secular, NOT means versus end in the ethical sense.", "resource": "", "tags": ["kratvartha", "purusartha", "mimamsa", "ritual-purpose"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/mantra", "label": "Mantra (M\u012bm\u0101\u1e43s\u0101)", "type": "Concept", "description": "In M\u012bm\u0101\u1e43s\u0101, a Vedic formula whose ritual role is to express and bring to mind the elements of the act during performance, subordinate to injunction; NOT a magic spell, NOT a mystically powerful vibration, NOT a meaningless syllable.", "resource": "", "tags": ["mantra", "mimamsa", "ritual-language", "prakashana"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/namadheya", "label": "N\u0101madheya", "type": "Concept", "description": "A Vedic word functioning as the mere name of a rite rather than as an injunction or a separate directive; a parsing category that blocks a naming-word from being misread as enjoining an extra act; NOT a magical true-name, NOT an arbitrary label, NOT a definition.", "resource": "", "tags": ["namadheya", "mimamsa", "naming", "hermeneutics"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/nisedha", "label": "Ni\u1e63edha", "type": "Concept", "description": "The prohibition, the negative Vedic injunction that enjoins abstention from an action; a full injunction in its own right, NOT a mere absence of injunction, NOT a social taboo, NOT a human-enforced ban.", "resource": "", "tags": ["nisedha", "prohibition", "pratishedha", "mimamsa"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/niyoga", "label": "Niyoga", "type": "Concept", "description": "In the Pr\u0101bh\u0101kara school, the binding directive or ought that is the very content of a Vedic injunction, obeyed as duty for its own sake; NOT a result-oriented incentive, NOT a request or wish, NOT a psychological compulsion.", "resource": "", "tags": ["niyoga", "mimamsa", "prabhakara", "deontology"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/phala", "label": "Phala", "type": "Concept", "description": "The result an enjoined act is performed to yield, paradigmatically svarga, delivered through the act''s unseen potency and specifying who has adhik\u0101ra; NOT a divine reward, NOT the immediate physical outcome, NOT liberation (mok\u1e63a).", "resource": "", "tags": ["phala", "mimamsa", "svarga", "ritual-result"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/sabda-nityata", "label": "\u015aabda-nityat\u0101", "type": "Concept", "description": "The doctrine that the word (\u015babda) and its meaning-bearing relation are eternal, manifested rather than created by each utterance; the metaphysical ground of the Veda''s authorlessness; NOT the claim that a spoken noise lasts forever, NOT sound mysticism.", "resource": "", "tags": ["sabda-nityata", "mimamsa", "eternal-word", "philosophy-of-language"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/svatah-pramanya", "label": "Svata\u1e25-pr\u0101m\u0101\u1e47ya", "type": "Concept", "description": "The doctrine that a cognition''s validity is intrinsic, arising with the cognition itself and holding unless a defeater appears; M\u012bm\u0101\u1e43s\u0101''s guarantee of the Veda''s self-authority. School-scoped from its M\u012bm\u0101\u1e43s\u0101 source; NOT blind faith, NOT circular self-certification, NOT the claim that all cognitions are true.", "resource": "", "tags": ["svatah-pramanya", "mimamsa", "intrinsic-validity", "epistemology"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/vidhi", "label": "Vidhi", "type": "Concept", "description": "The injunction proper, the Vedic sentence-type that enjoins an as-yet-unaccomplished action; the operative core through which dharma is conveyed; NOT a commandment from a divine legislator, NOT a human statute, NOT a merely descriptive rule.", "resource": "", "tags": ["vidhi", "injunction", "mimamsa", "hermeneutics"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/viniyoga", "label": "Viniyoga", "type": "Concept", "description": "The rule-governed application of a mantra, material, or subsidiary act to its rite, established by six graded means of evidence; NOT symbolic interpretation, NOT priestly improvisation, NOT free association.", "resource": "", "tags": ["viniyoga", "mimamsa", "application", "six-means"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/yaga", "label": "Y\u0101ga / Yaj\u00f1a", "type": "Concept", "description": "The Vedic sacrificial act, the karma of M\u012bm\u0101\u1e43s\u0101, a bounded rule-governed performance efficacious through correct enactment and its unseen potency; NOT devotional worship, NOT magic, and a third distinct sense of karma from moral action or physical motion.", "resource": nection of the already-denoted: each word first delivers its own meaning, and then a further operation relates these meanings into the unified import of the sentence. Word-meaning is thus logically prior; sentence-meaning is a construction upon it. This pairs with the Bh\u0101\u1e6d\u1e6da taste for analysis, as with bh\u0101van\u0101 and ap\u016brva, and stands against the Pr\u0101bh\u0101kara anvit\u0101bhidh\u0101na (see anvitabhidhana), making the two schools'' theories of language as sharply opposed as their theories of duty.\n\n## Audience Metaphor\n\nAbhihit\u0101nvaya builds a sentence the way you assemble its meaning from a dictionary: look up each word, then work out how the looked-up meanings fit together. The words speak first; the joining comes after.\n\n## Citations\n\n1. Kum\u0101rila, \u015alokav\u0101rttika, the V\u0101ky\u0101dhikara\u1e47a on sentence meaning -- see [references/slokavarttika.md](../references/slokavarttika.md)\n2. \u015a\u0101stra-d\u012bpik\u0101 on abhihit\u0101nvaya -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "concepts/adhikara": "# Adhik\u0101ra -- \u0905\u0927\u093f\u0915\u093e\u0930\n\n**Not:** authority over others, a legal right, caste status\n\n## What It Actually Means\n\nAn injunction like \"one who desires heaven should sacrifice\" does not bind everyone; it binds whoever satisfies the adhik\u0101ra, here desiring heaven and being capable of the rite. Adhik\u0101ra thus answers \"to whom does this apply?\" and is fixed by the injunction''s own terms, chiefly the desire for the result and the capacity to perform, with disqualifications removing it. It is the hinge between the impersonal injunction and the particular agent it obligates.\n\n## Audience Metaphor\n\nA prescription that says \"for adults with the condition, take twice daily\" binds only those who fit the description. Adhik\u0101ra is that \"for whom\" clause of a Vedic injunction: the standing that makes the instruction yours to carry out.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 6.1 (the adhik\u0101ra books) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015a\u0101stra-d\u012bpik\u0101 on adhik\u0101ra -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "concepts/anga-pradhana": "# A\u1e45ga-Pradh\u0101na -- \u0905\u0919\u094d\u0917\u092a\u094d\u0930\u0927\u093e\u0928\n\n**Not:** a prestige ranking, physical part and whole, sesa as leftover\n\n## What It Actually Means\n\nA great sacrifice is a hierarchy of acts. The pradh\u0101na is the principal, enjoined for its own phala; its a\u1e45gas are subsidiary acts enjoined for the sake of the principal. The general relation is \u015be\u1e63a-\u015be\u1e63in: the accessory (\u015be\u1e63a) exists for the principal (\u015be\u1e63in). Determining this relation is one of M\u012bm\u0101\u1e43s\u0101''s central tasks, because it fixes which act carries the fruit, which mantras and materials attach where (see viniyoga), and whether an act is done for the sacrifice or for the person (see kratvartha-purusartha).\n\n## Audience Metaphor\n\nIn a symphony the tuning, the page-turns, and the conductor''s upbeat all exist for the sake of the performance, not the other way round. A\u1e45ga-pradh\u0101na is the score''s grammar of what-serves-what: which acts are the music and which are in service of it.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 3 (the \u015be\u1e63a books) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015a\u0101stra-d\u012bpik\u0101 on a\u1e45ga and pradh\u0101na -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "concepts/anvitabhidhana": "# Anvit\u0101bhidh\u0101na -- \u0905\u0928\u094d\u0935\u093f\u0924\u093e\u092d\u093f\u0927\u093e\u0928\n\n**Not:** denial of word-meaning, modern holism, syntax-first grammar\n\n## What It Actually Means\n\nPrabh\u0101kara grounds his semantics in how language is learned: a child hears injunctions, \"bring the cow,\" then \"tie the cow,\" and learns word-meanings only as already fitted into an actionable whole. Hence anvit\u0101bhidh\u0101na, denotation of the connected: a word conveys its meaning only in connection with the others, and the primary bearer of meaning is the injunctive sentence, not the isolated word. This coheres with k\u0101rya and niyoga, where the to-be-done is the primary unit, and opposes the Bh\u0101\u1e6d\u1e6da abhihit\u0101nvaya, completing the two schools'' mirror-image disagreement across duty and language alike.\n\n## Audience Metaphor\n\nYou learn \"check\" not from a dictionary but from playing chess, where the word arrives already wired into the moves it belongs to. Anvit\u0101bhidh\u0101na says all words are learned and meant that way: never bare, always already in the connected play of the sentence.\n\n## Citations\n\n1. Prabh\u0101kara, B\u1e5bhat\u012b; \u015a\u0101likan\u0101tha''s Prakara\u1e47apa\u00f1cik\u0101 on connected denotation -- see [references/brhati.md](../references/brhati.md)\n2. Contrast in Kum\u0101rila, \u015alokav\u0101rttika -- see [references/slokavarttika.md](../references/slokavarttika.md)", "concepts/apauruseyatva": "# Apauru\u1e63eyatva -- \u0905\u092a\u094c\u0930\u0941\u0937\u0947\u092f\u0924\u094d\u0935\n\n**Not:** divine revelation, scripture written by God, prophecy\n\n## What It Actually Means\n\nApauru\u1e63eyatva, \"not-from-a-person-ness,\" is M\u012bm\u0101\u1e43s\u0101''s foundational epistemic move. Because dharma is known only through the Vedic word, that word must be a flawless means of knowing; and a text with an author could always be doubted, since the author might err or lie and the text would have a beginning in time. M\u012bm\u0101\u1e43s\u0101 therefore holds the Veda eternal and authorless: the connection of word and meaning is itself beginningless, and the \u1e5b\u1e63is are seers who apprehend and transmit the Veda, not poets who compose it. This is the sharpest single point where M\u012bm\u0101\u1e43s\u0101 must not be read through the category of revealed scripture.\n\n## Audience Metaphor\n\nThe truths of arithmetic were not written by anyone; two and two made four before any mathematician, and no author''s reliability is at stake in trusting them. M\u012bm\u0101\u1e43s\u0101 treats the Veda like that: authorless, and so never exposed to any author''s fallibility, true the way an eternal relation is true rather than the way a message from a speaker is trusted.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.1.27-32 on the authorless Veda -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. Kum\u0101rila, \u015alokav\u0101rttika (codan\u0101 and \u015babda sections) -- see [references/slokavarttika.md](../references/slokavarttika.md)", "concepts/apurva": "# Ap\u016brva -- \u0905\u092a\u0942\u0930\u094d\u0935\n\n**Not:** merit-points, a karmic bank balance, divine reward\n\n## What It Actually Means\n\nA sacrifice is performed and finished in a day, yet its fruit (svarga) is enjoyed much later, perhaps in another life. What connects the vanished act to the distant result? Kum\u0101rila''s Bh\u0101\u1e6d\u1e6da school posits ap\u016brva, \"the not-before,\" a new unseen potency generated by the act that persists until it ripens. It is inferred, never perceived, and it is the linchpin that makes the whole economy of enjoined action intelligible without a rewarding god.\n\n## School Divergence (Bh\u0101\u1e6d\u1e6da / Pr\u0101bh\u0101kara)\n\nFor the Bh\u0101\u1e6d\u1e6das ap\u016brva is a real unseen force, the efficacy stored by the act. Prabh\u0101kara reframes it: the primary meaning of the injunction is the binding to-be-done (niyoga, k\u0101rya), and ap\u016brva is understood in terms of that enjoined action rather than a separately stored potency.\n\n## Audience Metaphor\n\nA struck bell keeps ringing after the strike; the sound now is caused by a blow already past. Ap\u016brva is the rite''s after-ring: the act is over, but an unseen vibration carries its effect forward to a result that arrives long after the striking hand has stopped.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 2.1.5 and the ap\u016brva adhikara\u1e47a -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. Kum\u0101rila, Tantrav\u0101rttika on ap\u016brva -- see [references/tantravarttika.md](../references/tantravarttika.md)", "concepts/arthavada": "# Arthav\u0101da -- \u0905\u0930\u094d\u0925\u0935\u093e\u0926\n\n**Not:** literal doctrine, mere rhetoric, historical record\n\n## What It Actually Means\n\n*Arthav\u0101da* means a statement that speaks to the purpose (*artha*) of an injunction, by praising the enjoined act or blaming its opposite. Classically it is divided into *gu\u1e47av\u0101da* (a figurative or hyperbolic statement, taken non-literally), *anuv\u0101da* (a restatement of something already established), and *bh\u016bt\u0101rthav\u0101da* (a statement of an accomplished fact that still serves the injunction). The governing principle is *ekav\u0101kyat\u0101*, syntactic unity: an arthav\u0101da does not stand alone but forms a single sentence with the vidhi it serves. So \"the wind is the swiftest deity\" is not a meteorological or theological claim; it is praise that motivates a wind-related rite.\n\n## Why This Is M\u012bm\u0101\u1e43s\u0101's Great Hermeneutic Contribution\n\nMost of the Veda is not injunction. If every non-injunctive line were read as literal doctrine, the text would be a chaos of myth and contradiction. M\u012bm\u0101\u1e43s\u0101's discipline is to sort the injunctive core from its subordinate praise, so the whole corpus reads as a functionally unified body of directives with their motivating supports. For an AI system, this is the single most useful thing the school offers: a principled reason not to read Vedic and Pur\u0101\u1e47ic praise-narrative as a set of factual assertions.\n\n## Audience Metaphor\n\nA recipe that says \"this legendary soup will make your guests weep with joy\" is not making a claim about tears; the flourish is there to get you to make the soup. Arthav\u0101da is that flourish in the Veda: read for its persuasive work in service of the instruction, not as a fact to be verified or a doctrine to be believed.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.2.1 on arthav\u0101da and the threefold division -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015aabara-Bh\u0101\u1e63ya on ekav\u0101kyat\u0101 and the subordination of praise to injunction -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)", "concepts/atman": "# \u0100tman (M\u012bm\u0101\u1e43s\u0101) -- \u0906\u0924\u094d\u092e\u0928\u094d\n\n**Not:** the Advaita non-dual Self, a momentary bundle-self, the body or mind\n\n## What It Actually Means\n\nM\u012bm\u0101\u1e43s\u0101''s self is a working posit of its whole system. Because an enjoined act''s fruit (phala, via ap\u016brva) is often reaped long after the act, even in another life, there must be one enduring agent who acts and later enjoys; hence a permanent, individual \u0101tman, and as many \u0101tmans as there are agents. Kum\u0101rila and Prabh\u0101kara differ on how the self is known (for Prabh\u0101kara it is co-revealed in every cognition as the knower; for Kum\u0101rila it is the object of a self-directed cognition), but both hold it real, plural, and permanent. This realist, pluralist self is the sharpest contrast with Advaita in the whole corpus.\n\n## Audience Metaphor\n\nA pension only makes sense if the person who pays in now is the same one who draws out decades later; a self that vanished between would break the arrangement. The M\u012bm\u0101\u1e43s\u0101 \u0101tman is the ritual pension-holder: one enduring person who performs now and collects the fruit later, and there are as many such persons as there are agents.\n\n## Citations\n\n1. Kum\u0101rila, \u015alokav\u0101rttika, the \u0100tmav\u0101da -- see [references/slokavarttika.md](../references/slokavarttika.md)\n2. Cross-bundle: \u0101tman in dharma-foundation v0.1 and the non-dual Self in upanishadic-core v0.6, the contrasting treatments", "concepts/autpattika": "# Autpattika -- \u0914\u0924\u094d\u092a\u0924\u094d\u0924\u093f\u0915\n\n**Not:** arbitrary convention, iconic naturalness, etymology\n\n## What It Actually Means\n\nJaimini''s s\u016btra autpattikas tu \u015babdasy\u0101rthena sambandha\u1e25, \"the relation of a word with its meaning is inherent,\" is the linchpin of the whole authority-structure. If the bond were conventional, someone must have set the convention, and the Veda would trace to an author. By holding the bond inherent and eternal, M\u012bm\u0101\u1e43s\u0101 secures authorless, self-standing Vedic meaning. Autpattika, \u015babda-nityat\u0101, and apauru\u1e63eyatva form one interlocking argument: eternal words, eternally bound to meanings, in an authorless text.\n\n## Audience Metaphor\n\nFire''s relation to heat is not a convention people agreed on; it holds by the nature of fire. M\u012bm\u0101\u1e43s\u0101 treats a word''s relation to its meaning the same way: not assigned, not up for a vote, but standing in the nature of the word itself.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.1.5 (autpattikas tu \u015babdasy\u0101rthena sambandha\u1e25) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015aabara-Bh\u0101\u1e63ya on the inherent relation -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)", "concepts/bhavana": "# Bh\u0101van\u0101 -- \u092d\u093e\u0935\u0928\u093e\n\n**Not:** manifestation, emotion, Buddhist meditation\n\n## What It Actually Means\n\nFor the Bh\u0101\u1e6d\u1e6das the heart of an injunction like \"one should sacrifice\" is a bh\u0101van\u0101, a bringing-about. Kum\u0101rila analyses it into two: \u015b\u0101bd\u012b bh\u0101van\u0101 (the urging carried by the injunctive suffix itself) and \u0101rth\u012b bh\u0101van\u0101 (the agent''s own activity that the urging sets in motion). Each bh\u0101van\u0101 has three questions built in: what is to be brought about (s\u0101dhya), by what means (s\u0101dhana), and how (itikartavyat\u0101). This is one of the earliest systematic analyses of imperative meaning anywhere.\n\n## School Divergence (Bh\u0101\u1e6d\u1e6da / Pr\u0101bh\u0101kara)\n\nThe Bh\u0101\u1e6d\u1e6da centres the injunction on bh\u0101van\u0101, on result-production. The Pr\u0101bh\u0101kara centres it on niyoga and k\u0101rya, on the binding to-be-done, duty rather than production. The two accounts of what an injunction means run parallel to their two accounts of what obligation is.\n\n## Audience Metaphor\n\nAn injunction, for the Bh\u0101\u1e6d\u1e6da, works like a coach''s \"score!\": not a description and not a feeling, but a structured urging that packs in what to achieve, by what means, and how. Bh\u0101van\u0101 names that packed, productive push inside the command.\n\n## Citations\n\n1. Kum\u0101rila, \u015alokav\u0101rttika and Tantrav\u0101rttika on bh\u0101van\u0101 -- see [references/slokavarttika.md](../references/slokavarttika.md) and [references/tantravarttika.md](../references/tantravarttika.md)\n2. \u015aabara-Bh\u0101\u1e63ya on the injunctive -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)", "concepts/codana": "# Codan\u0101 -- \u091a\u094b\u0926\u0928\u093e\n\n**Not:** a personal command, advice, motivation\n\n## What It Actually Means\n\n*Codan\u0101* comes from the root *cud*, to impel or urge. It is the injunctive, impelling power of the Vedic sentence, expressed grammatically through the optative and imperative verb-forms (*li\u1e45*, *lo\u1e6d*, and the rest). In MS 1.1.2 it is codan\u0101 that defines dharma, so codan\u0101 is doing double duty: it is both the *epistemic* means by which dharma is known and the *impelling* force that moves the qualified agent to act. What codan\u0101 cannot be is a report: it never merely states that something is the case; it enjoins that something be brought about.\n\n## School Divergence (Bh\u0101\u1e6d\u1e6da / Pr\u0101bh\u0101kara)\n\nThe schools agree that codan\u0101 enjoins and disagree about what it primarily conveys. For the Bh\u0101\u1e6d\u1e6da school, the injunction conveys a *bh\u0101van\u0101*, a productive urging toward a result, and installs the unseen *ap\u016brva* that will yield that result. For the Pr\u0101bh\u0101kara school, the injunction conveys *niyoga*, a binding directive addressed to the qualified agent, obeyed as duty for its own sake. This is the single most consequential fork in M\u012bm\u0101\u1e43s\u0101, and it recurs across the vocabulary of this bundle.\n\n## Audience Metaphor\n\nA road sign that reads \"yield\" is not a person telling you to yield, and it is not advice you might reasonably decline; it is an impersonal instruction that binds anyone who meets the conditions. Codan\u0101 is the Veda's yield-sign: no one is behind it issuing the order, yet it enjoins, and its force does not depend on your being persuaded.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.1.2 -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015aabara-Bh\u0101\u1e63ya on the injunctive as the means to dharma -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)", "concepts/dharma": "# Dharma (M\u012bm\u0101\u1e43s\u0101) -- \u0927\u0930\u094d\u092e\n\n**Not:** religion, ethics-by-reason, the sustaining-order, autonomous duty\n\n## What It Actually Means\n\nThe founding s\u016btra of the school is *codan\u0101-lak\u1e63a\u1e47o 'rtho dharma\u1e25* (MS 1.1.2): dharma is the *artha* (the good, the purpose) whose defining mark is *codan\u0101*, injunction. This is a deliberately narrow, technical definition. Dharma is not what is good by nature, nor what reason approves, nor what sustains the world; it is precisely and only what the Vedic imperative enjoins. Because the injunction reveals something no sense-organ perceives and no inference reaches (an *ought*, and an unseen result), M\u012bm\u0101\u1e43s\u0101 makes dharma the object of a distinct means of knowledge: the Vedic word itself. Everything else in the school follows from this: the authorlessness of that word (apauru\u1e63eyatva), the unseen link between act and result (ap\u016brva), and the whole apparatus for reading which sentences actually enjoin.\n\n## Why the Definition Is So Narrow\n\nJaimini restricts dharma to the injunction on purpose. If dharma could be known by reasoning about welfare, the Veda would be dispensable and dharma would collapse into ordinary prudence. By tying dharma to codan\u0101 alone, M\u012bm\u0101\u1e43s\u0101 secures both the Veda's necessity and the category's independence from visible profit and loss. This is why a M\u012bm\u0101\u1e43saka can hold that an enjoined rite is dharma even when its fruit is unseen and deferred to another life.\n\n## Audience Metaphor\n\nThink of the difference between \"what is healthy\" and \"what this prescription says.\" Health can be reasoned about from evidence; a prescription is known only by reading it, and it binds you to a specific act whether or not you can see why. M\u012bm\u0101\u1e43s\u0101's dharma is the prescription, not the health: an obligation legible only in the enjoining text, not derivable from looking at outcomes.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.1.2 (*codan\u0101-lak\u1e63a\u1e47o 'rtho dharma\u1e25*) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015aabara-Bh\u0101\u1e63ya on MS 1.1.2 -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)\n3. Cross-bundle: the broader sustaining-order sense of dharma is treated in dharma-foundation v0.1; the ethics-as-alignment sense in dharmic-ethics v0.5. Same word, different technical object.", "concepts/jati": "# J\u0101ti (M\u012bm\u0101\u1e43s\u0101) -- \u091c\u093e\u0924\u093f\n\n**Not:** a mental concept, a class-as-collection, a nominal label\n\n## What It Actually Means\n\nWhy does the word \"cow\" mean the same eternally (see sabda-nityata, autpattika)? Because it denotes a real universal, gotva or cowness, which is one, eternal, and present in every cow. M\u012bm\u0101\u1e43s\u0101, like Ny\u0101ya, is realist about such universals and argues against the Buddhist apoha theory that generality is mere exclusion-by-name. The realism about j\u0101ti undergirds the realism about language: eternal words denote eternal universals, part of why the Veda''s meanings are stable and authorless. Ny\u0101ya-Vai\u015be\u1e63ika also treats s\u0101m\u0101nya as a real universal; the treatments are kin, both realist.\n\n## Audience Metaphor\n\nMiddle C is one pitch really present in every instrument that sounds it, not a name we paste on similar noises. J\u0101ti is that: cowness as a real, single note sounding identically in every cow, which is why one eternal word can name them all.\n\n## Citations\n\n1. Kum\u0101rila, \u015alokav\u0101rttika, the \u0100k\u1e5btiv\u0101da on the universal -- see [references/slokavarttika.md](../references/slokavarttika.md)\n2. Cross-bundle: s\u0101m\u0101nya in nyaya-vaisheshika v0.9, the kindred realist treatment of universals", "concepts/karya": "# K\u0101rya (Pr\u0101bh\u0101kara) -- \u0915\u093e\u0930\u094d\u092f\n\n**Not:** a desired goal, the physical action, karya-as-effect (Nyaya)\n\n## What It Actually Means\n\nFor Prabh\u0101kara, to understand a vidhi is to apprehend a k\u0101rya, a to-be-accomplished, and to be thereby bound (niyoga). The k\u0101rya is not read off from a stated result; it is given in the injunction as the very shape of what one must do. Prabh\u0101kara''s account of how a child first learns language, from overhearing commands and seeing them obeyed, makes the injunctive k\u0101rya the primary unit of meaning, which feeds his anvit\u0101bhidh\u0101na theory of sentence sense (see anvitabhidhana).\n\n## Audience Metaphor\n\nWhen a duty-bound nurse reads \"administer the dose at once,\" what she grasps is not a prize to win but a thing-to-be-done pressing on her. K\u0101rya is exactly that felt to-be-done as the meaning of the instruction, prior to any thought of reward.\n\n## Citations\n\n1. Prabh\u0101kara, B\u1e5bhat\u012b; \u015a\u0101likan\u0101tha''s Prakara\u1e47apa\u00f1cik\u0101 -- see [references/brhati.md](../references/brhati.md)\n2. Contrast in \u015a\u0101stra-d\u012bpik\u0101 -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "concepts/kratvartha-purusartha": "# Kratvartha and Puru\u1e63\u0101rtha -- \u0915\u094d\u0930\u0924\u094d\u0935\u0930\u094d\u0925\u092a\u0941\u0930\u0941\u0937\u093e\u0930\u094d\u0925\n\n**Not:** selfless vs selfish, sacred vs secular, means vs end (ethical)\n\n## What It Actually Means\n\nSome enjoined acts exist to complete the sacrifice itself (kratvartha); others exist to yield something to the agent (puru\u1e63\u0101rtha). The distinction decides, for instance, whether a subsidiary act''s result accrues to the sacrifice, making it a mere a\u1e45ga, or to the person, making it independently fruitful. It also frames one of M\u012bm\u0101\u1e43s\u0101''s deepest questions, whether dharma is finally for the sake of the ritual order or for the human being, a question that opens toward the later Ved\u0101ntic reframing of action and liberation.\n\n## Audience Metaphor\n\nOn a ship, some tasks keep the ship sailing, for the voyage, and some earn a sailor''s private wage, for the sailor. Kratvartha and puru\u1e63\u0101rtha are that split applied to enjoined acts: is this step for the sacrifice''s own completion, or for the doer''s fruit?\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 4.1 (kratvartha and puru\u1e63\u0101rtha) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015a\u0101stra-d\u012bpik\u0101 on the distinction -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "concepts/mantra": "# Mantra (M\u012bm\u0101\u1e43s\u0101) -- \u092e\u0928\u094d\u0924\u094d\u0930\n\n**Not:** a magic spell, a mystical vibration, a meaningless syllable\n\n## What It Actually Means\n\nWhat is a mantra for, if the deity need not be persuaded and the sound has no magic? M\u012bm\u0101\u1e43s\u0101 answers functionally: a mantra is that Vedic utterance whose job is to express and bring to awareness the components of the enjoined act at the time of doing it, so the performance is done knowingly and completely. Like arthav\u0101da, mantra is subordinate to vidhi, and it is applied to rites by viniyoga. This sober, function-first analysis is one of the clearest ancient theories of ritual language.\n\n## Audience Metaphor\n\nA pilot''s spoken checklist, \"flaps set, speed checked,\" does not fly the plane; it brings each required element to mind at the right moment so the procedure is done rightly. The M\u012bm\u0101\u1e43s\u0101 mantra is that checklist within the rite: it names and recalls, it does not conjure.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 2.1 (the mantra adhikara\u1e47a) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. Artha-sa\u1e43graha on the function of mantra -- see [references/artha-samgraha.md](../references/artha-samgraha.md)", "concepts/namadheya": "# N\u0101madheya -- \u0928\u093e\u092e\u0927\u0947\u092f\n\n**Not:** a magical true-name, an arbitrary label, a definition\n\n## What It Actually Means\n\nInterpretation must decide, of a given Vedic word, what job it does: does it enjoin (vidhi), praise (arthav\u0101da), or merely name (n\u0101madheya)? M\u012bm\u0101\u1e43s\u0101 develops rules, notably a preference for taking a word as a name over positing a second injunction (to avoid v\u0101kya-bheda, splitting one sentence into two), so that, for example, \"he sacrifices with the udbhid\" is read as naming a rite, not as enjoining a separate udbhid substance. N\u0101madheya thus guards the economy of injunctions: one does not manufacture new duties out of what is only a name.\n\n## Audience Metaphor\n\nA dish called \"Sunday roast\" is named, not instructed; reading the name as a command to do something extra called \"Sunday\" would be a parsing error. N\u0101madheya is M\u012bm\u0101\u1e43s\u0101''s guard against exactly that error in the Veda: this word only names the rite, so do not invent a duty from it.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.4 (the n\u0101madheya adhikara\u1e47as) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. Artha-sa\u1e43graha on naming versus injunction -- see [references/artha-samgraha.md](../references/artha-samgraha.md)", "concepts/nisedha": "# Ni\u1e63edha -- \u0928\u093f\u0937\u0947\u0927\n\n**Not:** a social taboo, mere non-injunction, a legal ban\n\n## What It Actually Means\n\nA *ni\u1e63edha* (or *prati\u1e63edha*) is a prohibition, the negative counterpart of the vidhi. The stock example is *na kala\u00f1ja\u1e43 bhak\u1e63ayet*, \"one should not eat kala\u00f1ja.\" The interesting question M\u012bm\u0101\u1e43s\u0101 presses is what a prohibition actually enjoins. The dominant answer is that it enjoins an *abstention*: refraining becomes a positive, enjoined act with its own unseen force, so that keeping the prohibition is doing something dharmic, not merely failing to do something. Transgression, correspondingly, is not a neutral event but generates *pratyav\u0101ya*, positive demerit that must ripen.\n\n## Why the Analysis Matters\n\nTreating a prohibition as a taboo or a ban misses the whole M\u012bm\u0101\u1e43s\u0101 move: the negative injunction is woven into the same economy of unseen merit and demerit as the positive one. This is also where the schools distinguish an obligatory abstention from the mere non-performance of an optional rite, a distinction with no analogue in a system of social taboos.\n\n## Audience Metaphor\n\nA quiet-car sign on a train does not merely mark the absence of a rule; it enjoins an active keeping-quiet, and breaking it is a positive infraction, not a neutral omission. A ni\u1e63edha is that sign raised to the level of the unseen order: the abstention is something you actively do, and its breach leaves a real mark.\n\n## Citations\n\n1. The kala\u00f1ja prohibition and the analysis of negative injunctions -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015aabara-Bh\u0101\u1e63ya on prohibition and pratyav\u0101ya -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)", "concepts/niyoga": "# Niyoga -- \u0928\u093f\u092f\u094b\u0917\n\n**Not:** a result-incentive, a request or wish, psychological compulsion\n\n## What It Actually Means\n\nPrabh\u0101kara''s analysis makes the ought primary. The meaning of vidhi is niyoga, a directive that binds; correlatively the agent grasps a k\u0101rya, a to-be-done (see karya), and acts from the recognition of being bound, not from desire for a fruit. This yields the famous Pr\u0101bh\u0101kara ethics: duty performed for duty''s sake, with the sense of obligation as the sufficient motive. It is the sharpest Indian articulation of deontology, and it is why the Bh\u0101\u1e6d\u1e6da/Pr\u0101bh\u0101kara split matters beyond ritual: it is a disagreement about what obligation itself is.\n\n## School Divergence (Bh\u0101\u1e6d\u1e6da / Pr\u0101bh\u0101kara)\n\nThis concept is the Pr\u0101bh\u0101kara pole. Its Bh\u0101\u1e6d\u1e6da counterpart is bh\u0101van\u0101 together with ap\u016brva, where the injunction is read as producing a result rather than simply binding.\n\n## Audience Metaphor\n\nA lifeguard who swims out because \"someone is drowning and it is mine to act\" is moved by the bindingness of the situation, not by a reward. Niyoga is that bindingness made the very meaning of the command: you act because it is enjoined, full stop.\n\n## Citations\n\n1. Prabh\u0101kara, B\u1e5bhat\u012b on the injunctive -- see [references/brhati.md](../references/brhati.md)\n2. Contrast in Kum\u0101rila, \u015alokav\u0101rttika -- see [references/slokavarttika.md](../references/slokavarttika.md)", "concepts/phala": "# Phala -- \u092b\u0932\n\n**Not:** a divine reward, the immediate physical effect, salvation (moksha)\n\n## What It Actually Means\n\nThe phala is the result for whose sake a desire-based rite is enjoined; the stock case is svarga. Crucially, M\u012bm\u0101\u1e43s\u0101 treats svarga not as a place ruled by a god but functionally, as the state of unmixed satisfaction the rite yields, defined by the injunction and delivered by ap\u016brva. Naming the phala fixes the adhik\u0101ra (only its desirer is enjoined) and gives ap\u016brva its target. Obligatory (nitya) rites, by contrast, are enjoined without a stated phala, which is part of why Prabh\u0101kara holds the ought can stand without a promised fruit.\n\n## Audience Metaphor\n\nThe \"fruit\" of planting is the harvest months later, not the dirt on your hands today, and no one hands it to you; it comes by the seed''s own working. Phala is the rite''s harvest, delivered by the act''s unseen potency, not by a giver.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 4.3 and 6.1 on phala and svarga -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015a\u0101stra-d\u012bpik\u0101 on the result of enjoined action -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "concepts/sabda-nityata": "# \u015aabda-nityat\u0101 -- \u0936\u092c\u094d\u0926\u0928\u093f\u0924\u094d\u092f\u0924\u093e\n\n**Not:** sound that lasts forever, sound mysticism, onomatopoeia\n\n## What It Actually Means\n\nAgainst the Ny\u0101ya view that words are produced and their meanings conventional, M\u012bm\u0101\u1e43s\u0101 argues that the word and its power to mean are eternal. When two people say \"cow,\" they manifest the one eternal word, not two new ones, and that word''s capacity to convey its meaning was never instituted at a time. This eternality is what lets the Veda be authorless: if words and meanings are beginningless, the Veda''s sentences need no composer. \u015aabda-nityat\u0101 is thus the load-bearing metaphysics beneath apauru\u1e63eyatva.\n\n## Audience Metaphor\n\nWhen two pianists play middle C, they do not each invent the note; they sound the one fixed pitch that existed before either sat down. M\u012bm\u0101\u1e43s\u0101 hears every \"cow\" as a middle C: one eternal word made audible again, not a fresh coinage.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 1.1.6-23 (the \u015babda-nityat\u0101 adhikara\u1e47a) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. Kum\u0101rila, \u015alokav\u0101rttika on the eternality of the word -- see [references/slokavarttika.md](../references/slokavarttika.md)", "concepts/svatah-pramanya": "# Svata\u1e25-pr\u0101m\u0101\u1e47ya -- \u0938\u094d\u0935\u0924\u0903\u092a\u094d\u0930\u093e\u092e\u093e\u0923\u094d\u092f\n\n**Not:** blind faith, circular self-certification, the view that all cognitions are true\n\n## What It Actually Means\n\nIf the validity of knowledge required external verification, that verification would need its own, without end, and knowledge could never start. M\u012bm\u0101\u1e43s\u0101, above all Kum\u0101rila, cuts the regress: a cognition arises already bearing its claim to truth, and we are warranted in it unless and until a defeater appears, with the burden of proof always on the one who alleges falsity (svata\u1e25-pr\u0101m\u0101\u1e47ya paired with paratah-apr\u0101m\u0101\u1e47ya). For the Veda this is decisive: since Vedic cognition has no author whose reliability could be questioned and no perceptual source to re-check, its self-validity secures dharma-knowledge.\n\n## The v0.3 Boundary\n\nThis is a M\u012bm\u0101\u1e43s\u0101 doctrine that Advaita inherits for the self-validity of the liberating \u015bruti. vedanta-epistemology v0.3 treats svata\u1e25-pr\u0101m\u0101\u1e47ya within Advaita; here it carries its M\u012bm\u0101\u1e43s\u0101 ritual-authority work. The two are school-scoped and reciprocally cross-linked, not duplicates: the general pram\u0101\u1e47a mechanics live in v0.3.\n\n## Audience Metaphor\n\nYou do not re-verify that you are in pain before trusting that you are; the pain arrives already carrying its own credential, and only a specific reason could dislodge it. Svata\u1e25-pr\u0101m\u0101\u1e47ya says knowledge in general comes with its credential attached, revocable only on cause.\n\n## Citations\n\n1. Kum\u0101rila, \u015alokav\u0101rttika, the svata\u1e25-pr\u0101m\u0101\u1e47ya section of the codan\u0101-s\u016btra -- see [references/slokavarttika.md](../references/slokavarttika.md)\n2. Cross-bundle: svata\u1e25-pr\u0101m\u0101\u1e47ya in vedanta-epistemology v0.3, the Advaita treatment, school-scoped and reciprocally linked; same doctrine, different dar\u015bana", "concepts/vidhi": "# Vidhi -- \u0935\u093f\u0927\u093f\n\n**Not:** a commandment, a legal statute, a descriptive rule\n\n## What It Actually Means\n\nA *vidhi* is an injunction: a sentence that enjoins an action the hearer would not otherwise undertake, such as *svargak\u0101mo yajeta*, \"one who desires heaven should sacrifice.\" The vidhi is the load-bearing sentence of the Veda for M\u012bm\u0101\u1e43s\u0101, because dharma is conveyed by injunction and by nothing else. The classic analysis distinguishes kinds of vidhi by what work the injunction does: *ap\u016brva-vidhi* enjoins something entirely new and unestablished; *niyama-vidhi* fixes one option where several were possible; *parisa\u1e43khy\u0101-vidhi* excludes what would otherwise intrude. In every case the vidhi enjoins; it does not report.\n\n## Why It Is Not a Commandment\n\nThe temptation is to hear *yajeta* as \"thou shalt sacrifice,\" an order from on high. M\u012bm\u0101\u1e43s\u0101 resists this on two fronts: there is no commander (the Veda is authorless), and the injunction's meaning is worked out as an impersonal linguistic force, not as the will of a legislator. The obligation is real, but it is the obligation of the enjoined act itself, secured by its unseen fruit, not the obedience owed to a person.\n\n## Audience Metaphor\n\nCompare a recipe's \"fold in the egg whites\" with a museum placard's \"this painting was completed in 1642.\" Only the first enjoins an act you must now perform; the second reports. A vidhi is the recipe-line of the Veda, an instruction to bring something about, never a placard describing what already is.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 2.1.1 and the classification of injunctions -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015aabara-Bh\u0101\u1e63ya on vidhi and the injunctive sentence -- see [references/sabara-bhashya.md](../references/sabara-bhashya.md)", "concepts/viniyoga": "# Viniyoga -- \u0935\u093f\u0928\u093f\u092f\u094b\u0917\n\n**Not:** symbolic interpretation, priestly improvisation, free association\n\n## What It Actually Means\n\nOnce a rite''s structure is known, one must decide what goes where: which mantra accompanies which offering, which subsidiary belongs to which principal. Viniyoga is this application, and M\u012bm\u0101\u1e43s\u0101''s signal contribution is the ordered sextet of means for establishing it: \u015bruti (direct statement) is strongest, then li\u1e45ga (a word''s indicatory capacity), v\u0101kya (syntactic unity), prakara\u1e47a (context and mutual need), sth\u0101na (position and sequence), and sam\u0101khy\u0101 (name), each yielding to the one before. This ranked-evidence method is a genuine hermeneutic algorithm, and it later shaped Indian legal and textual interpretation broadly.\n\n## Audience Metaphor\n\nA strict rule of evidence in court, where an eyewitness statement outranks circumstantial position, which outranks a mere label, decides what attaches to what. Viniyoga is ritual''s rules of evidence: six ranked tests that assign every mantra and material its rightful place.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 3.1 to 3.3 (the six means of application) -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. Artha-sa\u1e43graha on viniyoga -- see [references/artha-samgraha.md](../references/artha-samgraha.md)", "concepts/yaga": "# Y\u0101ga / Yaj\u00f1a -- \u092f\u093e\u0917\n\n**Not:** devotional worship, magic, karma (moral or motion)\n\n## What It Actually Means\n\nIn M\u012bm\u0101\u1e43s\u0101, \"karma\" first means the enjoined ritual act, the y\u0101ga. A y\u0101ga is individuated by its principal offering and its deity-dative and built from many subsidiary acts (see anga-pradhana). Its point is not to please a god but to perform, correctly and completely, what the injunction enjoins, thereby generating the ap\u016brva that yields the phala. The devat\u0101 is honoured verbally but is not, in classical M\u012bm\u0101\u1e43s\u0101, the causal agent of the result.\n\n## Audience Metaphor\n\nThink of a precisely notarised procedure whose legal effect follows from doing every step correctly, not from anyone''s goodwill. A y\u0101ga is that kind of act: efficacious by correct enactment under the rule, not by devotion and not by magic.\n\n## Citations\n\n1. M\u012bm\u0101\u1e43s\u0101 S\u016btra 2.1 and 4.2 on the sacrificial act -- see [references/mimamsa-sutra.md](../references/mimamsa-sutra.md)\n2. \u015a\u0101stra-d\u012bpik\u0101 on y\u0101ga and devat\u0101 -- see [references/sastra-dipika.md](../references/sastra-dipika.md)", "references/artha-samgraha": "# Artha-sa\u1e43graha (Laug\u0101k\u1e63i Bh\u0101skara)\n\nThe Artha-sa\u1e43graha of Laug\u0101k\u1e63i Bh\u0101skara (c. 17th century CE) is the standard concise primer of P\u016brva-M\u012bm\u0101\u1e43s\u0101, compactly stating the kinds of Vedic sentence (injunction, prohibition, arthav\u0101da, mantra, n\u0101madheya) and the rules for applying ritual elements (viniyoga). This bundle cites it where a crisp textbook formulation of a definition or a rule is the most useful reference.", "references/brhati": "# B\u1e5bhat\u012b (Prabh\u0101kara Mi\u015bra)\n\nThe B\u1e5bhat\u012b of Prabh\u0101kara Mi\u015bra (c. 7th century CE) is a commentary on \u015aabara''s Bh\u0101\u1e63ya and the founding text of the Pr\u0101bh\u0101kara sub-school, later expounded by \u015a\u0101likan\u0101tha in the \u1e5ajuvimal\u0101 and Prakara\u1e47apa\u00f1cik\u0101. Prabh\u0101kara reads the Vedic injunction as a binding directive (niyoga) correlated with a to-be-done (k\u0101rya), grounds meaning in the connected sense of the injunctive sentence (anvit\u0101bhidh\u0101na), and holds the self co-revealed in every act of knowing. This bundle cites the B\u1e5bhat\u012b tradition wherever the Pr\u0101bh\u0101kara position on injunction, duty, or sentence-meaning carries the point.", "references/mimamsa-sutra": "# M\u012bm\u0101\u1e43s\u0101 S\u016btra (Jaimini)\n\nThe M\u012bm\u0101\u1e43s\u0101 S\u016btra of Jaimini (composed in the last centuries BCE) is the foundational text of P\u016brva-M\u012bm\u0101\u1e43s\u0101. Its first s\u016btras establish the school's programme: an inquiry into dharma (MS 1.1.1), the definition of dharma as *codan\u0101-lak\u1e63a\u1e47o 'rtho dharma\u1e25* (MS 1.1.2), and the defence of the Veda as the authorless, self-valid means of knowing it. The later books build the hermeneutic apparatus, the analysis of injunction and prohibition, the subordination of arthav\u0101da and mantra, the application of mantras to rites (viniyoga), and the distinction of principal and subsidiary acts, that lets a reader determine exactly what the Veda enjoins. This bundle cites the s\u016btra wherever the root formulation carries the point.", "references/sabara-bhashya": "# \u015aabara-Bh\u0101\u1e63ya\n\nThe \u015aabara-Bh\u0101\u1e63ya (\u015aabarasv\u0101min, c. 1st century BCE to early centuries CE) is the earliest extant commentary on the M\u012bm\u0101\u1e43s\u0101 S\u016btra and the channel through which the s\u016btras entered the later tradition. \u015aabara fixes the classical readings of dharma, of the injunctive as the means to it, of ap\u016brva as the unseen link between act and result, and of the subordination of arthav\u0101da and mantra to injunction. His commentary is the shared basis that the two great sub-schools then read differently: Kum\u0101rila Bha\u1e6d\u1e6da in the *\u015alokav\u0101rttika* and *Tantrav\u0101rttika*, and Prabh\u0101kara Mi\u015bra in the *B\u1e5bhat\u012b*. This bundle cites the Bh\u0101\u1e63ya where a classical reading, rather than the bare s\u016btra, carries the doctrinal weight.", "references/sastra-dipika": "# \u015a\u0101stra-d\u012bpik\u0101 (P\u0101rthas\u0101rathi Mi\u015bra)\n\nThe \u015a\u0101stra-d\u012bpik\u0101 of P\u0101rthas\u0101rathi Mi\u015bra (c. 11th century CE) is one of the most-used later manuals of the Bh\u0101\u1e6d\u1e6da school, a systematic tour of M\u012bm\u0101\u1e43s\u0101 epistemology, the theory of injunction, ritual structure, and the self, that consolidates Kum\u0101rila''s positions and sets them clearly against the Pr\u0101bh\u0101kara alternatives. This bundle cites it where a clear systematic statement of a Bh\u0101\u1e6d\u1e6da doctrine or of the inter-school contrast carries the point.", "references/slokavarttika": "# \u015alokav\u0101rttika (Kum\u0101rila Bha\u1e6d\u1e6da)\n\nThe \u015alokav\u0101rttika (Kum\u0101rila Bha\u1e6d\u1e6da, c. 7th century CE) is a verse commentary on the opening portion (the Tarkap\u0101da) of \u015aabara''s Bh\u0101\u1e63ya and the charter text of the Bh\u0101\u1e6d\u1e6da sub-school. In it Kum\u0101rila argues the intrinsic validity of cognition (svata\u1e25-pr\u0101m\u0101\u1e47ya), the eternality of the word (\u015babda-nityat\u0101) and its inherent relation to meaning, the reality of universals against the Buddhist apoha view, and the real, permanent self against Buddhist momentariness. This bundle cites the \u015alokav\u0101rttika wherever the Bh\u0101\u1e6d\u1e6da formulation of an epistemic or semantic doctrine carries the point.", "references/tantravarttika": "# Tantrav\u0101rttika (Kum\u0101rila Bha\u1e6d\u1e6da)\n\nThe Tantrav\u0101rttika (Kum\u0101rila Bha\u1e6d\u1e6da) continues the \u015alokav\u0101rttika''s work into the later p\u0101das of \u015aabara''s Bh\u0101\u1e63ya, treating the structure of injunction and prohibition, the ap\u016brva as the unseen link between act and result, the subordination of arthav\u0101da and mantra to injunction, and the rules governing the application of ritual elements. This bundle cites the Tantrav\u0101rttika where the Bh\u0101\u1e6d\u1e6da treatment of ritual hermeneutics carries the doctrinal weight."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
