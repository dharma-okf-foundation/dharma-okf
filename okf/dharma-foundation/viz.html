<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

", "source": "concepts/samsara", "target": "concepts/loka"}}, {"data": {"id": "concepts/samsara__concepts/moksha", "source": "concepts/samsara", "target": "concepts/moksha"}}, {"data": {"id": "concepts/samsara__references/bhagavad-gita", "source": "concepts/samsara", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/samsara__references/brihadaranyaka-upanishad", "source": "concepts/samsara", "target": "references/brihadaranyaka-upanishad"}}, {"data": {"id": "concepts/shabda__references/brahma-sutras", "source": "concepts/shabda", "target": "references/brahma-sutras"}}, {"data": {"id": "concepts/shabda__concepts/om", "source": "concepts/shabda", "target": "concepts/om"}}, {"data": {"id": "concepts/shabda__concepts/mantra", "source": "concepts/shabda", "target": "concepts/mantra"}}, {"data": {"id": "concepts/shabda__concepts/akshara", "source": "concepts/shabda", "target": "concepts/akshara"}}, {"data": {"id": "concepts/shabda__concepts/brahman", "source": "concepts/shabda", "target": "concepts/brahman"}}, {"data": {"id": "concepts/vairagya__concepts/viveka", "source": "concepts/vairagya", "target": "concepts/viveka"}}, {"data": {"id": "concepts/vairagya__references/yoga-sutras", "source": "concepts/vairagya", "target": "references/yoga-sutras"}}, {"data": {"id": "concepts/vairagya__references/vivekachudamani", "source": "concepts/vairagya", "target": "references/vivekachudamani"}}, {"data": {"id": "concepts/vairagya__references/bhagavad-gita", "source": "concepts/vairagya", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/vairagya__concepts/moksha", "source": "concepts/vairagya", "target": "concepts/moksha"}}, {"data": {"id": "concepts/vairagya__concepts/yoga", "source": "concepts/vairagya", "target": "concepts/yoga"}}, {"data": {"id": "concepts/vairagya__concepts/dharma", "source": "concepts/vairagya", "target": "concepts/dharma"}}, {"data": {"id": "concepts/viveka__concepts/atman", "source": "concepts/viveka", "target": "concepts/atman"}}, {"data": {"id": "concepts/viveka__concepts/brahman", "source": "concepts/viveka", "target": "concepts/brahman"}}, {"data": {"id": "concepts/viveka__concepts/prakriti", "source": "concepts/viveka", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/viveka__concepts/vairagya", "source": "concepts/viveka", "target": "concepts/vairagya"}}, {"data": {"id": "concepts/viveka__concepts/moksha", "source": "concepts/viveka", "target": "concepts/moksha"}}, {"data": {"id": "concepts/viveka__references/vivekachudamani", "source": "concepts/viveka", "target": "references/vivekachudamani"}}, {"data": {"id": "concepts/viveka__concepts/buddhi", "source": "concepts/viveka", "target": "concepts/buddhi"}}, {"data": {"id": "concepts/yoga__concepts/chitta", "source": "concepts/yoga", "target": "concepts/chitta"}}, {"data": {"id": "concepts/yoga__concepts/brahman", "source": "concepts/yoga", "target": "concepts/brahman"}}, {"data": {"id": "concepts/yoga__concepts/dhyana", "source": "concepts/yoga", "target": "concepts/dhyana"}}, {"data": {"id": "concepts/yoga__concepts/karma", "source": "concepts/yoga", "target": "concepts/karma"}}, {"data": {"id": "concepts/yoga__references/yoga-sutras", "source": "concepts/yoga", "target": "references/yoga-sutras"}}, {"data": {"id": "concepts/yoga__references/bhagavad-gita", "source": "concepts/yoga", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/yoga__concepts/samadhi", "source": "concepts/yoga", "target": "concepts/samadhi"}}, {"data": {"id": "concepts/yoga__concepts/prana", "source": "concepts/yoga", "target": "concepts/prana"}}, {"data": {"id": "concepts/yoga__concepts/moksha", "source": "concepts/yoga", "target": "concepts/moksha"}}], "bodies": {"concepts/ahankara": "# Ahank\u0101ra\n\n**Not:** Ego (Freudian), Self-identity, Pride, Narcissism\n\n## What It Actually Means\n\nAhank\u0101ra is the self-arrogating principle within *Anta\u1e25kara\u1e47a* \u2014 the faculty that takes every perception and stamps it with \"I\" and \"mine.\" It brings subjectivity into all bodily activities. Every experience becomes \"MY experience.\" Every thought becomes \"MY thought.\" This appropriation is Ahank\u0101ra's function.\n\nUnlike Freud's ego (which develops from infancy as the reality principle mediates between id and superego), Ahank\u0101ra is something every sentient being is born with \u2014 it is an evolute of [Prak\u1e5bti](/concepts/prakriti.md), present from the moment of embodiment.\n\nThree types (S\u0101\u1e43khya): *S\u0101ttvika* (oriented toward knowledge and good deeds), *R\u0101jasika* (oriented toward aggressive domination and activity), and *T\u0101masika* (oriented toward inertia and delusion). Yoga transforms the latter two into s\u0101ttvika before transcending Ahank\u0101ra itself. But even s\u0101ttvika Ahank\u0101ra binds \u2014 as Bhagav\u0101n \u015ar\u012b K\u1e5b\u1e63\u1e47a teaches, even the subtlest sense of \"I am the doer of good\" is still bondage.\n\n## Why \"Ego\" Fails\n\nFreud's ego is a developmental, psychological construct that mediates instinct and reality. Ahank\u0101ra is a cosmological principle \u2014 the third evolute of Prak\u1e5bti that creates the subject-object split in consciousness. Freud's ego serves mental health; Ahank\u0101ra is the very mechanism that sustains [Sa\u1e43s\u0101ra](/concepts/samsara.md).\n\n## Audience Metaphor\n\nAhank\u0101ra is like the watermark on every photo your phone takes \u2014 it stamps \"MY PHOTO\" on every image, whether you asked it to or not. You start believing you ARE the photographer. [Mok\u1e63a](/concepts/moksha.md) is realizing the light was always just passing through the lens; the watermark was added after the fact.\n\n## Citations\n\n1. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 3.27, 7.4, 13.5\n3. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) of \u0100di \u015aa\u1e45kar\u0101c\u0101rya\n4. Cross-bundle note: the doctrinal source-school treatment of the Anta\u1e25kara\u1e47a apparatus is sankhya-darshana v0.13 \u2014 this file remains the canonical concept entry; v0.13 adds only school-source framing, no restatement", "concepts/akshara": "# Ak\u1e63ara\n\n**Not:** Letter, Alphabet character, Syllable\n\n## What It Actually Means\n\nLiterally \"imperishable\" (*a-k\u1e63ara* \u2014 that which does not perish) \u2014 the eternal sound that reveals the secret of speech. Another word for letter is *Var\u1e47a* (hue or color). The Sanskrit alphabet (*Var\u1e47am\u0101l\u0101*) means \"garland of colors or hues which an artist uses to paint reality.\"\n\nThe \u1e5a\u1e63is are said to have *seen*, not just heard, the Vedas \u2014 \"every letter is heard as a sound with a corresponding visual hue as it manifests.\" Sanskrit letters are primordial cosmic sounds with intrinsic reality \u2014 not arbitrary symbols chosen by convention.\n\nSri Aurobindo: \"Every one of its vowels and consonants has a particular inalienable force which exists by the nature of things and not by development or human choice; these are the fundamental sounds which lie at the base of the Tantric *b\u012bja mantras* and constitute the efficacy of the [Mantra](/concepts/mantra.md) itself.\"\n\n## Why \"Letter\" Fails\n\n\"Letter\" in English is an arbitrary grapheme \u2014 'A' looks like 'A' because of historical accident. *Ak\u1e63ara* is an imperishable vibration with intrinsic cosmic significance. The English letter 'A' could be replaced by any symbol; the Ak\u1e63ara '\u0905' cannot, because its sound IS its reality.\n\n## Audience Metaphor\n\nAn ordinary letter is like a paint-by-number label \u2014 the symbol 'A' is just a sticker we all agreed to use, and we could swap it for any other mark and lose nothing. An Ak\u1e63ara is the opposite: it is like a specific musical note. You cannot relabel middle-C as middle-D and keep the music \u2014 the note *is* its frequency. Each Sanskrit phoneme is a note in reality's score, not a sticker on a box.\n\n## Citations\n\n1. \u015aiva S\u016btras (M\u0101he\u015bvara S\u016btras)\n2. Sri Aurobindo on Sanskrit phonemes\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/atman": "# \u0100tman\n\n**Not:** Soul, Self, Spirit, Inner being, Higher self\n\n## What It Actually Means\n\n\u0100tman is the eternal, all-pervading, self-luminous witness-consciousness (*s\u0101k\u1e63\u012b-caitanya*) that is the true nature of every being. It is not born, does not die, cannot be damaged, and is identical with [Brahman](/concepts/brahman.md) in the Advaita Ved\u0101nta understanding.\n\n\u0100tman is *chetan\u0101* \u2014 pure consciousness itself. It does not \"have\" consciousness the way a soul might \"have\" attributes. It IS consciousness. Key properties:\n\n- **Sat-chit-\u0101nanda**: eternal (*sat*), conscious (*chit*), free from suffering (*\u0101nanda*)\n- **Self-luminous** (*svayam-prak\u0101\u015ba*): does not require anything else to know itself \u2014 like a lamp that needs no other light\n- **All-pervading** (*sarva-gata\u1e25*): present in all forms of life \u2014 plants, animals, microorganisms, without exception\n- **Beyond gender**: not male, female, or neuter\n- **Eternal and unborn**: never created, never destroyed \u2014 the Bhagavad G\u012bt\u0101 states it is never born and never dies\n- **K\u1e63etraj\u00f1a**: the knower of the field (k\u1e63etra = body-mind complex). \u0100tman is always the knower, never the known\n\n### Two Kinds of \u0100tman\n\n| Type | Description |\n|---|---|\n| **J\u012bv\u0101tman** | An integral part (*a\u1e43\u015ba*) of Param\u0101tm\u0101 \u2014 conditioned, in a body, experiencing the world |\n| **Param\u0101tm\u0101** | The supreme self responsible for the functioning of the entire cosmos; the inner witness in all beings |\n\n*A\u1e43\u015ba* does not mean a spatial fragment \u2014 Param\u0101tm\u0101 admits no spatial division. Being an *a\u1e43\u015ba* means J\u012bv\u0101tman is totally supported by and dependent on Param\u0101tm\u0101.\n\nThe Ka\u1e6dha Upani\u1e63ad (1.3.3) maps the inner architecture: \u0100tman is the rider in the chariot, [Buddhi](/concepts/buddhi.md) is the charioteer, [Manas](/concepts/manas.md) is the reins, and the senses are the horses. \u0100tman is always the knower (*k\u1e63etraj\u00f1a*), never the known (*k\u1e63etra*).\n\n## Why the Substitutes Fail\n\n**\"Soul\"** imports the entire Abrahamic framework: created by God, judged after one life, sent to heaven or hell eternally. \u0100tman is none of these \u2014 it is uncreated, transmigrates across countless lives, includes ALL life (not just humans), and its \"liberation\" is the recognition that it was never bound.\n\n**\"Self\"** (capitalized) in Western philosophy typically means personal identity or ego. \u0100tman is precisely what remains when all personal identity is stripped away. Using \"Self\" risks confusing \u0100tman with *aha\u1e43k\u0101ra* \u2014 the very thing that must be seen through.\n\n**\"Spirit\"** implies something ghostly, immaterial-but-personal. \u0100tman is impersonal consciousness \u2014 the same in every being, as space inside a pot is the same space as outside it.\n\n## Audience Metaphor\n\nThink of \u0100tman as the screen in a movie theater. Every character, every scene, every emotion plays across it \u2014 but the screen is never burned by fire in the movie, never wet from rain, never aged by movie-time. You've been watching the movie so intently you forgot you ARE the screen.\n\n## Citations\n\n1. [B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad](/references/brihadaranyaka-upanishad.md), [Ka\u1e6dha Upani\u1e63ad](/references/katha-upanishad.md), [M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad](/references/mandukya-upanishad.md)\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 2.17\u201325 (\u0100tman's indestructibility)\n3. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) of \u0100di \u015aa\u1e45kar\u0101c\u0101rya\n4. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/brahman": "# Brahman\n\n**Not:** God, The Absolute, Universal consciousness, The Divine, Monotheism, Pantheism\n\n## What It Actually Means\n\nBrahman is *Sat-Chit-\u0100nanda* \u2014 infinite existence (*sat*), infinite consciousness (*chit*), infinite bliss (*\u0101nanda*). It is not a being who created the world; it is the reality of which the world is an appearance. Brahman is both the material cause and the efficient cause of the universe \u2014 the spider that spins the web out of its own substance.\n\nThere is only one ultimate reality (*tattva*), but it manifests in three ways depending on the depth of the devotee's inquiry:\n\n| Manifestation | Nature | Attained By |\n|---|---|---|\n| **Bhagav\u0101n** | Fully determinate \u2014 personal, relational, with transcendental attributes | Bhakti Yogi |\n| **Param\u0101tm\u0101** | Partially determinate \u2014 the inner witness, the cosmic self within all beings | Asht\u0101nga Yogi |\n| **Brahman** | Indeterminate \u2014 pure consciousness, beyond all attributes | J\u00f1\u0101na Yogi |\n\nThese are not three different beings. They are three ways the same reality reveals itself.\n\n## Sagu\u1e47a and Nirgu\u1e47a \u2014 Not \"With Qualities\" and \"Without Qualities\"\n\nThis is one of the most commonly mistranslated distinctions in Ved\u0101nta.\n\n- **Nirgu\u1e47a** does not mean Brahman has *no* qualities. It means Brahman has no *material* qualities \u2014 no finite, conditioned, dualistic attributes. Brahman is free from material limitations.\n- **Sagu\u1e47a** means Brahman possesses *transcendental* spiritual qualities (satyam, j\u00f1\u0101nam, \u0101nantam) that are beyond material categories.\n\nThey are not opposites \u2014 they describe the same infinite reality from different angles of approach.\n\n## Satk\u0101ryav\u0101da \u2014 The Cosmos Is Eternal\n\nThe universe was not created *ex nihilo* (from nothing). The Ved\u0101ntic principle of **satk\u0101ryav\u0101da** holds: the effect pre-exists in its cause in nascent form. A tree is potentially present in a seed. This means the cosmos is **eternal** \u2014 it undergoes cyclic manifestation and concealment, not creation and destruction. Being cannot arise from non-being. This is the exact opposite of Abrahamic creation doctrine.\n\n## Why the Substitutes Fail\n\n**\"God\"** in Abrahamic theology is a personal creator separate from creation, who judges, rewards, and punishes. Brahman is not separate from creation \u2014 Brahman IS the reality that appears as creation. There is no judgment, no separation between creator and created.\n\n**\"The Absolute\"** is a philosophical abstraction. Brahman is not abstract \u2014 it is the most concrete reality there is. *Sarvam khalv idam brahma* \u2014 \"All this is indeed Brahman.\"\n\n**\"Monotheism/Pantheism/Polytheism\"** are all Western theological categories that cannot contain Brahman. Monotheism posits one God separate from creation. Pantheism exhausts God in immanence (Brahman's transcendence remains complete). Polytheism posits independent, unrelated gods. The correct framework is **advaya j\u00f1\u0101na** \u2014 non-dual knowledge: one reality whose oneness does not negate multiplicity within it.\n\n## Audience Metaphor\n\nBrahman is the ocean. Every wave (individual being) rises from it, appears separate for a moment, and returns. The wave was never NOT the ocean \u2014 it just temporarily appeared to have a separate identity. [Mok\u1e63a](/concepts/moksha.md) is the wave recognizing it was always the ocean.\n\n## Citations\n\n1. [Ch\u0101ndogya Upani\u1e63ad](/references/chandogya-upanishad.md), [B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad](/references/brihadaranyaka-upanishad.md), [Taittir\u012bya Upani\u1e63ad](/references/taittiriya-upanishad.md)\n2. [Brahma S\u016btras](/references/brahma-sutras.md) of B\u0101dar\u0101ya\u1e47a\n3. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) of \u0100di \u015aa\u1e45kar\u0101c\u0101rya\n4. Rajiv Malhotra, *Sanskrit Non", "concepts/buddhi": "# Buddhi\n\n**Not:** Intellect, Reason, Intelligence (general), Wisdom\n\n## What It Actually Means\n\nBuddhi is the decisive faculty within *Anta\u1e25kara\u1e47a* \u2014 it receives input from [Manas](/concepts/manas.md), compares it against past impressions stored in [Chitta](/concepts/chitta.md), and makes a determination. The cognitive sequence: (1) senses report an object \u2192 (2) Manas generates like/dislike \u2192 (3) [Ahank\u0101ra](/concepts/ahankara.md) self-arrogates the knowledge (\"I know this\") \u2192 (4) Buddhi decides by comparing with stored impressions.\n\nBuddhi occupies the most powerful position \u2014 \"all actions are initiated at its dictation.\" Yet Buddhi is also *insentient* by nature, only reflecting [\u0100tman](/concepts/atman.md)'s consciousness. It is also *Mahat* \u2014 the first evolute of [Prak\u1e5bti](/concepts/prakriti.md), cosmic intelligence before it individualizes.\n\n## Why \"Intellect\" Fails\n\n\"Intellect\" in English implies analytical reasoning \u2014 the capacity for logical thought. Buddhi includes this but is broader: it encompasses the capacity for *adhyavas\u0101ya* (determination/conviction), discernment between real and unreal, and \u2014 at its highest \u2014 [Viveka](/concepts/viveka.md), the discrimination between the eternal and the transient.\n\n**Developing Buddhi is the goal of J\u00f1\u0101na Yoga.** \"Intellect\" has no spiritual function in Western usage; Buddhi's highest development is the capacity to discriminate \u0100tm\u0101 from An\u0101tm\u0101.\n\nPractical teaching point: \"What's the difference between *knowing* something and actually *living* it?\" \u2014 this is the gap between Manas and Buddhi. Intellectual knowledge lives in [Manas](/concepts/manas.md); embodied discernment and conviction live in Buddhi. You can \"know\" that identity is conditioned (Manas) while still reacting from it (Buddhi not yet developed).\n\n## Audience Metaphor\n\nIf [Manas](/concepts/manas.md) is the notification system, Buddhi is the decision engine \u2014 it processes the alert, pulls up relevant history, and outputs a verdict: \"act\" or \"don't act,\" \"real\" or \"not real.\"\n\n## Citations\n\n1. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a\n2. [Ka\u1e6dha Upani\u1e63ad](/references/katha-upanishad.md) 1.3.3 (Buddhi as charioteer)\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 3.42 \u2014 \"Buddhi is superior to Manas\"\n4. Cross-bundle note: the doctrinal source-school treatment of the Anta\u1e25kara\u1e47a apparatus (Buddhi as Mahat, the first evolute of Prak\u1e5bti) is sankhya-darshana v0.13 \u2014 this file remains the canonical concept entry; v0.13 adds only school-source framing, no restatement", "concepts/chakra": "# Chakra\n\n**Not:** Energy center, Spiritual vortex, Metaphorical concept\n\n## What It Actually Means\n\nEach Chakra represents a particular form of *consciousness* \u2014 not an \"energy center\" (a material, insentient concept with no well-defined connection to consciousness). Each Chakra corresponds to a [Loka](/concepts/loka.md) \u2014 the rise of *Ku\u1e47\u1e0dalin\u012b \u015aakti* brings the consciousness of the associated Loka.\n\nEach Chakra's petals represent Sanskrit syllabic sound vibrations ([Ak\u1e63ara](/concepts/akshara.md)) \u2014 the sum of all syllabic sounds in the petals IS the [Mantra](/concepts/mantra.md) of that Chakra. The Chakra system is thus a bridge between the cosmology of Lokas, the science of Mantra, and the physiology of consciousness.\n\n### The Seven Chakras (Ascending)\n\nKu\u1e47\u1e0dalin\u012b \u015aakti ascends from M\u016bl\u0101dh\u0101ra (root) toward Sahasr\u0101ra (crown):\n\n| # | Chakra | Location |\n|---|---|---|\n| 7 (highest) | **Sahasr\u0101ra** | Crown |\n| 6 | **\u0100j\u00f1\u0101** | Third Eye / Between the eyebrows |\n| 5 | **Vi\u015buddha** | Throat |\n| 4 | **An\u0101hata** | Heart |\n| 3 | **Ma\u1e47ip\u016bra** | Navel |\n| 2 | **Sv\u0101dhi\u1e63\u1e6dh\u0101na** | Sacral |\n| 1 (base) | **M\u016bl\u0101dh\u0101ra** | Root / Base of spine |\n\nThe ascent moves from M\u016bl\u0101dh\u0101ra (earth element, instinct, base consciousness) upward to Sahasr\u0101ra (transcendence, union with Brahman). This is an inner journey \u2014 the subtle spine (*su\u1e63umn\u0101 n\u0101\u1e0d\u012b*) is not the physical vertebral column.\n\n## Why \"Energy Center\" Fails\n\n\"Calling chakras merely 'energy centers' is a gross trivialization of their profound meaning\" (RM). \"Energy\" in Western usage is a physical, measurable, material quantity. Chakras are centers of consciousness \u2014 each representing an entire plane of reality. Reducing them to \"energy centers\" is like calling a university \"a building\" \u2014 technically it has a building, but that's not what it IS.\n\n## Audience Metaphor\n\nEach Chakra is like a different app on your consciousness \u2014 each with its own interface, capabilities, and connection to a different dimension of reality. The Western \"energy center\" interpretation is like describing your phone as \"a rectangle with a battery.\" Technically true, profoundly insufficient.\n\n## Citations\n\n1. \u1e62a\u1e6d-Cakra-Nir\u016bpa\u1e47a\n2. \u015aiva Sa\u1e43hit\u0101\n3. Sir John Woodroffe (Arthur Avalon), *The Serpent Power*\n4. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)\n\n## Error Genealogy\n\n- Ku\u1e47\u1e0dalin\u012b / \"chakra energy\" as an awaken-able biopsychic energy descends from Arthur Avalon (John Woodroffe), *The Serpent Power* (1919, a flawed translation of the \u1e62a\u1e6dcakranir\u016bpa\u1e47a) \u2192 Jung's 1932 Kundalini seminars \u2192 Joseph Campbell and the human-potential movement \u2192 New Age and yoga-studio vocabulary. See [G1 \u2014 Ku\u1e47\u1e0dalin\u012b and the Serpent Power lineage](../../../GENEALOGIES.md) in the repository root for the full chain and sources.\n- The rainbow-colored, one-emotion-per-chakra system is C.W. Leadbeater's *The Chakras* (1927, Theosophical Society), popularized through New Age synthesis \u2014 not ancient doctrine. The Sanskrit sources assign phonemes and deities, not colors and emotions, and do not agree on seven. See [G2 \u2014 the rainbow-chakra overlay](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/chitta": "# Chitta\n\n**Not:** Unconscious mind, Subconscious, Memory, Psyche\n\n## What It Actually Means\n\nChitta is the individualized portion of *Mahat tattva* \u2014 the storehouse where *sa\u1e43sk\u0101ras* (impressions from all actions) are deposited and preserved. It is the medium of [Karma](/concepts/karma.md) \u2014 every karmic impression is stored in Chitta and ripens when conditions are right.\n\nThe critical distinction: **Chitta is constant across different lives.** It carries sa\u1e43sk\u0101ras across births, persisting through the death of the physical body and the formation of new ones. This is why past-life tendencies manifest \u2014 the Chitta carries them. Yog\u012bs and accomplished Gurus can *manipulate chittas* \u2014 reading, modifying, and even deleting karmas stored within it.\n\nChitta is located in the heart region (where [\u0100tman](/concepts/atman.md) is believed to reside). Pata\u00f1jali's Yoga S\u016btras famously define [Yoga](/concepts/yoga.md) as *chitta-v\u1e5btti-nirodha* \u2014 the cessation of the modifications of Chitta.\n\n## Why \"Unconscious Mind\" Fails\n\nThe Freudian/Jungian unconscious is (1) limited to one lifetime, (2) shaped primarily by childhood experience, and (3) has no mechanism for cross-life persistence. Chitta transcends all three limitations \u2014 it is a *trans-life* repository that operates within the framework of [Karma](/concepts/karma.md) and transmigration, which the Western \"unconscious mind\" does not consider.\n\n## Audience Metaphor\n\nChitta is your cloud storage \u2014 synced across every device (lifetime) you've ever used. Every file (sa\u1e43sk\u0101ra) you've ever saved is there, even from devices you no longer remember owning. [Yoga](/concepts/yoga.md) practice is learning to access, organize, and eventually clear that storage.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.2 \u2014 *yogash chitta v\u1e5btti nirodha\u1e25*\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md)\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)\n4. Cross-bundle note: the doctrinal source-school treatment of the Anta\u1e25kara\u1e47a apparatus is sankhya-darshana v0.13 \u2014 this file remains the canonical concept entry; v0.13 adds only school-source framing, no restatement", "concepts/dharma": "# Dharma\n\n**Not:** Religion, Duty, Righteousness, Law, Morality\n\n## What It Actually Means\n\nDharma operates at multiple simultaneous levels \u2014 cosmic, social, and individual \u2014 which is precisely why no single English word can capture it.\n\nAt the **cosmic level**, Dharma is *\u1e5bta* \u2014 the fundamental ordering principle that holds the universe together. It is not a rule imposed from outside; it is the inherent nature of how reality functions.\n\nAt the **social level**, Dharma is the ethical and behavioral framework appropriate to one's stage of life (*\u0101\u015brama*), role (*var\u1e47a*), and circumstances. It is context-dependent, not categorical \u2014 what is dharmic in one situation may be adharmic in another.\n\nAt the **individual level**, Dharma is *svadharma* \u2014 one's own nature, calling, and unique path. The Bhagavad G\u012bt\u0101 (3.35): \"Better is one's own dharma, though imperfectly performed, than the dharma of another well performed.\"\n\nDharma also means the inherent property of a thing \u2014 the dharma of fire is to burn, the dharma of water is to flow. In this sense, it precedes ethics entirely and describes the nature of reality itself.\n\n## Why the Substitutes Fail\n\n**\"Religion\"** implies a belief system with a founder, a book, and a creed. Dharma has no founder, predates any single text, and is discovered (not revealed). You cannot \"convert\" to Dharma \u2014 you can only recognize it.\n\n**\"Duty\"** strips the cosmic and metaphysical dimensions entirely, reducing Dharma to a social obligation. Duty is imposed; Dharma is inherent.\n\n**\"Righteousness\"** imports Christian moral absolutes. Dharma is context-sensitive \u2014 the Mah\u0101bh\u0101rata's genius is showing how Dharma shifts depending on circumstance, role, and consequence.\n\n## Audience Metaphor\n\nDharma is like gravity \u2014 it's the fundamental force that keeps everything in its orbit. You don't choose to follow gravity; you can only align with it or fight it. Fighting it doesn't break the law \u2014 it breaks you.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) (especially chapters 2\u20133, 18)\n2. Mah\u0101bh\u0101rata \u2014 \u015a\u0101nti Parva\n3. Manusm\u1e5bti (with Dharmic interpretive tradition)\n4. Rajiv Malhotra, *Being Different* (2011)\n\n## Error Genealogy\n\n- Dharma boxed into the Western category \"religion\" (and its shadow renderings duty and law) was constructed by colonial administration and census categories (19th c.) and fixed by missionary/colonial lexicography (Monier-Williams, 1899). See [G6 \u2014 Dharma = religion](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/dhyana": "# Dhy\u0101na\n\n**Not:** Meditation (generic), Mindfulness, Contemplation, Relaxation\n\n## What It Actually Means\n\nDhy\u0101na is specifically the seventh limb of Pata\u00f1jali's A\u1e63\u1e6d\u0101\u1e45ga [Yoga](/concepts/yoga.md) \u2014 a precise technical stage between *dh\u0101ra\u1e47\u0101* (concentration, the 6th limb) and [Sam\u0101dhi](/concepts/samadhi.md) (absorption, the 8th limb). In Dhy\u0101na, the flow of attention to the object of meditation becomes unbroken \u2014 like oil poured from one vessel to another in a continuous stream.\n\nThe word \"meditation\" is used indiscriminately to denote the latter five limbs of yoga, collapsing many technical aspects of the *s\u0101dhana* into one ill-defined word. Each limb has a specific function, specific prerequisites, and specific experiential markers.\n\n## Why \"Meditation\" Fails\n\n\"Meditation\" in popular Western usage encompasses everything from guided visualization to body scanning to mindfulness to mantra repetition to sitting still with eyes closed. Dhy\u0101na is ONE specific state within a precisely defined sequence. Using \"meditation\" for Dhy\u0101na is like using \"cooking\" for \"saut\u00e9ing\" \u2014 it collapses a specific technique into a vague category.\n\n## Audience Metaphor\n\nIf the eight limbs of Yoga are levels in a game, Dhy\u0101na is Level 7 \u2014 you can only reach it by clearing Levels 1\u20136. Calling any calm-sitting-with-eyes-closed \"meditation\" is like saying you're on Level 7 when you haven't installed the game.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 3.2\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) chapter 6", "concepts/jiva": "# J\u012bva\n\n**Not:** Soul, Individual soul, Person, Living being (biological)\n\n## What It Actually Means\n\nJ\u012bva is [\u0100tman](/concepts/atman.md) as it appears when conditioned by [M\u0101y\u0101](/concepts/maya.md) \u2014 the conscious being as it experiences itself while embodied. J\u012bva is not a separate entity FROM \u0100tman; it IS \u0100tman, but identified with a body-mind complex due to ignorance (*avidy\u0101*).\n\n> **All j\u012bva-s are \u0101tm\u0101-s. Not all \u0101tm\u0101-s are j\u012bva-s.**\n\nTwo categories of j\u012bva:\n\n| Type | Description |\n|---|---|\n| **Nityamukta-s** | Eternally free \u0101tm\u0101-s \u2014 never conditioned, engaged in sev\u0101 of Bhagav\u0101n in the transcendental realm; include avat\u0101ras |\n| **Baddha-s (j\u012bva-s)** | Conditioned \u0101tm\u0101-s caught in material bondage \u2014 *an\u0101dibaddha* (beginninglessly bound), but their bondage has an end |\n\n### The Structure of J\u012bva (Figure 8)\n\nThe j\u012bva is not just the body or the ego. Its full architecture:\n\n```\n\u0100TM\u0100 (central flame \u2014 pure consciousness)\n  \u2514\u2500\u2500 surrounded by: Buddhi \u00b7 Ahank\u0101ra \u00b7 Manas \u00b7 Chitta\n        \u2514\u2500\u2500 ANTA\u1e24KARA\u1e46A (inner instrument complex)\n              \u2514\u2500\u2500 S\u016aK\u1e62MA \u015aAR\u012aRA (subtle body)\n                    \u251c\u2500\u2500 J\u00f1\u0101nendriya-s (cognitive instruments)\n                    \u2514\u2500\u2500 Karmendriya-s (active instruments)\nSTH\u016aLA \u015aAR\u012aRA (gross/physical body)\n\nChitta \u2192 Karma (accumulated impressions generate future karma)\n```\n\nThe j\u012bva forgets its true nature and wrongly identifies with the body, manas, and buddhi. It superimposes bodily characteristics (gender, nationality, religion, age) on the \u0100tm\u0101. **All social conflicts ultimately trace back to this misidentification.**\n\n## Why \"Soul\" Fails\n\n\"Soul\" in Abrahamic theology is a created entity distinct from God, subject to judgment, destined for eternal heaven or hell after ONE life. J\u012bva is not created, is ultimately identical with Brahman, is not judged by an external authority, and transmigrates through countless lives. The two concepts share almost no structural features.\n\n## Audience Metaphor\n\nJ\u012bva is like a wave that thinks it's separate from the ocean. It has a shape, a size, a location, a birth moment, and a death moment \u2014 all real at the wave level. But at the ocean level, it was never anything other than water. The wave's \"liberation\" isn't becoming the ocean \u2014 it's recognizing it always was.\n\n## Citations\n\n1. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) of \u0100di \u015aa\u1e45kar\u0101c\u0101rya\n2. [Brahma S\u016btras](/references/brahma-sutras.md) 2.3.43\u201353\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 15.7 \u2014 \"The J\u012bva is an eternal fragment of Myself\"\n4. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/karma": "# Karma\n\n**Not:** Fate, Destiny, Cosmic justice, \"What goes around comes around\", Punishment/reward, physical motion (Vai\u015be\u1e63ika)\n\n## What It Actually Means\n\nKarma is the precise mechanism by which every action \u2014 physical, verbal, and mental \u2014 creates *sa\u1e43sk\u0101ras* (impressions) stored in [Chitta](/concepts/chitta.md) that shape future experience across lifetimes. It is not a system of reward and punishment administered by an external judge. It is an impersonal law \u2014 as mechanical as gravity, as precise as chemistry.\n\nThree types operate simultaneously: *Sa\u00f1chita* (the total accumulated storehouse from all past lives), *Pr\u0101rabdha* (the portion allocated to this current life \u2014 already \"ripening\"), and *Kriyam\u0101na* / *\u0100g\u0101mi* (karma being created right now by current actions).\n\nKarma is NOT sin. Sin in Abrahamic theology is a moral offense against God requiring divine forgiveness. Karma is cause-and-effect \u2014 no offense, no judge, no forgiveness needed. A burnt hand is not \"punished\" by the fire; it encountered a natural consequence. Karma operates the same way at the moral-experiential level.\n\n## Why the Substitutes Fail\n\n**\"Fate\"** implies predetermination with no agency. Karma explicitly preserves free will \u2014 *Pr\u0101rabdha* shapes the field, but *Kriyam\u0101na* (your current actions) shapes the future. You are never \"fated.\"\n\n**\"What goes around comes around\"** trivializes a precise multi-life mechanism into a bumper sticker. It also implies same-life return, which karma does not require \u2014 consequences may ripen across many lifetimes.\n\n## Audience Metaphor\n\nKarma is like compound interest on a cosmic bank account \u2014 every action is a deposit or withdrawal. The balance carries over when you \"close\" one account (death) and \"open\" another (rebirth). *Pr\u0101rabdha* is this life's opening balance. *Kriyam\u0101na* is what you're depositing right now. [Mok\u1e63a](/concepts/moksha.md) is closing the account permanently.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 4.17 \u2014 \"The way of karma is unfathomable\"\n2. [B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad](/references/brihadaranyaka-upanishad.md) 4.4.5\n3. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) (2.12\u201314)\n4. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)\n\n## Error Genealogy\n\n- Karma-as-fate / \"cosmic justice\" / \"what goes around comes around\" descends from H.P. Blavatsky's *The Key to Theosophy* (1889), which recast karma in English as a quasi-mechanical law of retribution; New Thought absorbed it and 20th-century usage completed the drift, inverting a doctrine of agency into one of resignation. See [G4 \u2014 Karma = fate / cosmic retribution](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/loka": "# Loka\n\n**Not:** Planet, World, Dimension, Realm (fantasy)\n\n## What It Actually Means\n\nA Loka is a plane of consciousness \u2014 not a physical location in space. The Loka system is a map of consciousness states, not an astronomical chart. *Bh\u016bloka* (the human earth plane) is the central hub.\n\nThe 14-Loka hourglass model: ascending from Bh\u016bloka are *Bhuvarloka, Svargaloka, Maharloka, Janoloka, Tapoloka,* and *Satyaloka* (the highest \u2014 realm of truth/[Brahman](/concepts/brahman.md)). Descending are *Atala, Vitala, Sutala, T\u0101latala, Mah\u0101tala, Ras\u0101tala,* and *P\u0101t\u0101la* (the deepest).\n\nA [J\u012bva](/concepts/jiva.md) can access different Lokas based on [Karma](/concepts/karma.md), spiritual development, and state of awareness. Elevation is upward (toward Brahman); degradation is downward (toward greater material entanglement). \"It is not absolutely essential for a person to cast aside his physical body in order to gain access to Svarga\" \u2014 one can experience higher Lokas by elevating consciousness to that level while living.\n\n## Why \"Planet\" or \"World\" Fails\n\nThese terms imply physical geographic locations you could travel to in a spaceship. Lokas are accessible through consciousness, not through space. A yogi in [Sam\u0101dhi](/concepts/samadhi.md) may access Satyaloka while their body sits in Bh\u016bloka. No spacecraft can reach Svargaloka.\n\n## Audience Metaphor\n\nLokas are like different channels on a radio \u2014 they all broadcast simultaneously, but you only hear the one you're tuned to. [Yoga](/concepts/yoga.md) and spiritual practice are tuning the dial. Your body stays in Bh\u016bloka (the default channel); your consciousness can tune to higher or lower frequencies.\n\n## Citations\n\n1. Vi\u1e63\u1e47u Pur\u0101\u1e47a (14-Loka cosmology)\n2. Bh\u0101gavata Pur\u0101\u1e47a\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/manas": "# Manas\n\n**Not:** Mind, Emotional mind, Heart (metaphorical)\n\n## What It Actually Means\n\nManas is one of the four components of *Anta\u1e25kara\u1e47a* (the inner instrument) AND **the eleventh Indriya** \u2014 the coordinator of all sensory input and output. It is not the full cognitive apparatus; it is specifically the interface between the internal and external worlds where *J\u00f1\u0101nendriyas* (sense faculties), external objects, and [\u0100tman](/concepts/atman.md) meet.\n\nManas operates in binary mode: it qualifies every cognized object with either *r\u0101ga* (liking/attraction) or *dve\u1e63a* (disliking/aversion) \u2014 without rational analysis. That immediate gut reaction before thought kicks in? That is Manas.\n\nCritically, Manas is *insentient* (*ja\u1e0da*) by nature. It does not generate consciousness \u2014 it only reflects the consciousness of [\u0100tman](/concepts/atman.md), like the moon reflects sunlight. The Ka\u1e6dha Upani\u1e63ad (1.3.3): Manas is the reins of the chariot \u2014 it guides the senses (horses) under the direction of [Buddhi](/concepts/buddhi.md) (charioteer).\n\n## Why \"Mind\" Fails\n\n\"Mind\" in English encompasses everything from perception to reasoning to memory to emotion. In Vedic psychology, these functions are distributed across four distinct instruments: Manas (feeling/doubting), [Buddhi](/concepts/buddhi.md) (deciding), [Ahank\u0101ra](/concepts/ahankara.md) (self-identifying), and [Chitta](/concepts/chitta.md) (remembering). Calling Manas \"the mind\" collapses a precision instrument into a blunt category.\n\n## Audience Metaphor\n\nManas is like the notification system on your phone \u2014 it flags everything as either \"want\" or \"don't want\" before you even open the app. It's fast, reactive, and binary. [Buddhi](/concepts/buddhi.md) is the part that actually reads the notification and decides what to do.\n\n## Citations\n\n1. [Ka\u1e6dha Upani\u1e63ad](/references/katha-upanishad.md) 1.3.3\u20134 (chariot analogy)\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md)\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)\n4. Cross-bundle note: the doctrinal source-school treatment of the Anta\u1e25kara\u1e47a apparatus is sankhya-darshana v0.13 \u2014 this file remains the canonical concept entry; v0.13 adds only school-source framing, no restatement", "concepts/mantra": "# Mantra\n\n**Not:** Chant, Prayer, Spell, Sacred syllable, Incantation, Affirmation\n\n## What It Actually Means\n\nMantras are sequences of vibration originating in the subtlest levels of existence \u2014 where there is silence. They are not arbitrary noises and not understood only conceptually. Sri Aurobindo: \"Mantra is the word that carries the godhead in it or the power of the godhead.\"\n\nWhen repeated, a mantra \"vibrates in every part of the practitioner's being and reorients within him the original reality from whence it came.\" Mantras are taught by rote in early childhood because \"once installed in one's deep levels of consciousness, their full effect and benefits will manifest as experience over the course of time.\"\n\nMantra energizes [Pr\u0101\u1e47a](/concepts/prana.md). Healers can transfer pr\u0101\u1e47a to patients; self-healing can be accomplished by concentrating pr\u0101\u1e47a on affected areas using mantra. Benefits accrue not only to the chanter but \"to all humanity and the cosmos at large.\"\n\nChildren are given their name as a mantra \u2014 \"A child is often carefully given an appropriate name so that it will internalize its name as vibration, and over time the effect of repeating the name will bring inner transformation in subtle ways.\"\n\n## Why \"Prayer\" or \"Chant\" Fails\n\nPrayer is a request to an external God. Mantra operates on the practitioner's own consciousness through vibration \u2014 no request, no intermediary. \"Chant\" implies simple repetition of words; Mantra's efficacy depends on correct utterance, specific breathing, and the vibrational properties of Sanskrit phonemes \u2014 not on understanding the \"meaning\" in the ordinary sense.\n\n## T.S. Eliot's Recognition\n\nNobel laureate T.S. Eliot, who studied Sanskrit and the Upani\u1e63ads at Harvard, described what scholars recognize as the mantra principle: \"...syllable and rhythm, penetrating far below the conscious level of thought and feeling... It works through meanings, certainly, or not without meanings in the ordinary sense...\"\n\n## Audience Metaphor\n\nA mantra is less like a sentence and more like a tuning fork. Striking the right fork does not *describe* the note \u2014 it makes everything nearby vibrate at that frequency. You do not have to understand the physics for the resonance to happen; you only have to strike it correctly and repeatedly. Over time the repetition tunes your whole instrument to the source the sound came from. Treating a mantra as a \"chant\" or \"affirmation\" is like reading the label on the tuning fork instead of striking it.\n\n## Citations\n\n1. Sri Aurobindo on Mantra (multiple passages)\n2. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md)\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/maya": "# M\u0101y\u0101\n\n**Not:** Illusion, Delusion, Fantasy, The Matrix, A mistake\n\n## What It Actually Means\n\nM\u0101y\u0101 is a **real and powerful \u015aakti (creative power) of Brahman** \u2014 the principle responsible for the manifestation and diversity of the material world. The word derives from the root *m\u0101* meaning \"to measure or produce.\" M\u0101y\u0101 is the measuring, producing power of Bhagav\u0101n.\n\n**M\u0101y\u0101 \u2260 Illusion.** Illusion is a deceptive appearance caused by a defect in perception \u2014 it vanishes once the defect is corrected. M\u0101y\u0101 is not a perceptual error. It is a real and potent \u015aakti. Critically: **M\u0101y\u0101 has a feminine personality** \u2014 she is referred to as M\u0101y\u0101 Dev\u012b. Hindus name daughters M\u0101y\u0101, M\u0101y\u0101vat\u012b. Naming a girl after an illusion would be absurd.\n\n### The Two-Fold Structure of M\u0101y\u0101\n\n```\nM\u0100Y\u0100\n\u251c\u2500\u2500 GU\u1e46A M\u0100Y\u0100 / PRAK\u1e5aTI \u2014 Material Cause of World\n\u2502     (the material substance from which the physical world is made)\n\u2514\u2500\u2500 J\u012aVA M\u0100Y\u0100 \u2014 Efficient Cause of World\n      \u251c\u2500\u2500 AVIDY\u0100 (leads to Sa\u1e43s\u0101ra)\n      \u2502     \u251c\u2500\u2500 \u0100vara\u1e47a \u2014 conceals the true nature of \u0100tm\u0101\n      \u2502     \u2514\u2500\u2500 Vik\u1e63epa \u2014 projects the false empirical world in its place\n      \u2514\u2500\u2500 VIDY\u0100 (leads to Mukti)\n```\n\nM\u0101y\u0101 functions with precision:\n1. **\u0100vara\u1e47a** \u2014 concealment; veils \u0100tm\u0101 so the j\u012bva cannot see its true nature\n2. **Vik\u1e63epa** \u2014 projection; creates the appearance of a material world in place of the truth\n\n### M\u0101y\u0101 Has a Purpose\n\nM\u0101y\u0101 is not a mistake. It impels j\u012bva-s to activity. Through the experience of the transience of material pursuits, eventually it turns the j\u012bva toward Bhagav\u0101n. Her ultimate purpose is to bring bound j\u012bva-s home.\n\n### M\u0101y\u0101 Cannot Understand Itself\n\nThe mind is a product of M\u0101y\u0101, so the mind cannot comprehend M\u0101y\u0101 \u2014 only \u0100tm\u0101, which is beyond M\u0101y\u0101, can \"see through\" it. This is why intellectual understanding alone cannot liberate; direct recognition (*anubhava*) is required.\n\nModern science operates entirely *within* M\u0101y\u0101 \u2014 using instruments of M\u0101y\u0101 (mind, intelligence, senses) to study M\u0101y\u0101. The \u015b\u0101stra-s, by contrast, were cognized by \u1e5b\u1e63i-s who transcended M\u0101y\u0101.\n\n## Why the Substitutes Fail\n\n**\"Illusion\"** implies the world is fake, like a hallucination. M\u0101y\u0101 doesn't say the world is fake \u2014 it says the world is real at a transactional level (*vy\u0101vah\u0101rika*) but has no independent, absolute reality (*p\u0101ram\u0101rthika*). The rope-snake analogy: the snake is an illusion, but the rope is real. The world is real as experienced \u2014 its substrate (Brahman) is real; only the idea of independence is false.\n\n**\"The Matrix\"** gets closer but implies a malicious architect. M\u0101y\u0101 has no malicious intent \u2014 it is the nature of how the infinite appears as the finite, and it serves a redemptive purpose.\n\n## Advaita vs. Other Schools\n\nIn Advaita Ved\u0101nta, M\u0101y\u0101 is sometimes interpreted as the veil through which Brahman falsely appears as the universe. Even here: M\u0101y\u0101 is not the illusion \u2014 it is the *cause* of the misperception. The illusion belongs to the j\u012bva; M\u0101y\u0101 is the principle enabling both the misperception and the correction.\n\nIn S\u0101\u1e43khya and \u015aaiva Siddh\u0101nta, M\u0101y\u0101 is identified with Prak\u1e5bti \u2014 the primordial material principle.\n\n## Audience Metaphor\n\nM\u0101y\u0101 is like VR goggles that have been on so long you forgot they're there. The VR world is real *as experience* \u2014 you feel, react, suffer, and celebrate within it. But it has no independent existence apart from the consciousness generating it. Removing the goggles (= Self-knowledge) doesn't destroy the VR world \u2014 it reveals what was always behind it.\n\n## Citations\n\n1. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) of \u0100di \u015aa\u1e45kar\u0101c\u0101rya\n2. [M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad](/references/mandukya-upanishad.md) with Gau\u1e0dap\u0101da's K\u0101rik\u0101\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 7.14 \u2014 \"This divine M\u0101y\u0101 of mine is difficult to cross\"\n4. Rajiv Malhotra, *Sanskrit Non-Translatabl\n\n## Error Genealogy\n\n- M\u0101y\u0101-as-\"illusion\" (the world does not exist) was broadcast into Western philosophy by Schopenhauer's \"veil of Maya\" (*The World as Will and Representation*, 1818/1844) and completed by popular culture; the flattening erases the corpus's four distinct m\u0101y\u0101-level treatments at once. See [G8 \u2014 M\u0101y\u0101 = illusion](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/moksha": "# Mok\u1e63a\n\n**Not:** Salvation, Heaven, Enlightenment (New Age usage), Nirvana (related but distinct \u2014 Buddhism), Kaivalya (a specific type of mok\u1e63a \u2014 not a synonym)\n\n## What It Actually Means\n\nMok\u1e63a is the fourth and ultimate *puru\u1e63\u0101rtha* (aim of human life) \u2014 the permanent cessation of [Sa\u1e43s\u0101ra](/concepts/samsara.md) through direct recognition that [\u0100tman](/concepts/atman.md) is [Brahman](/concepts/brahman.md). It is not \"going somewhere\" \u2014 it is recognizing what you already are and always were.\n\n**There is no Original Sin in Hinduism.** Every j\u012bv\u0101tm\u0101 reaps the fruits of its own karma. The conditioning of the j\u012bva is beginningless (*an\u0101dibaddha*) \u2014 not caused by anyone else's act. Liberation therefore requires no intercession, no belief in a savior, no judgment.\n\n**Liberation is available at any time** \u2014 not only after death. The Bhagavad G\u012bt\u0101 states: one who departs the body while chanting Om becomes liberated, independent of any intermediary. Multiple valid paths lead there.\n\n### The Five Types of Mukti\n\nLiberation is not one-size-fits-all. The mok\u1e63a \u015b\u0101stra-s describe **five** types (*pa\u00f1ca-mukti*). The first four are forms of *personal* liberation in which the j\u012bva retains its individuality and reaches the divine abode of Bhagav\u0101n (Bhakti M\u0101rga); the fifth, *s\u0101yujya* (union), is read two ways depending on dar\u015bana:\n\n| Type | Description |\n|---|---|\n| **S\u0101lokya** | Residing in the same loka (*abode*) as Bhagav\u0101n |\n| **S\u0101m\u012bpya** | Attaining eternal proximity to Bhagav\u0101n |\n| **S\u0101r\u016bpya** | Attaining the same form as Bhagav\u0101n |\n| **S\u0101r\u1e63\u1e6di** | Attaining the same opulence and powers as Bhagav\u0101n |\n| **S\u0101yujya** | Union / merger, read two ways: **Brahman S\u0101yujya** (*Kaivalya*, J\u00f1\u0101na M\u0101rga) \u2014 the j\u012bva drops body/ego identification, realizes identity with Brahman, and individuality dissolves into Universal Consciousness; **\u012a\u015bvara S\u0101yujya** (Bhakti M\u0101rga) \u2014 complete oneness with Bhagav\u0101n with the loving relationship retained. |\n\nThe five honor different temperaments: some seek dissolution into pure consciousness (*Kaivalya*), others seek loving eternal relationship with Bhagav\u0101n. Both paths are valid.\n\nMok\u1e63a is NOT earned \u2014 it is recognized. [Karma](/concepts/karma.md) cannot produce Mok\u1e63a because Mok\u1e63a is the nature of \u0100tman, which is already free. Karma can only remove obstacles (ignorance) that prevent recognition. The rope was never a snake; you just need to see clearly.\n\n## Why the Substitutes Fail\n\n**\"Salvation\"** implies rescue by an external savior from a fallen state (Original Sin). In the Ved\u0101ntic framework, you are not fallen \u2014 you are Brahman appearing to be limited. No one saves you; you wake up. The j\u012bva's bondage is beginningless, not caused by transgression.\n\n**\"Heaven\"** is a temporary destination in a reward-punishment schema. Even *Svarga* (the closest to \"heaven\") is temporary \u2014 beings exhaust their merit and return to earth. Mok\u1e63a is beyond all *lokas* and entirely permanent.\n\n**\"Kaivalya\"** specifically \u2014 Kaivalya is one *type* of mok\u1e63a (the S\u0101\u1e43khya/Yoga term for isolation from Prak\u1e5bti and the Advaita term for merger into Brahman), not a synonym for liberation as a whole.\n\n## Audience Metaphor\n\nMok\u1e63a is like waking up from a dream. In the dream, you ran, suffered, fought, loved \u2014 all of it felt absolutely real. Waking up doesn't \"fix\" the dream or \"reward\" you for dream-behavior. It simply reveals that you were always the dreamer, safe in bed, never actually in danger.\n\n## Citations\n\n1. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md), [Ka\u1e6dha Upani\u1e63ad](/references/katha-upanishad.md), [Mu\u1e47\u1e0daka Upani\u1e63ad](/references/mundaka-upanishad.md)\n2. [Brahma S\u016btras](/references/brahma-sutras.md) 4.4 (on liberation)\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) chapters 2, 13, 18\n4. Srimad Bh\u0101gavatam 11.9.18 (Bhagav\u0101n as Kaivalya personified)\n\n## Error Genealogy\n\n- Mok\u1e63a-as-\"salvation\" was built for translation purposes by missionary Bible-translation lexicography (Serampore era, early 19th c.) and fixed as the default English gloss by Monier-Williams's dictionary (1899). See [G7 \u2014 Mok\u1e63a = salvation](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/om": "# Om / Pra\u1e47ava / Omk\u0101ra\n\n**Not:** Amen, Ameen, Any \"universal sound\" equivalent, Sacred syllable (reductive)\n\n## What It Actually Means\n\nOm is the most hallowed mantra in all dharmic traditions \u2014 the primordial sound that emerged from Brahm\u0101 at the beginning of creation. It is the root of the Vedas, the source and basis of all existence, and *\u015aabda Brahman* \u2014 the primordial sonic consciousness identical with [Brahman](/concepts/brahman.md).\n\nThree constituent phonemes: **A + U + M** \u2014 clearly stated in the \u015a\u0101stras. Any trivialization or modification is not permissible. Meditating and chanting Om is an effective means to unify with Supreme Consciousness. The Bhagavad G\u012bt\u0101 states that one who departs the body while chanting Om becomes liberated ([Mok\u1e63a](/concepts/moksha.md)).\n\n## The Amen Comparison \u2014 Refuted\n\nAmen is uttered at the end of Abrahamic prayers to mean \"so be it\" \u2014 its Sanskrit equivalent is *Tathastu*, not Om. \"When Hindus chant Om, they are not repeatedly saying 'so be it' or 'yes.'\" Chanting Om alone is sufficient to lead to Mok\u1e63a \u2014 no similar claim is made for Amen in Christianity or Ameen in Islam.\n\n**Key rule:** Similarity in pronunciation does not imply equivalence of meaning, purpose, evolution, or function. \"It is wholly unreasonable and erroneous to equate something of paramount importance in one tradition with one of minor importance in another.\"\n\n## Audience Metaphor\n\nOm is not so much a word you say as the carrier wave underneath all words \u2014 like the steady tone the line hums before any particular call connects. Every other sacred utterance is a message sent over the line; Om is the line itself. Treating it as just another \"sacred syllable\" mistakes the carrier for one of the messages it carries.\n\n## Citations\n\n1. [M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad](/references/mandukya-upanishad.md) (dedicated analysis of Om)\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 8.13, 17.23\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/prakriti": "# Prak\u1e5bti\n\n**Not:** Nature, Matter, The material world, Mother Nature\n\n## What It Actually Means\n\nPrak\u1e5bti is the primordial, unmanifest substrate from which the entire phenomenal universe evolves \u2014 both physical AND psychological. In the S\u0101\u1e43khya framework, Prak\u1e5bti is constituted of three *gu\u1e47as* \u2014 *sattva* (luminosity/knowledge), *rajas* (activity/passion), and *tamas* (inertia/darkness). When the gu\u1e47as are in equilibrium, Prak\u1e5bti is unmanifest. When they are disturbed, creation begins.\n\nThe evolution sequence from Prak\u1e5bti: first *Mahat/Buddhi* \u2192 *Aha\u1e43k\u0101ra* \u2192 *Manas* + *Indriyas* + *Tanm\u0101tras* \u2192 *Mah\u0101bh\u016btas*. All 24 tattvas of the manifest world are evolutes of Prak\u1e5bti.\n\nCritically, Prak\u1e5bti includes the MIND. [Manas](/concepts/manas.md), [Buddhi](/concepts/buddhi.md), [Ahank\u0101ra](/concepts/ahankara.md) are all products of Prak\u1e5bti \u2014 they are material, not spiritual. Only [\u0100tman](/concepts/atman.md)/Puru\u1e63a is beyond Prak\u1e5bti.\n\n### The Recursive Nature of Prak\u1e5bti / Vik\u1e5bti\n\nEach evolute becomes the new \"prak\u1e5bti\" (material cause) for the next stage \u2014 *Vik\u1e5bti* (subsequent effect/evolute) is a relative term. Mah\u0101t-Buddhi is the Vik\u1e5bti of unmanifest Prak\u1e5bti but the Prak\u1e5bti for Aha\u1e43k\u0101ra. This recursive self-generation is what makes the cosmos intelligible: every layer of reality has a cause, and the sequence terminates in unmanifest Prak\u1e5bti as the first material principle.\n\n### Modern Science Operates Within Prak\u1e5bti\n\nThis is a fundamental dissonance with the dharmic framework \u2014 not a disagreement about details, but about first principles. Modern science uses instruments of Prak\u1e5bti (mind, senses, instruments) to study Prak\u1e5bti. It cannot access Puru\u1e63a ([\u0100tman](/concepts/atman.md)) from within this framework because Puru\u1e63a is not an object \u2014 it is the witnessing consciousness that makes all observation possible.\n\nThe Vedic \u015b\u0101stra-s were cognized by \u1e5b\u1e63i-s who transcended Prak\u1e5bti in Sam\u0101dhi. The knowledge is therefore trans-Prak\u1e5btic.\n\n## Why the Substitutes Fail\n\n**\"Nature\"** in English means the physical environment \u2014 trees, rivers, weather. Prak\u1e5bti includes the mind, intellect, ego, and all subtle elements. Your thoughts are Prak\u1e5bti. Your emotions are Prak\u1e5bti.\n\n**\"Matter\"** implies the physical-only, inert substance of Western physics. Prak\u1e5bti is dynamic, intelligent (through sattva-gu\u1e47a), and includes the entire psycho-physical apparatus.\n\n## Audience Metaphor\n\nPrak\u1e5bti is like the complete hardware-and-software stack of a computer \u2014 motherboard, RAM, storage, operating system, applications, display. ALL of it. The user-awareness observing the screen (Puru\u1e63a/\u0100tman) is the one thing that is NOT part of the stack.\n\n## Citations\n\n1. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 13.19\u201323\n3. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) (on Prak\u1e5bti and Puru\u1e63a)", "concepts/prana": "# Pr\u0101\u1e47a\n\n**Not:** Breath, Energy, Life force (vague), Chi/Qi (similar but from a distinct tradition)\n\n## What It Actually Means\n\nPr\u0101\u1e47a is the vital force that animates all living beings \u2014 operating in five differentiated forms (*pa\u00f1ca-pr\u0101\u1e47a*): *pr\u0101\u1e47a* (respiration/inward breath), *ap\u0101na* (excretion/downward breath), *vy\u0101na* (circulation throughout the body), *ud\u0101na* (speech, upward movement, and the force that separates the subtle body at death), and *sam\u0101na* (digestion and assimilation).\n\nDisease is \"a deficiency of pr\u0101\u1e47a in the affected part of the body.\" Pr\u0101\u1e47a is present in food and air \u2014 both eating and breathing bring pr\u0101\u1e47a into the body. Natural environments (ocean, mountains, rivers) have more pr\u0101\u1e47a available, which is why they rejuvenate. Pr\u0101\u1e47a is also obtained from loving relationships.\n\n[Mantra](/concepts/mantra.md) energizes pr\u0101\u1e47a. *Pr\u0101\u1e47\u0101y\u0101ma* (the fourth limb of [Yoga](/concepts/yoga.md)) is the science of regulating pr\u0101\u1e47a \u2014 not merely \"breathing exercises.\"\n\n## Pr\u0101\u1e47a and the Three-Tier Framework\n\nPr\u0101\u1e47a should be understood at the *Adhy\u0101tmika* (microcosmic/self) level \u2014 distinct from *Adhibhautika* V\u0101yu (physical air, the gross element). This distinction is critical:\n\n- **Adhibhautika V\u0101yu** \u2014 physical air, the gross element you breathe\n- **Adhy\u0101tmika Pr\u0101\u1e47a** \u2014 the subtle life-force that operates at the level of the *J\u012bva* and specifically **connects \u0100tm\u0101 with the J\u012bva complex** (the subtle and gross bodies)\n\nPr\u0101\u1e47\u0101y\u0101ma (the 4th limb of [Yoga](/concepts/yoga.md)) works at the Adhy\u0101tmika level \u2014 not the physical breath level. This is why \"breathing exercises\" misses the point entirely: the goal is to regulate the subtle Pr\u0101\u1e47a that the breath carries, not merely to manipulate air volume.\n\n## Why \"Breath\" or \"Energy\" Fails\n\n**\"Breath\"** reduces pr\u0101\u1e47a to a single physical function. Pr\u0101\u1e47a operates in digestion, circulation, speech, thought, and the process of death \u2014 none of which are \"breathing.\"\n\n**\"Energy\"** in Western physics is a measurable, material quantity. Pr\u0101\u1e47a is subtler than physical energy \u2014 it is the bridge between consciousness ([\u0100tman](/concepts/atman.md)) and matter ([Prak\u1e5bti](/concepts/prakriti.md)), the animating principle that makes inert matter appear alive.\n\n## Audience Metaphor\n\nPr\u0101\u1e47a is like bandwidth in a network \u2014 it flows through different channels (the five forms), powers different applications (breathing, digestion, movement, speech, thought), and the system crashes when it's insufficient. [Yoga](/concepts/yoga.md) practice is upgrading your bandwidth.\n\n## Citations\n\n1. [Pra\u015bna Upani\u1e63ad](/references/prashna-upanishad.md) (dedicated entirely to Pr\u0101\u1e47a)\n2. Ha\u1e6dha Yoga Prad\u012bpik\u0101\n3. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/samadhi": "# Sam\u0101dhi\n\n**Not:** Trance, Ecstasy, Altered state, Deep meditation\n\n## What It Actually Means\n\nSam\u0101dhi is the eighth and final limb of [Yoga](/concepts/yoga.md) \u2014 derived from *sam* (complete/perfect) + *\u0101* + *dh\u0101* (to hold). In Sam\u0101dhi, the s\u0101dhaka (practitioner), the object of contemplation, and the act of contemplation lose their distinctions \u2014 the three collapse into one.\n\nTwo broad types: *Sampraj\u00f1\u0101ta sam\u0101dhi* (with an object of consciousness \u2014 subtler forms of awareness where the object is still present) and *Asampraj\u00f1\u0101ta sam\u0101dhi* (objectless \u2014 ego completely dissolved, pure awareness without content). *Samyama* \u2014 the simultaneous application of dh\u0101ra\u1e47\u0101 + [Dhy\u0101na](/concepts/dhyana.md) + Sam\u0101dhi on one object \u2014 is the basis of yogic powers (*siddhis*).\n\n## Why \"Trance\" Fails\n\nTrance is \"merely a *t\u0101masika* state with a distorted vision of reality\" (RM). Sam\u0101dhi gives mastery over the forces of nature. \"Nobody in a bewildered and confused state of trance can attain knowledge of the entire cosmos.\" Trance diminishes awareness; Sam\u0101dhi is the peak of awareness \u2014 hyper-alertness beyond the subject-object split.\n\n## Audience Metaphor\n\nIn ordinary perception there is always a gap: a seer, a thing seen, and the act of seeing between them. Sam\u0101dhi is like a perfectly still lake and the sky it reflects becoming one image \u2014 no longer two things plus a reflection, just a single seamless expanse. A trance dims the lights to get there; Sam\u0101dhi turns them all the way up, until the seer, the seen, and the seeing are one blaze of awareness.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.17\u201318, 3.3\n2. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md)\n3. [M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad](/references/mandukya-upanishad.md)", "concepts/samsara": "# Sa\u1e43s\u0101ra\n\n**Not:** Reincarnation (in the Western New Age sense), The wheel of life (oversimplified), Worldly existence\n\n## What It Actually Means\n\nSa\u1e43s\u0101ra is the beginningless (*an\u0101di*) cycle of transmigration \u2014 [J\u012bva](/concepts/jiva.md) moving through countless embodiments driven by [Karma](/concepts/karma.md) stored in [Chitta](/concepts/chitta.md), sustained by [M\u0101y\u0101](/concepts/maya.md). It encompasses all realms of existence \u2014 not just human birth but birth in any of the 14 [Lokas](/concepts/loka.md).\n\nSa\u1e43s\u0101ra is not \"bad\" in a moral sense \u2014 it is a natural condition that persists as long as ignorance (*avidy\u0101*) persists. It ends permanently with [Mok\u1e63a](/concepts/moksha.md).\n\n## Why the Substitutes Fail\n\n**\"Reincarnation\"** (Western usage) typically implies a fixed personal identity transferring to a new body \u2014 \"I was Cleopatra in a past life.\" Sa\u1e43s\u0101ra involves the *s\u016bk\u1e63ma \u015bar\u012bra* (subtle body) carrying *sa\u1e43sk\u0101ras* \u2014 not a fixed personality, but an evolving pattern of impressions.\n\n## Audience Metaphor\n\nSa\u1e43s\u0101ra is like switching between characters in an infinite video game \u2014 each character has different attributes, different levels, different challenges. The player (\u0100tman) is always the same, but keeps getting absorbed into each new character, forgetting they're playing. Mok\u1e63a is putting down the controller.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 2.22 \u2014 \"As a person discards worn-out clothes and puts on new ones\"\n2. [B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad](/references/brihadaranyaka-upanishad.md) 4.4.1\u20136\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy):\n\n- Karma-as-fate / \"cosmic justice\" / \"what goes around comes around\" descends from H.P. Blavatsky's *The Key to Theosophy* (1889), which recast karma in English as a quasi-mechanical law of retribution; New Thought absorbed it and 20th-century usage completed the drift, inverting a doctrine of agency into one of resignation. See [G4 \u2014 Karma = fate / cosmic retribution](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/shabda": "# \u015aabda\n\n**Not:** Word, Sound (physical), Verbal testimony (reductive)\n\n## What It Actually Means\n\n\u015aabda operates at two levels. As an *epistemological* term, \u015aabda is one of the valid means of knowledge (*pram\u0101\u1e47a*) \u2014 specifically, the testimony of the Vedas, which is *apauru\u1e63eya* (not authored by any human being). This is fundamentally different from \"authority\" or \"testimony\" in Western epistemology, which always depends on human credibility.\n\nAt the deeper *metaphysical* level, \u015aabda embodies the theory that sound (*dhvani*) and meaning (*artha*) are undifferentiated in their unmanifest essence \u2014 *\u015aabda-Brahman*. Sanskrit grammarians understood that at the *madhyam\u0101* (undifferentiated) level, sound and meaning are one. The very structure of Sanskrit ensures sound and meaning cannot be arbitrarily separated.\n\n### The Four Levels of V\u0101k\n\n\u015aabda operates across four levels of speech/vibration (descending from transcendent to manifest):\n\n| Level | Name | Description |\n|---|---|---|\n| 1 (highest) | **Par\u0101** | Transcendent Primordial Vibration \u2014 the undivided sound-object pair at the source |\n| 2 | **Pa\u015byant\u012b** | Indivisible, Undifferentiated \u2014 potential sound-object pair, first movement toward differentiation |\n| 3 | **Madhyam\u0101** | Differentiated Inner (Mental) Speech \u2014 meaning and inner sound separated; thought before verbal |\n| 4 (manifest) | **Vaikhar\u012b** | Audible Speech \u2014 what we ordinarily call \"language\" |\n\nWestern linguistics operates entirely at the **Vaikhar\u012b** level. Mantras operate at the Par\u0101 and Pa\u015byant\u012b levels \u2014 which is why they carry effects beyond conceptual meaning. Translation is a Vaikhar\u012b-level operation and therefore cannot capture what lives at deeper levels.\n\nThis is why Sanskrit is fundamentally different from all other languages in dharmic understanding: the relationship between a word and its referent is not arbitrary convention (as Saussure claimed for European languages) but grounded in cosmic vibration that extends from Par\u0101 through Vaikhar\u012b.\n\n## Why \"Word\" or \"Sound\" Fails\n\n\"Word\" is an arbitrary symbol in structural linguistics. \u015aabda is a cosmic principle \u2014 the idea that the universe is built on a foundation of meaningful vibration. \"Sound\" (physical) reduces \u015aabda to acoustic waves. \u015aabda encompasses all levels from gross audible sound to the subtlest unmanifest vibration identical with consciousness.\n\n## Audience Metaphor\n\nWestern linguistics studies language the way you would study ripples on the surface of a pond \u2014 the audible *Vaikhar\u012b* layer. \u015aabda points to the whole water column beneath: the still depth (*Par\u0101*) where the disturbance originates, and every intermediate layer the ripple passes through on its way up. Translation only ever copies the surface ripples \u2014 it cannot carry the depth that produced them.\n\n## Citations\n\n1. Bhart\u1e5bhari's *V\u0101kyapad\u012bya*\n2. P\u0101\u1e47ini's A\u1e63\u1e6d\u0101dhy\u0101y\u012b\n3. [Brahma S\u016btras](/references/brahma-sutras.md) 1.3.28 (*\u015aabda as pram\u0101\u1e47a*)\n4. Rajiv Malhotra, *Sanskrit Non-Translatables* (2020)", "concepts/vairagya": "# Vair\u0101gya\n\n**Not:** Renunciation, Detachment, Dispassion, Asceticism\n\n## What It Actually Means\n\nVair\u0101gya is the absence of desire (*r\u0101ga*) toward worldly possessions, fame, and sensory pleasures \u2014 a required qualification alongside [Viveka](/concepts/viveka.md) for *J\u00f1\u0101na-yoga s\u0101dhana*. It is not the rejection of the world or withdrawal from life.\n\nThe critical distinction: \"renunciation\" implies leaving things behind \u2014 quitting your job, moving to an ashram, giving away possessions. Vair\u0101gya is an *inner quality* of non-attachment that can be fully present in a householder. A person with Vair\u0101gya may hold great wealth and responsibilities \u2014 they simply are not bound by them. Their sense of self does not depend on what they own, achieve, or are recognized for.\n\n## Why \"Detachment\" Fails\n\n\"Detachment\" in Western psychology often implies emotional numbness, dissociation, or avoidance. Vair\u0101gya is not numbness \u2014 it is freedom. A person with Vair\u0101gya feels fully, acts fully, and engages fully \u2014 without the desperate clinging that turns engagement into bondage.\n\n## Audience Metaphor\n\nVair\u0101gya is like being a really good actor \u2014 fully immersed in the role, feeling every emotion, giving the performance of a lifetime \u2014 while never once forgetting that you are not the character. The audience (your ego) is crying; the actor (your awareness) is free.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.15\u201316\n2. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md), Tattvabodha\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 6.35 \u2014 \"Through practice and Vair\u0101gya, the mind is restrained\"", "concepts/viveka": "# Viveka\n\n**Not:** Discernment, Good judgment, Wisdom, Discrimination (everyday sense)\n\n## What It Actually Means\n\nViveka is the technical ability to discriminate between *nitya* (eternal, unchanging \u2014 [\u0100tman](/concepts/atman.md)/[Brahman](/concepts/brahman.md)) and *anitya* (transient, changing \u2014 everything in [Prak\u1e5bti](/concepts/prakriti.md)). It is not everyday good judgment about which job to take or which restaurant to choose. It is the foundational capacity to see through the appearance of reality to what is actually real.\n\nPaired with [Vair\u0101gya](/concepts/vairagya.md) as the two primary prerequisites (*s\u0101dhana-catu\u1e63\u1e6daya*) for *J\u00f1\u0101na-yoga* \u2014 the path of Self-knowledge. Without Viveka, spiritual study remains intellectual entertainment; with Viveka, it becomes a path to [Mok\u1e63a](/concepts/moksha.md).\n\n## Why \"Discernment\" Fails\n\n\"Discernment\" in English applies to any domain \u2014 wine, character, aesthetics. Viveka has a precise scope: discriminating specifically between the eternal and the transient, \u0100tman from an\u0101tman, [Brahman](/concepts/brahman.md) from *Mithy\u0101*. No English word carries this specific technical scope.\n\n## Audience Metaphor\n\nViveka is like having a filter that separates signal from noise \u2014 except the \"signal\" is the one unchanging reality ([\u0100tman](/concepts/atman.md)) and the \"noise\" is everything that appears, changes, and disappears. Most people are drowning in noise and can't hear the signal. Viveka is learning to hear it.\n\n## Citations\n\n1. [Vivekac\u016b\u1e0d\u0101ma\u1e47i](/references/vivekachudamani.md) of \u0100di \u015aa\u1e45kar\u0101c\u0101rya (the entire text is about Viveka)\n2. Tattvabodha of \u0100di \u015aa\u1e45kar\u0101c\u0101rya (s\u0101dhana-catu\u1e63\u1e6daya)", "concepts/yoga": "# Yoga\n\n**Not:** Exercise, Stretching, Wellness practice, Meditation (generic), Workout\n\n## What It Actually Means\n\nYoga is defined by Pata\u00f1jali in the Yoga S\u016btras (1.2) as *chitta-v\u1e5btti-nirodha* \u2014 the cessation of the modifications of [Chitta](/concepts/chitta.md). It is the complete science of yoking individual consciousness to its source in [Brahman](/concepts/brahman.md).\n\nThe complete system is *A\u1e63\u1e6d\u0101\u1e45ga Yoga* \u2014 eight limbs progressing from outer ethical discipline inward to pure consciousness:\n\n| # | Limb | Meaning |\n|---|---|---|\n| 1 | **Yama** | 5 Moral Restraints \u2014 ethical conduct toward others |\n| 2 | **Niyama** | 5 Ethical Observances \u2014 inner discipline and self-cultivation |\n| 3 | **\u0100sana** | Postures \u2014 physical stability as foundation for inner work |\n| 4 | **Pr\u0101\u1e47\u0101y\u0101ma** | Control of Pr\u0101\u1e47a \u2014 not merely \"breathing exercises\" |\n| 5 | **Praty\u0101h\u0101ra** | Withdrawal of the Senses \u2014 turning attention inward |\n| 6 | **Dh\u0101ra\u1e47\u0101** | Fixing Consciousness on One Object \u2014 concentration |\n| 7 | **Dhy\u0101na** | Unbroken Flow of Attention on One Object \u2014 [Meditation](/concepts/dhyana.md) |\n| 8 | **Sam\u0101dhi** | No Distinction between Object and Subject \u2014 unified consciousness |\n\nWhat the global fitness industry calls \"yoga\
