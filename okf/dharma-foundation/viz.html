" is one-eighth of one limb (\u0101sana) \u2014 the physical postures \u2014 stripped of the seven other limbs and the entire cosmological framework.\n\nThe 3-step digestion: (1) Yoga was SEPARATED from Ved\u0101nta, [Karma](/concepts/karma.md), and the dharmic worldview. (2) Its context was SCRUBBED \u2014 secularized into \"stretching and wellness.\" (3) It was RE-CONTEXTUALIZED as a Western fitness practice, with dharmic sources erased.\n\n## Why the Substitutes Fail\n\nEvery English substitute reduces an eight-limbed science to one of its minor physical components. Calling Yoga \"exercise\" is like calling a PhD program \"reading\" \u2014 technically one activity occurs within it, but the reduction destroys the meaning.\n\n## Audience Metaphor\n\nImagine a smartphone. The global fitness industry took the flashlight app, called it \"the phone,\" and sells courses on how to use it \u2014 while ignoring the operating system, the processor, the network, and every other app. That flashlight app is \u0101sana. The full phone is Yoga.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) (complete text)\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) chapters 2, 3, 6, 12, 18\n3. Ha\u1e6dha Yoga Prad\u012bpik\u0101\n\n## Error Genealogy\n\n- Yoga-as-postural-exercise traces from Vivekananda's *Raja Yoga* (1896, sidelining \u0101sana) \u2192 early-20th-century international physical culture \u2192 Krishnamacharya's Mysore synthesis (1930s) \u2192 global export as fitness (Singleton, *Yoga Body*, 2010). See [G5 \u2014 Yoga = postural exercise](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "references/bhagavad-gita": "# Bhagavad G\u012bt\u0101\n\n## What It Is\n\nA 700-verse section of the Mah\u0101bh\u0101rata (Bh\u012b\u1e63ma Parva) in which Bhagav\u0101n \u015ar\u012b K\u1e5b\u1e63\u1e47a instructs Arjuna on the battlefield of Kuruk\u1e63etra. It is one of the three canonical foundations (prasth\u0101na-tray\u012b) of Ved\u0101nta and harmonizes the yogas of action, knowledge, and devotion.\n\n## Why It Matters Here\n\nCited across the bundle for its teachings on \u0100tman's indestructibility, svadharma, karma, the gu\u1e47as, and liberation through Om.", "references/brahma-sutras": "# Brahma S\u016btras\n\n## What It Is\n\nAttributed to B\u0101dar\u0101ya\u1e47a (Vy\u0101sa), the Brahma S\u016btras (also Ved\u0101nta S\u016btras) compress the reasoning of the Upani\u1e63ads into ~555 aphorisms on the nature of Brahman and the means to know it. Every major Ved\u0101nta school wrote a commentary on it.\n\n## Why It Matters Here\n\nCited for the nature of Brahman, the j\u012bva, liberation, and \u015aabda as pram\u0101\u1e47a.", "references/brihadaranyaka-upanishad": "# B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad\n\n## What It Is\n\nAmong the oldest and longest of the Upani\u1e63ads, part of the \u015aukla Yajurveda. It contains foundational dialogues (Y\u0101j\u00f1avalkya) on the Self, the method of negation 'neti neti,' and the mechanics of rebirth.\n\n## Why It Matters Here\n\nCited for \u0100tman, Karma, and Sa\u1e43s\u0101ra.", "references/chandogya-upanishad": "# Ch\u0101ndogya Upani\u1e63ad\n\n## What It Is\n\nOne of the oldest and most cited Upani\u1e63ads, attached to the S\u0101maveda. It contains the teaching of Udd\u0101laka to \u015avetaketu culminating in the mah\u0101v\u0101kya 'tat tvam asi' (That thou art).\n\n## Why It Matters Here\n\nCited for Brahman and the identity of \u0100tman and Brahman.", "references/katha-upanishad": "# Ka\u1e6dha Upani\u1e63ad\n\n## What It Is\n\nAn Upani\u1e63ad of the K\u1e5b\u1e63\u1e47a Yajurveda recounting young Naciket\u0101's questioning of Yama (Death) about what lies beyond death. It gives the famous chariot analogy mapping \u0100tman, Buddhi, Manas, and the senses.\n\n## Why It Matters Here\n\nCited for \u0100tman, the anta\u1e25kara\u1e47a hierarchy, and the inner architecture of the person.", "references/mandukya-upanishad": "# M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad\n\n## What It Is\n\nThe shortest of the principal Upani\u1e63ads (twelve verses), analyzing Om (A-U-M) and the four states of consciousness (waking, dream, deep sleep, tur\u012bya). Gau\u1e0dap\u0101da's K\u0101rik\u0101 is the seminal Advaita commentary on it.\n\n## Why It Matters Here\n\nCited for Om, Brahman, M\u0101y\u0101 (via Gau\u1e0dap\u0101da), and Sam\u0101dhi.", "references/mundaka-upanishad": "# Mu\u1e47\u1e0daka Upani\u1e63ad\n\n## What It Is\n\nAn Upani\u1e63ad of the Atharvaveda that distinguishes par\u0101 vidy\u0101 (knowledge of the imperishable) from apar\u0101 vidy\u0101 (all else), and gives the image of two birds on one tree \u2014 the enjoying j\u012bva and the witnessing Self.\n\n## Why It Matters Here\n\nCited for Mok\u1e63a and the nature of liberating knowledge.", "references/prashna-upanishad": "# Pra\u015bna Upani\u1e63ad\n\n## What It Is\n\nAn Upani\u1e63ad of the Atharvaveda built as six questions put by students to the sage Pippal\u0101da, treating the origin of creatures, the deities of the body, and especially pr\u0101\u1e47a and its functions.\n\n## Why It Matters Here\n\nCited as the principal source for Pr\u0101\u1e47a.", "references/samkhya-karika": "# S\u0101\u1e43khya K\u0101rik\u0101\n\n## What It Is\n\nThe earliest surviving systematic text of S\u0101\u1e43khya, ~72 verses by \u012a\u015bvarak\u1e5b\u1e63\u1e47a, expounding the dualism of Puru\u1e63a (consciousness) and Prak\u1e5bti (the tri-gu\u1e47a substrate) and the evolution of the tattvas.\n\n## Why It Matters Here\n\nThe source for the bundle's treatment of Prak\u1e5bti, the anta\u1e25kara\u1e47a (Manas, Buddhi, Ahank\u0101ra, Chitta), and the gu\u1e47as.", "references/taittiriya-upanishad": "# Taittir\u012bya Upani\u1e63ad\n\n## What It Is\n\nAn Upani\u1e63ad of the K\u1e5b\u1e63\u1e47a Yajurveda that lays out the five sheaths (pa\u00f1cako\u015ba) enveloping the Self and characterizes Brahman as satyam-j\u00f1\u0101nam-anantam and as \u0101nanda (bliss).\n\n## Why It Matters Here\n\nCited for Brahman as Sat-Chit-\u0100nanda.", "references/vivekachudamani": "# Vivekac\u016b\u1e0d\u0101ma\u1e47i\n\n## What It Is\n\nThe 'Crest-Jewel of Discrimination,' a teaching text traditionally attributed to \u0100di \u015aa\u1e45kar\u0101c\u0101rya, devoted to viveka \u2014 discriminating the eternal Self from the transient non-Self \u2014 as the path to liberation.\n\n## Why It Matters Here\n\nCited throughout for \u0100tman, Brahman, M\u0101y\u0101, J\u012bva, Viveka, and the nature of Mok\u1e63a.", "references/yoga-sutras": "# Yoga S\u016btras of Pata\u00f1jali\n\n## What It Is\n\nA set of 196 terse aphorisms compiled by Pata\u00f1jali, the root text of the P\u0101ta\u00f1jala Yoga dar\u015bana. It defines yoga as the stilling of the modifications of chitta and systematizes practice into eight limbs culminating in sam\u0101dhi.\n\n## Why It Matters Here\n\nThe source for the bundle's treatment of Yoga, Dhy\u0101na, Sam\u0101dhi, Chitta, and Vair\u0101gya."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
