ing all), a tree whose seed contains a subtle essence that cannot be seen. After each illustration, Udd\u0101laka says: \"That subtle essence \u2014 from that all this exists. That is the True (Sat). That is the \u0100tman. That art thou, \u015avetaketu.\"\n\nThe repetition of Tat Tvam Asi nine times is not redundancy but pedagogical: each metaphor approaches the same truth from a different angle, and the Mah\u0101v\u0101kya follows each angle. The instruction is to contemplate each instance until the identity is recognized, not merely affirmed.\n\n## Recommended Editions\n\n- Gambh\u012br\u0101nanda translation (Advaita Ashrama)\n- Olivelle translation (Oxford \u2014 scholarly)\n- Swami Swahananda (Ramakrishna Math)", "references/jivanmuktiviveka": "# J\u012bvanmuktiviveka \u2014 \u091c\u0940\u0935\u0928\u094d\u092e\u0941\u0915\u094d\u0924\u093f\u0935\u093f\u0935\u0947\u0915\n\n\"Discrimination regarding Liberation-while-Living.\" The only classical Advaita text devoted entirely to the concept of J\u012bvanmukti. By Vidy\u0101ra\u1e47ya, the same author as the Pa\u00f1cada\u015b\u012b. Five chapters covering: (1) the meaning of J\u012bvanmukti; (2) why Pr\u0101rabdha continues; (3) the role of Mano-N\u0101\u015ba (mind dissolution) and V\u0101san\u0101-K\u1e63aya (dissolution of latent impressions); (4) the Yoga methods that support J\u012bvanmukti; (5) Videhamukti as the final stage.\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| JMV 1.1\u201315 | J\u012bvanmukti | Definition and scriptural warrant |\n| JMV 1.20\u201335 | Pr\u0101rabdha | Why Pr\u0101rabdha continues post-J\u00f1\u0101na; the archer-arrow simile |\n| JMV 2.1\u201325 | V\u0101san\u0101-K\u1e63aya | The role of dissolving latent impressions |\n| JMV 5.1\u201320 | Videhamukti | The body's death and the final dissolution of Pr\u0101rabdha |\n\n## Why This Text Matters for OKF\n\nThe JMV is essential for the jivanmukti.md and videhamukti.md files because it addresses the exact confusions the OKF flags as high-risk:\n\n1. **Why does the body continue if liberation is achieved?** JMV 1.20\u201335 gives the fullest classical answer: J\u00f1\u0101na burns Sa\u00f1cita and stops \u0100g\u0101min but cannot retroactively cancel Pr\u0101rabdha already-in-motion \u2014 like an arrow already released.\n\n2. **Is Videhamukti superior to J\u012bvanmukti?** Vidy\u0101ra\u1e47ya's view: no hierarchy. J\u012bvanmukti is complete liberation; Videhamukti is the same liberation without the Pr\u0101rabdha vehicle. The value of J\u012bvanmukti is precisely that liberation is possible and demonstrable in embodied life \u2014 it is the tradition's strongest response to the view that mok\u1e63a requires death.\n\n3. **What role does Yoga practice play post-J\u00f1\u0101na?** Vidy\u0101ra\u1e47ya integrates Yoga methods (Pr\u0101\u1e47\u0101y\u0101ma, Dh\u0101ra\u1e47\u0101) as supports for V\u0101san\u0101-K\u1e63aya \u2014 not as alternative paths to liberation but as tools that help stabilize Brahma-j\u00f1\u0101na by wearing away the habit-layers (V\u0101san\u0101s) that generate Vipar\u012bta-bh\u0101van\u0101.\n\n## Cross-Bundle Note\n\nThe Yoga methods discussed in JMV chapters 3\u20134 overlap with the yoga-darshana bundle's territory. The OKF treats these as functional supports (up\u0101yas) within Advaita's framework, distinct from Yoga as an independent darshana.\n\n## Recommended Editions\n\n- Swami Mokshadananda translation (Ramakrishna Math)\n- Fort and Mumme (SUNY Press \u2014 scholarly with commentary)", "references/mandukya-karika": "# M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 \u2014 \u092e\u093e\u0923\u094d\u0921\u0942\u0915\u094d\u092f \u0915\u093e\u0930\u093f\u0915\u093e\n\nAlso known as Gau\u1e0dap\u0101d\u012bya K\u0101rik\u0101 or \u0100gama\u015b\u0101stra. The earliest systematic Advaita text and the commentary-treatise on the M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad by Gau\u1e0dap\u0101da (\u015aa\u1e45kara's paramaguru \u2014 teacher's teacher). Four chapters (prakara\u1e47as): \u0100gama (tradition), Vaitathya (unreality of the phenomenal world), Advaita (non-duality), and Al\u0101ta-\u015b\u0101nti (quenching of the firebrand).\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| MK 1.7\u201316 | Tur\u012bya | Tur\u012bya as the ground; \"kevala\" (alone/pure); Aj\u0101tiv\u0101da (no creation) |\n| MK 1.6\u20138 | Svapna | Dream and waking as structurally parallel; equal epistemic status |\n| MK 1.9\u201314 | Su\u1e63upti | Deep sleep analysis; Pr\u0101j\u00f1a as K\u0101ra\u1e47a \u015aar\u012bra |\n| MK 2.1\u201318 | Vaitathya | The unreality of phenomenal experience (waking and dream) |\n\n## The Aj\u0101tiv\u0101da (Non-Birth) Teaching\n\nGau\u1e0dap\u0101da's most distinctive contribution: no J\u012bva is ever born, no world is ever created, no liberation is ever achieved \u2014 because these are all conceptual overlays on the one non-dual Brahman that never actually undergoes modification. The M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 4 (Al\u0101ta-\u015b\u0101nti) presents this most fully. This is the most radical version of Advaita and is not the standard \u015aa\u1e45kara position (which allows Vy\u0101vah\u0101rika creation).\n\n## Significance for Tur\u012bya\n\nThe K\u0101rik\u0101's treatment of Tur\u012bya (MK 1.7\u201316) is the basis for the OKF's central claim: Tur\u012bya is not a state. The verse *prapa\u00f1copa\u015bama* (\"the cessation of the phenomenal world's appearance\") makes clear that Tur\u012bya is not something that appears alongside the other three states; it is the recognition that the \"four\" were never four.\n\n## Recommended Editions\n\n- Nikhilananda translation (Ramakrishna-Vivekananda Center)\n- Karmarkar edition (Pune \u2014 scholarly Sanskrit edition)\n- Swami Gambh\u012br\u0101nanda (Advaita Ashrama \u2014 with \u015aa\u1e45kara's commentary)", "references/mandukya-upanishad": "# M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad \u2014 \u092e\u093e\u0923\u094d\u0921\u0942\u0915\u094d\u092f \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\nThe shortest major Upani\u1e63ad \u2014 twelve verses \u2014 and, in Gau\u1e0dap\u0101da's assessment, the most concise and complete statement of Advaita. Associated with the Atharvaveda. Primary text for the Avasth\u0101traya (three-states) analysis and the Tur\u012bya teaching.\n\n## Structure\n\n| Verse | Content |\n|-------|---------|\n| 1 | All this is Brahman (OM = all this) |\n| 2 | Four aspects of the \u0100tman (p\u0101das) |\n| 3 | J\u0101grat \u2014 Vi\u015bva, Bahi\u1e63praj\u00f1a |\n| 4 | Svapna \u2014 Taijasa, Anta\u1e25praj\u00f1a |\n| 5 | Su\u1e63upti \u2014 Pr\u0101j\u00f1a, Ceto-mukha, \u0100nandabhuj |\n| 6 | Pr\u0101j\u00f1a as \u012a\u015bvara (entry/exit of creation) |\n| 7 | Tur\u012bya \u2014 the fourth, unseen, ungraspable, non-dual |\n| 8\u201312 | The Pra\u1e47ava (OM) and its four m\u0101tras (A-U-M + silence) |\n\n## Key Verses for Bundle Concepts\n\n**Verse 7** (Tur\u012bya):\n*na anta\u1e25praj\u00f1am na bahi\u1e63praj\u00f1am na ubhayata\u1e25praj\u00f1am na praj\u00f1\u0101naghana\u1e43 na praj\u00f1am na apraj\u00f1am; ad\u1e5b\u1e63\u1e6dam avyavah\u0101ryam agr\u0101hyam alak\u1e63a\u1e47am acintyam avyapade\u015byam ek\u0101tmapratyayas\u0101ra\u1e43 prapa\u00f1copa\u015bama\u1e43 \u015b\u0101nta\u1e43 \u015bivam advaita\u1e43 caturtha\u1e43 manyante sa \u0101tm\u0101 sa vij\u00f1eya\u1e25*\n\n**Verse 2** (Ayam \u0100tm\u0101 Brahma):\n*sarva\u1e43 hyetad brahma, ayam\u0101tm\u0101 brahma, so'yam\u0101tm\u0101 catu\u1e63p\u0101t*\n\n**Verse 5** (Su\u1e63upti / Pr\u0101j\u00f1a):\n*su\u1e63uptasth\u0101na\u1e25 ek\u012bbh\u016bta\u1e25 praj\u00f1\u0101naghana ev\u0101nandamayo hy\u0101nandabhuk cetomukh\u0101\u1e25 pr\u0101j\u00f1a\u1e25 t\u1e5bt\u012bya\u1e25 p\u0101da\u1e25*\n\n## The Gau\u1e0dap\u0101da Commentary\n\nThe M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 (by Gau\u1e0dap\u0101da, pre-600 CE) is the authoritative commentary and is frequently cited alongside the Upani\u1e63ad itself. See references/mandukya-karika.md for details.\n\n## Recommended Editions\n\n- Gambh\u012br\u0101nanda translation (Advaita Ashrama)\n- Swami Satchidanandendra (Adhyatma Prakasha Karyalaya)\n- Nikhilananda translation with Gau\u1e0dap\u0101da K\u0101rik\u0101 (Ramakrishna-Vivekananda Center)", "references/mundaka-upanishad": "# Mu\u1e47\u1e0daka Upani\u1e63ad \u2014 \u092e\u0941\u0923\u094d\u0921\u0915 \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\nOne of the ten principal Upani\u1e63ads (Mukhya Upani\u1e63ads). Three Mu\u1e47\u1e0dakas (chapters), each in two parts. Famous for the Par\u0101-Apar\u0101 Vidy\u0101 distinction (higher and lower knowledge), the arrow-Brahman metaphor, and the Mah\u0101v\u0101kya \"Praj\u00f1\u0101nam Brahma\" \u2014 though this Mah\u0101v\u0101kya is usually sourced to the Aitareya Upani\u1e63ad; some traditions count a Mu\u1e47\u1e0daka Mah\u0101v\u0101kya from Mu\u1e47\u1e0daka 3.2.9 (\"Brahmaiva Bhavati\").\n\n## Structure\n\n- Mu\u1e47\u1e0daka 1.1: Par\u0101 and Apar\u0101 Vidy\u0101 (higher and lower knowledge)\n- Mu\u1e47\u1e0daka 1.2: The inadequacy of ritual action alone\n- Mu\u1e47\u1e0daka 2: The nature of Brahman; creation from Brahman\n- Mu\u1e47\u1e0daka 3: The path to Brahman and liberation\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| 1.1.3\u20139 | Par\u0101 / Apar\u0101 Vidy\u0101 | All sciences as Apar\u0101; Brahman-knowledge as Par\u0101 |\n| 1.1.9 | Sagu\u1e47a Brahman | Brahman as source of creation; Up\u0101san\u0101 context |\n| 2.2.3\u20135 | Brahmabh\u0101van\u0101 | The arrow-to-Brahman metaphor; meditation leading to identity |\n| 3.2.9 | Liberation | \"Brahmaiva bhavati\" \u2014 the knower becomes Brahman |\n\n## The Arrow Metaphor (Mu\u1e47\u1e0daka 2.2.4)\n\n\"Taking up the great weapon \u2014 the Upani\u1e63ad as a bow \u2014 one should place on it the arrow sharpened by meditation. Drawing it with a mind absorbed in Brahman, one should pierce the target \u2014 the immortal Brahman.\" (Mu\u1e47\u1e0daka 2.2.4)\n\nThis metaphor is one of the Upani\u1e63ad's most famous passages: the Upani\u1e63ad is the bow (the pram\u0101\u1e47a), the student's Vic\u0101ra-sharpened mind is the arrow, and Brahman is the target. The metaphor is active and directional \u2014 it supports the brahmabhavana.md account of Nididhy\u0101sana as pointed, active inquiry rather than passive absorption.\n\n## Par\u0101 and Apar\u0101 Vidy\u0101 (1.1.4\u20135)\n\nThe Mu\u1e47\u1e0daka opens with a student asking \"what, having been known, everything becomes known?\" The teacher's answer distinguishes Apar\u0101 Vidy\u0101 (all Vedic ritual knowledge, grammar, prosody, etc.) from Par\u0101 Vidy\u0101 (knowledge of Brahman, \"that which is indestructible\"). This is the foundational Upani\u1e63adic claim that drives the entire upanishadic-core bundle: conventional knowledge cannot deliver liberation; only Brahman-knowledge can.\n\n## Recommended Editions\n\n- Gambh\u012br\u0101nanda translation (Advaita Ashrama \u2014 with \u015aa\u1e45kara's commentary)\n- Swami Sharvananda (Ramakrishna Math)\n- Patrick Olivelle (Oxford \u2014 scholarly critical edition)", "references/panchadashi": "# Pa\u00f1cada\u015b\u012b \u2014 \u092a\u091e\u094d\u091a\u0926\u0936\u0940\n\n\"Fifteen [chapters].\" A systematic Advaita Ved\u0101nta treatise in 15 chapters organized in three groups of five (Viveka-pa\u00f1caka on discrimination, D\u012bpa-pa\u00f1caka on consciousness, and \u0100nanda-pa\u00f1caka on bliss). By Vidy\u0101ra\u1e47ya (also known as M\u0101dhav\u0101c\u0101rya), the Advaita scholar-sage who established the Vijayanagara empire's intellectual tradition. More accessible than the Brahmas\u016btra Bh\u0101\u1e63ya; widely used as a teaching text in Ved\u0101ntic monasteries.\n\n## Key Passages for Bundle Concepts\n\n| Passages | Concept | Content |\n|----------|---------|---------|\n| 1.6\u201310 | Lak\u1e63a\u1e47a-Brahman | Ta\u1e6dastha vs. Svar\u016bpa Lak\u1e63a\u1e47a; the self-luminous Cit |\n| 1.16\u201325 | Svapna | Pr\u0101tibh\u0101sika reality of dream; implications for M\u0101y\u0101 analysis |\n| 3.1\u201315 | Up\u0101dhi | Up\u0101dhi of Brahman in creation; crystal analogy |\n| 3.15\u201325 | \u0100nandamaya Ko\u015ba | Causal body as Up\u0101dhi |\n| 7.1\u201310 | S\u0101k\u1e63in | S\u0101k\u1e63in vs. Pram\u0101t\u0101; self-luminosity; Su\u1e63upti as evidence |\n| 9.1\u201325 | Brahmabh\u0101van\u0101 | \u0100tma-Tattva-Viveka: the active cultivation of Brahman-identity |\n\n## Chapter Structure Relevant to Bundle\n\n- **Chapter 1 (Tattva-Viveka)**: The nature of Brahman; Ta\u1e6dastha vs. Svar\u016bpa Lak\u1e63a\u1e47a\n- **Chapter 3 (Pa\u00f1ca-Ko\u1e63a-Viveka)**: The five sheaths and their analysis\n- **Chapter 7 (T\u1e5bpt\u012b-D\u012bpa)**: S\u0101k\u1e63in as the witness of all three states\n- **Chapter 9 (\u0100tma-T\u1e5bpti-D\u012bpa)**: The bliss of recognizing the \u0100tman; Brahmabh\u0101van\u0101\n\n## Recommended Editions\n\n- H.P. Shastri translation (Shanti Sadan)\n- Swami Swahananda translation (Ramakrishna Math \u2014 2 vols.)", "references/taittiriya-upanishad": "# Taittir\u012bya Upani\u1e63ad \u2014 \u0924\u0948\u0924\u094d\u0924\u093f\u0930\u0940\u092f \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\nPart of the K\u1e5b\u1e63\u1e47a Yajurveda. Consists of three sections (Vall\u012bs): \u015aik\u1e63\u0101 Vall\u012b (phonology and meter), Brahm\u0101nanda Vall\u012b (the Pa\u00f1cako\u015ba and Brahman's nature), and Bh\u1e5bgu Vall\u012b (the student's discovery of Brahman through progressive investigation). Primary source for the Pa\u00f1cako\u015ba model and for the Svar\u016bpa Lak\u1e63a\u1e47a \"satyam j\u00f1\u0101nam anantam brahma.\"\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| TU 2.1 | Sat-Cit-\u0100nanda / Lak\u1e63a\u1e47a | \"satyam j\u00f1\u0101nam anantam brahma\" \u2014 the Svar\u016bpa Lak\u1e63a\u1e47a |\n| TU 2.1\u20135 | Pa\u00f1cako\u015ba | The five sheaths: Annamaya, Pr\u0101\u1e47amaya, Manomaya, Vij\u00f1\u0101namaya, \u0100nandamaya |\n| TU 2.4 | Nirgu\u1e47a Brahman | \"yato v\u0101co nivartante apr\u0101pya manas\u0101 saha\" \u2014 from where speech returns |\n| TU 2.5 | \u0100nandamaya Ko\u015ba | Structure and the \"tail = Brahman\" teaching |\n| TU 2.8\u20139 | Sat-Cit-\u0100nanda (\u0100nanda) | The \u0100nanda-M\u012bm\u0101\u1e43s\u0101: scaling of bliss to Brahman's \u0100nanda |\n\n## Brahm\u0101nanda Vall\u012b Structure\n\nThe Brahm\u0101nanda Vall\u012b (chapter 2) presents the five Ko\u015bas as nested sheaths, each introduced as \"Brahman\" only to be superseded:\n- 2.1: Annamaya \u2014 food-made sheath; \"this verily is Brahman\"\n- 2.2: Pr\u0101\u1e47amaya \u2014 breath-made; \"different from and within the Annamaya\"\n- 2.3: Manomaya \u2014 mind-made; \"different from and within the Pr\u0101\u1e47amaya\"\n- 2.4: Vij\u00f1\u0101namaya \u2014 intellect-made; speech-returns passage\n- 2.5: \u0100nandamaya \u2014 bliss-made; the innermost sheath\n\nThe conclusion (2.9): *\u0101nanda\u1e43 brahmeti vyaj\u0101n\u0101t* \u2014 \"he recognized \u0100nanda as Brahman\" \u2014 is the endpoint of the investigation, pointing to Brahman's \u0100nanda-nature (not the \u0100nandamaya Ko\u015ba itself).\n\n## Recommended Editions\n\n- Gambh\u012br\u0101nanda translation (Advaita Ashrama)\n- Sarvananda translation (Ramakrishna Math)", "references/upadesasahasri": "# Upadesas\u0101hasr\u012b \u2014 \u0909\u092a\u0926\u0947\u0936\u0938\u093e\u0939\u0938\u094d\u0930\u0940\n\n\"A Thousand Teachings.\" \u015aa\u1e45kara's own pedagogical manual \u2014 less commentary, more direct instruction on the method of teaching Advaita Ved\u0101nta. Two parts: Gadya (prose, 19 chapters on the teaching method and the student-teacher relationship) and Padya (verse, 19 chapters on specific Upani\u1e63adic passages and their Advaita significance).\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| 17.1\u20135 | Lak\u1e63a\u1e47a / Brahmabh\u0101van\u0101 | Svar\u016bpa Lak\u1e63a\u1e47a as instrument of \u0100tma-j\u00f1\u0101na |\n| 18.1\u201310 | Brahmabh\u0101van\u0101 | The process of stabilizing Brahma-j\u00f1\u0101na as identity |\n| Gadya 1 | \u015arava\u1e47a-Manana-Nididhy\u0101sana | The teacher-student relationship and the method |\n\n## Why This Text Matters for OKF\n\nThe Upadesas\u0101hasr\u012b is uniquely valuable because it is practical and methodological, not just doctrinal. \u015aa\u1e45kara addresses specific student confusions \u2014 \"what is the difference between knowing Brahman and being a J\u012bvanmukta?\" \"How does the Mah\u0101v\u0101kya function as pram\u0101\u1e47a rather than just a statement?\" \u2014 with the directness of a teacher addressing a live student. This makes it particularly valuable for the OKF's mission of preventing misreading.\n\n## Recommended Editions\n\n- Sengaku Mayeda translation and critical edition (Motilal Banarsidass \u2014 scholarly standard)\n- Swami Jagadananda translation (Ramakrishna Math)", "references/vedantasara": "# Ved\u0101ntas\u0101ra \u2014 \u0935\u0947\u0926\u093e\u0928\u094d\u0924\u0938\u093e\u0930\n\n\"Essence of Ved\u0101nta.\" A short systematic primer (226 paragraphs) on Advaita Ved\u0101nta by Sad\u0101nanda Yog\u012bndra. One of the standard introductory texts in Advaita monastic education. Covers: the four qualifications (S\u0101dhana Catu\u1e63\u1e6daya), the nature of Brahman, the three bodies, the five sheaths, the three states, the three Karma types, \u015arava\u1e47a-Manana-Nididhy\u0101sana, and J\u012bvanmukti/Videhamukti.\n\n## Key Passages for Bundle Concepts\n\n| Passages | Concept | Content |\n|----------|---------|---------|\n| 60\u201368 | Up\u0101dhi | Three bodies as Up\u0101dhis; the limiting-adjunct analysis |\n| 69\u201380 | Pa\u00f1cako\u015ba | The five-sheath analysis; An\u0101tman status of each |\n| 88\u201397 | Avasth\u0101-Traya | Three states and what each reveals |\n| 105\u2013115 | \u015arava\u1e47a-Manana-Nididhy\u0101sana | Definitions and relationships |\n| 116\u2013130 | Mah\u0101v\u0101kya | Function of the Mah\u0101v\u0101kya as Brahma-j\u00f1\u0101na pram\u0101\u1e47a |\n\n## Why This Text Matters for OKF\n\nThe Ved\u0101ntas\u0101ra is the most systematic and concise of the Advaita primers, covering all the major concepts of the upanishadic-core bundle in a structured sequence. Its treatment of the three bodies as Up\u0101dhis (60\u201368) is the source most directly behind the upadhi.md table of three Up\u0101dhi types. The text is designed as a teaching sequence: each section assumes the previous, which mirrors the \u015arava\u1e47a-Manana-Nididhy\u0101sana progression.\n\n## The Three-Body / Five-Sheath Mapping\n\nThe Ved\u0101ntas\u0101ra provides the clearest classical mapping between the three-body (Traya\u015bar\u012bra) and five-sheath (Pa\u00f1cako\u015ba) models:\n\n| Sheath | Body |\n|--------|------|\n| Annamaya Ko\u015ba | Sth\u016bla \u015aar\u012bra (gross body) |\n| Pr\u0101\u1e47amaya + Manomaya + Vij\u00f1\u0101namaya Ko\u015bas | S\u016bk\u1e63ma \u015aar\u012bra (subtle body) |\n| \u0100nandamaya Ko\u015ba | K\u0101ra\u1e47a \u015aar\u012bra (causal body) |\n\nThis mapping is referenced in pancha-kosha.md and upadhi.md.\n\n## Recommended Editions\n\n- Swami Nikhilananda translation (Ramakrishna Math \u2014 with extensive notes, recommended)\n- Sadananda Yogindra / M. Hiriyanna (scholarly)", "references/vivekachudamani": "# Vivekac\u016b\u1e0d\u0101ma\u1e47i \u2014 \u0935\u093f\u0935\u0947\u0915\u091a\u0942\u0921\u093e\u092e\u0923\u093f\n\n\"Crest Jewel of Discrimination.\" The most comprehensive single-text exposition of Advaita Ved\u0101nta practice and philosophy. 580+ verses covering S\u0101dhana Catu\u1e63\u1e6daya (fourfold qualification), analysis of the three bodies and five sheaths, the Mah\u0101v\u0101kya teaching, Nididhy\u0101sana, the J\u012bvanmukta's characteristics, and Videhamukti. Structured as a dialogue between a disciple and the teacher (Guru).\n\n## Key Passages for Bundle Concepts\n\n| Verses | Concept | Content |\n|--------|---------|---------|\n| 150\u2013230 | Pa\u00f1cako\u015ba | Systematic analysis of each sheath as An\u0101tman |\n| 218\u2013230 | \u0100nandamaya Ko\u015ba | Explicit rejection as \u0100tman; arguments for An\u0101tman status |\n| 238\u2013240 | Sat-Cit-\u0100nanda | As Svar\u016bpa Lak\u1e63a\u1e47a |\n| 254\u2013258 | Mah\u0101v\u0101kya | Fourfold schema; the Mah\u0101v\u0101kya as Akha\u1e47\u1e0da-\u0100k\u0101ra-V\u1e5btti |\n| 316\u2013322 | S\u0101k\u1e63in | Witness consciousness; Svaprak\u0101\u015batva |\n| 360\u2013380 | Nididhy\u0101sana / Brahmabh\u0101van\u0101 | Dissolution of Vipar\u012bta-bh\u0101van\u0101 |\n| 428\u2013570 | J\u012bvanmukti | The J\u012bvanmukta's characteristics, Pr\u0101rabdha, Sthitapraj\u00f1a |\n| 564\u2013580 | Videhamukti | The exhaustion of Pr\u0101rabdha |\n| 118\u2013127 | Up\u0101dhi | Three bodies; crystal analogy |\n\n## The Fourfold Mah\u0101v\u0101kya Schema (vv. 254\u2013258)\n\nThe VCM provides the most complete treatment of how the Mah\u0101v\u0101kya functions as pram\u0101\u1e47a. The key claim: the Mah\u0101v\u0101kya generates an Akha\u1e47\u1e0da-\u0100k\u0101ra-V\u1e5btti \u2014 an undivided, non-objectifying cognition that recognizes the non-dual nature directly, not as a concept about something else.\n\n## Authorship Question\n\nScholarship debates whether the VCM is by \u015aa\u1e45kara himself or by a later follower. The Advaita tradition accepts \u015aa\u1e45kara's authorship. The philosophical content is consistent with \u015aa\u1e45kara's Brahmas\u016btra Bh\u0101\u1e63ya and Upani\u1e63ad commentaries. OKF cites the text as \"attributed \u015aa\u1e45kar\u0101c\u0101rya\" without adjudicating the dispute.\n\n## Recommended Editions\n\n- Swami Madhavananda translation (Advaita Ashrama)\n- Swami Turiyananda (Ramakrishna Math)\n- A.J. Alston (Shanti Sadan \u2014 scholarly with extensive notes)"}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
