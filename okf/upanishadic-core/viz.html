<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>

window.BUNDLE = {"nodes": [{"data": {"id": "concepts/aham-brahmasmi", "label": "Aha\u1e43 Brahm\u0101smi", "type": "Concept", "description": "The Yajurvedic Mah\u0101v\u0101kya from B\u1e5bhad\u0101ra\u1e47yaka 1.4.10 \u2014 'I am Brahman' \u2014 a direct realization-statement in which the 'I' is witness awareness, not the ego; not a claim that a person is God, not pantheism, not an affirmation", "resource": "", "tags": ["mahavakya", "aham-brahmasmi", "upanishad", "advaita", "identity", "atman", "brahman"], "color": "#f59e0b", "size": 46}}, {"data": {"id": "concepts/anandamaya-kosha", "label": "\u0100nandamaya Ko\u015ba", "type": "Concept", "description": "The bliss sheath \u2014 the fifth and innermost of the Pa\u00f1cako\u015ba (five sheaths), corresponding to the causal body and the Su\u1e63upti (deep sleep) state; the sheath nearest to the \u0100tman but still An\u0101tman (not-self); not the \u0100tman itself, not the highest self, not the same as Brahman's \u0100nanda", "resource": "", "tags": ["anandamaya-kosha", "pancha-kosha", "sushupti", "advaita", "upadhi", "taittiriya", "causal-body"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/antaryamin", "label": "Antary\u0101min", "type": "Concept", "description": "The inner controller \u2014 Brahman as the immanent ruling principle within every being and object, dwelling inside yet unknown to what it dwells in, constituting its innermost \u0100tman \u2014 the primary Upani\u1e63adic formulation of Sagu\u1e47a Brahman's immanence; not the conscience, not the Holy Spirit, not a soul residing inside the body", "resource": "", "tags": ["antaryamin", "brahman", "saguna-brahman", "ishvara", "sakshin", "immanence", "inner-controller"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/avastha-traya", "label": "Avasth\u0101traya", "type": "Concept", "description": "The three experiential states \u2014 J\u0101grat (waking), Svapna (dream), Su\u1e63upti (deep sleep) \u2014 as the complete field of possible experience used in the M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad's inquiry into the witness; not a hierarchy of consciousness, not levels of reality, not sequential stages", "resource": "", "tags": ["avastha-traya", "jagrat", "svapna", "sushupti", "turiya", "mandukya", "advaita", "inquiry"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/ayam-atma-brahma", "label": "Ayam \u0100tm\u0101 Brahma", "type": "Concept", "description": "The Atharvanic Mah\u0101v\u0101kya from M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 1.2 \u2014 'This self is Brahman' \u2014 the nearest-demonstrative declaration linking \u0100tman to Brahman through the Avasth\u0101traya (three-states) inquiry; not 'the self is God,' not a claim about the ego, not 'all selves are identical'", "resource": "", "tags": ["mahavakya", "ayam-atma-brahma", "mandukya", "upanishad", "advaita", "atman", "brahman", "turiya"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/brahmabhavana", "label": "Brahmabh\u0101van\u0101", "type": "Concept", "description": "The active cultivation of Brahman-identity \u2014 the deliberate orienting of awareness toward 'I am Brahman' as the operative recognition during Nididhy\u0101sana; the phase of practice that dissolves Vipar\u012bta-bh\u0101van\u0101 (contrary-to-knowledge habituation) by repeated, sustained Brahman-identification; not affirmation, not positive thinking, not autosuggestion, not self-hypnosis", "resource": "", "tags": ["brahmabhavana", "nididhyasana", "viparita-bhavana", "advaita", "jnana", "identity", "practice"], "color": "#f59e0b", "size": 53}}, {"data": {"id": "concepts/jagrat", "label": "J\u0101grat", "type": "Concept", "description": "The waking state \u2014 one of the three states (Avasth\u0101traya) in the M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad's inquiry \u2014 in which the experiencer (Vi\u015bva) operates through the gross body and external senses; not privileged as 'objective reality,' not more real than Svapna from the standpoint of the inquiry", "resource": "", "tags": ["jagrat", "avastha-traya", "mandukya", "advaita", "waking", "vishva", "sthula"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/jivanmukti", "label": "J\u012bvanmukti", "type": "Concept", "description": "Liberation while living \u2014 the Advaita Ved\u0101nta position that complete liberation from Avidy\u0101 (ignorance) and its results is possible while the body still functions; the J\u012bvanmukta has recognized the non-dual nature of the \u0100tman and continues to operate in the world without being bound by it; not enlightenment in the Buddhist sense, not a permanent altered state, not moral perfection", "resource": "", "tags": ["jivanmukti", "liberation", "advaita", "jnana", "videhamukti", "moksha", "mukta"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/laksana-brahman", "label": "Lak\u1e63a\u1e47a (Brahman)", "type": "Concept", "description": "Indicator / pointer \u2014 the Ved\u0101ntic distinction between Svar\u016bpa Lak\u1e63a\u1e47a (own-nature indicator, pointing to Brahman's essential nature) and Ta\u1e6dastha Lak\u1e63a\u1e47a (accidental indicator, pointing to Brahman through a contingent relation like being the cause of the world); not Aristotelian essential vs. accidental properties; the distinction governs how the Mah\u0101v\u0101kyas are to be interpreted", "resource": "", "tags": ["laksana", "svarupa-laksana", "tathastha-laksana", "brahman", "definition", "advaita", "mahavakya"], "color": "#f59e0b", "size": 54}}, {"data": {"id": "concepts/mahavakya", "label": "Mah\u0101v\u0101kya", "type": "Concept", "description": "The four 'great sayings' of the Upani\u1e63ads \u2014 direct realization-statements, each drawn from one of the four Vedas, that the prepared student recognizes as a disclosure of their own non-dual nature; not theological axioms, sacred formulas, or propositions to be believed", "resource": "", "tags": ["mahavakya", "upanishad", "advaita", "nondual", "realization", "pramana", "shabda"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/manana", "label": "Manana", "type": "Concept", "description": "The second stage of Brahma-jij\u00f1\u0101s\u0101 \u2014 sustained reflective inquiry that systematically removes doubts (sa\u1e43\u015baya) arising after \u015arava\u1e47a \u2014 the dialectical clearing of intellectual obstacles to the Upani\u1e63adic teaching; not meditation, not memorization, not contemplation in the popular sense", "resource": "", "tags": ["manana", "shravana", "nididhyasana", "doubt", "vichara", "advaita", "brahma-jijnasa"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/neti-neti", "label": "Neti Neti", "type": "Concept", "description": "The apophatic inquiry method of the B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad (2.3.6; 3.9.26; 4.2.4) \u2014 'not this, not this' \u2014 a systematic via negativa that removes all conditional predicates from Brahman until what cannot be negated remains; not nihilism, not skepticism, not Western theological apophasis", "resource": "", "tags": ["neti-neti", "apophasis", "brahman", "viveka", "advaita", "inquiry", "brhadaranyaka"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/nididhyasana", "label": "Nididhy\u0101sana", "type": "Concept", "description": "The third stage of Brahma-jij\u00f1\u0101s\u0101 \u2014 deep, sustained internalization of the Mah\u0101v\u0101kya's recognition until contrary-to-knowledge sa\u1e43sk\u0101ras are dissolved and the knowledge becomes unobstructed; not concentration, not visualization, not dhy\u0101na in the Yoga-dar\u015bana sense", "resource": "", "tags": ["nididhyasana", "shravana", "manana", "samskara", "advaita", "jivanmukti", "brahma-jijnasa"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/nirguna-brahman", "label": "Nirgu\u1e47a Brahman", "type": "Concept", "description": "Brahman without attributes \u2014 Brahman as it is in itself, prior to all relational description, not characterized by any quality, not an object of experience, not the negation of Sagu\u1e47a Brahman \u2014 the P\u0101ram\u0101rthika (ultimate) description of the one non-dual reality that the Mah\u0101v\u0101kyas point to", "resource": "", "tags": ["nirguna-brahman", "advaita", "pararmartha", "brahman", "neti-neti", "mahavakya", "saguna-brahman"], "color": "#f59e0b", "size": 51}}, {"data": {"id": "concepts/pancha-kosha", "label": "Pa\u00f1cako\u015ba", "type": "Concept", "description": "The five sheaths \u2014 the Taittir\u012bya Upani\u1e63ad's model of the apparent layers of the individual, from the physical body through food, breath, mind, intellect, and bliss \u2014 used in Ved\u0101ntic inquiry as a systematic framework for identifying what the \u0100tman is not; not a layered anatomy of the soul, not the \u0100tman in five modes, not a hierarchy of better-selves", "resource": "", "tags": ["pancha-kosha", "taittiriya", "advaita", "neti-neti", "anatman", "upadhi", "annamaya", "pranamaya", "manomaya", "vijnanamaya", "anandamaya"], "color": "#f59e0b", "size": 51}}, {"data": {"id": "concepts/prajnanam-brahma", "label": "Praj\u00f1\u0101nam Brahma", "type": "Concept", "description": "The \u1e5agvedic Mah\u0101v\u0101kya from Aitareya Upani\u1e63ad 3.3 \u2014 'Consciousness is Brahman' \u2014 a definition-statement that identifies Brahman through its intrinsic nature (Svar\u016bpa Lak\u1e63a\u1e47a) as consciousness; not 'intelligence is omniscient,' not idealism, not a description of Brahman as an object", "resource": "", "tags": ["mahavakya", "prajnanam-brahma", "upanishad", "advaita", "consciousness", "brahman", "svarupa-laksana"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/saguna-brahman", "label": "Sagu\u1e47a Brahman", "type": "Concept", "description": "Brahman as approached through qualities and attributes \u2014 the form of Brahman known as \u012a\u015bvara (the Lord) \u2014 worshipped, invoked, and related to through devotion, prayer, and cosmological attribution; not a lower form of Brahman, not a lesser God, not in conflict with Nirgu\u1e47a Brahman (deferred from v0.4 bhakti-marga)", "resource": "", "tags": ["saguna-brahman", "ishvara", "advaita", "vishishtadvaita", "maya", "upakhi", "vyavaharika", "bhakti"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/sakshin", "label": "S\u0101k\u1e63in", "type": "Concept", "description": "The witness consciousness \u2014 the self-luminous, uninvolved, permanent awareness in which all experience (thoughts, perceptions, states) appears as an object; the functional expression of Tur\u012bya in the presence of the three states; not the observer, not the ego watching itself, not a meditator, not introspection", "resource": "", "tags": ["sakshin", "witness", "consciousness", "advaita", "turiya", "atman", "self-luminous", "inquiry"], "color": "#f59e0b", "size": 51}}, {"data": {"id": "concepts/sat-chit-ananda", "label": "Sat-Cit-\u0100nanda", "type": "Concept", "description": "Being-Consciousness-Bliss \u2014 the threefold Svar\u016bpa Lak\u1e63a\u1e47a (own-nature indicator) of Brahman/\u0100tman; not three properties Brahman 'has' but what Brahman IS; not a compound noun for a state of experience; each term is non-different from Brahman and from each other", "resource": "", "tags": ["sat-chit-ananda", "brahman", "atman", "svarupa-laksana", "being", "consciousness", "bliss", "advaita"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/shravana", "label": "\u015arava\u1e47a", "type": "Concept", "description": "The first stage of Brahma-jij\u00f1\u0101s\u0101 \u2014 formal, receptive hearing of the Upani\u1e63adic teaching from a qualified Guru \u2014 the pram\u0101\u1e47a-event in which \u015aabda (verbal testimony) delivers direct Brahma-j\u00f1\u0101na; not listening, not studying, not reading, not exposure to content", "resource": "", "tags": ["shravana", "manana", "nididhyasana", "pramana", "shabda", "guru", "brahma-jijnasa", "advaita"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/sushupti", "label": "Su\u1e63upti", "type": "Concept", "description": "The deep dreamless sleep state \u2014 the third of the three states (Avasth\u0101traya) \u2014 in which the experiencer (Pr\u0101j\u00f1a) rests in undifferentiated bliss without any object-awareness; not unconsciousness, not anesthesia, not a state of ignorance \u2014 the nearest natural approximation to non-dual experience available to the ordinary person", "resource": "", "tags": ["sushupti", "avastha-traya", "mandukya", "advaita", "deep-sleep", "prajna", "ananda", "witness"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/svapna", "label": "Svapna", "type": "Concept", "description": "The dream state \u2014 the second of the three states (Avasth\u0101traya) \u2014 in which the experiencer (Taijasa) creates and experiences subtle objects through the subtle body alone; fully real within its own domain (Pr\u0101tibh\u0101sika); not mere illusion, not the unconscious, not a lesser reality than waking", "resource": "", "tags": ["svapna", "avastha-traya", "mandukya", "advaita", "dream", "taijasa", "pratibhasika"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/tat-tvam-asi", "label": "Tat Tvam Asi", "type": "Concept", "description": "The S\u0101mavedic Mah\u0101v\u0101kya from Ch\u0101ndogya 6.8.7 \u2014 'That thou art' \u2014 a second-person realization-statement in which Brahman (Tat) and the student's innermost self (Tvam) are declared identical; not 'you are the universe,' not panentheism, not a divine spark doctrine", "resource": "", "tags": ["mahavakya", "tat-tvam-asi", "upanishad", "advaita", "identity", "laksana", "chandogya"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/turiya", "label": "Tur\u012bya", "type": "Concept", "description": "The fourth \u2014 not a fourth experiential state alongside J\u0101grat, Svapna, and Su\u1e63upti, but the ever-present witnessing ground in which all three -brahman", "source": "concepts/tat-tvam-asi", "target": "concepts/laksana-brahman"}}, {"data": {"id": "concepts/tat-tvam-asi__concepts/nirguna-brahman", "source": "concepts/tat-tvam-asi", "target": "concepts/nirguna-brahman"}}, {"data": {"id": "concepts/tat-tvam-asi__concepts/shravana", "source": "concepts/tat-tvam-asi", "target": "concepts/shravana"}}, {"data": {"id": "concepts/turiya__concepts/avastha-traya", "source": "concepts/turiya", "target": "concepts/avastha-traya"}}, {"data": {"id": "concepts/turiya__concepts/sakshin", "source": "concepts/turiya", "target": "concepts/sakshin"}}, {"data": {"id": "concepts/turiya__concepts/jagrat", "source": "concepts/turiya", "target": "concepts/jagrat"}}, {"data": {"id": "concepts/turiya__concepts/svapna", "source": "concepts/turiya", "target": "concepts/svapna"}}, {"data": {"id": "concepts/turiya__concepts/sushupti", "source": "concepts/turiya", "target": "concepts/sushupti"}}, {"data": {"id": "concepts/turiya__concepts/ayam-atma-brahma", "source": "concepts/turiya", "target": "concepts/ayam-atma-brahma"}}, {"data": {"id": "concepts/turiya__concepts/jivanmukti", "source": "concepts/turiya", "target": "concepts/jivanmukti"}}, {"data": {"id": "concepts/upadhi__concepts/pancha-kosha", "source": "concepts/upadhi", "target": "concepts/pancha-kosha"}}, {"data": {"id": "concepts/upadhi__concepts/saguna-brahman", "source": "concepts/upadhi", "target": "concepts/saguna-brahman"}}, {"data": {"id": "concepts/upadhi__concepts/nirguna-brahman", "source": "concepts/upadhi", "target": "concepts/nirguna-brahman"}}, {"data": {"id": "concepts/upadhi__concepts/sakshin", "source": "concepts/upadhi", "target": "concepts/sakshin"}}, {"data": {"id": "concepts/upadhi__concepts/jivanmukti", "source": "concepts/upadhi", "target": "concepts/jivanmukti"}}, {"data": {"id": "concepts/videhamukti__concepts/jivanmukti", "source": "concepts/videhamukti", "target": "concepts/jivanmukti"}}, {"data": {"id": "concepts/videhamukti__concepts/upadhi", "source": "concepts/videhamukti", "target": "concepts/upadhi"}}, {"data": {"id": "concepts/videhamukti__concepts/brahmabhavana", "source": "concepts/videhamukti", "target": "concepts/brahmabhavana"}}, {"data": {"id": "concepts/videhamukti__concepts/turiya", "source": "concepts/videhamukti", "target": "concepts/turiya"}}], "bodies": {"concepts/aham-brahmasmi": "# Aha\u1e43 Brahm\u0101smi \u2014 \u0905\u0939\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0938\u094d\u092e\u093f\n\n**Not:** \"I am God,\" pantheism, cosmic self-identification, affirmation or mantra\n\n## Etymology and Source\n\nAham (\u0905\u0939\u092e\u094d) = I; Brahma (\u092c\u094d\u0930\u0939\u094d\u092e) = Brahman; asmi (\u0905\u0938\u094d\u092e\u093f) = am (first-person singular of the root *as*, to be).\n\nThe statement appears in B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 1.4.10, in the context of Praj\u0101pati's recognition. The verse reads: *aham brahm\u0101smi iti* \u2014 \"I am Brahman, thus.\" The demonstrative *iti* marks the statement as an utterance recognized, not merely reported.\n\n## What \"I\" Refers To\n\nThe critical interpretive move is the referent of \"Aham.\" In ordinary usage, \"I\" refers to the ego \u2014 the body-mind complex, the personality, the bundle of memories and desires. In the Mah\u0101v\u0101kya context, \"Aham\" is re-pointed by the Guru's teaching toward the witness awareness (S\u0101k\u1e63in) that the ego appears within.\n\nThis is not metaphorical. Ved\u0101nta's epistemological claim (developed in the vedanta-epistemology bundle, v0.3) is that the S\u0101k\u1e63in is the only locus of self-luminosity \u2014 the only thing that does not depend on something else to be known. When \"Aham\" in the Mah\u0101v\u0101kya is understood correctly, it refers to this self-luminous awareness, not to any object (including the subtle body or intellect).\n\n## What \"Brahman\" Refers To\n\nIn the B\u1e5bhad\u0101ra\u1e47yaka context, Brahman is the ground of all existence \u2014 self-existent, without limit (ananta), without qualification (nirgu\u1e47a at the level of Ta\u1e6dastha Lak\u1e63a\u1e47a; Sat-Chit-\u0100nanda at the level of Svar\u016bpa Lak\u1e63a\u1e47a). The statement asserts that this ground and the witness awareness the student takes to be \"I\" are identical \u2014 not similar, not related, not causally connected, but identical (abheda).\n\n## Why This Does Not Mean Pantheism\n\nPantheism identifies God with the sum total of the world. Aha\u1e43 Brahm\u0101smi points in the opposite direction: the apparent world (Jagat) is understood through M\u0101y\u0101 as an apparent modification of Brahman \u2014 but Brahman itself does not become the world any more than a rope becomes the snake that is superimposed on it. The non-dual recognition is from the side of Brahman (= \u0100tman), not from the side of the universe being declared sacred.\n\n## The Role in Practice\n\nAha\u1e43 Brahm\u0101smi is received in \u015arava\u1e47a, tested through Manana, and internalized through Nididhy\u0101sana. The Vivekac\u016b\u1e0d\u0101ma\u1e47i treats it as the recognition-statement through which the student breaks the identification with the body-mind (*deha-\u0101tma-bh\u0101van\u0101*). The liberated person (J\u012bvanmukta) abides in the recognition Aha\u1e43 Brahm\u0101smi not as a thought to be maintained but as a recognition that has become unobstructed.\n\n## Audience Metaphor\n\nImagine someone who has forgotten their name due to amnesia and has been calling themselves by a borrowed identity for years. When their real name is spoken by someone who knows them, there is not a new piece of information received \u2014 there is a recognition of what was always true. Aha\u1e43 Brahm\u0101smi is that naming \u2014 not information about you, but the restoration of recognition.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 1.4.10 \u2014 source text; \u015aa\u1e45kara's Bh\u0101\u1e63ya; see [references/brhadaranyaka-upanishad.md]\n2. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 254\u2013255 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Mah\u0101v\u0101kya schema and the identity of \u0100tman and Brahman; see [references/vivekachudamani.md]\n3. Upadesas\u0101hasr\u012b 2.1 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 direct inquiry into the \"I\" referent; see [references/upadesasahasri.md]", "concepts/anandamaya-kosha": "# \u0100nandamaya Ko\u015ba \u2014 \u0906\u0928\u0928\u094d\u0926\u092e\u092f \u0915\u094b\u0936\n\n**Not:** the \u0100tman, Brahman's intrinsic \u0100nanda, the causal body as higher self\n\n## Etymology\n\n\u0100nanda (\u0906\u0928\u0928\u094d\u0926) = bliss, joy; maya (\u092e\u092f) = made of, full of, permeated by; Ko\u015ba (\u0915\u094b\u0936) = sheath, layer, envelope. The bliss-permeated sheath \u2014 the layer of apparent selfhood permeated by bliss, experienced primarily in deep sleep and in states of deep meditative absorption.\n\n## Source and Structure\n\nTaittir\u012bya Upani\u1e63ad 2.5 describes the \u0100nandamaya Ko\u015ba as the fifth and innermost sheath. The text assigns it a structure: Priya (delight) as its head, Moda (joy) as its right wing, Pramoda (great joy) as its left wing, \u0100nanda (bliss) as its body, and Brahman as its tail (puccha) \u2014 the support that the sheath rests on.\n\nThe \"tail = Brahman\" detail is significant: the Taittir\u012bya places Brahman not inside the \u0100nandamaya Ko\u015ba but as its supporting ground \u2014 distinct from the sheath, supporting it without being identical with it.\n\n## Why the \u0100nandamaya Ko\u015ba Is Not the \u0100tman\n\nVivekac\u016b\u1e0d\u0101ma\u1e47i (vv. 218\u2013230) argues this point systematically:\n\n1. **It is a modification (Vik\u0101ra)**: The \u0100nandamaya Ko\u015ba is produced by Avidy\u0101 \u2014 it arises and subsides. Whatever arises and subsides is in the domain of the Vy\u0101vah\u0101rika, not the P\u0101ram\u0101rthika.\n\n2. **It is experienced as an object**: In Su\u1e63upti, the bliss of the \u0100nandamaya Ko\u015ba is experienced. The S\u0101k\u1e63in (witness) of Su\u1e63upti's bliss is not that bliss \u2014 it is what knows the bliss. An experienced object cannot be the subject of experience.\n\n3. **It is associated with Karma**: The \u0100nandamaya Ko\u015ba (= K\u0101ra\u1e47a \u015aar\u012bra) is the storehouse of Sa\u1e43sk\u0101ras \u2014 the causal material of future bodies and experiences. The \u0100tman has no Karma and accumulates no Sa\u1e43sk\u0101ras.\n\n4. **It is conditioned by states**: The \u0100nandamaya Ko\u015ba is most accessible in Su\u1e63upti and in Sam\u0101dhi. The \u0100tman is present in all three states without modification.\n\n## The Su\u1e63upti Connection\n\nThe \u0100nandamaya Ko\u015ba is the vehicle of the Pr\u0101j\u00f1a experiencer in Su\u1e63upti. When the gross and subtle bodies are at rest in deep sleep, what remains active is the causal body \u2014 and the Pr\u0101j\u00f1a experiences the undifferentiated bliss of the \u0100nandamaya Ko\u015ba. The retrospective report (\"I slept well and was happy\") refers to this bliss.\n\nAdvaita uses this to make a double point: (1) the \u0100nandamaya Ko\u015ba is real \u2014 its bliss is real \u2014 but (2) the S\u0101k\u1e63in that witnesses even this bliss is the \u0100tman, which is not the \u0100nandamaya Ko\u015ba.\n\n## The Practical Edge: Avoiding the Sam\u0101dhi Error\n\nThe \u0100nandamaya Ko\u015ba is the concept that corrects the error of treating Sam\u0101dhi (deep meditative absorption) as liberation. In high states of Sam\u0101dhi, the practitioner may experience an overwhelming \u0100nanda \u2014 formless, undifferentiated, beyond all objects. If the \u0100nandamaya Ko\u015ba is mistaken for the \u0100tman, this state appears to be liberation. But it is still a state \u2014 it arises and passes. Liberation (J\u012bvanmukti) is the recognition of the \u0100tman that persists through the coming and going of the Sam\u0101dhi state.\n\n## Audience Metaphor\n\nA jeweler searches for a diamond inside five concentric boxes. The innermost box (the fifth, \u0100nandamaya) is made of the finest material \u2014 nearly transparent, almost glowing. Seeing it, one might think: \"Surely the diamond is in THIS box.\" But opening it, one finds only the finest material of the box \u2014 and the realization that the diamond was never in any box. The boxes were always only boxes; the diamond was never contained. The \u0100nandamaya Ko\u015ba's near-transparency to consciousness makes it the most compelling candidate for the \u0100tman \u2014 and therefore the most carefully discarded.\n\n## Citations\n\n1. Taittir\u012bya Upani\u1e63ad 2.5 \u2014 \u0100nandamaya Ko\u015ba as the fifth sheath; see [references/taittiriya-upanishad.md]\n2. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 218\u2013230 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 systematic rejection of \u0100nandamaya Ko\u015ba as \u0100tman; see [references/vivekachudamani.md]\n3. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 5 \u2014 Pr\u0101j\u00f1a and the \u0100nandamaya in Su\u1e63upti; see [references/mandukya-upanishad.md]\n4. Pa\u00f1cada\u015b\u012b 3.15\u201325 (Vidy\u0101ra\u1e47ya) \u2014 the causal body as Up\u0101dhi; see [references/panchadashi.md]", "concepts/antaryamin": "# Antary\u0101min \u2014 \u0905\u0928\u094d\u0924\u0930\u094d\u092f\u093e\u092e\u093f\u0928\u094d\n\n**Not:** conscience, Holy Spirit, soul residing inside the body\n\n## Etymology\n\nAntar (\u0905\u0928\u094d\u0924\u0930\u094d) = within, inner, between; y\u0101min (\u092f\u093e\u092e\u093f\u0928\u094d) = controller, ruler (from yam, to control, to govern). Antary\u0101min = the inner controller. The term names Brahman in its governing function: not a ruler from outside, but the ruling principle dwelling within the very structure of what is ruled.\n\n## The B\u1e5bhad\u0101ra\u1e47yaka Passage\n\nB\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 3.7 records Y\u0101j\u00f1avalkya teaching Udd\u0101laka \u0100ru\u1e47i. Y\u0101j\u00f1avalkya applies a single formula to eighteen entities (earth, water, fire, air, sky, sun, moon, directions, moon, darkness, space, the eye, the ear, the mind, speech, breath, and the \u0100tman itself):\n\n> *Yo p\u1e5bthivy\u0101\u1e43 ti\u1e63\u1e6dhan p\u1e5bthivy\u0101 antaro ya\u1e43 p\u1e5bthiv\u012b na veda yasya p\u1e5bthiv\u012b \u015bar\u012bram ya p\u1e5bthiv\u012bm antaro yamayati sa ta \u0101tm\u0101ntary\u0101myam\u1e5bta\u1e25* \u2014 \"He who dwells in the earth, who is within the earth, whom the earth does not know, whose body the earth is, who controls the earth from within \u2014 he is your \u0100tman, the inner ruler, the immortal.\"\n\nThe triple formula is: (1) dwells within, (2) not known to what it dwells in, (3) controls from within and constitutes the \u0100tman. This formula is applied without exception to every element and faculty. The Antary\u0101min is not more accessible to the mind than to the earth \u2014 the mind does not know its own Antary\u0101min any better than the earth knows its.\n\n## The Advaita Reading: Antary\u0101min = S\u0101k\u1e63in = Nirgu\u1e47a Brahman\n\n\u015aa\u1e45kara reads the Antary\u0101min passage as pointing directly to the S\u0101k\u1e63in (the witness consciousness described in Pa\u00f1cada\u015b\u012b and Vivekac\u016b\u1e0d\u0101ma\u1e47i). The phrase \"whom the mind does not know\" is decisive: the Antary\u0101min is not an object of the mind's knowing \u2014 it is the witness of the mind. The conclusion of the passage (\"this is your \u0100tman, the inner ruler, the immortal\") is not a different conclusion for each entity; there is one Antary\u0101min, one \u0100tman.\n\nOn this reading, Antary\u0101min is the same as Nirgu\u1e47a Brahman approached from the angle of immanence. The Sagu\u1e47a/Nirgu\u1e47a distinction is an epistemological one \u2014 when Brahman is described in its governing relation to entities, it is called Antary\u0101min (Sagu\u1e47a); when it is described in itself, it is Nirgu\u1e47a.\n\n## The Vi\u015bi\u1e63\u1e6d\u0101dvaita Reading: Antary\u0101min as the Body-Soul Structure\n\nR\u0101m\u0101nuja reads the passage as establishing his central doctrine: Brahman has the entire universe (souls and matter) as its body (\u015bar\u012bra), and is the inner soul (antary\u0101min) of that body. The passage's formula \u2014 \"whose body the earth is\" \u2014 is precisely the body-soul (\u015bar\u012bra-\u015bar\u012brin) relation that constitutes Vi\u015bi\u1e63\u1e6d\u0101dvaita's metaphysics. For R\u0101m\u0101nuja, the Antary\u0101min is Sagu\u1e47a Brahman (\u012a\u015bvara) who is the \u0100tman of every individual J\u012bva.\n\nThe two readings diverge on whether \"your \u0100tman\" in the conclusion means the J\u012bva's individual \u0100tman (which is identical with Nirgu\u1e47a Brahman in Advaita) or the universal \u012a\u015bvara who is the \u0100tman of each J\u012bva (as in Vi\u015bi\u1e63\u1e6d\u0101dvaita).\n\n## Practical Significance for Inquiry\n\nThe Antary\u0101min teaching resolves a potential misreading of the Mah\u0101v\u0101kya inquiry: if one hears \"Aham Brahm\u0101smi\" and thinks of Brahman as a distant, cosmic reality that must be reached, the Antary\u0101min teaching corrects this. Brahman is not far. It is already the inner ruler of the very mind conducting the inquiry \u2014 the inquiry is Brahman investigating Brahman through the instrument of a temporarily confused J\u012bva.\n\n## Audience Metaphor\n\nAn orchestra is playing. Every instrument is making sound because of the acoustic laws that govern vibration \u2014 these laws are not separate from any instrument, not located in a particular seat, not heard as a sound in themselves, yet every sound produced depends on them entirely. If you ask any instrument what makes it sound, it has no answer \u2014 the laws are what the instrument is constituted by, not an object the instrument knows. The Antary\u0101min is those acoustic laws to the orchestra: not a player, not a conductor visible from outside, but the innermost constituting principle of every sound that arises.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 3.7.1\u201323 \u2014 the full Antary\u0101min teaching; see [references/brhadaranyaka-upanishad.md]\n2. Brahmas\u016btra Bh\u0101\u1e63ya 1.2.18\u201320 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Antary\u0101min as Brahman; see [references/brahmasutra-bhashya.md]\n3. Pa\u00f1cada\u015b\u012b 7.1\u201310 (Vidy\u0101ra\u1e47ya) \u2014 S\u0101k\u1e63in as the Antary\u0101min recognized through inquiry; see [references/panchadashi.md]", "concepts/avastha-traya": "# Avasth\u0101traya \u2014 \u0905\u0935\u0938\u094d\u0925\u093e\u0924\u094d\u0930\u092f\n\n**Not:** hierarchy of consciousness, spiritual stages, sequential path to liberation\n\n## Etymology\n\nAvasth\u0101 (\u0905\u0935\u0938\u094d\u0925\u093e) = state, condition, situation; from ava + sth\u0101 (to stand in a position). Traya (\u0924\u094d\u0930\u092f) = three, triad. Avasth\u0101traya = the triad of states.\n\n## The M\u0101\u1e47\u1e0d\u016bkya's Method\n\nThe M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad opens (1.2) with the Mah\u0101v\u0101kya \"Ayam \u0100tm\u0101 Brahma\" and then immediately proceeds to establish the triad as the field of inquiry: \"All this (sarvam) is Brahman (om iti eva dhy\u0101yita). The \u0100tman is fourfold: J\u0101grat, Svapna, Su\u1e63upti \u2014 and the fourth (Tur\u012bya)\" (M\u0101\u1e47\u1e0d\u016bkya 2\u20137, summary).\n\nThe pedagogical logic: if \u0100tman = Brahman, then the student needs a method for locating \u0100tman. The three states provide the most accessible laboratory: every human being passes through waking, dream, and deep sleep repeatedly and can confirm the description from personal experience.\n\n## What Changes Across the Three States\n\n| State | Experiencer | Field | Instrument |\n|-------|-------------|-------|------------|\n| J\u0101grat (waking) | Vi\u015bva | Gross (Sth\u016bla) objects | Gross body |\n| Svapna (dream) | Taijasa | Subtle (S\u016bk\u1e63ma) objects | Subtle body |\n| Su\u1e63upti (deep sleep) | Pr\u0101j\u00f1a | No objects | Causal body (bliss) |\n\nThe experiencer-identity, the field, and the instrument of experience all change across the three states. What does not change? The witness (S\u0101k\u1e63in). In waking, there is an awareness of waking-objects. In dream, there is an awareness of dream-objects. In deep sleep, there is awareness of the absence of objects (which is how one knows deep sleep occurred \u2014 the awareness of rest). The awareness itself is constant.\n\n## The Inquiry\n\nThe three-states analysis is a form of Neti Neti applied to experience: the \u0100tman is not the waking self (it is present in dream and deep sleep when the waking self is absent). The \u0100tman is not the dream self (it is present in waking when the dream self is absent). The \u0100tman is not the deep-sleep experience (it is present in waking and dream when deep sleep's bliss is absent). What remains after negating all three state-identities is Tur\u012bya \u2014 the unchanging witness.\n\n## The Exhaustiveness of the Triad\n\nA key philosophical claim of the M\u0101\u1e47\u1e0d\u016bkya is that the three states constitute all possible experience. There is no fourth domain of ordinary experience not covered by waking, dream, or deep sleep. This exhaustiveness makes the inquiry conclusive: if the S\u0101k\u1e63in can be shown to persist through all three states, it is established as the constant, and the Mah\u0101v\u0101kya \"Ayam \u0100tm\u0101 Brahma\" can be received with complete epistemic grounding.\n\n## Audience Metaphor\n\nA detective needs to establish a suspect's alibi. They check all three possible locations \u2014 home, office, restaurant. The suspect was not the home-person (the home-person left). Not the office-person (the office-person arrived later). Not the restaurant-person (the restaurant-person was with others). Who then was present throughout? The investigation locates the constant: the one who connected all three accounts. Avasth\u0101traya is that investigation \u2014 and Tur\u012bya is the constant it reveals.\n\n## Citations\n\n1. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 2\u20137 \u2014 source text for the three states and Tur\u012bya; see [references/mandukya-upanishad.md]\n2. M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 1.1\u201316 (Gau\u1e0dap\u0101da) \u2014 Avasth\u0101traya as the laboratory of Aj\u0101tiv\u0101da inquiry; see [references/mandukya-karika.md]\n3. Pa\u00f1cada\u015b\u012b 1.1\u201315 (Vidy\u0101ra\u1e47ya) \u2014 three-states analysis as a method of witness-identification; see [references/panchadashi.md]", "concepts/ayam-atma-brahma": "# Ayam \u0100tm\u0101 Brahma \u2014 \u0905\u092f\u092e\u094d \u0906\u0924\u094d\u092e\u093e \u092c\u094d\u0930\u0939\u094d\u092e\n\n**Not:** \"the self is God,\" identification of multiple selves, distant Brahman\n\n## Source and Context\n\nAyam \u0100tm\u0101 Brahma is the opening statement of the M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad (verse 1.2, following the invocation). The M\u0101\u1e47\u1e0d\u016bkya is the shortest Upani\u1e63ad \u2014 12 verses \u2014 and the most compressed philosophical statement in the Upani\u1e63adic corpus. Gau\u1e0dap\u0101da's M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 (\u0100gama\u015b\u0101stra) expands it into 215 verses; \u015aa\u1e45kara comments on both.\n\nAyam (\u0905\u092f\u092e\u094d) = this, here, nearest demonstrative; \u0100tm\u0101 (\u0906\u0924\u094d\u092e\u093e) = self; Brahma (\u092c\u094d\u0930\u0939\u094d\u092e) = Brahman.\n\nThe M\u0101\u1e47\u1e0d\u016bkya is the Atharvaveda's contribution to the Mah\u0101v\u0101kya schema. Its teaching is structured around the Avasth\u0101traya (three states) and the fourth (Tur\u012bya) \u2014 a framework for locating the \u0100tman through the direct inquiry \"Who is the constant witness of waking, dream, and deep sleep?\"\n\n## The Grammar of \"Ayam\"\n\nThe selection of the nearest demonstrative pronoun (\"this\") rather than a distant one (\"that\") or an anaphoric one (\"he/it\") is the signature of this Mah\u0101v\u0101kya. Where Tat Tvam Asi points from \"that (Brahman)\" to \"thou (\u0100tman),\" Ayam \u0100tm\u0101 Brahma points from \"this (\u0100tman, right here, immediately accessible)\" to Brahman \u2014 collapsing the apparent distance between the seeker and the sought.\n\nThis has a practical implication: the M\u0101\u1e47\u1e0d\u016bkya teaching does not ask the student to reach for Brahman; it asks the student to look at what is most obvious and immediate. The \u0100tman being pointed to is not found by turning away from experience \u2014 it is the witness of experience itself.\n\n## The Three-States Laboratory\n\nThe M\u0101\u1e47\u1e0d\u016bkya proceeds immediately (verses 3\u20137) to analyze J\u0101grat (waking), Svapna (dream), and Su\u1e63upti (deep sleep), showing that in each state the experiencer-function changes (Vi\u015bva, Taijasa, Pr\u0101j\u00f1a) but the witness does not. Tur\u012bya is then introduced in verse 7 as \"the fourth\" \u2014 not a fourth state, but the unchanging witness that underlies all three.\n\nAyam \u0100tm\u0101 Brahma, when read in this context, becomes: \"this \u2014 the Tur\u012bya, the unchanging witness you have just been shown to be \u2014 is Brahman.\" The three-states inquiry is the evidence-gathering stage; the Mah\u0101v\u0101kya is the recognition-statement at its conclusion.\n\n## Connection to Gau\u1e0dap\u0101da's Aj\u0101tiv\u0101da\n\nGau\u1e0dap\u0101da's M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 develops the implication of this Mah\u0101v\u0101kya into the doctrine of Aj\u0101tiv\u0101da (the non-arising of duality): if \u0100tman is Brahman and Brahman is without birth, modification, or death, then the apparent arising of J\u012bvas and Jagat (world) is a superimposition with no ultimate status. \u015aa\u1e45kara accepts Aj\u0101tiv\u0101da as a valid description of the absolute level (P\u0101ram\u0101rthika) while retaining the two-truth framework (vyavah\u0101rika / p\u0101ram\u0101rthika) for pedagogical purposes.\n\n## Distinctive Among the Four Mah\u0101v\u0101kyas\n\nAyam \u0100tm\u0101 Brahma is the most structurally embedded of the four \u2014 it cannot be understood in isolation from the M\u0101\u1e47\u1e0d\u016bkya's four-states teaching. It is the culminating Mah\u0101v\u0101kya in the sequence of inquiry: only after the Avasth\u0101traya analysis reveals the witness (Tur\u012bya) does \"this self is Brahman\" point to something the student can recognize rather than merely hear.\n\n## Audience Metaphor\n\nA student searches the entire library for a book, not realizing it is in their hand. When someone says \"the book is what you're holding,\" the student stops searching. The \"Ayam\" \u2014 \"this, right here\" \u2014 is that gesture. Brahman is not at the end of a search; it is the one who has been searching all along.\n\n## Citations\n\n1. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 1.2 \u2014 source text; see [references/mandukya-upanishad.md]\n2. M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 (Gau\u1e0dap\u0101da) 1.1\u20132 \u2014 Aj\u0101tiv\u0101da and the four states; see [references/mandukya-karika.md]\n3. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 257\u2013258 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Mah\u0101v\u0101kya schema; see [references/vivekachudamani.md]", "concepts/brahmabhavana": "# Brahmabh\u0101van\u0101 \u2014 \u092c\u094d\u0930\u0939\u094d\u092e\u092d\u093e\u0935\u0928\u093e\n\n**Not:** affirmation, autosuggestion, object-meditation, Up\u0101san\u0101 on qualified Brahman\n\n## Etymology\n\nBrahma (\u092c\u094d\u0930\u0939\u094d\u092e) = Brahman; bh\u0101van\u0101 (\u092d\u093e\u0935\u0928\u093e) from bh\u0101vaya (to cause to become, to cultivate, to stabilize) from the root *bh\u016b* (to become, to be). Brahmabh\u0101van\u0101 = the cultivation or stabilization of Brahman-identity. The term emphasizes not a state to be reached but a recognition to be stabilized.\n\n## The Problem Brahmabh\u0101van\u0101 Addresses\n\nAfter \u015arava\u1e47a (hearing) and Manana (reflective confirmation), the student has valid knowledge \u2014 Brahma-j\u00f1\u0101na \u2014 established as pram\u0101 (correct cognition). The doubt is cleared; the logical objections are resolved; the teaching is accepted as true. And yet: the habituated sense of being a limited, mortal, individual J\u012bva \u2014 built over lifetimes of Sa\u1e43sk\u0101ras \u2014 continues to assert itself. This is Vipar\u012bta-bh\u0101van\u0101: the counter-knowledge habituation.\n\nVipar\u012bta-bh\u0101van\u0101 is not doubt (which Manana addressed). It is the persistence of the old identity as a felt reality even after the new recognition is intellectually established. A person who learns they are standing on perfectly solid ground may still feel vertigo from a previous experience. The vertigo is not a new doubt about the ground's solidity; it is the persistence of the prior sensory-identity. Brahmabh\u0101van\u0101 addresses this persistence.\n\n## The Mechanism\n\nNididhy\u0101sana (see nididhyasana.md) is the sustained practice that dissolves Vipar\u012bta-bh\u0101van\u0101. Brahmabh\u0101van\u0101 names the active dimension of Nididhy\u0101sana \u2014 what the student is actively doing:\n\n1. **Recognizing** the S\u0101k\u1e63in (witness) as the actual referent of \"I\"\n2. **Returning** when the J\u012bva-identity reasserts itself \u2014 not with self-criticism but with the same recognition\n3. **Allowing** the Brahman-recognition to become the default background rather than a special achievement\n\nThe returning is not a performance of identity but a removal of performance. The J\u012bva-identity is what has been performed (constructed, habituated, reinforced). Brahmabh\u0101van\u0101 is the practice of stopping that performance by continually recognizing what was already there before the performance began.\n\n## Bhagavad G\u012bt\u0101's Contribution\n\nThe G\u012bt\u0101 (18.37) states: *yat tad agre vi\u1e63am iva pari\u1e47\u0101me am\u1e5btopamam* \u2014 \"that which at first is like poison [but] in transformation is like nectar.\" Brahmabh\u0101van\u0101 can initially feel like effort \u2014 the J\u012bva-identity reasserts itself, and the student must again recognize the S\u0101k\u1e63in. Over time (and through sustained Nididhy\u0101sana), the recognition becomes the natural resting state. The effort ceases not because the student masters a technique but because the Vipar\u012bta-bh\u0101van\u0101 dissolves and what remains is the spontaneous recognition of what was always the case.\n\n## Brahmabh\u0101van\u0101 vs. Up\u0101san\u0101\n\nThe distinction matters practically. Up\u0101san\u0101 on Sagu\u1e47a Brahman (Brahman with qualities) is:\n- Directed toward an object (a form, quality, or characteristic of Brahman)\n- Produces Citta-\u015buddhi and may lead to the Brahm\u0101-loka (the realm of the creator)\n- Is classified as part of the Apar\u0101vidy\u0101 (lower knowledge) in the Mu\u1e47\u1e0daka (1.1.9)\n\nBrahmabh\u0101van\u0101 as Nididhy\u0101sana is:\n- Not directed toward any object (Nirgu\u1e47a Brahman cannot be objectified)\n- Dissolves Vipar\u012bta-bh\u0101van\u0101 \u2014 the habituated J\u012bva-identity\n- Is the culminating stage of the Par\u0101vidy\u0101 (higher knowledge) path\n\n## Audience Metaphor\n\nA person who has been told all their life that they are an employee of a company discovers documentary proof that they are actually the owner \u2014 the shares were always in their name. They accept the proof intellectually. But walking into work the next morning, they still feel like an employee \u2014 they defer to management, wait for instructions, feel uncertain about decisions. This is Vipar\u012bta-bh\u0101van\u0101. Brahmabh\u0101van\u0101 is not telling themselves \"I am the owner\" repeatedly as an affirmation. It is acting from the recognition \u2014 making the decisions that owners make, exercising the authority that was always theirs, not because they are pretending but because the proof has been accepted and the habituated deference is being dissolved by acting from the real identity.\n\n## Citations\n\n1. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 360\u2013380 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Nididhy\u0101sana and the cultivation of Brahman-identity; see [references/vivekachudamani.md]\n2. Pa\u00f1cada\u015b\u012b 9.1\u201325 (Vidy\u0101ra\u1e47ya) \u2014 \u0100tma-Tattva-Viveka: the Brahmabh\u0101van\u0101 stage; see [references/panchadashi.md]\n3. Upadesas\u0101hasr\u012b 18.1\u201310 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the process of stabilizing Brahma-j\u00f1\u0101na as identity; see [references/upadesasahasri.md]\n4. Bhagavad G\u012bt\u0101 18.37 \u2014 knowledge that is initially difficult becoming natural; see [references/bhagavad-gita.md]", "concepts/jagrat": "# J\u0101grat \u2014 \u091c\u093e\u0917\u094d\u0930\u0924\u094d\n\n**Not:** objective reality, uniquely privileged state for knowledge\n\n## Source\n\nJ\u0101grat is analyzed in M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad verse 3. The experiencer in the waking state is named Vi\u015bva (\u0935\u093f\u0936\u094d\u0935) \u2014 \"the all-pervading one\" \u2014 referring to the J\u012bva in its outward orientation. J\u0101grat from the root *j\u0101g\u1e5b* \u2014 to be awake, to be vigilant.\n\n## The Waking State's Structure\n\nIn J\u0101grat, experience occurs through:\n- **Instrument**: Sth\u016bla \u015aar\u012bra (gross body) \u2014 the physical organism with its fourteen sense-and-action organs\n- **Field**: Sth\u016bla objects \u2014 gross physical objects, other persons, the external world\n- **Experiencer**: Vi\u015bva \u2014 the J\u012bva identified with the gross body\n\nThe waking state is characterized by Bahi\u1e63praj\u00f1a \u2014 \"outward consciousness\" \u2014 awareness directed toward external objects through the senses.\n\n## Why the Waking State Is Not Privileged\n\nIn ordinary experience, waking is treated as \"real\" and dream as \"mere imagination.\" The M\u0101\u1e47\u1e0d\u016bkya's point is subtler: both waking and dream share the same structure \u2014 an experiencer (Vi\u015bva or Taijasa) experiences a field of objects through an instrument (gross or subtle body). The difference is in the density and type of objects, not in the epistemological status of the experiencing-structure.\n\nThe P\u0101ram\u0101rthika critique of waking experience is that waking objects are also known only within consciousness \u2014 they are not \"outside\" consciousness any more than dream objects are. The appearance of external objects is the *Vy\u0101vah\u0101rika* level of reality \u2014 pragmatically real, useful, and conventionally valid, but not the final level from which the \u0100tman-Brahman inquiry proceeds.\n\n## J\u0101grat in the Three-States Inquiry\n\nThe inquiry uses J\u0101grat as its starting point because it is most familiar. The student is asked: \"Who are you in waking?\" \u2014 the body? (No, the body is seen in waking, therefore known by something other than itself.) The mind? (No, the mind is also known, therefore also an object.) The investigation proceeds until what cannot be objectified is located \u2014 the witness. The same analysis is then applied to Svapna and Su\u1e63upti.\n\n## Audience Metaphor\n\nA person wakes up and immediately assumes the waking-world is \"the real one.\" But they have also just returned from a dream in which they were equally certain of their experience. The M\u0101\u1e47\u1e0d\u016bkya asks: \"What if you apply the same critical scrutiny to the waking world that you now (in waking) apply to the dream?\" The uncomfortable answer is that waking objects also appear and disappear, are experienced only within consciousness, and cannot survive the Neti Neti inquiry as the permanent ground of reality.\n\n## Citations\n\n1. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 3 \u2014 J\u0101grat and Vi\u015bva; see [references/mandukya-upanishad.md]\n2. M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 1.1\u20136 (Gau\u1e0dap\u0101da) \u2014 the waking state as structurally parallel to dream; see [references/mandukya-karika.md]", "concepts/jivanmukti": "# J\u012bvanmukti \u2014 \u091c\u0940\u0935\u0928\u094d\u092e\u0941\u0915\u094d\u0924\u093f\n\n**Not:** Buddhist enlightenment, a permanent altered state, moral perfection, the same as Videhamukti\n\n## Etymology\n\nJ\u012bvan (\u091c\u0940\u0935\u0928\u094d) = while living (present participle of j\u012bv, to live); Mukti (\u092e\u0941\u0915\u094d\u0924\u093f) = liberation, release (from muc, to release). J\u012bvanmukti = liberation while living. The compound makes the Advaita claim explicit: release from Sa\u1e43s\u0101ra does not require the death of the body.\n\n## The Advaita Claim\n\nThe standard Hindu view (shared by several traditions) is that Mok\u1e63a occurs when the individual soul leaves the body and is not reborn \u2014 the cessation of Sa\u1e43s\u0101ra through the end of bodily existence. Advaita's distinctive position is stronger: because the root of bondage is Avidy\u0101 (ignorance), and Avidy\u0101 is terminated by J\u00f1\u0101na (knowledge), and J\u00f1\u0101na can arise while the body is functioning \u2014 liberation is possible before physical death.\n\nThe argument from Karma: Karma is of three types:\n- **Sa\u00f1cita Karma**: accumulated past Karma not yet ripening \u2014 burned up by J\u00f1\u0101na\n- **\u0100g\u0101min Karma**: new Karma that would have been accumulated going forward \u2014 the J\u00f1\u0101n\u012b no longer accumulates new binding Karma (because the sense of doership \u2014 Kart\u1e5btva \u2014 is dissolved)\n- **Pr\u0101rabdha Karma**: the portion of past Karma already in motion producing this body \u2014 continues until exhausted\n\nJ\u00f1\u0101na destroys Sa\u00f1cita and prevents \u0100g\u0101min. Pr\u0101rabdha continues \u2014 this is why the J\u012bvanmukta has a body and experiences the world. The body's continuation is the continuation of Pr\u0101rabdha Karma working itself out; it does not indicate incomplete liberation.\n\n## The J\u012bvanmukta's Functional Life\n\nThe Vivekac\u016b\u1e0d\u0101ma\u1e47i (vv. 428\u2013570) describes the J\u012bvanmukta's functioning:\n\n- Acts in the world without Kart\u1e5btva (sense of being the agent): \"the body acts; I do not\"\n- Experiences states (hunger, cold, emotion) through the body without bondage: Pr\u0101rabdha-driven experience without Abhim\u0101na (ego-identification)\n- Sees all beings as Brahman \u2014 not as a thought but as the operative recognition\n- Remains in Brahma-j\u00f1\u0101na regardless of the state (waking, dream, deep sleep) \u2014 Tur\u012bya is the permanent background\n\nThis is the Sthitapraj\u00f1a of the Bhagavad G\u012bt\u0101 (2.54\u201372): one whose wisdom is stable, who is not agitated by sorrow, not elated by pleasure, free from attachment, fear, and anger. The G\u012bt\u0101's Sthitapraj\u00f1a and Advaita's J\u012bvanmukta are aligned descriptions.\n\n## The Pr\u0101rabdha Question\n\nA common question: if the J\u012bvanmukta still experiences the world through Pr\u0101rabdha, is the liberation complete? Advaita's answer: yes, completely. The experience of Pr\u0101rabdha-driven states is not binding \u2014 it does not create new Karma, does not reinforce the ego-identity, does not lead to further Sa\u1e43s\u0101ra. The potter's wheel continues to spin after the potter stops adding force \u2014 but it will come to rest. The J\u012bvanmukta's body continues under Pr\u0101rabdha's momentum; liberation is complete; the wheel is already slowing.\n\n## Audience Metaphor\n\nA surgeon operates under bright lights. The lights illuminate the operating field \u2014 the surgeon sees clearly, acts precisely, responds to what is in front of them. The lights do not blind the surgeon; they enable work. But if the power is cut (death of body), the lights go out and the work ends. J\u012bvanmukti is the surgeon's clarity while the lights are on \u2014 full recognition, full functioning, no confusion about what is real. Videhamukti is when the lights go out for good: the Pr\u0101rabdha power source is exhausted, and there is no further return to operating-room conditions.\n\n## Citations\n\n1. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 428\u2013570 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the J\u012bvanmukta described; see [references/vivekachudamani.md]\n2. J\u012bvanmuktiviveka (Vidy\u0101ra\u1e47ya) \u2014 the full treatise on J\u012bvanmukti; see [references/jivanmuktiviveka.md]\n3. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 4.4.6 \u2014 the knower of Brahman becomes Brahman; see [references/brhadaranyaka-upanishad.md]\n4. Bhagavad G\u012bt\u0101 2.54\u201372 \u2014 Sthitapraj\u00f1a as the practical portrait of the J\u012bvanmukta; see [references/bhagavad-gita.md]", "concepts/laksana-brahman": "# Lak\u1e63a\u1e47a (Brahman) \u2014 \u0932\u0915\u094d\u0937\u0923\n\n**Not:** Aristotelian essential/accidental, a property of Brahman, third-person description\n\n## Etymology\n\nLak\u1e63a\u1e47a (\u0932\u0915\u094d\u0937\u0923) from lak\u1e63 (to mark, to indicate, to recognize) + suffix *-ana* (instrument). Lak\u1e63a\u1e47a = that by which something is indicated or recognized; a mark, a pointer, an indicator. In general Sanskrit grammar and epistemology, a Lak\u1e63a\u1e47a is the definition or distinguishing mark of a term. In Ved\u0101ntic epistemology, it is the indicator that directs cognition toward Brahman.\n\n## The Two Types\n\n### Ta\u1e6dastha Lak\u1e63a\u1e47a (\u0924\u091f\u0938\u094d\u0925 \u0932\u0915\u094d\u0937\u0923) \u2014 Accidental Indicator\n\nTa\u1e6dastha = standing on the bank (from ta\u1e6da, bank of a river + stha, standing). A Ta\u1e6dastha Lak\u1e63a\u1e47a is an indicator that describes something by a relation it has to something else \u2014 a contingent characteristic used for identification, not a description of the thing's own nature.\n\nExample: \"The cause of the universe\" as a pointer to Brahman. This relation \u2014 cause-of-universe \u2014 is not Brahman's own nature; it names Brahman in relation to the universe. The universe is Vy\u0101vah\u0101rika (conventional reality); the cause-relation belongs to that domain. Once the student is directed toward Brahman, this pointer must be abandoned \u2014 Brahman is not essentially or permanently the cause-of-the-universe (for on the P\u0101ram\u0101rthika level, there is no universe distinct from Brahman to be caused).\n\nUse: Ta\u1e6dastha Lak\u1e63a\u1e47a is used for the initial identification of the topic \u2014 pointing the student toward Brahman from within the conventional framework they already understand.\n\n### Svar\u016bpa Lak\u1e63a\u1e47a (\u0938\u094d\u0935\u0930\u0942\u092a \u0932\u0915\u094d\u0937\u0923) \u2014 Own-Nature Indicator\n\nSvar\u016bpa = own form, own nature (sva = own + r\u016bpa = form). A Svar\u016bpa Lak\u1e63a\u1e47a indicates what a thing IS in itself, not its contingent relations.\n\nThe primary Svar\u016bpa Lak\u1e63a\u1e47a of Brahman in the Taittir\u012bya (2.1) is: *satyam j\u00f1\u0101nam anantam brahma* \u2014 \"Brahman is being, consciousness, infinite.\" This is not a description of Brahman from the outside but an indicator of Brahman's own nature that allows recognition from within: \"I am being; I am consciousness; I am limitless.\" The Svar\u016bpa Lak\u1e63a\u1e47a is what the Mah\u0101v\u0101kyas point to \u2014 it functions as the instrument of self-recognition (\u0100tma-j\u00f1\u0101na).\n\nSat-Cit-\u0100nanda is the compact Svar\u016bpa Lak\u1e63a\u1e47a form: being, consciousness, bliss \u2014 not three properties but three angles on the same self-recognizing nature.\n\n## Why the Distinction Matters for Mah\u0101v\u0101kya Interpretation\n\nThe Mah\u0101v\u0101kyas \u2014 \"Aham Brahm\u0101smi,\" \"Tat Tvam Asi\" \u2014 require the student to identify the J\u012bva's \u0100tman with Brahman. This identification cannot proceed via Ta\u1e6dastha Lak\u1e63a\u1e47a: the J\u012bva is not \"the cause of the universe,\" and identifying with that would be conceptually confused.\n\nThe identification proceeds via Svar\u016bpa Lak\u1e63a\u1e47a: \"I am Sat (pure being \u2014 not this particular existence but existence-as-such); I am Cit (pure consciousness \u2014 not this particular knowing-mind but consciousness-as-such); I am \u0100nanda (intrinsically complete \u2014 not dependent on any object for fullness).\" The Svar\u016bpa Lak\u1e63a\u1e47a enables the Mah\u0101v\u0101kya to function as a pram\u0101\u1e47a \u2014 an instrument of valid cognition \u2014 because the Svar\u016bpa of Brahman and the Svar\u016bpa of \u0100tman are non-different.\n\n## The River-Bank Metaphor for Ta\u1e6dastha\n\nThe image implicit in \"Ta\u1e6dastha\" (bank-standing): imagine standing on the bank of a river and pointing to a bird flying past \u2014 \"that bird, the one now crossing the sun.\" The relation \"now-crossing-the-sun\" is not the bird's nature; it is a contingent pointer used in that moment to indicate the bird. Similarly, \"the cause of the universe\" stands on the bank of conventional knowing and points toward Brahman without constituting Brahman's nature.\n\n## Audience Metaphor\n\nA teacher says: \"The brilliant student in this room \u2014 the one who has already scored highest on three exams.\" That description points to a particular person. But once you've turned and recognized who it is, the description falls away \u2014 it doesn't tell you who that person IS, only which person among many to look at. A better description would be: \"the one who understands the problem directly, without needing formulae to be prompted.\" The first description (Ta\u1e6dastha) gets your attention. The second (Svar\u016bpa) begins to tell you what the person IS. Sat-Cit-\u0100nanda is the Svar\u016bpa Lak\u1e63a\u1e47a: not Brahman pointed out from a distance, but Brahman's own nature recognized from within.\n\n## Citations\n\n1. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.1\u20134 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 definition of Brahman and the role of Lak\u1e63a\u1e47a; see [references/brahmasutra-bhashya.md]\n2. Taittir\u012bya Upani\u1e63ad 2.1 \u2014 satyam j\u00f1\u0101nam anantam brahma as Svar\u016bpa Lak\u1e63a\u1e47a; see [references/taittiriya-upanishad.md]\n3. Pa\u00f1cada\u015b\u012b 1.6\u20138 (Vidy\u0101ra\u1e47ya) \u2014 Ta\u1e6dastha vs. Svar\u016bpa Lak\u1e63a\u1e47a of consciousness; see [references/panchadashi.md]\n4. Upadesas\u0101hasr\u012b 17.1\u20135 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Svar\u016bpa Lak\u1e63a\u1e47a as the instrument of \u0100tma-j\u00f1\u0101na; see [references/upadesasahasri.md]", "concepts/mahavakya": "# Mah\u0101v\u0101kya \u2014 \u092e\u0939\u093e\u0935\u093e\u0915\u094d\u092f\n\n**Not:** axiom, proposition, mantra, sacred formula, interchangeable statements\n\n## What It Actually Means\n\nMah\u0101v\u0101kya (maha = great; v\u0101kya = sentence, utterance) names the four utterances from the Upani\u1e63ads that serve as the direct disclosure of non-dual reality. Each belongs to one of the four Vedas:\n\n- **Praj\u00f1\u0101nam Brahma** \u2014 \"Consciousness is Brahman\" (Aitareya Upani\u1e63ad 3.3 / \u1e5agveda)\n- **Aha\u1e43 Brahm\u0101smi** \u2014 \"I am Brahman\" (B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 1.4.10 / Yajurveda)\n- **Tat Tvam Asi** \u2014 \"That thou art\" (Ch\u0101ndogya Upani\u1e63ad 6.8.7 / S\u0101maveda)\n- **Ayam \u0100tm\u0101 Brahma** \u2014 \"This self is Brahman\" (M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 1.2 / Atharvaveda)\n\nThe fourfold schema, pairing each statement to a Veda, is \u015aa\u1e45kara's pedagogical arrangement \u2014 it does not appear as a discrete list in any single Upani\u1e63ad. The arrangement is later systematized in texts like the Vivekac\u016b\u1e0d\u0101ma\u1e47i.\n\n## How They Function\n\nA Mah\u0101v\u0101kya is not a sentence about Brahman in the way that \"the sky is blue\" is a sentence about the sky. It is a sentence in which the subject and predicate, properly understood, indicate the same thing \u2014 the undivided, self-luminous awareness that is both the student's innermost identity (\u0100tman) and the ground of all existence (Brahman).\n\n\u015aa\u1e45kara's commentary on Tat Tvam Asi introduces the concept of *jahadajahallak\u1e63a\u1e47\u0101* (indirect indication that drops the superficial meanings of both \"That\" and \"Thou\" while retaining their essential reference) to explain why the statement is not a simple subject-predicate sentence. The same interpretive principle applies to all four.\n\nThe Mah\u0101v\u0101kya delivers its recognition in the \u015arava\u1e47a event \u2014 formal hearing from a qualified Guru. It is not studied, it is received. Manana (reflective inquiry) then clears the doubts that arise after \u015arava\u1e47a. Nididhy\u0101sana sustains the recognition until contrary-to-knowledge sa\u1e43sk\u0101ras are removed.\n\n## What the Mah\u0101v\u0101kya Is Not Doing\n\nIt is not asserting that a person named \"I\" is identical to a cosmic entity named \"God.\" This misreading projects a theistic subject-object structure onto a statement that exists precisely to undo subject-object structure. The \"I\" in Aha\u1e43 Brahm\u0101smi is not the ego, the body-mind, or the personality \u2014 it is the witness awareness that the ego, body-mind, and personality appear within.\n\nIt is not establishing a philosophical position to be defended. Ved\u0101nta uses the Mah\u0101v\u0101kya as \u015aabda-pram\u0101\u1e47a \u2014 valid testimony that produces direct knowledge, the way perception produces knowledge of a visible object. Once the knowledge arises, the sentence has done its work.\n\n## Audience Metaphor\n\nThink of a Mah\u0101v\u0101kya the way you might think of the moment someone says your name in a crowded room. The sound stops you \u2014 not because you are told something new about yourself, but because what was always true (you are here) is suddenly recognized by you. The Mah\u0101v\u0101kya does not inform; it points back to what was never absent.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 1.4.10 \u2014 home of Aha\u1e43 Brahm\u0101smi; see [references/brhadaranyaka-upanishad.md]\n2. Ch\u0101ndogya Upani\u1e63ad 6.8.7 \u2014 home of Tat Tvam Asi; see [references/chandogya-upanishad.md]\n3. Aitareya Upani\u1e63ad 3.3 \u2014 home of Praj\u00f1\u0101nam Brahma; see [references/aitareya-upanishad.md]\n4. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 1.2 \u2014 home of Ayam \u0100tm\u0101 Brahma; see [references/mandukya-upanishad.md]\n5. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 254\u2013258 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 fourfold schema and pedagogical role of the Mah\u0101v\u0101kyas; see [references/vivekachudamani.md]", "concepts/manana": "# Manana \u2014 \u092e\u0928\u0928\n\n**Not:** meditation, memorization, passive contemplation, optional stage\n\n## Etymology\n\nManana (\u092e\u0928\u0928) from *man* \u2014 to think, to reflect, to consider. Related to Manas (mind) and Mantra (instrument of thought). Manana is the full deployment of the reasoning faculty in service of liberating knowledge \u2014 not speculation, but directed, purposeful philosophical inquiry.\n\n## The Problem Manana Solves\n\nAfter \u015arava\u1e47a, the student has received the Mah\u0101v\u0101kya as \u015aabda-pram\u0101\u1e47a. The teacher has said: \"You are Brahman; there is no bondage.\" But the student's accumulated experience tells them otherwise \u2014 they feel finite, limited, bound. This creates sa\u1e43\u015baya (doubt): \"I heard the teaching. But if it is true, why does my experience contradict it?\"\n\nThis is not a failure of faith. It is the natural operation of a mind that has stored decades of contrary evidence. Manana is the designed response: examine every form of the doubt until none survives intact.\n\n## What Manana Examines\n\nThe classical doubts addressed by Manana include:\n\n- **The multiplicity objection**: \"If Brahman is one and non-dual, how do I explain the apparent existence of many J\u012bvas?\"\n- **The agency objection**: \"If I am Brahman, who commits karma and who experiences its results?\"\n- **The liberation objection**: \"If I am already Brahman, what is there to be liberated from?\"\n- **The suffering objection**: \"If \u0100tman is bliss (\u0100nanda), why do I experience suffering?\"\n\nEach objection has a corresponding Ved\u0101ntic response grounded in the two-truth framework, the Vivartav\u0101da (appearance-only theory of the world), and the distinction between the P\u0101ram\u0101rthika (ultimate) and Vyavah\u0101rika (conventional) levels of reality. Manana works through these systematically, often with the Guru's guidance, until the student can arrive at them independently.\n\n## Manana Is Not About Proving Brahman\n\nA critical distinction: Manana does not attempt to establish that Brahman exists through logical inference. Brahman's existence is disclosed through \u015aabda-pram\u0101\u1e47a (\u015arava\u1e47a). Manana's task is narrower: remove the objections that would prevent the already-delivered knowledge from being accepted. The Mah\u0101v\u0101kya has done its work; Manana clears away the noise.\n\n## Relation to Nididhy\u0101sana\n\nWhen Manana is complete \u2014 when no coherent intellectual objection to the Upani\u1e63adic teaching remains \u2014 the student is ready for Nididhy\u0101sana. The distinction is important: Manana removes intellectual doubt (sa\u1e43\u015baya); Nididhy\u0101sana removes contrary-to-knowledge habit (vipar\u012bta-bh\u0101van\u0101). Even after all doubts are resolved, the mind continues to generate habitual counter-cognitions (\"I am limited, I am finite\") from stored sa\u1e43sk\u0101ras. Nididhy\u0101sana addresses this second layer.\n\n## Audience Metaphor\n\nA lawyer receives a credible witness statement (\u015arava\u1e47a) and prepares for cross-examination. Before the trial, they run every possible challenge to the witness's account \u2014 alternative explanations, inconsistencies, contrary evidence \u2014 and work out their responses. Not because they doubt the witness, but because an untested account is fragile. When no challenge remains unanswered, the case is ready to go before the court with confidence. That preparation is Manana.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 2.4.5 \u2014 Y\u0101j\u00f1avalkya's formulation of the triad; see [references/brhadaranyaka-upanishad.md]\n2. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 364\u2013367 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the triad and the role of doubt-removal; see [references/vivekachudamani.md]\n3. Aparok\u1e63\u0101nubh\u016bti vv. 1\u20138 (attributed to \u015aa\u1e45kar\u0101c\u0101rya) \u2014 the role of Manana in the path to direct recognition; see [references/aparokshanubhuti.md]", "concepts/neti-neti": "# Neti Neti \u2014 \u0928\u0947\u0924\u093f \u0928\u0947\u0924\u093f\n\n**Not:** nihilism, Christian apophatic theology, skepticism, \"Brahman is unknowable\"\n\n## Etymology and Source\n\nNeti (\u0928 \u0907\u0924\u093f) = \"not this\" (na = not; iti = thus/this). The reduplication (Neti Neti \u2014 \"not this, not this\") is the B\u1e5bhad\u0101ra\u1e47yaka's characteristic rhetorical form for exhaustive negation.\n\nThe phrase appears three times in the B\u1e5bhad\u0101ra\u1e47yaka:\n- 2.3.6 \u2014 after describing Brahman's two forms (gross and subtle, mortal and immortal), Y\u0101j\u00f1avalkya concludes: *neti nety \u0101tm\u0101 ag\u1e5bhyo na hi g\u1e5bhyate* \u2014 \"the \u0100tman is 'not this, not this'; it is ungrasped, for it is not grasped\"\n- 3.9.26 \u2014 Y\u0101j\u00f1avalkya applies the negation to Brahman in the cosmological inquiry\n- 4.2.4 \u2014 in the dialogue with Janaka\n\n## The Structural Logic of Neti Neti\n\nThe inquiry proceeds by taking every possible description of Brahman and negating it as incomplete:\n- Brahman is not gross (it is not any physical object)\n- Brahman is not subtle (it is not any mental state or energy)\n- Brahman is not this world (which has origin and end)\n- Brahman is not any higher world (which is still conditioned)\n- Brahman is not form (form is objectifiable and finite)\n- Brahman is not formless (formlessness defined over against form is still conditioned)\n\nAfter each negation, what remains? Not nothing \u2014 but the awareness doing the negating. The structural insight is that the witness of every negation cannot itself be negated without infinite regress. Neti Neti arrives at S\u0101k\u1e63in (the witness) as the irreducible remainder.\n\n## The Positive Complement\n\nNeti Neti defines Brahman negatively (Ta\u1e6dastha Lak\u1e63a\u1e47a at its most rigorous). Its positive complement is Abheda (non-difference) \u2014 the assertion that what cannot be negated (S\u0101k\u1e63in = Brahman) is identical with what the student already is. The two movements work together: Neti Neti removes all false superimpositions (Adhy\u0101sa); Abheda restores the recognition of what was always present.\n\n## Why the Doubling?\n\nThe repetition \"not this, not this\" (not merely \"not this\") emphasizes exhaustiveness. A single negation might be heard as pointing toward something else to be affirmed. The double negation closes that escape route: it is not that Brahman is \"not X but Y.\" It is not X. It is not Y either. Not anything that can be indicated in a subject-predicate statement. What the double negation produces is not an endless regress but a specific epistemological posture: the student stops reaching for an object and recognizes the reaching-awareness itself.\n\n## Neti Neti and \u0100tmavic\u0101ra\n\nThe Neti Neti method is the structural basis for \u0100tmavic\u0101ra (self-inquiry). The B\u1e5bhad\u0101ra\u1e47yaka's formulation moves from external objects inward (world \u2192 subtle body \u2192 Pr\u0101\u1e47a \u2192 Manas \u2192 Vij\u00f1\u0101na \u2192 \u0100nanda) negating each as a valid resting point for the \u0100tman. This inward movement through negation is precisely the structure that Ramana Mahar\u1e63i formalized as \"Who am I?\" \u2014 though in a condensed, direct form without the systematic Upani\u1e63adic scaffolding.\n\n## Audience Metaphor\n\nSomeone looking for their glasses \u2014 which are on their face \u2014 searches the entire room, negating each location: \"Not the table. Not the desk. Not the shelf. Not the bag.\" Each negation is correct and helpful. What is found at the end is not in the list of places searched \u2014 it was never absent. Neti Neti is that systematic search: not to find Brahman somewhere, but to exhaust the list of places where it is not, until what was never absent is recognized.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 2.3.6; 3.9.26; 4.2.4 \u2014 three appearances; see [references/brhadaranyaka-upanishad.md]\n2. Brahmas\u016btra Bh\u0101\u1e63ya 3.2.22 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Neti Neti as the definitive Upani\u1e63adic method for Brahman inquiry; see [references/brahmasutra-bhashya.md]\n3. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 240\u2013250 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the negation method and Adhy\u0101sa removal; see [references/vivekachudamani.md]", "concepts/nididhyasana": "# Nididhy\u0101sana \u2014 \u0928\u093f\u0926\u093f\u0927\u094d\u092f\u093e\u0938\u0928\n\n**Not:** Yoga dhy\u0101na, concentration, repetition, separate practice\n\n## Etymology\n\nNididhy\u0101sana from *ni-dhyai* \u2014 to fix the mind on, to reflect deeply, to contemplate. The prefix *ni-* intensifies the root *dhyai* (to see, to contemplate). It is related to Dhy\u0101na (meditation) etymologically but is functionally distinct in the Ved\u0101ntic epistemological sequence.\n\nThe verbal form used in B\u1e5bhad\u0101ra\u1e47yaka 2.4.5 is *nididhy\u0101sitavya\u1e25* \u2014 \"must be deeply internalized\" (passive imperative, third person singular).\n\n## What Nididhy\u0101sana Addresses\n\nAfter Manana removes intellectual doubt (sa\u1e43\u015baya), a second obstacle remains: vipar\u012bta-bh\u0101van\u0101 \u2014 contrary-to-knowledge habituation. This is the tendency of the mind to continue generating the cognition \"I am limited, I am the body-mind, I am finite\" from stored sa\u1e43sk\u0101ras, even when the intellectual case for non-dual identity has been fully accepted.\n\nThis is not hypocrisy or failure. It is the natural inertia of habit. The mind has been reinforcing the body-mind identification since birth \u2014 these sa\u1e43sk\u0101ras do not dissolve simply because they have been shown to be incorrect. Nididhy\u0101sana is the dedicated sustained engagement with the non-dual recognition that gradually replaces vipar\u012bta-bh\u0101van\u0101 sa\u1e43sk\u0101ras with j\u00f1\u0101na-sa\u1e43sk\u0101ras (recognition-habits).\n\n## The Correct Understanding of \"Practice\"\n\nNididhy\u0101sana is sometimes misunderstood as a practice one performs in addition to the prior stages. It is better understood as the maturation of the recognition delivered in \u015arava\u1e47a, cleared by Manana, and deepening by sustained abidance.\n\n\u015aa\u1e45kara's Vivekac\u016b\u1e0d\u0101ma\u1e47i (v. 364) describes the result: when Nididhy\u0101sana is complete, the recognition of \u0100tman-Brahman identity becomes *asa\u1e43digdha* \u2014 without the shadow of doubt \u2014 and the subsequent arising of the ordinary ego-sense is recognized immediately as an Up\u0101dhi rather than as reality. The J\u012bvanmukta does not eliminate the ego-sense; they cease to
