 be deceived by it.\n\n## The Absence of Object\n\nWhat distinguishes Nididhy\u0101sana from Yoga meditation is precisely the dissolution of the object-relation. In P\u0101ta\u00f1jala Yoga, dhy\u0101na requires an \u0101lambana (support, object of meditation) \u2014 a form, a name, a quality \u2014 on which the mind rests. The progress of Yoga is from Dh\u0101ra\u1e47\u0101 (holding the object) to Dhy\u0101na (flowing toward the object) to Sam\u0101dhi (merging with the object). The subject-object structure is present throughout.\n\nIn Nididhy\u0101sana, the \"object\" (Brahman = \u0100tman) is recognized as the subject itself. As the recognition deepens, the structure \"practitioner engaging in a practice\" softens. This is not mystical language \u2014 it is a description of what happens when the identification with the body-mind loosens: there is less sense of a \"me\" performing Nididhy\u0101sana and more of the recognition simply being present.\n\n## Duration and Indicators\n\nAdvaita does not prescribe a fixed duration for Nididhy\u0101sana. The indicators of maturity are behavioral and cognitive: the student increasingly finds that the default position of the mind is non-dual recognition rather than object-world engagement; the arising of the ego-sense is recognized almost immediately as an Up\u0101dhi; suffering, while experientially present, no longer generates the secondary suffering of \"why is this happening to me?\"\n\nThe Vivekac\u016b\u1e0d\u0101ma\u1e47i lists the qualities of the Sthitapraj\u00f1a (steady-minded one, BG 2.55\u201358) as approximate external indicators.\n\n## Audience Metaphor\n\nA person who has learned to ride a bicycle still falls occasionally when they are first learning. They know intellectually how to balance (Manana has removed the doubt), but the body has not yet habituated the new pattern. The sustained practice of cycling \u2014 not thinking about cycling, but cycling \u2014 gradually eliminates the old falling-habits. Eventually, balance is not maintained by effort but by absence of imbalance. Nididhy\u0101sana is the cycling: not the theory of balance, not the single successful ride, but the sustained practice until the old habit of falling simply stops.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 2.4.5 \u2014 Y\u0101j\u00f1avalkya's formulation; see [references/brhadaranyaka-upanishad.md]\n2. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 362\u2013366 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the triad and the removal of vipar\u012bta-bh\u0101van\u0101; see [references/vivekachudamani.md]\n3. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.4 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the stages of inquiry and the role of \u015arava\u1e47a-Manana-Nididhy\u0101sana; see [references/brahmasutra-bhashya.md]\n4. Upadesas\u0101hasr\u012b 2.1\u20133 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Nididhy\u0101sana and the Guru's role in its completion; see [references/upadesasahasri.md]", "concepts/nirguna-brahman": "# Nirgu\u1e47a Brahman \u2014 \u0928\u093f\u0930\u094d\u0917\u0941\u0923 \u092c\u094d\u0930\u0939\u094d\u092e\n\n**Not:** negation of Sagu\u1e47a Brahman, void or emptiness, an attainable state, God-without-form in the apophatic sense\n\n## Etymology\n\nNir (\u0928\u093f\u0930\u094d) = without, free from; gu\u1e47a (\u0917\u0941\u0923) = quality, attribute, thread (from S\u0101\u1e43khya's three gu\u1e47as: Sattva, Rajas, Tamas). Nirgu\u1e47a = without attributes. The term covers two related claims: (1) Brahman has no qualities in the S\u0101\u1e43khya-gu\u1e47a sense \u2014 it is not composed of Sattva, Rajas, or Tamas; (2) Brahman has no limiting attributes of any kind that could distinguish it or define it as a particular kind of thing.\n\n## The Structure of the Claim\n\nAdvaita holds that Brahman cannot be characterized because all characterization works by differentiation \u2014 \"X has quality Q\" means X is distinguished from things lacking Q. Brahman is not distinguished from anything; there is nothing outside it. Therefore, no positive characterization can capture its nature without falsification.\n\nThe Upani\u1e63ads approach this in two ways:\n- **Via negation**: Neti Neti (BU 2.3.6) \u2014 \"not this, not this\" \u2014 negating every proposed description\n- **Via Svar\u016bpa Lak\u1e63a\u1e47a**: Sat-Cit-\u0100nanda (Taittir\u012bya 2.1-5) \u2014 not attributes Brahman \"has\" but what Brahman IS in its own nature\n\nThese two approaches are complementary: Neti Neti clears the field; Sat-Cit-\u0100nanda names the irreducible nature that remains.\n\n## Why Nirgu\u1e47a Cannot Be an Object\n\nThe Taittir\u012bya Upani\u1e63ad (2.4) states: *yato v\u0101co nivartante apr\u0101pya manas\u0101 saha* \u2014 \"from where speech returns, having not reached, along with the mind.\" The mind and speech are instruments of the Vy\u0101vah\u0101rika domain; Nirgu\u1e47a Brahman is P\u0101ram\u0101rthika. The instruments cannot reach it because it is the ground of those instruments.\n\nThe M\u0101\u1e47\u1e0d\u016bkya (7) exhausts the descriptions of the three-state experiencers and then describes Tur\u012bya (= Nirgu\u1e47a Brahman) only through negation: \"unseen, ungraspable, uncharacterizable.\" This is not evasion; it is precision.\n\n## The Mah\u0101v\u0101kyas and Nirgu\u1e47a\n\nThe Mah\u0101v\u0101kyas point to Nirgu\u1e47a Brahman \u2014 not to Sagu\u1e47a Brahman (\u012a\u015bvara). Aham Brahm\u0101smi (\"I am Brahman\") uses Brahman to refer to the attributeless, not the Lord of creation. Praj\u00f1\u0101nam Brahma (\"Consciousness is Brahman\") names the self-luminous awareness as the attributeless absolute, not a form of Brahman accessible to worship.\n\nThis is why the Mah\u0101v\u0101kyas are not devotional formulas (which would point to Sagu\u1e47a) but j\u00f1\u0101na-pram\u0101\u1e47a (knowledge-instruments) functioning at the P\u0101ram\u0101rthika level.\n\n## The Vi\u015bi\u1e63\u1e6d\u0101dvaita Challenge\n\nR\u0101m\u0101nuja argues that Nirgu\u1e47a Brahman is an incoherent concept: a Brahman without any attributes is indistinguishable from non-existence. He reads \"nirgu\u1e47a\" in the Upani\u1e63ads as meaning \"free of the three S\u0101\u1e43khya gu\u1e47as\" or \"free of auspicious-quality absence\" \u2014 not as truly attributeless. For R\u0101m\u0101nuja, Brahman is the inner self of the universe and is eternally qualified by all its attributes.\n\nThe debate is live within Ved\u0101nta and OKF does not adjudicate it. Both readings engage the same texts; the difference is in the interpretation of what the Upani\u1e63ads' negations are negating.\n\n## Audience Metaphor\n\nA cinema screen has no color of its own. A red scene appears on it \u2014 the screen seems red, but the screen itself has not become red; the projection creates the appearance. A blue scene appears \u2014 same screen, different appearance. When no film is projected, the screen is there, without any of the colors. Nirgu\u1e47a Brahman is the screen in this state: not colored by any particular quality, not made of any particular content, not absent \u2014 but not characterizable by what appears on it. The projected colors are real as projections; they do not belong to the screen.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 3.9.26 \u2014 Neti Neti as the approach to Nirgu\u1e47a; see [references/brhadaranyaka-upanishad.md]\n2. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 4.4.22 \u2014 \"vij\u00f1\u0101tara\u1e43 are kena vij\u0101n\u012by\u0101t\" \u2014 by what would you know the knower?; see [references/brhadaranyaka-upanishad.md]\n3. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 7 \u2014 Tur\u012bya as Nirgu\u1e47a; see [references/mandukya-upanishad.md]\n4. Taittir\u012bya Upani\u1e63ad 2.4 \u2014 yato v\u0101co nivartante; see [references/taittiriya-upanishad.md]\n5. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.4 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 on the self-luminous and attributeless Brahman; see [references/brahmasutra-bhashya.md]", "concepts/pancha-kosha": "# Pa\u00f1cako\u015ba \u2014 \u092a\u091e\u094d\u091a\u0915\u094b\u0936\n\n**Not:** layered anatomy of the soul, \u0100tman in five modes, hierarchy from lower to higher selves\n\n## Source\n\nTaittir\u012bya Upani\u1e63ad, Brahm\u0101nanda Vall\u012b (chapter 2), verses 2.1\u20135. The text presents five nested Ko\u015bas (sheaths), each with its own Pr\u0101\u1e47a (sustaining structure) and described as \"Brahman\" \u2014 only to be superseded by a more interior sheath. The teaching is a systematic elimination: each Ko\u015ba is presented as if it might be the \u0100tman, then shown to be insufficient.\n\n## The Five Ko\u015bas\n\n| Ko\u015ba | Sanskrit | Translation | State correlation | Inquiry result |\n|------|----------|-------------|-------------------|----------------|\n| Annamaya | \u0905\u0928\u094d\u0928\u092e\u092f | food-made | J\u0101grat (gross) | An\u0101tman \u2014 dependent on food, born, dies |\n| Pr\u0101\u1e47amaya | \u092a\u094d\u0930\u093e\u0923\u092e\u092f | breath-made | J\u0101grat (vital) | An\u0101tman \u2014 animating force, not the knower |\n| Manomaya | \u092e\u0928\u094b\u092e\u092f | mind-made | Svapna (mind) | An\u0101tman \u2014 doubts, desires, changes |\n| Vij\u00f1\u0101namaya | \u0935\u093f\u091c\u094d\u091e\u093e\u0928\u092e\u092f | intellect-made | J\u0101grat/Svapna (intellect) | An\u0101tman \u2014 discriminates but is still an object |\n| \u0100nandamaya | \u0906\u0928\u0928\u094d\u0926\u092e\u092f | bliss-made | Su\u1e63upti (causal) | An\u0101tman \u2014 experienced, witnessed, not the witness |\n\n## The Inquiry Structure\n\nThe Taittir\u012bya presents the Ko\u015bas as a series of provisional identifications. \"The one who knows\" is first thought to be the body (Annamaya). But the body cannot be the knower \u2014 it is known, it changes, it depends on food. So \"the one who knows\" must be subtler.\n\nThe investigation moves inward through each Ko\u015ba. Each time, the proposed Ko\u015ba is shown to be an object of the \u0100tman, not the \u0100tman itself:\n- The Annamaya is perceived; what perceives cannot be only what is perceived\n- The Pr\u0101\u1e47amaya breathes; what witnesses breathing cannot be the breathing\n- The Manomaya doubts and desires; what witnesses doubt cannot be only the doubter\n- The Vij\u00f1\u0101namaya decides; what witnesses decision cannot be only the decision-maker\n- The \u0100nandamaya is experienced in Su\u1e63upti; what witnesses Su\u1e63upti's bliss cannot be the bliss-sheath\n\nThe \u0100tman is the witness of all five \u2014 the one that never becomes an object in the inquiry.\n\n## Relationship to the Three Bodies\n\nThe Pa\u00f1cako\u015ba and the Traya\u015bar\u012bra (three bodies) models are not competing alternatives \u2014 they are complementary analyses:\n- **Annamaya Ko\u015ba** = Sth\u016bla \u015aar\u012bra (gross body)\n- **Pr\u0101\u1e47amaya + Manomaya + Vij\u00f1\u0101namaya Ko\u015bas** = S\u016bk\u1e63ma \u015aar\u012bra (subtle body)\n- **\u0100nandamaya Ko\u015ba** = K\u0101ra\u1e47a \u015aar\u012bra (causal body)\n\nThe Ko\u015ba model is finer-grained within the subtle body domain; the \u015aar\u012bra model is broader. Both terminate in the \u0100tman as what is left when all are discarded.\n\n## The Mah\u0101v\u0101kya Connection\n\nThe Taittir\u012bya's Pa\u00f1cako\u015ba inquiry ends (2.9) with a declaration: *\u0101nanda\u1e43 brahmeti vyaj\u0101n\u0101t* \u2014 \"he recognized \u0100nanda as Brahman.\" This is not a conclusion that the \u0100nandamaya Ko\u015ba is Brahman; it is a recognition that the \u0100nanda that is Brahman's own nature (Svar\u016bpa Lak\u1e63a\u1e47a) was being approximated by each Ko\u015ba \u2014 and is finally recognized as the unchanging ground beneath them all. The Sat-Cit-\u0100nanda of Brahman was what was being sought at each layer; the Pa\u00f1cako\u015ba inquiry removes the search by discarding each imposter.\n\n## Audience Metaphor\n\nA traveler searching for a treasure follows a map that describes the treasure as being inside five concentric boxes. Opening the outermost box (Annamaya), they find a smaller box labeled \"this is also not it.\" Opening the second (Pr\u0101\u1e47amaya) \u2014 another smaller box, same label. Third (Manomaya), fourth (Vij\u00f1\u0101namaya) \u2014 same. Opening the fifth (\u0100nandamaya) \u2014 they find not another box but the recognition that the one who was opening all the boxes was never itself a box. The treasure was never in the boxes; it was the one who was searching. The boxes are real \u2014 the search was necessary \u2014 but the finding is a recognition, not an acquisition.\n\n## Citations\n\n1. Taittir\u012bya Upani\u1e63ad 2.1\u20135 \u2014 the five Ko\u015bas; see [references/taittiriya-upanishad.md]\n2. Taittir\u012bya Upani\u1e63ad 2.8\u20139 \u2014 the \u0100nanda-M\u012bm\u0101\u1e43s\u0101 and its conclusion; see [references/taittiriya-upanishad.md]\n3. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 150\u2013230 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 systematic analysis of each Ko\u015ba as An\u0101tman; see [references/vivekachudamani.md]\n4. \u0100tmabodha vv. 14\u201319 (attributed \u015aa\u1e45kar\u0101c\u0101rya) \u2014 the five sheaths and the \u0100tman; see [references/atmabodha.md]", "concepts/prajnanam-brahma": "# Praj\u00f1\u0101nam Brahma \u2014 \u092a\u094d\u0930\u091c\u094d\u091e\u093e\u0928\u0902 \u092c\u094d\u0930\u0939\u094d\u092e\n\n**Not:** \"intelligence is God,\" idealism, external description, omniscient cosmic mind\n\n## Source\n\nPraj\u00f1\u0101nam Brahma appears in Aitareya Upani\u1e63ad 3.3 (also rendered 3.1.3 in some editions). The verse reads: *praj\u00f1\u0101nam brahma* \u2014 a terse, aphoristic statement with no surrounding dialogue. Its terseness is its character: of the four Mah\u0101v\u0101kyas, this is the most purely definitional.\n\nPraj\u00f1\u0101nam (\u092a\u094d\u0930\u091c\u094d\u091e\u093e\u0928\u092e\u094d) = consciousness, awareness, pure knowing; from *pra-j\u00f1\u0101* (deep or thorough knowing). Brahma (\u092c\u094d\u0930\u0939\u094d\u092e) = Brahman, the ultimate ground.\n\n## Svar\u016bpa Lak\u1e63a\u1e47a: The Intrinsic Definition\n\nVed\u0101nta distinguishes two modes of defining Brahman (see also laksana-brahman.md):\n\n- **Ta\u1e6dastha Lak\u1e63a\u1e47a** (contextual definition): Brahman is the cause of the world \u2014 an indirect pointer that situates Brahman relationally\n- **Svar\u016bpa Lak\u1e63a\u1e47a** (intrinsic definition): Brahman is Sat-Chit-\u0100nanda \u2014 being, consciousness, bliss as its own nature\n\nPraj\u00f1\u0101nam Brahma operates as Svar\u016bpa Lak\u1e63a\u1e47a. It does not describe Brahman in relation to something else; it identifies Brahman through what it is. Praj\u00f1\u0101nam = Cit (the \"Chit\" of Sat-Chit-\u0100nanda). The statement reduces to: Brahman's nature is consciousness.\n\n## Why This Is Not Idealism\n\nWestern idealism makes the mind the constitutive condition of reality \u2014 things exist only as perceived or as objects of possible experience. Praj\u00f1\u0101nam Brahma makes no such claim. Brahman-as-consciousness is not a knowing subject over and against a world of objects; it is the non-dual ground in which the appearance of subjects and objects arises. The world is not created by consciousness thinking it \u2014 the world appears as a modification (Vivartav\u0101da) within and as Brahman, the way a wave appears within and as water.\n\n## Consciousness as Self-Luminous\n\nThe concept that enables this reading is Svaprak\u0101\u015batva \u2014 self-luminosity. Consciousness, in Advaita, is the one thing that does not require something else to make it known. A pot is known by consciousness; consciousness is not known by another consciousness. This self-luminous nature is precisely what Praj\u00f1\u0101nam points to: the knowing-quality of Brahman is not a relational knowing (I know X) but the pure luminosity that makes all knowing possible.\n\n## Distinctive Among the Four Mah\u0101v\u0101kyas\n\nPraj\u00f1\u0101nam Brahma is the only one that leads with the characteristic (Praj\u00f1\u0101nam) rather than with an identity marker (Aham, Tat, Ayam). It is the definitional pivot of the group \u2014 the statement most directly equivalent to the Sat-Chit-\u0100nanda formula, and the one most useful for the student who asks \"But what IS Brahman?\"\n\n## Audience Metaphor\n\nConsider light in a room. All objects in the room are seen by light, but light itself is not seen by another light \u2014 it is simply luminous. If you were asked \"What is light?\", a physicist might describe its wavelength (Ta\u1e6dastha Lak\u1e63a\u1e47a \u2014 defining it by what it does). But to say \"light is luminosity itself\" is Svar\u016bpa Lak\u1e63a\u1e47a \u2014 defining it by what it is. Praj\u00f1\u0101nam Brahma says: Brahman is luminosity \u2014 the very self-luminosity by which you know anything at all.\n\n## Citations\n\n1. Aitareya Upani\u1e63ad 3.3 \u2014 source text; see [references/aitareya-upanishad.md]\n2. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.1 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Brahman as the ground to be known; Praj\u00f1\u0101nam in context of cit-svar\u016bpa; see [references/brahmasutra-bhashya.md]\n3. Vivekac\u016b\u1e0d\u0101ma\u1e47i v. 254 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 four Mah\u0101v\u0101kyas; see [references/vivekachudamani.md]\n4. Pa\u00f1cada\u015b\u012b 1.6\u20138 (Vidy\u0101ra\u1e47ya) \u2014 self-luminosity of consciousness; see [references/panchadashi.md]", "concepts/saguna-brahman": "# Sagu\u1e47a Brahman \u2014 \u0938\u0917\u0941\u0923 \u092c\u094d\u0930\u0939\u094d\u092e\n\n**Not:** inferior Brahman, personal God separate from Brahman, exclusively for bhakti\n\n## Etymology\n\nSa (\u0938) = with; gu\u1e47a (\u0917\u0941\u0923) = qualities, attributes. Sagu\u1e47a = with-qualities. Contrasted with Nirgu\u1e47a (without qualities). The paired terms name two modes of approaching the single Brahman.\n\n## The Two Perspectives on One Brahman\n\nAdvaita Ved\u0101nta's fundamental claim is that there is one non-dual Brahman. The Sagu\u1e47a/Nirgu\u1e47a distinction does not divide Brahman into two; it names two stances the inquiry can take:\n\n- **Nirgu\u1e47a Brahman** (without qualities): Brahman as it is in itself \u2014 pure being-consciousness-bliss, without any relation to anything else, without the Up\u0101dhi of M\u0101y\u0101. This is the P\u0101ram\u0101rthika description.\n- **Sagu\u1e47a Brahman** (with qualities): Brahman as it is known in relation to the manifest world \u2014 as \u012a\u015bvara, the omniscient, omnipotent, benevolent Lord; as the efficient and material cause of creation; as the inner ruler of all beings. This is the Vy\u0101vah\u0101rika description.\n\nBrahman is not two things. The student approaches Brahman through qualities (Sagu\u1e47a) first \u2014 because the qualified Brahman can be worshipped, meditated on, and related to. Over time, the qualifications are recognized as Up\u0101dhis (limiting adjuncts arising from M\u0101y\u0101), and the Nirgu\u1e47a recognition becomes possible.\n\n## Sagu\u1e47a Brahman as \u012a\u015bvara\n\nThe primary name for Sagu\u1e47a Brahman in the Upani\u1e63adic corpus is \u012a\u015bvara \u2014 \"the Lord\" (from \u012b\u015b, to rule). \u012a\u015bvara is Brahman + M\u0101y\u0101 as Up\u0101dhi: the infinite conditioned by the power of its own creative potential. Attributes assigned to \u012a\u015bvara include:\n- Sarvaj\u00f1a (omniscient)\n- Sarvavy\u0101p\u012b (omnipresent)\n- Sarva\u015baktim\u0101n (omnipotent)\n- Antary\u0101min (inner controller of all beings)\n\nThese attributes are real and valid at the Vy\u0101vah\u0101rika level \u2014 not false, but not the final word.\n\n## The \u015aa\u1e45kara-R\u0101m\u0101nuja Difference\n\nThis is the sharpest point of divergence between Advaita and Vi\u015bi\u1e63\u1e6d\u0101dvaita:\n- **Advaita (\u015aa\u1e45kara)**: Sagu\u1e47a Brahman is Nirgu\u1e47a Brahman through the Up\u0101dhi of M\u0101y\u0101. The attributes are real at the conventional level but do not constitute the ultimate nature of Brahman. Up\u0101san\u0101 on Sagu\u1e47a Brahman leads eventually to J\u00f1\u0101na (Brahma-j\u00f1\u0101na via the Mah\u0101v\u0101kyas).\n- **Vi\u015bi\u1e63\u1e6d\u0101dvaita (R\u0101m\u0101nuja)**: Sagu\u1e47a Brahman IS the ultimate reality. Brahman eternally possesses the qualities of being the inner self of the universe of souls and matter. \"Nirgu\u1e47a\" means \"without defective qualities,\" not \"without all qualities.\" There is no Nirgu\u1e47a Brahman as a separate higher level.\n\nBoth positions are rigorous. The OKF presents both without resolving the dispute.\n\n## Bhakti and Sagu\u1e47a Brahman\n\nThe bhakti-marga bundle (v0.4) addresses Sagu\u1e47a Brahman primarily through the devotional relation. The contribution of v0.6 is to situate Sagu\u1e47a Brahman within the larger Upani\u1e63adic epistemology: Sagu\u1e47a is not where bhakti ends up \u2014 it is where jij\u00f1\u0101s\u0101 (inquiry) begins for many students. The Mu\u1e47\u1e0daka Upani\u1e63ad (1.1.9) distinguishes the \"higher knowledge\" (Par\u0101vidy\u0101 \u2014 Brahma-j\u00f1\u0101na) from the \"lower knowledge\" (Apar\u0101vidy\u0101 \u2014 includes Up\u0101san\u0101 on Sagu\u1e47a Brahman) \u2014 not to demean Up\u0101san\u0101 but to clarify the path.\n\n## Audience Metaphor\n\nOcean water can be experienced in two ways: as waves (with form, force, temperature, identity) and as water (homogeneous, formless, the substrate of all waves). Sagu\u1e47a Brahman is Brahman known as the waves \u2014 each wave has specific qualities, each can be engaged. Nirgu\u1e47a Brahman is Brahman known as the water \u2014 the same ocean, no longer individuated into waves. You are not wrong to engage a wave; you have simply not yet recognized the water.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 3.7 \u2014 Antary\u0101min as Sagu\u1e47a Brahman; see [references/brhadaranyaka-upanishad.md]\n2. Ch\u0101ndogya Upani\u1e63ad 3.14 \u2014 sarvam khalvidam brahma; see [references/chandogya-upanishad.md]\n3. Mu\u1e47\u1e0daka Upani\u1e63ad 1.1.9 \u2014 Par\u0101vidy\u0101 and Apar\u0101vidy\u0101; see [references/mundaka-upanishad.md]\n4. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.11 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Sagu\u1e47a Up\u0101san\u0101 and its purpose; see [references/brahmasutra-bhashya.md]", "concepts/sakshin": "# S\u0101k\u1e63in \u2014 \u0938\u093e\u0915\u094d\u0937\u093f\u0928\u094d\n\n**Not:** the observer, introspection, meditator, individual awareness\n\n## Etymology\n\nS\u0101k\u1e63in (\u0938\u093e\u0915\u094d\u0937\u093f\u0928\u094d) = witness, one who sees directly; from s\u0101k\u1e63\u0101t (directly, immediately, face to face) + suffix *-in* (one who does). S\u0101k\u1e63\u0101t itself is from sa (with) + ak\u1e63a (eye/sense). The witness \"sees\" in the sense of knowing directly \u2014 not through inference, not through the instrument of the mind, but by being the very light in which things appear.\n\n## The Technical Distinction: S\u0101k\u1e63in vs. Pram\u0101t\u0101\n\nAdvaita distinguishes two aspects of the apparent individual:\n- **Pram\u0101t\u0101** (the empirical knower): the J\u012bva functioning as a knowing subject \u2014 using the Anta\u1e25kara\u1e47a (inner instrument), engaging in Vy\u0101vah\u0101rika (conventional) knowing of objects\n- **S\u0101k\u1e63in** (the witness): the self-luminous awareness in which the Pram\u0101t\u0101 and its knowing-activity appear as objects\n\nThe Pram\u0101t\u0101 is the \"I\" of ordinary experience \u2014 the one who perceives, thinks, desires, and remembers. The S\u0101k\u1e63in is not this \"I.\" It is that in which this \"I\" appears. Nididhy\u0101sana gradually erodes the identification with Pram\u0101t\u0101 and reveals the S\u0101k\u1e63in as the actual referent of \"Aham\" in the Mah\u0101v\u0101kya.\n\n## Self-Luminosity (Svaprak\u0101\u015batva)\n\nThe defining quality of S\u0101k\u1e63in is Svaprak\u0101\u015batva \u2014 self-luminosity. Every object (pot, thought, emotion, state) is known by something other than itself. The pot is known by the eye; the eye is known by the mind; the mind is known by the Buddhi (intellect); the Buddhi is known by the S\u0101k\u1e63in. But the S\u0101k\u1e63in cannot be known by something other than itself without infinite regress. Therefore it must be self-luminous \u2014 its knowing-nature does not depend on another knowing.\n\nThis self-luminosity is not a property S\u0101k\u1e63in has \u2014 it is what S\u0101k\u1e63in IS. And it is precisely what Praj\u00f1\u0101nam Brahma points to: the luminous knowing-nature is identical with Brahman.\n\n## S\u0101k\u1e63in and the Three States\n\nThe S\u0101k\u1e63in is demonstrated through the Avasth\u0101traya inquiry (see avastha-traya.md):\n- In J\u0101grat: the S\u0101k\u1e63in witnesses the waking Vi\u015bva\n- In Svapna: the S\u0101k\u1e63in witnesses the dreaming Taijasa\n- In Su\u1e63upti: the S\u0101k\u1e63in witnesses the absence of objects \u2014 which is how the Su\u1e63upti bliss can be reported retrospectively on waking\n\nThe S\u0101k\u1e63in is the functional expression of Tur\u012bya in the presence of the three states. When the three states are present, Tur\u012bya-as-S\u0101k\u1e63in witnesses them. Tur\u012bya itself is the ground; S\u0101k\u1e63in is Tur\u012bya as it appears from within the inquiry context.\n\n## B\u1e5bhad\u0101ra\u1e47yaka's Antary\u0101min Passage\n\nThe B\u1e5bhad\u0101ra\u1e47yaka's Antary\u0101min (3.7.23) provides an early formulation: \"He who dwells in consciousness, within consciousness, whom consciousness does not know, whose body consciousness is, who rules consciousness from within \u2014 He is your \u0100tman, the inner ruler, the immortal.\" This \"inner ruler within consciousness but unknown by consciousness\" is S\u0101k\u1e63in \u2014 it cannot be an object of consciousness because it is the subject that consciousness appears within.\n\n## The Practical Implication for \u0100tmavic\u0101ra\n\nSelf-inquiry (\u0100tmavic\u0101ra) uses the S\u0101k\u1e63in as its organizing principle: \"Who is the witness of this thought? Who knows this experience?\" Each answer (\"my mind,\" \"my intellect\") can be further questioned (\"Who knows the mind?\") until no further regression is possible \u2014 until the awareness that cannot be objectified is recognized. That irreducible remainder is S\u0101k\u1e63in = \u0100tman.\n\n## Audience Metaphor\n\nA cinema projector illuminates the screen \u2014 the images appear because of the light. The light itself is not in any of the images; you cannot point to it in the film. If all the images are removed, the light remains. If the film shows a lamp, the light of the projector is not in that lamp \u2014 yet without the projector's light, the image of the lamp cannot be seen. S\u0101k\u1e63in is the projector-light: the self-luminous source of all experience, itself not appearing as any experience.\n\n## Citations\n\n1. Pa\u00f1cada\u015b\u012b 7.1\u201310 (Vidy\u0101ra\u1e47ya) \u2014 S\u0101k\u1e63in as distinct from Pram\u0101t\u0101; self-luminosity; see [references/panchadashi.md]\n2. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 316\u2013322 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the witness and its qualities; see [references/vivekachudamani.md]\n3. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 3.7.23 \u2014 the Antary\u0101min passage as proto-S\u0101k\u1e63in formulation; see [references/brhadaranyaka-upanishad.md]\n4. Aparok\u1e63\u0101nubh\u016bti vv. 12\u201316 (attributed \u015aa\u1e45kar\u0101c\u0101rya) \u2014 direct inquiry into S\u0101k\u1e63in; see [references/aparokshanubhuti.md]", "concepts/sat-chit-ananda": "# Sat-Cit-\u0100nanda \u2014 \u0938\u0924\u094d-\u091a\u093f\u0924\u094d-\u0906\u0928\u0928\u094d\u0926\n\n**Not:** three properties Brahman has, a felt blissful state, Truth-Consciousness-Bliss as separate categories\n\n## The Three Terms Individually\n\n**Sat (\u0938\u0924\u094d)** \u2014 from the root *as*, to be. Sat is pure being: existence that is not contingent, not produced, not destructible, not modified by time. Brahman is Sat not in the sense of being one existent among others but in the sense of being existence-as-such. The Ch\u0101ndogya (6.2.1) begins: \"Sad eva somya idam agra \u0101s\u012bt ekam ev\u0101dvit\u012byam\" \u2014 \"Being alone was this, in the beginning, one only without a second.\"\n\n**Cit (\u091a\u093f\u0924\u094d)** \u2014 from the root *cit*, to know, to be aware. Cit is pure consciousness: awareness that is not an instrument of knowing but knowing-as-such. Brahman is Cit not in the sense of being a subject that has awareness but in the sense of being awareness itself. This is what Praj\u00f1\u0101nam Brahma (Aitareya 3.3) points to: consciousness is Brahman \u2014 not \"Brahman has consciousness.\"\n\n**\u0100nanda (\u0906\u0928\u0928\u094d\u0926)** \u2014 from *\u0101-nand*, to rejoice, to be fulfilled. \u0100nanda is not happiness caused by pleasant objects; it is the intrinsic completeness of Brahman \u2014 Brahman lacks nothing, requires nothing external, is self-sufficient. This \u0100nanda is why the Su\u1e63upti state (which has no objects) yields bliss \u2014 the ego-contraction that normally obscures \u0100nanda is temporarily absent, and Brahman's intrinsic \u0100nanda shines without obstruction.\n\n## The Three as One\n\nVivekac\u016b\u1e0d\u0101ma\u1e47i vv. 238\u2013240 specifies:\n\n> *saccid\u0101nandar\u016bpasya brahma\u1e47a\u1e25 param\u0101tmana\u1e25* \u2014 \"Of Brahman, the Supreme Self, whose nature is Sat-Cit-\u0100nanda...\"\n\nThe compound Sat-Cit-\u0100nanda is a Karmadharaya or Bahuvr\u012bhi compound \u2014 not \"Sat and Cit and \u0100nanda\" as three things, but \"Brahman, which is characterized by being, consciousness, and bliss\" \u2014 all pointing to the same Brahman. The three do not divide Brahman into three parts; each is complete.\n\n## Svar\u016bpa Lak\u1e63a\u1e47a vs. Ta\u1e6dastha Lak\u1e63a\u1e47a\n\nVed\u0101nta distinguishes two types of Lak\u1e63a\u1e47a (pointers/indicators):\n- **Ta\u1e6dastha Lak\u1e63a\u1e47a** (accidental pointer): describes something by a contingent characteristic \u2014 \"the house next to the tree\" identifies a house by a feature not essential to it\n- **Svar\u016bpa Lak\u1e63a\u1e47a** (own-nature indicator): describes something by what it essentially is\n\nSat-Cit-\u0100nanda is the Svar\u016bpa Lak\u1e63a\u1e47a of Brahman \u2014 not a contingent description, not a pointer by association, but the essential nature itself. The Ta\u1e6dastha Lak\u1e63a\u1e47a of Brahman (used provisionally to identify it within the conventional framework) would be something like \"the cause of the universe.\"\n\n## \u0100nanda and the Su\u1e63upti Evidence\n\nThe Taittir\u012bya Upani\u1e63ad (2.8-9) constructs a thought-experiment: imagine a young man, fully healthy, with all desires fulfilled \u2014 his bliss is one unit (\u0100nanda). Then scale up through the hierarchy of beings to the gods, to the creator Brahma: each level multiplies the bliss by 100. But even the bliss of Brahma (the creator-deity) is identical with the bliss of a Brahma-knower here and now.\n\nThe point is not the math; it is that \u0100nanda is Brahman's nature, not a quantity to be accumulated. The Su\u1e63upti argument confirms this from experience: in deep sleep, all desired objects are absent, yet the resulting bliss is real. Bliss independent of objects = Brahman's intrinsic nature = \u0100nanda as Svar\u016bpa.\n\n## Audience Metaphor\n\nA gold ring does not \"have\" goldness as an attribute it acquired \u2014 it is gold. Remove the shape (ring-form) and what remains is still gold. The goldness is not a property sitting alongside the ring; it is what the ring IS from a different angle. Sat-Cit-\u0100nanda is similarly not three coats of paint on Brahman. Being, consciousness, and bliss are what Brahman IS \u2014 seen from the angles of existence, of knowing, and of intrinsic completeness. Take away any one description and you still have Brahman, because each is complete.\n\n## Citations\n\n1. Taittir\u012bya Upani\u1e63ad 2.1 \u2014 \"satyam j\u00f1\u0101nam anantam brahma\"; see [references/taittiriya-upanishad.md]\n2. Taittir\u012bya Upani\u1e63ad 2.8\u20139 \u2014 the \u0100nanda-M\u012bm\u0101\u1e43s\u0101 (bliss investigation); see [references/taittiriya-upanishad.md]\n3. Ch\u0101ndogya Upani\u1e63ad 6.2.1 \u2014 \"sad eva somya idam agra \u0101s\u012bt\"; see [references/chandogya-upanishad.md]\n4. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 238\u2013240 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Sat-Cit-\u0100nanda as Svar\u016bpa Lak\u1e63a\u1e47a; see [references/vivekachudamani.md]\n5. Pa\u00f1cada\u015b\u012b 1.6\u201310 (Vidy\u0101ra\u1e47ya) \u2014 on the self-luminous Cit; see [references/panchadashi.md]", "concepts/shravana": "# \u015arava\u1e47a \u2014 \u0936\u094d\u0930\u0935\u0923\n\n**Not:** auditory listening, independent study, lecture attendance, one-time event\n\n## Etymology\n\n\u015arava\u1e47a (\u0936\u094d\u0930\u0935\u0923) from the root *\u015bru* \u2014 to hear. The word is related to \u015arotra (ear) and \u015aruti (that which is heard) \u2014 the term for the Vedic revelation itself. The etymological kinship is not incidental: \u015arava\u1e47a of the Upani\u1e63adic teaching is, at the practitioner level, the same type of event as the \u1e5a\u1e63is' reception of \u015aruti \u2014 both are valid hearing-knowledge events.\n\n## B\u1e5bhad\u0101ra\u1e47yaka's Formulation\n\nThe locus classicus is B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 2.4.5, where Y\u0101j\u00f1avalkya instructs Maitrey\u012b:\n> \"\u0100tm\u0101 v\u0101 are dra\u1e63\u1e6davya\u1e25, \u015brotavya\u1e25, mantavya\u1e25, nididhy\u0101sitavya\u1e25\" \u2014 \"The \u0100tman must be seen, must be heard (\u015arava\u1e47a), must be reflected upon (Manana), must be deeply internalized (Nididhy\u0101sana).\"\n\nThe triad appears here in the passive-imperative form (*vya* suffix) \u2014 these are not optional practices but the prescribed means for liberating knowledge.\n\n## The Epistemological Structure\n\n\u015arava\u1e47a's function is to present the Upani\u1e63adic teaching as \u015aabda-pram\u0101\u1e47a \u2014 verbal testimony that constitutes a valid means of direct knowledge. In the Ved\u0101ntic epistemology established in v0.3 of this series:\n\n- Pratyak\u1e63a (perception) cannot deliver Brahma-j\u00f1\u0101na \u2014 Brahman is not an object\n- Anum\u0101na (inference) cannot deliver it either \u2014 inference operates from prior perceptions and moves by analogy; Brahman is without analogue\n- \u015aabda (testimony) \u2014 specifically Upani\u1e63adic testimony received from a Guru \u2014 is the one pram\u0101\u1e47a calibrated to deliver knowledge of what transcends ordinary experience\n\n\u015arava\u1e47a is the activation of this pram\u0101\u1e47a. It does not produce the knowledge by itself (that requires Manana and Nididhy\u0101sana); it delivers the testimony in the conditions under which the testimony can function.\n\n## The Guru's Role\n\nThe Guru is not a conduit who amplifies the text. The Guru performs the *antavy\u0101pti* \u2014 the application of the Upani\u1e63adic teaching to the student's specific confusions. When a student hears \"Tat Tvam Asi\" and immediately wonders \"but I feel finite \u2014 how can I be Brahman?\", the Guru's response is not a second recitation of the text but a targeted dismantling of the doubt. This is why \u015arava\u1e47a cannot be replaced by reading.\n\n## Qualification for \u015arava\u1e47a\n\nAdvaita tradition specifies the preparatory disciplines (S\u0101dhana Catu\u1e63\u1e6daya) that make a student fit for \u015arava\u1e47a: Viveka (discrimination between the permanent and the impermanent), Vair\u0101gya (dispassion), \u1e62a\u1e6dsampat (the six virtues, including \u015aama and Dama), and Mumuk\u1e63utva (yearning for liberation). These are not gatekeeping criteria but conditions that determine whether the \u015aabda-pram\u0101\u1e47a event can deliver its content without distortion by prior sa\u1e43sk\u0101ras.\n\n## Audience Metaphor\n\nA doctor can give a diagnosis in a crowded waiting room, but it lands differently when given in a quiet consultation where the patient has come specifically to hear it, has already done the preliminary tests, and is ready to act on what they learn. The same words; completely different epistemological conditions. \u015arava\u1e47a is the second scenario \u2014 the conditions under which testimony lands as knowledge rather than as information.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 2.4.5 \u2014 Y\u0101j\u00f1avalkya's formulation; see [references/brhadaranyaka-upanishad.md]\n2. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.4 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 \u015aabda as the pram\u0101\u1e47a for Brahma-j\u00f1\u0101na; see [references/brahmasutra-bhashya.md]\n3. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 364\u2013366 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the triad in relation to liberation; see [references/vivekachudamani.md]\n4. Upadesas\u0101hasr\u012b 1.1 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Guru's instruction as condition for \u015arava\u1e47a; see [references/upadesasahasri.md]", "concepts/sushupti": "# Su\u1e63upti \u2014 \u0938\u0941\u0937\u0941\u092a\u094d\u0924\u093f\n\n**Not:** unconsciousness, anesthesia, ignorance, liberation or Sam\u0101dhi\n\n## Source\n\nSu\u1e63upti is analyzed in M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad verse 5. The experiencer in deep sleep is Pr\u0101j\u00f1a (\u092a\u094d\u0930\u093e\u091c\u094d\u091e) \u2014 \"the one who knows\" \u2014 from Praj\u00f1\u0101 (wisdom, awareness), referring to the J\u012bva in its most contracted experiential state, resting in the Causal Body (K\u0101ra\u1e47a \u015aar\u012bra). Su\u1e63upti from *su-svap* \u2014 to sleep deeply.\n\n## The Deep Sleep State's Structure\n\nIn Su\u1e63upti:\n- **Instrument**: K\u0101ra\u1e47a \u015aar\u012bra (causal body) \u2014 the undifferentiated \u0100nandamaya Ko\u1e63a\n- **Field**: No objects \u2014 the object-field is fully withdrawn\n- **Experiencer**: Pr\u0101j\u00f1a \u2014 described by the M\u0101\u1e47\u1e0d\u016bkya as *\u0101nandabhuj* (enjoyer of bliss) and *ceto-mukha* (with the mind-door closed)\n\n## The Philosophical Significance of Su\u1e63upti\n\nSu\u1e63upti carries three distinct arguments for the Advaita position:\n\n**1. The Persistence of the S\u0101k\u1e63in**: On waking from deep sleep, the person reports: \"I slept well; I was happy; I knew nothing.\" This retrospective report is possible only if some awareness was present to record it. That awareness is the S\u0101k\u1e63in \u2014 it witnessed Su\u1e63upti even when Pr\u0101j\u00f1a had no object to experience. This witness is not Pr\u0101j\u00f1a itself; it is Tur\u012bya.\n\n**2. The Nature of \u0100nanda**: The bliss of deep sleep is not caused by any object \u2014 there are no objects present. Advaita uses this as evidence that \u0100nanda is Brahman's intrinsic nature, not a quality produced by the presence of pleasant objects. The Su\u1e63upti experience offers a foretaste of the \u0100nanda that the recognition \"Aha\u1e43 Brahm\u0101smi\" makes permanent and unobstructed.\n\n**3. The Dissolution of the Ego**: In Su\u1e63upti, the Aha\u1e43k\u0101ra (ego-sense) dissolves completely \u2014 yet the person wakes up as themselves, not as someone else. This shows that the ego is not the \u0100tman \u2014 the \u0100tman persists through the ego's temporary absence.\n\n## The Limit of Su\u1e63upti\n\nSu\u1e63upti is not liberation because on waking, everything returns \u2014 the ego, the object-world, the sa\u1e43sk\u0101ras. The Pr\u0101j\u00f1a of Su\u1e63upti does not know \"I am Brahman\" in the liberated sense; it simply has no objects at all. The liberation that Advaita seeks is the *recognition* of the non-dual nature even while functioning in waking and dream \u2014 the permanent Tur\u012bya-awareness that does not require the absence of objects to be present.\n\n## Connection to \u0100nandamaya Ko\u1e63a\n\nThe Taittir\u012bya Upani\u1e63ad's Pa\u00f1cako\u015ba analysis (see anandamaya-kosha.md) identifies the \u0100nandamaya Ko\u1e63a (bliss sheath) as the deepest layer of apparent individuality, correlated with the Su\u1e63upti state. The Pr\u0101j\u00f1a experiencer in Su\u1e63upti operates through this sheath. The \u0100nandamaya Ko\u1e63a is the nearest layer to \u0100tman but is still an Up\u0101dhi \u2014 not the \u0100tman itself.\n\n## Audience Metaphor\n\nA traveler on a long journey stops at a rest house. While resting, they are unaware of the road, the destination, the luggage. When they wake and resume travel, everything is exactly as before. The rest was real and beneficial; the traveler was real throughout; but the road-awareness was temporarily suspended. Su\u1e63upti is that rest-stop \u2014 the witness (the traveler's identity) was never absent, but all the content of the journey was temporarily set aside.\n\n## Citations\n\n1. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 5 \u2014 Su\u1e63upti and Pr\u0101j\u00f1a; see [references/mandukya-upanishad.md]\n2. M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 1.9\u201314 (Gau\u1e0dap\u0101da) \u2014 analysis of the deep-sleep state; see [references/mandukya-karika.md]\n3. Taittir\u012bya Upani\u1e63ad 2.5 \u2014 \u0100nandamaya Ko\u1e63a as the causal sheath corresponding to Su\u1e63upti; see [references/taittiriya-upanishad.md]\n4. Pa\u00f1cada\u015b\u012b 7.1\u201310 (Vidy\u0101ra\u1e47ya) \u2014 witness of Su\u1e63upti as evidence for S\u0101k\u1e63in; see [references/panchadashi.md]", "concepts/svapna": "# Svapna \u2014 \u0938\u094d\u0935\u092a\u094d\u0928\n\n**Not:** illusion, the unconscious, inferior state\n\n## Source\n\nSvapna is analyzed in M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad verse 4. The experiencer in the dream state is Taijasa (\u0924\u0948\u091c\u0938) \u2014 \"the luminous one\" \u2014 from Tejas (light, radiance), referring to the J\u012bva in its inward orientation through the subtle body. Svapna from the root *svap* \u2014 to sleep, to dream.\n\n## The Dream State's Structure\n\nIn Svapna:\n- **Instrument**: S\u016bk\u1e63ma \u015aar\u012bra (subtle body) \u2014 the Pr\u0101\u1e47as and the inner instruments (Manas, Buddhi, Aha\u1e43k\u0101ra, Citta)\n- **Field**: S\u016bk\u1e63ma objects \u2014 dream images, which are modifications of the subtle body itself\n- **Experiencer**: Taijasa \u2014 the J\u012bva identified with the subtle body, directed inward (Anta\u1e25praj\u00f1a)\n\n## The Three-Level Reality in Svapna\n\nAdvaita's three-truth framework applies directly here:\n- **Pr\u0101tibh\u0101sika** (apparent reality): dream objects are real while the dream is occurring \u2014 the dream fire burns, the dream flight is exhilarating\n- **Vy\u0101vah\u0101rika** (conventional reality): on waking, dream objects are sublated \u2014 \"it was only a dream\"; waking objects replace them as the operative reality\n- **P\u0101ram\u0101rthika** (ultimate reality): both dream and waking objects, from the perspective of Brahma-j\u00f1\u0101na, are modifications appearing within Brahman\n\n## Why Svapna Is Philosophically Important\n\nThe dream state provides the clearest demonstration that the mind can construct an entire coherent world of objects from within itself, without any external input. While dreaming, the dreamer does not know they are dreaming \u2014 the experience is as convincing as waking. This has two implications:\n\n1. **For M\u0101y\u0101 analysis**: If the mind can project an entire world without external material in dream, the Ved\u0101ntic argument for the waking world's appearance-status (Vivartav\u0101da) becomes less counterintuitive. The waking world may similarly be a more stable and persistent projection within Brahman-consciousness.\n\n2. **For the witness inquiry**: In dream, the gross body is inoperative \u2014 yet experience continues. This proves that the witness of experience is not the gross body. The investigation uses this as evidence that the S\u0101k\u1e63in is subtler than the gross body.\n\n## Audience Metaphor\n\nA movie director watching their own film gets fully immersed \u2014 the fear is real, the joy is real \u2014 while the screen and projector remain unchanged behind the experience. When the film ends (waking up), the director remembers: \"Those characters were in my film.\" Neither the immersion nor the remembering erases what actually happened. Svapna is like the immersive experience: fully real in its domain, retrospectively recognized as a production.\n\n## Citations\n\n1. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 4 \u2014 Svapna and Taijasa; see [references/mandukya-upanishad.md]\n2. M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 1.6\u20138 (Gau\u1e0dap\u0101da) \u2014 dream and waking as structurally parallel; see [references/mandukya-karika.md]\n3. Pa\u00f1cada\u015b\u012b 1.16\u201325 (Vidy\u0101ra\u1e47ya) \u2014 Pr\u0101tibh\u0101sika reality of dream and its implications for M\u0101y\u0101; see [references/panchadashi.md]", "concepts/tat-tvam-asi": "# Tat Tvam Asi \u2014 \u0924\u0924\u094d \u0924\u094d\u0935\u092e\u094d \u0905\u0938\u093f\n\n**Not:** \"you are the universe,\" divine spark, panentheism, affirmation, inferential hypothesis\n\n## Source and Context\n\nTat Tvam Asi appears nine times in Ch\u0101ndogya Upani\u1e63ad 6.8.7 through 6.16.3, in the dialogue between Udd\u0101laka \u0100ru\u1e47i and his son \u015avetaketu. After a series of analogies (salt dissolved in water; the river flowing into the ocean; the tree and its essence), Udd\u0101laka concludes each section with the refrain *tat tvam asi, \u015avetaketo* \u2014 \"That thou art, O \u015avetaketu.\" The repetition is pedagogical: each analogy prepares the mind for a deeper layer of the same recognition.\n\nTat = that (referring to Brahman, the ground established in the prior teaching); Tvam = thou (addressing the student directly); Asi = art (the copula asserting non-difference).\n\n## \u015aa\u1e45kara's Interpretive Method: Jahadajahallak\u1e63a\u1e47\u0101\n\nTat Tvam Asi presents a surface difficulty: \"Tat\" (Brahman, infinite, without attributes) appears contradictory with \"Tvam\" (the apparent individual, finite, conditioned). A literal reading (jahallak\u1e63a\u1e47\u0101) that drops the literal meanings of both terms collapses the teaching. A literal reading that keeps both produces contradiction.\n\n\u015aa\u1e45kara's solution is jahadajahallak\u1e63a\u1e47\u0101 \u2014 indirect indication that drops the secondary (contradictory) aspects of both terms while retaining their essential reference. \"Tat\" drops its aspect of being the cosmic cause (Sagu\u1e47a) and retains its essential referent: pure consciousness. \"Tvam\" drops its aspect of being the body-mind individual (J\u012bva-Aha\u1e43k\u0101ra) and retains its essential referent: the witness awareness (S\u0101k\u1e63in). These two essential referents are then shown to be one.\n\nThis is the most technically precise of the four Mah\u0101v\u0101kya interpretations and the most misunderstood in popular accounts.\n\n## What the Statement Does Not Say\n\nIt does not say that \u015avetaketu's personality, memories, desires, or body are Brahman. Those are modifications appearing within Brahman \u2014 like waves in the ocean \u2014 but the Mah\u0101v\u0101kya points to the ocean, not the waves.\n\nIt does not say that Brahman is distributed among individuals in portions. Brahman is indivisible (akhanda). The apparent individuality is an Up\u0101dhi \u2014 a limiting adjunct \u2014 not a portion.\n\n## Distinctive Among the Four Mah\u0101v\u0101kyas\n\nTat Tvam Asi is the only one addressed in the second person \u2014 Guru to student. This is the pedagogical Mah\u0101v\u0101kya par excellence: it is the teacher pointing directly at the student's own nature in the moment of teaching. The directness of this address is why Ved\u0101ntic tradition regards Tat Tvam Asi as the defining example of the Mah\u0101v\u0101kya as a transmissive event.\n\n## Audience Metaphor\n\nA man raised in an orphanage discovers documentation proving his biological heritage. When he reads the document, it does not tell him something that was previously untrue \u2014 it points to what was always true about his origin. The document does no work beyond the moment of recognition; what follows is simply living from that knowledge. Tat Tvam Asi is that document \u2014 not a new fact, but a recognition of origin.\n\n## Citations\n\n1. Ch\u0101ndogya Upani\u1e63ad 6.8.7\u20136.16.3 \u2014 source text; repeated dialogue of Udd\u0101laka and \u015avetaketu; see [references/chandogya-upanishad.md]\n2. Brahmas\u016btra Bh\u0101\u1e63ya 1.1.4 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 jahadajahallak\u1e63a\u1e47\u0101 as interpretive method; see [references/brahmasutra-bhashya.md]\n3. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 256\u2013257 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Mah\u0101v\u0101kya in pedagogical sequence; see [references/vivekachudamani.md]", "concepts/turiya": "# Tur\u012bya \u2014 \u0924\u0941\u0930\u0940\u092f\n\n**Not:** a fourth state, Sam\u0101dhi, unconscious void, enlightenment-as-event, equivalent to Su\u1e63upti\n\n## Etymology\n\nTur\u012bya (\u0924\u0941\u0930\u0940\u092f) from *tur-* (the root of \"four\" in Sanskrit, as in *catur*) with the ordinal suffix *-iya*. It means \"the fourth\" \u2014 but this is a pedagogical name, not a description of its nature. It is called \"the fourth\" in the sequence of the M\u0101\u1e47\u1e0d\u016bkya's analysis; it is not a fourth experiential state.\n\n## The M\u0101\u1e47\u1e0d\u016bkya's Description\n\nM\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 7:\n> *na anta\u1e25praj\u00f1am, na bahi\u1e63praj\u00f1am, na ubhayata\u1e25praj\u00f1am, na praj\u00f1\u0101naghana\u1e43, na praj\u00f1am, na apraj\u00f1am* \u2014 \"not inward-conscious (as Svapna), not outward-conscious (as J\u0101grat), not conscious in both directions, not a mass of consciousness (as Su\u1e63upti's Pr\u0101j\u00f1a), not conscious, not unconscious.\"\n\nThis is Neti Neti applied to the witness itself: after negating all three states and their experiencers, the Upani\u1e63ad arrives at a description that can only be given through negation. What remains is:\n> *ad\u1e5b\u1e63\u1e6dam avyavah\u0101ryam agr\u0101hyam alak\u1e63a\u1e47am acintyam avyapade\u015byam ek\u0101tmapratyayas\u0101ra\u1e43 prapa\u00f1copa\u015bama\u1e43 \u015b\u0101nta\u1e43 \u015bivam advaita\u1e43 caturtha\u1e43 manyante sa \u0101tm\u0101 sa vij\u00f1eya\u1e25* \u2014 \"unseen, not transactable, ungraspable, uncharacterizable, unthinkable, unnameable, the essence of the cognition of the one \u0100tman, in which the phenomenal world is stilled, peaceful, auspicious, non-dual \u2014 this is considered the fourth. This is the \u0100tman. This is to be known.\"\n\n## What \"The Ground of All Three States\" Means\n\nIn waking: Vi\u015bva experiences gross objects. Behind Vi\u015bva \u2014 the awareness in which Vi\u015bva appears \u2014 is Tur\u012bya.\nIn dream: Taijasa experiences subtle objects. Behind Taijasa \u2014 Tur\u012bya.\nIn deep sleep: Pr\u0101j\u00f1a experiences bliss without objects. Behind Pr\u0101j\u00f1a \u2014 Tur\u012bya.\n\nTur\u012bya is not sequentially behind them (as if it appears when they are done). It is their simultaneous ground \u2014 present in all three, unchanged by any of them.\n\nThe retrospective report from Su\u1e63upti (\"I knew nothing; I was happy\") proves this point: the knower of \"I knew nothing\" was present even in deep sleep. That knower is not Pr\u0101j\u00f1a (Pr\u0101j\u00f1a had no objects). It is Tur\u012bya.\n\n## Tur\u012bya and the Mah\u0101v\u0101kya\n\nAyam \u0100tm\u0101 Brahma \u2014 \"this self is Brahman\" \u2014 uses the nearest demonstrative \"Ayam\" (this). The referent of \"Ayam \u0100tm\u0101\" is precisely Tur\u012bya: the witness right here, most immediately present, that the M\u0101\u1e47\u1e0d\u016bkya has just disclosed through the three-states analysis. The Mah\u0101v\u0101kya names it Brahman. The identity is complete.\n\n## Tur\u012bya and J\u012bvanmukti\n\nThe J\u012bvanmukta is not someone who perpetually resides in a Su\u1e63upti-like state (which would prevent functioning). They are someone for whom Tur\u012bya is recognized as their actual identity \u2014 functioning in waking and dream and deep sleep, but without mistaking any state-bound experiencer (Vi\u015bva, Taijasa, Pr\u0101j\u00f1a) as the \u0100tman.\n\n## Audience Metaphor\n\nA cinema screen is present in every scene of every film shown on it. When the film shows a fire, the screen is not burned. When it shows darkness, the screen is not darkened. When it shows a crowd, the screen is not crowded. The screen does not appear in the scenes \u2014 it is their ground. Tur\u012bya is the screen of consciousness: not visible as an object in any state, not affected by any state's content, but without it no state could appear.\n\n## Citations\n\n1. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 7 \u2014 the description of Tur\u012bya; see [references/mandukya-upanishad.md]\n2. M\u0101\u1e47\u1e0d\u016bkya K\u0101rik\u0101 1.7\u201316 (Gau\u1e0dap\u0101da) \u2014 Tur\u012bya as the ground; Aj\u0101tiv\u0101da; see [references/mandukya-karika.md]\n3. Pa\u00f1cada\u015b\u012b 7.1\u201310 (Vidy\u0101ra\u1e47ya) \u2014 witness consciousness and Tur\u012bya; see [references/panchadashi.md]\n4. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 316\u2013322 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 S\u0101k\u1e63in and Tur\u012bya; see [references/vivekachudamani.md]", "concepts/upadhi": "# Up\u0101dhi \u2014 \u0909\u092a\u093e\u0927\u093f\n\n**Not:** illusion, veil covering the self, ego\n\n## Etymology\n\nUp\u0101dhi (\u0909\u092a\u093e\u0927\u093f) from upa (near, under) + dh\u0101 (to place). That which is placed near or underneath \u2014 a condition or constraint placed in proximity to something, which affects how that thing appears without modifying its nature. In Sanskrit grammar, Up\u0101dhi is a condition added to a general rule to specify exceptions; in logic, it is an unwanted condition that invalidates a proposed inference. In Ved\u0101nta, it is the superimposed limiting condition that makes the unlimited \u0100tman appear limited.\n\n## The Crystal Analogy\n\nThe standard Ved\u0101ntic illustration (found in Vivekac\u016b\u1e0d\u0101ma\u1e47i and Pa\u00f1cada\u015b\u012b): a crystal (spatika) is colorless. Place a red flower near it \u2014 the crystal appears red. Ask: has the crystal become red? No \u2014 remove the flower and the crystal is again clearly colorless. The red was the flower's color appearing in and through the crystal due to proximity. Yet the redness was real while the flower was there \u2014 not a hallucination.\n\nThe \u0100tman is the crystal. The body-mind complex is the flower. The body's characteristics (mortality, weight, gender, hunger, pain) appear to belong to the \u0100tman because the \u0100tman is the consciousness in which they appear. When the Up\u0101dhi-identification (the Adhy\u0101sa) is dissolved through J\u00f1\u0101na, the \u0100tman is seen to be as it always was \u2014 unlimited, untouched, without the Up\u0101dhi's characteristics.\n\n## The Hierarchy of Up\u0101dhis\n\nAdvaita analyzes the apparent individual (J\u012bva) through three concentric Up\u0101dhis, each subtler than the one outside it:\n\n| Up\u0101dhi | Sanskrit | Contents |\n|--------|----------|----------|\n| Gross body | Sth\u016bla \u015aar\u012bra | Physical body; Annamaya Ko\u1e63a |\n| Subtle body | S\u016bk\u1e63ma \u015aar\u012bra | Pr\u0101\u1e47amaya + Manomaya + Vij\u00f1\u0101namaya Ko\u1e63as; 17 elements |\n| Causal body | K\u0101ra\u1e47a \u015aar\u012bra | \u0100nandamaya Ko\u1e63a; the Su\u1e63upti vehicle |\n\nThe \u0100tman, appearing through all three bodies, is called the J\u012bva. The J\u012bva is \u0100tman + Up\u0101dhi. Liberation (J\u012bvanmukti) is not the \u0100tman becoming free \u2014 it is the recognition that the \u0100tman was never the J\u012bva, never the Up\u0101dhi, never limited.\n\n## Up\u0101dhi and the Mah\u0101v\u0101kya\n\nThe Mah\u0101v\u0101kya \"Aham Brahm\u0101smi\" \u2014 \"I am Brahman\" \u2014 requires identifying \"Aham\" (I) with \"Brahman.\" But the apparent \"I\" is the J\u012bva (\u0100tman + Up\u0101dhi). The Up\u0101dhi must be discounted: the \"I\" referred to in the Mah\u0101v\u0101kya is not the \"I\" identified with the body-mind complex; it is the \u0100tman as it is without the Up\u0101dhi. Jahadajahallak\u1e63a\u1e47\u0101 (the indirect indication method used to interpret Tat Tvam Asi) achieves exactly this: it sets aside the Up\u0101dhi-aspects of both \"Tat\" (Brahman-through-M\u0101y\u0101) and \"Tvam\" (\u0100tman-through-Up\u0101dhi) to reveal the identity of the two at the P\u0101ram\u0101rthika level.\n\n## The Up\u0101dhi Principle in Practice\n\nThe Neti Neti method (BU 2.3.6) applies Up\u0101dhi reasoning systematically: \"not this body\" (not the Sth\u016bla \u015aar\u012bra Up\u0101dhi); \"not these pr\u0101\u1e47as\" (not the Pr\u0101\u1e47amaya Ko\u1e63a Up\u0101dhi); \"not this mind\" (not the Manomaya Ko\u1e63a Up\u0101dhi); \"not this intellect\" (not the Vij\u00f1\u0101namaya Ko\u1e63a Up\u0101dhi); \"not this bliss-sheath\" (not the \u0100nandamaya Ko\u1e63a Up\u0101dhi). What remains after the complete Neti Neti is the \u0100tman without any Up\u0101dhi \u2014 which is Brahman.\n\n## Audience Metaphor\n\nA microphone placed near a speaker produces feedback \u2014 the speaker's sound enters the microphone and gets amplified, which re-enters the microphone, creating a loop. The sound appears to be coming from the speaker and the microphone together. But the microphone is not the source of the sound; it is the nearby instrument that picked up and amplified a signal. The proximity created the appearance of sound-production. Remove the proximity (or break the feedback loop) and the microphone returns to silence \u2014 its original nature. The Up\u0101dhi is that proximity: it creates the appearance that the body's properties belong to the \u0100tman. J\u00f1\u0101na breaks the feedback loop.\n\n## Citations\n\n1. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 118\u2013127 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 Up\u0101dhi and the three bodies; crystal analogy; see [references/vivekachudamani.md]\n2. Pa\u00f1cada\u015b\u012b 3.1\u201315 (Vidy\u0101ra\u1e47ya) \u2014 Up\u0101dhi of Brahman in creation; see [references/panchadashi.md]\n3. Ved\u0101ntas\u0101ra 60\u201368 (Sad\u0101nanda) \u2014 systematic analysis of Up\u0101dhi; see [references/vedantasara.md]\n4. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 2.3.1\u20136 \u2014 the two forms of Brahman (mortal/immortal) as proto-Up\u0101dhi analysis; see [references/brhadaranyaka-upanishad.md]", "concepts/videhamukti": "# Videhamukti \u2014 \u0935\u093f\u0926\u0947\u0939\u092e\u0941\u0915\u094d\u0924\u093f\n\n**Not:** conventional death, heaven or afterlife realm, superior liberation to J\u012bvanmukti\n\n## Etymology\n\nVideha (\u0935\u093f\u0926\u0947\u0939) = without body (vi = without + deha = body); Mukti (\u092e\u0941\u0915\u094d\u0924\u093f) = liberation. Videhamukti = bodyless liberation \u2014 the liberation in which there is no longer any body serving as Pr\u0101rabdha vehicle.\n\n## The Relationship to J\u012bvanmukti\n\nAdvaita presents J\u012bvanmukti and Videhamukti not as two different liberations but as the same liberation in two phases:\n\n| Aspect | J\u012bvanmukti | Videhamukti |\n|--------|------------|-------------|\n| J\u00f1\u0101na (knowledge) | Complete | Complete |\n| Sa\u00f1cita Karma | Destroyed | Destroyed |\n| \u0100g\u0101min Karma | Stopped | Stopped |\n| Pr\u0101rabdha Karma | Running out | Exhausted |\n| Body | Present (Pr\u0101rabdha vehicle) | Dissolved |\n| Location of \u0100tman | Brahman | Brahman |\n\nThe only difference is the presence or absence of the Pr\u0101rabdha body. The Brahma-j\u00f1\u0101na is complete and identical in both cases.\n\n## The Brahmas\u016btra Treatment\n\nBrahmas\u016btras 4.1.12\u201319 address the question: if J\u00f1\u0101na has arisen and the J\u012bva knows itself to be Brahman, why does the body continue? The answer given (and elaborated by \u015aa\u1e45kara in the Bh\u0101\u1e63ya) is Pr\u0101rabdha: Karma already in motion producing this body cannot be reversed by J\u00f1\u0101na. The J\u012bvanmukta experiences the world through the Pr\u0101rabdha body without being bound \u2014 the fire continues to give light and heat even after the wood that fed it is fully consumed and no more wood is added.\n\nWhen the Pr\u0101rabdha exhausts itself, the body is relinquished. This is Videhamukti.\n\n## What Happens at Videhamukti\n\nThe B\u1e5bhad\u0101ra\u1e47yaka (4.4.6) states: *brahmaiva san brahm\u0101pyeti* \u2014 \"being Brahman alone, one merges into Brahman.\" The J\u012bvanmukta who was already Brahman (in recognition) now has the Pr\u0101rabdha vehicle dissolved. There is no J\u012bva remaining. There is no \"going\" because there is no separate entity to travel. The wave-metaphor: the wave that was the J\u012bvanmukta completes its motion and the water (which was always the ocean) is simply the ocean without the wave-form.\n\n## The Question of Post-Videhamukti Awareness\n\nA subtle question: is there awareness after Videhamukti? Advaita's answer is careful: individual awareness (which requires the Up\u0101dhi of a S\u016bk\u1e63ma \u015aar\u012bra to function) does not persist. But Brahman's Cit (pure consciousness) is not created or destroyed by any individual's liberation \u2014 it is eternal. The J\u012bvanmukta's apparent individual awareness was always Brahman's Cit appearing through an Up\u0101dhi. At Videhamukti, the Up\u0101dhi dissolves; Brahman's Cit remains as it always was.\n\nThis is why Advaita does not describe Videhamukti as \"annihilation\" (a common misreading): the J\u012bva that appeared to exist dissolves as an appearance \u2014 Brahman, which it always was, continues.\n\n## Traditions That Accept Only Videhamukti\n\nDvaita Ved\u0101nta (Madhva) does not accept J\u012bvanmukti: liberation requires the soul to reach Vaiku\u1e47\u1e6dha (Vi\u1e63\u1e47u's abode), which cannot occur while embodied. For Dvaita, Mok\u1e63a is inherently post-mortem and location-specific. This reflects the fundamental ontological difference: Dvaita maintains the eternal distinction between the individual J\u012bva and Brahman (Vi\u1e63\u1e47u), so liberation is a relationship between two distinct realities in a transcendent realm \u2014 not a recognition of identity.\n\n## Audience Metaphor\n\nA river runs from the mountains to the sea. While flowing, the river has its own name, its own banks, its own character \u2014 J\u012bvanmukti is when the river recognizes it is water and has always been water, not \"river-substance.\" Videhamukti is when the river reaches the sea and the banks (Pr\u0101rabdha) dissolve. The water that was the river is now the ocean. The river-name ceases; the water does not cease. Neither the flowing (J\u012bvanmukti) nor the sea-entry (Videhamukti) is \"more water\" \u2014 the water was complete at every point.\n\n## Citations\n\n1. Brahmas\u016btra 4.1.12\u201319 with \u015aa\u1e45kara Bh\u0101\u1e63ya \u2014 Pr\u0101rabdha and the continuation of the body post-J\u00f1\u0101na; see [references/brahmasutra-bhashya.md]\n2. Vivekac\u016b\u1e0d\u0101ma\u1e47i vv. 564\u2013580 (\u015aa\u1e45kar\u0101c\u0101rya) \u2014 the J\u012bvanmukta and what remains at Videhamukti; see [references/vivekachudamani.md]\n3. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 4.4.6 \u2014 \"brahmaiva san brahm\u0101pyeti\"; see [references/brhadaranyaka-upanishad.md]\n4. J\u012bvanmuktiviveka (Vidy\u0101ra\u1e47ya) \u2014 the full treatment of both J\u012bvanmukti and Videhamukti; see [references/jivanmuktiviveka.md]", "references/aitareya-upanishad": "# Aitareya Upani\u1e63ad \u2014 \u0910\u0924\u0930\u0947\u092f \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\nPart of the Aitareya \u0100ra\u1e47yaka (\u1e5agveda). Contains the \u1e5agvedic Mah\u0101v\u0101kya: Praj\u00f1\u0101nam Brahma (Aitareya 3.3). The Upani\u1e63ad treats the origin of creation, the nature of the individual, and the identity of the knowing-consciousness with Brahman.\n\n## Key Passage for Bundle Concepts\n\n**Aitareya 3.3** (Praj\u00f1\u0101nam Brahma):\n\n*praj\u00f1\u0101nam brahma* \u2014 \"Consciousness is Brahman.\"\n\nThe context: after treating the creation of the universe, the organs of the body, and the \u0100tman, the text asks: \"What is this that we worship as the \u0100tman?\" The answer enumerates all functions \u2014 perception, hearing, smelling, speaking, tasting \u2014 and concludes with the statement that all these are functions of consciousness (Praj\u00f1\u0101na). The final verse: \"These are all Consciousness. The world is supported by Consciousness. Consciousness is Brahman (Praj\u00f1\u0101nam Brahma).\"\n\n## Svar\u016bpa Lak\u1e63a\u1e47a Function\n\nThe Mah\u0101v\u0101kya Praj\u00f1\u0101nam Brahma is the Svar\u016bpa Lak\u1e63a\u1e47a for the self-luminous nature of Brahman \u2014 pointing not to Brahman as world-creator (Ta\u1e6dastha Lak\u1e63a\u1e47a) but as the knowing-nature that is Brahman's own being.\n\n## Recommended Editions\n\n- Gambh\u012br\u0101nanda translation (Advaita Ashrama \u2014 included in Eight Upanishads)\n- Nikhilananda translation (Ramakrishna-Vivekananda Center)", "references/aparokshanubhuti": "# Aparok\u1e63\u0101nubh\u016bti \u2014 \u0905\u092a\u0930\u094b\u0915\u094d\u0937\u093e\u0928\u0941\u092d\u0942\u0924\u093f\n\n\"Direct (non-mediated) experience.\" A short text (144 verses) attributed to \u015aa\u1e45kara on the method of direct \u0100tman recognition. Covers the 15 aids to Yoga, Vic\u0101ra (inquiry), and the nature of direct \u0100tman recognition versus mediated knowledge.\n\n## Key Passages for Bundle Concepts\n\n| Verses | Concept | Content |\n|--------|---------|---------|\n| 12\u201316 | S\u0101k\u1e63in | Direct inquiry into the witness consciousness |\n| 85\u2013100 | Nididhy\u0101sana | The sustained contemplation practice |\n| 115\u2013130 | Brahmabh\u0101van\u0101 | The \"I am Brahman\" recognition as direct knowledge |\n\n## The Title's Significance\n\n\"Aparok\u1e63a\" = not indirect, not mediated; \"Anubh\u016bti\" = experience, recognition. The title contrasts with Parok\u1e63a J\u00f1\u0101na (indirect, inferential, or testimony-based knowledge) \u2014 the kind of knowledge that says \"Brahman exists\" without the direct recognition. The text's concern is precisely the transition from Parok\u1e63a J\u00f1\u0101na (established by \u015arava\u1e47a and Manana) to Aparok\u1e63a J\u00f1\u0101na (the direct recognition stabilized by Nididhy\u0101sana).\n\n## Recommended Editions\n\n- Swami Vimuktananda translation (Advaita Ashrama)\n- Gambh\u012br\u0101nanda (included in some Advaita Ashrama collections)", "references/atmabodha": "# \u0100tmabodha \u2014 \u0906\u0924\u094d\u092e\u092c\u094b\u0927\n\n\"Knowledge of the Self.\" A short text (68 verses) attributed to \u015aa\u1e45kara, designed as a concise primer on Advaita Ved\u0101nta for qualified students. Covers the Pa\u00f1cako\u015ba analysis, the three bodies, the distinction of S\u0101k\u1e63in from the mental apparatus, and the nature of \u0100tman as Sat-Cit-\u0100nanda.\n\n## Key Passages for Bundle Concepts\n\n| Verses | Concept | Content |\n|--------|---------|---------|\n| 15\u201320 | Pa\u00f1cako\u015ba | Analysis of each sheath as An\u0101tman |\n| 24\u201332 | Up\u0101dhi | Three bodies as three Up\u0101dhis; crystal analogy |\n| 33\u201340 | S\u0101k\u1e63in | The \u0100tman as pure witness; unchanged by the states |\n| 55\u201360 | Sat-Cit-\u0100nanda | As the \u0100tman's own nature |\n\n## Format and Pedagogical Use\n\nThe \u0100tmabodha is structured as a sequence of independent propositions (each verse largely self-contained), making it useful as a memorization text and as a structure for systematic Ved\u0101ntic instruction. Monastic teachers often use it as a foundational teaching text before moving students to the Vivekac\u016b\u1e0d\u0101ma\u1e47i or the Brahmas\u016btra Bh\u0101\u1e63ya.\n\nThe Pa\u00f1cako\u015ba analysis (vv. 15\u201320) is particularly concise and clear, covering what the longer Taittir\u012bya Upani\u1e63ad and VCM treat in extended expositions. For this reason, pancha-kosha.md cites the \u0100tmabodha alongside the Taittir\u012bya Upani\u1e63ad.\n\n## Recommended Editions\n\n- Swami Nikhilananda translation (Ramakrishna Math)\n- Raphael translation (Aurea Vidy\u0101)", "references/bhagavad-gita": "# Bhagavad G\u012bt\u0101 \u2014 \u092d\u0917\u0935\u0926\u094d\u0917\u0940\u0924\u093e\n\n\"Song of the Lord.\" 18 chapters, 700 verses. Part of the Mah\u0101bh\u0101rata (Bh\u012b\u1e63maparvan, chapters 23\u201340). One of the three texts of the Prasth\u0101na Tray\u012b (triple foundation of Ved\u0101nta). \u015aa\u1e45kara's commentary (Bh\u0101\u1e63ya) establishes the Advaita reading; R\u0101m\u0101nuja's commentary establishes the Vi\u015bi\u1e63\u1e6d\u0101dvaita reading \u2014 the two interpretations diverge primarily on the nature of the devotee's relationship to Brahman and the role of Karma Yoga as path.\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| BG 2.54\u201372 | J\u012bvanmukti | The Sthitapraj\u00f1a portrait; the J\u012bvanmukta's characteristics |\n| BG 3.17\u201319 | Brahmabh\u0101van\u0101 | Action without agency; \"doing nothing\" from the \u0100tman-standpoint |\n| BG 4.37\u201338 | Brahmabh\u0101van\u0101 | J\u00f1\u0101na burns all Karma; fire-to-fuel simile |\n| BG 13.1\u201335 | S\u0101k\u1e63in | K\u1e63etra / K\u1e63etraj\u00f1a (field / knower of the field); S\u0101k\u1e63in as witness |\n| BG 18.49\u201355 | Jivanmukti | Liberation through non-attachment; the Brahma-bh\u016bta state |\n\n## The Sthitapraj\u00f1a (BG 2.54\u201372)\n\nThe Sthitapraj\u00f1a (\"one established in wisdom\") section is the Bhagavad G\u012bt\u0101's closest approach to a portrait of the J\u012bvanmukta. Arjuna asks: what does a person of stable insight look like, how do they speak, how do they sit, how do they move? K\u1e5b\u1e63\u1e47a's answer describes not an absence of perception or action but a radical shift in the relationship to perception and action \u2014 desire-drops fall off, the mind is not disturbed by sorrows or excited by pleasures, attachment and fear and anger are absent. This is not emotional flatness; it is the exhaustion of Vipar\u012bta-bh\u0101van\u0101.\n\nThe jivanmukti.md file cites this passage as the G\u012bt\u0101's practical portrait of liberation-in-embodied-life. The key point for OKF purposes: the Sthitapraj\u00f1a continues to engage with the world (K\u1e5b\u1e63\u1e47a himself is the prime example) \u2014 this is not withdrawal.\n\n## Karma and J\u00f1\u0101na (BG 4.37\u201338)\n\n\"As fire reduces all fuel to ashes, so the fire of knowledge burns all Karmas to ashes.\" (4.37) This is the G\u012bt\u0101's clearest statement of the three-Karma analysis: J\u00f1\u0101na destroys the accumulated Sa\u00f1cita and (by removing agency) stops the generation of new \u0100g\u0101min, but Pr\u0101rabdha (already burning) continues \u2014 which is why the J\u012bvanmukta still inhabits a body.\n\n## Cross-School Notes\n\nAdvaita (\u015aa\u1e45kara): The G\u012bt\u0101 teaches J\u00f1\u0101na as the supreme path; Karma Yoga and Bhakti are preparatory (Citta-\u015buddhi \u2014 purification of mind). The Brahma-bh\u016bta state (18.54) is identical with Brahman-realization.\n\nVi\u015bi\u1e63\u1e6d\u0101dvaita (R\u0101m\u0101nuja): The G\u012bt\u0101 teaches Bhakti as the supreme path; J\u00f1\u0101na is the form Bhakti takes at its highest intensity. The Brahma-bh\u016bta state is qualified \u2014 the devotee realizes their own Brahman-nature while remaining distinct.\n\n## Recommended Editions\n\n- \u015aa\u1e45kara's Bh\u0101\u1e63ya: Gambh\u012br\u0101nanda translation (Advaita Ashrama)\n- R\u0101m\u0101nuja's commentary: Adidevananda translation (Ramakrishna Math)\n- Swami Nikhilananda (Ramakrishna Math \u2014 scholarly, neutral)\n- W. Johnson translation (Oxford World's Classics \u2014 Penguin for general readers)", "references/brahmasutra-bhashya": "# Brahmas\u016btra Bh\u0101\u1e63ya \u2014 \u092c\u094d\u0930\u0939\u094d\u092e\u0938\u0942\u0924\u094d\u0930 \u092d\u093e\u0937\u094d\u092f\n\n\u015aa\u1e45kara's commentary on the Brahmas\u016btras (Ved\u0101nta S\u016btras) of B\u0101dar\u0101ya\u1e47a. The foundational systematic text of Advaita Ved\u0101nta. The Brahmas\u016btras (c. 200 BCE \u2013 200 CE) consolidate and systematize the Upani\u1e63adic teachings; \u015aa\u1e45kara's Bh\u0101\u1e63ya is the Advaita interpretation. Together with the Upani\u1e63ads and Bhagavad G\u012bt\u0101, the Brahmas\u016btras form the Prasth\u0101na Tray\u012b (triple foundation) of Ved\u0101nta.\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| BSB 1.1.1\u20134 | Lak\u1e63a\u1e47a-Brahman | Definition (Lak\u1e63a\u1e47a) of Brahman; the inquiry begins |\n| BSB 1.1.11 | Sagu\u1e47a Brahman | Sagu\u1e47a Up\u0101san\u0101 and its purpose |\n| BSB 1.2.18\u201320 | Antary\u0101min | Antary\u0101min as Brahman; Advaita reading |\n| BSB 4.1.12\u201319 | Videhamukti | Pr\u0101rabdha Karma and the continuation of the body post-J\u00f1\u0101na |\n\n## The Opening Bh\u0101\u1e63ya (BSB 1.1.1)\n\n\u015aa\u1e45kara's commentary begins with an extended preamble on Adhy\u0101sa (erroneous superimposition) \u2014 the mechanism by which the self is confused with the not-self. This preamble is not part of the S\u016btras themselves but \u015aa\u1e45kara's contribution: the entire project of Ved\u0101ntic inquiry rests on identifying and dissolving Adhy\u0101sa. Every concept in the upanishadic-core bundle \u2014 Up\u0101dhi, the three bodies, Vipar\u012bta-bh\u0101van\u0101, Brahmabh\u0101van\u0101 \u2014 flows from this opening analysis.\n\n## Antary\u0101min Commentary (BSB 1.2.18\u201320)\n\n\u015aa\u1e45kara argues against the reading of Antary\u0101min as the individual J\u012bva (which was proposed by some earlier interpreters). The Antary\u0101min cannot be the individual J\u012bva because the text says the Antary\u0101min is the inner ruler of the mind \u2014 and the individual J\u012bva cannot be the ruler of its own mind (it is subject to the mind's fluctuations). Therefore the Antary\u0101min must be Brahman \u2014 which is consistent with the formula's conclusion \"this is your \u0100tman.\"\n\n## Recommended Editions\n\n- Gambh\u012br\u0101nanda translation (Advaita Ashrama \u2014 2 vols.)\n- Swami Vireshwarananda / Swami Adidevananda (Ramakrishna Math \u2014 with Sanskrit)", "references/brhadaranyaka-upanishad": "# B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad \u2014 \u092c\u0943\u0939\u0926\u093e\u0930\u0923\u094d\u092f\u0915 \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\nThe largest of the major Upani\u1e63ads. Contains the Y\u0101j\u00f1avalkya dialogues \u2014 the most philosophically dense material in the Upani\u1e63adic corpus. Associated with the \u015aukla Yajurveda; forms the concluding portion of the \u015aatapatha Br\u0101hma\u1e47a. Source of the Yajurvedic Mah\u0101v\u0101kya (Aham Brahm\u0101smi) and of the \u015arava\u1e47a-Manana-Nididhy\u0101sana teaching.\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| BU 1.4.10 | Aham Brahm\u0101smi | \"Aham brahm\u0101smi \u2014 In the beginning this [universe] was the \u0100tman alone... He who knows 'I am Brahman' becomes all this\" |\n| BU 2.3.6 | Neti Neti | \"neti neti \u2014 not this, not this\" \u2014 the description of Brahman via negation |\n| BU 2.4.5 | \u015arava\u1e47a-Manana-Nididhy\u0101sana | Y\u0101j\u00f1avalkya to Maitrey\u012b: \"\u0101tm\u0101 v\u0101 are dra\u1e63\u1e6davya\u1e25 \u015brotavyo mantavyo nididhy\u0101sitavya\u1e25\" |\n| BU 3.7.1\u201323 | Antary\u0101min | The inner controller passage; 18-entity formula |\n| BU 3.7.23 | S\u0101k\u1e63in (proto) | \"He who is in consciousness, within consciousness, whom consciousness does not know\" |\n| BU 3.9.26 | Neti Neti | Third appearance: Brahman described exhaustively through negation |\n| BU 4.2.4 | Neti Neti | Second appearance: the \u0100tman in dream is described through Neti Neti |\n| BU 4.4.6 | Videhamukti / J\u012bvanmukti | \"brahmaiva san brahm\u0101pyeti\" \u2014 being Brahman, one goes to Brahman |\n| BU 4.4.22 | Nirgu\u1e47a Brahman | \"vij\u00f1\u0101tara\u1e43 are kena vij\u0101n\u012by\u0101t\" \u2014 by what would you know the knower? |\n\n## The Y\u0101j\u00f1avalkya Dialogues\n\nChapters 3\u20134 contain extended dialogues between Y\u0101j\u00f1avalkya and various interlocutors (G\u0101rg\u012b, Maitrey\u012b, Udd\u0101laka, King Janaka). These constitute the most important philosophical teaching in the Upani\u1e63adic corpus for Advaita Ved\u0101nta. \u015aa\u1e45kara's commentary on the BU is among his most important works.\n\n## BU 2.4.5 \u2014 Full Text of the \u015arava\u1e47a Teaching\n\n*\u0101tm\u0101 v\u0101 are dra\u1e63\u1e6davya\u1e25 \u015brotavyo mantavyo nididhy\u0101sitavya\u1e25* \u2014 \"The \u0100tman must be seen, heard about, reflected upon, and deeply contemplated.\" This single verse establishes the three-stage Ved\u0101ntic method. The context: Y\u0101j\u00f1avalkya is about to leave his household; Maitrey\u012b asks whether wealth can give immortality. He responds that only knowledge of the \u0100tman gives immortality \u2014 and the method for that knowledge is these three stages.\n\n## Recommended Editions\n\n- M\u0101dhav\u0101nanda translation (Advaita Ashrama)\n- Olivelle translation (Oxford World's Classics \u2014 scholarly, with historical context)\n- \u015aa\u1e45kara Bh\u0101\u1e63ya translation by Swami Gambh\u012br\u0101nanda (Advaita Ashrama)", "references/chandogya-upanishad": "# Ch\u0101ndogya Upani\u1e63ad \u2014 \u091b\u093e\u0928\u094d\u0926\u094b\u0917\u094d\u092f \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\nOne of the oldest and longest Upani\u1e63ads. Associated with the S\u0101maveda. Contains the most famous of the Mah\u0101v\u0101kyas: Tat Tvam Asi (That Art Thou), repeated nine times in chapter 6. Also contains the teaching sarvam khalvidam brahma (\"all this is indeed Brahman\") and the Pr\u0101\u1e47ava meditation.\n\n## Key Passages for Bundle Concepts\n\n| Passage | Concept | Content |\n|---------|---------|---------|\n| CU 3.14.1 | Sagu\u1e47a / Nirgu\u1e47a | \"sarvam khalvidam brahma\" \u2014 all this is Brahman |\n| CU 6.2.1 | Sat-Cit-\u0100nanda / Nirgu\u1e47a | \"sad eva somya idam agra \u0101s\u012bt ekam ev\u0101dvit\u012byam\" \u2014 Being alone was this |\n| CU 6.8.7 | Tat Tvam Asi | First occurrence: \"tat tvam asi \u015bvetaketo\" |\n| CU 6.9\u201315 | Tat Tvam Asi | Subsequent occurrences (total 9) with different illustrations |\n\n## The Udd\u0101laka-\u015avetaketu Dialogue\n\nChapter 6 is a sustained dialogue between Udd\u0101laka \u0100ru\u1e47i and his son \u015avetaketu. The teaching uses multiple metaphors: salt dissolved in water (the \u0100tman permeat
