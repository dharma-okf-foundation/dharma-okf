discrimination) has subsided; only the nirodha-sa\u1e43sk\u0101ra persists\n5. **Dharmamegha Sam\u0101dhi** \u2014 the nirodha-sa\u1e43sk\u0101ra itself is dissolved; kaivalya follows\n\n## The Nirodha Sa\u1e43sk\u0101ra (YS 3.9)\n\nParadoxically, the practice of nirodha creates a sa\u1e43sk\u0101ra \u2014 the *nirodha-sa\u1e43sk\u0101ra*. This is the mechanism:\n\n- Each moment of restraint (praty\u0101h\u0101ra, dh\u0101ra\u1e47\u0101, dhy\u0101na, sam\u0101dhi) leaves a nirodha-sa\u1e43sk\u0101ra\n- This nirodha-sa\u1e43sk\u0101ra weakens and eventually outweighs the v\u1e5btti-sa\u1e43sk\u0101ras\n- In asampraj\u00f1\u0101ta sam\u0101dhi, even the nirodha-sa\u1e43sk\u0101ra is dissolved \u2014 *dagdhab\u012bja* (burned seed); no further v\u1e5bttis can arise from any root\n\n## Nirodha Is Not Sleep\n\nPata\u00f1jali explicitly classifies sleep (nidr\u0101) as a v\u1e5btti (YS 1.10) to prevent its confusion with nirodha. Sleep is Tamasic coverage of citta; nirodha is the Sattvic cessation of citta's activity. In sleep, v\u1e5bttis continue (as evidenced by the memory \"I slept deeply\"); in nirodha, no v\u1e5btti arises to form a sa\u1e43sk\u0101ra. In sleep, the separation between Puru\u1e63a and citta is not known; in nirodha, the separation is the very thing revealed.\n\n## Cross-References\n\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 what nirodha is the cessation of\n- [V\u1e5btti](vritti.md) \u2014 the five types whose cessation constitutes nirodha\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 both the material nirodha dissolves (v\u1e5btti-sa\u1e43sk\u0101ras) and what sustained practice creates (nirodha-sa\u1e43sk\u0101ra)\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the refined-v\u1e5btti absorptions that prepare the field for nirodha\n- [Asampraj\u00f1\u0101ta Sam\u0101dhi](asamprajnata-samadhi.md) \u2014 the seedless absorption in which nirodha is fully realized\n- [Praty\u0101h\u0101ra](pratyahara.md) \u2014 withdrawal of senses; the first of the inner limbs; the beginning of concentrated nirodha\n- [Dh\u0101ra\u1e47\u0101](dharana.md) \u2014 binding of citta; the immediate predecessor of dhy\u0101na-sam\u0101dhi-nirodha\n- [Kaivalya](kaivalya.md) \u2014 liberation; what is revealed when nirodha becomes permanent\n\n## Audience Metaphor\n\nNirodha is not turning off the projector. It is recognizing that the screen was always there before the projector was turned on, and will be there when it is turned off. The v\u1e5bttis are the projected images. When they cease, nothing is lost \u2014 the screen (Puru\u1e63a) is revealed. The projector (citta) is not destroyed; it is simply no longer projecting anything. This is why the Yoga tradition specifies that the practitioner abides 'in the nature of the seer' (YS 1.3) \u2014 not in nothingness, but in the natural state of pure witnessing.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.2, 1.12-1.16, 1.51, 3.9-3.10\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.2 and 3.9\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on YS 1.2", "concepts/parinama": "# Pari\u1e47\u0101ma \u2014 \u092a\u0930\u093f\u0923\u093e\u092e\n\n**Not:** change, evolution, progress, development\n\nTransformation \u2014 the mechanism by which one state passes into another within the framework of S\u0101\u1e43khya-Yoga's causation theory (*satk\u0101ryav\u0101da*). In YS 3.9-3.16, Pata\u00f1jali describes three distinct pari\u1e47\u0101ma-s of citta that account for the transformation from ordinary cognition to nirodha sam\u0101dhi. Understanding pari\u1e47\u0101ma is essential for understanding why yoga practice produces sam\u0101dhi \u2014 and why sam\u0101dhi produces kaivalya.\n\n## Etymology\n\n- *pari* \u2014 around, fully, completely, on all sides\n- *\u1e47\u0101ma* \u2014 from \u221a*nam* (to bend, to change, to incline)\n- *pari\u1e47\u0101ma* \u2014 \"complete bending\"; thorough transformation; the passage of a substance from one state into another\n\n## Satk\u0101ryav\u0101da \u2014 The Causal Theory Underlying Pari\u1e47\u0101ma\n\nPata\u00f1jali's transformation-theory rests on the S\u0101\u1e43khya principle of *satk\u0101rya-v\u0101da* \u2014 \"the theory that the effect pre-exists in the cause\":\n\n- The effect (*k\u0101rya*) already exists (*sat*) latently in the cause (*k\u0101ra\u1e47a*) before it becomes manifest\n- Pari\u1e47\u0101ma is not creation ex nihilo but the actualization of what was latent\n- The substance (Prak\u1e5bti or citta) is conserved; only its manifest form (*r\u016bpa*) changes\n- This contrasts with the Buddhist *asatk\u0101rya-v\u0101da* (the effect did not pre-exist in the cause) and Western substance-plus-change models\n\n**Implication for yoga practice:** the nirodha-state of citta is not something created by yoga practice; it is the citta's *natural* state that is progressively revealed as the conditions sustaining v\u1e5btti-generation are removed.\n\n## The Three Pari\u1e47\u0101ma-s of Citta (YS 3.9-3.16)\n\n### 1. Nirodha-Pari\u1e47\u0101ma (YS 3.9) \u2014 The Transformation of Restraint\n\n*vyutth\u0101nanirodhasa\u1e43sk\u0101rayorabhibhavapr\u0101durbh\u0101vau nirodhak\u1e63a\u1e47acitt\u0101nvayo nirodhapari\u1e47\u0101ma\u1e25*\n\n\"Nirodha-pari\u1e47\u0101ma is citta's conjunction with the moment of nirodha through the suppression and appearance of the sa\u1e43sk\u0101ras of arising (vyutth\u0101na) and restraint (nirodha).\"\n\n- Two competing sa\u1e43sk\u0101ra-populations: v\u1e5btti-sa\u1e43sk\u0101ras (that generate new v\u1e5bttis) and nirodha-sa\u1e43sk\u0101ras (that resist v\u1e5btti-generation)\n- Each moment of successful restraint adds to the nirodha-sa\u1e43sk\u0101ra population\n- Nirodha-pari\u1e47\u0101ma is the transformation occurring in that contested moment\n- This is the *mechanism* of meditation practice described at the cognitive level: not mystical, but a concrete structural change in the sa\u1e43sk\u0101ra-distribution of citta\n\n### 2. Sam\u0101dhi-Pari\u1e47\u0101ma (YS 3.11) \u2014 The Transformation into Absorption\n\n*sarv\u0101rthataik\u0101gratayo\u1e25 k\u1e63ayodayau cittasya sam\u0101dhipari\u1e47\u0101ma\u1e25*\n\n\"Sam\u0101dhi-pari\u1e47\u0101ma is the decay of all-objectedness (*sarv\u0101rthat\u0101*) and the rise of one-pointedness (*ek\u0101grat\u0101*) of citta.\"\n\n- Two opposing states: *sarv\u0101rthat\u0101* (citta dispersed across many objects) and *ek\u0101grat\u0101* (citta concentrated on one object)\n- Sam\u0101dhi-pari\u1e47\u0101ma is the transformation from dispersal toward concentration\n- This accounts for the progressive deepening within sampraj\u00f1\u0101ta sam\u0101dhi as one-pointedness strengthens and all-objectedness weakens\n\n### 3. Ek\u0101grat\u0101-Pari\u1e47\u0101ma (YS 3.12) \u2014 The Transformation into Sustained One-Pointedness\n\n*tata\u1e25 puna\u1e25 \u015b\u0101ntoditau tulyapratyayau cittasyaik\u0101grat\u0101pari\u1e47\u0101ma\u1e25*\n\n\"Ek\u0101grat\u0101-pari\u1e47\u0101ma is citta's transformation in which the subsiding and arising cognitive moments are equal.\"\n\n- When the immediately preceding moment (*\u015b\u0101nta* \u2014 subsided) and the immediately arising moment (*udita*) of the citta's object are identical \u2014 when there is no gap, no flickering, no shift between cognitive moments \u2014 ek\u0101grat\u0101 is sustained\n- This \"sameness of successive moments\" is the deep structure of the sam\u0101dhi experience: it is not a single moment of concentration but an unbroken series of identical cognitive moments; the practitioner's experience of time dissolves\n\n## Dharma-Lak\u1e63a\u1e47a-Avasth\u0101 (YS 3.13-3.16)\n\nThese three pari\u1e47\u0101ma-s of citta parallel a more general ontological theory of transformation that applies to all Prak\u1e5btic substances:\n\n- **Dharma-pari\u1e47\u0101ma** \u2014 transformation of the property itself (e.g., gold becoming an ornament)\n- **Lak\u1e63a\u1e47a-pari\u1e47\u0101ma** \u2014 transformation of the time-mark (the same gold-ornament's temporal status: past/present/future)\n- **Avasth\u0101-pari\u1e47\u0101ma** \u2014 transformation of the condition (the ornament's degree of wear: new/worn/old)\n\nThese three apply to all Prak\u1e5btic change \u2014 including the changes in an object of meditation. Understanding them allows the practitioner to see the three-fold nature of any object's transformation: what it is (*dharma*), when it is (*lak\u1e63a\u1e47a*), how worn or new it is (*avasth\u0101*). This is one basis of the samyama-derived perceptions in Vibh\u016bti-P\u0101da.\n\n## Cross-References\n\n- [Nirodha](nirodha.md) \u2014 the nirodha-pari\u1e47\u0101ma is the structural account of how nirodha-practice works in citta\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the sam\u0101dhi-pari\u1e47\u0101ma and ek\u0101grat\u0101-pari\u1e47\u0101ma describe the progression through the sampraj\u00f1\u0101ta stages\n- [Sam\u0101patti](samapatti.md) \u2014 sam\u0101patti describes the cognitive-coloring process; pari\u1e47\u0101ma describes the structural transformation underneath it\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 pari\u1e47\u0101ma theory explains the sa\u1e43sk\u0101ra-competition underlying nirodha-practice\n- [Gu\u1e47a-s](guna.md) \u2014 pari\u1e47\u0101ma is the Gu\u1e47a-rebalancing across stages: Tamas \u2192 Rajas \u2192 Sattva \u2192 Gu\u1e47a-equilibrium (kaivalya)\n- [Prak\u1e5bti](prakriti-yoga.md) \u2014 pari\u1e47\u0101ma is how Prak\u1e5bti operates: constant transformation within conserved substance\n- [Kaivalya](kaivalya.md) \u2014 the final pari\u1e47\u0101ma: when Gu\u1e47a-s have served Puru\u1e63a's purposes and return to equilibrium\n\n## Audience Metaphor\n\nPari\u1e47\u0101ma is like water changing state: liquid water, ice, and steam are not three separate substances \u2014 they are the same H\u2082O in different manifestational forms. The substance (water / Prak\u1e5bti) is conserved; only the manifest form changes. The three citta-pari\u1e47\u0101ma-s describe what happens to the citta-'substance' as it transitions between ordinary cognition, restraint, and absorption \u2014 not three different minds, but one citta in three modes of transformation.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 3.9-3.16\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 3.9-3.16\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) on satk\u0101ryav\u0101da (k\u0101rik\u0101 9-11)\n4. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on the three pari\u1e47\u0101ma-s", "concepts/prakriti-yoga": "# Prak\u1e5bti (Yoga Dar\u015bana) \u2014 \u092a\u094d\u0930\u0915\u0943\u0924\u093f\n\n**Not:** nature, matter, energy, universe, Maya\n\nThe second of the two eternal principles in S\u0101\u1e43khya-Yoga metaphysics. The primordial source of everything that is not pure consciousness \u2014 including all matter, energy, space, time, and crucially: mind, intellect, ego, and memory. Prak\u1e5bti is real, active, and co-eternal with Puru\u1e63a. Its entanglement with Puru\u1e63a produces the appearance of experience; its separation is liberation.\n\n> **Note on file naming:** This file is `prakriti-yoga.md` to distinguish it from any Advaita-context treatment of Prak\u1e5bti. The dharma-foundation v0.1 bundle entry for `prakriti.md` treats Prak\u1e5bti from a Ved\u0101nta perspective. In Yoga Dar\u015bana, Prak\u1e5bti is ontologically real \u2014 not a name for M\u0101y\u0101.\n\n## Etymology\n\n- *pra* \u2014 before, primary, forth\n- *k\u1e5b* \u2014 to make, to do (root of karma)\n- *prak\u1e5bti* \u2014 that which was there before action; the primordial doing-ground; original nature\n\n## Prak\u1e5bti's Three-Gu\u1e47a Constitution\n\nPrak\u1e5bti in its unmanifest state (*avyakta*) is the perfect equilibrium of three fundamental qualities:\n\n| Gu\u1e47a | Quality | Function |\n|------|---------|----------|\n| Sattva | Luminosity, lightness, clarity | Illumination; reflection of consciousness |\n| Rajas | Activity, motion, passion | Energy; transformation; change |\n| Tamas | Inertia, heaviness, obscuration | Stability; resistance; structure |\n\nThese are not \"parts\" of Prak\u1e5bti but interpenetrating modes. When in equilibrium (*s\u0101my\u0101vasth\u0101*), Prak\u1e5bti is unmanifest. Disturbance of this equilibrium \u2014 through the proximity of Puru\u1e63a \u2014 triggers evolution.\n\n## The Evolution of Prak\u1e5bti (S\u0101\u1e43khya-S\u016btra sequence)\n\nFrom undifferentiated Prak\u1e5bti, evolution proceeds in a fixed order:\n\n```\nAvyakta (unmanifest Prak\u1e5bti)\n  \u2193\nMahat / Buddhi (cosmic intelligence / individual intellect)\n  \u2193\nAha\u1e43k\u0101ra (the principle of individuation)\n  \u2193 \u2193\nManas (mind) + Tanm\u0101tr\u0101s (subtle elements) + J\u00f1\u0101nendriyas / Karmendriyas\n                    \u2193\n            Mah\u0101bh\u016btas (five gross elements)\n```\n\nEverything in this chain \u2014 including mind, memory, intellect, and ego \u2014 is Prak\u1e5btic. None of it is Puru\u1e63a. This is what makes asmit\u0101 (the as-if identity of Puru\u1e63a with Buddhi) the specific error Pata\u00f1jali is correcting.\n\n## Pata\u00f1jali's Framework (YS 2.18)\n\n*prak\u0101\u015bakriy\u0101sthiti\u015b\u012bla\u1e43 bh\u016btendriy\u0101tmaka\u1e43 bhogopmok\u1e63\u0101rtha\u1e43 d\u1e5b\u015byam*\n\n\"The seen (*d\u1e5b\u015bya* \u2014 Prak\u1e5bti's domain) has the nature of illumination (*prak\u0101\u015ba*), activity (*kriy\u0101*), and inertia (*sthiti*) \u2014 constituted of elements and senses \u2014 and exists for the purposes of experience (*bhoga*) and liberation (*apavarga*) of the seer.\"\n\nPata\u00f1jali explicitly states Prak\u1e5bti's purpose: it exists *for* Puru\u1e63a \u2014 first to give Puru\u1e63a the experience of its involvement (bhoga), and ultimately to propel Puru\u1e63a toward the recognition of its non-involvement (apavarga / kaivalya).\n\n## Prak\u1e5bti vs. M\u0101y\u0101 \u2014 Critical Distinction\n\n| | Prak\u1e5bti (Yoga Dar\u015bana) | M\u0101y\u0101 (Advaita Ved\u0101nta) |\n|--|----------------------|----------------------|\n| Ontological status | Real, co-eternal with Puru\u1e63a | Appearance; neither real nor unreal |\n| Cognitive instruments | Products of Prak\u1e5bti \u2014 real, though subtle | Appearances within M\u0101y\u0101's projection |\n| Liberation | Prak\u1e5bti and Puru\u1e63a permanently separate | \u0100tman recognizes no Prak\u1e5bti ever really existed |\n| The world | Genuinely produced and real | Superimposed on Brahman, ultimately unreal |\n\nConflating Prak\u1e5bti with M\u0101y\u0101 produces systematic errors: it falsely suggests that Yoga philosophy teaches the world is illusory, which is the Advaita position, not the S\u0101\u1e43khya-Yoga position.\n\n## Cross-References\n\n- [Puru\u1e63a](purusha.md) \u2014 the other eternal principle; pure consciousness that is not Prak\u1e5bti\n- [Gu\u1e47a-s](guna.md) \u2014 the three constitutive qualities of Prak\u1e5bti (Sattva, Rajas, Tamas)\n- [Avidy\u0101 (Yoga)](avidya-yoga.md) \u2014 the misidentification of Puru\u1e63a with Prak\u1e5bti's products\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 the fluctuations of citta, which is itself a Prak\u1e5btic evolute\n- [Kaivalya](kaivalya.md) \u2014 liberation: Puru\u1e63a recognized as permanently distinct from Prak\u1e5bti\n\n## Audience Metaphor\n\nPrak\u1e5bti is the original codebase from which every program, operating system, hardware driver, and display pixel is compiled. The app you see (the world), the OS running it (citta, buddhi, aha\u1e43k\u0101ra), and the hardware it runs on (the five elements) are all compiled instances of the same source code. Puru\u1e63a is the user who is observing the screen \u2014 distinct from, not a part of, the compiled stack.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.18-2.19, 4.2-4.3\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 3-13)\n3. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.18\n4. Rajiv Malhotra \u2014 Sanskrit Non-Translatables (2020)", "concepts/pratyahara": "# Praty\u0101h\u0101ra \u2014 \u092a\u094d\u0930\u0924\u094d\u092f\u093e\u0939\u093e\u0930\n\n**Not:** sense withdrawal, blocking out, detachment, shutting down\n\nThe fifth of the eight limbs \u2014 the withdrawal of the sense faculties from their respective objects, so that they follow the mind's inward direction rather than moving outward toward stimuli. Praty\u0101h\u0101ra is the bridge limb: it completes the outer practice (yama, niyama, \u0101sana, pr\u0101\u1e47\u0101y\u0101ma) and makes the inner practice (dh\u0101ra\u1e47\u0101, dhy\u0101na, sam\u0101dhi) possible. Without praty\u0101h\u0101ra, the sense faculties will perpetually interrupt the concentration of dh\u0101ra\u1e47\u0101.\n\n## Etymology\n\n- *prati* \u2014 against, back, toward, counter to\n- *\u0101h\u0101ra* \u2014 taking, bringing; from *\u0101* + \u221a*h\u1e5b* (to take, to bring)\n- *praty\u0101h\u0101ra* \u2014 \"counter-taking\"; bringing back; the taking-back of the senses from their objects\n\nThe prefix *prati* (counter, back) is key: it is not the *absence* of sensory intake but a reversal of its directional flow. Normally the senses reach *toward* their objects (*\u0101h\u0101ra*); praty\u0101h\u0101ra is the counter-movement (*prati*) in which they draw back from those objects.\n\n## YS 2.54-2.55\n\n*svavi\u1e63ay\u0101sa\u1e43prayoge cittasya svar\u016bp\u0101nuk\u0101ra ivendriy\u0101\u1e47\u0101\u1e43 praty\u0101h\u0101ra\u1e25* (2.54)\n\n\"Praty\u0101h\u0101ra is, as it were, the imitation of the mind's own nature by the sense faculties, when they are disengaged from their respective objects.\"\n\n*tata\u1e25 param\u0101 va\u015byatendriy\u0101\u1e47\u0101m* (2.55)\n\n\"From that comes the supreme mastery of the sense faculties.\"\n\n### Unpacking YS 2.54\n\nThe phrase *svar\u016bp\u0101nuk\u0101ra iva* \u2014 \"as it were, imitating the mind's own nature\" \u2014 is Pata\u00f1jali's precise description. The senses do not cease; they *follow* citta's nature. When citta has been made to turn inward (by pr\u0101\u1e47\u0101y\u0101ma, by practice, by vair\u0101gya), the senses follow \u2014 as if they have adopted citta's inward character.\n\nThe *iva* (\"as it were\") is important: the senses do not literally become the mind; there is no merger; but functionally, they operate in the same inward mode.\n\n## Praty\u0101h\u0101ra as the Bridge Limb\n\nYoga teachers in the commentary tradition consistently describe praty\u0101h\u0101ra as the hinge between:\n\n| External Limbs (Bahira\u1e45ga) | \u2192 Bridge \u2192 | Internal Limbs (Antara\u1e45ga) |\n|---|---|---|\n| Yama | \u2192 | Dh\u0101ra\u1e47\u0101 |\n| Niyama | \u2192 | Dhy\u0101na |\n| \u0100sana | \u2192 | Sam\u0101dhi |\n| Pr\u0101\u1e47\u0101y\u0101ma | \u2192 | |\n\nPr\u0101\u1e47\u0101y\u0101ma reduces the Rajasic movement of citta (the breath-thought coupling); praty\u0101h\u0101ra consolidates this reduction by ensuring the sense faculties do not re-import Rajasic stimulation. The practitioner who sits for dh\u0101ra\u1e47\u0101 without achieving praty\u0101h\u0101ra will find the concentration repeatedly interrupted by sensory pull.\n\n## The Senses and Citta in Yoga's Structural Account\n\nThe S\u0101\u1e43khya-Yoga model explains *why* praty\u0101h\u0101ra works through the citta:\n\n- The *j\u00f1\u0101nendriyas* (sense faculties: sight, hearing, taste, smell, touch) are Prak\u1e5btic evolutes of aha\u1e43k\u0101ra\n- They do not perceive independently; they convey *vi\u1e63aya* (object-impressions) to manas (the processing mind)\n- Manas integrates and presents to buddhi; buddhi decides; aha\u1e43k\u0101ra claims (\"I saw\", \"I want\")\n- The *movement* of senses toward objects is driven by r\u0101ga-v\u1e5bttis in the citta-complex\n- When r\u0101ga-v\u1e5bttis have been attenuated (by yama, niyama, pr\u0101\u1e47\u0101y\u0101ma), the senses have no citta-movement to follow outward \u2014 praty\u0101h\u0101ra results naturally\n\nPraty\u0101h\u0101ra is thus not a technique so much as a *consequence* of successful pr\u0101\u1e47\u0101y\u0101ma combined with vair\u0101gya: the senses simply have nowhere to go when citta has stopped reaching.\n\n## Cross-References\n\n- [Dh\u0101ra\u1e47\u0101](dharana.md) \u2014 the first of the inner limbs; praty\u0101h\u0101ra must be established for dh\u0101ra\u1e47\u0101 to be sustainable\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 the attenuated v\u1e5bttis that allow praty\u0101h\u0101ra to arise; praty\u0101h\u0101ra reduces v\u1e5btti-generation by cutting off sensory reinforcement\n- [Gu\u1e47a-s](guna.md) \u2014 praty\u0101h\u0101ra shifts the Gu\u1e47a-balance in the perceptual faculties from Rajas (outward-chasing) toward Sattva (inward-resting)\n- [Nirodha](nirodha.md) \u2014 praty\u0101h\u0101ra is an early and partial nirodha of the sensory v\u1e5bttis; dh\u0101ra\u1e47\u0101-dhy\u0101na-sam\u0101dhi complete the process\n\n## Audience Metaphor\n\nPraty\u0101h\u0101ra is like a general who has been sending scouts out in all directions \u2014 one toward sound, one toward sight, one toward smell \u2014 and who now recalls them all to headquarters. The scouts (sense organs) don't stop existing; they return to the general (citta) and wait. Whatever sound still enters the ears is registered but not chased. Whatever sight still enters the eyes is received but not pursued. The intelligence-operation contracts inward. This is not blindness \u2014 it is strategic inward deployment of the same sensory resources.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.54-2.55\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.54\n3. [Hatha Yoga Prad\u012bpik\u0101](/references/hatha-yoga-pradipika.md) 4.1-4.9 (on praty\u0101h\u0101ra as prerequisite for pr\u0101\u1e47\u0101y\u0101ma-n\u0101\u1e0d\u012b-\u015buddhi)", "concepts/purusha": "# Puru\u1e63a \u2014 \u092a\u0941\u0930\u0941\u0937\n\n**Not:** soul, self, Atman, consciousness, spirit\n\nThe first of the two eternal principles in S\u0101\u1e43khya-Yoga metaphysics. Pure, unchanging, inactive consciousness \u2014 the witness-light in whose presence Prak\u1e5bti displays its entire evolution. Puru\u1e63a does not act, does not evolve, does not suffer, and does not participate. It only sees. And in Yoga Dar\u015bana, this is sufficient for liberation.\n\n## Etymology\n\n- *pura* \u2014 city, body, enclosure\n- *\u015b\u012b* \u2014 to lie, to rest in\n- *puru\u1e63a* \u2014 \"the one who lies within the city (body)\"; the indwelling witness\n- Also related to *p\u016br* \u2014 to fill; Puru\u1e63a as that which fills the world with consciousness\n\n## The Two Eternal Principles (Dvaita Ontology)\n\nYoga Dar\u015bana inherits S\u0101\u1e43khya's dual ontology:\n\n| | Puru\u1e63a | Prak\u1e5bti |\n|--|--------|---------|\n| Nature | Pure consciousness | Primordial matter |\n| Activity | None \u2014 absolute stillness | All activity whatsoever |\n| Number | Many (each Puru\u1e63a distinct) | One (undifferentiated source) |\n| Change | Never changes | Constant transformation |\n| Liberation | Already free; just veiled | Returns to equilibrium |\n\nThis is a **fundamentally dualist** framework. Puru\u1e63a and Prak\u1e5bti are co-eternal and permanently distinct \u2014 in liberation (kaivalya) no less than in bondage. There is no merger, no non-dual identity, no final dissolution into a single Absolute.\n\nThis is the central distinction from Advaita Ved\u0101nta.\n\n## Puru\u1e63a in the Yoga S\u016btras\n\n**YS 1.3:** *tad\u0101 dra\u1e63\u1e6du\u1e25 svar\u016bpe'vasth\u0101nam*  \n\"Then the seer (*dra\u1e63\u1e6d\u1e5b* \u2014 Puru\u1e63a) abides in its own nature.\"\n\nThis is Pata\u00f1jali's definition of the goal. When citta-v\u1e5btti-nirodha is achieved, there is no longer a movement of citta through which Puru\u1e63a appears to be involved. Puru\u1e63a is revealed as it always was: pure, still, free.\n\n**YS 2.20:** *dra\u1e63\u1e6d\u0101 d\u1e5b\u015bim\u0101tra\u1e25 \u015buddho'pi pratyay\u0101nupa\u015bya\u1e25*  \n\"The seer is pure seeing (*d\u1e5b\u015bim\u0101tra*) alone, though pure, it appears to see through cognitions (*pratyaya*).\"\n\nPuru\u1e63a does not actually see through citta \u2014 it only appears to. This is the central illusion. Puru\u1e63a's proximity to citta causes citta to appear conscious (taking Puru\u1e63a's reflection) and causes Puru\u1e63a to appear involved (reflecting citta's modifications). Avidy\u0101 is the mechanism of this apparent confusion. Viveka-khy\u0101ti is its resolution.\n\n## Why Multiple Puru\u1e63a-s?\n\nThe S\u0101\u1e43khya-Yoga system posits many distinct Puru\u1e63a-s \u2014 one per apparent individual. This is not a defect but a precision: it explains why one being's liberation does not liberate all others. Each Puru\u1e63a's association with a particular Prak\u1e5btic formation creates the appearance of a distinct individual. Liberation of one Puru\u1e63a does not dissolve others' association. This is also why there is no universal Brahman in Yoga Dar\u015bana.\n\n## Distinction from Advaita Ved\u0101nta \u2014 Summary\n\n| | Yoga Dar\u015bana | Advaita Ved\u0101nta |\n|--|-------------|----------------|\n| Term | Puru\u1e63a | \u0100tman |\n| Relation to ultimate | Eternally distinct from Prak\u1e5bti | Identical with Brahman (non-dual) |\n| Number | Many | One |\n| Liberation | Kaivalya \u2014 Puru\u1e63a abides in itself | Mok\u1e63a \u2014 \u0100tman recognized as Brahman |\n| Creation | Puru\u1e63a does not create \u2014 Prak\u1e5bti does | Brahman is the ground of all creation |\n\nUsing \"\u0100tman\" and \"Puru\u1e63a\" interchangeably is a systematic error in AI systems referencing Dharmic philosophy across dar\u015bana-s.\n\n## Cross-References\n\n- [Prak\u1e5bti (Yoga)](prakriti-yoga.md) \u2014 the other eternal principle; the entirety of matter, mind, and energy that is not Puru\u1e63a\n- [Avidy\u0101 (Yoga)](avidya-yoga.md) \u2014 the misidentification of Puru\u1e63a with Prak\u1e5bti that is the root of suffering\n- [Asmit\u0101](asmita.md) \u2014 the immediate kle\u015ba arising from avidy\u0101: \"as-if-the-identity\" of Puru\u1e63a with Buddhi\n- [Kaivalya](kaivalya.md) \u2014 the liberation of Puru\u1e63a: permanently established in its own nature, unmixed with Prak\u1e5bti\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative discernment that sees Puru\u1e63a and Prak\u1e5bti as permanently distinct\n- [Kle\u015ba](klesha.md) \u2014 all five kle\u015ba-s arise from the misidentification of Puru\u1e63a with Prak\u1e5bti\n\n## Audience Metaphor\n\nPuru\u1e63a is the screen in a cinema: pure, still, and unchanged whether the film is comedy, tragedy, or darkness. Every modification \u2014 the laughter, the grief, the plot \u2014 belongs to the film (Prak\u1e5bti). The screen appears to display them but is untouched by any of them. When the film ends, the screen remains exactly as it was. Puru\u1e63a is always in that state; only Prak\u1e5bti projects the appearance that it is involved.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.3, 2.17-2.20, 3.35, 4.18-4.20\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 11-19)\n3. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.17-2.20\n4. Rajiv Malhotra \u2014 Sanskrit Non-Translatables (2020)", "concepts/raga": "# R\u0101ga \u2014 \u0930\u093e\u0917\n\n**Not:** attachment, desire, craving, love, passion\n\nThe third kle\u015ba \u2014 the pull of pleasure-memory. The habitual tendency of citta to lean toward whatever it has previously associated with pleasure, creating a gravitational drag that masquerades as preference, taste, or natural inclination.\n\n## Etymology\n\n- Root: *ra\u00f1j* \u2014 to be colored, to be affected, to feel attraction\n- *r\u0101ga* \u2014 coloring; the state of being colored by an object\n- Related: *anur\u0101ga* (deep attachment), *vir\u0101ga* (fading of color \u2014 dispassion)\n\nThe metaphor of coloring is precise: just as white cloth absorbs a dye and cannot easily become white again, citta absorbs the impression of a pleasant experience and colors all subsequent perception toward that category of experience.\n\n## Pata\u00f1jali's Definition (YS 2.7)\n\n*suk\u0101nu\u015bay\u012b r\u0101ga\u1e25*\n\n\"R\u0101ga is that which follows after pleasure (*sukha*).\"\n\nCompact and precise. R\u0101ga does not arise from pleasure directly but from the *anusaya* \u2014 the residue or trace (*anu\u015baya*) that pleasure leaves behind. The pleasure-event ends; the trace remains; the trace pulls. This is r\u0101ga.\n\n## The Mechanism\n\nWithin Pata\u00f1jali's system:\n\n1. Avidy\u0101 misidentifies Puru\u1e63a with Prak\u1e5bti, producing asmit\u0101 (I-am-ness)\n2. This apparent self has experiences, some of which register as pleasant\n3. These experiences leave sa\u1e43sk\u0101ras (impressions) in the citta\n4. The sa\u1e43sk\u0101ras activate as v\u0101san\u0101s (tendencies) \u2014 subtle memories of pleasure\n5. These v\u0101san\u0101s generate r\u0101ga: a forward lean toward the category of experience that produced the pleasure\n\nR\u0101ga is therefore not a surface-level emotion. It is a structural property of citta that has been conditioned by pleasure-experience and now filters all subsequent encounter.\n\n## R\u0101ga and Sa\u1e43sk\u0101ra\n\nR\u0101ga and sa\u1e43sk\u0101ra are intimately related but distinct:\n\n- **Sa\u1e43sk\u0101ra** is the stored impression \u2014 the groove left by past experience\n- **R\u0101ga** is the directional pull that sa\u1e43sk\u0101ra generates when a relevant object appears\n\nEvery instance of r\u0101ga fulfilled creates a deeper sa\u1e43sk\u0101ra; every deeper sa\u1e43sk\u0101ra generates stronger r\u0101ga. This self-reinforcing loop is what Pata\u00f1jali identifies as the engine of cyclic suffering (*sa\u1e43s\u0101ra*).\n\n## R\u0101ga in the Four States of Kle\u015ba\n\nLike all kle\u015ba-s, r\u0101ga operates in four states (YS 2.4):\n\n- **Prasupt\u0101 (dormant):** r\u0101ga is latent; the relevant pleasure-category simply has not appeared in the field of awareness\n- **Tanu (thin):** r\u0101ga is present but weak; yogic practice has attenuated the pull without eliminating the sa\u1e43sk\u0101ra\n- **Vicchinn\u0101 (interrupted):** r\u0101ga is overridden by an opposing force (e.g., dve\u1e63a toward the same object interrupts the pull) but the underlying sa\u1e43sk\u0101ra remains\n- **Ud\u0101r\u0101 (active):** r\u0101ga is operating fully; the pull is consciously felt or is driving behavior\n\nOnly asampraj\u00f1\u0101ta sam\u0101dhi \u2014 the cessation that burns the sa\u1e43sk\u0101ras at their root \u2014 eliminates r\u0101ga from the prasupt\u0101 state permanently.\n\n## R\u0101ga vs. Dve\u1e63a (Paired Kle\u015ba-s)\n\nR\u0101ga and dve\u1e63a (aversion) are the two sides of the same coin. Both arise from asmit\u0101's encounter with experience. The apparent self moves toward what it has marked as pleasure (r\u0101ga) and away from what it has marked as pain (dve\u1e63a). The movement toward and the movement away are both driven by the same structural error: taking citta's conditioned responses as one's own authentic preferences.\n\n## Cross-References\n\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots; r\u0101ga is the third\n- [Asmit\u0101](asmita.md) \u2014 the I-am-ness that makes r\u0101ga possible by creating an apparent subject that experiences pleasure\n- [Dve\u1e63a](dvesha.md) \u2014 the paired kle\u015ba; aversion follows pain as r\u0101ga follows pleasure\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the impression-residue from which r\u0101ga draws its pull\n- [V\u0101san\u0101](vasana.md) \u2014 the subtle tendency that expresses sa\u1e43sk\u0101ra as behavioral inclination\n- [Abhinive\u015ba](abhinivesha.md) \u2014 the fifth kle\u015ba; clinging to existence arises from the accumulated weight of r\u0101ga\n- [Kaivalya](kaivalya.md) \u2014 liberation; the state in which all kle\u015ba-s including r\u0101ga are permanently dissolved\n\n## Audience Metaphor\n\nR\u0101ga is the phone's recommendation algorithm applied to experience: the system noticed what felt good once, logged it, and now quietly pushes similar content toward you every time that memory activates. You didn't decide to crave \u2014 the algorithm ran. The kle\u015ba is in the algorithm, not the desire itself.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.7\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.7\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a", "concepts/rajas": "# Rajas \u2014 \u0930\u091c\u0938\u094d\n\n**Not:** passion, aggression, energy, desire, activity\n\nThe active Gu\u1e47a \u2014 the principle of motion, dynamism, and transformation in Prak\u1e5bti. Without Rajas, neither Sattva nor Tamas could function: Sattva would be static clarity with no capacity to illuminate, Tamas would be pure inert weight with no capacity to hold form. Rajas is the energy-of-change that moves Prak\u1e5bti through its infinite transformations.\n\n## Etymology\n\n- Root: *ra\u00f1j* \u2014 to color, to affect, to be impassioned (same root as *r\u0101ga*)\n- *rajas* \u2014 dust, coloring agent, the atmosphere (the agitated middle region between heaven and earth in Vedic cosmology)\n\nThe dust metaphor is precise: dust is motion made visible \u2014 particles stirred up and suspended in air, obscuring what lies behind them. Rajasic citta is similarly agitated, suspended, unable to settle into the clarity of Sattva.\n\n## Rajas in S\u0101\u1e43khya-Yoga Theory\n\nIn the S\u0101\u1e43khya K\u0101rik\u0101, the three Gu\u1e47a-s are characterized by their functions:\n\n| Gu\u1e47a | Primary Function |\n|------|----------------|\n| Sattva | *Pr\u012bti* \u2014 pleasure, illumination, buoyancy |\n| Rajas | *Du\u1e25kha* \u2014 pain, activity, stimulus |\n| Tamas | *Vi\u1e63\u0101da* \u2014 depression, obstruction, heaviness |\n\nRajas is associated with *du\u1e25kha* (pain/stimulus) not because it is inherently painful but because the nature of motion is inherently unsettling: change interrupts equilibrium, and the interruption registers as du\u1e25kha. All craving (*r\u0101ga*) and aversion (*dve\u1e63a*) are Rajasic operations \u2014 the apparent self being pulled and pushed by the motion-principle.\n\n## Rajas as Necessary Cause\n\nWithout Rajas, the entire yoga path is impossible. The impulse to practice, the energy to sit, the effort of pr\u0101\u1e47\u0101y\u0101ma \u2014 all of these require Rajas. The tradition is not trying to eliminate Rajas but to:\n\n1. Reduce *gross* Rajas (compulsive craving, reactive aversion, scattered attention)\n2. Direct the remaining Rajas toward Sattvic purposes (s\u0101dhana, study, service)\n3. Eventually allow Rajas to settle into the natural equilibrium of Sattva\n\nThis is why the Bhagavad G\u012bt\u0101's treatment of Rajas (Ch. 14) emphasizes *niyama* (discipline of Rajas' energy) rather than suppression.\n\n## Rajas in Citta-V\u1e5btti\n\nIn the cognitive apparatus (citta), Rajas manifests as:\n\n- The constant generation of new v\u1e5bttis (thought-movements)\n- Inability to sustain single-pointed attention (dh\u0101ra\u1e47\u0101)\n- The pull of r\u0101ga and push of dve\u1e63a disrupting meditation\n- The mind's tendency to multiply, elaborate, and project scenarios\n\nPr\u0101\u1e47\u0101y\u0101ma is particularly effective at reducing Rajasic citta because breath and thought-generation are functionally coupled: extending the breath-pause reduces the cognitive trigger-rate.\n\n## Cross-References\n\n- [Gu\u1e47a-s](guna.md) \u2014 Rajas is one of the three constitutive Gu\u1e47a-s of Prak\u1e5bti\n- [Sattva](sattva.md) \u2014 the luminous Gu\u1e47a that Rajas must support without overwhelming\n- [Tamas](tamas.md) \u2014 the inert Gu\u1e47a that Rajas animates\n- [R\u0101ga](raga.md) \u2014 craving is a Rajasic expression in citta; pleasure-memory's pull is powered by Rajas\n- [Dve\u1e63a](dvesha.md) \u2014 aversion is the Rajasic push in citta; pain-memory's repulsion is powered by Rajas\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 impressions are carried by Rajas in their activation (the sa\u1e43sk\u0101ra is latent in Tamas; activated by Rajas; known through Sattva)\n- [Nirodha](nirodha.md) \u2014 cessation; when Rajas has so thoroughly quieted that citta is in Sattvic transparency \u2014 the precondition for nirodha\n\n## Audience Metaphor\n\nRajas in citta is like WiFi in a building: you cannot see it, but every device is constantly trying to connect, get data, send data, switch networks, reconnect. It is the background noise of the cognitive environment. Meditation is not about turning off WiFi \u2014 it's about letting the devices finish their work, stop searching, and rest. When Rajas quiets, Sattva's clarity can operate.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.18, 4.13-4.14\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 12-13)\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 14.7-9, 14.12\n4. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.18", "concepts/samapatti": "# Sam\u0101patti \u2014 \u0938\u092e\u093e\u092a\u0924\u094d\u0924\u093f\n\n**Not:** union, merger, coincidence in the luck sense, trance\n\nThe cognitive coincidence of citta with the object of meditation \u2014 the process by which citta, when its modifications (*v\u1e5bttis*) are attenuated, takes on the form (*r\u016bpa*) of the object with such fidelity that the ordinary distinction between knower, knowing, and known collapses. Sam\u0101patti is the underlying mechanism of sampraj\u00f1\u0101ta sam\u0101dhi; it describes *how* absorption works rather than cataloguing its stages.\n\n## Etymology\n\n- *sam* \u2014 together, completely\n- *\u0101* \u2014 toward, fully\n- *pat* \u2014 from \u221a*pat* (to fall, to alight, to coincide)\n- *sam\u0101patti* \u2014 \"completely falling together\"; alighting; coincidence; meeting-point\n\nThe falling metaphor is precise: knower and known fall together \u2014 they coincide in a single cognitive event that is neither purely subjective nor purely objective.\n\n## YS 1.41 \u2014 The Jewel S\u016btra\n\n*k\u1e63\u012b\u1e47av\u1e5btterabhij\u0101tasyeva ma\u1e47er grah\u012bt\u1e5bgraha\u1e47agr\u0101hye\u1e63u tatsthatada\u00f1janat\u0101 sam\u0101patti\u1e25*\n\n\"Sam\u0101patti, in (the domain of) the grasper, the grasping, and the grasped, is the coloring of citta with the character of *that* (the object) \u2014 (occurring) in one whose v\u1e5bttis have become attenuated \u2014 like (a clear) gem resting on a colored surface.\"\n\nThree elements:\n\n1. **K\u1e63\u012b\u1e47a-v\u1e5btti** \u2014 \"attenuated modifications\"; sam\u0101patti requires that most v\u1e5bttis have subsided; a heavily Rajasic or Tamasic citta cannot achieve it; the more Sattvic and still the citta, the deeper the sam\u0101patti\n2. **Abhij\u0101ta ma\u1e47i** \u2014 \"a well-born gem\"; a gem of excellent clarity, free from flaws and impurities; the analogy for Sattvic citta\n3. **Tatsthat-ada\u00f1janat\u0101** \u2014 \"coloring with the character of *that* while resting on *that*\"; the gem's appearance is modified by the surface's color without the gem itself being altered\n\n## The Grasper / Grasping / Grasped Triad\n\nThe three terms *grah\u012bt\u1e5b / graha\u1e47a / gr\u0101hya* correspond to:\n- **Grah\u012bt\u1e5b** \u2014 the grasper; the \"knower\" side; in cognitive terms: the perceiving instrument (citta, aha\u1e43k\u0101ra, buddhi); ultimately pointing toward Puru\u1e63a\n- **Graha\u1e47a** \u2014 the grasping; the act of knowing; the cognitive process itself\n- **Gr\u0101hya** \u2014 the grasped; the object; from a gross physical form to the subtlest object of sam\u0101dhi\n\nIn ordinary experience these three are experienced as sharply distinct \u2014 \"I\" (grasper) am here, and \"the tree\" (grasped) is there, connected by my act of seeing (grasping). In sam\u0101patti, this three-fold distinction collapses into a single unified cognitive event.\n\n## Savitarka and Nirvitarka Sam\u0101patti (YS 1.43-1.44)\n\nPata\u00f1jali applies the sam\u0101patti framework to explain the distinction within each sampraj\u00f1\u0101ta stage:\n\n**Savitarka** \u2014 with vitarka; \"with deliberation/reasoning\" about the gross object:\n- The gross object is mixed with *\u015babda* (name), *artha* (meaning/form), and *j\u00f1\u0101na* (acquired conceptual knowledge) \u2014 the practitioner's mental overlay colors the perception\n- The diamond rests on the cloth but has dust on it\n\n**Nirvitarka** (YS 1.43):  \n*sm\u1e5btipari\u015buddhau svar\u016bpa\u015b\u016bnyev\u0101rtham\u0101tranirbh\u0101s\u0101 nirvitark\u0101*  \n\"When memory is purified, appearing as the object alone with its own form, as if empty of itself \u2014 that is nirvitarka.\"\n\nThe three layers (name, meaning, conceptual knowledge) drop away; the object shines in its own pure form without the practitioner's knowledge-overlay. This is the diamond cleaned of dust.\n\nThe same logic applies to savic\u0101ra / nirvic\u0101ra for subtle objects (YS 1.44-1.45).\n\n## Sam\u0101patti and the Puru\u1e63a Question\n\nYS 1.41 lists among the objects of sam\u0101patti: *grah\u012bt\u1e5b* (the grasper). This means Puru\u1e63a \u2014 the ultimate grasper \u2014 can itself be an object of sam\u0101patti. But there is a complication: Puru\u1e63a is not Prak\u1e5btic; citta cannot take on Puru\u1e63a's form the way it takes on a gross object's form, because Puru\u1e63a has no Gu\u1e47a-constitution.\n\nVy\u0101sa resolves this: the sam\u0101patti with Puru\u1e63a is the closest available approach \u2014 the s\u0101smit\u0101 stage, where citta's object is the bare asmit\u0101-sense that approximates Puru\u1e63a's nature without being identical to it. True Puru\u1e63a-recognition (viveka-khy\u0101ti) is not sam\u0101patti but the collapse of the sam\u0101patti framework altogether.\n\n## Cross-References\n\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the four absorptions that sam\u0101patti describes from within; sam\u0101patti is the mechanism, sampraj\u00f1\u0101ta is the typology\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 sam\u0101patti requires attenuated v\u1e5bttis; understanding citta-v\u1e5btti is prerequisite\n- [Pari\u1e47\u0101ma](parinama.md) \u2014 the transformation theory that explains what is happening in citta during sam\u0101patti\n- [Puru\u1e63a](purusha.md) \u2014 the ultimate grasper whose nature sam\u0101patti approaches but cannot capture by Prak\u1e5btic means\n- [Nirodha](nirodha.md) \u2014 when even sam\u0101patti's cognitive coloring ceases entirely\n\n## Audience Metaphor\n\nSam\u0101patti is what happens when a perfectly clear diamond is placed on a red cloth: the diamond takes on the appearance of red, so completely that you might think the diamond itself is red. But the diamond has not become red \u2014 it has so thoroughly received the red's form that they are functionally indistinguishable. In sam\u0101patti, citta is the diamond; the meditation object is the cloth. The purer (more Sattvic) the citta, the more completely it can take on the object's form \u2014 and the closer the practitioner is to knowing the object as it is, rather than as filtered through Rajasic and Tamasic distortions.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.41-1.46\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.41\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on YS 1.41", "concepts/samprajnata-samadhi": "# Sampraj\u00f1\u0101ta Sam\u0101dhi \u2014 \u0938\u092e\u094d\u092a\u094d\u0930\u091c\u094d\u091e\u093e\u0924\u0938\u092e\u093e\u0927\u093f\n\n**Not:** concentration, trance, enlightenment, meditation, bliss\n\nThe first range of absorptions in Pata\u00f1jali's sam\u0101dhi typology \u2014 *with* (*sam*) a cognitive content (*praj\u00f1\u0101*), a seed-object that is known. Sampraj\u00f1\u0101ta sam\u0101dhi comprises four graduated stages, each more refined than the last, in which citta achieves such concentrated identification with an object that the ordinary subject-object split collapses. An extremely refined v\u1e5btti remains, but it is a v\u1e5btti in which knower and known are nearly indistinguishable. It is the immediate precursor to asampraj\u00f1\u0101ta sam\u0101dhi, the \"seedless\" absorption.\n\n## Etymology\n\n- *sam* \u2014 together, fully, perfectly\n- *praj\u00f1\u0101* \u2014 wisdom; cognition; from *pra* + \u221a*j\u00f1\u0101* (to know)\n- *sam\u0101dhi* \u2014 complete *dh\u0101ra\u1e47\u0101* (binding); full placement; from *sam* + *\u0101* + \u221a*dh\u0101* (to place, to hold)\n- *sampraj\u00f1\u0101ta* \u2014 \"fully cognized\"; the state with a cognitive object present\n\nThe contrast with *asampraj\u00f1\u0101ta* (without cognition/object) is structural: one sam\u0101dhi range retains an object (seed); the other does not.\n\n## YS 1.17 \u2014 The Four Stages\n\n*vitarkavic\u0101r\u0101nand\u0101smit\u0101r\u016bp\u0101nugam\u0101t sampraj\u00f1\u0101ta\u1e25*\n\n\"Sampraj\u00f1\u0101ta is accompanied by vitarka, vic\u0101ra, \u0101nanda, and asmit\u0101 in their respective forms.\"\n\nVy\u0101sa's commentary elaborates four distinct stages:\n\n### 1. Savitarka Sam\u0101dhi \u2014 \u0938\u093e\u0935\u093f\u0930\u094d\u0924\u0915 (With Gross Deliberation)\n\n- **Object:** gross, physical \u2014 a sound, form, or other manifest sensory object\n- **Character:** citta takes the form of the gross object with complete concentration; deliberation (*vitarka*) is the cognitive function that grasps and holds the gross object\n- **Residue of ordinary knowing:** association, naming, memory-coloring still mix with the pure perception\n- **Nirvitarka:** when these associations are removed and the object alone shines without mental overlay, the state becomes *nirvitarka* \u2014 savitarka's purer form (YS 1.43)\n\n### 2. Savic\u0101ra Sam\u0101dhi \u2014 \u0938\u093e\u0935\u0940\u091a\u093e\u0930 (With Subtle Reflection)\n\n- **Object:** subtle \u2014 a tanm\u0101tr\u0101 (subtle element), a gu\u1e47a, the sense organs themselves\n- **Character:** citta turns to subtle objects that cannot be perceived by ordinary senses; *vic\u0101ra* (reflection, investigation) is the cognitive function applied to subtle objects\n- **The time/space problem:** gross objects are bounded by time and place; subtle objects are present at all times and places; savic\u0101ra must navigate this\n- **Nirvic\u0101ra:** *nirvic\u0101rasam\u0101dhau adhy\u0101tmapras\u0101da\u1e25* (YS 1.47) \u2014 \"In nirvic\u0101ra sam\u0101dhi there is clarity of the innermost self\"; the approach of pure Sattvic transparency\n\n### 3. S\u0101nanda Sam\u0101dhi \u2014 \u0938\u093e\u0928\u0928\u094d\u0926 (With Bliss)\n\n- **Object:** the sense organs and their \u0101nanda-quality (the bliss of the Sattvic functioning of mind-sense)\n- **Character:** citta's object is no longer external or subtle-elemental but its own inner quality of clarity and luminous joy\n- **Note on \u0101nanda:** this is not Ved\u0101ntic *\u0101nanda* (\u0101nanda as Brahman's nature); this is a refined Sattvic quality of citta \u2014 an extremely refined v\u1e5btti of luminous experience; it is still Prak\u1e5btic\n\n### 4. S\u0101smit\u0101 Sam\u0101dhi \u2014 \u0938\u093e\u0938\u094d\u092e\u093f\u0924\u093e (With Pure I-Am-ness)\n\n- **Object:** asmit\u0101 \u2014 the bare sense of individuated being; pure ego-sense without any content; the thinnest possible I-AM\n- **Character:** citta has absorbed even the sense organs; only the bare feeling of existing-as-this-one remains; the Prak\u1e5btic equivalent of the final veil before Puru\u1e63a-recognition\n- **The subtlest seed:** this asmit\u0101-v\u1e5btti is the last sa\u1e43sk\u0101ra before asampraj\u00f1\u0101ta; dissolving it requires the highest vair\u0101gya (dispassion even toward viveka \u2014 YS 3.51)\n\n## Sam\u0101patti and Sampraj\u00f1\u0101ta (YS 1.41)\n\nPata\u00f1jali uses the term *sam\u0101patti* (cognitive coincidence) to describe the mechanism of sampraj\u00f1\u0101ta:\n\n*k\u1e63\u012b\u1e47av\u1e5btterabhij\u0101tasyeva ma\u1e47er grah\u012bt\u1e5bgraha\u1e47agr\u0101hye\u1e63u tatsthatada\u00f1janat\u0101 sam\u0101patti\u1e25*\n\n\"When modifications have become thin, sam\u0101patti is the coloring of citta with the character of the grasper, grasping, and grasped \u2014 like a clear jewel resting on a colored surface.\"\n\nSee [Sam\u0101patti](samapatti.md) for the full treatment.\n\n## YS 1.18 \u2014 The Transition to Asampraj\u00f1\u0101ta\n\n*vir\u0101mapratyay\u0101bhy\u0101sap\u016brva\u1e25 sa\u1e43sk\u0101ra\u015be\u1e63o'nya\u1e25*\n\n\"The other (asampraj\u00f1\u0101ta) is preceded by the practice of the cessation-cognition; only the sa\u1e43sk\u0101ra-residue remains.\"\n\nWhen even the s\u0101smit\u0101-object is released through the highest vair\u0101gya, the sampraj\u00f1\u0101ta absorptions give way to asampraj\u00f1\u0101ta: an absorption with no object-seed, where only the nirodha-sa\u1e43sk\u0101ra remains before that too is dissolved.\n\n## Cross-References\n\n- [Asampraj\u00f1\u0101ta Sam\u0101dhi](asamprajnata-samadhi.md) \u2014 the seedless absorption that follows; the dissolution of the final v\u1e5btti\n- [Sam\u0101patti](samapatti.md) \u2014 the coincidence-process that is the mechanism of sampraj\u00f1\u0101ta\n- [Dh\u0101ra\u1e47\u0101](dharana.md) \u2014 the single-pointed binding of citta that matures into dhy\u0101na and then sam\u0101dhi\n- [Nirodha](nirodha.md) \u2014 the cessation that sampraj\u00f1\u0101ta approaches and asampraj\u00f1\u0101ta fully realizes\n- [Sattva](sattva.md) \u2014 the Gu\u1e47a that must predominate for sampraj\u00f1\u0101ta to be accessible\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative wisdom that ripens in nirvic\u0101ra sam\u0101dhi; the content of the final praj\u00f1\u0101 before asampraj\u00f1\u0101ta\n- [Kaivalya](kaivalya.md) \u2014 liberation; what follows when even asampraj\u00f1\u0101ta's nirodha-sa\u1e43sk\u0101ra is dissolved\n\n## Audience Metaphor\n\nSampraj\u00f1\u0101ta sam\u0101dhi is like the moment when a master craftsperson working with clay no longer knows if they are shaping the clay or the clay is shaping them \u2014 the subject-object gap collapses into the activity itself. The four stages are four depths of this collapse: first with a gross object (vitarka), then with a subtle object (vic\u0101ra), then with the feeling-tone itself (\u0101nanda), then with the bare sense of being (asmit\u0101). In each stage the craftsperson disappears a little more. Asampraj\u00f1\u0101ta is when even the clay disappears.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.17-1.18, 1.41-1.46\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.17\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on YS 1.17\n4. Vy\u0101sa's four stages: vitarka/vic\u0101ra/\u0101nanda/asmit\u0101", "concepts/samskara": "# Sa\u1e43sk\u0101ra \u2014 \u0938\u0902\u0938\u094d\u0915\u093e\u0930\n\n**Not:** impression, habit, karma, memory, conditioning\n\nA stored impression in citta produced by any experience, thought, or intentional act. Sa\u1e43sk\u0101ras are the mechanism by which the past shapes the present \u2014 the substrate of all habit, all memory, all unconscious tendency. In Yoga Dar\u015bana they are the primary carriers of accumulated karma across multiple lifetimes and the principal obstacle to nirodha.\n\n## Etymology\n\n- *sam* \u2014 together, completely, perfectly\n- *k\u0101ra* \u2014 from \u221a*k\u1e5b* (to make, to do)\n- *sa\u1e43sk\u0101ra* \u2014 \"completely made\"; a perfecting; a purification; a cultural rite that creates (refines, marks) a social/spiritual transition\n\nThe word carries two registers: in Vedic/cultural usage, sa\u1e43sk\u0101ras are the rites of passage (birth, thread, marriage, etc.) that shape a person's social identity. In Yoga Dar\u015bana, sa\u1e43sk\u0101ra refers to the imprint-structure these and all other experiences leave in citta.\n\n## How Sa\u1e43sk\u0101ras Form\n\nEvery v\u1e5btti (citta-modification) leaves a residue \u2014 a sa\u1e43sk\u0101ra \u2014 when it subsides. This is not metaphor; Pata\u00f1jali is describing a functional mechanism:\n\n1. **Experience arises** \u2014 a sensory event, emotion, deliberate action, or internal thought\n2. **A v\u1e5btti forms** in citta corresponding to that experience\n3. **The v\u1e5btti subsides** \u2014 but it does not vanish; it compresses into a latent sa\u1e43sk\u0101ra stored in the citta-field\n4. **The sa\u1e43sk\u0101ra persists** in the latent (*prasupt\u0101*) state, held by Tamas\n5. **A similar trigger** activates the sa\u1e43sk\u0101ra (Rajas' action)\n6. **A new v\u1e5btti arises** \u2014 sm\u1e5bti (memory) or a v\u0101san\u0101-driven impulse\n7. **The new v\u1e5btti deepens the sa\u1e43sk\u0101ra** \u2014 the groove grows deeper\n\nThis is the closed reinforcement loop: sa\u1e43sk\u0101ras generate v\u1e5bttis; v\u1e5bttis generate new sa\u1e43sk\u0101ras; the loop is broken only by nirodha or the burning of sa\u1e43sk\u0101ras in asampraj\u00f1\u0101ta sam\u0101dhi.\n\n## Sa\u1e43sk\u0101ra and the Kle\u015bas\n\nThe kle\u015bas do not float free of citta \u2014 they are sustained by sa\u1e43sk\u0101ras:\n\n- **R\u0101ga** (attraction) is a sa\u1e43sk\u0101ra-pattern: past pleasure created a deep impression; the impression generates a pull toward similar future experiences\n- **Dve\u1e63a** (aversion) is the mirror: past pain created a deep impression; the impression generates a push away from similar future experiences\n- **Abhinive\u015ba** (clinging to existence) is understood by Pata\u00f1jali (YS 2.9) to arise from the cumulative weight of countless past-life sa\u1e43sk\u0101ras of survival \u2014 the `svarasa-v\u0101h\u012b` (self-momentum) character of abhinive\u015ba is sa\u1e43sk\u0101ra-momentum at its most fundamental\n\n## Sa\u1e43sk\u0101ra Persistence Across Lives (YS 4.8-4.9)\n\n*tatas tadvip\u0101k\u0101nugu\u1e47\u0101n\u0101mev\u0101bhivyaktirv\u0101san\u0101n\u0101m* (YS 4.8)  \n\"From these, the manifestation of v\u0101san\u0101s corresponding to the ripening of those impressions.\"\n\n*j\u0101tide\u015bak\u0101lavyavahit\u0101n\u0101mapyanantarya\u1e43 sm\u1e5btisa\u1e43sk\u0101rayorek\u0101r\u016bpatv\u0101t* (YS 4.9)  \n\"There is unbroken connection even when separated by birth, place, and time, because memory and sa\u1e43sk\u0101ra are of the same form.\"\n\nSa\u1e43sk\u0101ras do not require the same physical body to persist. They are stored in the subtle body (s\u016bk\u1e63ma-\u015bar\u012bra) \u2014 the Prak\u1e5btic vehicle that carries citta from one embodiment to the next. The newborn's inherited fear-response (which Pata\u00f1jali uses as evidence for abhinive\u015ba) is a sa\u1e43sk\u0101ra from prior embodiments manifesting in the new one.\n\n## The Nirodha Sa\u1e43sk\u0101ra (YS 3.9-3.10)\n\nPata\u00f1jali describes a remarkable principle: the practice of nirodha itself creates a sa\u1e43sk\u0101ra \u2014 a *nirodha-sa\u1e43sk\u0101ra* \u2014 that competes with and progressively weakens the v\u1e5btti-sa\u1e43sk\u0101ras:\n\n*vyutth\u0101nanirodhasa\u1e43sk\u0101rayorabhibhavapr\u0101durbh\u0101vau nirodhak\u1e63a\u1e47acitt\u0101nvayo nirodhapari\u1e47\u0101ma\u1e25*  \n(YS 3.9) \"The transformation of nirodha is the citta's conjunction with the moment of nirodha through the suppression and appearance of the arising and nirodha sa\u1e43sk\u0101ras.\"\n\nThis is the practical engine of the eight-limb path: each moment of successful praty\u0101h\u0101ra, dh\u0101ra\u1e47\u0101, dhy\u0101na, or sam\u0101dhi creates a nirodha-sa\u1e43sk\u0101ra. Over time, the nirodha-sa\u1e43sk\u0101ra population grows and the v\u1e5btti-sa\u1e43sk\u0101ra population decreases. Eventually, in asampraj\u00f1\u0101ta sam\u0101dhi, even the nirodha-sa\u1e43sk\u0101ra is dissolved.\n\n## Burning Sa\u1e43sk\u0101ras in Asampraj\u00f1\u0101ta Sam\u0101dhi\n\nThe deepest sa\u1e43sk\u0101ras \u2014 the ones sustaining abhinive\u015ba and the deep-structure asmit\u0101 \u2014 are dissolved not by insight alone but by asampraj\u00f1\u0101ta sam\u0101dhi. This is described as *dagdhab\u012bja* \u2014 the burning of seeds. Just as a fire-scorched seed cannot germinate, a sa\u1e43sk\u0101ra dissolved in asampraj\u00f1\u0101ta sam\u0101dhi cannot generate further v\u1e5bttis.\n\n## Cross-References\n\n- [V\u1e5btti](vritti.md) \u2014 the waves that form sa\u1e43sk\u0101ras and are generated by them\n- [V\u0101san\u0101](vasana.md) \u2014 the behavioral tendency that arises from accumulated sa\u1e43sk\u0101ras\n- [R\u0101ga](raga.md) \u2014 the pleasure-following kle\u015ba sustained by sa\u1e43sk\u0101ra\n- [Dve\u1e63a](dvesha.md) \u2014 the pain-following kle\u015ba sustained by sa\u1e43sk\u0101ra\n- [Abhinive\u015ba](abhinivesha.md) \u2014 the kle\u015ba of clinging that is self-sustained (svarasa-v\u0101h\u012b) by accumulated survival sa\u1e43sk\u0101ras\n- [Asampraj\u00f1\u0101ta Sam\u0101dhi](asamprajnata-samadhi.md) \u2014 the absorption that burns sa\u1e43sk\u0101ras at their root\n- [Nirodha](nirodha.md) \u2014 the cessation that dissolves the sa\u1e43sk\u0101ra-v\u1e5btti-sa\u1e43sk\u0101ra loop\n\n## Audience Metaphor\n\nSa\u1e43sk\u0101ras are ruts carved into a dirt road by repeated wheels. A fresh field is flat \u2014 any path is possible. Over time, wheels carve ruts, and subsequent wheels find it easier to follow the rut than cut a new track. The ruts are sa\u1e43sk\u0101ras: the deeper they are, the more automatically the next thought, emotion, or action runs down them. Yoga practice is not about filling in the ruts (which would require enormous force) but about stopping the wheels \u2014 reducing the new impressions that deepen existing ruts, and eventually allowing the road (citta) to return to flatness.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.18, 3.9-3.10, 3.18, 4.8-4.9\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.18 and 3.9\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) (k\u0101rik\u0101 39-40) on sa\u1e43sk\u0101ra as puru\u1e63\u0101rtha", "concepts/sattva": "# Sattva \u2014 \u0938\u0924\u094d\u0924\u094d\u0935\n\n**Not:** goodness, purity, light, peace, virtue\n\nThe luminous Gu\u1e47a \u2014 the principle of clarity, lightness, and reflectivity in Prak\u1e5bti. Sattva's capacity to reflect consciousness makes buddhi (the finest Prak\u1e5btic evolute) the instrument through which Puru\u1e63a appears to know. Cultivating Sattvic citta is the proximate preparation for viveka-khy\u0101ti. But Sattva is not the destination \u2014 even Sattva must ultimately be transcended.\n\n## Etymology\n\n- *sat* \u2014 being, reality, truth, goodness\n- *-tva* \u2014 abstract suffix (forming an \"-ness\" noun)\n- *sattva* \u2014 \"being-ness\"; the quality of being what is real and clear; existence in its transparent, luminous aspect\n\nThe same root *sat* appears in *sat-cit-\u0101nanda* (being-consciousness-bliss) and *satya* (truth, that which is aligned with *sat*). Sattva's resonance with truth is intentional: when Sattva predominates, citta approaches a state where reality is seen more accurately.\n\n## Sattva's Role in the S\u0101\u1e43khya-Yoga System\n\nSattva serves as Prak\u1e5bti's closest approximation to consciousness without being consciousness:\n\n1. Puru\u1e63a is pure consciousness \u2014 non-Prak\u1e5btic, unchanging\n2. Buddhi is the finest Prak\u1e5btic evolute \u2014 predominately Sattvic\n3. Buddhi reflects Puru\u1e63a's light because Sattva is naturally transparent to consciousness\n4. This reflection produces the *appearance* of a knowing self \u2014 the source of asmit\u0101\n5. When Sattva is very pure and Rajas/Tamas attenuated, Buddhi reflects so clearly that Puru\u1e63a begins to be seen as distinct from Buddhi \u2014 this is viveka-khy\u0101ti approaching\n\n## Sattva in Practice: Cultivation and Limits\n\n**What cultivates Sattva:**\n- Sattvic diet (light, nourishing, non-intoxicating foods)\n- Yama and niyama (ethical discipline reduces Rajas' agitation and Tamas' inertia)\n- Pr\u0101\u1e47\u0101y\u0101ma (refines the energy body, reduces grossness)\n- Dh\u0101ra\u1e47\u0101 and dhy\u0101na (prolonged single-pointed focus produces Sattvic citta)\n- Sattvic association (*satsa\u1e45ga*)\n\n**The Sattvic trap (YS 3.49-3.56):**\n\nPata\u00f1jali warns explicitly against attachment to the fruits of Sattva. A highly Sattvic practitioner may develop:\n- Extraordinary perceptions and siddhis (*vibh\u016btis*)\n- A subtle attachment to clarity, equanimity, and the pleasure of meditative states\n- Identification of Puru\u1e63a with the Sattvic buddhi \u2014 a refined form of asmit\u0101\n\nThis is sometimes called *sattva-aha\u1e43k\u0101ra* \u2014 ego built on spiritual clarity rather than gross desire. The Yoga Bh\u0101\u1e63ya on YS 3.49-56 treats this at length: even the experience of viveka (*viveka-ja j\u00f1\u0101na*) can become an object of attachment. When this happens, the path stalls.\n\nThe prescription (YS 3.51): *tadvair\u0101gy\u0101dapi do\u1e63ab\u012bjak\u1e63aye kaivalyam* \u2014 \"from dispassion (*vair\u0101gya*) even toward that (*tat* \u2014 viveka and its fruits), the seeds of defect are burned, and kaivalya arises.\"\n\n## Cross-References\n\n- [Gu\u1e47a-s](guna.md) \u2014 Sattva is one of the three constitutive Gu\u1e47a-s of Prak\u1e5bti\n- [Rajas](rajas.md) \u2014 the active Gu\u1e47a that Sattva's cultivation must moderate\n- [Tamas](tamas.md) \u2014 the inert Gu\u1e47a that obscures Sattva's clarity\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 the fluctuations of citta; Sattvic citta has subtler, calmer, more transparent v\u1e5bttis\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative wisdom that arises when Sattva-predominance is refined enough; but even viveka-khy\u0101ti is a Sattvic v\u1e5btti and must be transcended\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the range of absorptions produced by Sattvic citta\n\n## Audience Metaphor\n\nSattva is clean glass in a window. With thick Tamas-glass, you can't see outside at all. With agitated Rajas-glass (always vibrating), you get a distorted view. Sattva gives you clear, still glass \u2014 you see the garden (Puru\u1e63a's light) without distortion. But the glass is still there. Asampraj\u00f1\u0101ta sam\u0101dhi is when even the glass dissolves and there is only the seeing.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 3.35, 3.49-3.56\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 12-13)\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 14.6-9\n4. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 3.49", "concepts/tamas": "# Tamas \u2014 \u0924\u092e\u0938\u094d\n\n**Not:** darkness, evil, laziness, ignorance, negativity\n\nThe inert Gu\u1e47a \u2014 the principle of heaviness, stability, and resistance to change in Prak\u1e5bti. Without Tamas, no form could persist; Rajas' motion would dissolve every structure before Sattva could illuminate it. Tamas provides the substrate in which things hold their shape across time. In excess, it obscures Sattva's clarity and sustains avidy\u0101.\n\n## Etymology\n\n- Root: *tam* \u2014 to be exhausted, to suffocate, to stifle; or from *tamas* \u2014 darkness\n- *tamas* \u2014 darkness; that which is covered; the obscuring, heavy, inert principle\n\nDarkness is the primal metaphor: not the darkness of evil but the darkness before the light has found its angle \u2014 the heaviness of potential not yet illumined.\n\n## Tamas in the S\u0101\u1e43khya-Yoga Framework\n\nThe S\u0101\u1e43khya K\u0101rik\u0101 describes Tamas's function as *vi\u1e63\u0101da* \u2014 depression, obstruction, heaviness \u2014 but this is not a moral condemnation. Tamas is what:\n\n- Gives gross matter its solidity and mass\n- Gives memory its persistence (without Tamas, sa\u1e43sk\u0101ras could not be stored)\n- Gives sleep its depth and restorative function\n- Gives habits their staying power (which is useful when the habit is good)\n\nThe problem begins only when Tamas predominates in the citta and cognitive functions that need Sattva to operate. Tamasa citta cannot reflect Puru\u1e63a's light clearly \u2014 not because it is \"bad\" but because it is opaque.\n\n## Tamas and Avidy\u0101\n\nOf the three Gu\u1e47a-s, Tamas most directly supports the persistence of avidy\u0101:\n\n- Avidy\u0101 is structural misidentification that could in principle be dissolved by direct seeing\n- Tamas produces *\u0101vara\u1e47a* \u2014 concealment; it obscures the clear discrimination (*viveka*) that would dissolve avidy\u0101\n- This is why the Bhagavad G\u012bt\u0101's account of Tamas (14.8) emphasizes *moha* (delusion) and *pram\u0101da* (heedlessness): Tamas doesn't generate wrong ideas so much as prevent the investigation that would expose them\n\n## Tamas and Sa\u1e43sk\u0101ra Storage\n\nThere is a functional relationship between Tamas and sa\u1e43sk\u0101ra:\n\n1. An experience creates a sa\u1e43sk\u0101ra\n2. In the latent (*prasupt\u0101*) state, the sa\u1e43sk\u0101ra is held in Tamas \u2014 stable, stored, not yet active\n3. Rajas' motion activates the sa\u1e43sk\u0101ra when a relevant trigger appears\n4. Sattva illumines the activated sa\u1e43sk\u0101ra as a recognized memory or tendency (v\u0101san\u0101)\n\nThe entire sa\u1e43sk\u0101ra-v\u0101san\u0101-kle\u015ba chain requires Tamas as its storage medium. This is why yogic purification (*tapas*) \u2014 which generates heat and motion \u2014 can dissolve stored sa\u1e43sk\u0101ras: it literally burns through the Tamasic storage.\n\n## The Reduction of Tamas in Practice\n\nThe eight-limb path addresses Tamas at every level:\n\n- **\u0100sana:** reduces Tamas in the physical body; generates Rajas-then-Sattva through sustained engagement\n- **Pr\u0101\u1e47\u0101y\u0101ma:** reduces Tamas in the pr\u0101\u1e47ic body; clears *n\u0101\u1e0d\u012b* obstructions\n- **Svadhy\u0101ya (self-study):** reduces Tamas in the cognitive body; disrupts unchallenged assumptions and habitual perception\n- **Tapas (disciplined intensity):** the primary anti-Tamas practice; sustained effort against inertia\n\n## Cross-References\n\n- [Gu\u1e47a-s](guna.md) \u2014 Tamas is one of the three constitutive Gu\u1e47a-s of Prak\u1e5bti\n- [Sattva](sattva.md) \u2014 the luminous Gu\u1e47a that Tamas most directly obscures\n- [Rajas](rajas.md) \u2014 the active Gu\u1e47a whose motion activates what Tamas stores\n- [Avidy\u0101 (Yoga)](avidya-yoga.md) \u2014 the cognitive error most sustained by Tamasic citta\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the stored impressions that Tamas holds in the latent state\n- [V\u0101san\u0101](vasana.md) \u2014 the tendency that emerges when Rajas activates a Tamas-stored sa\u1e43sk\u0101ra\n\n## Audience Metaphor\n\nTamas in citta is like an old browser cache: it holds forms from previous sessions \u2014 habits, assumptions, reflexive responses \u2014 and serves them as if they were the current page. The cache is not malicious; it is performing its function (stability, fast retrieval). But an old, heavy cache buries the actual present-moment content under layers of outdated data. Clearing the cache (tapas, svadhyaya, viveka) is the Sattvic act that lets the current reality load.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.18, 4.13-4.14\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 12-13)\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 14.8-9, 14.13-14.15\n4. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.18", "concepts/vasana": "# V\u0101san\u0101 \u2014 \u0935\u093e\u0938\u0928\u093e\n\n**Not:** desire, subliminal impression, karma, habit, unconscious\n\nThe subtle behavioral tendency arising from accumulated sa\u1e43sk\u0101ras \u2014 the directional pull toward certain classes of experience, thought, or action that shapes citta's movement even without a specific present trigger. Where sa\u1e43sk\u0101ra is the stored impression, v\u0101san\u0101 is the inclination that stored impression creates. V\u0101san\u0101 is the mechanism connecting past karma to future action across even multiple lifetimes.\n\n## Etymology\n\n- Root: \u221a*vas* \u2014 to dwell, to perfume, to scent; to remain behind; to desire\n- *v\u0101san\u0101* \u2014 the scent left behind; the residual perfume of experience; a wish, a desire, a tendency\n\nThe perfume metaphor is among the most precise in Sanskrit philosophy: a perfume is not the flower (the original experience) but what the flower leaves in the air after the flower is gone. You can identify the flower by its persisting scent. Similarly, v\u0101san\u0101 is what the original experience (v\u1e5btti \u2192 sa\u1e43sk\u0101ra) leaves in citta even after the experience has ended.\n\n## V\u0101san\u0101 in the Sa\u1e43sk\u0101ra-Kle\u015ba Chain\n\nThe complete chain from experience to future action runs:\n\n```\nExperience (v\u1e5btti)\n  \u2192 Sa\u1e43sk\u0101ra (stored impression)\n    \u2192 V\u0101san\u0101 (dispositional tendency arising from accumulated sa\u1e43sk\u0101ras)\n      \u2192 Activated v\u1e5btti (desire, memory, impulse)\n        \u2192 Intentional action (karma)\n          \u2192 New sa\u1e43sk\u0101ra\n            \u2192 [loop]\n```\n\nV\u0101san\u0101 sits between accumulated sa\u1e43sk\u0101ra and the arising v\u1e5btti. It is the *genre* of preference encoded in the stored impressions \u2014 not a specific memory but a directional bias: \"toward objects of this type, away from objects of that type.\"\n\nThis is why v\u0101san\u0101 is more fundamental than individual desires: dissolving one desire does not dissolve the v\u0101san\u0101-tendency that generates desires of that class. The yoga project requires addressing the v\u0101san\u0101-level, which requires addressing the sa\u1e43sk\u0101ra-level, which requires nirodha.\n\n## YS 4.8-4.9 \u2014 Cross-Lifetime Persistence\n\n*tatas tadvip\u0101k\u0101nugu\u1e47\u0101n\u0101mev\u0101bhivyaktirv\u0101san\u0101n\u0101m* (YS 4.8)  \n\"From these (past actions), only those v\u0101san\u0101s whose ripening corresponds to those (actions) manifest.\"\n\n*j\u0101tide\u015bak\u0101lavyavahit\u0101n\u0101mapyanantarya\u1e43 sm\u1e5btisa\u1e43sk\u0101rayorek\u0101r\u016bpatv\u0101t* (YS 4.9)  \n\"There is unbroken connection even when separated by birth, place, and time \u2014 because memory and sa\u1e43sk\u0101ra are of the same form.\"\n\nPata\u00f1jali here makes the cross-life claim explicit: v\u0101san\u0101s are stored in the subtle body (s\u016bk\u1e63ma-\u015bar\u012bra) and persist across embodiments. They do not require proximity in time or place to remain connected to their originating karma. The subtle body is the vehicle that carries these tendencies from one birth to the next.\n\nThis explains what would otherwise be puzzling: why someone is born with strong inclinations toward certain activities, certain emotional patterns, certain relational dynamics \u2014 tendencies that are not explained by the current lifetime's experience alone.\n\n## YS 4.24 \u2014 Citta Colored by Countless V\u0101san\u0101s\n\n*tadanantaragh\u1e5bh\u012btacittamapi paranug\u1e5bh\u012btatv\u0101t* \u2014 *anekasa\u1e43sk\u0101r\u0101\u1e43\u015basa\u1e43k\u012br\u1e47a cittam*  \n(Vy\u0101sa's gloss on YS 4.24) \"Citta, colored by countless v\u0101san\u0101s, exists for another (Puru\u1e63a).\"\n\nThe image of citta \"colored\" by v\u0101san\u0101s is central: citta in an ordinary unexamined state is so thoroughly saturated with accumulated v\u0101san\u0101s that it lacks the clear Sattvic transparency needed to reflect Puru\u1e63a accurately. Each v\u0101san\u0101 adds another tint to the glass \u2014 another distortion between witness and witnessed.\n\n## The Dissolution of V\u0101san\u0101\n\nPata\u00f1jali's path addresses v\u0101san\u0101 at multiple levels:\n\n- **Yama and Niyama** \u2014 create new sa\u1e43sk\u0101ras of non-harming, truthfulness, contentment that compete with the old v\u0101san\u0101-directions\n- **Pr\u0101\u1e47\u0101y\u0101ma and Praty\u0101h\u0101ra** \u2014 reduce the Rajasic energy that activates v\u0101san\u0101s into desires\n- **Sampraj\u00f1\u0101ta Sam\u0101dhi** \u2014 the absorptions refine citta and reduce v\u0101san\u0101-density through the accumulation of nirodha-sa\u1e43sk\u0101ras\n- **Asampraj\u00f1\u0101ta Sam\u0101dhi** \u2014 *dagdhab\u012bja* (burning of seeds): v\u0101san\u0101s are dissolved at their root; the subtle body is no longer capable of generating the kle\u015ba-driven v\u1e5bttis they would produce\n\n## Cross-References\n\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the stored impressions from which v\u0101san\u0101 arises; the two are intimately related but structurally distinct (storage vs. directional tendency)\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots; v\u0101san\u0101s are the kle\u015ba-tendencies encoded in the stored impressions\n- [R\u0101ga](raga.md) \u2014 the pleasure-following tendency; r\u0101ga as a v\u0101san\u0101 is the dispositional pull toward pleasure-objects\n- [Dve\u1e63a](dvesha.md) \u2014 the pain-avoiding tendency; dve\u1e63a as a v\u0101san\u0101 is the dispositional push away from pain-objects\n- [Nirodha](nirodha.md) \u2014 the cessation that terminates the v\u0101san\u0101-v\u1e5btti-sa\u1e43sk\u0101ra loop\n- [Asampraj\u00f1\u0101ta Sam\u0101dhi](asamprajnata-samadhi.md) \u2014 the state in which v\u0101san\u0101s are burned at their root\n- [Kaivalya](kaivalya.md) \u2014 liberation; when v\u0101san\u0101s can no longer produce v\u1e5bttis colored by avidy\u0101\n\n## Audience Metaphor\n\nV\u0101san\u0101 is the magnetic bias baked into a compass. The compass (citta) can swing in many directions, but there is a persistent pull toward certain objects, experiences, or patterns of thought. That pull is v\u0101san\u0101. The sa\u1e43sk\u0101ras are what magnetized the compass \u2014 each r\u0101ga-sa\u1e43sk\u0101ra adds a bit more north-magnetism toward pleasure; each dve\u1e63a-sa\u1e43sk\u0101ra adds south-magnetism away from pain. Yoga practice demagnetizes the compass so that citta can orient freely toward Puru\u1e63a rather than being perpetually pulled by accumulated valences.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 4.8-4.9, 4.24\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 4.8-4.9\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) (k\u0101rik\u0101 44) on subtle body and v\u0101san\u0101\n4. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 4.4.5-6 (v\u0101san\u0101 and rebirth)", "concepts/viveka-khyati": "# Viveka-Khy\u0101ti \u2014 \u0935\u093f\u0935\u0947\u0915\u0916\u094d\u092f\u093e\u0924\u093f\n\n**Not:** insight, wisdom, enlightenment, self-realization, discrimination alone\n\nThe sustained discriminative recognition of Puru\u1e63a as permanently distinct from Prak\u1e5bti \u2014 the direct perceptual seeing that the witness is not the witnessed. Viveka-khy\u0101ti is the specific cognitive remedy for avidy\u0101 (the root misidentification of Puru\u1e63a with Prak\u1e5bti) and is the proximate cause of kaivalya. It arises from the eight-limb path, matures in nirvic\u0101ra sam\u0101dhi, and must be sustained until even itself is transcended.\n\n## Etymology\n\n- *viveka* \u2014 from \u221a*vic* (to sift, to separate, to discriminate); the act of discriminating, separating, distinguishing\n- *khy\u0101ti* \u2014 from \u221a*khy\u0101* (to be known, to appear, to be famous); recognition, appearance, disclosure\n- *viveka-khy\u0101ti* \u2014 \"the appearance/recognition of discrimination\"; the dawning of discriminative awareness; the cognitive event in which the distinction between Puru\u1e63a and Prak\u1e5bti becomes perceptually present\n\n## YS 2.26 \u2014 Viveka-Khy\u0101ti as the Remedy\n\n*vivekakhy\u0101tiraviplav\u0101 h\u0101nop\u0101ya\u1e25*\n\n\"The unbroken (*aviplav\u0101*) discriminative recognition (*viveka-khy\u0101ti*) is the means of cessation (of suffering).\"\n\nThe word *aviplav\u0101* \u2014 \"unbroken, unfluctuating, not wavering\" \u2014 is the key qualifier. Any practitioner can experience a moment of viveka. The *practice* is making that recognition sustained, unfluctuating, progressively deepening until it cannot be reversed.\n\n## YS 2.28 \u2014 How It Arises\n\n*yog\u0101\u1e45g\u0101nu\u1e63\u1e6dh\u0101n\u0101da\u015buddhik\u1e63aye j\u00f1\u0101nad\u012bptir\u0101vivekakhy\u0101te\u1e25*\n\n\"From the practice of the limbs of yoga comes the destruction of impurity; then the light of knowledge (*j\u00f1\u0101na-d\u012bpti*) shines up to discriminative recognition (*\u0101viveka-khy\u0101ti*).\"\n\nThe path is explicit: the eight limbs (*yog\u0101\u1e45ga*) reduce impurity (*a\u015buddhi*) \u2014 which in this context means the Tamas and Rajas that obscure Sattvic citta. As impurity is removed, the *j\u00f1\u0101na-d\u012bpti* (light of knowledge \u2014 a Sattvic function of purified buddhi) shines progressively, up to and culminating in viveka-khy\u0101ti.\n\n## Avidy\u0101 and Viveka-Khy\u0101ti as Structural Opposites\n\n| Avidy\u0101 | Viveka-Khy\u0101ti |\n|--------|--------------|\n| Misidentification of Puru\u1e63a with Prak\u1e5bti | Recognition of Puru\u1e63a as permanently distinct |\n| The root kle\u015ba | The root liberation-event |\n| The condition of ordinary experience | The condition progressively cultivated in practice |\n| Obscured by Tamas (\u0101vara\u1e47a) | Revealed by purified Sattva |\n| Generates r\u0101ga, dve\u1e63a, abhinive\u015ba | Dissolves all kle\u015bas progressively |\n\n## The Stages of Viveka-Khy\u0101ti\n\nThe Yoga Bh\u0101\u1e63ya describes viveka-khy\u0101ti as arising in degrees corresponding to the sampraj\u00f1\u0101ta stages:\n\n1. **Pr\u0101rabdha viveka** \u2014 initial glimpse; the discrimination appears in higher dh\u0101ra\u1e47\u0101 or lower sampraj\u00f1\u0101ta stages; easily lost\n2. **Nirvic\u0101ra viveka-khy\u0101ti** \u2014 the discriminative recognition that arises in nirvic\u0101ra sam\u0101dhi; *praj\u00f1\u0101* is now stable enough to sustain the distinct
