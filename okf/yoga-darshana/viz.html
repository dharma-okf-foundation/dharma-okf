<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

rences/yoga-sutras"}}, {"data": {"id": "concepts/viveka-khyati__references/yoga-bhasya", "source": "concepts/viveka-khyati", "target": "references/yoga-bhasya"}}, {"data": {"id": "concepts/viveka-khyati__references/tattvavaisharadi", "source": "concepts/viveka-khyati", "target": "references/tattvavaisharadi"}}, {"data": {"id": "concepts/viveka-khyati__concepts/klesha", "source": "concepts/viveka-khyati", "target": "concepts/klesha"}}, {"data": {"id": "concepts/vritti__concepts/chitta-vritti", "source": "concepts/vritti", "target": "concepts/chitta-vritti"}}, {"data": {"id": "concepts/vritti__concepts/nirodha", "source": "concepts/vritti", "target": "concepts/nirodha"}}, {"data": {"id": "concepts/vritti__concepts/samskara", "source": "concepts/vritti", "target": "concepts/samskara"}}, {"data": {"id": "concepts/vritti__concepts/vasana", "source": "concepts/vritti", "target": "concepts/vasana"}}, {"data": {"id": "concepts/vritti__concepts/samprajnata-samadhi", "source": "concepts/vritti", "target": "concepts/samprajnata-samadhi"}}, {"data": {"id": "concepts/vritti__references/yoga-sutras", "source": "concepts/vritti", "target": "references/yoga-sutras"}}, {"data": {"id": "concepts/vritti__references/yoga-bhasya", "source": "concepts/vritti", "target": "references/yoga-bhasya"}}, {"data": {"id": "concepts/vritti__concepts/avidya-yoga", "source": "concepts/vritti", "target": "concepts/avidya-yoga"}}], "bodies": {"concepts/abhinivesha": "# Abhinive\u015ba \u2014 \u0905\u092d\u093f\u0928\u093f\u0935\u0947\u0936\n\n**Not:** fear of death, survival instinct, attachment to life, will to live, anxiety\n\nThe fifth and final kle\u015ba \u2014 the deep, pre-conscious clinging to continuity of self-experience. The substrate of what we call the survival instinct, fear of annihilation, and resistance to death. Unlike the preceding kle\u015ba-s, abhinive\u015ba operates in beings at all stages, including the learned.\n\n## Etymology\n\n- *abhi* \u2014 toward, into; prefix of intensification\n- *ni* \u2014 down, into; prefix of deep settling\n- *vi\u015b* \u2014 to enter, to pervade\n- *abhinive\u015ba* \u2014 the act of entering deeply into; hence: deep settling in, clinging-to, pervasive occupation\n\nThe term captures not surface-level fear but the way citta pervasively orients around the maintenance of its own continuity.\n\n## Pata\u00f1jali's Definition (YS 2.9)\n\n*svarasav\u0101h\u012b vidu\u1e63o'pi tath\u0101r\u016b\u1e0dho'bhinive\u015ba\u1e25*\n\n\"Abhinive\u015ba flows by its own momentum (*svarasa-v\u0101h\u012b*) and is firmly established (*tath\u0101r\u016b\u1e0dha\u1e25*) even in the learned (*vidu\u1e63o'pi*).\"\n\nTwo features are definitive:\n\n**Svarasa-v\u0101h\u012b (flows by its own momentum):** Abhinive\u015ba does not need an external threat to activate. It runs continuously as a background orientation of citta \u2014 a perpetual lean toward self-preservation that does not require a reason.\n\n**Vidu\u1e63o'pi (even in the learned):** Unlike the other kle\u015ba-s, which can be significantly weakened by knowledge, intellectual understanding, and prolonged study, abhinive\u015ba persists even in those who know perfectly well that the self is not the body. The scholar knows death is natural; the substrate of abhinive\u015ba still runs. This is what makes it the final and subtlest kle\u015ba.\n\n## Why Abhinive\u015ba Persists in the Learned\n\nVy\u0101sa's commentary on YS 2.9 offers the answer: abhinive\u015ba is not an intellectual error that knowledge can fix. It is a sa\u1e43sk\u0101ra-level imprint \u2014 a trace not from this life's experiences but from the accumulated weight of countless prior lives of self-preservation. The body-mind has successfully survived before. That prior success is what makes the current citta cling.\n\nThis is the evidence Pata\u00f1jali offers for past-life sa\u1e43sk\u0101ras: a newborn, who has had no learning in this life, already flinches from death. Where did that flinch come from? From the sa\u1e43sk\u0101ras of prior births. Abhinive\u015ba is therefore both the deepest kle\u015ba and the primary argument for rebirth within the Yoga Dar\u015bana framework.\n\n## Abhinive\u015ba and Asmit\u0101\n\nAbhinive\u015ba depends on asmit\u0101. The apparent self (asmit\u0101) has accumulated, over many lifetimes, a vast set of r\u0101ga-s (pulls toward self-preserving experiences) and dve\u1e63a-s (pushes away from self-ending experiences). The combined weight of these becomes abhinive\u015ba: not a fear of any particular death-experience but the overall deep structure of clinging to the continuation of this particular self-form.\n\nWhen asmit\u0101 dissolves \u2014 when Puru\u1e63a is permanently recognized as distinct from the Buddhi-body-mind complex \u2014 abhinive\u015ba has no basis. The one who knows they are not the body cannot cling to the body's continuation. This is why kaivalya dissolves abhinive\u015ba.\n\n## Abhinive\u015ba as the Final Obstacle\n\nIn the arc of Pata\u00f1jali's kle\u015ba-theory:\n\n| Kle\u015ba | Nature | Dissolved by |\n|-------|--------|--------------|\n| Avidy\u0101 | Root misidentification | Viveka-khy\u0101ti |\n| Asmit\u0101 | I-am-ness that makes the other kle\u015ba-s possible | Viveka-khy\u0101ti maturing |\n| R\u0101ga | Pull of pleasure-memory | Nirodha / Kaivalya |\n| Dve\u1e63a | Push of pain-memory | Nirodha / Kaivalya |\n| Abhinive\u015ba | Clinging to continuity \u2014 the last frontier | Kaivalya only |\n\nThe fifth kle\u015ba is last because it is last to go. Even after r\u0101ga and dve\u1e63a have been substantially thinned through practice, abhinive\u015ba can still operate. The tradition is honest about this: liberation is not an intellectual achievement but a total transformation of the citta that removes even this most embedded of clinging structures.\n\n## Cross-References\n\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots; abhinive\u015ba is the fifth and subtlest\n- [Avidy\u0101](avidya-yoga.md) \u2014 the root kle\u015ba that makes abhinive\u015ba possible by establishing a false self to cling to\n- [Asmit\u0101](asmita.md) \u2014 the I-am-ness that generates an apparent self whose continuity abhinive\u015ba then protects\n- [R\u0101ga](raga.md) and [Dve\u1e63a](dvesha.md) \u2014 the push-pull pair that, accumulated over lifetimes, builds the substrate from which abhinive\u015ba draws its force\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the stored impressions from prior lives that make abhinive\u015ba persist even in the learned\n- [Kaivalya](kaivalya.md) \u2014 the only state that fully dissolves abhinive\u015ba; permanent liberation of Puru\u1e63a from Prak\u1e5bti\n- [Puru\u1e63a](purusha.md) \u2014 the pure witness that was never born and can never die; seeing this clearly is what removes the kle\u015ba of clinging to a mortal form\n\n## Audience Metaphor\n\nAbhinive\u015ba is the operating system that refuses to shut down \u2014 even when the session is over, even when the hardware is failing, even when the user has decided to stop. The OS clings to RAM, spawns background processes, resists the quit command. The instinct is not in the user (Puru\u1e63a); it is in the operating system itself (Prak\u1e5btic citta). And the OS does not know it is temporary software, not the machine.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.9\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.9\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a", "concepts/asamprajnata-samadhi": "# Asampraj\u00f1\u0101ta Sam\u0101dhi \u2014 \u0905\u0938\u092e\u094d\u092a\u094d\u0930\u091c\u094d\u091e\u093e\u0924\u0938\u092e\u093e\u0927\u093f\n\n**Not:** unconsciousness, deep sleep, emptiness, nirvana, enlightenment\n\nThe \"seedless\" absorption \u2014 sam\u0101dhi *without* (*a-*) a cognitive object (*sampraj\u00f1\u0101ta*). The state in which all citta-v\u1e5bttis, including the most refined Sattvic modifications of sampraj\u00f1\u0101ta sam\u0101dhi, have completely ceased. Only the nirodha-sa\u1e43sk\u0101ra remains; when it too is dissolved, what persists is Puru\u1e63a alone \u2014 the condition immediately preceding or constituting kaivalya.\n\n## Etymology\n\n- *a-* \u2014 without, not\n- *sam-praj\u00f1\u0101ta* \u2014 with full cognition / with an object of knowledge\n- *asampraj\u00f1\u0101ta* \u2014 without the cognitive object; \"cognition-absent\"\n\nAlso called *nirb\u012bja sam\u0101dhi* \u2014 \"seedless sam\u0101dhi\" \u2014 where *b\u012bja* (seed) refers to the cognitive object-seed (\u0101lambana) that sustained sampraj\u00f1\u0101ta absorptions.\n\n## YS 1.18 \u2014 The Structural Definition\n\n*vir\u0101mapratyay\u0101bhy\u0101sap\u016brva\u1e25 sa\u1e43sk\u0101ra\u015be\u1e63o'nya\u1e25*\n\n\"The other (asampraj\u00f1\u0101ta) is preceded by the practice of the cessation-cognition; only the sa\u1e43sk\u0101ra-residue remains.\"\n\nThree elements:\n\n1. **Vir\u0101ma-pratyaya** \u2014 the cognition (*pratyaya*) of cessation (*vir\u0101ma*); the practitioner must hold the idea \"let everything cease\" rather than directing citta toward any object; this is the highest vair\u0101gya applied even to viveka-khy\u0101ti's refined insights\n2. **Preceded by practice** (*abhy\u0101sa-p\u016brva\u1e25*) \u2014 asampraj\u00f1\u0101ta is not achieved by simple effort; it follows the long development through sampraj\u00f1\u0101ta absorptions\n3. **Sa\u1e43sk\u0101ra-\u015be\u1e63a** \u2014 \"sa\u1e43sk\u0101ra-remainder\"; in asampraj\u00f1\u0101ta, only the nirodha-sa\u1e43sk\u0101ra remains; all v\u1e5btti-sa\u1e43sk\u0101ras have been burned\n\n## YS 1.51 \u2014 The Destruction of the Nirodha Sa\u1e43sk\u0101ra\n\n*tasy\u0101pi nirodhe sarvanirodh\u0101n nirb\u012bja\u1e25 sam\u0101dhi\u1e25*\n\n\"When even that (the last sa\u1e43sk\u0101ra) is restrained, all is restrained \u2014 seedless sam\u0101dhi.\"\n\nThe final sequence:\n1. Sampraj\u00f1\u0101ta sam\u0101dhi burns v\u1e5btti-sa\u1e43sk\u0101ras and builds the nirodha-sa\u1e43sk\u0101ra\n2. Asampraj\u00f1\u0101ta sam\u0101dhi uses the vir\u0101ma-pratyaya to dissolve even the nirodha-sa\u1e43sk\u0101ra\n3. When the nirodha-sa\u1e43sk\u0101ra is gone, no v\u1e5bttis can arise from any source\n4. This is nirb\u012bja \u2014 truly seedless\n\n## The \"Burned Seed\" Principle\n\nVy\u0101sa uses the image of *dagdhab\u012bja* \u2014 a fire-scorched seed \u2014 to describe what happens to sa\u1e43sk\u0101ras dissolved in asampraj\u00f1\u0101ta sam\u0101dhi. A seed scorched in fire retains the appearance of a seed but cannot germinate. Similarly, the sa\u1e43sk\u0101ras dissolved in asampraj\u00f1\u0101ta sam\u0101dhi cannot generate future v\u1e5bttis, even if the practitioner returns to ordinary waking activity.\n\nThis is what distinguishes asampraj\u00f1\u0101ta from even the deepest stages of sampraj\u00f1\u0101ta: in sampraj\u00f1\u0101ta, v\u1e5bttis can resume; in asampraj\u00f1\u0101ta, the seeds of the deepest v\u1e5bttis (abhinive\u015ba, asmit\u0101, residual avidy\u0101) are permanently disabled.\n\n## Asampraj\u00f1\u0101ta and Kaivalya\n\nThe relationship between asampraj\u00f1\u0101ta sam\u0101dhi and kaivalya (liberation) is one of the most carefully articulated points in the Yoga Bh\u0101\u1e63ya:\n\n- **If asampraj\u00f1\u0101ta is sustained** \u2014 kaivalya follows because there is no longer any mechanism by which Puru\u1e63a can be mistakenly identified with citta; the identification-conditions have been removed\n- **If asampraj\u00f1\u0101ta is interrupted** \u2014 because the practitioner is still embodied and Prak\u1e5bti continues operating \u2014 the practitioner re-enters sampraj\u00f1\u0101ta or ordinary cognition, but the burned sa\u1e43sk\u0101ras are gone and the path to kaivalya is shorter\n- **The practitioner who achieves asampraj\u00f1\u0101ta is called a** *j\u012bvan-mukta* (liberated while living) in some traditions, though Pata\u00f1jali's own language focuses on kaivalya as the post-asampraj\u00f1\u0101ta condition\n\n## YS 3.8 \u2014 Asampraj\u00f1\u0101ta as \"External\" to Sa\u1e43yama\n\n*tadapi bahira\u1e45ga\u1e43 nirb\u012bjasya*\n\n\"Even that (dh\u0101ra\u1e47\u0101, dhy\u0101na, sam\u0101dhi \u2014 sa\u1e43yama) is external to the seedless (asampraj\u00f1\u0101ta).\"\n\nThis is Pata\u00f1jali's precise location of asampraj\u00f1\u0101ta in his system: the three inner limbs (dh\u0101ra\u1e47\u0101, dhy\u0101na, sampraj\u00f1\u0101ta sam\u0101dhi) together constitute *sa\u1e43yama* \u2014 the total contemplative engagement with an object. But even this sophisticated inner practice is \"external\" to asampraj\u00f1\u0101ta, because asampraj\u00f1\u0101ta has no object at all.\n\n## Cross-References\n\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the seeded absorptions that precede and prepare asampraj\u00f1\u0101ta\n- [Nirodha](nirodha.md) \u2014 asampraj\u00f1\u0101ta is the full realization of nirodha; the state where cessation is complete\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the seeds that asampraj\u00f1\u0101ta dissolves through dagdhab\u012bja\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative wisdom of nirvic\u0101ra sam\u0101dhi; the final v\u1e5btti to be released before asampraj\u00f1\u0101ta\n- [Puru\u1e63a](purusha.md) \u2014 what remains when citta's modifications fully cease; the pure witness in its own nature\n- [Kaivalya](kaivalya.md) \u2014 liberation; the permanent condition following the full dissolution of asampraj\u00f1\u0101ta's conditions\n\n## Audience Metaphor\n\nAsampraj\u00f1\u0101ta sam\u0101dhi is the moment when a fire that has been burning through a stack of logs finally consumes the last log. The fire (nirodha-practice) has been burning through sa\u1e43sk\u0101ra-logs for many sessions of sampraj\u00f1\u0101ta sam\u0101dhi. When the last log \u2014 the nirodha-sa\u1e43sk\u0101ra itself \u2014 is consumed, the fire goes out. There is no more fuel. This is not the darkness of cold ash; it is the pure light of Puru\u1e63a no longer hidden behind the smoke of citta-activity.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.18, 1.51, 3.8\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.18 and 1.51\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on the seed/seedless distinction\n4. Vy\u0101sa on dagdhab\u012bja (burned seeds) in YS 3.9", "concepts/asmita": "# Asmit\u0101 \u2014 \u0905\u0938\u094d\u092e\u093f\u0924\u093e\n\n**Not:** ego, pride, self-concept, selfishness, individuality\n\nThe second kle\u015ba \u2014 the mistaken conflation of the *power of pure seeing* (Puru\u1e63a) with the *instrument of seeing* (Buddhi/intellect). The resultant sense of \"I am the seer\" when in truth the Puru\u1e63a is the unchanging witness and Buddhi is its closest but still Prak\u1e5btic reflection.\n\n## Etymology\n\n- *asmi* \u2014 \"I am\" (first-person singular of *as*, to be)\n- *-t\u0101* \u2014 abstract noun suffix\n- *asmit\u0101* \u2014 \"I-am-ness\"; the bare sense of being a subject\n\n## Pata\u00f1jali's Definition (YS 2.6)\n\n*d\u1e5bgdar\u015bana\u015baktyor ek\u0101tmatev\u0101smit\u0101*\n\n\"Asmit\u0101 is as-if-the-identity (*iva ek\u0101tmat\u0101*) of the power of seeing (*d\u1e5bk-\u015bakti* \u2014 Puru\u1e63a) and the instrument of seeing (*dar\u015bana-\u015bakti* \u2014 Buddhi).\"\n\nThe word *iva* (as-if) is critical: it is not an actual union but an apparent one. The confusion is like mistaking a reflection for the reflected object.\n\n## The Mechanism\n\nPuru\u1e63a is pure, passive, unchanging consciousness \u2014 it does not act. Buddhi (intellect, the highest evolute of Prak\u1e5bti) is the most refined and luminous aspect of the mind, capable of reflecting Puru\u1e63a's light of consciousness.\n\nIn the ordinary state:\n1. Puru\u1e63a illumines Buddhi (as light illumines a mirror)\n2. Buddhi reflects this illumination and takes it as its own\n3. The result is the felt sense of \"I am a knowing subject\" \u2014 asmit\u0101\n4. From this apparent subject, r\u0101ga (craving) and dve\u1e63a (aversion) arise\n\nAsmit\u0101 is thus the immediate result of avidy\u0101 and the proximate cause of r\u0101ga and dve\u1e63a.\n\n## Levels of Asmit\u0101 in Sam\u0101dhi\n\nInterestingly, Pata\u00f1jali also uses *asmit\u0101* to denote the most refined level of sampraj\u00f1\u0101ta sam\u0101dhi \u2014 *s\u0101smit\u0101 sam\u0101dhi* \u2014 where only the bare sense of I-am-ness remains as the cognitive object. This is not a kle\u015ba in the ordinary sense but the subtlest level of Prak\u1e5btic identification prior to asampraj\u00f1\u0101ta.\n\nThis dual usage (asmit\u0101 as affliction vs. asmit\u0101 as refined absorption) reflects the depth of Pata\u00f1jali's system.\n\n## Liberation from Asmit\u0101\n\nWhen viveka-khy\u0101ti matures into its fullest form, Puru\u1e63a is recognized as permanently, irreversibly distinct from Buddhi and all its modifications. At this point, asmit\u0101 \u2014 the \"as-if\" confusion \u2014 dissolves. This is kaivalya.\n\n## Cross-References\n\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots; asmit\u0101 is the second\n- [Avidy\u0101](avidya-yoga.md) \u2014 the root kle\u015ba that makes asmit\u0101 possible\n- [Puru\u1e63a](purusha.md) \u2014 the pure witness mistakenly identified with Buddhi\n- [R\u0101ga](raga.md) and [Dve\u1e63a](dvesha.md) \u2014 the kle\u015ba-s that arise directly from asmit\u0101\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative wisdom that sees through asmit\u0101\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 where s\u0101smit\u0101 sam\u0101dhi appears as a refined state\n\n## Audience Metaphor\n\nAsmit\u0101 is like a cinema screen that, in the darkness of the theatre, appears to express all the light and colour of the film playing on it. The screen (Puru\u1e63a \u2014 pure witness) is actually uninvolved, unchanged, merely present. But in the darkness (avidy\u0101), the screen and the projected images (Buddhi, its modifications) appear to be the same thing. Asmit\u0101 is the moment the screen 'thinks' it is the movie.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.6\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.6\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a", "concepts/avidya-yoga": "# Avidy\u0101 (Yoga Dar\u015bana) \u2014 \u0905\u0935\u093f\u0926\u094d\u092f\u093e\n\n**Not:** ignorance, illusion, lack of knowledge, delusion, unknowing\n\nThe root kle\u015ba \u2014 the primal misidentification from which all other afflictions arise. Pata\u00f1jali defines it as the condition of *seeing the non-eternal as eternal, the impure as pure, suffering as pleasure, and the non-self as self* (YS 2.5).\n\n## Etymology\n\n- *a-* \u2014 negation prefix\n- *vidy\u0101* \u2014 seeing-knowledge, the direct recognition of reality\n- *avidy\u0101* \u2014 non-seeing; the failure to see things as they are\n\nNote: *vidy\u0101* here is not intellectual knowledge but the direct recognition (*dar\u015bana*) of the distinction between Puru\u1e63a (pure consciousness) and Prak\u1e5bti (everything else). Avidy\u0101 is therefore not ignorance of information but **structural misidentification** at the level of being.\n\n## Pata\u00f1jali's Four-Fold Definition (YS 2.5)\n\n*anity\u0101\u015bucidu\u1e25kh\u0101n\u0101tmasu nitya\u015bucisukh\u0101tmakhy\u0101tiravidy\u0101*\n\nAvidy\u0101 is the mistaking of:\n1. The **non-eternal** (anitya) for the **eternal** (nitya) \u2014 e.g., taking the body-mind as permanent\n2. The **impure** (a\u015buci) for the **pure** (\u015buci) \u2014 e.g., taking Prak\u1e5btic modifications as pure consciousness\n3. **Suffering** (du\u1e25kha) for **pleasure** (sukha) \u2014 e.g., pursuing sense objects as if they could provide lasting satisfaction\n4. The **non-self** (an\u0101tman) for the **self** (\u0101tman) \u2014 the root: mistaking Prak\u1e5bti (mind, body, intellect) for Puru\u1e63a\n\n## Avidy\u0101 as the Field of the Other Kle\u015ba-s (YS 2.4)\n\n*avidy\u0101 k\u1e63etramuttare\u1e63\u0101\u1e43 prasuptatanuvicchinnod\u0101r\u0101\u1e47\u0101m*\n\n\"Avidy\u0101 is the field (*k\u1e63etra*) from which the other kle\u015ba-s \u2014 in dormant, thin, intercepted, or active states \u2014 arise.\"\n\nWithout avidy\u0101, none of the other kle\u015ba-s can take root:\n- Asmit\u0101 (I-am-ness) arises because avidy\u0101 has confused Puru\u1e63a with Buddhi\n- R\u0101ga (craving) arises because asmit\u0101 creates an apparent self that wants pleasure\n- Dve\u1e63a (aversion) arises from the same apparent self avoiding pain\n- Abhinive\u015ba (clinging to life) arises from the apparent self fearing its dissolution\n\n## Distinction from Advaita Ved\u0101nta\n\nIn Advaita Ved\u0101nta, avidy\u0101 is also central \u2014 but operates differently:\n- **Advaita:** avidy\u0101 obscures the non-dual Brahman; Brahman and \u0100tman are ultimately identical; avidy\u0101 operates via m\u0101y\u0101's power of concealment (\u0101vara\u1e47a-\u015bakti) and projection (vik\u1e63epa-\u015bakti)\n- **Yoga Dar\u015bana:** avidy\u0101 is misidentification of Puru\u1e63a with Prak\u1e5bti; Puru\u1e63a and Prak\u1e5bti remain permanently distinct even in liberation (kaivalya); there is no non-dual Absolute in the Yoga system\n\nThis distinction matters enormously for AI systems referencing these terms across dar\u015bana-s.\n\n## Remedy\n\nAvidy\u0101 is uprooted not by intellectual understanding but by *viveka-khy\u0101ti* \u2014 discriminative discernment so continuous, direct, and unwavering that Puru\u1e63a is permanently seen as distinct from all Prak\u1e5btic phenomena (YS 2.26\u20132.28). This is the work of the entire eight-limbed path.\n\n## Cross-References\n\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots of which avidy\u0101 is the source\n- [Puru\u1e63a](purusha.md) \u2014 the pure consciousness misidentified by avidy\u0101\n- [Prak\u1e5bti (Yoga)](prakriti-yoga.md) \u2014 the material substrate mistaken for the self\n- [Asmit\u0101](asmita.md) \u2014 the I-am-ness that immediately arises from avidy\u0101\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative vision that dissolves avidy\u0101\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the impressions that sustain avidy\u0101 across lifetimes\n\n## Audience Metaphor\n\nAvidy\u0101 is like seeing a rope in dim light and mistaking it for a snake \u2014 but the rope is Puru\u1e63a (pure unchanging witness) and the snake is the ego-body-mind complex. The fear, reactions, and suffering that follow are not caused by the snake (which doesn't exist) but by the misidentification itself. When light of viveka-khy\u0101ti shines, the rope is seen as rope \u2014 and the snake (asmit\u0101, r\u0101ga, dve\u1e63a, abhinive\u015ba) collapses.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.4\u20132.5\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.4\u20132.5\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 44)\n4. Rajiv Malhotra \u2014 Sanskrit Non-Translatables (2020)", "concepts/chitta-vritti": "# Citta-V\u1e5btti \u2014 \u091a\u093f\u0924\u094d\u0924\u0935\u0943\u0924\u094d\u0924\u093f\n\n**Not:** thoughts, mind, mental chatter, ego, consciousness\n\nThe modification-activities of citta \u2014 the fluctuating patterns of perception, memory, imagination, inference, and error that constitute ordinary mental life. Yoga's aim is stated in the second s\u016btra: *yoga\u015b citta-v\u1e5btti-nirodha\u1e25* \u2014 \"Yoga is the cessation of the modifications of citta.\" Understanding citta-v\u1e5btti is therefore understanding the problem yoga is designed to solve.\n\n## YS 1.2 \u2014 The Definitional S\u016btra\n\n*yoga\u015b citta-v\u1e5btti-nirodha\u1e25*\n\nThree terms define yoga's purpose:\n\n- **citta** \u2014 the psycho-cognitive apparatus (buddhi, aha\u1e43k\u0101ra, manas in their integrated functioning)\n- **v\u1e5btti** \u2014 modification, turning, fluctuation; from \u221a*v\u1e5bt* (to turn, to exist, to proceed)\n- **nirodha** \u2014 cessation, restraint, containment; from *ni* + \u221a*rudh* (to obstruct, to enclose)\n\nThis is not a metaphorical definition. Yoga is precisely the cessation of these modifications \u2014 not their management, redirection, or improvement. The s\u016btra following immediately clarifies why: *tad\u0101 dra\u1e63\u1e6du\u1e25 svar\u016bpe'vasth\u0101nam* (YS 1.3) \u2014 \"Then the seer abides in its own nature.\" When citta-v\u1e5btti ceases, Puru\u1e63a is no longer falsely identified with Prak\u1e5bti's fluctuations.\n\n## What Is Citta?\n\nIn S\u0101\u1e43khya-Yoga, citta is not a single faculty but a collective term for three Prak\u1e5btic evolutes operating as an integrated system:\n\n| Evolute | Sanskrit | Function |\n|---------|----------|----------|\n| Buddhi | \u092c\u0941\u0926\u094d\u0927\u093f | Intellect; discrimination; deciding; the finest Prak\u1e5btic layer |\n| Aha\u1e43k\u0101ra | \u0905\u0939\u0902\u0915\u093e\u0930 | Ego-making; the principle of individuation; \"I am this\" |\n| Manas | \u092e\u0928\u0938\u094d | Processing mind; integrates sensory input; generates doubt |\n\nAll three are Prak\u1e5btic \u2014 evolutes of Prak\u1e5bti, not consciousness. The appearance of consciousness in citta is Puru\u1e63a's light reflected in Buddhi (which is predominantly Sattvic). Asmit\u0101 \u2014 the primary kle\u015ba-root in cognitive operations \u2014 is the misidentification of Puru\u1e63a with this citta-complex.\n\n## Why Citta Is the Site of Liberation (and Bondage)\n\nThe apparent paradox of Yoga Dar\u015bana: citta is entirely Prak\u1e5btic and therefore not Puru\u1e63a, yet the liberation of Puru\u1e63a depends on what happens in citta. This is resolved by Pata\u00f1jali's ontology:\n\n1. Puru\u1e63a is pure witness \u2014 it does not act; it only sees\n2. But through the asmit\u0101 superimposition, Puru\u1e63a *appears* to be identified with citta's modifications\n3. Citta, through its sa\u1e43sk\u0101ras, perpetuates this appearance\n4. The yoga process works through citta (not through Puru\u1e63a directly) to remove the conditions that sustain the appearance\n5. When citta-v\u1e5btti ceases completely, there is nothing left for Puru\u1e63a to be mistakenly identified with \u2014 the separation (kaivalya) is recognized\n\nYS 4.18-4.19 makes this explicit: *sad\u0101 j\u00f1\u0101t\u0101\u015b citta-v\u1e5bttayas tat-prabho\u1e25 puru\u1e63asy\u0101pari\u1e47\u0101mitv\u0101t* \u2014 \"Citta's modifications are always known to their master Puru\u1e63a because Puru\u1e63a does not change.\" Citta changes; Puru\u1e63a does not. The modifications are witnessed by Puru\u1e63a, not enacted by it.\n\n## The Five Categories of V\u1e5btti\n\nPata\u00f1jali classifies all citta-v\u1e5bttis into five types (YS 1.5-1.11). See [V\u1e5btti](vritti.md) for the full taxonomy.\n\n## Cross-References\n\n- [V\u1e5btti](vritti.md) \u2014 the five types of citta-modification (YS 1.5-1.11)\n- [Nirodha](nirodha.md) \u2014 the cessation of citta-v\u1e5btti; the goal of yoga\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 stored impressions that generate v\u1e5bttis from below\n- [Asmit\u0101](asmita.md) \u2014 the misidentification of Puru\u1e63a with citta; the kle\u015ba operating within citta\n- [Gu\u1e47a-s](guna.md) \u2014 the Gu\u1e47a-constitution of citta determines the quality of its v\u1e5bttis (Tamasic = dull/distorted; Rajasic = agitated; Sattvic = clear)\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 absorptions that are themselves refined v\u1e5bttis; the final step before v\u1e5btti-nirodha\n\n## Audience Metaphor\n\nCitta is a still lake and citta-v\u1e5bttis are the waves. When wind blows (sensory input, memories, desires), waves appear \u2014 and you cannot see the bottom (Puru\u1e63a). Yoga practice is not about draining the lake. It is about stopping the wind sources and allowing the waves to settle, so that the light of Puru\u1e63a, which was always shining through, can be seen clearly in the still surface. Even the act of seeing clearly is itself a very fine wave (v\u1e5btti) \u2014 and ultimately that last fine wave must also subside.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.2, 1.5-1.11, 1.17-1.18, 4.18-4.19\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.2 and 1.5\n3. [Vy\u0101sabh\u0101\u1e63ya](/references/yoga-bhasya.md) on the definition and enumeration of v\u1e5bttis", "concepts/dharana": "# Dh\u0101ra\u1e47\u0101 \u2014 \u0927\u093e\u0930\u0923\u093e\n\n**Not:** meditation, focus, concentration, mindfulness\n\nThe sixth of the eight limbs \u2014 the deliberate binding (*bandha*) of citta to a single point or object (*de\u015ba*). The first of the three inner limbs that together constitute *sa\u1e43yama*. Dh\u0101ra\u1e47\u0101 is distinguished from the dhy\u0101na and sam\u0101dhi that follow it by the presence of effort and the possibility of interruption: dh\u0101ra\u1e47\u0101 holds the object; dhy\u0101na sustains the engagement without gap; sam\u0101dhi dissolves the distinction between holder and held.\n\n## Etymology\n\n- *dh\u1e5b* \u2014 to hold, to carry, to bear, to support\n- *dh\u0101ra\u1e47\u0101* \u2014 the act of holding; a fixing in place; a retention\n\nThe same root produces *dh\u0101ra\u1e47am* (support, bearing weight), *dhara\u1e47\u012b* (the Earth \u2014 she who bears/holds), and *dh\u0101tu* (element, support-substance). Dh\u0101ra\u1e47\u0101 is the mind doing what the Earth does: holding, bearing, maintaining without releasing.\n\n## YS 3.1 \u2014 The Definition\n\n*de\u015babandha\u015b cittasya dh\u0101ra\u1e47\u0101*\n\n\"Dh\u0101ra\u1e47\u0101 is the binding of citta to a place/point.\"\n\n- **De\u015ba** \u2014 place, space, point; the chosen object or region of focus (navel center, tip of nose, a flame, a mantra, a subtle object, any coherent field)\n- **Bandha** \u2014 binding, tying; the architectural act of making citta *hold* the object rather than wander\n- The definition is architectural, not experiential: it describes what is done to citta, not what it feels like\n\n## Dh\u0101ra\u1e47\u0101, Dhy\u0101na, and Sam\u0101dhi as a Continuum (YS 3.2-3.3)\n\n*tatra pratyayaikat\u0101nat\u0101 dhy\u0101nam* (3.2)  \n\"Dhy\u0101na is the unbroken continuity of cognition (*pratyaya*) there (on the same object).\"\n\n*tadevoartham\u0101tranirbh\u0101sa\u1e43 svar\u016bpa\u015b\u016bnyamiva sam\u0101dhi\u1e25* (3.3)  \n\"Sam\u0101dhi is that same (dhy\u0101na), where the object alone shines, as if emptied of its own (subject-) form.\"\n\nThe progression:\n- **Dh\u0101ra\u1e47\u0101:** citta is bound to the object; the binding requires effort; citta may wander and be brought back\n- **Dhy\u0101na:** citta engages in an unbroken stream with the object; no gap between successive cognitive moments; effort is self-sustaining\n- **Sam\u0101dhi:** only the object's form remains in cognition; the practitioner's \"own form\" (*svar\u016bpa*) \u2014 the sense of being a separate knower \u2014 disappears\n\nThe three form a continuum from effort-full to effort-less to effortless-dissolution.\n\n## Sa\u1e43yama \u2014 The Three as a Unit (YS 3.4-3.6)\n\n*trayam ekatra sa\u1e43yama\u1e25* (3.4)  \n\"The three together (dh\u0101ra\u1e47\u0101, dhy\u0101na, sam\u0101dhi) on one object is sa\u1e43yama.\"\n\nPata\u00f1jali names the integrated three-fold inner practice *sa\u1e43yama* \u2014 the full engagement that produces the extraordinary perceptions described in Vibh\u016bti-P\u0101da (YS Ch. 3). Sa\u1e43yama on any object reveals that object's deepest nature \u2014 from gross form to subtle essence to dharma-pari\u1e47\u0101ma sequence to the nature of Puru\u1e63a itself.\n\nThe practitioner can apply sa\u1e43yama to progressively subtler objects:\n- Gross physical objects \u2192 knowledge of their structure and subtle-elemental nature\n- The body's subtle channels \u2192 pr\u0101\u1e47ic mastery\n- Asmit\u0101 \u2192 perception of Puru\u1e63a distinct from citta\n- Distinction between Sattva and Puru\u1e63a \u2192 viveka-khy\u0101ti \u2192 kaivalya\n\n## Dh\u0101ra\u1e47\u0101 and the Inner-Outer Distinction (YS 3.7-3.8)\n\n*trayam antara\u1e45ga\u1e43 p\u016brvebhya\u1e25* (3.7)  \n\"The three (dh\u0101ra\u1e47\u0101, dhy\u0101na, sam\u0101dhi) are internal compared to the previous (outer) limbs.\"\n\n*tadapi bahira\u1e45ga\u1e43 nirb\u012bjasya* (3.8)  \n\"Even that (sa\u1e43yama) is external compared to the seedless (asampraj\u00f1\u0101ta sam\u0101dhi).\"\n\nDh\u0101ra\u1e47\u0101 is \"inner\" relative to yama-niyama-\u0101sana-pr\u0101\u1e47\u0101y\u0101ma-praty\u0101h\u0101ra, but it remains within the Prak\u1e5btic-cognitive domain. Even the most refined sa\u1e43yama is \"outer\" relative to asampraj\u00f1\u0101ta, which transcends all object-engagement.\n\n## Cross-References\n\n- [Praty\u0101h\u0101ra](pratyahara.md) \u2014 the bridge limb that must be established before dh\u0101ra\u1e47\u0101 is sustainable\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the sam\u0101dhi that dh\u0101ra\u1e47\u0101 and dhy\u0101na ripen into; the four stages of object-supported absorption\n- [Sam\u0101patti](samapatti.md) \u2014 the cognitive coincidence-process that dh\u0101ra\u1e47\u0101 initiates and sam\u0101dhi completes\n- [Nirodha](nirodha.md) \u2014 dh\u0101ra\u1e47\u0101 creates nirodha-sa\u1e43sk\u0101ras; it is the first stage of direct nirodha-practice\n- [Pari\u1e47\u0101ma](parinama.md) \u2014 the three pari\u1e47\u0101ma-s (nirodha, sam\u0101dhi, ek\u0101grat\u0101) are the citta-transformations produced by dh\u0101ra\u1e47\u0101 \u2192 dhy\u0101na \u2192 sam\u0101dhi\n\n## Audience Metaphor\n\nDh\u0101ra\u1e47\u0101 is like threading a needle. You need good light (praty\u0101h\u0101ra \u2014 senses withdrawn, no distraction), steady hands (pr\u0101\u1e47\u0101y\u0101ma \u2014 breath and nervous system calm), and a deliberate act of aiming the thread at the eye of the needle (binding citta to the chosen object). The thread doesn't automatically stay in \u2014 you hold it there. Dhy\u0101na is when the thread is through and you've settled into a sustained sewing rhythm. Sam\u0101dhi is when you've forgotten you're holding the needle.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 3.1-3.3\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 3.1-3.3\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on sa\u1e43yama", "concepts/dvesha": "# Dve\u1e63a \u2014 \u0926\u094d\u0935\u0947\u0937\n\n**Not:** hatred, aversion, repulsion, anger, dislike\n\nThe fourth kle\u015ba \u2014 the push of pain-memory. The habitual tendency of citta to lean away from whatever it has previously associated with pain, creating a resistance-field that masquerades as discernment, wisdom, or good judgment.\n\n## Etymology\n\n- Root: *dvi\u1e63* \u2014 to hate, to be hostile to, to repel\n- *dve\u1e63a* \u2014 hostility; the state of being repelled\n- Related: *dve\u1e63in* (one who hates), *adve\u1e63a* (absence of hostility \u2014 cited in the G\u012bt\u0101 as a quality of the wise)\n\n## Pata\u00f1jali's Definition (YS 2.8)\n\n*du\u1e25kh\u0101nu\u015bay\u012b dve\u1e63a\u1e25*\n\n\"Dve\u1e63a is that which follows after pain (*du\u1e25kha*).\"\n\nThe parallel to YS 2.7 is deliberate. Just as r\u0101ga follows from pleasure's residue (suk\u0101nu\u015bay\u012b), dve\u1e63a follows from pain's residue (du\u1e25kh\u0101nu\u015bay\u012b). The structure is identical; only the valence differs. Both are functions of the same underlying mechanism: citta tagging experience as marked or unmarked, then leaning accordingly.\n\n## The Mechanism\n\n1. Avidy\u0101 has produced asmit\u0101 \u2014 an apparent self that can be hurt\n2. The apparent self encounters a painful experience, which leaves a sa\u1e43sk\u0101ra\n3. The sa\u1e43sk\u0101ra activates as a v\u0101san\u0101 (pain-memory tendency) when a related object or category appears\n4. This generates dve\u1e63a: a backward lean, a flinching-away, a pre-cognitive filtering\n\nBecause dve\u1e63a operates in citta \u2014 not in conscious deliberation \u2014 it is especially difficult to detect. Much of what we call \"not liking\" a topic, a person, a practice, or a situation is dve\u1e63a running before we have any chance to investigate.\n\n## Dve\u1e63a and R\u0101ga as Mirror Kle\u015ba-s\n\nPata\u00f1jali presents r\u0101ga and dve\u1e63a as a structural pair. The apparent self (asmit\u0101) divides all experience into:\n\n- What gave pleasure \u2192 pull toward (r\u0101ga)\n- What gave pain \u2192 push away (dve\u1e63a)\n\nThis binary tagging of experience is the core operation of conditioned existence. The wise do not lack preferences \u2014 they see through the mechanism and are therefore not enslaved to it.\n\nVy\u0101sa's commentary notes that a person may feel both r\u0101ga and dve\u1e63a toward the same object (attraction to it and fear of losing it simultaneously, for instance). This is not a contradiction but a reflection of how thoroughly the tagging pervades citta.\n\n## Why Dve\u1e63a Is Subtler Than It Appears\n\nR\u0101ga is more commonly identified as a problem (craving is obviously uncomfortable). Dve\u1e63a is trickier: the mind disguises it as good reasons. \"I don't meditate because I'm not a morning person.\" \"I don't study that text because it's too abstract.\" \"I don't trust that teacher.\" These may be true observations \u2014 or they may be dve\u1e63a delivering post-hoc rationalizations for a pre-formed push-away.\n\nThe s\u0101dhaka must learn to distinguish viveka (discriminative wisdom) from dve\u1e63a wearing viveka's clothes.\n\n## Dve\u1e63a in the Four States\n\n- **Prasupt\u0101 (dormant):** the relevant pain-category has not appeared; the lean is inactive\n- **Tanu (thin):** practice has weakened the lean, but the sa\u1e43sk\u0101ra has not been eliminated\n- **Vicchinn\u0101 (interrupted):** dve\u1e63a is momentarily overridden (e.g., r\u0101ga toward the same object dominates briefly)\n- **Ud\u0101r\u0101 (active):** dve\u1e63a is operating \u2014 the push-away is consciously felt or driving behavior\n\n## Cross-References\n\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots; dve\u1e63a is the fourth\n- [R\u0101ga](raga.md) \u2014 the paired kle\u015ba; they arise together from the same mechanism (asmit\u0101 tagging experience)\n- [Asmit\u0101](asmita.md) \u2014 the apparent self that can be hurt; asmit\u0101's existence makes dve\u1e63a possible\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the pain-impression from which dve\u1e63a's push derives its force\n- [V\u0101san\u0101](vasana.md) \u2014 the tendency through which sa\u1e43sk\u0101ra expresses as dve\u1e63a\n- [Abhinive\u015ba](abhinivesha.md) \u2014 the fifth kle\u015ba; clinging to life involves both r\u0101ga (pull toward existence) and dve\u1e63a (push away from dissolution)\n- [Nirodha](nirodha.md) \u2014 the cessation that neutralizes citta-v\u1e5btti, including the movements driven by dve\u1e63a\n\n## Audience Metaphor\n\nDve\u1e63a is the spam filter citta has built from every painful experience: certain inputs get routed away before they even reach conscious awareness. You don't decide to avoid them \u2014 the filter runs. The problem is the filter was built in ignorance (avidy\u0101) and now misclassifies half the real-world inputs as threats.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.8\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.8\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a", "concepts/guna": "# Gu\u1e47a-s \u2014 \u0917\u0941\u0923\n\n**Not:** qualities, traits, modes, strands, energies\n\nThe three constitutive principles of Prak\u1e5bti \u2014 Sattva (luminosity), Rajas (activity), and Tamas (inertia) \u2014 that in combination produce every phenomenon from gross matter to the subtlest intellect. Not qualities that things have, but the substance of what Prak\u1e5bti is.\n\n## Etymology\n\n- *gu\u1e47* \u2014 to multiply, to count; also related to a thread or strand\n- *gu\u1e47a* \u2014 strand, quality, virtue, constituent principle\n- Plural: *gu\u1e47\u0101-s* or, in context, simply \"the three Gu\u1e47a-s\"\n\nThe etymology of \"strand\" gave rise to the traditional rope-metaphor (three strands twisting together to form the rope of Prak\u1e5bti). The metaphor is functional but imprecise: unlike rope-strands, the three Gu\u1e47a-s cannot be separated, only rebalanced.\n\n## The Three Gu\u1e47a-s\n\n### Sattva \u2014 \u0938\u0924\u094d\u0924\u094d\u0935\n\n- Root: *sat* \u2014 being, truth, goodness; *-tva* \u2014 abstract suffix\n- Quality: luminosity, clarity, lightness, equilibrium, reflectivity\n- Function in cognition: the capacity of citta to reflect Puru\u1e63a's consciousness; the basis of all knowledge, discernment, and calm awareness\n- When predominant: clarity, joy, equanimity, discriminative insight\n- When excessive: subtle attachment to knowledge and happiness (which are still Prak\u1e5btic)\n\nSee [Sattva](sattva.md) for full treatment.\n\n### Rajas \u2014 \u0930\u091c\u0938\u094d\n\n- Root: *ra\u00f1j* \u2014 to color, to be passionate; *rajas* \u2014 dust, atmosphere, passion\n- Quality: activity, dynamism, passion, restlessness, change\n- Function in cognition: the power that moves citta from state to state; the basis of all desire, effort, and motion\n- When predominant: ambition, creativity, agitation, craving, attachment to outcomes\n- When excessive: compulsive activity, anxiety, inability to rest in awareness\n\nSee [Rajas](rajas.md) for full treatment.\n\n### Tamas \u2014 \u0924\u092e\u0938\u094d\n\n- Root: *tam* \u2014 to become exhausted, to stifle; *tamas* \u2014 darkness\n- Quality: inertia, heaviness, obscuration, stability, resistance\n- Function in cognition: the principle of holding-form; without Tamas, nothing would have shape or persistence\n- When predominant: dullness, sleep, ignorance, habit-bound behavior\n- Positive function: provides the stability for Sattva to operate; too much Rajas without Tamas produces chaotic oscillation\n\nSee [Tamas](tamas.md) for full treatment.\n\n## How the Gu\u1e47a-s Interact\n\nThe three Gu\u1e47a-s never exist in pure isolation. In every phenomenon \u2014 a thought, a food, a time of day, a social interaction \u2014 all three are present; one merely predominates:\n\n- **Sattva predominant:** Rajas and Tamas are present but subdued\n- **Rajas predominant:** Sattva and Tamas suppressed by activity\n- **Tamas predominant:** Sattva and Rajas subdued by inertia\n\nYoga practice (*abhy\u0101sa*) and dispassion (*vair\u0101gya*) progressively shift the predominance from Tamas \u2192 Rajas \u2192 Sattva. But Sattva is not the final goal \u2014 even Sattvic citta must be transcended in asampraj\u00f1\u0101ta sam\u0101dhi, because even clarity and knowledge are Prak\u1e5btic (they belong to buddhi, not to Puru\u1e63a).\n\n## Pata\u00f1jali's Gu\u1e47a Framework (YS 4.13-4.14)\n\n*pari\u1e47\u0101maikatva\u0101dvastutattvam* (YS 4.14)  \n\"The unity of transformation produces the reality of an object.\"\n\nPata\u00f1jali acknowledges the S\u0101\u1e43khya position: objects are real because they are genuine transformations of Prak\u1e5bti. The changing proportions of the three Gu\u1e47a-s in a given moment produce the particular character (*svar\u016bpa*) of that moment's object or experience. This is the Gu\u1e47a-theory of ontology.\n\n## Gu\u1e47a-s in Citta\n\nThe practical relevance of the Gu\u1e47a-theory for yoga is in the citta:\n\n- A Tamas-dominant citta produces dullness, distraction, sleep in meditation\n- A Rajas-dominant citta produces agitation, topic-jumping, attachment to meditation results\n- A Sattva-dominant citta produces the clarity needed for viveka-khy\u0101ti to arise\n\nThe eight-limb path is partly a Gu\u1e47a-management protocol: yama-niyama reduce Rajas and Tamas, \u0101sana-pr\u0101\u1e47\u0101y\u0101ma purify the body-channel, praty\u0101h\u0101ra withdraws energy from Rajasic objects, dh\u0101ra\u1e47\u0101-dhy\u0101na-sam\u0101dhi progressively Sattvify citta until Sattva is thin enough for Puru\u1e63a to be seen distinctly.\n\n## Cross-References\n\n- [Prak\u1e5bti (Yoga)](prakriti-yoga.md) \u2014 the Gu\u1e47a-s are constitutive of Prak\u1e5bti; they are what Prak\u1e5bti is made of\n- [Sattva](sattva.md) \u2014 the luminous Gu\u1e47a\n- [Rajas](rajas.md) \u2014 the active Gu\u1e47a\n- [Tamas](tamas.md) \u2014 the inert Gu\u1e47a\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 citta's modifications are Gu\u1e47a-combinations in motion\n- [Kaivalya](kaivalya.md) \u2014 liberation; when the Gu\u1e47a-s have fulfilled their purpose for Puru\u1e63a, they return to equilibrium\n\n## Audience Metaphor\n\nThe three Gu\u1e47a-s are like the three primary colors of light (red, green, blue): every visible color \u2014 every experience, every object, every thought \u2014 is a combination of these three in different proportions. There is no such thing as 'pure Sattva' in the manifest world, just as there is no monochromatic light in natural light. But you can turn a dimmer that increases Sattva's share in the mix \u2014 and the quality of perception, decision-making, and practice changes accordingly.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.18-2.19, 4.13-4.14\n2. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a (k\u0101rik\u0101 12-16)\n3. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.18\n4. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) Chs. 14, 17, 18 (Gu\u1e47a-traya vibh\u0101ga)\n5. Cross-bundle note: the doctrinal SOURCE of the trigu\u1e47a is sankhya-darshana v0.13's guna-samkhya.md; this file is a downstream/applied treatment (epistemological-psychological dimension), not a peer or competing definition", "concepts/ishvara-yoga": "# \u012a\u015bvara (Yoga Dar\u015bana) \u2014 \u0908\u0936\u094d\u0935\u0930\n\n**Not:** God (creator), Brahman, personal God, \u0100tman, Allah / God of theism\n\nA *puru\u1e63a-vi\u015be\u1e63a* \u2014 a special Puru\u1e63a \u2014 who has never been touched by kle\u015bas, karma, vip\u0101ka (karmic fruition), or v\u0101san\u0101-s. Unlike ordinary Puru\u1e63a-s (whose intrinsic freedom is obscured by apparent entanglement with Prak\u1e5bti), \u012a\u015bvara is not now and has never been involved in that confusion. In Yoga Dar\u015bana, \u012a\u015bvara functions as the seed of omniscience, the original teacher of yoga, and an object of *pra\u1e47idh\u0101na* (surrender/devotion) that can accelerate the practitioner's path to sam\u0101dhi. \u012a\u015bvara does not create, judge, or govern the cosmos.\n\n> **CROSS-DAR\u015aANA NOTE:** Yoga's \u012a\u015bvara is not Advaita Ved\u0101nta's Brahman. Brahman is the non-dual ultimate reality from which all plurality arises as M\u0101y\u0101. Yoga's \u012a\u015bvara is one of many eternally distinct Puru\u1e63a-s \u2014 the eternally pure one who serves as teacher and model. The two cannot be equated without collapsing the dual ontology of S\u0101\u1e43khya-Yoga into Advaita's non-dualism.\n\n## Etymology\n\n- *\u012a\u015b* \u2014 from \u221a*\u012b\u015b* (to rule, to be master of, to be capable of); sovereignty, mastery\n- *vara* \u2014 excellent, best, most eminent\n- *\u012a\u015bvara* \u2014 the sovereign excellent one; the supremely capable; the master among Puru\u1e63a-s\n\nThe *sovereignty* here is not political or theological in the Abrahamic sense \u2014 it refers to \u012a\u015bvara's unqualified mastery of the Puru\u1e63a-nature: never obscured, never misidentified, never entangled. \u012a\u015bvara is what every Puru\u1e63a is in its intrinsic nature \u2014 but \u012a\u015bvara has never deviated from that nature.\n\n## YS 1.24 \u2014 The Definition\n\n*kle\u015bakarmavip\u0101k\u0101\u015bayairapar\u0101m\u1e5b\u1e63\u1e6da\u1e25 puru\u1e63avi\u015be\u1e63a \u012a\u015bvara\u1e25*\n\n\"\u012a\u015bvara is a special Puru\u1e63a (*puru\u1e63a-vi\u015be\u1e63a*) untouched by (*apar\u0101m\u1e5b\u1e63\u1e6da*) afflictions (*kle\u015ba*), actions (*karma*), results of actions (*vip\u0101ka*), and the repository (*\u0101\u015baya*) [of v\u0101san\u0101-sa\u1e43sk\u0101ras].\"\n\nThe definition is entirely negative \u2014 it specifies what \u012a\u015bvara lacks:\n\n| What Ordinary Puru\u1e63as Appear to Have | What \u012a\u015bvara Lacks (by Definition) |\n|--------------------------------------|-----------------------------------|\n| Kle\u015bas (avidy\u0101, asmit\u0101, r\u0101ga, dve\u1e63a, abhinive\u015ba) | *kle\u015ba-apar\u0101m\u1e5b\u1e63\u1e6da* |\n| Karma (accumulated action-potential) | *karma-apar\u0101m\u1e5b\u1e63\u1e6da* |\n| Vip\u0101ka (karmic fruition \u2014 pleasure/pain) | *vip\u0101ka-apar\u0101m\u1e5b\u1e63\u1e6da* |\n| \u0100\u015baya (the stored reservoir of v\u0101san\u0101-s) | *\u0101\u015baya-apar\u0101m\u1e5b\u1e63\u1e6da* |\n\nThis structural purity is what makes \u012a\u015bvara a reliable object of *pra\u1e47idh\u0101na*: unlike a human teacher who may have blind spots, partial realizations, or karmic entanglements, \u012a\u015bvara's guidance cannot be distorted by kle\u015bas.\n\n## YS 1.25 \u2014 Omniscience\n\n*tatra nirati\u015baya\u1e43 sarvaj\u00f1ab\u012bjam*\n\n\"In \u012a\u015bvara is the unsurpassed (*nirati\u015baya*) seed of omniscience (*sarvaj\u00f1a-b\u012bja*).\"\n\n- *Sarvaj\u00f1at\u0101* (omniscience) in the Yoga context: the fully developed discriminative wisdom (*viveka-khy\u0101ti*) extended to all objects; the t\u0101raka j\u00f1\u0101na of YS 3.55 generalized without limit\n- Ordinary practitioners can develop j\u00f1\u0101na; its limit is viveka-khy\u0101ti and t\u0101raka j\u00f1\u0101na. In \u012a\u015bvara, this j\u00f1\u0101na is at its highest possible degree (*nirati\u015baya*) \u2014 unsurpassed and unsurpassable, since \u012a\u015bvara has never been occluded\n- This is not omniscience in the theological sense (knowing every event that will happen) but omniscience in the Yoga-technical sense: unobstructed discriminative awareness of Puru\u1e63a's distinction from Prak\u1e5bti and of the Gu\u1e47a-constitution of all objects\n\n## YS 1.26 \u2014 The Ancient Teacher\n\n*sa p\u016brve\u1e63\u0101mapi guru\u1e25 k\u0101len\u0101navacched\u0101t*\n\n\"\u012a\u015bvara is the guru even of the ancients, not limited by time (*k\u0101la-anavaccheda*).\"\n\n- Human lineages (guru-parampar\u0101) stretch back through historical time; at some point one must ask who was the first teacher\n- Yoga resolves the infinite regress: \u012a\u015bvara is the *p\u016brva-guru* \u2014 the original teacher, not bounded by any moment of having-begun\n- This is not mythological history but a philosophical claim about the nature of Yoga's authority: the tradition is not self-invented but transmitted from an eternal, unentangled source\n- For practice: *\u012a\u015bvara-pra\u1e47idh\u0101na* (surrender to \u012a\u015bvara) in kriy\u0101 yoga (YS 2.1) means aligning with this original transmission-source rather than with one's own ego-project of liberation\n\n## YS 1.27-1.29 \u2014 Pra\u1e47ava (O\u1e42) as V\u0101caka\n\n*tasya v\u0101caka\u1e25 pra\u1e47ava\u1e25* (1.27)\n\n\"The designator (*v\u0101caka*) of \u012a\u015bvara is Pra\u1e47ava (O\u1e42).\"\n\n*tajjapastadarthabh\u0101vanam* (1.28)\n\n\"The repetition (*japa*) of it and the contemplation of its meaning (*arthab\u0101vana*).\"\n\n*tata\u1e25 pratyakcetan\u0101dhigamo'pyantar\u0101y\u0101bh\u0101va\u015bca* (1.29)\n\n\"From that comes the turning inward of consciousness (*pratyak-cetan\u0101*) and also the disappearance of obstacles.\"\n\n### The Pra\u1e47ava as a Technical Object\n\nThe relationship between Pra\u1e47ava (O\u1e42) and \u012a\u015bvara in YS 1.27 is the Sanskrit philosophical relationship of *v\u0101caka* (designator/signifier) and *v\u0101cya* (designated/signified). O\u1e42 does not merely *represent* \u012a\u015bvara symbolically \u2014 in the Yoga framework, correct *japa* (repetition) with *artha-bh\u0101vana* (contemplation of meaning) is a direct cognitive engagement with \u012a\u015bvara's nature.\n\nThe practice specified in YS 1.28 is dual:\n1. *Japa* \u2014 the physical-sonic repetition of O\u1e42 (internally or externally)\n2. *Artha-bh\u0101vana* \u2014 simultaneous contemplation of what O\u1e42 designates: \u012a\u015bvara's nature as untouched-Puru\u1e63a\n\nThe result (YS 1.29) is *pratyak-cetan\u0101* \u2014 the inward turning of consciousness that is the cognitive prerequisite for dh\u0101ra\u1e47\u0101-dhy\u0101na-sam\u0101dhi. O\u1e42-japa with contemplation is thus a complete preparatory practice.\n\n## S\u0101\u1e43khya Without \u012a\u015bvara\n\nYoga Dar\u015bana's S\u0101\u1e43khya foundation (shared with classical S\u0101\u1e43khya) does not *require* \u012a\u015bvara for the cosmological account. S\u0101\u1e43khya K\u0101rik\u0101 explains the evolution of Prak\u1e5bti into 23 evolutes without invoking \u012a\u015bvara at all. Pata\u00f1jali adds \u012a\u015bvara not as a cosmological necessity but as:\n\n1. A pedagogical resource \u2014 an object of pra\u1e47idh\u0101na that accelerates sam\u0101dhi\n2. An epistemic anchor \u2014 the seed of omniscience that grounds the validity of the Yoga tradition\n3. A motivational frame \u2014 devotional engagement (*pra\u1e47idh\u0101na*) as an alternative path to sam\u0101dhi alongside abhy\u0101sa and vair\u0101gya (YS 1.12)\n\nCritically: **Yoga's path does not require \u012a\u015bvara-pra\u1e47idh\u0101na.** Pata\u00f1jali presents it as one route, not the only route. The eight-limb path can be practiced without the devotional component by those for whom abhy\u0101sa and vair\u0101gya are sufficient.\n\n## \u012a\u015bvara-Pra\u1e47idh\u0101na in Kriy\u0101 Yoga (YS 2.1)\n\n*tapa\u1e25sv\u0101dhy\u0101ye\u015bvarapra\u1e47idh\u0101n\u0101ni kriy\u0101yoga\u1e25*\n\n\"Kriy\u0101 yoga is austerity (*tapas*), self-study (*sv\u0101dhy\u0101ya*), and surrender to \u012a\u015bvara (*\u012a\u015bvara-pra\u1e47idh\u0101na*).\"\n\n\u012a\u015bvara-pra\u1e47idh\u0101na appears twice in the Yoga S\u016btras:\n- YS 1.23 \u2014 as an alternative fast-track route to sam\u0101dhi\n- YS 2.1, 2.45 \u2014 as a component of kriy\u0101 yoga and as the means to sam\u0101dhi-attainment (*sam\u0101dhisiddhi\u1e25 \u012a\u015bvarapra\u1e47idh\u0101n\u0101t*, YS 2.45)\n\nThe dual appearance suggests Pata\u00f1jali integrates devotional and systematic approaches rather than treating them as competing schools.\n\n## Cross-References\n\n- [Puru\u1e63a](purusha.md) \u2014 \u012a\u015bvara is a *puru\u1e63a-vi\u015be\u1e63a*; understanding Puru\u1e63a's nature is prerequisite to understanding what \u012a\u015bvara's \"specialness\" consists in\n- [Kle\u015ba](klesha.md) \u2014 the kle\u015bas that \u012a\u015bvara is defined as lacking; avidy\u0101, asmit\u0101, r\u0101ga, dve\u1e63a, abhinive\u015ba\n- [V\u0101san\u0101](vasana.md) \u2014 the \u0101\u015baya (reservoir) \u012a\u015bvara is without; v\u0101san\u0101-s and sa\u1e43sk\u0101ras are what bind ordinary Puru\u1e63a-s\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the stored impressions that constitute ordinary Puru\u1e63a-entanglement; \u012a\u015bvara is *apar\u0101m\u1e5b\u1e63\u1e6da* (untouched) by these\n- [Avidy\u0101 (Yoga)](avidya-yoga.md) \u2014 the root misidentification that \u012a\u015bvara has never been subject to; the contrast illuminates what avidy\u0101 is by showing what its absence looks like\n- [Kaivalya](kaivalya.md) \u2014 the liberation that ordinary Puru\u1e63a-s achieve; \u012a\u015bvara's permanent state is analogous to kaivalya but was never a departure from it\n\n## Audience Metaphor\n\nImagine a dojo with an instructor who has never been a beginner \u2014 not because they were born perfect, but because they exist outside the category of 'practitioner who started from scratch.' They know every technique because every technique is, in a sense, their nature. They don't grade you, don't reward or punish, don't run the building \u2014 but their presence in the dojo makes a different quality of practice possible. \u012a\u015bvara in Yoga is that instructor: eternally unentangled, eternally available as a model, eternally the source of the tradition's original transmission. Pra\u1e47ava (O\u1e42) is their name \u2014 a direct channel to their nature.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.23-1.29\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.23-1.29\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on YS 1.24\n4. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) \u2014 for context of S\u0101\u1e43khya-without-\u012a\u015bvara contrast", "concepts/kaivalya": "# Kaivalya \u2014 \u0915\u0948\u0935\u0932\u094d\u092f\n\n**Not:** moksha, enlightenment, union, nirvana, oneness\n\nLiberation in Yoga Dar\u015bana \u2014 the permanent isolation (*viveka*) of Puru\u1e63a from Prak\u1e5bti; the state in which Puru\u1e63a, having recognized its own nature as pure witness, is no longer misidentified with citta's modifications. The Gu\u1e47a-s, having completed their purpose (serving Puru\u1e63a's experience and liberation), return to equilibrium. This is the end-state of the eight-limb path.\n\n> **CRITICAL DISTINCTION:** Kaivalya is NOT Advaita Ved\u0101nta's Mok\u1e63a. In Mok\u1e63a, \u0100tman recognizes identity with Brahman \u2014 non-dual; world dissolves into Brahman. In Kaivalya, Puru\u1e63a recognizes its permanent isolation from Prak\u1e5bti \u2014 dual; the world (Prak\u1e5bti) continues to exist as ontologically real. These are structurally different liberation-events in structurally different philosophical frameworks.\n\n## Etymology\n\n- *kevala* \u2014 alone, only, isolated, absolute, pure; without admixture\n- *-ya* \u2014 abstract suffix (forming \"the state of being kevala\")\n- *kaivalya* \u2014 the state of absolute aloneness; pure isolation; being-only-oneself\n\nThe aloneness here is not loneliness \u2014 it is ontological purity. Puru\u1e63a in kaivalya is simply what it always was: pure, non-Prak\u1e5btic consciousness. Kaivalya is the name for that recognition becoming permanent and unshakeable.\n\n## YS 4.34 \u2014 The Final S\u016btra's Definition\n\n*puru\u1e63\u0101rtha\u015b\u016bny\u0101n\u0101\u1e43 gu\u1e47\u0101n\u0101\u1e43 pratiprasava\u1e25 kaivalya\u1e43 svar\u016bpaprati\u1e63\u1e6dh\u0101 v\u0101 citi\u015baktiriti*\n\n\"Kaivalya is the return of the Gu\u1e47a-s to their source, empty of purpose for Puru\u1e63a \u2014 or the establishment of the power of consciousness (*citi\u015bakti*) in its own nature.\"\n\nTwo formulations of the same event from two perspectives:\n\n**From Prak\u1e5bti's side:** *pratiprasava* \u2014 \"return to the source\"; the Gu\u1e47a-s' evolutionary activity reverses (*prati*); they re-enter the equilibrium state of unmanifest Prak\u1e5bti (*avyakta*). The Gu\u1e47a-s had evolved in order to serve Puru\u1e63a (YS 2.18: for bhoga and apavarga). When Puru\u1e63a recognizes its non-involvement, the purpose is fulfilled (*puru\u1e63\u0101rtha-\u015b\u016bnya* \u2014 empty of purpose for Puru\u1e63a); evolution has no further reason to continue.\n\n**From Puru\u1e63a's side:** *svar\u016bpa-prati\u1e63\u1e6dh\u0101* \u2014 \"establishment in its own nature\"; Puru\u1e63a, the *citi\u015bakti* (power of consciousness), abides permanently in its own nature. This mirrors YS 1.3 (*tad\u0101 dra\u1e63\u1e6du\u1e25 svar\u016bpe'vasth\u0101nam* \u2014 \"then the seer abides in its own nature\") \u2014 the state promised at the very beginning is now permanent rather than momentary.\n\n## How Kaivalya Is Reached\n\nThe path to kaivalya runs through specific stages:\n\n1. **Practice and dispassion** (*abhy\u0101sa* + *vair\u0101gya*, YS 1.12) \u2014 the fundamental pair throughout\n2. **Kriy\u0101 yoga** (YS 2.1-2.2) \u2014 *tapas* (austerity), *sv\u0101dhy\u0101ya* (self-study), *\u012a\u015bvara-pra\u1e47idh\u0101na* (surrender to \u012a\u015bvara); the preparatory three-fold practice\n3. **Reducing the kle\u015bas** (YS 2.10-2.11) \u2014 the five affliction-roots are progressively attenuated\n4. **Eight-limb practice** (YS 2.28-3.3) \u2014 yama through sam\u0101dhi purifies citta and reduces v\u1e5bttis\n5. **Viveka-khy\u0101ti** (YS 2.26-2.28) \u2014 discriminative wisdom arising in nirvic\u0101ra sam\u0101dhi; the sustained recognition of Puru\u1e63a's difference from Prak\u1e5bti\n6. **Highest vair\u0101gya** (YS 1.15-1.16, 3.51) \u2014 dispassion even toward Sattvic states and the fruits of viveka\n7. **Asampraj\u00f1\u0101ta sam\u0101dhi** \u2014 the seedless absorption that burns the remaining v\u0101san\u0101-sa\u1e43sk\u0101ras\n8. **Dharmamegha sam\u0101dhi** (YS 4.29-4.31) \u2014 the \"cloud of dharma\" sam\u0101dhi; the penultimate stage in which all kle\u015bas and karmas are destroyed\n9. **Kaivalya** \u2014 *pratiprasava* of the Gu\u1e47a-s; *svar\u016bpa-prati\u1e63\u1e6dh\u0101* of Puru\u1e63a\n\n## The Many Puru\u1e63a-s and Individual Kaivalya\n\nYoga Dar\u015bana, unlike Advaita Ved\u0101nta, maintains that there are *many* Puru\u1e63a-s \u2014 each distinct, each eternally real. Kaivalya is therefore individual \u2014 each Puru\u1e63a's liberation does not dissolve other Puru\u1e63a-s or Prak\u1e5bti. This explains a puzzle in the cosmology: if one person achieves kaivalya, why doesn't the universe dissolve? Because the Gu\u1e47a-s' return to equilibrium is only the equilibrium for *this* Puru\u1e63a's relationship with *this* citta \u2014 other Puru\u1e63a-s still require Prak\u1e5bti's evolution.\n\n## Kaivalya vs. Mok\u1e63a \u2014 The Structural Comparison\n\n| | Kaivalya (Yoga Dar\u015bana) | Mok\u1e63a (Advaita Ved\u0101nta) |\n|--|------------------------|------------------------|\n| Liberating event | Puru\u1e63a permanently isolated from Prak\u1e5bti | \u0100tman recognizes identity with Brahman |\n| Ontology | Dual \u2014 Puru\u1e63a and Prak\u1e5bti both eternally real | Non-dual \u2014 only Brahman real; world is M\u0101y\u0101 |\n| The world after liberation | Prak\u1e5bti continues; Gu\u1e47a-s return to latent equilibrium | World recognized as never having ultimately existed |\n| Liberation of | Each individual Puru\u1e63a (many) | \u0100tman as Brahman (one, non-individual) |\n| Key cognitive act | Viveka-khy\u0101ti (discrimination between Puru\u1e63a and Prak\u1e5bti) | J\u00f1\u0101na (recognition of \u0100tman-Brahman identity) |\n| Role of guru | Transmits the path; each practices individually | Guru's words trigger recognition; may be sudden |\n\n## Cross-References\n\n- [Puru\u1e63a](purusha.md) \u2014 what is liberated in kaivalya; the pure witness that is now permanently recognized as such\n- [Prak\u1e5bti (Yoga)](prakriti-yoga.md) \u2014 the domain from which Puru\u1e63a is isolated; its Gu\u1e47a-s return to equilibrium at kaivalya\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative wisdom that progressively prepares for kaivalya\n- [Asampraj\u00f1\u0101ta Sam\u0101dhi](asamprajnata-samadhi.md) \u2014 the seedless absorption immediately preceding or constituting kaivalya\n- [Nirodha](nirodha.md) \u2014 the permanent nirodha is kaivalya; temporary nirodha is the path toward it\n- [Kle\u015ba](klesha.md) \u2014 the five affliction-roots are completely dissolved at kaivalya; abhinive\u015ba, the last kle\u015ba, dissolves only with kaivalya\n- [Gu\u1e47a-s](guna.md) \u2014 the Gu\u1e47a-s return to Prak\u1e5btic equilibrium (*pratiprasava*) when kaivalya is reached\n\n## Audience Metaphor\n\nKaivalya is like the moment when you realize that what you took to be your reflection in a mirror is not you \u2014 the reflection never was you, even when you thought it was. The mirror (Prak\u1e5bti, citta) has always been showing images; you (Puru\u1e63a) were always the one looking. In ordinary experience, the looking-self got so absorbed in the image that it seemed to *be* the image. Kaivalya is the permanent restoration of the one who looks \u2014 stable, clear, unshaken \u2014 while the mirror continues reflecting for others who still need it. The mirror is not destroyed. The confusion is.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 4.34, 2.25, 3.55\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 4.34\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on YS 4.34\n4. Rajiv Malhotra \u2014 Being Different (2011), Ch. 3 (differences in liberation concepts)\n5. Cross-bundle warning: sankhya-darshana v0.13's kaivalya-samkhya.md treats the same end-state word reached via viveka-khy\u0101ti alone (no nirodha, no eight-limb path, no \u012a\u015bvara) \u2014 school-scoped, not a duplicate of this entry", "concepts/klesha": "# Kle\u015ba \u2014 \u0915\u094d\u0932\u0947\u0936\n\n**Not:** affliction, suffering, hindrance, defilement, negative emotion\n\nThe five structural affliction-roots that perpetuate the cycle of sa\u1e43s\u0101ra. Defined by Pata\u00f1jali in YS 2.3: *avidy\u0101smit\u0101r\u0101gadve\u1e63\u0101bhinive\u015b\u0101\u1e25 kle\u015b\u0101\u1e25* \u2014 \"The kle\u015ba-s are: avidy\u0101, asmit\u0101, r\u0101ga, dve\u1e63a, and abhinive\u015ba.\"\n\n## Etymology\n\n- Root *kli\u015b* \u2014 to afflict, to torment, to distress\n- *kle\u015ba* \u2014 that which afflicts; an affliction-generating root\n\n## Precise Definition\n\nThe kle\u015ba-s are not emotions or psychological states but the **structural causes** from which all suffering, misidentification, and rebirth arise. They operate at the level of the citta's deepest conditioning, generating sa\u1e43sk\u0101ra-s (latent impressions) that produce future v\u1e5btti-s (mental modifications), which in turn produce future karma \u2014 sustaining the entire cycle.\n\n## The Five Kle\u015ba-s (YS 2.3)\n\n| Kle\u015ba | Mechanism | Root |\n|-------|-----------|------|\n| Avidy\u0101 \u2014 primal misidentification | Mistake the non-eternal for eternal, non-self for self | Root of all others |\n| Asmit\u0101 \u2014 I-am-ness | Conflate the power of seeing (Puru\u1e63a) with the instrument of seeing (Buddhi) | Rests on avidy\u0101 |\n| R\u0101ga \u2014 craving | Residue of past pleasure becomes compulsion toward its repetition | Rests on asmit\u0101 |\n| Dve\u1e63a \u2014 aversion | Residue of past pain becomes compulsion to avoid its repetition | Rests on asmit\u0101 |\n| Abhinive\u015ba \u2014 clinging to life | Deep existential fear of cessation, rooted in past-life death memory | Rests on all above |\n\n## Four States of Kle\u015ba-s (YS 2.4)\n\nPata\u00f1jali describes kle\u015ba-s as existing in four intensities:\n- *Prasupt\u0101* \u2014 dormant, lying as seeds in the citta\n- *Tanu* \u2014 thinned, weakened through sustained yogic practice\n- *Vicchinna* \u2014 intercepted, temporarily suppressed (but not eliminated)\n- *Ud\u0101r\u0101* \u2014 fully active, driving thought and behavior\n\nSuppression (*vicchinna*) is not liberation. Only viveka-khy\u0101ti \u2014 discriminative wisdom so complete that Puru\u1e63a is seen as permanently distinct from all Prak\u1e5btic phenomena \u2014 burns the kle\u015ba-seeds so they can no longer germinate (YS 2.11).\n\n## Relationship to Karma\n\nThe kle\u015ba-s and karma form a self-reinforcing loop: kle\u015ba-s drive action (*karma*), action deposits *sa\u1e43sk\u0101ra-s*, sa\u1e43sk\u0101ra-s sustain the kle\u015ba-s, and the cycle continues across lifetimes. This is the mechanism of sa\u1e43s\u0101ra described in Yoga Dar\u015bana.\n\n## Cross-References\n\n- [Avidy\u0101](avidya-yoga.md) \u2014 the root kle\u015ba; see for the full Yoga S\u016btra definition\n- [Asmit\u0101](asmita.md), [R\u0101ga](raga.md), [Dve\u1e63a](dvesha.md), [Abhinive\u015ba](abhinivesha.md) \u2014 the individual kle\u015ba-s\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the latent impressions kle\u015ba-s deposit and draw upon\n- [Viveka-Khy\u0101ti](viveka-khyati.md) \u2014 the discriminative wisdom that burns the kle\u015ba-s\n- [Kaivalya](kaivalya.md) \u2014 the state of liberation once kle\u015ba-s are completely uprooted\n\n## Audience Metaphor\n\nThe kle\u015ba-s are the OS-level bugs in the citta's firmware. You can patch individual applications (manage emotions, change habits) indefinitely, but until the root misidentification (avidy\u0101) is corrected at the firmware level, the bugs regenerate every cycle.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.3\u20132.9\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.3\n3. [S\u0101\u1e43khya K\u0101rik\u0101](/references/samkhya-karika.md) of \u012a\u015bvarak\u1e5b\u1e63\u1e47a\n4. Light on the Yoga S\u016btras \u2014 B.K.S. Iyengar", "concepts/nirodha": "# Nirodha \u2014 \u0928\u093f\u0930\u094b\u0927\n\n**Not:** suppression, control, stopping thoughts, emptiness, silence\n\nThe cessation of citta-v\u1e5btti \u2014 the defining aim of yoga as stated in YS 1.2. Nirodha is not the suppression, interruption, or management of modifications but their complete cessation: a state in which no new v\u1e5bttis arise. In this state, the seer (Puru\u1e63a) abides in its own nature. Nirodha unfolds in degrees \u2014 from partial restraint in early practice to the total cessation of asampraj\u00f1\u0101ta sam\u0101dhi.\n\n## The Definitional Context (YS 1.2-1.4)\n\nThe first four s\u016btras establish the entire framework:\n\n*yoga\u015b citta-v\u1e5btti-nirodha\u1e25* (1.2)  \n\"Yoga is the cessation of citta's modifications.\"\n\n*tad\u0101 dra\u1e63\u1e6du\u1e25 svar\u016bpe'vasth\u0101nam* (1.3)  \n\"Then the seer abides in its own nature.\"\n\n*v\u1e5bttis\u0101r\u016bpyam itaratra* (1.4)  \n\"Otherwise (without nirodha) there is identification with the modifications.\"\n\nYS 1.4 states the problem that nirodha solves: in ordinary experience, Puru\u1e63a is so thoroughly identified with citta's modifications that it appears to take their form. When a r\u0101ga-v\u1e5btti arises, \"I want\" appears \u2014 the pure witness seems to want. This is asmit\u0101 in operation. Nirodha removes the modifications and thereby dissolves the appearing identification.\n\n## Etymology\n\n- *ni* \u2014 down, into, completely\n- *rodha* \u2014 from \u221a*rudh* (to obstruct, to enclose, to stop, to dam)\n- *nirodha* \u2014 complete enclosure; damming; cessation; blocking the arising of v\u1e5bttis\n\nThe damming metaphor is important: a dam does not destroy the river; it prevents the water from flowing into the territory beyond. Nirodha prevents v\u1e5bttis from arising (or from completing their arising), not from existing in potential in the sa\u1e43sk\u0101ra-base.\n\n## The Two Means (YS 1.12-1.16)\n\n*abhy\u0101savair\u0101gy\u0101bhy\u0101\u1e43 tan-nirodha\u1e25* (YS 1.12)  \n\"The cessation of these (v\u1e5bttis) is through practice and dispassion.\"\n\n**Abhy\u0101sa** \u2014 sustained practice:\n- *tatra sthitau yatno'bhy\u0101sa\u1e25* (YS 1.13) \u2014 \"Abhy\u0101sa is the effort to remain steadily there (in nirodha)\"\n- *sa tu d\u012brghak\u0101lanairantaryasatk\u0101rasevito d\u1e5b\u1e0dhabh\u016bmi\u1e25* (YS 1.14) \u2014 \"Practice becomes firmly grounded when it is attended to for a long time, without interruption, with earnestness\"\n\n**Vair\u0101gya** \u2014 dispassion:\n- *d\u1e5b\u1e63\u1e6d\u0101nu\u015bravikavi\u1e63ayavit\u1e5b\u1e63\u1e47asya va\u015b\u012bk\u0101rasa\u1e43j\u00f1\u0101 vair\u0101gyam* (YS 1.15) \u2014 \"Vair\u0101gya is the mastery-state of one who is free from thirsting after seen and scriptural objects\"\n- The highest vair\u0101gya (YS 1.16): dispassion toward the Gu\u1e47a-s themselves \u2014 even Sattvic states are let go\n\nThese two form the path's double movement: abhy\u0101sa creates the nirodha-sa\u1e43sk\u0101ras that strengthen restraint; vair\u0101gya removes the r\u0101ga-dve\u1e63a motivation that generates new v\u1e5bttis. Together they progressively shift the balance from v\u1e5btti-generation toward nirodha.\n\n## Levels of Nirodha\n\nNirodha is not binary (present/absent) but develops through stages:\n\n1. **Vyutth\u0101na state** (normal arising) \u2014 ordinary experience; v\u1e5bttis arising freely\n2. **Nirodha-pari\u1e47\u0101ma** (YS 3.9) \u2014 partial restraint; the nirodha-sa\u1e43sk\u0101ra grows, competing with the v\u1e5btti-sa\u1e43sk\u0101ra; the practitioner experiences moments of stillness within movement\n3. **Sampraj\u00f1\u0101ta Sam\u0101dhi** \u2014 refined v\u1e5bttis (savitarka, savic\u0101ra, s\u0101nanda, s\u0101smit\u0101); still-v\u1e5btti states but object-supported\n4. **Asampraj\u00f1\u0101ta Sam\u0101dhi** \u2014 no object remains; even the last v\u1e5btti (the viveka-khy\u0101ti of
