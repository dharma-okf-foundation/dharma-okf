ion between Sattva (the finest Prak\u1e5btic faculty) and Puru\u1e63a\n3. **Vivekajam j\u00f1\u0101nam** (YS 3.55) \u2014 the knowledge born of discrimination; described as *t\u0101raka* (saving, crossing-over); this is the fully mature form\n\n## YS 3.55 \u2014 T\u0101raka J\u00f1\u0101na\n\n*t\u0101raka\u1e43 sarvavi\u1e63aya\u1e43 sarvath\u0101vi\u1e63ayam akrama\u1e43 ceti vivekajam j\u00f1\u0101nam*\n\n\"Knowledge born of discrimination (*vivekajam j\u00f1\u0101nam*) is saving (*t\u0101raka*), has all objects as its domain, operates in all conditions, and is non-sequential (simultaneous).\"\n\nThe mature viveka-khy\u0101ti has three remarkable characteristics:\n- **All objects** \u2014 it perceives the Gu\u1e47a-constitution of everything simultaneously\n- **All conditions** \u2014 past, present, and future are equally transparent; the time-sequence perception of ordinary cognition is transcended\n- **Non-sequential** \u2014 it does not arise through inference or step-by-step reasoning; it is direct, simultaneous, comprehensive\n\nThis *t\u0101raka* (saving, crossing-over) knowledge is the cognitive event that \"saves\" Puru\u1e63a from continued identification with Prak\u1e5bti \u2014 not through intellectual understanding but through direct discriminative perception.\n\n## The Trap of Viveka-Khy\u0101ti\n\nPata\u00f1jali warns (YS 3.51) that even viveka-khy\u0101ti can become an object of attachment \u2014 *sattva-aha\u1e43k\u0101ra*: identification with the spiritual clarity of the discriminating faculty. The practitioner who attaches to viveka-khy\u0101ti stalls at the threshold of kaivalya. The prescription: *tadvair\u0101gy\u0101dapi* \u2014 \"dispassion even toward *that*\" \u2014 releases the final attachment.\n\nViveka-khy\u0101ti is itself a Sattvic v\u1e5btti. However refined, it is still a modification of citta. Kaivalya requires that even this last, most refined v\u1e5btti is released into nirodha.\n\n## Cross-References\n\n- [Avidy\u0101 (Yoga)](avidya-yoga.md) \u2014 the root misidentification that viveka-khy\u0101ti dissolves\n- [Puru\u1e63a](purusha.md) \u2014 the witness whose distinct nature viveka-khy\u0101ti recognizes\n- [Prak\u1e5bti (Yoga)](prakriti-yoga.md) \u2014 the Prak\u1e5btic domain from which Puru\u1e63a is recognized as distinct\n- [Sattva](sattva.md) \u2014 the Gu\u1e47a whose predominance makes buddhi refined enough to produce viveka-khy\u0101ti; also the Gu\u1e47ic foundation of the Sattvic trap\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 the absorption range in which viveka-khy\u0101ti matures, particularly nirvic\u0101ra\n- [Asampraj\u00f1\u0101ta Sam\u0101dhi](asamprajnata-samadhi.md) \u2014 the absorption in which even viveka-khy\u0101ti's Sattvic v\u1e5btti is dissolved\n- [Kaivalya](kaivalya.md) \u2014 liberation; what follows when viveka-khy\u0101ti matures and even itself is transcended\n\n## Audience Metaphor\n\nViveka-khy\u0101ti is what happens when you've been looking at a magic-eye poster your whole life, unable to see the hidden image \u2014 and then you see it. But unlike a magic-eye moment (which is instantaneous), viveka-khy\u0101ti is more like slowly learning to keep your eyes at the right focus: at first the hidden image (Puru\u1e63a distinct from Prak\u1e5bti) appears only for a moment, then slips away. Practice makes the right-focus easier to find, easier to hold, and eventually effortless to sustain. Kaivalya is when you can no longer see the flat 2D surface at all \u2014 only the depth.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 2.26-2.28, 3.35, 3.55\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 2.26\n3. [Tattvavai\u015b\u0101rad\u012b](/references/tattvavaisharadi.md) of V\u0101caspatimi\u015bra on YS 2.26\n4. YS 3.55: vivekajam j\u00f1\u0101nam as t\u0101raka", "concepts/vritti": "# V\u1e5btti \u2014 \u0935\u0943\u0924\u094d\u0924\u093f\n\n**Not:** thought, fluctuation, mental state, impression\n\nA modification, turning, or fluctuation of citta. Every moment of ordinary experience \u2014 every perception, thought, memory, dream, inference, or error \u2014 is a v\u1e5btti: a wave-form arising in the cognitive medium. Pata\u00f1jali classifies all v\u1e5bttis into five types (YS 1.5-1.11) and distinguishes two evaluative categories \u2014 *kli\u1e63\u1e6da* (afflicted) and *akli\u1e63\u1e6da* (non-afflicted).\n\n## Etymology\n\n- Root: \u221a*v\u1e5bt* \u2014 to turn, to exist, to proceed, to occur\n- *v\u1e5btti* \u2014 that which turns; a modification; a mode of activity; also: livelihood, means of subsistence (same word, different context)\n\nThe metaphor of turning is key: a v\u1e5btti is citta caught in a particular activity or shape \u2014 not chaos but a specific patterned movement. The lake-wave analog makes this concrete: each wave is not random but has a determinate form, speed, and direction.\n\n## Kli\u1e63\u1e6da and Akli\u1e63\u1e6da V\u1e5bttis (YS 1.5)\n\n*v\u1e5bttaya\u1e25 pa\u00f1catayya\u1e25 kli\u1e63\u1e6d\u0101kli\u1e63\u1e6d\u0101\u1e25*  \n\"V\u1e5bttis are fivefold, afflicted and non-afflicted.\"\n\n- **Kli\u1e63\u1e6da** (from *kle\u015ba*) \u2014 a v\u1e5btti that creates or sustains the kle\u015bas and thereby perpetuates bondage; it deepens sa\u1e43sk\u0101ras that reinforce r\u0101ga/dve\u1e63a\n- **Akli\u1e63\u1e6da** \u2014 a v\u1e5btti that does not create or sustain kle\u015bas; the same five types can be either kli\u1e63\u1e6da or akli\u1e63\u1e6da depending on whether they are colored by avidy\u0101 and r\u0101ga-dve\u1e63a\n\nThe same v\u1e5btti-type can be afflicted or non-afflicted: a memory (*sm\u1e5bti*) colored by longing (r\u0101ga) is kli\u1e63\u1e6da; a memory serving viveka is akli\u1e63\u1e6da. The distinction is not in the v\u1e5btti's structure but in its relationship to the kle\u015bas.\n\n## The Five V\u1e5btti Types (YS 1.6-1.11)\n\n### 1. Pram\u0101\u1e47a \u2014 \u092a\u094d\u0930\u092e\u093e\u0923 (Correct Knowledge, YS 1.7)\n\n*pratyak\u1e63\u0101num\u0101n\u0101gam\u0101\u1e25 pram\u0101\u1e47\u0101ni*  \n\"Pram\u0101\u1e47as are direct perception, inference, and valid testimony.\"\n\n- **Pratyak\u1e63a** \u2014 direct sensory perception; present-moment experience of an object\n- **Anum\u0101na** \u2014 inference; reasoning from marks to their referents (smoke \u2192 fire)\n- **\u0100gama** \u2014 reliable testimony; knowledge from a valid source (*\u0101pta-vacana*)\n\nPram\u0101\u1e47a-v\u1e5bttis are modifications that accurately mirror reality. They are the raw material of the yoga path itself \u2014 understanding the Yoga S\u016btras requires correct cognitive engagement. But even correct knowledge is still a v\u1e5btti: it still occupies citta and must ultimately be dissolved in nirodha.\n\n### 2. Viparyaya \u2014 \u0935\u093f\u092a\u0930\u094d\u092f\u092f (Error, YS 1.8)\n\n*viparyayo mithy\u0101j\u00f1\u0101nam atadr\u016bpaprati\u1e63\u1e6dham*  \n\"Error is false knowledge not established in the form of that thing.\"\n\n- A modification that presents an object in a form it does not have\n- The canonical example: perceiving a rope as a snake (*rajju-sarpa-bhrama*)\n- Avidy\u0101 \u2014 the root kle\u015ba \u2014 is a viparyaya at the most fundamental level: taking Puru\u1e63a for citta, taking the witnessed for the witness\n\nViparyaya is correctable through investigation (for ordinary errors) and through the sustained yoga practice that ultimately corrects avidy\u0101.\n\n### 3. Vikalpa \u2014 \u0935\u093f\u0915\u0932\u094d\u092a (Imagination / Verbal Construction, YS 1.9)\n\n*\u015babdaj\u00f1\u0101n\u0101nup\u0101t\u012b vastu\u015b\u016bnyo vikalpa\u1e25*  \n\"Imagination is a modification that follows verbal knowledge and is empty of an actual thing.\"\n\n- Knowledge produced by words that have no corresponding object\n- The classic example: *sky-flower* (*kha-pu\u1e63pa*) \u2014 the phrase generates a modification with no real referent\n- All conceptual frameworks, categories, and even the word \"Puru\u1e63a\" have a vikalpa dimension \u2014 they indicate something real, but the conceptual modification itself is not that thing\n- Theological and philosophical debates often operate substantially within vikalpa\n- Vikalpa is akli\u1e63\u1e6da when it serves discriminative inquiry; kli\u1e63\u1e6da when it generates false realities that fuel r\u0101ga-dve\u1e63a\n\n### 4. Nidr\u0101 \u2014 \u0928\u093f\u0926\u094d\u0930\u093e (Sleep, YS 1.10)\n\n*abh\u0101vapratyay\u0101lamban\u0101 v\u1e5bttir nidr\u0101*  \n\"Sleep is the v\u1e5btti supported by the cognition of absence.\"\n\n- Sleep is a v\u1e5btti \u2014 Pata\u00f1jali classifies it here specifically to make clear it is not equivalent to nirodha\n- Its support (*\u0101lambana*) is the cognition of absence (absence of waking objects)\n- Evidence: upon waking we say \"I slept deeply\" \u2014 this memory arises from a sa\u1e43sk\u0101ra, which requires a v\u1e5btti during sleep; if sleep were simply absence, no sa\u1e43sk\u0101ra would form\n- Sleep can be kli\u1e63\u1e6da (tamasic, habit-bound, lethargic) or akli\u1e63\u1e6da (restorative, sattvic); the tradition is nuanced about both\n- Nidr\u0101 must not be confused with sam\u0101dhi: in sam\u0101dhi, the citta is stilled through viveka; in nidr\u0101, the citta is covered by Tamas\n\n### 5. Sm\u1e5bti \u2014 \u0938\u094d\u092e\u0943\u0924\u093f (Memory, YS 1.11)\n\n*anubh\u016btavi\u1e63ay\u0101sa\u1e43pramo\u1e63a\u1e25 sm\u1e5bti\u1e25*  \n\"Memory is the non-forgetting of an experienced object.\"\n\n- The re-activation of a previously formed sa\u1e43sk\u0101ra\n- Memory does not re-experience the original object but re-activates its stored impression\n- Sm\u1e5bti is the primary mechanism through which past r\u0101ga/dve\u1e63a shape present response\n- All habits, preferences, cultural assumptions, and learned responses operate through sm\u1e5bti-v\u1e5bttis\n- The sa\u1e43sk\u0101ra-sm\u1e5bti-v\u0101san\u0101 chain: a sa\u1e43sk\u0101ra is stored; sm\u1e5bti activates it; the activation generates a v\u0101san\u0101 (subtle tendency) that drives future behavior\n\n## Cross-References\n\n- [Citta-V\u1e5btti](chitta-vritti.md) \u2014 v\u1e5bttis are modifications *of* citta; this file gives the context; vritti.md gives the taxonomy\n- [Nirodha](nirodha.md) \u2014 the cessation of all five v\u1e5btti-types; the definition of yoga\n- [Sa\u1e43sk\u0101ra](samskara.md) \u2014 the impressions that v\u1e5bttis leave; and the stored material from which future v\u1e5bttis arise\n- [V\u0101san\u0101](vasana.md) \u2014 the behavioral tendency arising from accumulated sa\u1e43sk\u0101ras; the link between past v\u1e5bttis and future v\u1e5btti-generation\n- [Sampraj\u00f1\u0101ta Sam\u0101dhi](samprajnata-samadhi.md) \u2014 absorptions that are themselves refined pram\u0101\u1e47a-v\u1e5bttis of progressively subtler objects\n\n## Audience Metaphor\n\nThe five v\u1e5btti-types are like five different kinds of marks a stylus can make on a wax tablet (citta). Correct knowledge (pram\u0101\u1e47a) leaves a mark that corresponds to what was actually there. Error (viparyaya) leaves a mark that inverts or distorts what was there. Imagination (vikalpa) leaves a mark with no corresponding object at all. Sleep (nidr\u0101) leaves an impression of absence \u2014 surprisingly deep. Memory (sm\u1e5bti) re-traces an earlier mark. The yoga project is to make fewer and finer marks until the tablet is still.\n\n## Citations\n\n1. [Yoga S\u016btras of Pata\u00f1jali](/references/yoga-sutras.md) 1.5-1.11\n2. [Yoga Bh\u0101\u1e63ya of Vy\u0101sa](/references/yoga-bhasya.md) on YS 1.5-1.11\n3. \u0100gama Pram\u0101\u1e47a discussion in [Vy\u0101sabh\u0101\u1e63ya](/references/yoga-bhasya.md) on YS 1.7", "references/bhagavad-gita": "# Bhagavad G\u012bt\u0101\n\n## What It Is\n\nThe 700-verse dialogue in the Mah\u0101bh\u0101rata synthesizing the paths of karma, j\u00f1\u0101na, and bhakti; a cross-dar\u015bana source for the gu\u1e47as and yoga.\n\n## Why It Matters Here\n\nCited for the gu\u1e47a-traya analysis (chs. 14, 17, 18).", "references/hatha-yoga-pradipika": "# Ha\u1e6dha Yoga Prad\u012bpik\u0101\n\n## What It Is\n\nSv\u0101tm\u0101r\u0101ma's classical manual of Ha\u1e6dha Yoga \u2014 \u0101sana, pr\u0101\u1e47\u0101y\u0101ma, and mudr\u0101 \u2014 preparatory to the inner limbs of P\u0101ta\u00f1jala Yoga.\n\n## Why It Matters Here\n\nCited for praty\u0101h\u0101ra and the pr\u0101\u1e47a-centered preparatory practices.", "references/samkhya-karika": "# S\u0101\u1e43khya K\u0101rik\u0101\n\n## What It Is\n\n\u012a\u015bvarak\u1e5b\u1e63\u1e47a's classical verse exposition of S\u0101\u1e43khya \u2014 Puru\u1e63a, Prak\u1e5bti, the gu\u1e47as, and the tattvas \u2014 the metaphysical base Yoga builds on.\n\n## Why It Matters Here\n\nCited for the dual ontology (Puru\u1e63a/Prak\u1e5bti), the gu\u1e47as, and satk\u0101ryav\u0101da.", "references/tattvavaisharadi": "# Tattvavai\u015b\u0101rad\u012b of V\u0101caspatimi\u015bra\n\n## What It Is\n\nV\u0101caspatimi\u015bra's sub-commentary on the Yoga Bh\u0101\u1e63ya; a key scholastic gloss clarifying Yoga technical terms.\n\n## Why It Matters Here\n\nCited for fine distinctions (e.g. sa\u1e43yama, the seed/seedless sam\u0101dhi, the pari\u1e47\u0101mas).", "references/yoga-bhasya": "# Yoga Bh\u0101\u1e63ya of Vy\u0101sa\n\n## What It Is\n\nThe foundational classical commentary on the Yoga S\u016btras (attributed to Vy\u0101sa); the traditional lens through which P\u0101ta\u00f1jala Yoga is read.\n\n## Why It Matters Here\n\nCited throughout for the authoritative gloss on each s\u016btra.", "references/yoga-sutras": "# Yoga S\u016btras of Pata\u00f1jali\n\n## What It Is\n\nThe 196 aphorisms by Pata\u00f1jali that define classical Yoga as chitta-v\u1e5btti-nirodha and lay out the eight limbs (a\u1e63\u1e6d\u0101\u1e45ga); the root text of the Yoga dar\u015bana.\n\n## Why It Matters Here\n\nThe primary source for nearly every concept in this bundle."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
