s it snap? If assuming the denial breaks everything, the plank holds. It builds nothing new; it stress-tests what inference is about to stand on.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.40 (tarka among the sixteen categories) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b, on tarka as an aid to the pram\u0101\u1e47as -- see [references/nyayamanjari.md](../references/nyayamanjari.md)\n3. Annambha\u1e6d\u1e6da, Tarkasa\u1e43graha -- see [references/tarkasamgraha.md](../references/tarkasamgraha.md)", "concepts/upamana": "# Upam\u0101na -- \u0909\u092a\u092e\u093e\u0928\n\n**Not:** rhetorical analogy, metaphor, disguised inference\n\n## What It Actually Means\n\nUpam\u0101na, comparison, is the pram\u0101\u1e47a Ny\u0101ya defends most against reduction. The stock case: a forest-dweller tells a townsman 'a gavaya (wild ox) is like a cow'; later, in the forest, the townsman sees an animal resembling a cow and knows 'this is what the word gavaya denotes'. The knowledge gained is precise, the tie between a name and the kind of thing it names, and Ny\u0101ya argues it is irreducible. It is not testimony, since the informant only supplied a simile, not the identifying encounter; and it is not inference, since no vy\u0101pti carries the mind from mark to target. What does the work is the recognised similarity itself functioning as an instrument of knowing. That insistence on a distinct fourth source is characteristic of Ny\u0101ya's fine-grained, realist mapping of exactly how words and world get connected.\n\n## Audience Metaphor\n\nSomeone tells you 'a mandolin sounds like a bright little guitar'. Months later you hear an unfamiliar instrument, catch the resemblance, and know: that is a mandolin. You were not told 'this is a mandolin' (testimony), and you ran no chain of reasoning (inference); the recognised likeness itself delivered the word-to-thing match. Upam\u0101na is that specific click of matching a described likeness to a met object.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.6 (definition of upam\u0101na) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, the gavaya illustration -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b, against reducing upam\u0101na to inference -- see [references/nyayamanjari.md](../references/nyayamanjari.md)", "concepts/vada": "# V\u0101da -- \u0935\u093e\u0926\n\n**Not:** quarrel, victory-disputation, rhetorical performance\n\n## What It Actually Means\n\nV\u0101da is the first and highest of Ny\u0101ya's three modes of debate: a discussion between people who genuinely want the truth. Both parties advance and defend theses, but only with valid means of knowledge (pram\u0101\u1e47a) and legitimate reasoning; tricks, quibbles, and merely eristic devices are barred; and either party, on being truly refuted, accepts the defeat. It is the debate proper to teacher and student, or to fellow inquirers, where the shared aim guarantees that a loss for one is a gain for both, since the outcome is knowledge. Ny\u0101ya's distinguishing of v\u0101da from jalpa and vita\u1e47\u1e0d\u0101 is one of its quiet achievements: it recognises that the same outward act of arguing can serve utterly different ends, and it names truth-seeking debate as a distinct, disciplined practice with its own rules. This is a large part of what makes Ny\u0101ya a science of inference and debate rather than merely of formal proof.\n\n## Audience Metaphor\n\nTwo engineers stress-testing a bridge design want the same thing: to find out if it holds. They attack each other's calculations hard, but a flaw found is a win for both, because the bridge gets safer. That is v\u0101da. It only looks like a fight; it is a shared search wearing adversarial clothes, and neither side is trying to 'beat' the other so much as to reach the truth together.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.2.1 (definition of v\u0101da) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, on the three debate modes -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b -- see [references/nyayamanjari.md](../references/nyayamanjari.md)", "concepts/vitanda": "# Vita\u1e47\u1e0d\u0101 -- \u0935\u093f\u0924\u0923\u094d\u0921\u093e\n\n**Not:** principled skepticism, truth-seeking debate, constructive criticism\n\n## What It Actually Means\n\nVita\u1e47\u1e0d\u0101 is the third and most destructive mode of debate: refutation without a counter-position. The vita\u1e47\u1e0d\u0101-debater sets out only to demolish the opponent's thesis and pointedly declines to advance any thesis of their own, since holding one would expose them to counter-attack. Ny\u0101ya identifies this as a recognisable and low form of disputation, cavil, and lists the moves that expose it. The concept matters for two reasons. First, it completes Ny\u0101ya's spectrum of debate, from cooperative truth-seeking (v\u0101da), through competitive victory-seeking (jalpa), to pure destruction (vita\u1e47\u1e0d\u0101), a strikingly clear-eyed taxonomy of what people actually do when they argue. Second, it is often mistranslated as 'skepticism' or 'critical method', which flatters it; in Ny\u0101ya it is precisely the refusal to be pinned to any commitment, a diagnosable dialectical strategy rather than a respectable epistemological position.\n\n## Audience Metaphor\n\nPicture a debater who only ever plays defense-by-demolition: they knock down whatever you build and never put up a structure of their own, because a structure could be knocked down too. That is vita\u1e47\u1e0d\u0101, all wrecking ball, no blueprint. It can look like fearless critique, but the tradition sees the trick: you cannot lose an argument if you are careful never to actually claim anything.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.2.3 (definition of vita\u1e47\u1e0d\u0101) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, on the three modes contrasted -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b -- see [references/nyayamanjari.md](../references/nyayamanjari.md)", "concepts/vyapti": "# Vy\u0101pti -- \u0935\u094d\u092f\u093e\u092a\u094d\u0924\u093f\n\n**Not:** correlation, material implication, statistical association\n\n## What It Actually Means\n\nVy\u0101pti is the relation that makes a mark probative: the pervaded (vy\u0101pya) is nowhere found without the pervader (vy\u0101paka), so smoke is pervaded by fire. Inference is only as sound as the vy\u0101pti behind it, which is why Ny\u0101ya works hard to establish it: repeated positive observation, confirming co-presence; observation of co-absence, that removing the pervader removes the mark; and tarka, suppositional reasoning that shows the denial of the pervasion collapses into absurdity. The gravest threat is the up\u0101dhi, a hidden conditioning factor that makes the tie hold only under a further condition; detecting and excluding up\u0101dhis is the discipline that turns a mere generalization into a genuine pervasion. Navya-Ny\u0101ya later built an extraordinarily fine vocabulary for stating vy\u0101pti precisely; that layer is deferred to a future bundle.\n\n## Audience Metaphor\n\nA weather app says it usually rains when the pressure drops: useful, but it will fail you. Vy\u0101pti is a promise with no fine print: this sign never, ever comes without that outcome. The tradition spends its energy hunting the hidden clause (the up\u0101dhi) that would turn 'never' back into 'usually', because a single genuine exception voids the whole inference.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.5 with V\u0101tsy\u0101yana's Bh\u0101\u1e63ya -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Ga\u1e45ge\u015ba, Tattvacint\u0101ma\u1e47i, Vy\u0101pti-v\u0101da (the classic analysis; Navya-Ny\u0101ya refinement deferred) -- see [references/tattvacintamani.md](../references/tattvacintamani.md)\n3. Annambha\u1e6d\u1e6da, Tarkasa\u1e43graha on vy\u0101pti and up\u0101dhi -- see [references/tarkasamgraha.md](../references/tarkasamgraha.md)", "references/nyaya-bhashya": "# Ny\u0101ya Bh\u0101\u1e63ya (V\u0101tsy\u0101yana)\n\nThe Ny\u0101ya Bh\u0101\u1e63ya of V\u0101tsy\u0101yana (Pak\u1e63ilasv\u0101min, c. 5th century CE) is the earliest extant commentary on the Ny\u0101ya S\u016btra and the text through which the s\u016btras were classically read. It elaborates sense-object contact (sannikar\u1e63a) and the two phases of perception, the gavaya illustration of upam\u0101na, the grounding of testimony in a reliable speaker (\u0101pta), the inference of the enduring self against the Buddhist bundle-view, and the analysis of illusion (anyath\u0101-khy\u0101ti). Its readings became the baseline that Uddyotakara's Ny\u0101yav\u0101rttika defended against Dign\u0101ga and Dharmak\u012brti. This bundle cites the Bh\u0101\u1e63ya wherever a classical reading of a s\u016btra, rather than the bare s\u016btra, carries the doctrinal point.", "references/nyaya-sutra": "# Ny\u0101ya S\u016btra\n\nThe Ny\u0101ya S\u016btra, attributed to Gautama (also called Ak\u1e63ap\u0101da), is the root text of the Ny\u0101ya dar\u015bana, conventionally dated to the early centuries CE with older layers. Its five adhy\u0101yas open with the sixteen categories (1.1.1) whose true knowledge is said to lead to the highest good, then develop the four pram\u0101\u1e47as (perception, inference, comparison, testimony), the five-membered inference and its members (1.1.32-39), the pseudo-reasons (1.2.4-9), the three modes of debate (1.2.1-3), the nature and inference of the self, the theory of error (4.2), and the points of defeat (5.2). It is the source that this bundle's inference-and-debate apparatus is anchored to, and the primary object of the great commentaries by V\u0101tsy\u0101yana, Uddyotakara, and V\u0101caspati Mi\u015bra.", "references/nyayakusumanjali": "# Ny\u0101yakusum\u0101\u00f1jali (Udayana)\n\nThe Ny\u0101yakusum\u0101\u00f1jali ('a handful of flowers of Ny\u0101ya') by Udayana (c. 10th-11th century CE) is the classic systematic defence of theism in Indian philosophy, presenting and defending inferences for \u012a\u015bvara as the omniscient efficient cause who orders eternal atoms according to the karma of souls. Udayana is the towering figure of late classical Ny\u0101ya-Vai\u015be\u1e63ika: his \u0100tmatattvaviveka defends the enduring self against Buddhist momentariness, and his Kira\u1e47\u0101val\u012b expounds the Vai\u015be\u1e63ika categories. This bundle anchors the \u012a\u015bvara concept, the enduring plural \u0101tman, and the defence of anyath\u0101-khy\u0101ti to Udayana's works.", "references/nyayamanjari": "# Ny\u0101yama\u00f1jar\u012b (Jayanta Bha\u1e6d\u1e6da)\n\nThe Ny\u0101yama\u00f1jar\u012b ('a flowering-cluster of Ny\u0101ya') by Jayanta Bha\u1e6d\u1e6da (Kashmir, c. 9th century CE) is not a line-by-line commentary but an independent, engagingly written treatise selecting and defending the central Ny\u0101ya positions. It gives some of the clearest classical arguments for treating upam\u0101na as an irreducible pram\u0101\u1e47a, for the extrinsic apprehension of validity (paratah-pr\u0101m\u0101\u1e47ya), and for the reliabilist grounding of \u015babda in a trustworthy speaker, including the Ny\u0101ya defence of the Veda's authority via its reliable author. This bundle cites it where a perspicuous classical statement of the pram\u0101\u1e47a theory is wanted.", "references/nyayavarttika": "# Ny\u0101yav\u0101rttika (Uddyotakara)\n\nThe Ny\u0101yav\u0101rttika of Uddyotakara (c. 6th-7th century CE) is a v\u0101rttika (critical gloss) on V\u0101tsy\u0101yana's Bh\u0101\u1e63ya, written largely to rebut the Buddhist logicians Dign\u0101ga and Dharmak\u012brti. It defends the five-membered form of inference against the Buddhist two-membered reduction, sharpens the conditions on a valid mark (hetu), and reinforces the Ny\u0101ya doctrine of the enduring self against momentariness. It is a key link in the chain S\u016btra to Bh\u0101\u1e63ya to V\u0101rttika to V\u0101caspati's T\u0101tparya\u1e6d\u012bk\u0101 that carried classical Ny\u0101ya forward, and this bundle draws on it for the defence of the demonstrative form and the theory of the reason.", "references/padarthadharmasamgraha": "# Pad\u0101rthadharmasa\u1e43graha (Pra\u015bastap\u0101da)\n\nThe Pad\u0101rthadharmasa\u1e43graha of Pra\u015bastap\u0101da (c. 6th century CE), though nominally a commentary on the Vai\u015be\u1e63ika S\u016btra, is really an independent systematic treatise, and its ordering of the doctrine became standard. Pra\u015bastap\u0101da fixed the count of qualities at twenty-four, gave the classic account of atomic composition through dyads (dvya\u1e47uka) and triads (trya\u1e47uka), articulated the role of unseen moral desert (ad\u1e5b\u1e63\u1e6da) and divine will in initiating world-formation, and clarified inherence (samav\u0101ya) as one eternal relation distinct from conjunction. His authority is such that he is often called the second founder of Vai\u015be\u1e63ika. This bundle cites him throughout the ontology and atomism tiers.", "references/saptapadarthi": "# Saptapad\u0101rth\u012b (\u015aiv\u0101ditya)\n\nThe Saptapad\u0101rth\u012b of \u015aiv\u0101ditya (c. 11th-12th century CE) is a short, well-organised manual expounding the seven pad\u0101rthas of Vai\u015be\u1e63ika, incorporating Ny\u0101ya epistemology within the combined syncretic framework that prevailed by his time. It is valued as a clear entry point to the categories, the substances and their qualities, and the relation of inherence. This bundle uses it as a supporting primer for the saptapad\u0101rtha overview and for samav\u0101ya, alongside the Vai\u015be\u1e63ika S\u016btra and Pra\u015bastap\u0101da's fuller treatment.", "references/tarkasamgraha": "# Tarkasa\u1e43graha (Annambha\u1e6d\u1e6da)\n\nThe Tarkasa\u1e43graha of Annambha\u1e6d\u1e6da (c. 17th century CE), with the author's own D\u012bpik\u0101, is the most widely used introductory manual of the combined Ny\u0101ya-Vai\u015be\u1e63ika system. In a few pages it lays out the seven Vai\u015be\u1e63ika categories, the nine substances and their qualities, the four pram\u0101\u1e47as, the anatomy of inference (vy\u0101pti, the three-conditioned mark, inference-for-oneself and inference-for-others), and the standard fivefold classification of pseudo-reasons (hetv\u0101bh\u0101sa). Because it distils the classical apparatus into teachable form, this bundle uses it as the primer reference for the inference machinery and the fallacy taxonomy, while deeper points are anchored to the s\u016btras and their Bh\u0101\u1e63yas.", "references/tattvacintamani": "# Tattvacint\u0101ma\u1e47i (Ga\u1e45ge\u015ba)\n\nThe Tattvacint\u0101ma\u1e47i of Ga\u1e45ge\u015ba Up\u0101dhy\u0101ya (c. 13th-14th century CE) founds Navya-Ny\u0101ya, the 'new logic', reorganising the whole system around the four pram\u0101\u1e47as and developing an extraordinarily precise technical language for relations, negation, and the conditions of pervasion (vy\u0101pti), the language later refined by Raghun\u0101tha \u015airoma\u1e47i and Gad\u0101dhara. This bundle treats classical Ny\u0101ya-Vai\u015be\u1e63ika and cites the Tattvacint\u0101ma\u1e47i for the classical analysis of vy\u0101pti; the distinctive Navya-Ny\u0101ya apparatus (avacchedaka / limiting relations and the rest) is a named-and-deferred layer, reserved for a dedicated future bundle rather than compressed into this one. It is the strongest single refutation of the old claim that India lacked a rigorous formal logic, and it deserves its own treatment.", "references/vaisheshika-sutra": "# Vai\u015be\u1e63ika S\u016btra\n\nThe Vai\u015be\u1e63ika S\u016btra, attributed to Ka\u1e47\u0101da (Ul\u016bka), is the root text of the Vai\u015be\u1e63ika dar\u015bana and one of the oldest works of Indian natural philosophy. It presents the categories of being, originally six (substance, quality, motion, universal, particularity, inherence), with abh\u0101va (absence) added by the later tradition; enumerates the nine substances; classifies the qualities and the five motions; and argues to imperceptible eternal atoms (param\u0101\u1e47u) as the ultimate constituents of the four elements. The school takes its name from vi\u015be\u1e63a, the ultimate particularity. This bundle anchors the ontology tier, dravya, gu\u1e47a, karma-as-motion, s\u0101m\u0101nya, vi\u015be\u1e63a, samav\u0101ya, param\u0101\u1e47u, to this text and to Pra\u015bastap\u0101da's exposition."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
