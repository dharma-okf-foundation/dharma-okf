<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "nyaya-vaisheshika";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/anumana", "label": "Anum\u0101na", "type": "Concept", "description": "Inference as a knowledge-yielding movement of cognition from a perceived mark to what it invariably pervades, grounded in vy\u0101pti and displayed in five members; NOT the Aristotelian syllogism, NOT a purely formal deduction over propositions, NOT probable guessing.", "resource": "", "tags": ["anumana", "inference", "nyaya", "pramana", "vyapti"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/anyatha-khyati", "label": "Anyath\u0101-khy\u0101ti", "type": "Concept", "description": "The Ny\u0101ya realist theory of perceptual error: in illusion a real object is apprehended 'otherwise', a really-existing silver, elsewhere and now remembered, is misperceived as located in the really-present shell, so both relata are real and only their relation is wrong; NOT Advaita's anirvacan\u012bya-khy\u0101ti / adhy\u0101sa (superimposition of the indeterminable), NOT hallucination of an unreal object, NOT a coherence failure.", "resource": "", "tags": ["anyatha-khyati", "error", "perception", "nyaya", "realism"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/atman", "label": "\u0100tman (Ny\u0101ya-Vai\u015be\u1e63ika)", "type": "Concept", "description": "The self as an eternal substance and a real plurality: many distinct selves, each an eternal substratum in which cognition, pleasure, pain, desire, and effort inhere as adventitious qualities; NOT the single non-dual \u0100tman of Advaita, NOT the Abrahamic soul, NOT a stream or bundle of consciousness.", "resource": "", "tags": ["atman", "self", "nyaya", "vaisheshika", "pluralism"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/dravya", "label": "Dravya", "type": "Concept", "description": "Substance, the first Vai\u015be\u1e63ika category: the nine substrata (earth, water, fire, air, ether, time, space, self, mind) in which qualities and motions inhere; NOT Aristotelian primary substance, NOT matter or physical stuff, NOT a bare particular stripped of properties.", "resource": "", "tags": ["dravya", "substance", "vaisheshika", "nine-substances", "ontology"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/dvyanuka-tryanuka", "label": "Dvya\u1e47uka / Trya\u1e47uka", "type": "Concept", "description": "Dyad and triad: the composition mechanism by which two atoms form a dyad (dvya\u1e47uka) and three dyads form a triad (trya\u1e47uka), the smallest perceptible unit, building the gross world up from imperceptible atoms; NOT molecular chemistry, NOT a physical bonding theory, NOT physicalist emergence.", "resource": "", "tags": ["dvyanuka", "tryanuka", "dyad", "triad", "vaisheshika"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/guna", "label": "Gu\u1e47a", "type": "Concept", "description": "Quality, the second Vai\u015be\u1e63ika category: the (twenty-four, per Pra\u015bastap\u0101da) qualities that inhere in substances, colour, taste, number, contact, cognition, pleasure, effort, and the rest; NOT the S\u0101\u1e43khya trigu\u1e47a (sattva-rajas-tamas), NOT 'virtue' or moral merit, NOT a strand or a Spinozan mode.", "resource": "", "tags": ["guna", "quality", "vaisheshika", "ontology", "attribute"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/hetu", "label": "Hetu / Li\u1e45ga", "type": "Concept", "description": "The probative reason or inferential mark: the feature whose presence signals the property to be established, valid only when it meets the required conditions (belonging to the subject, present in like cases, absent from all unlike cases); NOT merely 'the middle term', NOT any correlated feature.", "resource": "", "tags": ["hetu", "linga", "reason", "mark", "nyaya"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/hetvabhasa", "label": "Hetv\u0101bh\u0101sa", "type": "Concept", "description": "The taxonomy of pseudo-reasons, marks that look probative but fail (classically fivefold: savyabhic\u0101ra, viruddha, satpratipak\u1e63a, asiddha, b\u0101dhita); the Ny\u0101ya theory of inferential error; NOT the list of Western informal fallacies, NOT rhetorical foul play, NOT logical invalidity in the formal sense.", "resource": "", "tags": ["hetvabhasa", "fallacy", "pseudo-reason", "nyaya", "inference"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/ishvara", "label": "\u012a\u015bvara (Ny\u0101ya-Vai\u015be\u1e63ika)", "type": "Concept", "description": "God as the intelligent efficient cause of the ordered world, established by inference: the omniscient eternal self who fashions the cosmos from beginningless atoms and karma; the Ny\u0101ya rational theism (Udayana's proofs); NOT the material cause of the world, NOT the Advaita Brahman appearing as \u012a\u015bvara, NOT the Yoga \u012a\u015bvara (a special untouched puru\u1e63a who is not creator).", "resource": "", "tags": ["ishvara", "god", "nyaya", "vaisheshika", "rational-theism"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/jalpa", "label": "Jalpa", "type": "Concept", "description": "Victory-oriented disputation, in which winning is the goal and eristic devices (including chala, j\u0101ti, and nigrahasth\u0101na) are permitted alongside valid reasoning; the middle debate mode; NOT honest truth-seeking debate (v\u0101da), NOT outright lying, NOT idle quarrel.", "resource": "", "tags": ["jalpa", "disputation", "debate", "nyaya", "dialectic"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/karma", "label": "Karma", "type": "Concept", "description": "Motion, the third Vai\u015be\u1e63ika category: physical movement of the five kinds (utk\u1e63epa\u1e47a throwing-up, apak\u1e63epa\u1e47a throwing-down, \u0101ku\u00f1cana contraction, pras\u0101ra\u1e47a expansion, gamana locomotion) that inheres momentarily in a substance and causes conjunction and disjunction; NOT the moral law of action-and-consequence, NOT ritual action, NOT \"energy\" or \"force\".", "resource": "", "tags": ["karma", "motion", "action", "vaisheshika", "ontology"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/nigrahasthana", "label": "Nigrahasth\u0101na", "type": "Concept", "description": "Points of defeat: the enumerated conditions under which a debater is judged to have lost, such as self-contradiction, shifting the thesis, incoherence, or falling silent; the procedural close of a formal debate; NOT the fallacies of inference (that is hetv\u0101bh\u0101sa), NOT penalties for rudeness, NOT a scoring system for style.", "resource": "", "tags": ["nigrahasthana", "points-of-defeat", "debate", "nyaya", "procedure"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/panchavayava", "label": "Pa\u00f1c\u0101vayava", "type": "Concept", "description": "The five members in which a demonstrative inference is stated to another (pratij\u00f1\u0101, hetu, ud\u0101hara\u1e47a, upanaya, nigamana); the public form of inference-for-others; NOT a redundant, longer version of the three-term syllogism, NOT rhetorical padding, NOT a proof in symbolic logic.", "resource": "", "tags": ["panchavayava", "five-members", "syllogism", "nyaya", "avayava"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/paramanu", "label": "Param\u0101\u1e47u", "type": "Concept", "description": "The atom: the eternal, partless, imperceptible ultimate unit of the four elemental substances, qualitatively distinct and quality-bearing; NOT the Democritean atom, NOT the atom of modern physics, NOT a featureless mathematical point of matter.", "resource": "", "tags": ["paramanu", "atom", "atomism", "vaisheshika", "substance"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/pramana", "label": "Pram\u0101\u1e47a", "type": "Concept", "description": "A means or instrument of valid knowing (pram\u0101); Ny\u0101ya admits four (perception, inference, comparison, testimony) as realist instruments that reveal a mind-independent object; NOT 'proof' in the logician's sense, NOT subjective justification, NOT the Advaita treatment where the pram\u0101\u1e47as are finally sublated in non-dual knowing.", "resource": "", "tags": ["pramana", "epistemology", "nyaya", "realism", "knowledge"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/pramanya", "label": "Pram\u0101 / Pr\u0101m\u0101\u1e47ya", "type": "Concept", "description": "Valid cognition (pram\u0101) and the theory of how its validity is apprehended (pr\u0101m\u0101\u1e47ya): Ny\u0101ya's paratah-pr\u0101m\u0101\u1e47ya, validity known extrinsically through corroboration and successful action, against M\u012bm\u0101\u1e43s\u0101's intrinsic svata\u1e25-pr\u0101m\u0101\u1e47ya; NOT self-certifying intuition, NOT coherentism, NOT a definition of truth as usefulness.", "resource": "", "tags": ["pramanya", "prama", "validity", "nyaya", "epistemology"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/pratyaksha", "label": "Pratyak\u1e63a", "type": "Concept", "description": "Perception, the first pram\u0101\u1e47a: valid cognition arising from sense-object contact, in an indeterminate (nirvikalpaka) and a determinate (savikalpaka) phase; a realist contact-theory of knowing; NOT sense-data phenomenalism, NOT bare sensation, NOT the Advaita perception that is finally sublated.", "resource": "", "tags": ["pratyaksha", "perception", "nyaya", "realism", "sannikarsha"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/samanya-vishesha", "label": "S\u0101m\u0101nya / Vi\u015be\u1e63a", "type": "Concept", "description": "Universal and ultimate particularity: s\u0101m\u0101nya, the real repeatable universal that inheres in many individuals (cowness in cows), and vi\u015be\u1e63a, the ultimate differentiator individuating each eternal atom and self; realist universals, with vi\u015be\u1e63a the school's namesake; NOT nominalist class-labels, NOT Platonic transcendent Forms, NOT mere resemblance.", "resource": "", "tags": ["samanya", "vishesha", "universal", "particular", "vaisheshika"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/samavaya", "label": "Samav\u0101ya", "type": "Concept", "description": "Inherence, the sixth Vai\u015be\u1e63ika category: the eternal, single, all-pervading relation that binds inseparables, whole and parts, substance and quality, motion and its locus, universal and individual, into one thing; NOT ordinary conjunction (sa\u1e43yoga), NOT set-membership, NOT physical attachment.", "resource": "", "tags": ["samavaya", "inherence", "relation", "vaisheshika", "ontology"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/saptapadartha", "label": "Saptapad\u0101rtha", "type": "Concept", "description": "The seven categories of Vai\u015be\u1e63ika ontology (dravya, gu\u1e47a, karma, s\u0101m\u0101nya, vi\u015be\u1e63a, samav\u0101ya, abh\u0101va); an exhaustive realist inventory of the kinds of the knowable; NOT Ny\u0101ya's sixteen epistemic-dialectical categories, NOT the S\u0101\u1e43khya twenty-five evolutes, NOT a list of substances only.", "resource": "", "tags": ["saptapadartha", "seven-categories", "vaisheshika", "ontology", "realism"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/shabda", "label": "\u015aabda", "type": "Concept", "description": "Verbal testimony, the pram\u0101\u1e47a yielding knowledge from the statement of a trustworthy speaker (\u0101pta), its validity resting on the speaker's reliability; NOT scripture-inerrant-by-authorship, NOT mere hearsay, NOT the \u015aabda-Brahman of sound-metaphysics, NOT the M\u012bm\u0101\u1e43s\u0101 intrinsically-valid Veda.", "resource": "", "tags": ["shabda", "testimony", "apta", "nyaya", "pramana"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/shodasha-padartha", "label": "\u1e62o\u1e0da\u015ba-pad\u0101rtha", "type": "Concept", "description": "The sixteen categories that organize Ny\u0101ya as a system, from pram\u0101\u1e47a and prameya through the debate terms to nigrahasth\u0101na; the architecture of the school of reasoning; NOT Vai\u015be\u1e63ika's seven ontological pad\u0101rthas, NOT a metaphysics of what exists, NOT an arbitrary list.", "resource": "", "tags": ["shodasha-padartha", "sixteen-categories", "nyaya", "framework", "padartha"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/tarka", "label": "Tarka", "type": "Concept", "description": "Suppositional or counterfactual reasoning that defends a pervasion by showing its denial leads to absurdity; an auxiliary that secures inference, not itself a pram\u0101\u1e47a; NOT 'logic' in the generic sense, NOT debate, NOT sophistry.", "resource": "", "tags": ["tarka", "suppositional-reasoning", "reductio", "nyaya", "vyapti"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/upamana", "label": "Upam\u0101na", "type": "Concept", "description": "Comparison, the pram\u0101\u1e47a by which the tie between a name and an unfamiliar thing is known through told similarity (the classic gavaya case); an independent source of knowing, not reducible to inference or testimony; NOT analogy as a rhetorical device, NOT metaphor, NOT mere resemblance-noticing.", "resource": "", "tags": ["upamana", "comparison", "analogy", "nyaya", "pramana"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/vada", "label": "V\u0101da", "type": "Concept", "description": "Honest, truth-seeking debate between parties who both argue only from valid pram\u0101\u1e47a and accept defeat when genuinely refuted; the highest of the three debate modes; NOT mere argument, NOT victory-seeking disputation (that is jalpa), NOT quarrel.", "resource": "", "tags": ["vada", "debate", "dialectic", "nyaya", "truth-seeking"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/vitanda", "label": "Vita\u1e47\u1e0d\u0101", "type": "Concept", "description": "Destructive, purely refutative debate that attacks and demolishes the opponent's thesis while advancing no counter-thesis of its own; the most eristic of the three modes; NOT skeptical philosophical method, NOT v\u0101da, NOT constructive criticism.", "resource": "", "tags": ["vitanda", "refutation", "debate", "nyaya", "dialectic"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/vyapti", "label": "Vy\u0101pti", "type": "Concept", "description": "Invariable concomitance, the pervasion 'wherever the mark, there the pervaded' that licenses every inference; established by repeated observation, co-absence, and tarka; NOT mere correlation, NOT material implication true by definition, NOT statistical association.", "resource": "", "tags": ["vyapti", "concomitance", "pervasion", "nyaya", "inference"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "references/nyaya-bhashya", "label": "Ny\u0101ya Bh\u0101\u1e63ya (V\u0101tsy\u0101yana)", "type": "Reference", "description": "V\u0101tsy\u0101yana's commentary on the Ny\u0101ya S\u016btra, the earliest surviving Bh\u0101\u1e63ya, which fixed the classical readings of perception, inference, testimony, the self, and the theory of error for the whole tradition.", "resource": "", "tags": ["reference", "nyaya-bhashya", "vatsyayana", "commentary"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/nyaya-sutra", "label": "Ny\u0101ya S\u016btra", "type": "Reference", "description": "The foundational s\u016btra text of the Ny\u0101ya school (Gautama / Ak\u1e63ap\u0101da), five books setting out the sixteen categories, the four pram\u0101\u1e47as, the theory of inference and debate, and the path to liberation through true knowledge.", "resource": "", "tags": ["reference", "nyaya-sutra", "gautama", "primary-text"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/nyayakusumanjali", "label": "Ny\u0101yakusum\u0101\u00f1jali (Udayana)", "type": "Reference", "description": "Udayana's classic work of rational theism, marshalling inferential arguments for the existence of \u012a\u015bvara as the intelligent efficient cause of the world; with his \u0100tmatattvaviveka and Kira\u1e47\u0101val\u012b, the high point of classical Ny\u0101ya-Vai\u015be\u1e63ika.", "resource": "", "tags": ["reference", "udayana", "nyayakusumanjali", "theism"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/nyayamanjari", "label": "Ny\u0101yama\u00f1jar\u012b (Jayanta Bha\u1e6d\u1e6da)", "type": "Reference", "description": "Jayanta Bha\u1e6d\u1e6da's independent, discursive treatise on Ny\u0101ya epistemology, prized for its lucid defence of the four pram\u0101\u1e47as and the reliabilist account of testimony.", "resource": "", "tags": ["reference", "nyayamanjari", "jayanta", "treatise"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/nyayavarttika", "label": "Ny\u0101yav\u0101rttika (Uddyotakara)", "type": "Reference", "description": "Uddyotakara's sub-commentary defending Ny\u0101ya realism, especially the five-membered inference and the enduring self, against Buddhist logico-epistemology.", "resource": "", "tags": ["reference", "nyayavarttika", "uddyotakara", "commentary"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/padarthadharmasamgraha", "label": "Pad\u0101rthadharmasa\u1e43graha (Pra\u015bastap\u0101da)", "type": "Reference", "description": "Pra\u015bastap\u0101da's systematic exposition of the Vai\u015be\u1e63ika categories, so authoritative that its author is called the 'second founder'; the classic source for the twenty-four qualities and the dyad-triad composition.", "resource": "", "tags": ["reference", "prashastapada", "padarthadharmasamgraha", "commentary"], "color": "#10b981", "size": 33}}, {"data": {"id": "references/saptapadarthi", "label": "Saptapad\u0101rth\u012b (\u015aiv\u0101ditya)", "type": "Reference", "description": "\u015aiv\u0101ditya's compact primer on the seven Vai\u015be\u1e63ika categories, an accessible classical summary of the realist ontology.", "resource": "", "tags": ["reference", "saptapadarthi", "shivaditya", "primer"], "color" /saptapadartha__concepts/karma", "source": "concepts/saptapadartha", "target": "concepts/karma"}}, {"data": {"id": "concepts/saptapadartha__concepts/samanya-vishesha", "source": "concepts/saptapadartha", "target": "concepts/samanya-vishesha"}}, {"data": {"id": "concepts/saptapadartha__concepts/samavaya", "source": "concepts/saptapadartha", "target": "concepts/samavaya"}}, {"data": {"id": "concepts/saptapadartha__concepts/shodasha-padartha", "source": "concepts/saptapadartha", "target": "concepts/shodasha-padartha"}}, {"data": {"id": "concepts/shabda__references/nyaya-sutra", "source": "concepts/shabda", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/shabda__references/nyaya-bhashya", "source": "concepts/shabda", "target": "references/nyaya-bhashya"}}, {"data": {"id": "concepts/shabda__concepts/pramana", "source": "concepts/shabda", "target": "concepts/pramana"}}, {"data": {"id": "concepts/shabda__concepts/upamana", "source": "concepts/shabda", "target": "concepts/upamana"}}, {"data": {"id": "concepts/shabda__concepts/anumana", "source": "concepts/shabda", "target": "concepts/anumana"}}, {"data": {"id": "concepts/shabda__concepts/ishvara", "source": "concepts/shabda", "target": "concepts/ishvara"}}, {"data": {"id": "concepts/shodasha-padartha__references/nyaya-sutra", "source": "concepts/shodasha-padartha", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/shodasha-padartha__references/nyaya-bhashya", "source": "concepts/shodasha-padartha", "target": "references/nyaya-bhashya"}}, {"data": {"id": "concepts/shodasha-padartha__concepts/pramana", "source": "concepts/shodasha-padartha", "target": "concepts/pramana"}}, {"data": {"id": "concepts/shodasha-padartha__concepts/vada", "source": "concepts/shodasha-padartha", "target": "concepts/vada"}}, {"data": {"id": "concepts/shodasha-padartha__concepts/tarka", "source": "concepts/shodasha-padartha", "target": "concepts/tarka"}}, {"data": {"id": "concepts/shodasha-padartha__concepts/saptapadartha", "source": "concepts/shodasha-padartha", "target": "concepts/saptapadartha"}}, {"data": {"id": "concepts/tarka__references/nyaya-sutra", "source": "concepts/tarka", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/tarka__references/nyayamanjari", "source": "concepts/tarka", "target": "references/nyayamanjari"}}, {"data": {"id": "concepts/tarka__references/tarkasamgraha", "source": "concepts/tarka", "target": "references/tarkasamgraha"}}, {"data": {"id": "concepts/tarka__concepts/vyapti", "source": "concepts/tarka", "target": "concepts/vyapti"}}, {"data": {"id": "concepts/tarka__concepts/anumana", "source": "concepts/tarka", "target": "concepts/anumana"}}, {"data": {"id": "concepts/tarka__concepts/shodasha-padartha", "source": "concepts/tarka", "target": "concepts/shodasha-padartha"}}, {"data": {"id": "concepts/tarka__concepts/vada", "source": "concepts/tarka", "target": "concepts/vada"}}, {"data": {"id": "concepts/upamana__references/nyaya-sutra", "source": "concepts/upamana", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/upamana__references/nyaya-bhashya", "source": "concepts/upamana", "target": "references/nyaya-bhashya"}}, {"data": {"id": "concepts/upamana__references/nyayamanjari", "source": "concepts/upamana", "target": "references/nyayamanjari"}}, {"data": {"id": "concepts/upamana__concepts/pramana", "source": "concepts/upamana", "target": "concepts/pramana"}}, {"data": {"id": "concepts/upamana__concepts/shabda", "source": "concepts/upamana", "target": "concepts/shabda"}}, {"data": {"id": "concepts/upamana__concepts/anumana", "source": "concepts/upamana", "target": "concepts/anumana"}}, {"data": {"id": "concepts/upamana__concepts/pratyaksha", "source": "concepts/upamana", "target": "concepts/pratyaksha"}}, {"data": {"id": "concepts/vada__references/nyaya-sutra", "source": "concepts/vada", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/vada__references/nyaya-bhashya", "source": "concepts/vada", "target": "references/nyaya-bhashya"}}, {"data": {"id": "concepts/vada__references/nyayamanjari", "source": "concepts/vada", "target": "references/nyayamanjari"}}, {"data": {"id": "concepts/vada__concepts/jalpa", "source": "concepts/vada", "target": "concepts/jalpa"}}, {"data": {"id": "concepts/vada__concepts/vitanda", "source": "concepts/vada", "target": "concepts/vitanda"}}, {"data": {"id": "concepts/vada__concepts/nigrahasthana", "source": "concepts/vada", "target": "concepts/nigrahasthana"}}, {"data": {"id": "concepts/vada__concepts/pramana", "source": "concepts/vada", "target": "concepts/pramana"}}, {"data": {"id": "concepts/vitanda__references/nyaya-sutra", "source": "concepts/vitanda", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/vitanda__references/nyaya-bhashya", "source": "concepts/vitanda", "target": "references/nyaya-bhashya"}}, {"data": {"id": "concepts/vitanda__references/nyayamanjari", "source": "concepts/vitanda", "target": "references/nyayamanjari"}}, {"data": {"id": "concepts/vitanda__concepts/vada", "source": "concepts/vitanda", "target": "concepts/vada"}}, {"data": {"id": "concepts/vitanda__concepts/jalpa", "source": "concepts/vitanda", "target": "concepts/jalpa"}}, {"data": {"id": "concepts/vitanda__concepts/nigrahasthana", "source": "concepts/vitanda", "target": "concepts/nigrahasthana"}}, {"data": {"id": "concepts/vitanda__concepts/hetvabhasa", "source": "concepts/vitanda", "target": "concepts/hetvabhasa"}}, {"data": {"id": "concepts/vyapti__references/nyaya-sutra", "source": "concepts/vyapti", "target": "references/nyaya-sutra"}}, {"data": {"id": "concepts/vyapti__references/tattvacintamani", "source": "concepts/vyapti", "target": "references/tattvacintamani"}}, {"data": {"id": "concepts/vyapti__references/tarkasamgraha", "source": "concepts/vyapti", "target": "references/tarkasamgraha"}}, {"data": {"id": "concepts/vyapti__concepts/anumana", "source": "concepts/vyapti", "target": "concepts/anumana"}}, {"data": {"id": "concepts/vyapti__concepts/hetu", "source": "concepts/vyapti", "target": "concepts/hetu"}}, {"data": {"id": "concepts/vyapti__concepts/tarka", "source": "concepts/vyapti", "target": "concepts/tarka"}}, {"data": {"id": "concepts/vyapti__concepts/hetvabhasa", "source": "concepts/vyapti", "target": "concepts/hetvabhasa"}}], "bodies": {"concepts/anumana": "# Anum\u0101na -- \u0905\u0928\u0941\u092e\u093e\u0928\n\n**Not:** the syllogism, formal deduction, probable guessing\n\n## What It Actually Means\n\nAnum\u0101na is the second pram\u0101\u1e47a and the engine of Ny\u0101ya reasoning. Its stock example: one sees smoke on a hill (the mark), knows that wherever there is smoke there is fire (the pervasion, established from kitchens and never falsified), and so knows there is fire on the hill. The inference is not a manipulation of sentences but a movement of cognition: a mark, apprehended in a subject, carries the mind to the pervaded property. A mark is probative only under strict conditions, chiefly that it genuinely belongs to the subject, is present in like cases, and is absent from every unlike case. Because the warrant runs through vy\u0101pti, a real feature of the world, anum\u0101na delivers knowledge of a mind-independent object, not a formally valid string.\n\n## Audience Metaphor\n\nA syllogism is a calculator: feed it the right form and it returns a valid answer regardless of what the symbols mean. Anum\u0101na is a tracker reading smoke on a ridge: the conclusion is only as good as the tracker's knowledge that this sign never comes without that fire, knowledge earned in the field, not proved on paper. The tracker is not computing; the tracker is knowing.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.5 with V\u0101tsy\u0101yana's Bh\u0101\u1e63ya -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md) and [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n2. Annambha\u1e6d\u1e6da, Tarkasa\u1e43graha (the standard primer on the anum\u0101na apparatus) -- see [references/tarkasamgraha.md](../references/tarkasamgraha.md)\n3. Cross-bundle: anum\u0101na in vedanta-epistemology v0.3 -- the Advaita treatment, school-scoped and reciprocally linked; same term, different dar\u015bana", "concepts/anyatha-khyati": "# Anyath\u0101-khy\u0101ti -- \u0905\u0928\u094d\u092f\u0925\u093e\u0916\u094d\u092f\u093e\u0924\u093f\n\n**Not:** adhyasa, hallucination, coherence failure\n\n## What It Actually Means\n\nAnyath\u0101-khy\u0101ti, apprehending 'otherwise', is Ny\u0101ya's realist theory of what happens in perceptual error, worked out through the stock case of mistaking a piece of shell (nacre) for silver. Ny\u0101ya's analysis keeps everything real. The shell before me is real; silver is real too, seen before and now revived in memory because a defect (poor light, haste, a similarity) stirs the trace; and the error consists solely in a wrong synthesis that presents the remembered-real silver as here, in the present shell, in the judgment 'this is silver'. Nothing unreal is perceived, and no indeterminable entity is conjured; only the relation is misplaced, and it is corrected when a better cognition arrives ('this is only shell') and when action fails (one reaches and grasps nacre). This unassuming theory of a small illusion is a load-bearing wall of Ny\u0101ya realism, because the rival Advaita account, which makes the illusory silver anirvacan\u012bya (neither real nor unreal) and treats such superimposition (adhy\u0101sa) as the model for the entire world's appearance on Brahman, uses the very same example to reach non-dualism. Two schools, one shell and one word 'khy\u0101ti', and the whole realism-versus-monism question riding on how the mistake is parsed.\n\n## Audience Metaphor\n\nYou grab for your phone on the nightstand and miss, it was actually your glasses case. One account says your mind conjured a ghostly indeterminate 'phone' out of ignorance. Ny\u0101ya says something soberer and more realist: the phone is real (it exists, just in your bag), the case is real (it is right there), and all that went wrong was the mind stitching a real memory onto a real object in the wrong place. The fix comes from the world, your hand closes on the case. No ghosts, just a misfiled real thing.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 4.2.31-37 with V\u0101tsy\u0101yana's Bh\u0101\u1e63ya (the theory of error) -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n2. Udayana and the defence of anyath\u0101-khy\u0101ti against rival khy\u0101ti-v\u0101das -- see [references/nyayakusumanjali.md](../references/nyayakusumanjali.md)\n3. Cross-bundle warning: adhy\u0101sa / anirvacan\u012bya-khy\u0101ti in vedanta-epistemology v0.3 and upanishadic-core v0.6 -- the non-dualist rival; school-scoped", "concepts/atman": "# \u0100tman (Ny\u0101ya-Vai\u015be\u1e63ika) -- \u0906\u0924\u094d\u092e\u0928\u094d\n\n**Not:** the Advaita Atman, the Abrahamic soul, a bundle of consciousness\n\n## What It Actually Means\n\nFor Ny\u0101ya-Vai\u015be\u1e63ika the \u0101tman is an eternal substance, one of the nine dravyas, and there are many of them, one per living being, plus \u012a\u015bvara as a special self. This is a thoroughgoing pluralistic realism about the self, and its most surprising feature to readers steeped in Ved\u0101nta is that consciousness is not the self's essence. Cognition, pleasure, pain, desire, aversion, and effort are qualities (gu\u1e47as) that inhere in the self, and they arise only when the self is embodied and conjoined with a mind (manas) and body; a self out of such conjunction, as in liberation (apavarga), persists as a substance but without any occurrent consciousness at all. The self is not perceived but inferred, from the very fact of desire, memory, and cognition needing an enduring substratum. This realist, pluralist, consciousness-as-adventitious account is the deepest doctrinal fault-line between this school and Advaita, and it is exactly the contrast an AI trained on a Ved\u0101nta-weighted corpus will erase, collapsing a school that affirms many non-essentially-conscious selves into the one that affirms a single essentially-conscious Self.\n\n## Audience Metaphor\n\nAdvaita says the many 'selves' are one ocean mistaking itself for waves. Ny\u0101ya-Vai\u015be\u1e63ika says the opposite: there really are many separate vessels, each genuinely its own, and, stranger still, the light we call consciousness is not what a vessel is but a lamp that only glows while it is wired to a body and mind. Unplug it in liberation and the vessel remains, real and eternal, simply dark. Two doctrines, one word '\u0101tman', pointing in opposite directions.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 3.2.4 and Ny\u0101ya S\u016btra 1.1.10 (the self inferred and characterised) -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md) and [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Udayana, \u0100tmatattvaviveka (the classic defence of the enduring self against Buddhism) -- see [references/nyayakusumanjali.md](../references/nyayakusumanjali.md)\n3. Cross-bundle warning: the single \u0100tman in upanishadic-core v0.6 and dharma-foundation v0.1 -- the opposite doctrine; never conflate", "concepts/dravya": "# Dravya -- \u0926\u094d\u0930\u0935\u094d\u092f\n\n**Not:** Aristotelian substance, matter, a bare particular\n\n## What It Actually Means\n\nDravya, substance, is the first and most basic Vai\u015be\u1e63ika category: that in which qualities and motions inhere and which serves as the material cause of composite things. Vai\u015be\u1e63ika fixes exactly nine substances: the four elemental substances earth, water, fire, and air (each ultimately atomic); ether (\u0101k\u0101\u015ba), the substrate of sound; time (k\u0101la) and space or direction (dik), both eternal and all-pervading; the self (\u0101tman); and the mind (manas), the atomic inner instrument. This list quietly encodes the school's whole realism and pluralism: the physical and the non-physical, the atomic and the pervasive, the conscious self and its instrument, all sit as distinct real substances. A dravya is never a bare particular; it is a genuine locus that bears its qualities and motions through the relation of inherence (samav\u0101ya), and the eternal dravyas are individuated by their own ultimate particularity (vi\u015be\u1e63a). It is the category over which the other six are draped.\n\n## Audience Metaphor\n\nThink less 'lump of matter' and more 'the nine kinds of surface reality can be written on'. Some are physical (the four elements' atoms), some are vast and invisible (space, time, ether), one is the conscious self, one is the mind that scans it. Dravya is the category of write-on surfaces; qualities and motions are the writing. A surface with nothing written is still a surface, but it is never just a blank peg, it is one of exactly nine real kinds.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 1.1.5 (the nine substances) -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha, on dravya -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. Cross-category: paramanu.md and atman.md (this bundle) -- atomic and conscious substances", "concepts/dvyanuka-tryanuka": "# Dvya\u1e47uka / Trya\u1e47uka -- \u0926\u094d\u0935\u094d\u092f\u0923\u0941\u0915 / \u0924\u094d\u0930\u094d\u092f\u0923\u0941\u0915\n\n**Not:** molecular chemistry, bonding forces, physicalist emergence\n\n## What It Actually Means\n\nDvya\u1e47uka (dyad) and trya\u1e47uka (triad) name the steps by which Vai\u015be\u1e63ika builds a perceptible world out of imperceptible atoms. Two eternal atoms combine into a dyad; the dyad is still too subtle to be perceived. Three dyads combine into a triad (trya\u1e47uka, sometimes trasare\u1e47u), and the triad is the smallest perceptible magnitude, the mote seen in a sunbeam being the stock example. From triads upward, ordinary gross bodies are composed. The scheme solves a specific metaphysical problem: since atoms are partless and sizeless, how does anything with size and visibility ever arise? The answer is a graded composition in which each composite is a genuine new whole (avayavin) inhering in its parts via samav\u0101ya, with the process set in motion, at the dawn of each world-cycle, by unseen moral desert (ad\u1e5b\u1e63\u1e6da) under the ordering will of \u012a\u015bvara. It is thus a metaphysics of magnitude and part-whole reality, not a physics of molecular bonding, and it presupposes the realist categories rather than a force-and-particle picture.\n\n## Audience Metaphor\n\nIt answers a riddle: if the ultimate bricks are literally sizeless, where does size come from? Vai\u015be\u1e63ika's reply is a strict recipe, two atoms to a dyad, three dyads to the first speck you can actually see, that dust-mote in the sunbeam. It reads like chemistry but it is really an argument about how the visible arises from the invisible, held together not by chemical bonds but by inherence and, at the cosmic start, by a moral-and-divine ordering.\n\n## Citations\n\n1. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha (dvya\u1e47uka and trya\u1e47uka composition) -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n2. Vai\u015be\u1e63ika S\u016btra, the atomist and part-whole s\u016btras -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n3. Cross-category: paramanu.md and samavaya.md (this bundle)", "concepts/guna": "# Gu\u1e47a -- \u0917\u0941\u0923\n\n**Not:** the triguna, virtue, a strand\n\n## What It Actually Means\n\nGu\u1e47a, quality, is the second Vai\u015be\u1e63ika category: a property that inheres in a substance and gives it its determinate character. Pra\u015bastap\u0101da fixes the standard count at twenty-four, including the sensible qualities (colour, taste, smell, touch, sound), the numerical and dimensional qualities (number, measure, separateness, contact, disjunction), and, strikingly, the qualities of the self (cognition, pleasure, pain, desire, aversion, effort, plus dharma, adharma, and mental impressions). A gu\u1e47a depends on its substance and inheres in it through samav\u0101ya; qualities do not themselves possess further qualities or undergo motion. The great hazard for this term is not internal but cross-bundle: 'gu\u1e47a' is also the word for the three constituents of prak\u1e5bti (sattva, rajas, tamas) in S\u0101\u1e43khya, Yoga, and Ved\u0101nta, an entirely different doctrine about the fabric of the manifest world. The Vai\u015be\u1e63ika gu\u1e47a and the trigu\u1e47a are unrelated theories wearing one word, and an AI that blends them will produce confident nonsense in both directions.\n\n## Audience Metaphor\n\n'Charge' means one thing to an electrician and another to a cavalry officer; sharing the word buys them no shared physics. So with gu\u1e47a. To the Vai\u015be\u1e63ika it is an attribute in an object, this pot's redness, its weight, its very number. To the S\u0101\u1e43khya it is one of three cosmic strands weaving all of nature. Same sound, different universe. Splicing them is like wiring a horse charge into a circuit diagram.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 1.1.6 -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha (the twenty-four qualities) -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. Cross-bundle warning: trigu\u1e47a in dharma-foundation v0.1, yoga-darshana v0.2, cosmology-creation v0.7 -- a wholly different scheme; never merge\n4. Cross-bundle note: the trigu\u1e47a's doctrinal source-school treatment now has its own dedicated file, sankhya-darshana v0.13's guna-samkhya.md -- still unrelated to this Vai\u015be\u1e63ika ontological category, shared word only", "concepts/hetu": "# Hetu / Li\u1e45ga -- \u0939\u0947\u0924\u0941 / \u0932\u093f\u0919\u094d\u0917\n\n**Not:** the middle term, a correlated feature, a cause\n\n## What It Actually Means\n\nThe hetu (reason), also called li\u1e45ga (mark), is the pivot of inference: the property that, once seen in the subject, carries the mind to the property being established. Its authority is conditional. The classical requirement is trair\u016bpya, three marks of a good reason: the hetu must qualify the subject (pak\u1e63adharmat\u0101), must be present in at least one similar case where the target is known to occur (sapak\u1e63a-sattva), and must be wholly absent from every dissimilar case where the target is absent (vipak\u1e63a-asattva); later logicians add further conditions. A feature that fails any of these is not a weaker mark but a hetv\u0101bh\u0101sa, a mere semblance of a reason. So the hetu is never just 'a term' or 'a correlation'; it is a property doing probative work under strict, world-involving conditions.\n\n## Audience Metaphor\n\nA password field accepts any string in the right position; that is the middle term. A key is different: it opens the lock only if its actual cut matches the actual pins. The hetu is a key, not a slot. Present the right-shaped mark and knowledge turns; present a lookalike that also fits the wrong doors and the tradition names it a counterfeit (a pseudo-mark), not a weak key.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.34-35 -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Dign\u0101ga and the trair\u016bpya doctrine, absorbed and debated in Ny\u0101ya; see Uddyotakara, Ny\u0101yav\u0101rttika -- see [references/nyayavarttika.md](../references/nyayavarttika.md)\n3. Annambha\u1e6d\u1e6da, Tarkasa\u1e43graha on the definition of hetu -- see [references/tarkasamgraha.md](../references/tarkasamgraha.md)", "concepts/hetvabhasa": "# Hetv\u0101bh\u0101sa -- \u0939\u0947\u0924\u094d\u0935\u093e\u092d\u093e\u0938\n\n**Not:** informal fallacies, debate cheating, formal invalidity\n\n## What It Actually Means\n\nHetv\u0101bh\u0101sa, 'the semblance of a reason', is Ny\u0101ya's account of how inference goes wrong at the mark. The standard five: savyabhic\u0101ra (anaik\u0101ntika), the straying reason, present also where the target is absent, so it proves nothing determinately; viruddha, the contradictory reason, which actually establishes the opposite of the thesis; satpratipak\u1e63a (prakara\u1e47asama), the counterbalanced reason, met by an equally good reason for the contrary; asiddha, the unestablished reason, whose own presence in the subject is not secured; and b\u0101dhita (k\u0101l\u0101tyay\u0101padi\u1e63\u1e6da), the stultified reason, whose conclusion is already refuted by perception or a stronger source. Each names a specific way a mark fails its conditions rather than a category of rhetorical bad behaviour. This is why importing the Western catalogue of informal fallacies misses the target: hetv\u0101bh\u0101sa is a diagnostics of inference, keyed to the trair\u016bpya, not a list of debating sins.\n\n## Audience Metaphor\n\nA metal detector that beeps at bottle caps, stays silent over buried coins, or is drowned out by a second detector beeping the opposite, is not committing rude behaviour; it is failing at detection in five diagnosable ways. Hetv\u0101bh\u0101sa is the repair manual for the detector, a fault tree for marks, not an etiquette guide for the operators.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.2.4-9 (the five hetv\u0101bh\u0101sas) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Annambha\u1e6d\u1e6da, Tarkasa\u1e43graha, the standard fivefold classification -- see [references/tarkasamgraha.md](../references/tarkasamgraha.md)\n3. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b -- see [references/nyayamanjari.md](../references/nyayamanjari.md)", "concepts/ishvara": "# \u012a\u015bvara (Ny\u0101ya-Vai\u015be\u1e63ika) -- \u0908\u0936\u094d\u0935\u0930\n\n**Not:** the material cause, the Advaita Brahman, the Yoga Ishvara\n\n## What It Actually Means\n\n\u012a\u015bvara in Ny\u0101ya-Vai\u015be\u1e63ika is God as the intelligent efficient cause of the world, and the school is famous for arguing the point rather than presupposing it. Udayana's Ny\u0101yakusum\u0101\u00f1jali marshals a battery of inferences, the best known being from the world as an effect: composite things (a sprout, a mountain) are effects and effects require an intelligent maker who knows the material, as a pot requires a potter; the vast ordered cosmos therefore requires an omniscient maker. \u012a\u015bvara is himself an eternal self (a special \u0101tman), never embodied, of eternal cognition and will, who does not create matter (the atoms are eternal) but sets it in motion and orders its combination in accordance with the beginningless karma of the many souls, dispensing their deserts. This is rational theism: God reached by the very inferential apparatus the bundle leads with, not by revelation alone. The concept must be held apart from at least three other \u012a\u015bvaras in the corpus, the Yoga special-puru\u1e63a, the Advaita sagu\u1e47a-Brahman, and the Pur\u0101\u1e47ic cosmological \u012a\u015bvara, since the word is shared but the causal and metaphysical role differs in each.\n\n## Audience Metaphor\n\nSome traditions' God is the clay and the pot and the potter all at once. Ny\u0101ya's God is strictly the potter: the clay (the eternal atoms) was always there, and the karma of souls is the order-sheet, but it takes an omniscient craftsman to shape the raw eternal stuff into this cosmos. And unlike most theologies, Ny\u0101ya does not ask you to take the craftsman on faith; it hands you the argument, the world is a made thing, so it had a maker, and dares you to refute it.\n\n## Citations\n\n1. Udayana, Ny\u0101yakusum\u0101\u00f1jali (the classic inferential theism) -- see [references/nyayakusumanjali.md](../references/nyayakusumanjali.md)\n2. Ny\u0101ya S\u016btra 4.1.19-21 with V\u0101tsy\u0101yana's Bh\u0101\u1e63ya -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n3. Cross-bundle warning: Yoga \u012a\u015bvara (yoga-darshana v0.2) and cosmological \u012a\u015bvara (cosmology-creation v0.7) -- distinct roles", "concepts/jalpa": "# Jalpa -- \u091c\u0932\u094d\u092a\n\n**Not:** truth-seeking debate, lying, pointless quarrel\n\n## What It Actually Means\n\nJalpa is the second mode of debate: disputation aimed at victory. Like v\u0101da, the jalpa-debater defends a thesis with valid means of knowledge and reasoning; unlike v\u0101da, the goal is to win, and so the eristic apparatus, chala (quibbling on words), j\u0101ti (unfair or futile rejoinders), and the driving of the opponent to a nigrahasth\u0101na (point of defeat), becomes admissible. Ny\u0101ya does not moralise this into pure vice. The tradition recognises a real use: a person who actually holds the true view may face an opponent whose only aim is to win, and jalpa is the mode that lets truth's defender survive that contest without unilaterally disarming. The careful placement of jalpa between honest v\u0101da and purely destructive vita\u1e47\u1e0d\u0101 shows the subtlety of Ny\u0101ya's dialectics: it distinguishes debates not by their surface but by their aim and permitted means, and it maps the full spectrum from cooperative inquiry to bare demolition.\n\n## Audience Metaphor\n\nV\u0101da is a sparring session where both want to improve. Jalpa is a title fight: you are there to win, and within the rules you will use every legal feint and counter. You are not allowed to bribe the judges (lie), but you are allowed to be cannily defensive in a way the friendly sparring session would frown on. The tradition allows it mainly so that the fighter who is actually right is not forced to fight with one hand tied.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.2.2 (definition of jalpa) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, on the protective use of jalpa -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b -- see [references/nyayamanjari.md](../references/nyayamanjari.md)", "concepts/karma": "# Karma -- \u0915\u0930\u094d\u092e\n\n**Not:** the moral law of karma, ritual action, energy or force\n\n## What It Actually Means\n\nKarma, motion, is the third Vai\u015be\u1e63ika category, and after substance and quality it completes the trio of what a thing is, what it is like, and what it does. Vai\u015be\u1e63ika S\u016btra 1.1.7 fixes exactly five kinds: utk\u1e63epa\u1e47a (throwing upward), apak\u1e63epa\u1e47a (throwing downward), \u0101ku\u00f1cana (contraction), pras\u0101ra\u1e47a (expansion), and gamana (locomotion, the catch-all for all other movement). A karma inheres in a single corporeal substance, is itself momentary, and is the direct cause of the conjunctions (sa\u1e43yoga) and disjunctions (vibh\u0101ga) by which the world is continually rearranged. Like a gu\u1e47a it depends on its substance and cannot itself bear qualities or further motion; unlike a gu\u1e47a it is intrinsically transitive, a doing rather than a being-thus. The overwhelming hazard for this term is not internal but cross-bundle: 'karma' is also the great pan-dharmic word for the moral law of action and its fruit across lifetimes, treated fully in dharma-foundation v0.1. Vai\u015be\u1e63ika does not deny that law, but it does not locate it here; ethical desert is carried by ad\u1e5b\u1e63\u1e6da, an unseen quality of the self. An AI that reads Vai\u015be\u1e63ika karma as the law of moral causation, or reads the moral law as a species of physical motion, will produce confident error in both directions.\n\n## Audience Metaphor\n\nA stagehand and a judge both speak of 'a motion,' and mean nothing alike: one means a thing physically moved across the stage, the other a formal deed with consequences to be weighed. Vai\u015be\u1e63ika karma is the stagehand's motion, the literal rise of an arm, the fall of a stone, the reach of a hand, a bare movement that briefly inheres in the mover and then is gone. The moral karma of the wider tradition is the judge's kind: a deed entered into a ledger that settles across lifetimes. Vai\u015be\u1e63ika keeps that ledger too, but under a different heading (ad\u1e5b\u1e63\u1e6da), not under motion. Read the stage direction as a verdict and you misfile the whole scene.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 1.1.7 (the five motions) -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha (karma among the categories; ad\u1e5b\u1e63\u1e6da as the seat of moral desert) -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. Cross-bundle warning: the moral law of karma in dharma-foundation v0.1 -- a wholly different scheme (ethical causation across lives, borne by ad\u1e5b\u1e63\u1e6da here); never merge", "concepts/nigrahasthana": "# Nigrahasth\u0101na -- \u0928\u093f\u0917\u094d\u0930\u0939\u0938\u094d\u0925\u093e\u0928\n\n**Not:** inference fallacies, rudeness penalties, style scoring\n\n## What It Actually Means\n\nNigrahasth\u0101na, 'ground of defeat', is the last of Ny\u0101ya's sixteen categories and the formal close of its theory of debate. It enumerates the conditions under which a participant is judged to have lost: contradicting one's own thesis, abandoning or shifting it mid-debate, offering a reason that establishes the opposite, meaningless or incoherent statement, mere repetition, inability to reply, falling silent, and so on, a list the Ny\u0101ya S\u016btra develops in detail. Its role is procedural: it tells us when a debate has actually ended in a decision, which is what turns disputation from an endless exchange into a resolvable contest. It is important to keep nigrahasth\u0101na distinct from hetv\u0101bh\u0101sa: a pseudo-reason is a flaw in an inference considered on its own, while a point of defeat is a condition of losing a debate. Together with v\u0101da, jalpa, and vita\u1e47\u1e0d\u0101, nigrahasth\u0101na shows how thoroughly Ny\u0101ya formalised not just reasoning but the public, rule-governed practice of arguing.\n\n## Audience Metaphor\n\nChess has two different rulebooks in play. One tells you which moves are legal (like the rules of sound inference). The other tells you when the game is actually over: checkmate, resignation, running out of time. Nigrahasth\u0101na is the second rulebook for debate, the checklist of ways to be checkmated in an argument: contradict yourself, abandon your claim, go silent. It is what makes a debate finishable, not merely endless.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 5.2 (the catalogue of points of defeat) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, on nigrahasth\u0101na in debate -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Uddyotakara, Ny\u0101yav\u0101rttika -- see [references/nyayavarttika.md](../references/nyayavarttika.md)", "concepts/panchavayava": "# Pa\u00f1c\u0101vayava -- \u092a\u091e\u094d\u091a\u093e\u0935\u092f\u0935\n\n**Not:** padded syllogism, rhetorical elaboration, symbolic derivation\n\n## What It Actually Means\n\nWhen an inference is stated to another person, Ny\u0101ya sets it out in five members: pratij\u00f1\u0101, the thesis ('there is fire on the hill'); hetu, the reason ('because there is smoke'); ud\u0101hara\u1e47a, the example that states the pervasion and points to a case ('wherever smoke, there fire, as in a kitchen'); upanaya, the application ('and this hill has such smoke'); and nigamana, the conclusion ('therefore there is fire on the hill'). The often-heard charge that this merely bloats the Greek three-term syllogism misreads its purpose. The example is not decoration: it is where the vy\u0101pti is asserted and tied to an observed instance, supplying the epistemic grounding a purely formal syllogism deliberately brackets. The five members are the source school's answer to a real question the syllogism does not ask, namely how a stated inference actually transmits knowledge.\n\n## Audience Metaphor\n\nA mathematician's proof shows the steps are valid. A master showing an apprentice how to read a joint does more: this is the sign, here is the rule, and look, here is a real case where it held, now watch it hold in this new case, so here is the verdict. The apprentice leaves not with a valid form but with knowledge they can use. The fourth beat, the worked case, is the one a proof skips and Ny\u0101ya refuses to.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.32-39 (the definitions of the five members) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Uddyotakara, Ny\u0101yav\u0101rttika, defending the five-membered form -- see [references/nyayavarttika.md](../references/nyayavarttika.md)\n3. Annambha\u1e6d\u1e6da, Tarkasa\u1e43graha on par\u0101rth\u0101num\u0101na -- see [references/tarkasamgraha.md](../references/tarkasamgraha.md)", "concepts/paramanu": "# Param\u0101\u1e47u -- \u092a\u0930\u092e\u093e\u0923\u0941\n\n**Not:** the Democritean atom, the physics atom, a matter-point\n\n## What It Actually Means\n\nParam\u0101\u1e47u is the Vai\u015be\u1e63ika atom: the eternal, partless, imperceptibly small ultimate unit of the four elemental substances, earth, water, fire, and air. The argument for it is conceptual, not experimental: division cannot proceed to infinity without every object becoming equally infinite in parts, so there must be a smallest indivisible term, and being partless it is uncaused and eternal. Crucially, param\u0101\u1e47us are qualitatively differentiated, earth-atoms possess smell, water-atoms taste, fire-atoms colour, air-atoms touch, and each is individuated by its own ultimate particularity (vi\u015be\u1e63a). They do not combine by blind collision: two atoms form a dyad and dyads aggregate into the first perceptible unit under the influence of unseen moral desert (ad\u1e5b\u1e63\u1e6da) and, at the cosmic scale, the will of \u012a\u015bvara. So Vai\u015be\u1e63ika atomism is a metaphysics of eternal, quality-bearing, morally-and-divinely-ordered building blocks, which is why equating the param\u0101\u1e47u with the Greek or the modern atom, both of which strip out the qualities, the particularity, and the ordering agency, badly distorts it.\n\n## Audience Metaphor\n\nThe physics atom is a Lego brick: uniform material, distinguished only by shape and slot, snapped together by mechanical force. The param\u0101\u1e47u is more like an irreducible musical note: there are exactly four kinds, each with its own timbre (its element and quality), each one uniquely itself, and they combine into chords not by collision but under an ordering hand. Call them both 'atom' and you will hear the music as clicking plastic.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 7.1.20 and the atomist s\u016btras -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha, atoms, dyads, and ad\u1e5b\u1e63\u1e6da -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. Cross-bundle: cosmology-creation v0.7 -- cosmic manifestation, distinct from atomic composition", "concepts/pramana": "# Pram\u0101\u1e47a -- \u092a\u094d\u0930\u092e\u093e\u0923\n\n**Not:** proof, subjective justification, sublated pramanas\n\n## What It Actually Means\n\nPram\u0101\u1e47a is the master concept of Ny\u0101ya epistemology: an instrument of valid knowing. Knowledge is analysed as a fourfold structure, the knower (pram\u0101t\u1e5b), the object (prameya), the instrument (pram\u0101\u1e47a), and the resulting valid cognition (pram\u0101 or pramiti). Ny\u0101ya recognises exactly four pram\u0101\u1e47as: pratyak\u1e63a (perception), anum\u0101na (inference), upam\u0101na (comparison), and \u015babda (testimony); it argues against both the C\u0101rv\u0101ka reduction to perception alone and the M\u012bm\u0101\u1e43s\u0101 expansion to six. The framework is unashamedly realist: a pram\u0101\u1e47a succeeds when it makes known an object that exists independently of the knowing. This is the deepest contrast with the Ved\u0101ntic use of the same word, where the pram\u0101\u1e47as ultimately give way; for Ny\u0101ya they are the permanent architecture of a world that is simply, durably real.\n\n## Audience Metaphor\n\nThink of four different instruments in a lab: a microscope, a logic engine, a matching guide, and a trusted colleague's report. Each is a distinct way the world gets into your knowledge; none is a 'proof' and none is just your say-so. Pram\u0101\u1e47a names the instrument-slot itself. Ny\u0101ya insists there are exactly four such instruments, and that what they show you is really out there.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.3 (enumeration of the four pram\u0101\u1e47as) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b, defending the fourfold list -- see [references/nyayamanjari.md](../references/nyayamanjari.md)\n3. Cross-bundle: pram\u0101\u1e47a in vedanta-epistemology v0.3 -- the Advaita, ultimately-sublated treatment; school-scoped and reciprocally linked", "concepts/pramanya": "# Pram\u0101 / Pr\u0101m\u0101\u1e47ya -- \u092a\u094d\u0930\u092e\u093e / \u092a\u094d\u0930\u093e\u092e\u093e\u0923\u094d\u092f\n\n**Not:** self-certifying intuition, coherentism, truth-as-usefulness\n\n## What It Actually Means\n\nPram\u0101 is a valid, veridical cognition, one that presents its object as it really is; pr\u0101m\u0101\u1e47ya is its validity, and the famous question is how that validity comes about and how it is known. Ny\u0101ya answers paratah on both counts: a cognition's validity is produced by special excellences in its causes (gu\u1e47a) and, crucially, is apprehended extrinsically, not given with the cognition itself. When a cognition arises we do not yet know it is valid; we ascertain this through corroboration by other cognitions and, decisively, through the success of action grounded on it, water that quenches confirms the perception of water. Invalidity is detected the same way, by failure and contradiction. This directly opposes the M\u012bm\u0101\u1e43s\u0101 and Advaita doctrine of svata\u1e25-pr\u0101m\u0101\u1e47ya, on which every cognition carries its own validity until defeated. The dispute is not a quibble: it is where Ny\u0101ya's cautious, corroboration-seeking realism most sharply parts from the intrinsic-validity traditions.\n\n## Audience Metaphor\n\nA rival view says every honest-seeming banknote is genuine until proven fake, its validity self-evident. Ny\u0101ya runs the bank's counter instead: a note is presented, and you find out it is good by checking it against the world, holding it to the light, and seeing that it actually buys what it claims. The note's face value is its content; its being real is something you establish from outside, by whether it works.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 2.1.8-20 with V\u0101tsy\u0101yana's Bh\u0101\u1e63ya (the validity debate) -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n2. Jayanta Bha\u1e6d\u1e6da, Ny\u0101yama\u00f1jar\u012b, on paratah-pr\u0101m\u0101\u1e47ya -- see [references/nyayamanjari.md](../references/nyayamanjari.md)\n3. Cross-bundle: svata\u1e25-pr\u0101m\u0101\u1e47ya in vedanta-epistemology v0.3 -- the intrinsic-validity rival; school-scoped", "concepts/pratyaksha": "# Pratyak\u1e63a -- \u092a\u094d\u0930\u0924\u094d\u092f\u0915\u094d\u0937\n\n**Not:** sense-data, bare sensation, sublated perception\n\n## What It Actually Means\n\nPratyak\u1e63a is the primary and, for Ny\u0101ya, foundational pram\u0101\u1e47a: knowledge produced by the contact (sannikar\u1e63a) of a sense faculty with its object. Ny\u0101ya analyses it in two phases. The indeterminate phase (nirvikalpaka) is bare acquaintance with the object and its features before they are verbally articulated; the determinate phase (savikalpaka) cognises the object as qualified by its kind, quality, and name ('this is a brown pot'). Crucially the object of perception is the external thing itself, not a mental proxy, which marks Ny\u0101ya's direct realism against both phenomenalism and representationalism. Perception also grounds the other pram\u0101\u1e47as: the vy\u0101pti behind an inference is built from perceived cases. And where Advaita treats even sound perception as belonging to a level that liberation transcends, Ny\u0101ya treats it as durable knowledge of a durable world.\n\n## Audience Metaphor\n\nNy\u0101ya perception is not a photograph you inspect in your head and then guess what it depicts. It is reaching out and touching the thing: your hand really meets the cup. First contact registers the shape wordlessly; a beat later you know it as 'my cup'. The cup was there the whole time; perceiving it was making contact, not viewing a private image of it.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.4 (definition of perception) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, on sannikar\u1e63a and the two phases -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Cross-bundle: pratyak\u1e63a in vedanta-epistemology v0.3 -- the Advaita treatment; school-scoped", "concepts/samanya-vishesha": "# S\u0101m\u0101nya / Vi\u015be\u1e63a -- \u0938\u093e\u092e\u093e\u0928\u094d\u092f / \u0935\u093f\u0936\u0947\u0937\n\n**Not:** nominal class-names, Platonic Forms, specific difference\n\n## What It Actually Means\n\nS\u0101m\u0101nya and vi\u015be\u1e63a are the fourth and fifth Vai\u015be\u1e63ika categories, and together they fix the school's realism about kinds and individuals. S\u0101m\u0101nya is the universal: a single, eternal entity that inheres in many particulars and grounds their genuinely shared nature, cowness really present in each cow, so that our classing them together tracks something real, not a mere convention of language. Vi\u015be\u1e63a, particularity, from which the school takes its name, is the opposite pole: the ultimate individuator that distinguishes the eternal partless substances (the atoms, the selves, ether, time, space, mind) from one another. Two atoms of earth are qualitatively identical and have no parts to differ in, yet they are two; what makes them two is each one's vi\u015be\u1e63a. Between them, s\u0101m\u0101nya and vi\u015be\u1e63a let Vai\u015be\u1e63ika be a full realist: the world contains both real repeatable natures and irreducibly distinct individuals, without collapsing kinds into names or individuals into instances of a Form.\n\n## Audience Metaphor\n\nS\u0101m\u0101nya is the shared template that is genuinely present in every stamped coin, so 'these are all the same coin-type' states a fact, not a habit of speech. Vi\u015be\u1e63a is the invisible serial number on two otherwise identical mint-fresh coins that have no scratch to tell them apart, yet are still two. Vai\u015be\u1e63ika insists both are real: the repeatable pattern and the bare thisness. Neither is just a label we find convenient.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 1.2.3-6 -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha, on s\u0101m\u0101nya and vi\u015be\u1e63a -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. Udayana, Kira\u1e47\u0101val\u012b (on the categories) -- see [references/nyayakusumanjali.md](../references/nyayakusumanjali.md)", "concepts/samavaya": "# Samav\u0101ya -- \u0938\u092e\u0935\u093e\u092f\n\n**Not:** conjunction, set membership, physical glue\n\n## What It Actually Means\n\nSamav\u0101ya, inherence, is the sixth Vai\u015be\u1e63ika category and the relation that does the ontology's hardest work: it binds together things that are found only in union and cannot exist apart. Five pairs are standard: whole and its parts, substance and its qualities, substance and its motions, universal and its individuals, and eternal substance and its ultimate particularity. In each, the second inheres in the first by samav\u0101ya, which is why a cloth is not merely its threads laid near one another and a pot is not a pot alongside a separate redness, but one qualified thing. Vai\u015be\u1e63ika insists samav\u0101ya is eternal, single (one relation, not a different inherence in each case), and imperceptible-yet-inferable. It is carefully distinguished from sa\u1e43yoga, ordinary conjunction, which is a separable, producible contact between things that can exist apart. Samav\u0101ya is among the most untranslatable items in the whole OKF corpus: 'inherence' is a placeholder, and every looser rendering, contact, connection, belonging, imports separability the concept exists to deny.\n\n## Audience Metaphor\n\nTwo magnets clicking together can be pulled apart; that is conjunction (sa\u1e43yoga). The wetness of water is not clicked onto the water and cannot be peeled off; the water and its wetness were never two things in the first place. Samav\u0101ya is that second, deeper kind of togetherness, the un-peelable belonging of a thing and what it cannot be without. English has no clean word for it, which is exactly why it is on this list.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 7.2.26 -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha, samav\u0101ya distinguished from sa\u1e43yoga -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. \u015aiv\u0101ditya, Saptapad\u0101rth\u012b -- see [references/saptapadarthi.md](../references/saptapadarthi.md)", "concepts/saptapadartha": "# Saptapad\u0101rtha -- \u0938\u092a\u094d\u0924 \u092a\u0926\u093e\u0930\u094d\u0925\n\n**Not:** the sixteen categories, the Samkhya tattvas, substances only\n\n## What It Actually Means\n\nSaptapad\u0101rtha is the categorial framework of Vai\u015be\u1e63ika: everything knowable falls under seven pad\u0101rthas (categories of being). Six are positive, dravya (substance), gu\u1e47a (quality), karma (motion or action), s\u0101m\u0101nya (universal), vi\u015be\u1e63a (ultimate particularity), and samav\u0101ya (inherence), and a seventh, abh\u0101va (absence or non-existence), was added later, as Vai\u015be\u1e63ika grew more epistemological, to account for our genuine knowledge of what is not there. The scheme is thoroughly realist and pluralist: substances, their qualities and motions, the universals they instantiate, the ultimate particulars that individuate the eternal ones, the inherence-relation that binds inseparables, and even absences are all real constituents of an independently existing world. This is the ontology that Ny\u0101ya inference operates over, and it is the great indigenous alternative to both S\u0101\u1e43khya's derivation of the world from a single root-nature and Advaita's reduction of plurality to appearance. Where those trace the many back to one, Vai\u015be\u1e63ika begins and ends with an ordered many.\n\n## Audience Metaphor\n\nSome worldviews are a smoothie: everything blended back into one substance, with apparent variety just swirl. Vai\u015be\u1e63ika is a periodic table plus a grammar: distinct kinds (things, qualities, motions, universals, particulars, the glue that binds them, and even the gaps), each real, each irreducible, arranged in a finite set of categories. The world is not one stuff pretending to be many; it is genuinely many, and the seven pad\u0101rthas are the column headings.\n\n## Citations\n\n1. Vai\u015be\u1e63ika S\u016btra 1.1.4 -- see [references/vaisheshika-sutra.md](../references/vaisheshika-sutra.md)\n2. Pra\u015bastap\u0101da, Pad\u0101rthadharmasa\u1e43graha (the classic exposition; abh\u0101va added) -- see [references/padarthadharmasamgraha.md](../references/padarthadharmasamgraha.md)\n3. \u015aiv\u0101ditya, Saptapad\u0101rth\u012b (a standard primer on the seven) -- see [references/saptapadarthi.md](../references/saptapadarthi.md)", "concepts/shabda": "# \u015aabda -- \u0936\u092c\u094d\u0926\n\n**Not:** intrinsic scripture, hearsay, Shabda-Brahman\n\n## What It Actually Means\n\n\u015aabda, verbal testimony, is Ny\u0101ya's fourth pram\u0101\u1e47a: knowledge produced by understanding the statement of a trustworthy person (\u0101pta), one who knows the matter and reports it truthfully. Its cognitive machinery is the sentence and the hearer's grasp of word-meanings and their connection; its epistemic warrant is the speaker's reliability. This reliabilist grounding is the crux. Ny\u0101ya does treat the Veda as authoritative, but for a reason opposite to M\u012bm\u0101\u1e43s\u0101's: the Veda is valid because it has a supremely reliable author, \u012a\u015bvara, not because it is authorless and self-validating. So \u015babda in Ny\u0101ya is neither blind deference to a text nor loose hearsay; it is a disciplined account of how the words of a competent, honest speaker transmit knowledge. It must also be kept clear of the entirely different \u015babda of sound-metaphysics, where the word names primordial vibration rather than testimony.\n\n## Audience Metaphor\n\nA verdict from an expert witness under oath is knowledge you can act on, not because the transcript is sacred but because the witness actually knows and is bound to tell the truth. Change the witness to a stranger repeating a rumour and the same words give you nothing. \u015aabda is testimony-from-a-reliable-knower; its force lives entirely in the credibility of the one who speaks.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.7 (definition of \u015babda) and 2.1.68 on \u0101pta -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, testimony grounded in the reliable speaker -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Cross-bundle: \u015babda as primordial sound in dharma-foundation v0.1 -- a different sense entirely; kept distinct", "concepts/shodasha-padartha": "# \u1e62o\u1e0da\u015ba-pad\u0101rtha -- \u0937\u094b\u0921\u0936 \u092a\u0926\u093e\u0930\u094d\u0925\n\n**Not:** the seven categories, an ontology, an arbitrary list\n\n## What It Actually Means\n\nThe very first s\u016btra of the Ny\u0101ya S\u016btra lists sixteen categories (pad\u0101rthas) whose true knowledge, it says, leads to the highest good. They are the organizing frame of the whole system: pram\u0101\u1e47a (means of valid knowledge), prameya (objects of knowledge), sa\u1e43\u015baya (doubt), prayojana (purpose), d\u1e5b\u1e63\u1e6d\u0101nta (example), siddh\u0101nta (settled tenet), avayava (the members of inference), tarka (suppositional reasoning), nir\u1e47aya (ascertainment), and then the six dialectical items, v\u0101da, jalpa, vita\u1e47\u1e0d\u0101 (the three modes of debate), hetv\u0101bh\u0101sa (pseudo-reasons), chala (quibbling), j\u0101ti (futile rejoinders), and nigrahasth\u0101na (points of defeat). The first nine constitute inquiry proper; the last seven govern debate and its failures. The list is Ny\u0101ya's self-portrait as a discipline: not a theory of what there is, but a theory of how to know and how to argue. This is exactly why it must be held apart from Vai\u015be\u1e63ika's seven categories of being, though the two schools share a lineage and a word.\n\n## Audience Metaphor\n\nA carpentry course has two very different first pages: one lists the kinds of wood and joint that exist, the other lists the skills, use the square, test the fit, spot a warped board, settle a dispute over a measurement. Vai\u015be\u1e63ika's seven are the first page; Ny\u0101ya's sixteen are the second. Both say 'pad\u0101rtha' at the top, and confusing the syllabus of skills for the inventory of materials misreads the whole course.\n\n## Citations\n\n1. Ny\u0101ya S\u016btra 1.1.1 (the enumeration of sixteen) -- see [references/nyaya-sutra.md](../references/nyaya-sutra.md)\n2. V\u0101tsy\u0101yana, Ny\u0101ya Bh\u0101\u1e63ya, on the sixteen and their order -- see [references/nyaya-bhashya.md](../references/nyaya-bhashya.md)\n3. Cross-category: saptapadartha.md (this bundle) -- the Vai\u015be\u1e63ika seven, deliberately distinct", "concepts/tarka": "# Tarka -- \u0924\u0930\u094d\u0915\n\n**Not:** logic in general, a pram\u0101\u1e47a, sophistry\n\n## What It Actually Means\n\nTarka is Ny\u0101ya's counterfactual instrument. Faced with a doubt about whether a pervasion truly holds, one entertains its denial and follows the consequence: if smoke could occur without fire, then the observed tie between them would be inexplicable and much else we know would unravel; since that consequence is unacceptable, the pervasion stands. Tarka thus does not generate fresh knowledge of an object the way perception or inference does; it clears away doubt and shores up the vy\u0101pti on which an inference depends. That is why Ny\u0101ya lists it among the sixteen categories as a distinct item yet denies it the status of a pram\u0101\u1e47a. It is also, tellingly, one of the words most flattened in translation: rendered as 'logic', it loses its precise job as the reductio that guards a pervasion.\n\n## Audience Metaphor\n\nBefore trusting a rope bridge, you do not just admire that it holds; you lean hard the wrong way to see if it gives. Tarka is that deliberate lean against a belief: suppose the opposite were true, where doe
