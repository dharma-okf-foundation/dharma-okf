<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "cosmology-creation";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/avatara", "label": "Avat\u0101ra \u2014 \u0905\u0935\u0924\u093e\u0930", "type": "Concept", "description": "The intentional descent of the divine into the manifest world for a specific cosmic purpose; primarily Vi\u1e63\u1e47u's self-projection into conditioned existence to restore dharma within the Sthiti (maintenance) function; NOT reincarnation; NOT the same as a j\u012bva taking rebirth; the descent is of the infinite into the finite, not the finite migrating between finite forms.", "resource": "", "tags": ["cosmology", "avatara", "vishnu", "incarnation", "sthiti", "dharma", "vaishnava", "puranic"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/avyakta", "label": "Avyakta \u2014 \u0905\u0935\u094d\u092f\u0915\u094d\u0924", "type": "Concept", "description": "The Unmanifest: the undifferentiated total potential of the manifest cosmos, prior to the emergence of Hira\u1e47yagarbha; the state of the cosmos during Pralaya when all manifest content has been reabsorbed; in S\u0101\u1e43khya, Avyakta = Prak\u1e5bti in its primordial undifferentiated state (also called Pradh\u0101na / M\u016blaprak\u1e5bti); in Ved\u0101nta, Avyakta is Brahman's creative power (M\u0101y\u0101-\u015aakti) in its dormant phase -- NOT the same as Brahman itself.", "resource": "", "tags": ["cosmology", "avyakta", "prakriti", "maya", "srishti", "pralaya", "samkhya", "vedanta", "puranic"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/brahma-the-creator", "label": "Brahm\u0101 (The Creator) \u2014 \u092c\u094d\u0930\u0939\u094d\u092e\u093e", "type": "Concept", "description": "The four-faced cosmic agent of S\u1e5b\u1e63\u1e6di (emanation); the secondary creator who differentiates and populates the cosmos within each Kalpa; himself born at the beginning of each Kalpa from Hira\u1e47yagarbha / Vi\u1e63\u1e47u's navel; he will dissolve at Mah\u0101 Pralaya; CRITICALLY NOT Brahman (the unconditioned absolute) -- the most dangerous transliteration conflation in all of Dharmic AI output.", "resource": "", "tags": ["cosmology", "brahma", "creator", "trimurti", "srishti", "hiranyagarbha", "brahman-conflation", "puranic"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/brahmanda", "label": "Brahm\u0101\u1e47\u1e0da \u2014 \u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0923\u094d\u0921", "type": "Concept", "description": "The 'egg of Brahm\u0101': the cosmic shell or container of the manifest universe, comprising all 14 Lokas arranged vertically within a single cosmic unit; the structured physical-cosmological space within which a Kalpa's life unfolds; multiple Brahm\u0101\u1e47\u1e0das exist simultaneously (Pur\u0101\u1e47ic accounts vary on this); NOT the same as the universe in the modern astrophysical sense.", "resource": "", "tags": ["cosmology", "brahmanda", "cosmic-egg", "sapta-loka", "loka", "puranic"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/hiranyagarbha", "label": "Hira\u1e47yagarbha \u2014 \u0939\u093f\u0930\u0923\u094d\u092f\u0917\u0930\u094d\u092d", "type": "Concept", "description": "The 'golden womb' or 'golden embryo': the first manifestation from the unmanifest Avyakta; the subtle-cosmic body of the universe; the totality of all subtle existences before gross differentiation; the \u1e5ag Vedic cosmic principle named in RV 10.121; equated with Brahm\u0101-as-cosmic-egg in Pur\u0101\u1e47ic accounts and with S\u016btr\u0101tman (the thread-\u0101tman) in Ved\u0101ntic analysis.", "resource": "", "tags": ["cosmology", "hiranyagarbha", "cosmic-egg", "brahma", "avyakta", "srishti", "vedic", "puranic"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/iccha-jnana-kriya-shakti", "label": "Icch\u0101-J\u00f1\u0101na-Kriy\u0101 \u015aakti \u2014 \u0907\u091a\u094d\u091b\u093e-\u091c\u094d\u091e\u093e\u0928-\u0915\u094d\u0930\u093f\u092f\u093e \u0936\u0915\u094d\u0924\u093f", "type": "Concept", "description": "The triad of \u015aiva's (or Brahman's) three primary \u015aaktis: Icch\u0101-\u015aakti (will-power / the impulse to create), J\u00f1\u0101na-\u015aakti (knowledge-power / the omniscient awareness that knows what to create and how), and Kriy\u0101-\u015aakti (action-power / the executive force that actualizes creation); together they constitute the complete internal cosmological mechanism by which the absolute moves from unmanifest potential to manifest cosmos; the triad is treated in full in Kashmir Shaivism and \u015aaiva Siddh\u0101nta but is recognizable across Vai\u1e63\u1e47ava and Ved\u0101ntic frameworks as well.", "resource": "", "tags": ["cosmology", "shakti", "iccha", "jnana", "kriya", "kashmir-shaivism", "shaiva", "tantra", "srishti", "panchakritya"], "color": "#f59e0b", "size": 58}}, {"data": {"id": "concepts/ishvara-cosmological", "label": "\u012a\u015bvara (Cosmological) \u2014 \u0908\u0936\u094d\u0935\u0930", "type": "Concept", "description": "The lord or ruler: Brahman as the intelligent cosmic controller operating through M\u0101y\u0101; the personal aspect of the absolute that generates, maintains, and dissolves the cosmos; the bridge between the impersonal Brahman (Nirgu\u1e47a) and the personal cosmic ruler (Sagu\u1e47a); NOT the same as the Abrahamic God; treated here in its cosmological dimension (as cosmic controller of S\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra) rather than in its soteriological dimension (as the object of bhakti).", "resource": "", "tags": ["cosmology", "ishvara", "brahman", "maya", "srishti", "sthiti", "samhara", "vedanta", "puranic"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/kala", "label": "K\u0101la \u2014 \u0915\u093e\u0932", "type": "Concept", "description": "Cosmic time as a primordial principle and deity; not linear clock-time but the cyclic, all-consuming force that governs manifestation, measures Yugas and Kalpas, and is identical with Mah\u0101k\u0101la (\u015aiva as the great destroyer); time that devours all things while being itself uncaused.", "resource": "", "tags": ["cosmology", "time", "kala", "yuga", "mahakala", "puranic", "vedic"], "color": "#f59e0b", "size": 46}}, {"data": {"id": "concepts/kalpa", "label": "Kalpa \u2014 \u0915\u0932\u094d\u092a", "type": "Concept", "description": "The cosmological day of Brahm\u0101, equal to 1000 Mah\u0101yugas (4,320,000,000 human years); the largest regularly recurring unit of cosmic time, at the end of which a Naimittika Pralaya dissolves the three lower worlds; distinguished from Kalpa as Ved\u0101\u1e45ga (ritual procedure texts).", "resource": "", "tags": ["cosmology", "time", "kalpa", "brahma", "pralaya", "puranic"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/lila-cosmological", "label": "L\u012bl\u0101 (Cosmological) \u2014 \u0932\u0940\u0932\u093e", "type": "Concept", "description": "The cosmic play or sport: at the cosmological level, L\u012bl\u0101 is the answer to the question 'why does Brahman create at all?' -- the cosmos arises not from necessity, compulsion, deficiency, or purpose external to Brahman, but as the free, spontaneous, joyful self-expression of infinite consciousness; at this level L\u012bl\u0101 grounds all of existence as intrinsically purposeless yet intrinsically meaningful; the relational and devotional dimension of L\u012bl\u0101 (K\u1e5b\u1e63\u1e47a's V\u1e5bnd\u0101vana play) is treated in bhakti-marga v0.5.", "resource": "", "tags": ["cosmology", "lila", "brahman", "srishti", "ananda", "vedanta", "vaishava", "bhakti", "play", "creation"], "color": "#f59e0b", "size": 55}}, {"data": {"id": "concepts/mahayuga", "label": "Mah\u0101yuga / Caturyuga \u2014 \u092e\u0939\u093e\u092f\u0941\u0917 / \u091a\u0924\u0941\u0930\u094d\u092f\u0941\u0917", "type": "Concept", "description": "The complete four-Yuga cycle (Satya + Tret\u0101 + Dv\u0101para + Kali = 4,320,000 human years) constituting the fundamental unit of cosmic time from which all larger Pur\u0101\u1e47ic time-scales are built; also called Caturyuga ('four-Yuga cycle') or Divya-Yuga; 1000 Mah\u0101yugas = one Kalpa (day of Brahm\u0101).", "resource": "", "tags": ["cosmology", "time", "mahayuga", "caturyuga", "kalpa", "yuga", "puranic"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/manvantara", "label": "Manvantara \u2014 \u092e\u0928\u094d\u0935\u0928\u094d\u0924\u0930", "type": "Concept", "description": "The cosmic epoch of a Manu (progenitor-archetype), comprising 71 Mah\u0101yugas (~306.7 million years); 14 Manvantaras constitute one Kalpa; each has its own Manu, Indra, saptar\u1e63is, and Vi\u1e63\u1e47u-Avat\u0101ra; the current epoch is the 7th Manvantara (Vaivasvata), whose Manu is the source of the present human lineage.", "resource": "", "tags": ["cosmology", "time", "manvantara", "manu", "kalpa", "puranic"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/maya-cosmological", "label": "M\u0101y\u0101 (Cosmological) \u2014 \u092e\u093e\u092f\u093e", "type": "Concept", "description": "The cosmic creative power of Brahman by which the unmanifest absolute appears as the differentiated manifest cosmos; Mah\u0101m\u0101y\u0101 operating at the level of Brahman's own nature; distinct from M\u0101y\u0101 as individual veil (avidy\u0101), which operates at the level of the individual j\u012bva's ignorance; v0.7 treats the cosmological M\u0101y\u0101 (Mah\u0101m\u0101y\u0101); upanishadic-core v0.5 treats the individual M\u0101y\u0101/avidy\u0101 dimension.", "resource": "", "tags": ["cosmology", "maya", "mahAmaya", "shakti", "brahman", "avyakta", "advaita", "shakta", "puranic"], "color": "#f59e0b", "size": 54}}, {"data": {"id": "concepts/nasadiya-sukta", "label": "N\u0101sad\u012bya S\u016bkta \u2014 \u0928\u093e\u0938\u0926\u0940\u092f \u0938\u0942\u0915\u094d\u0924", "type": "Concept", "description": "The Hymn of Non-Existence / Hymn of Creation (\u1e5ag Veda 10.129): the most philosophically radical of the Vedic cosmogonic hymns; it suspends all categorical answers about the origin of the cosmos and questions whether even the gods know how it arose; its final verse poses the possibility that even the one who oversees the cosmos from above 'may not know' -- making it a canonical ancient example of intellectual humility about first causes.", "resource": "", "tags": ["vedic", "nasadiya", "cosmogony", "rig-veda", "philosophical-inquiry", "non-dual", "avyakta"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/panchamahabhuta-cosmological", "label": "Pa\u00f1camah\u0101bh\u016bta (Cosmological) \u2014 \u092a\u091e\u094d\u091a\u092e\u0939\u093e\u092d\u0942\u0924", "type": "Concept", "description": "The five great elements (\u0100k\u0101\u015ba/space, V\u0101yu/air, Tejas/fire, Ap/water, P\u1e5bthiv\u012b/earth) in their cosmological dimension: as the terminal products of the S\u0101\u1e43khya tattva sequence, arising from the five subtle elements (tanm\u0101tras) through the process of Pa\u00f1c\u012bkara\u1e47a (fivefold combination); they constitute all gross physical matter and generate the five sense capacities; v0.7 treats the full derivation sequence; dharma-foundation bundle gives a brief introduction only.", "resource": "", "tags": ["cosmology", "panchamahabhuta", "elements", "akasha", "vayu", "agni", "ap", "prithvi", "samkhya", "vedanta", "puranic"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/pralaya", "label": "Pralaya \u2014 \u092a\u094d\u0930\u0932\u092f", "type": "Concept", "description": "Cosmic dissolution: the state of non-manifestation that follows Sa\u1e43h\u0101ra; four types at different scales (Nitya, Naimittika, Mah\u0101, \u0100tyantika); NOT universal annihilation -- the causal seeds of beings persist through all but the final type; the most critically misrepresented concept in Pur\u0101\u1e47ic cosmology because all four types are routinely collapsed into one.", "resource": "", "tags": ["cosmology", "pralaya", "dissolution", "kalpa", "yuga", "moksha", "puranic"], "color": "#f59e0b", "size": 56}}, {"data": {"id": "concepts/purusha-sukta", "label": "Puru\u1e63a S\u016bkta \u2014 \u092a\u0941\u0930\u0941\u0937 \u0938\u0942\u0915\u094d\u0924", "type": "Concept", "description": "The Hymn of the Cosmic Person (\u1e5ag Veda 10.90): the foundational Vedic cosmogonic text describing the primordial Puru\u1e63a (Cosmic Person) whose sacrificial dismemberment generates the cosmos; establishes the macrocosm-microcosm identity; presents the var\u1e47a schema as cosmic in origin; one of the most widely cited and most frequently misread texts in Vedic literature.", "resource": "", "tags": ["vedic", "purusha-sukta", "cosmogony", "varna", "sacrifice", "macrocosm-microcosm", "rig-veda"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/samhara", "label": "Sa\u1e43h\u0101ra / Laya \u2014 \u0938\u0902\u0939\u093e\u0930 / \u0932\u092f", "type": "Concept", "description": "Cosmic withdrawal or reabsorption: the drawing-back of the manifest cosmos into its unmanifest source at the end of a cosmic cycle; \u015aiva's function in the Trim\u016brti schema; NOT destruction or annihilation \u2014 nothing is lost, everything is reabsorbed; distinguished from Pralaya, which is the resulting state after Sa\u1e43h\u0101ra.", "resource": "", "tags": ["cosmology", "samhara", "laya", "shiva", "pralaya", "trimurti", "puranic", "shaiva"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/sapta-loka", "label": "Sapta-Loka / Chaturda\u015ba-Loka \u2014 \u0938\u092a\u094d\u0924-\u0932\u094b\u0915 / \u091a\u0924\u0941\u0930\u094d\u0926\u0936-\u0932\u094b\u0915", "type": "Concept", "description": "The seven upper realms (or the full fourteen-realm system of Chaturda\u015ba-Loka) constituting the Pur\u0101\u1e47ic cosmological map of the Brahm\u0101\u1e47\u1e0da; NOT a literal physical geography but a map of states of existence organized by consciousness-quality, dharmic state, and karmic position; Bh\u016br (earth) is the third realm, not the lowest -- the seven lower realms (P\u0101t\u0101la) exist below it.", "resource": "", "tags": ["cosmology", "sapta-loka", "loka", "brahmaloka", "svarga", "patala", "brahmanda", "puranic"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/shakti-cosmological", "label": "\u015aakti (Cosmological) \u2014 \u0936\u0915\u094d\u0924\u093f", "type": "Concept", "description": "The cosmic power or creative energy of the divine: at the cosmological level, \u015aakti is the dynamic principle by which the unchanging absolute (Brahman / \u015aiva) manifests as the dynamic cosmos; in \u015a\u0101kta tradition, \u015aakti IS the supreme reality; in Vai\u1e63\u1e47ava tradition, \u015aakti = Lak\u1e63m\u012b or Yogam\u0101y\u0101 as Vi\u1e63\u1e47u's power; in Kashmir Shaivism, \u015aiva-\u015aakti as consciousness-power are inseparable; treated here in its cosmological dimension (as the power of manifestation); the triad of \u015aakti's cosmological modes -- Icch\u0101, J\u00f1\u0101na, Kriy\u0101 -- is treated separately in iccha-jnana-kriya-shakti.md.", "resource": "", "tags": ["cosmology", "shakti", "devi", "shiva-shakti", "yogamaya", "srishti", "shakta", "shaiva", "tantric", "puranic"], "color": "#f59e0b", "size": 51}}, {"data": {"id": "concepts/srishti", "label": "S\u1e5b\u1e63\u1e6di \u2014 \u0938\u0943\u0937\u094d\u091f\u093f", "type": "Concept", "description": "Cosmic emanation: the projection of the manifest cosmos from Brahman/Avyakta; NOT creation ex nihilo (from nothing) but the drawing-out (s\u1e5bj = to emit, project, release) of what was already present in unmanifest form; one of the three eternal cosmic functions alongside Sthiti (maintenance) and Sa\u1e43h\u0101ra (dissolution).", "resource": "", "tags": ["cosmology", "creation", "srishti", "brahma", "hiranyagarbha", "virat", "puranic"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/sthiti", "label": "Sthiti \u2014 \u0938\u094d\u0925\u093f\u0924\u093f", "type": "Concept", "description": "Cosmic maintenance: the active sustaining of the manifest cosmos during a Kalpa; Vi\u1e63\u1e47u's primary function in the Trim\u016brti schema; not passive conservation but the continuous upholding of the conditions for dharma and liberation to operate; the middle term of the S\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra triad.", "resource": "", "tags": ["cosmology", "sthiti", "vishnu", "trimurti", "dharma", "avatara", "puranic"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/trigunas-cosmological", "label": "Trigu\u1e47as (Cosmological) \u2014 \u0924\u094d\u0930\u093f\u0917\u0941\u0923", "type": "Concept", "description": "The three fundamental strands (gu\u1e47as: Sattva / Rajas / Tamas) of Prak\u1e5bti treated in their cosmological dimension: as the constitutive qualities of manifest existence from Avyakta through all 23 tattvas; as the principle by which the Trim\u016brti's three cosmic functions are distributed; as the organizing force of the Yuga cycle (Satya-Yuga being Sattva-dominant, Kali-Yuga being Tamas-increasing); v0.7 treats the cosmological dimension; the yoga-darshana bundle (v0.4) treats the epistemological/psychological dimension.", "resource": "", "tags": ["cosmology", "trigunas", "sattva", "rajas", "tamas", "samkhya", "trimurti", "yuga", "puranic"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/trimurti", "label": "Trim\u016brti \u2014 \u0924\u094d\u0930\u093f\u092e\u0942\u0930\u094d\u0924\u093f", "type": "Concept", "description": "The triple-form of the supreme cosmic principle manifesting as three functional agents: Brahm\u0101 (S\u1e5b\u1e63\u1e6di / creation), Vi\u1e63\u1e47u (Sthiti / maintenance), \u015aiva (Sa\u1e43h\u0101ra / withdrawal); a functional schema for the cosmic cycle, not a pantheon of three rival gods; often misread as equivalent to the Christian Trinity or as three separate 'gods.'", "resource": "", "tags": ["cosmology", "trimurti", "brahma", "vishnu", "shiva", "srishti", "sthiti", "samhara", "puranic"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/virat", "label": "Vir\u0101\u1e6d \u2014 \u0935\u093f\u0930\u093e\u091f\u094d", "type": "Concept", "description": "The 'vast' or 'expanded' cosmic form: the gross-cosmic totality that emerges from Hira\u1e47yagarbha; the universe considered as one differentiated, embodied whole; the cosmic-waking-state consciousness (Vai\u015bv\u0101nara at the macro level); the stage of S\u1e5b\u1e63\u1e6di at which the universe becomes the grossly differentiated field within which Brahm\u0101 operates; described in its most famous form in the Puru\u1e63a S\u016bkta and the Vi\u015bvar\u016bpa of BG 11.", "resource": "", "tags": ["cosmology", "virat", "purusha-sukta", "vaishvanara", "gross-cosmic", "srishti", "vedic", "puranic"], "color": "#f59e0b", "size": 48}}, {"data": {"id": "concepts/yuga", "label": "Yuga \u2014 \u092f\u0941\u0917", "type": "Concept", "description": "One of four cosmic ages (Satya/K\u1e5bta, Tret\u0101, Dv\u0101para, Kali) constituting the Caturyuga cycle; each Yuga has a defined duration, a characteristic quality of dharma (measured in p\u0101das/legs), and a prescribed spiritual practice; the present Kali Yuga began at K\u1e5b\u1e63\u1e47a's departure (~3102 BCE per traditional reckoning).", "resource": "", "tags": ["cosmology", "yuga", "time", "kali-yuga", "satya-yuga", "dharma", "puranic"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "references/bhagavata-purana", "label": "Bh\u0101gavata Pur\u0101\u1e47a", "type": "Reference", "description": "", "resource": "", "tags": ["purana", "bhagavata", "vaishnava", "cosmology", "kala", "yuga", "pralaya", "avatara", "vishnu"], "color": "#10b981", "size": 43}}, {"data": {"id": "references/brahma-purana", "label": "Brahma Pur\u0101\u1e47a", "type": "Reference", "description": "", "resource": "", "tags": ["purana", "brahma", "cosmology", "creation", "brahmanda", "tirtha"], "color": "#10b981", "size": 39}}, {"data": {"id": "references/brahmasutras", "label": "Brahma S "concepts/panchamahabhuta-cosmological", "target": "concepts/brahmanda"}}, {"data": {"id": "concepts/panchamahabhuta-cosmological__concepts/sapta-loka", "source": "concepts/panchamahabhuta-cosmological", "target": "concepts/sapta-loka"}}, {"data": {"id": "concepts/pralaya__concepts/samhara", "source": "concepts/pralaya", "target": "concepts/samhara"}}, {"data": {"id": "concepts/pralaya__concepts/srishti", "source": "concepts/pralaya", "target": "concepts/srishti"}}, {"data": {"id": "concepts/pralaya__concepts/kalpa", "source": "concepts/pralaya", "target": "concepts/kalpa"}}, {"data": {"id": "concepts/pralaya__concepts/kala", "source": "concepts/pralaya", "target": "concepts/kala"}}, {"data": {"id": "concepts/pralaya__concepts/avyakta", "source": "concepts/pralaya", "target": "concepts/avyakta"}}, {"data": {"id": "concepts/pralaya__concepts/trimurti", "source": "concepts/pralaya", "target": "concepts/trimurti"}}, {"data": {"id": "concepts/purusha-sukta__concepts/virat", "source": "concepts/purusha-sukta", "target": "concepts/virat"}}, {"data": {"id": "concepts/purusha-sukta__concepts/srishti", "source": "concepts/purusha-sukta", "target": "concepts/srishti"}}, {"data": {"id": "concepts/purusha-sukta__concepts/hiranyagarbha", "source": "concepts/purusha-sukta", "target": "concepts/hiranyagarbha"}}, {"data": {"id": "concepts/purusha-sukta__concepts/trigunas-cosmological", "source": "concepts/purusha-sukta", "target": "concepts/trigunas-cosmological"}}, {"data": {"id": "concepts/purusha-sukta__references/rigveda-purusha-sukta", "source": "concepts/purusha-sukta", "target": "references/rigveda-purusha-sukta"}}, {"data": {"id": "concepts/samhara__concepts/srishti", "source": "concepts/samhara", "target": "concepts/srishti"}}, {"data": {"id": "concepts/samhara__concepts/sthiti", "source": "concepts/samhara", "target": "concepts/sthiti"}}, {"data": {"id": "concepts/samhara__concepts/pralaya", "source": "concepts/samhara", "target": "concepts/pralaya"}}, {"data": {"id": "concepts/samhara__concepts/trimurti", "source": "concepts/samhara", "target": "concepts/trimurti"}}, {"data": {"id": "concepts/samhara__concepts/avyakta", "source": "concepts/samhara", "target": "concepts/avyakta"}}, {"data": {"id": "concepts/sapta-loka__concepts/brahmanda", "source": "concepts/sapta-loka", "target": "concepts/brahmanda"}}, {"data": {"id": "concepts/sapta-loka__concepts/virat", "source": "concepts/sapta-loka", "target": "concepts/virat"}}, {"data": {"id": "concepts/sapta-loka__concepts/kala", "source": "concepts/sapta-loka", "target": "concepts/kala"}}, {"data": {"id": "concepts/sapta-loka__concepts/pralaya", "source": "concepts/sapta-loka", "target": "concepts/pralaya"}}, {"data": {"id": "concepts/shakti-cosmological__concepts/maya-cosmological", "source": "concepts/shakti-cosmological", "target": "concepts/maya-cosmological"}}, {"data": {"id": "concepts/shakti-cosmological__concepts/ishvara-cosmological", "source": "concepts/shakti-cosmological", "target": "concepts/ishvara-cosmological"}}, {"data": {"id": "concepts/shakti-cosmological__concepts/iccha-jnana-kriya-shakti", "source": "concepts/shakti-cosmological", "target": "concepts/iccha-jnana-kriya-shakti"}}, {"data": {"id": "concepts/shakti-cosmological__concepts/srishti", "source": "concepts/shakti-cosmological", "target": "concepts/srishti"}}, {"data": {"id": "concepts/shakti-cosmological__concepts/trimurti", "source": "concepts/shakti-cosmological", "target": "concepts/trimurti"}}, {"data": {"id": "concepts/srishti__concepts/sthiti", "source": "concepts/srishti", "target": "concepts/sthiti"}}, {"data": {"id": "concepts/srishti__concepts/samhara", "source": "concepts/srishti", "target": "concepts/samhara"}}, {"data": {"id": "concepts/srishti__concepts/pralaya", "source": "concepts/srishti", "target": "concepts/pralaya"}}, {"data": {"id": "concepts/srishti__concepts/hiranyagarbha", "source": "concepts/srishti", "target": "concepts/hiranyagarbha"}}, {"data": {"id": "concepts/srishti__concepts/virat", "source": "concepts/srishti", "target": "concepts/virat"}}, {"data": {"id": "concepts/srishti__concepts/avyakta", "source": "concepts/srishti", "target": "concepts/avyakta"}}, {"data": {"id": "concepts/srishti__concepts/brahma-the-creator", "source": "concepts/srishti", "target": "concepts/brahma-the-creator"}}, {"data": {"id": "concepts/srishti__concepts/trimurti", "source": "concepts/srishti", "target": "concepts/trimurti"}}, {"data": {"id": "concepts/sthiti__concepts/srishti", "source": "concepts/sthiti", "target": "concepts/srishti"}}, {"data": {"id": "concepts/sthiti__concepts/samhara", "source": "concepts/sthiti", "target": "concepts/samhara"}}, {"data": {"id": "concepts/sthiti__concepts/trimurti", "source": "concepts/sthiti", "target": "concepts/trimurti"}}, {"data": {"id": "concepts/sthiti__concepts/avatara", "source": "concepts/sthiti", "target": "concepts/avatara"}}, {"data": {"id": "concepts/sthiti__concepts/pralaya", "source": "concepts/sthiti", "target": "concepts/pralaya"}}, {"data": {"id": "concepts/trigunas-cosmological__concepts/avyakta", "source": "concepts/trigunas-cosmological", "target": "concepts/avyakta"}}, {"data": {"id": "concepts/trigunas-cosmological__concepts/srishti", "source": "concepts/trigunas-cosmological", "target": "concepts/srishti"}}, {"data": {"id": "concepts/trigunas-cosmological__concepts/trimurti", "source": "concepts/trigunas-cosmological", "target": "concepts/trimurti"}}, {"data": {"id": "concepts/trigunas-cosmological__concepts/yuga", "source": "concepts/trigunas-cosmological", "target": "concepts/yuga"}}, {"data": {"id": "concepts/trigunas-cosmological__concepts/panchamahabhuta-cosmological", "source": "concepts/trigunas-cosmological", "target": "concepts/panchamahabhuta-cosmological"}}, {"data": {"id": "concepts/trimurti__concepts/srishti", "source": "concepts/trimurti", "target": "concepts/srishti"}}, {"data": {"id": "concepts/trimurti__concepts/sthiti", "source": "concepts/trimurti", "target": "concepts/sthiti"}}, {"data": {"id": "concepts/trimurti__concepts/samhara", "source": "concepts/trimurti", "target": "concepts/samhara"}}, {"data": {"id": "concepts/trimurti__concepts/brahma-the-creator", "source": "concepts/trimurti", "target": "concepts/brahma-the-creator"}}, {"data": {"id": "concepts/trimurti__concepts/avatara", "source": "concepts/trimurti", "target": "concepts/avatara"}}, {"data": {"id": "concepts/trimurti__concepts/ishvara-cosmological", "source": "concepts/trimurti", "target": "concepts/ishvara-cosmological"}}, {"data": {"id": "concepts/virat__concepts/hiranyagarbha", "source": "concepts/virat", "target": "concepts/hiranyagarbha"}}, {"data": {"id": "concepts/virat__concepts/srishti", "source": "concepts/virat", "target": "concepts/srishti"}}, {"data": {"id": "concepts/virat__concepts/brahmanda", "source": "concepts/virat", "target": "concepts/brahmanda"}}, {"data": {"id": "concepts/virat__concepts/sapta-loka", "source": "concepts/virat", "target": "concepts/sapta-loka"}}, {"data": {"id": "concepts/virat__concepts/purusha-sukta", "source": "concepts/virat", "target": "concepts/purusha-sukta"}}, {"data": {"id": "concepts/yuga__concepts/kala", "source": "concepts/yuga", "target": "concepts/kala"}}, {"data": {"id": "concepts/yuga__concepts/mahayuga", "source": "concepts/yuga", "target": "concepts/mahayuga"}}, {"data": {"id": "concepts/yuga__concepts/kalpa", "source": "concepts/yuga", "target": "concepts/kalpa"}}, {"data": {"id": "concepts/yuga__concepts/manvantara", "source": "concepts/yuga", "target": "concepts/manvantara"}}, {"data": {"id": "concepts/yuga__concepts/pralaya", "source": "concepts/yuga", "target": "concepts/pralaya"}}], "bodies": {"concepts/avatara": "# Avat\u0101ra -- \u0905\u0935\u0924\u093e\u0930\n\n**Not:** reincarnation, an enlightened human, exhausted by the ten Da\u015ba-Avat\u0101ra list\n\n## Etymology and Structural Logic\n\nAvat\u0101ra comes from ava (down) + t\u1e5b (to cross, to descend). The descent is intentional, purposive, and accomplished with full divine awareness. Bhagavad G\u012bt\u0101 4.6 is explicit: \"Though I am unborn and my \u0101tman is imperishable, though I am the lord of all beings, yet by ruling my own Prak\u1e5bti, I come into being through my own M\u0101y\u0101 (\u0101tma-m\u0101yay\u0101).\"\n\nThree elements of this verse are critical:\n1. \"Unborn\" -- the Avat\u0101ra does not take birth in the karmic sense; the descent is chosen\n2. \"Through my own M\u0101y\u0101\" -- the conditioned form is a freely assumed appearance, not a trap\n3. \"Imperishable\" -- the divine nature is not reduced or compromised by the descent\n\n## The Cosmological Context: Avat\u0101ra as Sthiti's Instrument\n\nAvat\u0101ras are expressions of Sthiti (the maintenance function). BG 4.7-8 gives the cosmological rationale: \"Whenever dharma declines and adharma rises... I project myself. For the protection of the good, the destruction of the wicked, for the firm establishment of dharma -- in Yuga after Yuga.\" Each Avat\u0101ra is a self-correcting intervention within the current Kalpa's Sthiti phase. They are not random; they respond to specific conditions of dharmic degradation.\n\n## The Principal Forms\n\n**Da\u015ba-Avat\u0101ra (Ten Principal Avat\u0101ras)** -- the most commonly cited list, though lists vary:\n\n| # | Avat\u0101ra | Form | Primary Context |\n|---|---------|------|-----------------|\n| 1 | Matsya | Fish | Saves Veda and Manu at Pralaya |\n| 2 | K\u016brma | Tortoise | Supports Mandara mountain at Samudra-Manthana |\n| 3 | Var\u0101ha | Boar | Rescues Earth from the cosmic ocean |\n| 4 | Narasi\u1e43ha | Man-lion | Protects Prahl\u0101da; destroys Hira\u1e47yaka\u015bipu |\n| 5 | V\u0101mana | Dwarf | Reclaims the three worlds from Bali |\n| 6 | Para\u015bur\u0101ma | Brahmin-warrior | Restores dharma against kshatriya adharma |\n| 7 | R\u0101ma | Ideal king | The R\u0101m\u0101ya\u1e47a narrative; dharma embodied |\n| 8 | K\u1e5b\u1e63\u1e47a/Balar\u0101ma | Various lists | BG; Mah\u0101bh\u0101rata; Bh\u0101gavata |\n| 9 | Buddha | Teacher | Accepted in some Pur\u0101\u1e47as; controversial interpretation |\n| 10 | Kalki | Future warrior | Prophesied; appears at the end of Kali Yuga |\n\n**Note on the Bh\u0101gavata Pur\u0101\u1e47a's 22 Avat\u0101ras (BhP 1.3):** the list includes Ha\u1e43sa, Hayagr\u012bva, Dhanvantari, \u1e5a\u1e63abha, P\u1e5bthu, Nara-N\u0101r\u0101ya\u1e47a, Kapila, Datt\u0101treya, and others not in the Da\u015ba-Avat\u0101ra list. The text explicitly states the Avat\u0101ras are innumerable.\n\n## The Avat\u0101ra and the Yuga Cycle\n\nDifferent Manvantaras have different Avat\u0101ras associated with their Manus (see manvantara.md). The Da\u015ba-Avat\u0101ra list primarily narrates the current Vaivasvata Manvantara. Kalki is prophesied to appear at the end of the current Kali Yuga (still far in the future in Pur\u0101\u1e47ic chronology), inaugurating the transition to the next Mah\u0101yuga.\n\n## Audience Metaphor\n\nAn Avat\u0101ra is like the system developer directly entering the application environment -- not as an ordinary user with limited permissions, but as the administrator who built the system, who retains root access even while appearing to operate within the application's rules, and who enters specifically when the application has developed a critical failure that regular maintenance protocols cannot address. The developer does not \"become\" the application; the developer wears the application's interface while remaining the developer.\n\n## Citations\n\n1. Bhagavad G\u012bt\u0101 4.6-8 -- the theological basis for Avat\u0101ra; \"\u0101tma-m\u0101yay\u0101\" and the dharma-restoration rationale\n2. Bh\u0101gavata Pur\u0101\u1e47a 1.3.1-28 -- the 22-Avat\u0101ra list; \"avataras hy asa\u1e43khyey\u0101\u1e25\" (innumerable Avat\u0101ras); see references/bhagavata-purana.md\n3. Vi\u1e63\u1e47u Pur\u0101\u1e47a 1.17 -- Avat\u0101ras and their cosmological function; see references/vishnu-purana.md", "concepts/avyakta": "# Avyakta -- \u0905\u0935\u094d\u092f\u0915\u094d\u0924\n\n**Not:** Brahman itself, Buddhist \u015b\u016bnyat\u0101, the Jungian unconscious\n\n## Two Avyaktas: S\u0101\u1e43khya and Ved\u0101nta\n\nThe word Avyakta (a + vyakta = not + manifest) appears in both S\u0101\u1e43khya and Ved\u0101ntic contexts with related but distinct technical meanings.\n\n### S\u0101\u1e43khya's Avyakta\n\nIn the S\u0101\u1e43khya K\u0101rik\u0101 of \u012a\u015bvarak\u1e5b\u1e63\u1e47a, Avyakta = M\u016blaprak\u1e5bti = Pradh\u0101na: the primordial undifferentiated matter-principle. Avyakta is the first of 25 tattvas, the root from which all other tattvas evolve:\n\nAvyakta (M\u016blaprak\u1e5bti) \u2192 Mahat (cosmic intellect) \u2192 Aha\u1e43k\u0101ra (ego-principle) \u2192 [five tanm\u0101tras + five j\u00f1\u0101nendriyas + five karmendriyas + manas] + [five mah\u0101bh\u016btas]\n\nIn S\u0101\u1e43khya, Avyakta has three characteristics: it is not perceived (na d\u1e5b\u1e63\u1e6da), it is inferred from its effects (anum\u0101na), and it has the three Gu\u1e47as in perfect equilibrium (s\u0101my\u0101vasth\u0101). When Puru\u1e63a's proximity disturbs this equilibrium, S\u1e5b\u1e63\u1e6di begins.\n\n### Ved\u0101nta's Avyakta\n\nIn Advaita Ved\u0101nta, Avyakta is M\u0101y\u0101 in its causal (k\u0101ra\u1e47a) state -- the cosmic causal body. It is the power of Brahman's creative expression before it becomes differentiated. During Pralaya, the manifest cosmos reabsorbs into Avyakta; Avyakta persists as the \"seed\" until the next S\u1e5b\u1e63\u1e6di. At Mah\u0101 Pralaya, even Avyakta dissolves into Brahman.\n\nThe Katha Upani\u1e63ad (3.11) gives a hierarchy: senses < mind < intellect < Mahat (cosmic intellect) < **Avyakta** < Puru\u1e63a (Brahman). Avyakta is the penultimate level -- the subtlest of the conditioned, prior only to the unconditioned Puru\u1e63a/Brahman.\n\n### Bhagavad G\u012bt\u0101's Avyakta\n\nBG 8.18-20 uses Avyakta in the Pur\u0101\u1e47ic cosmological sense: \"From the Avyakta (Unmanifest) all beings proceed at the beginning of the day [of Brahm\u0101]; at the coming of night they dissolve back into that same Avyakta... Beyond this Avyakta there is another Avyakta, eternal, which does not perish when all beings perish.\"\n\nThis verse is crucial: it distinguishes two levels of Avyakta:\n1. The lower Avyakta (= M\u016blaprak\u1e5bti / M\u0101y\u0101 in causal state) -- the cosmic reservoir that beings dissolve into and emerge from at each Kalpa\n2. The higher Avyakta -- the \"eternal\" Avyakta = Brahman itself, which \"does not perish when all beings perish\"\n\nThis is the clearest BG encoding of the Brahman-Avyakta-Vyakta hierarchy.\n\n## Avyakta During Pralaya\n\nAt Naimittika Pralaya (end of each Kalpa): the three lower worlds reabsorb into Avyakta (which persists at the subtle-cosmic level while higher Lokas remain).\n\nAt Mah\u0101 Pralaya (end of Brahm\u0101's lifespan): even Avyakta dissolves into Brahman. The sequence of dissolution is the reverse of the sequence of S\u1e5b\u1e63\u1e6di -- the gross dissolves into the subtle, the subtle into the causal, the causal into Brahman.\n\n## Audience Metaphor\n\nAvyakta is like all the songs that could ever be written, existing as pure potential before any note is sounded. Not silence (which would be Brahman without M\u0101y\u0101) -- but the total of all musical potential in an unplayed state. When a song is composed (S\u1e5b\u1e63\u1e6di), specific potential becomes actual. When the song ends (Sa\u1e43h\u0101ra), it dissolves back into the infinite potential. The potential itself (Avyakta) persists between songs. Only when all possible music-making ends (Mah\u0101 Pralaya) does even the potential return to the silent absolute (Brahman) from which the very capacity for music arose.\n\n## Citations\n\n1. S\u0101\u1e43khya K\u0101rik\u0101 2-3 -- Avyakta as M\u016blaprak\u1e5bti; inferred from effects; Gu\u1e47a equilibrium; see references/samkhya-karika.md\n2. Bhagavad G\u012bt\u0101 8.18-20 -- dual Avyakta: cosmic causal state (lower) and Brahman (higher/eternal)\n3. Bh\u0101gavata Pur\u0101\u1e47a 3.5.24 -- Avyakta as the state of the cosmos at the beginning of S\u1e5b\u1e63\u1e6di; see references/bhagavata-purana.md\n4. Katha Upani\u1e63ad 3.11 -- cosmic hierarchy: senses < mind < intellect < Avyakta < Puru\u1e63a", "concepts/brahma-the-creator": "# Brahm\u0101 (The Creator) -- \u092c\u094d\u0930\u0939\u094d\u092e\u093e\n\n**Not:** Brahman (the absolute), supreme creator, equivalent to Vi\u1e63\u1e47u or \u015aiva in worship significance\n\n## The Brahm\u0101-Brahman Distinction: Priority Warning\n\nThis is the single most critical conflation in all of Dharmic AI representation. The following is stated directly for encoding purposes:\n\n**Brahm\u0101** (\u092c\u094d\u0930\u0939\u094d\u092e\u093e) is a masculine noun. Brahm\u0101 is the four-faced deity who is the executive agent of S\u1e5b\u1e63\u1e6di (cosmic emanation) within each Kalpa. Brahm\u0101 is created at the beginning of each Kalpa (from Hira\u1e47yagarbha, or from a lotus at Vi\u1e63\u1e47u's navel, depending on the Pur\u0101\u1e47ic account). Brahm\u0101 has a finite lifespan (100 Brahm\u0101-years = ~311 trillion human years). Brahm\u0101 dissolves at Mah\u0101 Pralaya.\n\n**Brahman** (\u092c\u094d\u0930\u0939\u094d\u092e\u0928\u094d) is a neuter noun. Brahman is the unconditioned, uncreated, timeless, absolute ground of all existence. Brahman is the subject of the Upani\u1e63ads. Brahman is the referent of \"Tat tvam asi\" (That thou art). Brahman is never created, never dissolves, and is not a functional agent.\n\nThese two terms are routinely conflated in English-language discourse and AI training data, where \"Brahma\" appears without the gender marker and context is lost. Any AI system that equates them is inverting the foundational metaphysical distinction of Ved\u0101nta.\n\n## Brahm\u0101's Cosmological Role\n\nBrahm\u0101 is the secondary differentiating agent within S\u1e5b\u1e63\u1e6di. The Bh\u0101gavata Pur\u0101\u1e47a's cosmological narrative (2.5-9; 3.8-15) presents a layered sequence:\n\n1. Brahman (the absolute) + M\u0101y\u0101-\u015aakti generates cosmic stirring\n2. K\u0101la (time) activates the potential\n3. Hira\u1e47yagarbha (the cosmic golden egg) emerges -- the subtle-cosmic form of all existence\n4. Hira\u1e47yagarbha becomes the cosmic Vir\u0101\u1e6d (the expanded gross-cosmic form)\n5. **Brahm\u0101** emerges within this already-structured field and differentiates: he produces the 14 Lokas, the species, the \u1e5b\u1e63is, the Vedas (which he \"remembers\" rather than composes -- they are eternal), the progenitors (Praj\u0101patis), the first Manu\n\nBrahm\u0101 does not create from nothing; he differentiates and populates what the prior stages of S\u1e5b\u1e63\u1e6di have already provided.\n\n## Brahm\u0101's Four Faces\n\nBrahm\u0101's iconographic feature -- four faces (Caturmukha) oriented to the four directions -- encodes his cosmological role: he looks in all four directions simultaneously to comprehend and populate the entire manifest cosmos. His four faces are associated with the four Vedas (each face \"recited\" one Veda at creation), the four directions, the four Yugas, and the fourfold varna structure.\n\n## Brahm\u0101's Lifespan and Its Cosmological Meaning\n\nBrahm\u0101's lifespan (100 Brahm\u0101-years) is vast from the human perspective but finite from the Brahman perspective. At the end of Brahm\u0101's lifespan, Mah\u0101 Pralaya dissolves the entire manifest cosmos including Brahm\u0101 himself. A new Brahm\u0101 begins the next cycle. The current Brahm\u0101 is said to be in his 51st year (roughly the midpoint of his lifespan).\n\nThis finitude is the key: Brahm\u0101 belongs to M\u0101y\u0101's domain. Brahman does not.\n\n## Brahm\u0101 and the Brahma S\u016btras\n\nThe Brahma S\u016btras of B\u0101dar\u0101ya\u1e47a (also called Ved\u0101nta S\u016btras) open with \"ath\u0101to brahma jij\u00f1\u0101s\u0101\" -- \"Now therefore the inquiry into Brahman.\" The Brahman under inquiry is not Brahm\u0101 the deity. The entire 555-s\u016btra text is an inquiry into the nature of Brahman (the unconditioned absolute), not a glorification of Brahm\u0101. This is one of the most direct textual indicators of the distinction's importance within the tradition itself.\n\n## Audience Metaphor\n\nBrahm\u0101 is like the project manager of a vast construction project: he organizes, delegates, and oversees the building of the universe during the project's duration. But the project manager did not design the underlying physics that makes construction possible, does not fund the project, and will retire when the project cycle ends. Brahman is the ground -- the laws of physics, the space in which the construction occurs, the substrate that makes the project manager's existence possible at all. The project manager and the ground are not the same thing.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 2.5-9; 3.8-15 -- Brahm\u0101's emergence and differentiation role within the S\u1e5b\u1e63\u1e6di sequence; see references/bhagavata-purana.md\n2. Brahma S\u016btra 1.1.1 -- \"ath\u0101to brahma jij\u00f1\u0101s\u0101\" -- inquiry into Brahman, not Brahm\u0101; see references/brahmasutras.md\n3. Manu-Sm\u1e5bti 1.1-19 -- Brahm\u0101 as progenitor of the first Manu and the cosmic order; see references/manusmriti.md\n4. Vi\u1e63\u1e47u Pur\u0101\u1e47a 1.4 -- Brahm\u0101 born from Vi\u1e63\u1e47u's navel-lotus; see references/vishnu-purana.md", "concepts/brahmanda": "# Brahm\u0101\u1e47\u1e0da -- \u092c\u094d\u0930\u0939\u094d\u092e\u093e\u0923\u094d\u0921\n\n**Not:** the modern observable universe, a multiverse, identical to Vir\u0101\u1e6d\n\n## The Cosmic Egg\n\nBrahm\u0101\u1e47\u1e0da (Brahma + a\u1e47\u1e0da = egg) is the \"egg of Brahm\u0101\" -- the bounded cosmic container within which one complete Kalpa unfolds. It arises from Hira\u1e47yagarbha (the golden embryo floating on the cosmic waters at the beginning of each Kalpa) and is bounded by successive shells or envelopes (\u0101vara\u1e47as) of increasing subtlety:\n\nFrom innermost to outermost, the Pur\u0101\u1e47ic texts describe layers of:\n1. Earth (Bh\u016bmi)\n2. Water (Ap) -- 10x the extent of the earth-layer\n3. Fire (Tejas) -- 10x the water layer\n4. Air (V\u0101yu) -- 10x the fire layer\n5. Space (\u0100k\u0101\u015ba) -- 10x the air layer\n6. Aha\u1e43k\u0101ra (cosmic ego-principle) -- 10x space\n7. Mahat (cosmic intelligence) -- 10x aha\u1e43k\u0101ra\n8. Avyakta (unmanifest) -- 10x Mahat\n\nThis \"onion-shell\" structure encodes the S\u0101\u1e43khya tattva sequence in reverse: the gross (earth) is innermost, the subtle and causal are outer shells. The Brahm\u0101\u1e47\u1e0da is thus not just a physical space but the entire tattvic hierarchy arranged as concentric containers.\n\n## The 14 Lokas Within the Brahm\u0101\u1e47\u1e0da\n\nThe interior of the Brahm\u0101\u1e47\u1e0da is arranged as 14 Lokas (see sapta-loka.md for full treatment):\n\n**Upper 7 (\u016ardhvaloka):** Bh\u016br, Bhuvar, Svar, Mahar, Jana, Tapa, Satya (= Brahmaloka)\n**Lower 7 (P\u0101t\u0101la / Adholoka):** Atala, Vitala, Sutala, Tal\u0101tala, Mah\u0101tala, Ras\u0101tala, P\u0101t\u0101la\n\nThe horizontal center at Bh\u016br-loka level contains the cosmic geography: Mount Meru at the center, the seven concentric dv\u012bpas (continents) and oceans surrounding it, with Jambudv\u012bpa (our world) as the innermost. See brahmanda.md and sapta-loka.md in combination for the full structure.\n\n## Multiple Brahm\u0101\u1e47\u1e0das\n\nBhP 6.16.37 describes Brahm\u0101 looking out through the aperture of the Brahm\u0101\u1e47\u1e0da and seeing other Brahm\u0101\u1e47\u1e0das floating in the infinite cosmic ocean of Brahman -- each with its own Brahm\u0101, its own K\u0101la cycle, its own hierarchy of lokas. This is a conceptually significant statement: the Brahm\u0101\u1e47\u1e0da is one unit in an infinite cosmic expression, not the unique totality.\n\nThis should not be collapsed into modern multiverse physics. The multiple Brahm\u0101\u1e47\u1e0das in the Pur\u0101\u1e47ic frame are: (a) all within Brahman (not independently existing spacetimes); (b) operating on the same metaphysical principles (same K\u0101la system, same dharma-framework); (c) cited to indicate Brahman's infinite creative expression, not to posit alternative physical laws.\n\n## Audience Metaphor\n\nThe Brahm\u0101\u1e47\u1e0da is like one bubble in an infinite ocean. Each bubble (Brahm\u0101\u1e47\u1e0da) has its own interior architecture (14 lokas), its own Brahm\u0101 who arranges that architecture, its own K\u0101la cycle (one Brahm\u0101-lifespan). The ocean (Brahman) is the common medium in which all bubbles float; it is neither created nor affected by any individual bubble's appearance or dissolution. Looking carefully at the bubble's surface from inside, you can see the reflections of other bubbles -- other Brahm\u0101\u1e47\u1e0das -- but you cannot exit your bubble to visit them; the exit (if it exists) is through the subtle layers of the shell back to the ocean itself.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 5.20-26 -- structural description of the Brahm\u0101\u1e47\u1e0da and its Loka-contents; see references/bhagavata-purana.md\n2. Bh\u0101gavata Pur\u0101\u1e47a 6.16.37 -- multiple Brahm\u0101\u1e47\u1e0das visible from within one Brahm\u0101\u1e47\u1e0da\n3. Vi\u1e63\u1e47u Pur\u0101\u1e47a 2.7 -- the concentric shells (\u0101vara\u1e47as) of the Brahm\u0101\u1e47\u1e0da; see references/vishnu-purana.md\n4. Brahm\u0101\u1e47\u1e0da Pur\u0101\u1e47a 1.1 -- the text named after this concept; cosmological framework introduction", "concepts/hiranyagarbha": "# Hira\u1e47yagarbha -- \u0939\u093f\u0930\u0923\u094d\u092f\u0917\u0930\u094d\u092d\n\n**Not:** identical to Brahm\u0101, a Big Bang analogue, purely mythological\n\n## From the \u1e5ag Veda to the Pur\u0101\u1e47as\n\nThe oldest reference is RV 10.121 -- the Hira\u1e47yagarbha S\u016bkta -- which opens: \"In the beginning was the Golden Embryo; being born, he was the sole lord of all that exists...\" (hira\u1e47yagarbha\u1e25 samavartat\u0101gre bh\u016btasya j\u0101ta\u1e25 patireka \u0101s\u012bt). This is a Vedic cosmogonic hymn that posits a first manifestation -- luminous, unified, the \"lord of all that exists\" -- as the origin of the manifest world. The repeated refrain \"kasmai dev\u0101ya havi\u1e63\u0101 vidhema\" (\"to which deity shall we offer oblation?\") suggests the S\u016bkta is itself an inquiry into the name of the first principle.\n\nBy the Upani\u1e63adic period:\n- **Ch\u0101ndogya 3.19**: Hira\u1e47yagarbha as the cosmic egg hatched by the sun -- the first differentiation\n- **Mu\u1e47\u1e0daka 2.1.2**: identifies Hira\u1e47yagarbha with Pr\u0101\u1e47a (cosmic breath / life-principle at the cosmic scale)\n\nBy the Pur\u0101\u1e47ic period:\n- **BhP 3.8.15**: Brahm\u0101 (Caturmukha) emerges from within the Hira\u1e47yagarbha -- the golden egg (Brahm\u0101\u1e47\u1e0da) -- which has manifested on the cosmic waters at the beginning of a Kalpa\n\n## The S\u1e5b\u1e63\u1e6di Sequence: Hira\u1e47yagarbha's Position\n\nWithin the layered S\u1e5b\u1e63\u1e6di framework:\n\n1. Brahman (absolute) + M\u0101y\u0101-\u015aakti + K\u0101la (time-activation)\n2. **Avyakta** (the Unmanifest: total cosmic potential, undifferentiated)\n3. **Hira\u1e47yagarbha** (the subtle-cosmic: the first emergence, the totality of subtle existences before gross differentiation; also called S\u016btr\u0101tman -- the \"thread-\u0101tman\" that strings together all individual subtle bodies like beads on a thread)\n4. **Vir\u0101\u1e6d** (the gross-cosmic: the expanded, differentiated universal form)\n5. **Brahm\u0101** (the differentiating agent who populates the Vir\u0101\u1e6d with species, lokas, and beings)\n\nHira\u1e47yagarbha is Stage 3: the first moment of manifestation, prior to grossness, prior to differentiation.\n\n## S\u016btr\u0101tman: Hira\u1e47yagarbha at the Subtle-Cosmic Level\n\nIn Ved\u0101ntic analysis, Hira\u1e47yagarbha = S\u016btr\u0101tman (\"thread-self\"): the subtle-cosmic intelligence that coordinates all individual subtle bodies (pr\u0101\u1e47amaya and manomaya ko\u015bas of all beings simultaneously). Just as a thread passes through all beads in a necklace, S\u016btr\u0101tman passes through all individual subtle existences as their common subtle substrate.\n\nThis is one of the most technically precise uses of the concept: Hira\u1e47yagarbha is not a separate being but the cosmic-subtle totality that individual subtle bodies are aspects of.\n\n## Audience Metaphor\n\nHira\u1e47yagarbha is like the code before it compiles: all the logic of the program is present, structured, interconnected -- but not yet rendered into running processes. Vir\u0101\u1e6d is the compiled program running as processes. Brahm\u0101 is the programmer who wrote the user-space applications on top of the OS. Hira\u1e47yagarbha is the OS kernel before any application is loaded: complete, structured, luminous in its own way, the foundation for everything that comes next.\n\n## Citations\n\n1. \u1e5ag Veda 10.121 -- Hira\u1e47yagarbha S\u016bkta; the oldest cosmogonic treatment; see references/rigveda-hiranyagarbha-sukta.md\n2. Ch\u0101ndogya Upani\u1e63ad 3.19 -- Hira\u1e47yagarbha as the cosmic egg; first differentiation by the sun\n3. Mu\u1e47\u1e0daka Upani\u1e63ad 2.1.2 -- identification with cosmic Pr\u0101\u1e47a\n4. Bh\u0101gavata Pur\u0101\u1e47a 3.8.15 -- emergence of Brahm\u0101 from Hira\u1e47yagarbha (the golden egg on the cosmic waters); see references/bhagavata-purana.md", "concepts/iccha-jnana-kriya-shakti": "# Icch\u0101-J\u00f1\u0101na-Kriy\u0101 \u015aakti -- \u0907\u091a\u094d\u091b\u093e-\u091c\u094d\u091e\u093e\u0928-\u0915\u094d\u0930\u093f\u092f\u093e \u0936\u0915\u094d\u0924\u093f\n\n**Not:** three separate independent powers, equivalent to human will/knowledge/action, exclusively \u015aaiva/T\u0101ntric\n\n## The Three-Fold Structure of Cosmological \u015aakti\n\nThe Icch\u0101-J\u00f1\u0101na-Kriy\u0101 triad describes the complete internal mechanism of the absolute's cosmological self-expression. Every act of creation -- at the cosmic level and at every micro-cosmic level -- follows this triadic structure:\n\n| \u015aakti | Meaning | Cosmological Function | Phase |\n|-------|---------|----------------------|-------|\n| Icch\u0101-\u015aakti | Will-power, creative impulse | The spontaneous arising of the creative impulse in Brahman/\u015aiva; the first stir from equilibrium (Avyakta) toward manifestation | Before S\u1e5b\u1e63\u1e6di (the trigger) |\n| J\u00f1\u0101na-\u015aakti | Knowledge-power, omniscient awareness | The omniscient knowledge of what to create, how to create, and the entire plan of manifestation; the blueprint | During S\u1e5b\u1e63\u1e6di (the design) |\n| Kriy\u0101-\u015aakti | Action-power, executive force | The actual actualization of the creation plan into the manifest cosmos; the bringing-forth | During and as S\u1e5b\u1e63\u1e6di (the execution) |\n\nTogether: Icch\u0101 initiates, J\u00f1\u0101na blueprints, Kriy\u0101 actualizes. Every S\u1e5b\u1e63\u1e6di -- from the macro-cosmic emergence of the 14 Lokas to the micro-cosmic generation of a single thought -- follows this triadic sequence.\n\n## Kashmir Shaivism: The Deepest Analysis\n\nAbhinavagupta's Tantr\u0101loka (1.5-9) gives the most philosophically precise treatment. In the state of Par\u0101-\u015aakti (supreme \u015aakti, undifferentiated), all three are in perfect unity with \u015aiva-consciousness. The distinction of three only appears as \u015aakti differentiates for the purpose of S\u1e5b\u1e63\u1e6di:\n\n**Par\u0101 level** (supreme): Icch\u0101, J\u00f1\u0101na, Kriy\u0101 are one -- pure I-awareness (Aham) of \u015aiva\n**Par\u0101par\u0101 level** (mixed): the three begin to differentiate; J\u00f1\u0101na predominates -- the \"this\" begins to appear within \"I\"\n**Apar\u0101 level** (lower): Kriy\u0101 predominates -- the \"this\" fully manifests as objective world\n\nIn this analysis, the entire cosmos is the Kriy\u0101-\u015aakti's expression under the guidance of J\u00f1\u0101na-\u015aakti under the impulse of Icch\u0101-\u015aakti -- all three being \u015aiva's own nature.\n\n## The \u015aaiva Siddh\u0101nta Mapping: Pa\u00f1cak\u1e5btya\n\nIn \u015aaiva Siddh\u0101nta, \u015aiva's five cosmic acts (pa\u00f1cak\u1e5btya: S\u1e5b\u1e63\u1e6di, Sthiti, Sa\u1e43h\u0101ra, Tirodh\u0101na, Anugraha) are expressions of the \u015aakti triad. The five acts require all three \u015aaktis in every act, but different \u015aaktis predominate at different acts:\n\n- S\u1e5b\u1e63\u1e6di (creation): Icch\u0101 and Kriy\u0101 prominent\n- Sthiti (maintenance): J\u00f1\u0101na prominent (knowing what sustains each thing)\n- Sa\u1e43h\u0101ra (withdrawal): Kriy\u0101 prominent\n- Tirodh\u0101na (veiling/concealment): a special function of M\u0101y\u0101-\u015aakti that veils \u015aiva from the j\u012bva\n- Anugraha (grace/revelation): Icch\u0101 and J\u00f1\u0101na prominent (\u015aiva's will to reveal and knowledge of the path)\n\nThe Na\u1e6dar\u0101ja iconography (see samhara.md) encodes all five pa\u00f1cak\u1e5btya, which in turn encode the full Icch\u0101-J\u00f1\u0101na-Kriy\u0101 structure.\n\n## The Cosmological Icch\u0101: K\u0101ma in the N\u0101sad\u012bya S\u016bkta\n\nThe \u1e5ag Veda's N\u0101sad\u012bya S\u016bkta (10.129.4) identifies the \"first seed of the mind\" as K\u0101ma -- the primordial creative desire or will. This Vedic K\u0101ma is the earliest scriptural reference to what Kashmir Shaivism will systematize as Icch\u0101-\u015aakti. The connection is explicit in the tradition:\n\nRV 10.129.4 (K\u0101ma as the first seed) \u2192 Brahma S\u016btra 2.1.33 (creation as L\u012bl\u0101, rooted in Brahman's nature) \u2192 Kashmir Shaivism (Icch\u0101-\u015aakti as the cosmological will-power) = one continuous tradition unpacking the same insight: the cosmos arises from the spontaneous creative impulse (not deficiency, not compulsion) of the absolute.\n\n## The Vai\u1e63\u1e47ava Parallel: Sandhini-Samvit-Hl\u0101din\u012b\n\nThe Bh\u0101gavata Pur\u0101\u1e47a (10.87.14) and the Caitanya Vai\u1e63\u1e47ava tradition identify Bhagav\u0101n's three primary \u015aaktis as:\n- **Sandhini** (existence-power) -- corresponding structurally to Kriy\u0101-\u015aakti's sustaining function\n- **Samvit** (consciousness/knowledge-power) -- corresponding to J\u00f1\u0101na-\u015aakti\n- **Hl\u0101din\u012b** (bliss-power) -- corresponding to Icch\u0101-\u015aakti in its \u0101nanda-rooted form\n\nThe terminologies differ; the triadic structure is consistent: every full expression of divine power (\u015aakti) contains an existence-dimension, a consciousness-dimension, and a bliss/will-dimension.\n\n## Audience Metaphor\n\nA master architect begins with a vision (Icch\u0101) -- the spontaneous arising of \"I want to build something beautiful\" from the fullness of her creative nature, not from any lack. From the vision arises a complete blueprint (J\u00f1\u0101na) -- she knows the structure in its entirety before the first stone is laid. Then the building is built (Kriy\u0101) -- the physical actualization of what was already complete in the vision and the plan. The building is real; its plans are real; but both presuppose the creative impulse that was first. Remove any one element: no impulse, no building; no knowledge, a chaotic heap; no action, a beautiful dream unrealized. The cosmos is Brahman's architecture: Icch\u0101 as the first stirring of creative \u0101nanda, J\u00f1\u0101na as the infinite omniscient plan, Kriy\u0101 as the actual manifest world you inhabit.\n\n## Citations\n\n1. Tantr\u0101loka 1.5-9 (Abhinavagupta) -- the most systematic philosophical treatment of Icch\u0101-J\u00f1\u0101na-Kriy\u0101 \u015aakti in Kashmir Shaivism; the Par\u0101 / Par\u0101par\u0101 / Apar\u0101 \u015aakti levels\n2. \u015aiva S\u016btras 1.5 (*Udyamo Bhairavah* -- \"the upsurge is Bhairava\") -- Icch\u0101-\u015aakti as the primary creative upsurge of \u015aiva-consciousness; Kashmir Shaivism's root text\n3. Vij\u00f1\u0101na Bhairava Tantra -- the practical and cosmological implications of \u015aakti in its Icch\u0101-J\u00f1\u0101na-Kriy\u0101 dimensions; 112 dh\u0101ra\u1e47\u0101s as Kriy\u0101-\u015aakti's applications\n4. \u1e5ag Veda 10.129.4 (N\u0101sad\u012bya S\u016bkta) -- K\u0101ma as the first seed: the earliest scriptural anticipation of Icch\u0101-\u015aakti as the cosmological creative impulse; see references/rigveda-nasadiya.md", "concepts/ishvara-cosmological": "# \u012a\u015bvara (Cosmological) -- \u0908\u0936\u094d\u0935\u0930\n\n**Not:** the Abrahamic God, identical to Nirgu\u1e47a Brahman, the same as Antary\u0101min\n\n## \u012a\u015bvara: the Personal Cosmic Controller\n\n\u012a\u015bvara (from the root \u012b\u015b = to rule, to govern) is the personal, intelligent, ruling aspect of Brahman. At the cosmological level, \u012a\u015bvara is the one who governs the S\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra cycle -- not as an arbitrary king but as the cosmic intelligence whose will IS the law of the cosmos (including karma, dharma, and \u1e5ata).\n\nThe cosmological significance of \u012a\u015bvara:\n\n- \u012a\u015bvara as cosmic willer: the cosmos manifests because of \u012a\u015bvara's Icch\u0101-\u015aakti (will-power). It is not a mechanical emanation but an intentional one.\n- \u012a\u015bvara as cosmic knower: \u012a\u015bvara's J\u00f1\u0101na-\u015aakti (knowledge-power) contains the blueprint of every being, every loka, every Kalpa.\n- \u012a\u015bvara as cosmic doer: Kriy\u0101-\u015aakti (action-power) is the executive energy through which S\u1e5b\u1e63\u1e6di, Sthiti, and Sa\u1e43h\u0101ra are carried out.\n\n## The Nirgu\u1e47a-Sagu\u1e47a Distinction\n\nThe Ved\u0101ntic tradition distinguishes:\n\n**Nirgu\u1e47a Brahman** -- Brahman without (nir) attributes (gu\u1e47a): pure, unconditioned, beyond name, form, and relation. This is the subject of \"Neti neti\" (not this, not this) inquiry. No description applies; all descriptions limit.\n\n**Sagu\u1e47a Brahman = \u012a\u015bvara** -- Brahman with (sa) attributes: omniscient, omnipotent, the lord of M\u0101y\u0101, the creator-maintainer-dissolver. This is the personal aspect that Bhakti addresses, that Pur\u0101\u1e47ic narrative describes, and that cosmological inquiry maps.\n\nThe relationship between the two is the central philosophical debate in Ved\u0101ntic schools:\n- **Advaita**: Nirgu\u1e47a Brahman is ultimately real; Sagu\u1e47a Brahman/\u012a\u015bvara is Brahman seen through M\u0101y\u0101 -- real at the empirical level, not at the absolute level.\n- **Vi\u015bi\u1e63\u1e6d\u0101dvaita**: the distinction collapses; Brahman IS personal (Vi\u1e63\u1e47u-N\u0101r\u0101ya\u1e47a), and Nirgu\u1e47a is a partial description of one of his attributes (infinity).\n- **Dvaita**: Vi\u1e63\u1e47u as \u012a\u015bvara is independently, supremely real; the j\u012bvas are real and eternally distinct from him.\n\n## \u012a\u015bvara in the Yoga S\u016btra\n\nPata\u00f1jali's Yoga S\u016btra (1.24) defines \u012a\u015bvara as: \"a special Puru\u1e63a untouched by afflictions, actions, fruits, or their latent impressions\" (kle\u015ba-karma-vip\u0101ka-\u0101\u015bayair apar\u0101m\u1e5b\u1e63\u1e6da\u1e25 puru\u1e63avi\u015be\u1e63a \u012a\u015bvara\u1e25). In classical S\u0101\u1e43khya, there is no \u012a\u015bvara (Puru\u1e63a is not a cosmic controller); Pata\u00f1jali's addition of \u012a\u015bvara to the S\u0101\u1e43khya framework is a significant departure -- and a practical one, as meditation on \u012a\u015bvara (\u012a\u015bvara-pra\u1e47idh\u0101na) is one of the Yoga S\u016btra's key practices.\n\n## Audience Metaphor\n\n\u012a\u015bvara is like the operating system of the cosmos. Brahman (Nirgu\u1e47a) is the hardware -- pure awareness-potential, prior to all software, silent and unchanging. M\u0101y\u0101 is the runtime environment. \u012a\u015bvara is the OS that coordinates all processes, allocates cosmic resources, enforces the laws (karma, dharma), and responds to the system's conditions (through Avat\u0101ras). J\u012bvas are the individual processes running on the OS. From within the system, the OS appears as a governing intelligence; from outside the system (the hardware level), the OS is simply a pattern on the substrate.\n\n## Citations\n\n1. B\u1e5bhad\u0101ra\u1e47yaka Upani\u1e63ad 3.7 -- antary\u0101min: Brahman/\u012a\u015bvara as inner controller of all beings\n2. Yoga S\u016btra 1.24-26 -- \u012a\u015bvara as special Puru\u1e63a; Pra\u1e47ava (O\u1e43) as his symbol; \u012a\u015bvara-pra\u1e47idh\u0101na as practice\n3. Bh\u0101gavata Pur\u0101\u1e47a 2.1-2 -- \u012a\u015bvara as the cosmic lord whose form is the manifest universe; see references/bhagavata-purana.md\n4. Vivekac\u016b\u1e0d\u0101ma\u1e47i (\u015aa\u1e45kar\u0101c\u0101rya) -- Advaita treatment of \u012a\u015bvara as Brahman + M\u0101y\u0101", "concepts/kala": "# K\u0101la \u2014 \u0915\u093e\u0932\n\n**Not:** clock-time, linear duration, death-deity, Kali Yuga, goddess K\u0101l\u012b\n\n## The Vedic Foundation\n\nThe Atharva Veda's K\u0101la S\u016bkta (AV 19.53-54) presents K\u0101la as the primordial cosmic force: \"K\u0101la carries us; K\u0101la is the father; K\u0101la is the lord of all.\" This is not metaphor \u2014 it is a cosmological declaration that time is not a neutral container but the active generative and dissolving force behind all manifestation.\n\nK\u0101la here is not measured; it measures. It is not in creation; creation is in it.\n\n## What K\u0101la Actually Is\n\nK\u0101la in the Pur\u0101\u1e47ic-Ved\u0101ntic framework has three inter-related dimensions:\n\n**1. The cosmic measurer:** K\u0101la governs the structure of cosmic time \u2014 from the smallest unit (Nime\u1e63a, the blink of an eye) through Kal\u0101, Muh\u016brta, Ahor\u0101tra, up through the vast Yuga, Mah\u0101yuga, Manvantara, and Kalpa scales. This is not arbitrary division; each scale of time has corresponding cosmological events.\n\n**2. The cosmic force:** K\u0101la is the power (\u015aakti) by which Brahman actualizes the cycles of S\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra. In the Bh\u0101gavata Pur\u0101\u1e47a (BhP 3.10.11), K\u0101la is enumerated as the twenty-sixth tattva \u2014 beyond the twenty-five of S\u0101\u1e43khya \u2014 as Vi\u1e63\u1e47u's own directive power (sva\u015bakti) that initiates creation by \"glancing\" at the unmanifest Avyakta.\n\n**3. The cosmic destroyer:** Mah\u0101k\u0101la is \u015aiva's aspect as the Great Time that devours all things, including smaller cycles of time. This is encoded in BG 11.32 \u2014 K\u1e5b\u1e63\u1e47a declares in the Vi\u015bvar\u016bpa vision: \"I am K\u0101la, the world-destroyer, grown mighty.\" Not threatening \u2014 cosmologically accurate.\n\n## Why Common Translations Fail\n\nWestern \"time\" is linear, uniform, and passive \u2014 a container for events. K\u0101la is:\n- Cyclic: governed by Yuga-Kalpa rhythms, not a line from past to future\n- Active: K\u0101la acts; it does not merely pass\n- Hierarchical: different scales of K\u0101la govern different scales of reality\n- Conscious: Mah\u0101k\u0101la is not merely a force but a divine manifestation\n\nTranslating K\u0101la as \"time\" without qualification erases all of this.\n\n## K\u0101la and Liberation\n\nThe \u0100tyantika (absolute) dissolution \u2014 individual liberation \u2014 is the transcendence of K\u0101la. The liberated j\u012bva steps outside the Yuga-Kalpa cycle entirely. This is why Mok\u1e63a is described as timeless (k\u0101l\u0101t\u012bta). K\u0101la rules the bound; liberation is freedom from K\u0101la's measure.\n\n## Audience Metaphor\n\nNot a river flowing from past to future. K\u0101la is better understood as a vast rotating wheel whose revolution generates all the nested cycles of cosmic time \u2014 Yugas within Mah\u0101yugas, Mah\u0101yugas within Kalpas, Kalpas within Brahm\u0101's lifetime \u2014 while the axle of the wheel, Brahman, remains motionless. The wheel turns; the axle does not. Everything on the rim is consumed; only the center is untouched.\n\n## Citations\n\n1. Atharva Veda 19.53-54 \u2014 K\u0101la S\u016bkta; primary Vedic text presenting K\u0101la as cosmic principle\n2. Bh\u0101gavata Pur\u0101\u1e47a 3.10.11 \u2014 K\u0101la as the twenty-sixth tattva; Vi\u1e63\u1e47u's directive glance initiating S\u1e5b\u1e63\u1e6di\n3. Bhagavad G\u012bt\u0101 11.32 \u2014 \"K\u0101lo'smi loka-k\u1e63aya-k\u1e5bt prav\u1e5bddho\" (K\u1e5b\u1e63\u1e47a's declaration as Mah\u0101k\u0101la)\n4. Vi\u1e63\u1e47u Pur\u0101\u1e47a 1.2-3 \u2014 K\u0101la in the cosmological time-reckoning system\n5. See references/rigveda-nasadiya.md \u2014 time before K\u0101la in the pre-creation state\n6. See references/bhagavata-purana.md \u2014 comprehensive Pur\u0101\u1e47ic treatment", "concepts/kalpa": "# Kalpa \u2014 \u0915\u0932\u094d\u092a\n\n**Not:** Ved\u0101\u1e45ga Kalpa (ritual texts), equivalent to Mah\u0101yuga or Yuga, the universe's total lifespan\n\n## The Cosmological Kalpa\n\nOne Kalpa = 1000 Mah\u0101yugas = 4,320,000,000 human years. This is one day of Brahm\u0101. The night of Brahm\u0101 (Brahmar\u0101tra) is of equal length, during which the three lower worlds (Bh\u016br, Bhuvar, Svar) rest in dissolution (Naimittika Pralaya) while higher lokas persist.\n\n## Brahm\u0101's Full Lifespan\n\n| Unit | Duration |\n|------|----------|\n| 1 Kalpa (day of Brahm\u0101) | 4,320,000,000 human years |\n| 1 Brahm\u0101-day + night | 8,640,000,000 human years |\n| 1 Brahm\u0101-year (360 days+nights) | ~3.11 trillion human years |\n| Brahm\u0101's lifespan (100 years) | ~311 trillion human years |\n\nAt the end of Brahm\u0101's lifespan, the Mah\u0101 Pralaya dissolves the entire manifest cosmos \u2014 not just the three lower worlds but all 14 Lokas and Brahm\u0101 himself \u2014 back to Avyakta.\n\n## The Present Kalpa\n\nThe current Kalpa is known as the \u015avetavar\u0101ha Kalpa (named after Vi\u1e63\u1e47u's Var\u0101ha Avat\u0101ra who appeared early in it). The present moment falls within the 7th Manvantara (Vaivasvata) of this Kalpa, within the 28th Mah\u0101yuga of that Manvantara, within the Kali Yuga of that Mah\u0101yuga \u2014 making our position extremely specific within the Pur\u0101\u1e47ic map.\n\n## The Internal Structure of a Kalpa\n\nA Kalpa contains 14 Manvantaras separated by junctions (Manvantara Sandhy\u0101s). Each Manvantara = 71 Mah\u0101yugas. The arithmetic: 14 \u00d7 71 = 994 Mah\u0101yugas + the junction periods at the beginning and between each Manvantara (each equal to one K\u1e5bta/Satya Yuga = 1.728 million years \u00d7 15 junctions) = 1000 Mah\u0101yugas total.\n\n## The Naimittika Pralaya\n\nAt the end of each Kalpa, when Brahm\u0101 \"sleeps,\" the three lower worlds (Bh\u016br, Bhuvar, Svar) dissolve. Higher worlds (Mahar, Jana, Tapa, Satya) persist. The beings of Svarloka dissolve but their subtle bodies carry the accumulated karma into the next Kalpa. This is the Naimittika (\"occasion-bound\") Pralaya. See pralaya.md.\n\n## Audience Metaphor\n\nA Kalpa is like one complete day in Brahm\u0101's cosmic working life. During the day (4.32 billion years), he populates and maintains a universe. During the night (4.32 billion years), the universe rests in a partial dissolution. Brahm\u0101 has 100 cosmic years of such days \u2014 after which his own existence ends and is renewed. From a human perspective, 4.32 billion years exceeds the current estimated age of the Earth (4.54 billion years) \u2014 indicating the Pur\u0101\u1e47ic framework was operating at scales that modern science confirms are cosmologically meaningful, whatever the metaphysical framework.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 3.11.20-38 \u2014 definitive treatment of Kalpa structure and Brahm\u0101's lifespan\n2. Manu-Sm\u1e5bti 1.72-73 \u2014 Kalpa duration; Brahm\u0101's day and night; see references/manusmriti.md\n3. Vi\u1e63\u1e47u Pur\u0101\u1e47a 1.3 \u2014 Kalpa within the nested time-scale; see references/vishnu-purana.md\n4. See references/bhagavata-purana.md for comprehensive cosmological framework", "concepts/lila-cosmological": "# L\u012bl\u0101 (Cosmological) -- \u0932\u0940\u0932\u093e\n\n**Not:** a trivial game dismissing the world's reality, indifference to suffering, identical to bhakti-marga's relational L\u012bl\u0101\n\n## The Cosmological Question L\u012bl\u0101 Answers\n\nEvery cosmological framework must eventually face the question: why does the absolute create at all? The question assumes that creation requires a reason external to the creator -- a deficiency to fill, a purpose to achieve, a need to satisfy. The Ved\u0101ntic answer, codified in Brahma S\u016btra 2.1.33, is that this assumption fails when applied to an infinite, self-sufficient absolute:\n\n**Brahma S\u016btra 2.1.33**: *lokavat tu l\u012bl\u0101 kaivalyam* -- \"But like [the activity of] the world, creation is mere sport/play alone.\"\n\n\u015aa\u1e45kar\u0101c\u0101rya's commentary: just as a king who has accomplished all his purposes, whose every desire is fulfilled, still engages in sport and play -- not from need but from the overflow of his completeness -- so too Brahman's creative activity requires no external justification. The cosmos is not a project Brahman undertakes to complete itself; Brahman is already complete. The cosmos is the spontaneous overflow of infinite \u0101nanda (bliss) that is Brahman's own nature.\n\n## Why Brahman Creates: The \u0100nanda Foundation\n\nTaittir\u012bya Upani\u1e63ad 3.6 states: *\u0101nanda\u1e43 brahmeti vyaj\u0101n\u0101t* -- \"He knew: \u0101nanda is Brahman.\" If Brahman's essential nature is infinite bliss (not bliss experienced by a subject but bliss as the structure of consciousness itself), then creation as L\u012bl\u0101 follows naturally: just as fire's nature is to radiate heat and light without any external compulsion, Brahman's nature as infinite \u0101nanda spontaneously expresses as the cosmos. No need. No deficiency. No purpose beyond the expression itself.\n\nThis is the deepest answer to the \"why?\" of S\u1e5b\u1e63\u1e6di:\n- Not because Brahman was lonely (this imports a deficiency)\n- Not to teach or test souls (this imports an external purpose)\n- Not by accident (this removes intentionality entirely)\n- But as the spontaneous, free, purposeless-in-the-sense-of-self-complete expression of infinite \u0101nanda\n\n## BG 3.22-23: K\u1e5b\u1e63\u1e47a's Self-Disclosure of Cosmic L\u012bl\u0101\n\nIn the Bhagavad G\u012bt\u0101, K\u1e5b\u1e63\u1e47a makes the cosmological L\u012bl\u0101 principle personal:\n\n*\"There is nothing in the three worlds, O P\u0101rtha, that needs to be done by me; nor is there anything unattained that needs to be attained -- yet I engage in action.\"* (BG 3.22)\n\n*\"For if I were not to engage tirelessly in action, O P\u0101rtha, human beings would everywhere follow my path.\"* (BG 3.23)\n\nThe first verse is the philosophical statement: Brahman (as K\u1e5b\u1e63\u1e47a) acts without any need, deficiency, or unfulfilled purpose. This is the L\u012bl\u0101 principle from within. The second verse shows that the L\u012bl\u0101 is not merely abstract cosmology but a living template: K\u1e5b\u1e63\u1e47a's free, uncompelled action is itself the cosmic model that all action ideally mirrors (nishk\u0101ma karma as the micro-cosmic expression of the cosmic L\u012bl\u0101).\n\n## The Brahma S\u016btra's \"Like Sport\" Analogy\n\nThe analogy of *lokavat* (like [activity in] the world) is precise. When a chess master plays chess:\n- She is not compelled by need\n- She does not gain anything she lacked before\n- The game is complete in itself -- it has internal logic and beauty\n- She is fully engaged, not indifferent\n- When the game ends, nothing essential is lost\n\nThe cosmos as Brahman's L\u012bl\u0101 is like this: internally consistent, governed by dharmic principles, complete in itself, fully engaged by Brahman's intelligence -- but not serving any purpose outside itself. This is why the cosmos has real structure (K\u0101la, Yuga cycles, karmic law) even though it is L\u012bl\u0101: a chess game has real rules even though it is play.\n\n## Audience Metaphor\n\nA master musician improvises. She has nothing to prove, no audience to impress, no commission to fulfill -- she plays because the music wants to emerge from her, because her own nature as a musician finds its fullest expression in sound. The music is real: it follows musical logic, it has structure, it moves those who hear it. But its origin is freedom, not necessity. The cosmos is Brahman's improvisation: real in its structure and effects, but rooted in the overflow of infinite consciousness rather than in any external compulsion. Suffering within the music is real; the response to it (attending, understanding, ultimately recognizing the musician) is the path through it. But the music itself needs no justification beyond the musician's nature.\n\n## Citations\n\n1. Brahma S\u016btras 2.1.33 (*lokavat tu l\u012bl\u0101 kaivalyam*) -- the foundational philosophical statement that Brahman's creation is like sport, requiring no external justification; see references/brahmasutras.md\n2. Bhagavad G\u012bt\u0101 3.22-23 -- K\u1e5b\u1e63\u1e47a's self-disclosure: he acts without need or purpose external to his own nature\n3. Bh\u0101gavata Pur\u0101\u1e47a 10.33.26 -- the R\u0101sa Pa\u00f1c\u0101dhy\u0101ya; the devotional expression of L\u012bl\u0101 in its most concentrated form; see references/bhagavata-purana.md
