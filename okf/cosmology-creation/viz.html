 need or external purpose.\n- BS 2.1.34-36: Supporting the L\u012bl\u0101 doctrine against objections; establishing that creation without purpose does not impute cruelty or injustice to Brahman\n\n**Adhy\u0101ya 2, P\u0101da 3 (S\u016btras 1-53: The Nature of the Cosmos):**\n- Discussion of \u0100k\u0101\u015ba as Brahman's creative expression; the derivation of the elements; the relationship between cosmic and individual consciousness\n\n## The Three Great Commentaries\n\nThe same s\u016btras are interpreted very differently by the three major schools, and their cosmological implications diverge accordingly:\n\n- **\u015aa\u1e45kara (Advaita)**: Brahman alone is real; S\u1e5b\u1e63\u1e6di is Brahman's M\u0101y\u0101-\u015aakti; the cosmos is neither simply real nor simply unreal (anirvacan\u012bya)\n- **R\u0101m\u0101nuja (Vi\u015bi\u1e63\u1e6d\u0101dvaita)**: Brahman is real; selves and world are real but dependent on Brahman; S\u1e5b\u1e63\u1e6di is Brahman's genuinely real self-expression; Brahman is the inner controller (antary\u0101min) of all\n- **Madhva (Dvaita)**: Brahman (Vi\u1e63\u1e47u) is independently real; selves and world are real but entirely distinct from and dependent on Brahman; S\u1e5b\u1e63\u1e6di is a real act of creation by Vi\u1e63\u1e47u\n\n## Primary Concepts Using This Reference\n\n- lila-cosmological.md (primary -- BS 2.1.33 and commentary)\n- srishti.md (BS 1.1.2; the cosmological definition of Brahman)\n- ishvara-cosmological.md (the three school interpretations of \u012a\u015bvara's creative role)\n- maya-cosmological.md (\u015aa\u1e45kara's commentary on M\u0101y\u0101 as Brahman's creative power)\n- brahma-the-creator.md (critical note: text is about Brahman not Brahm\u0101)", "references/devi-mahatmya": "# Dev\u012b M\u0101h\u0101tmya (Durg\u0101 Sapta\u015bat\u012b)\n\n## Text Overview\n\nThe Dev\u012b M\u0101h\u0101tmya (\"Glorification of the Goddess\") forms chapters 81-93 of the M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a and is the foundational text of \u015a\u0101kta cosmology and devotion. Comprising 700 verses (hence also called Durg\u0101 Sapta\u015bat\u012b or Ca\u1e47\u1e0d\u012b P\u0101\u1e6dha), it narrates three mythological battles in which the Goddess defeats cosmic demons, each narrative encoding a layer of cosmological and philosophical teaching. It is one of the most recited texts in the Hindu tradition, with daily recitation in many temples and households.\n\n## Structure and Three Charitas\n\n**Prathama Carita (Chapters 1-2): Mahi\u1e63\u0101sura Background and Mah\u0101m\u0101y\u0101 Hymn**\n- Meditation on the nature of the Goddess begins: the sage M\u0101rka\u1e47\u1e0deya explains to the king Suratha and the merchant Sam\u0101dhi why the Goddess is the source of all cosmic power\n- Chapter 1.55-78: The hymn of Mah\u0101m\u0101y\u0101 -- the supreme Goddess identified as the cosmic creative power that creates, maintains, and withdraws the universe\n- *\"She is eternal; she is the world; she projects it and she withdraws it. By her the world is pervaded.\"*\n- *\"She who is eternal creates the world at the time of creation; she maintains it at the time of maintenance; she withdraws it at dissolution -- she is the great M\u0101y\u0101.\"* (1.74-78)\n\n**Madhyama Carita (Chapters 3-4): Mahi\u1e63\u0101sura-Mardana**\n- The demon Mahi\u1e63\u0101sura has driven the gods from heaven; the combined energy (tejas) of all the gods generates the Goddess\n- Critical reading: the text presents this as a revelation (the Goddess IS the primordial \u015aakti; the gods' energies return to their source) not a creation of a new being from component parts\n- The Goddess slays Mahi\u1e63\u0101sura: cosmologically, Mahi\u1e63\u0101sura represents the Tamasic principle of brute power mistaking itself for the ultimate reality\n\n**Uttama Carita (Chapters 5-13): \u015aumbha-Ni\u015bumbha and Final Hymns**\n- Final battle and victory; the Goddess absorbs K\u0101l\u012b (her own fierce form) back into herself\n- The closing hymns (Apar\u0101jit\u0101 Stuti, etc.) present the Goddess as the comprehensive cosmological reality encompassing all roles: protector, creator, liberator, destroyer of ignorance\n\n## Cosmological Significance\n\nThe Dev\u012b M\u0101h\u0101tmya presents a complete **\u015a\u0101kta alternative to the Trim\u016brti cosmological schema**:\n- Not three male deities (Brahm\u0101/Vi\u1e63\u1e47u/\u015aiva) distributed across S\u1e5b\u1e63\u1e6di/Sthiti/Sa\u1e43h\u0101ra\n- But one Goddess in three aspects -- Mah\u0101sarasvat\u012b (S\u1e5b\u1e63\u1e6di), Mah\u0101lak\u1e63m\u012b (Sthiti), Mah\u0101k\u0101l\u012b (Sa\u1e43h\u0101ra) -- governing all three cosmic functions\n\nThis is not a contradiction of the Trim\u016brti but its \u015a\u0101kta re-reading: the three deities are the Goddess's instruments, not her superiors.\n\nThe text also establishes **Mah\u0101m\u0101y\u0101** as the cosmological M\u0101y\u0101 (Brahman's creative power) -- distinct from individual avidy\u0101. The goddess is described as operating the Mah\u0101m\u0101y\u0101 that veils Brahman from ordinary perception while simultaneously manifesting the cosmos.\n\n## Liturgical Role\n\nThe Dev\u012b M\u0101h\u0101tmya is one of the few Sanskrit texts where the words themselves are considered to have cosmological power (mantra): recitation is believed to invoke the Goddess's cosmic functions, not merely describe them. This is consistent with the \u015a\u0101kta-T\u0101ntric view that language (v\u0101k) is itself \u015aakti and that sacred recitation participates in the cosmic creative process.\n\n## Primary Concepts Using This Reference\n\n- maya-cosmological.md (primary -- Mah\u0101m\u0101y\u0101; 1.55-78)\n- shakti-cosmological.md (primary -- Dev\u012b M\u0101h\u0101tmya as central \u015a\u0101kta cosmological text)\n- srishti.md (Mah\u0101sarasvat\u012b aspect)\n- sthiti.md (Mah\u0101lak\u1e63m\u012b aspect)\n- samhara.md (Mah\u0101k\u0101l\u012b aspect)\n- trimurti.md (\u015a\u0101kta alternative reading)\n- markandeya-purana.md (parent text)", "references/manusmriti": "# Manu-Sm\u1e5bti (M\u0101navadharma\u015b\u0101stra)\n\n## Text Overview\n\nThe Manu-Sm\u1e5bti is the most influential of the Dharma\u015b\u0101stra texts, attributed to Manu Sv\u0101yambhuva (the first Manu, progenitor of humanity in the current Manvantara). It covers cosmogony, the Yuga system, var\u1e47a-\u0101\u015brama-dharma, law, ritual, and statecraft across 12 chapters. The text opens with a cosmological section (Adhy\u0101ya 1) that grounds its legal and ethical framework in the cosmic order -- a characteristic move: dharma is not arbitrary but flows from the structure of the cosmos.\n\n## Key Passages for Cosmology-Creation Bundle\n\n**Adhy\u0101ya 1 (Cosmogony):**\n- 1.5-16: Brahman as the self-existent (*svaya\u1e43bh\u016b*) source; emergence of the cosmos through Brahman's creative intention; the Brahm\u0101\u1e47\u1e0da as the primordial housing of all beings; Brahm\u0101 divides himself into male and female halves\n- 1.67-86: The Yuga system with durations: K\u1e5bta (Satya) = 4000 divine years + twilights; Tret\u0101 = 3000; Dv\u0101para = 2000; Kali = 1000 (divine years, not human years); the 4:3:2:1 ratio confirmed\n- 1.69-72: Characteristics of each Yuga: dharma stands on four legs in Satya, progressively losing one leg per Yuga\n\n**Adhy\u0101ya 12 (Karma and Gu\u1e47as across Rebirths):**\n- 12.24-50: How the three Gu\u1e47as determine the species and condition of rebirth; Sattva-dominant beings take higher births; Tamas-dominant beings take lower births; this is the application of the cosmological Gu\u1e47a framework to individual karma\n- The cosmological Trigu\u1e47as (v0.7) here interface directly with individual karma and dharma (dharma-foundation bundle)\n\n## Significance and Limits\n\nThe Manu-Sm\u1e5bti's cosmological section (Adhy\u0101ya 1) is important for:\n1. Confirming the Yuga chronological system across Dharma\u015b\u0101stra (not only Pur\u0101\u1e47ic) literature\n2. Grounding dharma in the cosmic order -- the Yuga one is in determines the appropriate dharmic practice\n3. The Gu\u1e47a-karma-rebirth framework (Adhy\u0101ya 12) shows the cosmological Trigu\u1e47as functioning at the individual level\n\n**Important limitation for OKF**: The Manu-Sm\u1e5bti's social prescriptions (particularly on j\u0101ti, gender, and var\u1e47a hierarchy) represent a specific historical-social codification of dharma that has been highly contested, criticized, and rejected by significant movements within the tradition (including B.R. Ambedkar's public burning of the text in 1927). OKF entries that cite the Manu-Sm\u1e5bti cite it for cosmological content only and note this distinction explicitly.\n\n## Primary Concepts Using This Reference\n\n- yuga.md (Yuga durations; 4:3:2:1 ratio; per-Yuga dharma characteristics)\n- trigunas-cosmological.md (Gu\u1e47as and rebirth -- Adhy\u0101ya 12.24-50)\n- kala.md (Yuga-as-time-unit confirmation across text types)\n- manvantara.md (Manu Sv\u0101yambhuva as the progenitor figure)", "references/markandeya-purana": "# M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a\n\n## Text Overview\n\nThe M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a is one of the 18 Mah\u0101-Pur\u0101\u1e47as, comprising 137 chapters narrated by the sage M\u0101rka\u1e47\u1e0deya. It is notable for containing the Dev\u012b M\u0101h\u0101tmya (chapters 81-93), the foundational text of \u015a\u0101kta cosmology and the earliest surviving systematic treatment of the Goddess as the supreme cosmological reality. The Pur\u0101\u1e47a also contains detailed Manvantara and Kalpa accounts and a remarkable narrative of cosmic dissolution (Pralaya) experienced by M\u0101rka\u1e47\u1e0deya himself swimming in the cosmic waters.\n\n## The Dev\u012b M\u0101h\u0101tmya (Chapters 81-93)\n\nThe Dev\u012b M\u0101h\u0101tmya (also called Durg\u0101 Sapta\u015bat\u012b or Ca\u1e47\u1e0d\u012b P\u0101\u1e6dha: 700 verses in honor of Durg\u0101) is the heart of this Pur\u0101\u1e47a for the cosmology-creation bundle. It comprises three charitas (narratives) in which the Goddess defeats successive cosmic demons, each representing a deeper level of cosmological ignorance or adharma:\n\n- **Prathama Carita (ch. 81-82)**: Mahi\u1e63\u0101sura-mardana; the origin of the Goddess from the combined light (tejas) of all the gods; Mah\u0101m\u0101y\u0101 hymn\n- **Madhyama Carita (ch. 83-85)**: \u015aumbha-Ni\u015bumbha episode; the Goddess as Ambik\u0101 absorbing all powers\n- **Uttama Carita (ch. 86-93)**: Final victory; the hymns of the gods to the Goddess\n\n**Key Cosmological Passages:**\n\n1.55-78: Description of Mah\u0101m\u0101y\u0101 as the eternal Goddess who creates, maintains, and withdraws the cosmos; \"she is the world; she projects it; she withdraws it; by her the world is pervaded.\"\n\n1.74-78: The explicit cosmological statement that the Goddess -- in three aspects -- governs S\u1e5b\u1e63\u1e6di, Sthiti, and Sa\u1e43h\u0101ra: \"She who is eternal creates the world at the time of creation; she maintains it at the time of maintenance; she withdraws it at dissolution -- she is the great M\u0101y\u0101.\"\n\nThe Mah\u0101m\u0101y\u0101 Stuti (hymn of M\u0101y\u0101) presents the \u015a\u0101kta cosmological alternative to the Trim\u016brti: not Brahm\u0101-Vi\u1e63\u1e47u-\u015aiva but the one Dev\u012b in her three cosmic aspects.\n\n## M\u0101rka\u1e47\u1e0deya's Vision of Pralaya\n\nThe Pur\u0101\u1e47a contains a remarkable narrative (not in the Dev\u012b M\u0101h\u0101tmya section) in which the sage M\u0101rka\u1e47\u1e0deya experiences the dissolution of the cosmos and finds himself swimming in the cosmic waters during Pralaya. He encounters a divine child (Vi\u1e63\u1e47u as B\u0101la-Mukunda) resting on a banyan leaf, who informs M\u0101rka\u1e47\u1e0deya that this is the state during Naimittika Pralaya (Kalpa-end dissolution). This narrative gives a first-person phenomenological account of Pralaya that is unique in the Pur\u0101\u1e47ic literature.\n\n## Primary Concepts Using This Reference\n\n- maya-cosmological.md (primary -- Mah\u0101m\u0101y\u0101)\n- shakti-cosmological.md (primary -- Dev\u012b M\u0101h\u0101tmya)\n- samhara.md (Dev\u012b's three functions)\n- sthiti.md (Dev\u012b's three functions)\n- srishti.md (Dev\u012b's three functions)\n- pralaya.md (M\u0101rka\u1e47\u1e0deya's Pralaya vision)\n- devi-mahatmya.md (sub-reference)", "references/matsya-purana": "# Matsya Pur\u0101\u1e47a\n\n## Text Overview\n\nThe Matsya Pur\u0101\u1e47a is one of the 18 Mah\u0101-Pur\u0101\u1e47as, narrated by Vi\u1e63\u1e47u in the form of the Matsya (Fish) Avat\u0101ra to the primordial king Manu at the time of the great Pralaya flood. The text's framing device is itself cosmologically significant: the entire Pur\u0101\u1e47a is spoken within the context of a cosmic dissolution and restoration, making the K\u0101la system and Pralaya central to its narrative structure.\n\n## Key Passages for Cosmology-Creation Bundle\n\n**Chapters 1-6 (Cosmogony and the Matsya Avat\u0101ra Frame):**\n- The Matsya Avat\u0101ra narrative: Manu discovers the divine fish (Vi\u1e63\u1e47u) in a pot of water; the fish warns of the coming great flood (Pralaya); Manu builds a boat; the Matsya tows the boat through the cosmic waters as the world dissolves and is renewed\n- This is both a Pralaya narrative and an Avat\u0101ra narrative: Vi\u1e63\u1e47u descends (Avat\u0101ra principle) precisely at the moment of greatest cosmic need (Sthiti threatened by Pralaya)\n\n**Chapters 2-3 (K\u0101la System):**\n- Yuga definitions consistent with the standard Pur\u0101\u1e47ic framework\n- The Matsya Pur\u0101\u1e47a is notable for including the K\u0101la system within the Pralaya framing narrative, connecting time (K\u0101la) and dissolution (Pralaya) explicitly\n\n**Chapters 167-170 (Brahm\u0101\u1e47\u1e0da and Cosmography):**\n- Description of the Brahm\u0101\u1e47\u1e0da's layers (\u0101vara\u1e47as): the concentric shells of earth, water, fire, air, space, Aha\u1e43k\u0101ra, Mahat, and Avyakta\n- The 14-Loka arrangement within the Brahm\u0101\u1e47\u1e0da\n\n**Chapters 165-166 (Pralaya Types):**\n- Detailed treatment of Naimittika Pralaya (Kalpa-end) including what dissolves and what persists\n- The primordial waters (\u0100pa) as the state of Naimittika Pralaya: Brahm\u0101 sleeps; the three lower Lokas dissolve; Vi\u1e63\u1e47u rests on \u015ae\u1e63a\n\n## Significance for the Bundle\n\nThe Matsya Pur\u0101\u1e47a is particularly important for:\n1. **The Avat\u0101ra-Pralaya connection**: the Matsya Avat\u0101ra directly enacts the principle that Avat\u0101ras descend to maintain Sthiti at the moment of greatest Pralaya threat\n2. **The Brahm\u0101\u1e47\u1e0da cosmography**: one of the clearest accounts of the concentric-shell structure\n3. **The K\u0101la-Pralaya integration**: the text explicitly shows that the time system (K\u0101la) and the dissolution system (Pralaya) are two faces of the same cosmic reality\n\n## Primary Concepts Using This Reference\n\n- avatara.md (Matsya as founding narrative)\n- pralaya.md (Naimittika Pralaya; Pralaya-flood narrative)\n- brahmanda.md (concentric shell structure)\n- sapta-loka.md (cosmography)\n- kala.md (K\u0101la-Pralaya integration)", "references/rigveda-hiranyagarbha-sukta": "# Hira\u1e47yagarbha S\u016bkta -- \u1e5ag Veda 10.121\n\n## Text Overview\n\nThe Hira\u1e47yagarbha S\u016bkta is \u1e5ag Veda 10.121, comprising 10 verses. It is one of the oldest cosmogonic hymns in the Vedic corpus, predating the N\u0101sad\u012bya S\u016bkta (10.129) in the same Ma\u1e47\u1e0dala. The hymn introduces the concept of Hira\u1e47yagarbha (\"golden womb\" or \"golden embryo\") as the first-born of the cosmos (*prathamo j\u0101yata*) -- arising in the primordial waters before heaven and earth were differentiated.\n\n## Key Verses\n\n**RV 10.121.1 (The First-Born)**:\n\"*Hira\u1e47yagarbha\u1e25 samavartat\u0101gre* -- Hira\u1e47yagarbha arose at the beginning; he was the one lord of all that was born. He established the earth and this heaven. Who is the god to whom we shall offer worship?\"\n\nThe refrain \"Who is the god?\" (*kasmai dev\u0101ya havi\u1e63\u0101 vidhema*) recurs in most verses and is answered in the final verse: the god is Praj\u0101pati, the lord of creatures -- but the Upani\u1e63ads and Ved\u0101nta identify Hira\u1e47yagarbha himself as the answer, the self-arising first principle of the manifest cosmos.\n\n**RV 10.121.7 (Waters and Life)**:\n\"He who by his greatness became the sole king of the breathing and the blinking world, who governs all this -- two-footed and four-footed -- to what god shall we offer oblation?\"\n\n## Theological Significance\n\nThe Hira\u1e47yagarbha S\u016bkta gives rise to one of the most important cosmological concepts in the entire tradition. Later texts develop Hira\u1e47yagarbha in two directions:\n\n1. **As Brahm\u0101** (Pur\u0101\u1e47ic): Hira\u1e47yagarbha is identified with Brahm\u0101 as the four-faced creator deity dwelling within the cosmic egg (Brahm\u0101\u1e47\u1e0da); in this usage Hira\u1e47yagarbha and Brahm\u0101 become nearly synonymous at the functional level\n2. **As S\u016btr\u0101tman** (Ved\u0101ntic/Upani\u1e63adic): Hira\u1e47yagarbha is the subtle-cosmic totality, the \"thread-self\" (S\u016btr\u0101tman) that connects all individual subtle bodies; this usage places Hira\u1e47yagarbha between Avyakta and Vir\u0101\u1e6d in the S\u1e5b\u1e63\u1e6di sequence\n\nThe Upani\u1e63ads (esp. Mu\u1e47\u1e0daka 1.1.6; Ch\u0101ndogya 3.19) cite the hymn to ground the concept of the first-born cosmic principle that is both self-arising (not created by a prior agent) and the source from which Brahm\u0101's creative activity flows.\n\n## Primary Concepts Using This Reference\n\n- hiranyagarbha.md (primary)\n- srishti.md\n- brahma-the-creator.md\n- brahmanda.md", "references/rigveda-nasadiya": "# N\u0101sad\u012bya S\u016bkta -- \u1e5ag Veda 10.129\n\n## Text Overview\n\nThe N\u0101sad\u012bya S\u016bkta (named from its opening words: *n\u0101sad \u0101s\u012bn* = \"there was no non-being\") is \u1e5ag Veda 10.129, comprising 7 verses. It is one of the most philosophically discussed texts in all Vedic literature and in comparative philosophy of religion, notable for its refusal to give a definitive cosmogonic answer.\n\n## Verses (Selected Translation)\n\n**RV 10.129.1-2 (Primordial State)**:\n\"Then there was neither being (sat) nor non-being (asat); neither the realm of space nor the sky beyond. What stirred? Where? In whose protection? Was there water, the deep abyss? There was neither death nor immortality then; no sign distinguishing night from day.\"\n\n**RV 10.129.3 (The Breathing One)**:\n\"That one breathed, breathlessly, by its own power. Other than that, there was nothing beyond. Darkness was hidden by darkness in the beginning; all this was an undivided (avi\u015be\u1e63a) ocean. What existed as a thing becoming was covered by emptiness -- that one arose through the power of tapas (heat/austerity).\"\n\n**RV 10.129.4 (First Differentiation)**:\n\"Desire (K\u0101ma) arose first -- that was the first seed of the mind. Poets, seeking within their hearts with wisdom, discovered the connection between being and non-being.\"\n\n**RV 10.129.7 (Epistemological Conclusion)**:\n\"He who is its overseer in the highest heaven -- he knows; or perhaps he does not know.\"\n\n## Philosophical Significance\n\nThe hymn proceeds in three movements: (1) description of the undifferentiated pre-cosmic state transcending the categories of being/non-being, life/death, day/night; (2) the first differentiation through K\u0101ma (creative desire) and tapas (concentrated heat/austerity); (3) epistemological humility culminating in the radical conclusion that even the highest deity may not know the origin.\n\nThe identification of **K\u0101ma** (RV 10.129.4) as the \"first seed of the mind\" is the earliest Sanskrit text to name the cosmological creative impulse -- later systematized as Icch\u0101-\u015aakti in T\u0101ntric traditions and as Brahman's creative will in Ved\u0101nta.\n\nThe final verse (7) is philosophically unique in ancient literature: it refuses resolution from within the frame of any being that exists after creation, since no such being could have witnessed the pre-creation state.\n\n## Primary Concepts Using This Reference\n\n- nasadiya-sukta.md (primary)\n- avyakta.md\n- srishti.md\n- hiranyagarbha.md\n- iccha-jnana-kriya-shakti.md", "references/rigveda-purusha-sukta": "# Puru\u1e63a S\u016bkta -- \u1e5ag Veda 10.90\n\n## Text Overview\n\nThe Puru\u1e63a S\u016bkta (Hymn of the Cosmic Person) is \u1e5ag Veda 10.90, traditionally comprising 16 verses with 8 additional verses found in the Atharva Veda and Yajur Veda recensions. The hymn describes the cosmic Puru\u1e63a as a being of 1000 heads, 1000 eyes, and 1000 feet, who both pervades and transcends the cosmos. Three-quarters of the Puru\u1e63a is \"immortal in heaven\"; one quarter became the manifest world.\n\n## The Cosmic Sacrifice\n\nThe central image is the Puru\u1e63a-medha (cosmic sacrifice): the gods, the \u1e5b\u1e63is, and the seasons collectively offer the Puru\u1e63a himself as the sacrificial oblation. From this cosmic self-offering arise:\n- The Vedas (from his breath and mouth)\n- The Moon (from his mind)\n- The Sun (from his eye)\n- Indra and Agni (from his mouth)\n- V\u0101yu (from his breath)\n- The sky (from his navel)\n- The heavens (from his head)\n- The earth (from his feet)\n- The four directions (from his ears)\n\nThe critical interpretive point: this is a **cosmological process** (one-becoming-many through self-offering), not a description of a literal blood sacrifice. The \"gods\" performing the sacrifice exist after the sacrifice; the hymn is using sacrificial language to describe the structure of manifestation.\n\n## The Var\u1e47a Verses (RV 10.90.11-12)\n\nVerses 11-12 describe the origin of the four var\u1e47as:\n- Br\u0101hma\u1e47a from the Puru\u1e63a's mouth\n- R\u0101janya (K\u1e63atriya) from his arms\n- Vai\u015bya from his thighs\n- \u015a\u016bdra from his feet\n\n**Critical disambiguation**: this is a cosmological-functional differentiation (society as an organic body with differentiated functions), not the origin of birth-based caste (j\u0101ti). Var\u1e47a in the Puru\u1e63a S\u016bkta describes cosmic functions within an organic social body; j\u0101ti is a later social-historical institution that subsequently attached itself to the var\u1e47a framework. The conflation of var\u1e47a (cosmological function) with j\u0101ti (birth-group) is the source of one of the most consequential misreadings in Indian social history.\n\n## Primary Concepts Using This Reference\n\n- purusha-sukta.md (primary)\n- srishti.md\n- trigunas-cosmological.md", "references/samkhya-karika": "# S\u0101\u1e43khya K\u0101rik\u0101\n\n## Text Overview\n\nThe S\u0101\u1e43khya K\u0101rik\u0101 of \u012a\u015bvarak\u1e5b\u1e63\u1e47a is the foundational text of classical S\u0101\u1e43khya philosophy, comprising 72 k\u0101rik\u0101s (concise philosophical verses) that systematically present the S\u0101\u1e43khya cosmological and metaphysical system. It is the oldest surviving systematic S\u0101\u1e43khya text and the basis for all subsequent commentary (Gau\u1e0dap\u0101da's Bh\u0101\u1e63ya, V\u0101caspati's S\u0101\u1e43khya-Tattva-Kaumud\u012b). The text gives the complete 25-tattva (category) analysis of reality.\n\n## The 25 Tattvas (Cosmological Categories)\n\nThe S\u0101\u1e43khya K\u0101rik\u0101 establishes the ontological framework that underlies all subsequent Indian cosmology:\n\n**Two irreducible realities:**\n- Puru\u1e63a (pure consciousness; witness; not a creator; multiple; untouched by Prak\u1e5bti)\n- Prak\u1e5bti (matter-principle; the unmanifest cause of all manifestation; one)\n\n**23 evolved tattvas from Prak\u1e5bti:**\n1. Mahat / Buddhi (cosmic intellect; first evolute of Prak\u1e5bti)\n2. Aha\u1e43k\u0101ra (ego-principle; individualizing force)\n3-7. Five Tanm\u0101tras (subtle sense-essences: \u015aabda, Spar\u015ba, R\u016bpa, Rasa, Gandha)\n8-12. Five Mah\u0101bh\u016btas (gross elements: \u0100k\u0101\u015ba, V\u0101yu, Tejas, Ap, P\u1e5bthiv\u012b)\n13-17. Five J\u00f1\u0101nendriyas (sense organs: ear, skin, eye, tongue, nose)\n18-22. Five Karmendriyas (action organs: speech, hands, feet, reproductive, eliminatory)\n23. Manas (mind; coordinates sense and action organs)\n\n## Key K\u0101rik\u0101s for Cosmology-Creation Bundle\n\n**K\u0101rik\u0101 11-13 (Trigu\u1e47as):** Definition of Sattva (lightness, luminosity), Rajas (activity, stimulation), Tamas (heaviness, obstruction) as the three strands of all Prak\u1e5bti; their qualities and interactions; Sattva enables pleasure and consciousness-reflection; Rajas enables activity; Tamas enables inertia and form-holding.\n\n**K\u0101rik\u0101 22-38 (Tattva Sequence):** The complete derivation sequence from Avyakta (M\u016blaprak\u1e5bti) through Mahat, Aha\u1e43k\u0101ra, the tanm\u0101tras, and the Pa\u00f1camah\u0101bh\u016btas; each evolute arises when the Gu\u1e47a balance shifts; Tamas increases toward the gross elements.\n\n**K\u0101rik\u0101 3 (Satk\u0101ryav\u0101da):** The effect pre-exists in its cause -- one of the most important philosophical propositions for the entire S\u1e5b\u1e63\u1e6di framework. The cosmos does not arise from nothing (ex nihilo) but from Avyakta as its inherent potential; manifestation (S\u1e5b\u1e63\u1e6di) is the actualization of what was always implicitly present in the causal ground.\n\n**K\u0101rik\u0101 17 (Puru\u1e63a as Witness):** Puru\u1e63a is established as the pure witness (s\u0101k\u1e63in), distinct from Prak\u1e5bti; the apparent bondage arises from the confusion of Puru\u1e63a with Prak\u1e5bti's evolutes (Viveka-khy\u0101ti = discriminative knowledge resolves this).\n\n## S\u0101\u1e43khya vs. Ved\u0101nta on Cosmology\n\nThe S\u0101\u1e43khya K\u0101rik\u0101 and Ved\u0101nta share the tattva framework but differ on key points:\n- **Puru\u1e63a**: S\u0101\u1e43khya posits many Puru\u1e63as (one per individual); Advaita posits one Brahman (Puru\u1e63a is one)\n- **God (\u012a\u015bvara)**: Classical S\u0101\u1e43khya is technically nir\u012b\u015bvara (without a personal God); Ved\u0101nta inserts Brahman/\u012a\u015bvara as the ultimate substrate\n- **Pa\u00f1c\u012bkara\u1e47a**: Advaita adds the fivefold combination process for gross element derivation; S\u0101\u1e43khya has direct tanm\u0101tra-to-mah\u0101bh\u016bta evolution\n- **Satk\u0101ryav\u0101da**: Both agree; the effect pre-exists in the cause\n\n## Primary Concepts Using This Reference\n\n- avyakta.md (M\u016blaprak\u1e5bti / Pradh\u0101na)\n- trigunas-cosmological.md (primary -- K\u0101rik\u0101 11-13)\n- panchamahabhuta-cosmological.md (primary -- K\u0101rik\u0101 22-38)\n- srishti.md (Satk\u0101ryav\u0101da; tattva sequence)\n- hiranyagarbha.md (S\u016btr\u0101tman / cosmic Mahat)\n- purusha-sukta.md (Puru\u1e63a concept comparison)", "references/vishnu-purana": "# Vi\u1e63\u1e47u Pur\u0101\u1e47a\n\n## Text Overview\n\nThe Vi\u1e63\u1e47u Pur\u0101\u1e47a is one of the 18 Mah\u0101-Pur\u0101\u1e47as and one of the oldest in its surviving form, primarily Vai\u1e63\u1e47ava in orientation. It is organized in 6 A\u1e43\u015bas (parts) covering cosmogony, cosmology, K\u0101la system, genealogies of kings and sages, and Vi\u1e63\u1e47u's supremacy. It is a primary source for the Yuga-Manvantara-Kalpa chronological framework and for the detailed cosmography of the 14 Lokas.\n\n## Key Passages for Cosmology-Creation Bundle\n\n**A\u1e43\u015ba 1 (Cosmogony and Primary Creation):**\n- 1.2-5 -- Primary S\u1e5b\u1e63\u1e6di: the emergence of Mahat, Aha\u1e43k\u0101ra, tanm\u0101tras, and elements from Avyakta; the S\u0101\u1e43khya-Pur\u0101\u1e47ic tattva sequence\n- 1.2.10-30 -- Hira\u1e47yagarbha / Brahm\u0101 emerging from the cosmic egg; the secondary creation by Brahm\u0101\n\n**A\u1e43\u015ba 1.3 (K\u0101la System):**\n- The definitive classical statement of the Yuga durations: Satya 4000 + 400+400 (twilight) = 4800 divine years; Tret\u0101 3600; Dv\u0101para 2400; Kali 1200 (divine years); note the VP uses divine years consistently\n- Mah\u0101yuga = 12,000 divine years; 1000 Mah\u0101yugas = 1 Kalpa (Day of Brahm\u0101)\n- 14 Manvantaras = 1 Kalpa; each Manvantara = 71+ Mah\u0101yugas\n\n**A\u1e43\u015ba 2 (Cosmography):**\n- 2.2-7 -- The seven continents (Dv\u012bpas) and seven oceans of Bh\u016brloka; the geography of Bh\u0101ratavar\u1e63a\n- 2.7 -- The seven upper Lokas; the seven lower P\u0101t\u0101la realms\n\n**A\u1e43\u015ba 6 (Pralaya):**\n- 6.3-4 -- Naimittika and Mah\u0101 Pralaya; what dissolves at each; Brahm\u0101's sleep and waking\n- 6.5 -- \u0100tyantika Pralaya as individual liberation (Mok\u1e63a); distinction from cosmic Pralayas\n\n## Tradition and Authority\n\nThe Vi\u1e63\u1e47u Pur\u0101\u1e47a is cited by \u015aa\u1e45kar\u0101c\u0101rya in his Brahma S\u016btra Bh\u0101\u1e63ya, making it one of the few Pur\u0101\u1e47as recognized as authoritative by Advaita Ved\u0101nta. For the K\u0101la system (Yuga durations, Kalpa structure, Manvantara count), the Vi\u1e63\u1e47u Pur\u0101\u1e47a and the Bh\u0101gavata Pur\u0101\u1e47a together are the two primary textual authorities.\n\n## Primary Concepts Using This Reference\n\n- kala.md, yuga.md, mahayuga.md, kalpa.md, manvantara.md (K\u0101la system)\n- pralaya.md (Pralaya typology)\n- brahma-the-creator.md, hiranyagarbha.md (S\u1e5b\u1e63\u1e6di sequence)\n- sapta-loka.md, brahmanda.md (cosmography)"}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
