\n4. Taittir\u012bya Upani\u1e63ad 3.6 -- *\u0101nanda\u1e43 brahmeti*: \u0101nanda as Brahman's nature, the root of why creation as L\u012bl\u0101 is coherent", "concepts/mahayuga": "# Mah\u0101yuga / Caturyuga \u2014 \u092e\u0939\u093e\u092f\u0941\u0917\n\n**Not:** equivalent to a single Yuga; equivalent to a Kalpa\n\n## The Mathematical Structure\n\nThe Mah\u0101yuga (also Caturyuga or Divya-Yuga) is the smallest complete unit of the Pur\u0101\u1e47ic cosmic calendar:\n\n| Component | Duration |\n|-----------|----------|\n| Satya Yuga (+ Sandhy\u0101s) | 1,728,000 years |\n| Tret\u0101 Yuga (+ Sandhy\u0101s) | 1,296,000 years |\n| Dv\u0101para Yuga (+ Sandhy\u0101s) | 864,000 years |\n| Kali Yuga (+ Sandhy\u0101s) | 432,000 years |\n| **Mah\u0101yuga total** | **4,320,000 years** |\n\nThe ratio 4:3:2:1 is a precise mathematical structure, not an approximation. The base unit is the Kali Yuga (432,000 years); multiplying by 10 gives the Satya Yuga (4,320,000 = one Mah\u0101yuga). The number 432 and its multiples appear throughout the Pur\u0101\u1e47ic time-scale.\n\n## The Nesting Hierarchy\n\nThe Mah\u0101yuga is the unit from which all larger Pur\u0101\u1e47ic time-scales are built:\n\n```\n1 Mah\u0101yuga = 4,320,000 human years\n71 Mah\u0101yugas \u2248 1 Manvantara\n1000 Mah\u0101yugas = 1 Kalpa (day of Brahm\u0101)\n2 Kalpas = 1 Brahm\u0101-day + night\n360 Brahm\u0101-days = 1 Brahm\u0101-year\n100 Brahm\u0101-years = Brahm\u0101's lifespan (~311 trillion human years)\n```\n\n## Why the Cycle Resets\n\nEach Mah\u0101yuga represents one complete cycle of dharma's rise and decline. After the Kali Yuga ends, a new Satya Yuga begins \u2014 not a new universe, but a new cycle within the same Kalpa. The Pralaya at the end of a Kali Yuga is typically the Nitya Pralaya (constant dissolution at the micro-scale) or, if it falls at the end of a Brahm\u0101-day, the Naimittika Pralaya. The Mah\u0101 Pralaya occurs only at the end of Brahm\u0101's lifespan (see pralaya.md).\n\n## Audience Metaphor\n\nThe Mah\u0101yuga is like a complete musical phrase that repeats throughout a symphony. The Kali Yuga is its final note \u2014 not a collapse but a resolution that sets up the next repetition. One thousand of these phrases (Mah\u0101yugas) constitute a single \"movement\" (Kalpa) of the cosmic symphony, after which a longer rest (Naimittika Pralaya) occurs before the next movement begins.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 3.11.18-20 \u2014 definitive Mah\u0101yuga duration statement\n2. Manu-Sm\u1e5bti 1.69-71 \u2014 Mah\u0101yuga calculation; see references/manusmriti.md\n3. Vi\u1e63\u1e47u Pur\u0101\u1e47a 1.3 \u2014 Mah\u0101yuga in the nested time-scale system; see references/vishnu-purana.md", "concepts/manvantara": "# Manvantara \u2014 \u092e\u0928\u094d\u0935\u0928\u094d\u0924\u0930\n\n**Not:** prehistoric epoch, evolutionary era, equivalent to a Kalpa\n\n## What a Manvantara Is\n\nManvantara = \"Manu's interval\" (Manu + antara). Each Manvantara is a complete cosmic epoch governed by its own:\n- **Manu**: the progenitor-archetype of beings in that epoch; the cosmological \"parent\" of humanity during that period\n- **Indra**: the king of the gods for that epoch (a role, not a fixed person)\n- **Saptar\u1e63is**: seven sages who maintain Vedic knowledge through the epoch\n- **Vi\u1e63\u1e47u-Avat\u0101ra**: a specific manifestation of Vi\u1e63\u1e47u appropriate to that epoch's needs\n\nEach epoch runs for 71 Mah\u0101yugas (approximately 306,720,000 human years). The 14 Manvantaras within a Kalpa are separated by junctions (Manvantara Sandhy\u0101s), each equal to one Satya Yuga (1.728 million years), during which the three worlds are briefly flooded and renewed.\n\n## The 14 Manus (Vaivasvata Kalpa)\n\n| # | Manu | Associated Avat\u0101ra |\n|---|------|--------------------|\n| 1 | Sv\u0101yambhuva | Matsya (in some accounts) |\n| 2 | Sv\u0101roci\u1e63a | \u2014 |\n| 3 | Uttama | \u2014 |\n| 4 | T\u0101masa | \u2014 |\n| 5 | Raivata | \u2014 |\n| 6 | C\u0101k\u1e63u\u1e63a | \u2014 |\n| **7** | **Vaivasvata** (current) | **V\u0101mana, R\u0101ma, K\u1e5b\u1e63\u1e47a** |\n| 8 | S\u0101var\u1e47i | S\u0101var\u1e47i-\u015aambhu Avat\u0101ra (prophesied) |\n| 9-14 | Various | Prophesied |\n\nThe current Manvantara is the 7th: Vaivasvata Manu's epoch.\n\n## Vaivasvata Manu: the Current Progenitor\n\nVaivasvata Manu is the \"progenitor\" of the current human lineage in the cosmological sense \u2014 not a biological ancestor but the archetypal pattern for humanity in this Manvantara. The Vi\u1e63\u1e47u-Pur\u0101\u1e47a's Matsya Avat\u0101ra story (Vi\u1e63\u1e47u as a fish warning Manu of the cosmic flood and saving the Vedas) occurs in the transition to the Vaivasvata Manvantara and establishes Vaivasvata Manu as the re-founder of this epoch's humanity.\n\nThe parallel with Noah's ark and similar flood narratives in other cultures is striking and has been extensively noted; the cosmological framework \u2014 a progenitor, a flood, the preservation of sacred knowledge \u2014 is common to many traditions while the specific cosmological architecture differs.\n\n## Audience Metaphor\n\nEach Manvantara is like a new software instance on the same cosmic operating system. The OS (the Kalpa) remains; the running instance (the Manu, the saptar\u1e63is, the Indra) is refreshed at each Manvantara boundary. Files from the previous instance do not automatically carry over; the saptar\u1e63is preserve the Vedas as the \"seed data\" that initializes each new epoch.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 8.1-24 \u2014 comprehensive treatment of all 14 Manvantaras; the most complete Pur\u0101\u1e47ic account\n2. Vi\u1e63\u1e47u Pur\u0101\u1e47a 3.1-2 \u2014 Manvantara structure and Manu lists; see references/vishnu-purana.md\n3. Manu-Sm\u1e5bti 1.61-63 \u2014 Manu as progenitor and the time-scale framework; see references/manusmriti.md\n4. Matsya Pur\u0101\u1e47a \u2014 detailed Manvantara tables; see references/matsya-purana.md", "concepts/maya-cosmological": "# M\u0101y\u0101 (Cosmological) -- \u092e\u093e\u092f\u093e\n\n**Not:** the world is unreal, the same as avidy\u0101, God's deception\n\n## Two Levels of M\u0101y\u0101\n\nThe most important disambiguation in the entire M\u0101y\u0101 complex:\n\n**Mah\u0101m\u0101y\u0101 (Cosmological M\u0101y\u0101)**: Brahman's own creative power operating at the cosmic level; the principle by which the non-dual absolute appears as the differentiated cosmos; operates before any individual j\u012bva exists; source of the entire S\u1e5b\u1e63\u1e6di process. This is v0.7's subject.\n\n**Avidy\u0101 / Individual M\u0101y\u0101**: The individual j\u012bva's beginningless ignorance that prevents recognition of its identity with Brahman; operates at the individual level; the cause of sa\u1e43s\u0101ra for each j\u012bva. This is v0.5 (upanishadic-core) territory.\n\nThe relationship: Mah\u0101m\u0101y\u0101 creates the conditions within which individual avidy\u0101 operates. But Mah\u0101m\u0101y\u0101 does not reduce to many individual avidy\u0101s, nor does individual avidy\u0101 cause the cosmic S\u1e5b\u1e63\u1e6di. They are structurally related but ontologically distinct levels of the same principle.\n\n## The Status of M\u0101y\u0101: Anirvacan\u012bya\n\nAdvaita Ved\u0101nta's technical position: M\u0101y\u0101 is anirvacan\u012bya -- \"indescribable,\" specifically \"neither real (sat) nor unreal (asat)\":\n\n- M\u0101y\u0101 cannot be said to be **real (sat)**: because if M\u0101y\u0101 were ultimately real, it would be a second reality alongside Brahman, contradicting non-duality\n- M\u0101y\u0101 cannot be said to be **unreal (asat)**: because if M\u0101y\u0101 were simply unreal (like a square circle), it could not produce the real effects of the manifest cosmos\n\nThe position \"neither real nor unreal\" is not a logical contradiction but an epistemological statement about the limits of binary categories. Just as a dream is neither real (it has no waking-state objects) nor simply unreal (it produces real effects: fear, pleasure, memories), M\u0101y\u0101 / the cosmic dream is neither absolutely real nor simply unreal. Its resolution comes when Brahman-knowledge (j\u00f1\u0101na) arises -- at which point M\u0101y\u0101's products are recognized as Brahman-in-appearance.\n\n## Mah\u0101m\u0101y\u0101 in the Dev\u012b M\u0101h\u0101tmya\n\nThe Dev\u012b M\u0101h\u0101tmya (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a 81-93) provides the \u015a\u0101kta cosmological treatment of M\u0101y\u0101 as Mah\u0101m\u0101y\u0101 -- the Great Goddess herself:\n\n\"She is eternal; she is the world; she projects and she withdraws; by her the world is pervaded. In time of continued existence she maintains the world in the form of a woman, and at the time of dissolution she is [identified with] Mah\u0101-Pralaya.\"\n\nIn this framework, M\u0101y\u0101 is not Brahman's subordinate power but the supreme creative reality itself -- the Goddess whose triple form is S\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra expressed as feminine principle. This is the \u015a\u0101kta alternative to the Trim\u016brti: not Brahm\u0101-Vi\u1e63\u1e47u-\u015aiva (male) but the one Dev\u012b in her three aspects.\n\n## Yogam\u0101y\u0101: M\u0101y\u0101 as Vi\u1e63\u1e47u's Creative Agency\n\nThe Pur\u0101\u1e47ic Vai\u1e63\u1e47ava framework uses the term Yogam\u0101y\u0101 for the creative power through which Vi\u1e63\u1e47u generates and maintains the cosmos. Yogam\u0101y\u0101 is Vi\u1e63\u1e47u's own \u015aakti, by which he both creates the cosmos and causes beings within it to experience his veiling. In BG 7.25: \"I am not manifest to all, veiled by Yogam\u0101y\u0101; this deluded world does not know me, the unborn, the imperishable.\"\n\nThe distinction Yogam\u0101y\u0101/Mah\u0101m\u0101y\u0101/avidy\u0101 follows sectarian lines but the cosmological function -- the power by which the one appears as many -- is consistent across all readings.\n\n## Audience Metaphor\n\nM\u0101y\u0101 (cosmological) is like the screen in a cinema. The screen itself is pure, white, undifferentiated (Brahman). The projector (Brahman's \u015aakti) casts the film (the manifest cosmos) onto the screen. What you see (the film) is neither simply real (the characters are not actually on the screen) nor simply unreal (you genuinely see images; the emotional effects are real). When the film ends, the screen reveals itself as it always was: pure, undifferentiated, unaffected by the dramas projected onto it. Avidy\u0101 (individual M\u0101y\u0101) is like forgetting you are watching a film -- becoming so absorbed in the story that the screen itself is forgotten. Mah\u0101m\u0101y\u0101 is the power of projection; avidy\u0101 is the forgetting.\n\n## Citations\n\n1. Vivekac\u016b\u1e0d\u0101ma\u1e47i 105-112 (\u015aa\u1e45kar\u0101c\u0101rya) -- M\u0101y\u0101 as anirvacan\u012bya; the neither-real-nor-unreal doctrine\n2. Dev\u012b M\u0101h\u0101tmya 1.55-78 (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a) -- Mah\u0101m\u0101y\u0101 as the supreme Goddess; see references/markandeya-purana.md and references/devi-mahatmya.md\n3. Bh\u0101gavata Pur\u0101\u1e47a 2.5.18 -- M\u0101y\u0101-\u015aakti as the productive power of Brahman; see references/bhagavata-purana.md\n4. Bhagavad G\u012bt\u0101 7.25 -- Yogam\u0101y\u0101 as Vi\u1e63\u1e47u's veiling-and-creating power\n\n## Error Genealogy\n\n- M\u0101y\u0101-as-\"illusion\" (the world does not exist) was broadcast into Western philosophy by Schopenhauer's \"veil of Maya\" (*The World as Will and Representation*, 1818/1844) and completed by popular culture; the flattening erases the corpus's four distinct m\u0101y\u0101-level treatments at once. See [G8 \u2014 M\u0101y\u0101 = illusion](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/nasadiya-sukta": "# N\u0101sad\u012bya S\u016bkta -- \u0928\u093e\u0938\u0926\u0940\u092f \u0938\u0942\u0915\u094d\u0924\n\n**Not:** proof of Vedic atheism, an ancient Big Bang theory, nihilistic denial of existence\n\n## The Seven Verses: Structure\n\nThe N\u0101sad\u012bya S\u016bkta (from its opening words: n\u0101sad \u0101s\u012bn = \"there was no non-being\") proceeds in three movements:\n\n**Verses 1-3: The Primordial Undivided State**\n- \"Then there was neither being (sat) nor non-being (asat)\"\n- \"There was neither death nor immortality; no sign of day or night\"\n- \"That one breathed, breathless, by its own power -- other than that, there was nothing whatsoever\"\n- \"Darkness was hidden in darkness\"\n- \"The undivided (avi\u015be\u1e63a) was impelled by the power of tapas (intense heat / austerity)\"\n\n**Verses 4-5: The First Differentiation**\n- \"K\u0101ma (desire / creative impulse) arose first -- the first seed of the mind\"\n- \"The seers, searching within their hearts, discovered the bond between being and non-being\"\n- \"Their rope stretched across: was there something above, something below?\"\n\n**Verses 6-7: The Epistemological Humility**\n- \"Who truly knows? Who here will proclaim it? Whence was it produced? Whence is this creation?\"\n- \"The gods came later than this world's production -- so who knows whence it arose?\"\n- \"That from which this creation arose -- whether it held it together or did not -- its overseer in the highest heaven -- perhaps he knows, or perhaps he does not know.\"\n\n## The First Seed: K\u0101ma\n\nThe emergence of K\u0101ma (desire, creative will) as the \"first seed of the mind\" is one of the oldest attempts in any tradition to name the first principle of manifestation. In Ved\u0101ntic terms, K\u0101ma here corresponds to Icch\u0101-\u015aakti (the will-power that initiates S\u1e5b\u1e63\u1e6di). This is not sexual desire in the ordinary sense but the primordial creative impulse -- the first stir of Avyakta toward manifestation.\n\nThis verse is the seed of a long philosophical tradition: what initiates the movement from Avyakta to manifest? The answers vary (K\u0101ma, Icch\u0101, Brahman's \u015aakti, the proximity of Puru\u1e63a to Prak\u1e5bti in S\u0101\u1e43khya) -- but the N\u0101sad\u012bya S\u016bkta is the first surviving text to pose the question as a question.\n\n## The Epistemological Conclusion\n\nThe N\u0101sad\u012bya S\u016bkta is unique in the Vedic corpus for its refusal to give a definitive answer. Verse 7 is the most radical: \"Perhaps he [the overseer in the highest heaven] knows -- or perhaps he does not know.\" This is not cynicism but philosophical precision: the hymn recognizes that any being within the manifest cosmos -- even the highest deity -- is a result of the S\u1e5b\u1e63\u1e6di process and therefore cannot have witnessed the state before S\u1e5b\u1e63\u1e6di from outside. The question \"what was before the beginning?\" is, by definition, unanswerable from within the frame of what came after.\n\nAdvaita Ved\u0101nta's response is that Brahman as Nirgu\u1e47a (attribute-less, beyond subject-object) is the answer -- but Brahman cannot be \"known\" in the ordinary epistemological sense because knowledge requires a subject-object split, which Brahman transcends. The N\u0101sad\u012bya's agnostic conclusion and Advaita's \"neti neti\" approach converge here.\n\n## Audience Metaphor\n\nThe N\u0101sad\u012bya S\u016bkta is asking: what did the room look like before anyone was in it to see it? Not \"was the room empty?\" (that still requires a seer to observe the emptiness) -- but \"what was the state before any observation, any witness, any seer was possible?\" The hymn concludes: this question may not be answerable by any being whose existence presupposes the room. The room came into being at the same moment as the seer; the pre-room state was neither the room nor its absence but something prior to the distinction itself.\n\n## Citations\n\n1. \u1e5ag Veda 10.129 -- the 7-verse N\u0101sad\u012bya S\u016bkta; see references/rigveda-nasadiya.md\n2. Compared with BhP 2.5-6 (the Pur\u0101\u1e47ic cosmogonic sequence that gives the definitive Vai\u1e63\u1e47ava answer to the N\u0101sad\u012bya's open question); see references/bhagavata-purana.md", "concepts/panchamahabhuta-cosmological": "# Pa\u00f1camah\u0101bh\u016bta (Cosmological) -- \u092a\u091e\u094d\u091a\u092e\u0939\u093e\u092d\u0942\u0924\n\n**Not:** equivalent to Greek four elements, independently existing substances, literal physical earth/fire/water/air\n\n## The Five Great Elements and Their Derivation\n\nThe Pa\u00f1camah\u0101bh\u016btas (pa\u00f1ca = five, mah\u0101 = great, bh\u016bta = being/element) are the five fundamental categories of gross physical existence in the S\u0101\u1e43khya-Ved\u0101ntic cosmological framework:\n\n| Element | Sanskrit | Quality (Gu\u1e47a) | Tanm\u0101tra (Subtle Sense-Essence) | Sense Organ |\n|---------|----------|----------------|----------------------------------|-------------|\n| Space | \u0100k\u0101\u015ba | Sound (\u015babda) | \u015aabda-tanm\u0101tra | Ear (\u015brotra) |\n| Air | V\u0101yu | Touch (spar\u015ba) | Spar\u015ba-tanm\u0101tra | Skin (tvak) |\n| Fire | Tejas/Agni | Form/light (r\u016bpa) | R\u016bpa-tanm\u0101tra | Eye (cak\u1e63us) |\n| Water | Ap/Jala | Taste (rasa) | Rasa-tanm\u0101tra | Tongue (rasan\u0101) |\n| Earth | P\u1e5bthiv\u012b | Smell (gandha) | Gandha-tanm\u0101tra | Nose (ghr\u0101\u1e47a) |\n\nThe derivation sequence: each element arises from its corresponding tanm\u0101tra (subtle sense-essence). The tanm\u0101tras arise from Tamas-dominant Aha\u1e43k\u0101ra. Aha\u1e43k\u0101ra arises from Mahat. Mahat arises from Avyakta. The entire sequence is one continuous evolution of Prak\u1e5bti.\n\nEach element adds the sensory quality of the element before it:\n- \u0100k\u0101\u015ba: only sound\n- V\u0101yu: sound + touch\n- Tejas: sound + touch + form/light\n- Ap: sound + touch + form + taste\n- P\u1e5bthiv\u012b: sound + touch + form + taste + smell (the densest, containing all five qualities)\n\n## Pa\u00f1c\u012bkara\u1e47a: the Ved\u0101ntic Fivefold Combination\n\nIn the Advaita Ved\u0101nta framework (developed in Vivekac\u016b\u1e0d\u0101ma\u1e47i and Pa\u00f1cada\u015b\u012b), the five gross elements do not arise directly from the five tanm\u0101tras but through a process called Pa\u00f1c\u012bkara\u1e47a (\"fivefold-ing\"):\n\n1. Each tanm\u0101tra splits in two\n2. One half remains as is; the other half is divided into four equal parts\n3. Each of the five \"half-portions\" receives one-eighth from each of the other four elements\n\nThe result: every gross element contains all five in specific proportions (1/2 of itself + 1/8 each of the other four). This is why physical reality is not purely any one element: \"earth\" also has air, water, fire, and space within it; \"space\" has earth, water, fire, and air within it. Everything contains everything; only the proportions vary.\n\nThis Pa\u00f1c\u012bkara\u1e47a doctrine is one of the reasons \u0100yurveda can describe how all five elements are present in every bodily tissue (dh\u0101tu), each tissue just having a different Bh\u016bta-dominance.\n\n## The Taittir\u012bya Upani\u1e63ad Sequence\n\nThe Taittir\u012bya Upani\u1e63ad (2.1-5) gives the cosmological derivation as: \"From Brahman arose \u0100k\u0101\u015ba; from \u0100k\u0101\u015ba, V\u0101yu; from V\u0101yu, Agni (Tejas); from Agni, Ap (water); from Ap, P\u1e5bthiv\u012b (earth); from earth, plants; from plants, food; from food, the human body.\" This is the Vedic-Upani\u1e63adic version of the same sequence, presented as a continuous derivation from Brahman through the elements to the human body -- encoding the macrocosm-microcosm identity at the elemental level.\n\n## Audience Metaphor\n\nThe five elements are like five layers of a painting being built up from the most transparent to the most opaque. \u0100k\u0101\u015ba (space) is the blank canvas -- present in everything, structuring everything, but itself formless. V\u0101yu (air) is the first wash of color -- movement is now possible. Tejas (fire) adds visibility -- things can now be seen. Ap (water) adds texture and fluidity -- things flow and cohere. P\u1e5bthiv\u012b (earth) is the final impasto layer -- solid, fully rendered, visible and tangible from every angle. The painting is all five layers simultaneously; removing any one layer changes the nature of the whole.\n\n## Citations\n\n1. Taittir\u012bya Upani\u1e63ad 2.1-5 -- the Upani\u1e63adic derivation sequence from Brahman through the five elements to the human body\n2. S\u0101\u1e43khya K\u0101rik\u0101 22-38 -- the five tanm\u0101tras and five mah\u0101bh\u016btas in the tattva evolution sequence; see references/samkhya-karika.md\n3. Bh\u0101gavata Pur\u0101\u1e47a 3.26.12-49 -- detailed Pur\u0101\u1e47ic treatment of the tattva sequence including element derivation; see references/bhagavata-purana.md\n4. Pa\u00f1cada\u015b\u012b 1.15-28 (Vidy\u0101ra\u1e47ya) -- Pa\u00f1c\u012bkara\u1e47a: the fivefold combination process; Advaita Ved\u0101nta's systematic treatment", "concepts/pralaya": "# Pralaya \u2014 \u092a\u094d\u0930\u0932\u092f\n\n**Not:** universal annihilation, synonymous with Sa\u1e43h\u0101ra, a singular apocalyptic event\n\n## The Four Types of Pralaya\n\nThis is the most critically misrepresented structure in Pur\u0101\u1e47ic cosmology. The Bh\u0101gavata Pur\u0101\u1e47a (12.4.3-6) enumerates four distinct Pralayas. Conflating them is the single most common AI error in this domain.\n\n### 1. Nitya Pralaya (\u0928\u093f\u0924\u094d\u092f \u092a\u094d\u0930\u0932\u092f) -- Daily / Constant Dissolution\n\n**Scale:** Individual, momentary.\n\nNitya Pralaya is the dissolution of every momentary state of experience into the next moment. Sleep is the most accessible example: the waking consciousness dissolves every night; the dreaming consciousness dissolves at waking. At the finest level, every moment of perception dissolves as the next arises. Death is a larger Nitya Pralaya for an individual being.\n\n**What persists:** The subtle body (s\u016bk\u1e63ma-\u015bar\u012bra) and causal body (k\u0101ra\u1e47a-\u015bar\u012bra) carry forward; the accumulated karma (sa\u1e43sk\u0101ras) are not lost.\n\n### 2. Naimittika Pralaya (\u0928\u0948\u092e\u093f\u0924\u094d\u0924\u093f\u0915 \u092a\u094d\u0930\u0932\u092f) -- Occasional / Kalpa-End Dissolution\n\n**Scale:** The three lower worlds (Bh\u016br, Bhuvar, Svar).\n\nNaimittika (\"occasional\" or \"appointed\") Pralaya occurs at the end of each Kalpa -- at the end of Brahm\u0101's day (after 4.32 billion years), when Brahm\u0101 \"sleeps.\" The three lower worlds dissolve into water; higher lokas (Mahar, Jana, Tapa, Satya) persist; Brahm\u0101 himself persists. When Brahm\u0101's day restarts (the next Kalpa begins), S\u1e5b\u1e63\u1e6di resumes.\n\n**What persists:** Brahm\u0101, the higher lokas, the subtle bodies of beings from the three lower worlds (carrying karma), and the saptar\u1e63is who preserve the Vedas across Kalpas.\n\nThis is the Pralaya the Matsya Avat\u0101ra story (the great flood narrative) refers to: the waters of the Naimittika Pralaya, and Manu's boat preserving the Vedic seed-knowledge.\n\n### 3. Mah\u0101 Pralaya (\u092e\u0939\u093e \u092a\u094d\u0930\u0932\u092f) -- Great Dissolution\n\n**Scale:** The entire manifest cosmos including all 14 Lokas, Brahm\u0101 himself, and all beings except those who have attained liberation.\n\nMah\u0101 Pralaya occurs at the end of Brahm\u0101's full lifespan (100 Brahm\u0101-years = approximately 311 trillion human years). The entire manifest cosmos -- all 14 Lokas, all beings in any loka, Brahm\u0101 himself, the subtle and causal bodies, the Avyakta/Prak\u1e5bti level -- dissolves back into Brahman. Brahman alone remains, as pure Sat-Cit-\u0100nanda without manifestation.\n\n**What persists:** Only Brahman. All individual distinctions, all karmic seeds, all subtle bodies dissolve into Avyakta and ultimately into Brahman. The next Brahm\u0101 and the next cycle will begin fresh -- but \"fresh\" here means a new S\u1e5b\u1e63\u1e6di, not that prior karma is tracked (the framework varies by school on this point).\n\n### 4. \u0100tyantika Pralaya (\u0906\u0924\u094d\u092f\u0928\u094d\u0924\u093f\u0915 \u092a\u094d\u0930\u0932\u092f) -- Absolute / Individual Liberation\n\n**Scale:** Individual liberation; dissolution of the individual's apparent separateness into Brahman.\n\n\u0100tyantika (\"absolute\" or \"without return\") Pralaya is Mok\u1e63a itself -- the permanent dissolution of individual ignorance and the recognition of the j\u012bva's identity with Brahman. Unlike the other three types, \u0100tyantika Pralaya is not cosmic in scale; it applies to one j\u012bva at the moment of liberation.\n\nIn Advaita: \u0100tyantika Pralaya is the recognition that the j\u012bva was never separate -- the apparent dissolution is the lifting of M\u0101y\u0101's veil.\n\nIn Vi\u015bi\u1e63\u1e6d\u0101dvaita: liberated j\u012bvas persist as distinct but enter Brahman's body in the liberated state (S\u0101lokya, S\u0101m\u012bpya, S\u0101r\u016bpya, S\u0101yujya stages).\n\n**What persists:** Brahman. For the liberated j\u012bva: all ignorance, all karma, all rebirth cycles permanently cease.\n\n## The Critical Summary Table\n\n| Type | Scale | Trigger | What Dissolves | What Persists |\n|------|-------|---------|----------------|---------------|\n| Nitya | Individual moment | Each moment / sleep / death | Momentary state / current body | Subtle body, karma |\n| Naimittika | Three lower worlds | End of each Kalpa | Bh\u016br/Bhuvar/Svar | Brahm\u0101, higher lokas, subtle bodies |\n| Mah\u0101 | All 14 Lokas | End of Brahm\u0101's lifespan | Entire manifest cosmos | Brahman alone |\n| \u0100tyantika | Individual liberation | Mok\u1e63a (varies by school) | Individual ignorance and karma | Brahman / liberated awareness |\n\n## Audience Metaphor\n\nThe four Pralayas are like four different things that can be called \"closing\":\n\n- Nitya Pralaya: closing your eyes briefly (moments pass, the world seems to rest).\n- Naimittika Pralaya: closing a browser tab at the end of a work session (the session ends; the browser remains; tomorrow you reopen).\n- Mah\u0101 Pralaya: closing the computer entirely and returning it to the factory (all current sessions, all applications, all data cleared; the hardware alone persists ready for a fresh install).\n- \u0100tyantika Pralaya: the user themselves understanding that they were always the screen -- not the applications -- and that all the \"sessions\" were movements on their own awareness.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 12.4.3-6 -- canonical fourfold classification of Pralaya; the most precise Pur\u0101\u1e47ic source\n2. Vi\u1e63\u1e47u Pur\u0101\u1e47a 6.3-4 -- Mah\u0101 Pralaya and the dissolution of the manifest cosmos; see references/vishnu-purana.md\n3. M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a 81-93 -- Naimittika Pralaya and the cosmic ocean narrative; see references/markandeya-purana.md\n4. Bh\u0101gavata Pur\u0101\u1e47a 3.11 -- time-scale of Naimittika Pralaya within Brahm\u0101's day-night cycle", "concepts/purusha-sukta": "# Puru\u1e63a S\u016bkta -- \u092a\u0941\u0930\u0941\u0937 \u0938\u0942\u0915\u094d\u0924\n\n**Not:** a literal sacrifice account, the origin of birth-based caste, exclusively a Vi\u1e63\u1e47ava text\n\n## Structure and Dating\n\nThe Puru\u1e63a S\u016bkta (RV 10.90) is one of the most celebrated and most analyzed hymns in Vedic literature. It is generally regarded by scholars as a late addition to the \u1e5ag Veda (Book 10 is considered later than most of the other books) and as one of the foundational cosmological and social texts of the Vedic tradition. The hymn has 24 verses; the consensus among text historians is that the original hymn had 16 and 8 were added later.\n\nThe hymn is found with variations in:\n- \u1e5ag Veda 10.90 (16 verses in the oldest layer)\n- \u015aukla Yajurveda 31 (most widely used liturgical version)\n- Atharva Veda 19.6\n\n## The Cosmic Puru\u1e63a\n\nThe hymn opens with a description of the Puru\u1e63a's cosmic magnitude:\n- He has a thousand heads (sahasra\u015b\u012br\u1e63\u0101), a thousand eyes (sahasr\u0101k\u1e63a), a thousand feet (sahasrap\u0101t)\n- He encompasses the entire earth on all sides and extends ten fingers beyond\n- Three-quarters of him is immortal in the heavens; one-quarter is here in the manifest world\n\nThis is not anatomy but cosmological proportion: the manifest cosmos is only one-quarter of the Puru\u1e63a's total reality. Three-quarters remains unmanifest, transcendent. This encoding maps onto the M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad's tur\u012bya framework: three states (waking/dreaming/sleep = three-quarters manifest) and the fourth (tur\u012bya = the transcendent three-quarters that doesn't enter manifestation).\n\n## The Cosmic Sacrifice and Differentiation\n\nThe central section describes a cosmic sacrifice in which the primordial Puru\u1e63a is the offering:\n\n- From his mind (manas) was born the moon (Candra)\n- From his eye was born the sun (S\u016brya)\n- From his mouth: Indra and Agni\n- From his breath (pr\u0101\u1e47a): V\u0101yu\n- From his navel: the mid-space (antarik\u1e63a)\n- From his head: the sky (dyaus)\n- From his feet: the earth (bh\u016bmi)\n- From his ear: the directions\n\nThis is a macrocosm-microcosm homology: the cosmic body generates the cosmos's elements. The same structure recurs in BhP 2.1.23-39 (the Vir\u0101\u1e6d as cosmic body). The cosmos is the Puru\u1e63a made external.\n\n## The Var\u1e47a Verses\n\nVerses 11-12 of the Puru\u1e63a S\u016bkta state:\n- From his mouth: Br\u0101hma\u1e47a\n- From his two arms: R\u0101janya (K\u1e63atriya)\n- From his thighs: Vai\u015bya\n- From his feet: \u015a\u016bdra\n\nThese verses have been the most cited and most misread in the entire Vedic corpus. The correct cosmological reading: var\u1e47a is presented as a cosmic function-differentiation, not a social hierarchy. Mouth = speech/teaching function; arms = protection/rule function; thighs = economic/production function; feet = service/foundation function. The Puru\u1e63a's body is complete only when all four are present and functioning. None is independent of the others.\n\nThe misreading: using these verses to legitimate a birth-based hereditary caste system. This conflates var\u1e47a (functional role in cosmic and social order) with j\u0101ti (birth-community). The Puru\u1e63a S\u016bkta does not mention j\u0101ti. The conflation happened gradually over centuries of Dharma\u015b\u0101stra literature. Any AI system that cites the Puru\u1e63a S\u016bkta as Vedic sanction for hereditary caste hierarchy is repeating a post-Vedic conflation.\n\n## Audience Metaphor\n\nThe Puru\u1e63a S\u016bkta's cosmic sacrifice is like the sun emitting light: the sun does not diminish when it gives light to the world; the light IS the sun in a different mode. The Puru\u1e63a \"sacrificed\" into the cosmos has not ceased to exist -- three-quarters of the Puru\u1e63a remains transcendent while one-quarter is expressed as the manifest cosmos. The world is not the Puru\u1e63a's corpse; it is the Puru\u1e63a's expression.\n\n## Citations\n\n1. \u1e5ag Veda 10.90 -- the original Puru\u1e63a S\u016bkta; 24 verses; see references/rigveda-purusha-sukta.md\n2. \u015aukla Yajurveda 31 -- the liturgically prevalent version; used in daily Vai\u1e63\u1e47ava ritual\n3. Bh\u0101gavata Pur\u0101\u1e47a 2.1.23-39 -- the cosmic body homology that parallels the Puru\u1e63a S\u016bkta's structure; see references/bhagavata-purana.md\n\n## Error Genealogy\n\n- Reading \u1e5ag Veda 10.90 (and the var\u1e47a verses) as the origin-charter of birth-based caste hardened via colonial ethnography and census operations (H.H. Risley, Census of India 1901), then projected backward onto the s\u016bkta (Nicholas Dirks, *Castes of Mind*, 2001). See [G10 \u2014 Puru\u1e63a S\u016bkta and the colonial construction of caste](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/samhara": "# Sa\u1e43h\u0101ra / Laya \u2014 \u0938\u0902\u0939\u093e\u0930 / \u0932\u092f\n\n**Not:** destruction, annihilation, evil function, equivalent to Pralaya\n\n## Two Terms, One Function\n\n**Sa\u1e43h\u0101ra** (sam + h\u1e5b = to gather together, to withdraw, to take back) and **Laya** (from l\u012b = to dissolve, to merge) are used interchangeably in most Pur\u0101\u1e47ic contexts, though Laya emphasizes the quality of merging back into source while Sa\u1e43h\u0101ra emphasizes the agency of withdrawal. Both refer to the third cosmic function in the S\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra triad \u2014 the reabsorption of the manifest cosmos.\n\n## Sa\u1e43h\u0101ra as \u015aiva's Function\n\nIn the Trim\u016brti framework, Sa\u1e43h\u0101ra is assigned to \u015aiva. This assignment has generated persistent misreadings in Western contexts where \"destroyer\" carries negative moral weight. In the Pur\u0101\u1e47ic cosmological frame:\n\n- Sa\u1e43h\u0101ra is as necessary as S\u1e5b\u1e63\u1e6di; neither is morally superior\n- Without Sa\u1e43h\u0101ra, there is no Pralaya; without Pralaya, there is no new S\u1e5b\u1e63\u1e6di\n- \u015aiva as Sa\u1e43h\u0101ra-agent is performing a service to the cosmos, not an act of violence\n\nThe Na\u1e6dar\u0101ja iconography encodes the full cosmological meaning: \u015aiva's right hand beats the \u1e0damaru (the drum of creation, S\u1e5b\u1e63\u1e6di), his second right hand shows abhaya mudr\u0101 (protection, Sthiti), his upper left hand holds fire (dissolution, Sa\u1e43h\u0101ra), his lower left hand points to the raised foot (liberation, Anugraha), and his right foot stands on the demon of ignorance (Tirodh\u0101na overcome). All five acts in one image.\n\n## In the Pa\u00f1cak\u1e5btya Framework\n\nKashmir Shaivism and \u015aaiva Siddh\u0101nta expand the three Trim\u016brti functions into five (pa\u00f1cak\u1e5btya):\n1. S\u1e5b\u1e63\u1e6di (emission)\n2. Sthiti (maintenance)\n3. Sa\u1e43h\u0101ra (withdrawal)\n4. Tirodh\u0101na (veiling, concealment of \u015aiva's true nature within M\u0101y\u0101)\n5. Anugraha (grace, the revelation that removes the veil)\n\nIn this framework, Sa\u1e43h\u0101ra is the third of five acts, all performed by \u015aiva. The Trim\u016brti model and the pa\u00f1cak\u1e5btya model are both valid; they operate at different levels of resolution.\n\n## Sa\u1e43h\u0101ra and BG 9.7\n\nBhagavad G\u012bt\u0101 9.7 states: \"All beings, O Arjuna, go into My Prak\u1e5bti at the end of a Kalpa; I emit them again at the beginning of another Kalpa.\" This is Sa\u1e43h\u0101ra-and-S\u1e5b\u1e63\u1e6di in one verse \u2014 the beings dissolve back into Brahman's Prak\u1e5bti (Avyakta) at Sa\u1e43h\u0101ra, and are re-emitted in S\u1e5b\u1e63\u1e6di.\n\n## Audience Metaphor\n\nSa\u1e43h\u0101ra is like a breath being exhaled. The in-breath (S\u1e5b\u1e63\u1e6di) draws in; the sustained breath (Sthiti) holds; the out-breath (Sa\u1e43h\u0101ra) releases back to the stillness (Pralaya) before the next in-breath. The breath does not destroy the air; it returns it to the atmosphere. The cosmic cycle is the breathing of Brahman.\n\n## Citations\n\n1. Bhagavad G\u012bt\u0101 9.7 \u2014 cosmic withdrawal and re-emission; \"sarvabh\u016bt\u0101ni... y\u0101nti m\u0101\u1e43 kalpa-k\u1e63aye\"\n2. Bh\u0101gavata Pur\u0101\u1e47a 12.4 \u2014 description of Pralaya as the result of Sa\u1e43h\u0101ra; see references/bhagavata-purana.md\n3. Li\u1e45ga Pur\u0101\u1e47a 1.1-2 \u2014 \u015aiva as Sa\u1e43h\u0101ra-agent and Na\u1e6dar\u0101ja cosmological significance\n4. \u015aiva Pur\u0101\u1e47a \u2014 Sa\u1e43h\u0101ra in the \u015aaiva pa\u00f1cak\u1e5btya framework", "concepts/sapta-loka": "# Sapta-Loka / Chaturda\u015ba-Loka -- \u0938\u092a\u094d\u0924-\u0932\u094b\u0915 / \u091a\u0924\u0941\u0930\u094d\u0926\u0936-\u0932\u094b\u0915\n\n**Not:** seven physical planets, heaven and hell, Bh\u016brloka as the lowest realm\n\n## The Fourteen Lokas\n\nThe complete Pur\u0101\u1e47ic cosmological map (Chaturda\u015ba-Loka = 14 Lokas) is organized vertically within the Brahm\u0101\u1e47\u1e0da:\n\n### Seven Upper Realms (\u016ardhvaloka / Sapta-Loka)\n\n| # | Loka | Name | Characteristic |\n|---|------|------|----------------|\n| 7 | Satya-loka (Brahmaloka) | Realm of Truth / Brahm\u0101 | Highest within the manifest; Brahm\u0101 resides here; persists until Mah\u0101 Pralaya; beings here attain near-liberation |\n| 6 | Tapa-loka | Realm of Austerity | Beings of intense tapas; persists through Naimittika Pralaya |\n| 5 | Jana-loka | Realm of People / Creation | Sages like Sanaka, Sanandana; persists through Naimittika Pralaya |\n| 4 | Mahar-loka | Realm of the Great | Brahmar\u1e63is; persists through Naimittika Pralaya |\n| 3 | Svar-loka (Svarga) | Celestial Realm | Devatas, Indra; dissolves at Naimittika Pralaya |\n| 2 | Bhuvar-loka | Intermediate Realm | Subtle beings, Siddhas; between earth and sun |\n| 1 | Bh\u016br-loka | Earth Realm | Our gross physical world; dissolves at Naimittika Pralaya |\n\n### Seven Lower Realms (P\u0101t\u0101la / Adholoka)\n\n| # | Loka | Name | Characteristic |\n|---|------|------|----------------|\n| -1 | Atala | Realm below | |\n| -2 | Vitala | Realm of \u015aiva's followers | |\n| -3 | Sutala | Realm of Bali (Mah\u0101vi\u1e63\u1e47u present here per BhP) | |\n| -4 | Tal\u0101tala | Realm of Maya D\u0101nava | |\n| -5 | Mah\u0101tala | Realm of N\u0101gas | |\n| -6 | Ras\u0101tala | Realm of D\u0101navas and Daityas | |\n| -7 | P\u0101t\u0101la | Deepest realm; N\u0101gar\u0101ja V\u0101suki resides here; described as beautiful in BhP 5.24 |\n\nNote: BhP 5.24 describes the P\u0101t\u0101la realms as exceptionally beautiful, not as places of torment. They are not hells; they are realms for specific categories of beings (N\u0101gas, D\u0101navas, Daityas) who have their own dharmic existence there. Naraka (Yamaloka) -- the realm of karmic processing under Yama -- is a separate realm below P\u0101t\u0101la, not identified with P\u0101t\u0101la itself.\n\n## Earth's Position: the Hinge-Point\n\nBh\u016brloka (earth) occupies the 1st of 7 upper realms and the 8th of 14 total realms. This position is cosmologically significant: from Bh\u016brloka, both upward mobility (toward Svarga, Brahmaloka, liberation) and downward mobility (into the P\u0101t\u0101la realms) are possible. The Pur\u0101\u1e47ic tradition often presents human birth in Bh\u016brloka as especially precious precisely because it sits at this hinge-point -- with enough consciousness to choose the upward direction, with enough limitation to experience the urgency of that choice.\n\n## What Lokas Actually Are\n\nThe Lokas are not separate physical locations that a rocket could reach. They are levels of existence organized by:\n\n1. **Consciousness-quality**: Higher Lokas have beings with more sattva, more refined awareness\n2. **Temporal scale**: Higher Lokas have much longer lifespans; Brahmaloka's lifespan = Brahm\u0101's lifespan\n3. **Karmic condition**: Movement between Lokas follows karmic law (accumulated karma determines which Loka a j\u012bva inhabits after death in Bh\u016brloka)\n4. **Dissolution-timing**: Lower Lokas dissolve at Naimittika Pralaya; higher Lokas (Mahar through Satya) persist until Mah\u0101 Pralaya\n\nThis is a consciousness-cosmology, not a physical cosmology. It maps states of existence, not locations in spacetime.\n\n## Audience Metaphor\n\nThe fourteen Lokas are like fourteen floors of a building, with Bh\u016brloka on the eighth floor (the lobby level -- where all traffic enters and exits). The floors above (Bhuvar through Satya) are increasingly refined executive suites; the floors below (Atala through P\u0101t\u0101la) are specialized departments. An employee (j\u012bva) can be promoted to a higher floor (good karma / upward rebirth) or reassigned to a lower floor (negative karma) after their current stint in the lobby ends. The goal is not to stay in the building forever but to walk out the front door entirely (Mok\u1e63a = \u0100tyantika Pralaya). The building dissolves at closing time (Mah\u0101 Pralaya) -- but the street outside (Brahman) was always there.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 5.17-26 -- the most detailed Pur\u0101\u1e47ic treatment of all 14 Lokas, cosmic geography, and P\u0101t\u0101la description; see references/bhagavata-purana.md\n2. Bh\u0101gavata Pur\u0101\u1e47a 5.24 -- P\u0101t\u0101la realms described as beautiful, not hellish\n3. Vi\u1e63\u1e47u Pur\u0101\u1e47a 2.1-9 -- structural description of Lokas within the Brahm\u0101\u1e47\u1e0da; see references/vishnu-purana.md\n4. Manu-Sm\u1e5bti 1.10 -- cosmological ordering; see references/manusmriti.md", "concepts/shakti-cosmological": "# \u015aakti (Cosmological) -- \u0936\u0915\u094d\u0924\u093f\n\n**Not:** yin/female energy opposing male, physical/sexual energy only, separate from the divine\n\n## \u015aakti as Cosmological Principle\n\n\u015aakti (from the root \u015bak = to be able, to have power) is the dynamic creative power of the divine in its cosmological expression. At the level of cosmology:\n\n- **\u015aakti is the why and how of S\u1e5b\u1e63\u1e6di**: without \u015aakti, Brahman/\u015aiva remains in its absolute unmanifest state; \u015aakti is the creative impulse, the differentiating force, the energy of manifestation\n- **\u015aakti sustains Sthiti**: the maintenance of the cosmos requires the continuous expression of \u015aakti as sustaining power\n- **\u015aakti operates Sa\u1e43h\u0101ra**: the withdrawal is also \u015aakti's function -- K\u0101l\u012b as \u015aiva's \u015aakti consuming time and form\n\nIn all traditions, the three cosmic functions (S\u1e5b\u1e63\u1e6di, Sthiti, Sa\u1e43h\u0101ra) are ultimately \u015aakti's operations -- whether \u015aakti is assigned to the Goddess (\u015a\u0101kta), to Vi\u1e63\u1e47u's Yogam\u0101y\u0101 (Vai\u1e63\u1e47ava), or to \u015aiva's inseparable power (\u015aaiva).\n\n## The Dev\u012b M\u0101h\u0101tmya: \u015aakti as Supreme\n\nThe Dev\u012b M\u0101h\u0101tmya (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a) is the foundational text for \u015a\u0101kta cosmological supremacy. The text presents Brahm\u0101, Vi\u1e63\u1e47u, and \u015aiva as unable to overcome the cosmic demon Mahi\u1e63\u0101sura without the Goddess's power. The three deities combine their powers (tejomaya = \"made of their light\") to generate the Goddess -- but the text is explicit that this is not the goddess being created from the male deities' energies; she IS the primordial \u015aakti, and the three deities' powers return to their source. The \"creation\" is a revelation.\n\nKey cosmological statement (Dev\u012b M\u0101h\u0101tmya 1.74-78): \"She who is eternal creates the world at the time of creation; she maintains it at the time of maintenance; she withdraws it at dissolution -- she is the great M\u0101y\u0101.\"\n\n## \u015aiva-\u015aakti in Kashmir Shaivism\n\nKashmir Shaivism develops the most philosophically precise analysis of \u015aiva-\u015aakti cosmology. \u015aiva (pure consciousness, Cit) and \u015aakti (consciousness-power, Citi-\u015aakti) are the two aspects of one reality:\n\n- \u015aiva = the I-awareness (Aham) at its most absolute\n- \u015aakti = the vibratory creative expression (Spanda) of that I-awareness\n\nThe cosmos arises when \u015aakti contracts (Sa\u1e43koca) pure I-awareness into apparent individual I's (j\u012bvas). Liberation arises when \u015aakti expands (Vik\u0101sa) those apparent individual I's back into the recognition of their identity with \u015aiva. The entire cosmic drama is \u015aakti's movement of contraction and expansion.\n\n## The \u015aakti Taxonomy at the Cosmological Level\n\nDifferent traditions identify different primary aspects of cosmological \u015aakti:\n\n| Tradition | Primary \u015aakti Name | Cosmological Function |\n|-----------|-------------------|----------------------|\n| \u015a\u0101kta | Mah\u0101m\u0101y\u0101 / Mah\u0101dev\u012b | All three: S\u1e5b\u1e63\u1e6di, Sthiti, Sa\u1e43h\u0101ra |\n| Kashmir Shaivism | Par\u0101\u015bakti / Citi-\u015aakti | The vibratory power (Spanda) of \u015aiva-consciousness |\n| Vai\u1e63\u1e47ava | Yogam\u0101y\u0101 / Lak\u1e63m\u012b | S\u1e5b\u1e63\u1e6di and Sthiti through Vi\u1e63\u1e47u's creative will |\n| \u015aaiva Siddh\u0101nta | \u015aiva's \u015aaktis (J\u00f1\u0101na, Icch\u0101, Kriy\u0101) | The five pa\u00f1cak\u1e5btya acts of \u015aiva |\n\n## Audience Metaphor\n\n\u015aakti is like heat in relation to fire: you cannot separate the fire from its heat and still have fire; you cannot have the heat without the fire. Fire (\u015aiva/Brahman) is the luminous conscious principle; heat (\u015aakti) is its inherent creative power. The cosmos is the heat's expansion into the world -- the fire does not diminish; the heat does not separate; but the effects (warmth, light, transformation) spread throughout existence. Asking whether fire or heat came first is like asking whether \u015aiva or \u015aakti is primary -- the question assumes a separation that doesn't exist.\n\n## Citations\n\n1. Dev\u012b M\u0101h\u0101tmya 1.74-78 (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a) -- \u015aakti as the one who creates, maintains, and withdraws; see references/markandeya-purana.md and references/devi-mahatmya.md\n2. \u015aiva S\u016btras 1.1 -- \"Citir \u0101tm\u0101\" (Consciousness is the Self) -- the Kashmir Shaivism foundation for \u015aiva-\u015aakti cosmology\n3. Vij\u00f1\u0101na Bhairava Tantra -- \u015aakti as the dynamic expression of \u015aiva-consciousness; the vibratory (Spanda) framework\n4. Bh\u0101gavata Pur\u0101\u1e47a 1.2.23 -- \u015aakti as Vi\u1e63\u1e47u's creative energy in Sagu\u1e47a manifestation; see references/bhagavata-purana.md", "concepts/srishti": "# S\u1e5b\u1e63\u1e6di \u2014 \u0938\u0943\u0937\u094d\u091f\u093f\n\n**Not:** creation from nothing, the Big Bang, Brahm\u0101 as sole creator\n\n## Etymology and Core Meaning\n\nS\u1e5b\u1e63\u1e6di comes from the root s\u1e5bj \u2014 to emit, to project, to release, to let flow. The word itself encodes the meaning: what is created was already present in potential, and S\u1e5b\u1e63\u1e6di is its release into manifestation. There is no gap between potential and actual in the sense of \"nothing suddenly becoming something.\" The transition is from Avyakta (unmanifest) to Vyakta (manifest), not from non-existence to existence.\n\n## The Three-Level S\u1e5b\u1e63\u1e6di Sequence\n\nThe Bh\u0101gavata Pur\u0101\u1e47a (BhP 2.5-6, 3.5-12) describes a layered S\u1e5b\u1e63\u1e6di:\n\n1. **Brahman + M\u0101y\u0101-\u015aakti \u2192 Avyakta**: the unmanifest ground stirs; cosmic time (K\u0101la) appears; the potential for manifestation is established\n2. **Avyakta \u2192 Hira\u1e47yagarbha**: the first manifestation; the cosmic golden embryo; the seed-state of the entire universe; Hira\u1e47yagarbha is the subtle-cosmic body\n3. **Hira\u1e47yagarbha \u2192 Vir\u0101\u1e6d**: the expanded cosmic form; the universe as a differentiated whole; Brahm\u0101 then operates within Vir\u0101\u1e6d to further differentiate species, lokas, and beings\n\nBrahm\u0101's role in this sequence is real but secondary: he differentiates the content that the first two stages have already provided.\n\n## Satk\u0101ryav\u0101da: the Operative Principle\n\nAll Ved\u0101ntic and S\u0101\u1e43khya schools accept Satk\u0101ryav\u0101da \u2014 the doctrine that the effect pre-exists in the cause in some form. What appears is not new but a transformation or projection of what was latent. This directly contradicts creation ex nihilo:\n\n- **Advaita (Vivartav\u0101da)**: the world \"appears\" in Brahman as a reflection appears in a mirror; Brahman is unchanged; the world is not a real transformation but an apparent one through M\u0101y\u0101\n- **Vi\u015bi\u1e63\u1e6d\u0101dvaita (Pari\u1e47\u0101mav\u0101da)**: the world is a real transformation of Brahman's body (\u015aar\u012bra); real, but Brahman remains the inner controller\n- **S\u0101\u1e43khya (Prak\u1e5bti Pari\u1e47\u0101ma)**: Prak\u1e5bti (the material ground) really transforms into the manifest world; Puru\u1e63a (consciousness) is uninvolved\n\nAll three agree: S\u1e5b\u1e63\u1e6di draws out what was already there.\n\n## S\u1e5b\u1e63\u1e6di as One-Third of the Cosmic Rhythm\n\nS\u1e5b\u1e63\u1e6di-Sthiti-Sa\u1e43h\u0101ra is the continuous triple-rhythm of existence \u2014 not a sequence of three events but three aspects of one ongoing process. At every moment, something is being created, something maintained, something dissolved. The Trim\u016brti (Brahm\u0101-Vi\u1e63\u1e47u-\u015aiva) allocates these three functions to three cosmic agents, but the process itself is one.\n\n## Audience Metaphor\n\nS\u1e5b\u1e63\u1e6di is like a seed becoming a tree. Nothing in the tree was absent from the seed; the tree is the seed's potential actualizing itself. The soil, water, and sun are the enabling conditions \u2014 analogous to M\u0101y\u0101, K\u0101la, and Brahman's \u015aakti \u2014 but the tree was always in the seed. This is why the Upani\u1e63ad says: \"All this is Brahman\" \u2014 the manifest world has not departed from Brahman; it is Brahman's own expression.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 2.5-6 \u2014 the fundamental S\u1e5b\u1e63\u1e6di sequence; see references/bhagavata-purana.md\n2. Bh\u0101gavata Pur\u0101\u1e47a 3.5-12 \u2014 detailed cosmological derivation sequence\n3. Taittir\u012bya Upani\u1e63ad 2.6 \u2014 \"From Brahman, verily, are born space, air, fire, water, earth...\" (the S\u1e5b\u1e63\u1e6di sequence in Upani\u1e63adic voice)\n4. Brahma S\u016btra 1.1.2 \u2014 \"Janm\u0101dyasya yata\u1e25\" \u2014 \"That from which arise the birth [etc.]\" \u2014 Brahman as the source of S\u1e5b\u1e63\u1e6di\n5. S\u0101\u1e43khya K\u0101rik\u0101 (\u012a\u015bvarak\u1e5b\u1e63\u1e47a) \u2014 Prak\u1e5bti's evolution as S\u1e5b\u1e63\u1e6di without Puru\u1e63a; see references/samkhya-karika.md", "concepts/sthiti": "# Sthiti \u2014 \u0938\u094d\u0925\u093f\u0924\u093f\n\n**Not:** stasis, conservation, passive preservation, opposition to dissolution\n\n## Sthiti as Active Upholding\n\nSthiti (from the root sth\u0101, to stand, to remain) is the cosmic maintenance function \u2014 the continuous sustaining of the manifest cosmos throughout a Kalpa. It is Vi\u1e63\u1e47u's primary role in the Trim\u016brti schema.\n\nWhat Sthiti maintains is not merely physical existence but the conditions for dharma to operate and liberation to be pursued. The cosmos is not maintained for its own sake but as the arena in which j\u012bvas move toward Mok\u1e63a. When those conditions are threatened \u2014 when adharma rises to the point that the pursuit of liberation becomes impossible \u2014 Sthiti requires intervention: this is the mechanism that generates Avat\u0101ras (BG 4.7-8).\n\n## Sthiti and the Avat\u0101ra Principle\n\nBhagavad G\u012bt\u0101 4.7-8 is the locus classicus for the Avat\u0101ra-Sthiti connection:\n\n> \"Whenever dharma declines and adharma arises, O Bh\u0101rata, I project myself. For the protection of the good, for the destruction of the wicked, for the firm establishment of dharma \u2014 I appear in Yuga after Yuga.\"\n\nEach Avat\u0101ra is not a separate creation-event but an expression of Sthiti's self-correcting mechanism. Vi\u1e63\u1e47u does not create (that is Brahm\u0101's function) or dissolve (that is \u015aiva's) \u2014 he maintains, which sometimes means actively restoring what has degraded.\n\n## Sthiti in the Pa\u00f1cak\u1e5btya Framework\n\nIn \u015aaiva cosmology, the five cosmic acts (pa\u00f1cak\u1e5btya) are: S\u1e5b\u1e63\u1e6di, Sthiti, Sa\u1e43h\u0101ra, Tirodh\u0101na (veiling/concealment), and Anugraha (grace/revelation). Sthiti is the second of the five. In this framework, all five are performed by \u015aiva alone (not the Trim\u016brti); the Trim\u016brti's three functions are the first three of these five acts.\n\nThe \u015aaiva pa\u00f1cak\u1e5btya framework includes Tirodh\u0101na and Anugraha \u2014 the concealing of Brahman's true nature within Sthiti's maintained cosmos, and the grace that lifts that veil. This adds two dimensions to the Vai\u1e63\u1e47ava three: why, if the cosmos is maintained for liberation, do beings not immediately know their nature? Because Sthiti also maintains M\u0101y\u0101's operational conditions.\n\n## Audience Metaphor\n\nSthiti is like a gardener who did not plant the garden (S\u1e5b\u1e63\u1e6di) and will not eventually harvest and clear it (Sa\u1e43h\u0101ra), but who maintains it continuously \u2014 watering, pruning, clearing weeds, and occasionally dealing with invasive species (adharma). The garden's purpose is not its own perpetuation but the fruit it yields (liberation for the j\u012bvas within it). The gardener intervenes actively when the garden's purpose is threatened.\n\n## Citations\n\n1. Bh\u0101gavad G\u012bt\u0101 4.7-8 \u2014 the Avat\u0101ra principle as expression of Sthiti\n2. Bh\u0101gavata Pur\u0101\u1e47a 1.2.23 \u2014 the three divine functions and Vi\u1e63\u1e47u's Sattva-dominant maintaining role\n3. Vi\u1e63\u1e47u Pur\u0101\u1e47a 1.2 \u2014 Sthiti as Vi\u1e63\u1e47u's cosmic function; see references/vishnu-purana.md", "concepts/trigunas-cosmological": "# Trigu\u1e47as (Cosmological) -- \u0924\u094d\u0930\u093f\u0917\u0941\u0923\n\n**Not:** three personality types, good/evil categories, identical to the yoga-darshana epistemological treatment\n\n## The Three Gu\u1e47as in S\u0101\u1e43khya\n\nThe S\u0101\u1e43khya K\u0101rik\u0101 (11-13) defines the three Gu\u1e47as as the constitutive strands of all Prak\u1e5bti:\n\n- **Sattva**: the quality of clarity, luminosity, lightness, transparency; the principle by which consciousness is reflected; in equilibrium, Sattva enables clear perception; in imbalance, Sattva produces attachment to pleasure and knowledge\n- **Rajas**: the quality of activity, movement, energy, passion; the driving force of S\u1e5b\u1e63\u1e6di; without Rajas, neither Sattva nor Tamas would \"move\"; in imbalance, Rajas produces craving and agitation\n- **Tamas**: the quality of inertia, heaviness, concealment, stability; without Tamas, nothing would hold form -- all would remain in constant flux; in imbalance, Tamas produces lethargy, ignorance, and obstruction\n\nThe three Gu\u1e47as are always co-present; what changes is their relative dominance. No manifest thing consists of only one Gu\u1e47a; all Prak\u1e5bti is a mixture of all three in varying proportions.\n\n## The Cosmological Role: Avyakta and S\u1e5b\u1e63\u1e6di\n\nIn Avyakta (the Unmanifest state of Prak\u1e5bti), the three Gu\u1e47as are in perfect equilibrium (s\u0101my\u0101vasth\u0101). This equilibrium is the definition of Avyakta. S\u1e5b\u1e63\u1e6di begins when this equilibrium is disturbed -- in S\u0101\u1e43khya, by the proximity of Puru\u1e63a to Prak\u1e5bti; in Ved\u0101nta, by Brahman's creative Icch\u0101-\u015aakti. The disturbance triggers the differential expression of Gu\u1e47as:\n\n1. Mahat (cosmic intellect) = Sattva predominant\n2. Aha\u1e43k\u0101ra (cosmic ego-principle) = Rajas predominant (it is the principle of individuation)\n3. Tanm\u0101tras and Mah\u0101bh\u016btas = Tamas increasing as grossness increases\n\nThe entire sequence from Avyakta to gross physical elements is a story of Tamas increasing, Sattva decreasing, and Rajas facilitating the transition at each stage.\n\n## Gu\u1e47as and the Trim\u016brti (BhP 1.2.23)\n\nThe Bh\u0101gavata Pur\u0101\u1e47a's most explicit Trigu\u1e47a-cosmology statement: the three cosmic functions of the Trim\u016brti are Gu\u1e47a-allocated:\n\n| Gu\u1e47a | Cosmic Function | Trim\u016brti Agent |\n|------|----------------|----------------|\n| Rajas | S\u1e5b\u1e63\u1e6di (activity of creation) | Brahm\u0101 |\n| Sattva | Sthiti (clarity of maintenance) | Vi\u1e63\u1e47u |\n| Tamas | Sa\u1e43h\u0101ra (inertia/dissolution) | \u015aiva |\n\nThis is not a value ranking (Sattva is not \"better\" than Tamas in this context). All three are necessary expressions of the cosmic cycle.\n\n## Gu\u1e47as and the Yuga Cycle\n\nThe Yuga cycle can be read as a Gu\u1e47a-trajectory:\n\n| Yuga | Gu\u1e47a Dominance | Characteristic |\n|------|----------------|----------------|\n| Satya Yuga | Sattva dominant | Direct perception of truth; dharma fully intact |\n| Tret\u0101 Yuga | Rajas increasing | Action-oriented; ritual; partial dharma |\n| Dv\u0101para Yuga | Rajas/Tamas mixed | Decline of direct knowledge; scripture mediates |\n| Kali Yuga | Tamas dominant | Confusion, craving, conflict; dharma at minimum; greatest need for grace |\n\nThe Yuga cycle is thus a Gu\u1e47a cycle, not merely a chronological one. This is why each Yuga has different prescribed practices (yuga-dharma): the practices appropriate to a Sattva-dominant age are different from those effective in a Tamas-dominant age.\n\n## Audience Metaphor\n\nThe three Gu\u1e47as are like the three states of water. Sattva is ice: clear, structured, allowing clear vision. Rajas is liquid water: active, flowing, able to take any form, the medium of change. Tamas is water vapor: dispersed, heavy, potentially obscuring. All are the same H2O; what changes is their configuration. The manifest cosmos is always all three simultaneously, in different proportions at different levels. Consciousness (Puru\u1e63a/Brahman) is not water at all -- it is the light that reveals the ice, water, and vapor for what they are.\n\n## Citations\n\n1. S\u0101\u1e43khya K\u0101rik\u0101 11-13 -- definition and properties of the three Gu\u1e47as; see references/samkhya-karika.md\n2. Bh\u0101gavata Pur\u0101\u1e47a 1.2.23 -- Trim\u016brti-Gu\u1e47a allocation (Brahm\u0101/Rajas, Vi\u1e63\u1e47u/Sattva, \u015aiva/Tamas); see references/bhagavata-purana.md\n3. Bhagavad G\u012bt\u0101 14.1-27 -- the most systematic treatment of Gu\u1e47as and liberation from them (Trigu\u1e47\u0101t\u012bta)\n4. Manu-Sm\u1e5bti 12.24-50 -- Gu\u1e47as and species differentiation across rebirths; see references/manusmriti.md\n5. Cross-bundle note: the doctrinal SOURCE of the trigu\u1e47a is sankhya-darshana v0.13's guna-samkhya.md; this file is a downstream/applied treatment (cosmological dimension), not a peer or competing definition", "concepts/trimurti": "# Trim\u016brti -- \u0924\u094d\u0930\u093f\u092e\u0942\u0930\u094d\u0924\u093f\n\n**Not:** Hindu Trinity, three rival gods, Brahm\u0101 = Brahman\n\n## The Trim\u016brti as Functional Schema\n\nTrim\u016brti (tri = three + m\u016brti = form/face) names the three-fold functional manifestation of the cosmic principle:\n\n| Member | Function | Associated Cosmic Phase |\n|--------|----------|------------------------|\n| Brahm\u0101 | S\u1e5b\u1e63\u1e6di (emanation) | Beginning of each Kalpa |\n| Vi\u1e63\u1e47u | Sthiti (maintenance) | Duration of each Kalpa |\n| \u015aiva | Sa\u1e43h\u0101ra (withdrawal) | End of each Kalpa |\n\nThe three are not three separate beings with competing interests. They are three modes of operation of the one cosmic process. The Bh\u0101gavata Pur\u0101\u1e47a (1.2.23) makes this explicit by linking the three functions to the three Gu\u1e47as: Brahm\u0101/Rajas (activity for creation), Vi\u1e63\u1e47u/Sattva (clarity for maintenance), \u015aiva/Tamas (inertia leading to dissolution). This is not an ethical ranking -- all three Gu\u1e47as and all three functions are necessary.\n\n## The Trim\u016brti in Sectarian Perspective\n\nAll three major sectarian lineages accept the Trim\u016brti framework but subordinate it to their primary deity:\n\n**Vai\u1e63\u1e47ava:** Brahm\u0101 and \u015aiva are aspects or servants of Vi\u1e63\u1e47u. Brahm\u0101 was born from a lotus growing from Vi\u1e63\u1e47u's navel (N\u0101bhi-kamala). \u015aiva was born when Brahm\u0101's pride was cut by Vi\u1e63\u1e47u. All three cosmic functions are ultimately Vi\u1e63\u1e47u's powers (\u015aaktis). Brahm\u0101 and \u015aiva carry out S\u1e5b\u1e63\u1e6di and Sa\u1e43h\u0101ra as agents empowered by Vi\u1e63\u1e47u.\n\n**\u015aaiva:** All five cosmic acts (pa\u00f1cak\u1e5btya: S\u1e5b\u1e63\u1e6di, Sthiti, Sa\u1e43h\u0101ra, Tirodh\u0101na, Anugraha) belong to \u015aiva. Brahm\u0101 and Vi\u1e63\u1e47u carry out their functions because \u015aiva empowers them. The Trim\u016brti is \u015aiva's three-act subset.\n\n**\u015a\u0101kta:** The Dev\u012b M\u0101h\u0101tmya (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a) presents the Goddess as the cosmic \u015aakti without whose power Brahm\u0101, Vi\u1e63\u1e47u, and \u015aiva cannot function. The Trim\u016brti becomes three channels for one feminine power.\n\n**Sm\u0101rta:** All three are equally valid forms of one Brahman. The Trim\u016brti is the cosmic process itself, and approaching any of the three is approaching the whole.\n\n## Brahm\u0101 Within the Trim\u016brti: a Special Warning\n\nBrahm\u0101's position in the Trim\u016brti is the entry point for the most damaging conflation in all of Dharmic AI representation: Brahm\u0101 \u2260 Brahman. Full treatment is in brahma-the-creator.md; the minimum that must be encoded here:\n\n- Brahm\u0101 is an agent within the S\u1e5b\u1e63\u1e6di phase\n- Brahm\u0101 is himself created (from Vi\u1e63\u1e47u's navel / from Brahman's will / from Hira\u1e47yagarbha depending on the account)\n- Brahm\u0101 will dissolve at Mah\u0101 Pralaya\n- Brahman is the unconditioned, uncreated, undissolvable absolute ground\n\nThe transliteration similarity is an accident of IAST rendering. In Devan\u0101gar\u012b: \u092c\u094d\u0930\u0939\u094d\u092e\u093e (Brahm\u0101, masculine) vs. \u092c\u094d\u0930\u0939\u094d\u092e\u0928\u094d (Brahman, neuter). In Sanskrit, the distinction is grammatical gender and case morphology, not merely an accent mark.\n\n## Audience Metaphor\n\nThe Trim\u016brti is like the three phases of a breath: inhalation (S\u1e5b\u1e63\u1e6di/Brahm\u0101), holding (Sthiti/Vi\u1e63\u1e47u), exhalation (Sa\u1e43h\u0101ra/\u015aiva). The breath is one; its phases are three functional modes of one process. A yogi does not \"choose\" between the three phases; all three are the breath. A sectarian devotee may give primary attention to one, but this does not mean the other two phases don't exist or are less necessary to the breath.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 1.2.23 -- three Gu\u1e47as mapped to three cosmic functions; foundational Trim\u016brti framework\n2. K\u016brma Pur\u0101\u1e47a 1.2 -- Trim\u016brti as three aspects of one cosmic principle\n3. Dev\u012b M\u0101h\u0101tmya (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a 81-93) -- \u015a\u0101kta reading of Trim\u016brti as instruments of the Goddess; see references/markandeya-purana.md\n\n## Error Genealogy\n\n- Trim\u016brti equated with the Christian Trinity is period-sourced drift: 18th\u201319th-century European comparative religion habitually mapped unfamiliar triads onto the Trinity, and the equation entered reference works. See [G12 \u2014 Trim\u016brti = the Hindu Trinity (drift)](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/virat": "# Vir\u0101\u1e6d -- \u0935\u093f\u0930\u093e\u091f\u094d\n\n**Not:** identical to S\u0101\u1e43khya's Puru\u1e63a, equivalent to Brahm\u0101\u1e47\u1e0da, only the Vi\u015bvar\u016bpa of BG 11\n\n## Vir\u0101\u1e6d in the S\u1e5b\u1e63\u1e6di Sequence\n\nVir\u0101\u1e6d occupies the third stage in the gross-cosmic emergence:\n\n1. Avyakta (unmanifest total)\n2. Hira\u1e47yagarbha (subtle-cosmic totality)\n3. **Vir\u0101\u1e6d** (gross-cosmic totality -- the universe as a differentiated, embodied whole)\n4. Brahm\u0101 (the agent who differentiates the Vir\u0101\u1e6d's content into named species, lokas, beings)\n\nVir\u0101\u1e6d is the universe considered as one vast body (\u015bar\u012bra). Its \"waking state\" is the gross universe we experience. The M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad's three states analysis (waking/dreaming/deep sleep) maps onto cosmic levels: at the cosmic scale, Vai\u015bv\u0101nara (BhP's Vir\u0101\u1e6d) is the cosmic-waking consciousness, just as an individual's waking consciousness corresponds to the gross body.\n\n## The Puru\u1e63a S\u016bkta and Vir\u0101\u1e6d\n\nThe Puru\u1e63a S\u016bkta (RV 10.90) is the oldest Vedic text describing the cosmic form and the sacrifice by which the cosmos emerges from it. The Puru\u1e63a whose body is the entire universe, whose sacrifice generates the four var\u1e47as, the animals, the heavens and earth, the Vedas -- this Puru\u1e63a is the Vir\u0101\u1e6d in Vedic cosmogonic language.\n\nCritical structural point: the Puru\u1e63a S\u016bkta does NOT describe a literal blood sacrifice. The \"sacrifice\" (yaj\u00f1a) is the cosmic process by which the one differentiates into the many -- a cosmological metaphor for S\u1e5b\u1e63\u1e6di. The \"priests\" who conduct the sacrifice are the cosmic principles (S\u0101dhyas, \u1e5a\u1e63is), not human ritual functionaries. See purusha-sukta.md for full treatment.\n\n## The Cosmic Body: BhP 2.1.23-39\n\nThe Bh\u0101gavata Pur\u0101\u1e47a (2.1.23-39) gives the most detailed Pur\u0101\u1e47ic treatment of Vir\u0101\u1e6d as a cosmic body:\n- The sky = skull\n- The sun = eyes\n- The directions = ears\n- The oceans = belly\n- Mountains = bones\n- Rivers = veins\n- Trees = body hair\n- The moon = mind\n- The wind = Pr\u0101\u1e47a\n\nThis is not primitive animism but a systematic cosmological homology: the individual body (pi\u1e47\u1e0da) mirrors the cosmic body (Vir\u0101\u1e6d / Brahm\u0101\u1e47\u1e0da). The same principle (microcosm-macrocosm identity) grounds \u0100yurveda's correspondence of elements, Jyoti\u1e63a's planetary correspondences, and Tantra's body-as-cosmos practices.\n\n## The Vi\u015bvar\u016bpa (BG 11) as Vir\u0101\u1e6d-Dar\u015bana\n\nIn BG 11, K\u1e5b\u1e63\u1e47a grants Arjuna the \"divine eye\" (divyacak\u1e63us) to see the Vi\u015bvar\u016bpa -- the cosmic form. What Arjuna sees is the Vir\u0101\u1e6d as K\u1e5b\u1e63\u1e47a's body: all deities, all worlds, all beings, all time (past-present-future) simultaneously present in one vision. Arjuna's terror and awe encode the phenomenological point: the individual human mind cannot process the infinite simultaneously; the Vir\u0101\u1e6d-dar\u015bana requires a faculty (divyacak\u1e63us) beyond ordinary cognition.\n\n## Audience Metaphor\n\nVir\u0101\u1e6d is like the entire internet considered as one body: all the servers, all the data, all the processes running simultaneously, all the connections -- not as separate components but as one integrated living system. Brahm\u0101's activity (differentiating species and lokas) is like writing the protocols and applications that run on this infrastructure. Hira\u1e47yagarbha is the design specifications before the hardware was built. The individual j\u012bva is like one process running on one node, unaware of the full scope of the system it is a part of.\n\n## Citations\n\n1. \u1e5ag Veda 10.90 -- Puru\u1e63a S\u016bkta; cosmic body as the sacrificed Puru\u1e63a; see references/rigveda-purusha-sukta.md\n2. M\u0101\u1e47\u1e0d\u016bkya Upani\u1e63ad 3 -- Vai\u015bv\u0101nara as cosmic-waking consciousness (= Vir\u0101\u1e6d at the gross-cosmic level)\n3. Bhagavad G\u012bt\u0101 11.5-30 -- the Vi\u015bvar\u016bpa as Vir\u0101\u1e6d-dar\u015bana\n4. Bh\u0101gavata Pur\u0101\u1e47a 2.1.23-39 -- the cosmic body homology (sky = skull, sun = eyes, etc.); see references/bhagavata-purana.md", "concepts/yuga": "# Yuga \u2014 \u092f\u0941\u0917\n\n**Not:** historical era, archaeological period, equivalent to Kalpa, 2012-era timescales\n\n## The Four Yugas\n\nThe Yuga system presents cosmic time as a descending cycle, measured in the \"legs\" of dharma \u2014 Satya Yuga has four legs; Kali Yuga has one. The framework is not pessimistic; it is cyclical. After Kali Yuga's end, a new Satya Yuga begins.\n\n| Yuga | Duration (human years) | Dharma | Characteristic |\n|------|------------------------|--------|----------------|\n| Satya / K\u1e5bta | 1,728,000 | 4 legs | Perfect virtue; no disease, no conflict; meditation (dhy\u0101na) as practice |\n| Tret\u0101 | 1,296,000 | 3 legs | Slight decline; sacrifice (yaj\u00f1a) introduced as primary practice |\n| Dv\u0101para | 864,000 | 2 legs | Dharma halved; texts compiled; p\u016bj\u0101 (ritual worship) as practice |\n| Kali | 432,000 | 1 leg | Quarrel and hypocrisy predominant; n\u0101ma-sa\u1e43k\u012brtana (chanting of names) as prescribed practice |\n\nTotal Mah\u0101yuga (Caturyuga) = 4,320,000 years. Ratio: 4:3:2:1.\n\n## What Yuga Actually Describes\n\nA Yuga measures the quality of dharma operating in the cosmos during that period \u2014 not merely the moral character of people, but the structural capacity for beings to pursue liberation. As the legs of dharma are lost, the conditions for Mok\u1e63a become harder to achieve through more demanding practices; in Kali Yuga, the prescribed practice is the simplest (n\u0101ma-sa\u1e43k\u012brtana) precisely because the conditions are most difficult.\n\nThis is the framework's internal logic: accessibility scales inversely with dharmic capacity. Kali Yuga is not without spiritual possibility \u2014 it has its own Yuga-dharma.\n\n## The Sandhy\u0101 Periods\n\nEach Yuga has a Sandhy\u0101 (dawn) and Sandhy\u0101\u1e43\u015ba (twilight) equal to one-tenth of the Yuga's duration. The durations in the table above are the Yuga proper; the full Caturyuga including all Sandhy\u0101s totals 4,320,000 years.\n\n## Yuga-Dharma and Avat\u0101ra\n\nVi\u1e63\u1e47u's Avat\u0101ras descend in specific Yugas in response to adharma threatening the conditions for liberation. R\u0101ma descends in Tret\u0101; K\u1e5b\u1e63\u1e47a in Dv\u0101para; Kalki is prophesied at the end of Kali Yuga. The Avat\u0101ra-Yuga correspondence is not arbitrary but tracks the specific form of adharma that each Yuga generates.\n\n## The Present Position\n\nPer the Bh\u0101gavata Pur\u0101\u1e47a's reckoning, the current Kali Yuga began when K\u1e5b\u1e63\u1e47a departed (~3102 BCE); approximately 5,100+ years have elapsed of the Kali Yuga's 432,000-year duration. By this reckoning, most of Kali Yuga remains ahead.\n\n## Audience Metaphor\n\nImagine a four-legged table gradually losing its legs. With four legs (Satya Yuga) the table is perfectly stable; with one leg (Kali Yuga) it requires much greater care and skill to keep things balanced \u2014 but balance is still possible. The table does not collapse at the end of Kali Yuga; the cycle resets and four legs are restored. The cosmic table is never permanently destroyed; it goes through endless cycles of stability and precariousness.\n\n## Citations\n\n1. Bh\u0101gavata Pur\u0101\u1e47a 12.2-3 \u2014 detailed description of Kali Yuga conditions; the prophetic frame\n2. Bh\u0101gavata Pur\u0101\u1e47a 3.11.18-20 \u2014 Yuga durations in the cosmological framework\n3. Bh\u0101gavata Pur\u0101\u1e47a 12.3.51-52 \u2014 Yuga-dharma and the prescribed practices for each age\n4. Manu-Sm\u1e5bti 1.61-87 \u2014 the locus classicus for Yuga durations and the four-legs of dharma; see references/manusmriti.md\n5. Mah\u0101bh\u0101rata, \u015a\u0101nti Parva 231 \u2014 Yugas and their characteristics\n6. See references/vishnu-purana.md \u2014 systematic Yuga treatment", "references/bhagavata-purana": "# Bh\u0101gavata Pur\u0101\u1e47a\n\n## Text Overview\n\nThe Bh\u0101gavata Pur\u0101\u1e47a (\u015ar\u012bmad Bh\u0101gavatam) is the most theologically elaborate of the 18 Mah\u0101-Pur\u0101\u1e47as and the central text of Vai\u1e63\u1e47ava cosmology and devotion. Its 12 Skandhas (books) contain 18,000 verses covering cosmology, cosmogony, the K\u0101la system (Yugas, Kalpas, Manvantaras), the nature of Brahman/Vi\u1e63\u1e47u/Bhagav\u0101n, Avat\u0101ra theology, bhakti, and liberation. The tenth Skandha (on K\u1e5b\u1e63\u1e47a) is the most widely read section.\n\n## Key Passages for Cosmology-Creation Bundle\n\n**Skandha 1:**\n- 1.2.23 -- Trim\u016brti-Gu\u1e47a allocation: Brahm\u0101/Rajas/S\u1e5b\u1e63\u1e6di, Vi\u1e63\u1e47u/Sattva/Sthiti, \u015aiva/Tamas/Sa\u1e43h\u0101ra\n- 1.3 -- Avat\u0101ra list: gives 22 named Avat\u0101ras and states \"they are innumerable\"\n\n**Skandha 2:**\n- 2.1.23-39 -- Vir\u0101\u1e6d / cosmic body homology: sky = skull, sun = eyes, etc.\n- 2.5.18 -- M\u0101y\u0101-\u015aakti as Brahman's productive power\n- 2.5-6 -- Cosmogonic sequence (the Pur\u0101\u1e47ic answer to the N\u0101sad\u012bya's open question)\n\n**Skandha 3:**\n- 3.11 -- The K\u0101la system: definition of param\u0101\u1e47u (atom of time) through Kalpa; nesting hierarchy of time units; 4:3:2:1 Yuga ratio\n- 3.26.12-49 -- Detailed S\u0101\u1e43khya-inflected tattva sequence including tanm\u0101tras and Pa\u00f1camah\u0101bh\u016btas\n\n**Skandha 5:**\n- 5.24 -- Description of the P\u0101t\u0101la realms as beautiful, not hellish\n- 5.20-26 -- Sapta-Loka and 14-Loka cosmography; Brahm\u0101\u1e47\u1e0da structure\n\n**Skandha 6:**\n- 6.16.37 -- Multiple Brahm\u0101\u1e47\u1e0das floating in the Brahman-ocean; many-worlds cosmology\n\n**Skandha 10:**\n- 10.33.26 -- R\u0101sa Pa\u00f1c\u0101dhy\u0101ya; K\u1e5b\u1e63\u1e47a's L\u012bl\u0101 as the highest expression of divine beauty\n- 10.87.14 -- Sandhini-Samvit-Hl\u0101din\u012b as Bhagav\u0101n's three \u015aaktis (Vai\u1e63\u1e47ava parallel to Icch\u0101-J\u00f1\u0101na-Kriy\u0101)\n\n**Skandha 12:**\n- 12.4 -- Four types of Pralaya: Nitya, Naimittika, Mah\u0101, \u0100tyantika; authoritative classification\n\n## Tradition and Authority\n\nThe Bh\u0101gavata Pur\u0101\u1e47a is considered by many Vai\u1e63\u1e47ava traditions (especially Gau\u1e0d\u012bya Vai\u1e63\u1e47avism) to be the natural commentary on the Brahma S\u016btras, written by Vy\u0101sa himself after he had completed the Mah\u0101bh\u0101rata and the S\u016btras but felt the need for a text that expressed Brahman-realization through devotion (bhakti). The Bh\u0101gavata's synthesis of S\u0101\u1e43khya tattva cosmology with Vai\u1e63\u1e47ava theology makes it the single most important source for Pur\u0101\u1e47ic cosmology across this bundle.\n\n## Primary Concepts Using This Reference\n\n- kala.md, yuga.md, mahayuga.md, kalpa.md, manvantara.md (time system)\n- srishti.md, sthiti.md, samhara.md, pralaya.md (cosmic functions and dissolution)\n- trimurti.md, avatara.md, ishvara-cosmological.md (theology)\n- virat.md, brahmanda.md, sapta-loka.md (cosmography)\n- panchamahabhuta-cosmological.md, trigunas-cosmological.md (tattva)\n- maya-cosmological.md, shakti-cosmological.md, lila-cosmological.md (\u015aakti)\n- iccha-jnana-kriya-shakti.md (\u015aakti triad)", "references/brahma-purana": "# Brahma Pur\u0101\u1e47a\n\n## Text Overview\n\nThe Brahma Pur\u0101\u1e47a is listed first among the 18 Mah\u0101-Pur\u0101\u1e47as and is hence sometimes called the \u0100di Pur\u0101\u1e47a (\"first Pur\u0101\u1e47a\"). It contains 246 chapters covering cosmogony, geography of the sacred sites of Bh\u0101ratavar\u1e63a (particularly O\u1e0di\u015ba and Puru\u1e63ottama-k\u1e63etra / Jagann\u0101th Pur\u012b), genealogies, dharma, and cosmological frameworks. Its focus on pilgrimage geography makes it somewhat distinct from the more philosophically elaborate Vai\u1e63\u1e47ava Pur\u0101\u1e47as.\n\n## Key Passages for Cosmology-Creation Bundle\n\n**Chapters 1-3 (Primary Cosmogony):**\n- Opening cosmogonic sequence: Brahman as undifferentiated source; emergence of Brahm\u0101 from the lotus born from Vi\u1e63\u1e47u's navel; Brahm\u0101's secondary creation through Mahat, Aha\u1e43k\u0101ra, and the tattva sequence\n- The Brahm\u0101\u1e47\u1e0da (cosmic egg) described as the container for Brahm\u0101's 14-Loka creative activity\n\n**Chapter 2 (K\u0101la System):**\n- Yuga definitions consistent with the Vi\u1e63\u1e47u Pur\u0101\u1e47a standard\n- Brahm\u0101's 100-year lifespan: 1 year of Brahm\u0101 = 360 days of Brahm\u0101; each day = 1 Kalpa; consistent with Bh\u0101gavata framework\n\n**Chapters 45-50 (Cosmography):**\n- Description of the seven Dv\u012bpas and seven seas\n- Mount Meru as the cosmic axis at the center of Bh\u016brloka; the arrangement of Lokas above and below\n\n## Role in This Bundle\n\nThe Brahma Pur\u0101\u1e47a is a supporting reference for the cosmological framework rather than a primary philosophical source. It corroborates the standard Pur\u0101\u1e47ic consensus on the K\u0101la system, the 14-Loka cosmography, and the S\u1e5b\u1e63\u1e6di sequence through Brahm\u0101. Its primary contribution to the bundle is:\n- Confirming that the cosmological framework is shared across Pur\u0101\u1e47as (not unique to the Bh\u0101gavata)\n- Providing the \"first Pur\u0101\u1e47a\" context for the Brahm\u0101\u1e47\u1e0da concept\n\n## Primary Concepts Using This Reference\n\n- brahma-the-creator.md\n- brahmanda.md\n- sapta-loka.md\n- kalpa.md", "references/brahmasutras": "# Brahma S\u016btras (Ved\u0101nta S\u016btras)\n\n## Text Overview\n\nThe Brahma S\u016btras (also called Ved\u0101nta S\u016btras or \u015a\u0101r\u012braka M\u012bm\u0101\u1e43s\u0101 S\u016btras) by B\u0101dar\u0101ya\u1e47a are the foundational systematic text of Ved\u0101nta philosophy, organizing and reconciling the teachings of the Upani\u1e63ads in 555 aphoristic s\u016btras across 4 adhy\u0101yas. The text is deliberately terse -- almost every s\u016btra requires commentary to be understood -- which is why the major Ved\u0101ntic commentators (\u015aa\u1e45kara, R\u0101m\u0101nuja, Madhva, Vallabha, Nimb\u0101rka) wrote elaborate bh\u0101\u1e63yas that established their respective schools. The text opens with the foundational inquiry: *ath\u0101to brahma-jij\u00f1\u0101s\u0101* -- \"Now, therefore, the inquiry into Brahman.\"\n\n## Critical Clarification: Brahma S\u016btras \u2260 Brahm\u0101's S\u016btras\n\n**This is the inquiry into Brahman (\u092c\u094d\u0930\u0939\u094d\u092e\u0928\u094d, neuter, the absolute) -- not a text about or by Brahm\u0101 (\u092c\u094d\u0930\u0939\u094d\u092e\u093e, masculine, the creator deity).** This distinction is critical and is the same Brahm\u0101 \u2260 Brahman conflation addressed in brahma-the-creator.md. The Brahma S\u016btras inquire into the nature of the impersonal absolute (Brahman) and its relationship to the individual self (\u0101tman) and the cosmos -- not into the cosmological activities of the creator god Brahm\u0101.\n\n## Key Passages for Cosmology-Creation Bundle\n\n**Adhy\u0101ya 1, P\u0101da 1 (S\u016btras 1-11: Foundation):**\n- BS 1.1.1: *ath\u0101to brahma-jij\u00f1\u0101s\u0101* -- \"Now, therefore, the inquiry into Brahman\"; the text frames all cosmological discussion as subordinate to the inquiry into Brahman's nature\n- BS 1.1.2: *janm\u0101dyasya yata\u1e25* -- \"Brahman is that from which the origin, sustenance, and dissolution of this [universe] arise\"; the foundational cosmological statement that all three functions (S\u1e5b\u1e63\u1e6di, Sthiti, Sa\u1e43h\u0101ra) originate in Brahman\n\n**Adhy\u0101ya 2, P\u0101da 1 (S\u016btras 18-36: Cosmological Objections and Replies):**\n- BS 2.1.33: *lokavat tu l\u012bl\u0101 kaivalyam* -- **\"But like [activity] in the world, [Brahman's] creation is mere sport/play alone.\"** The foundational philosophical statement of L\u012bl\u0101 as the answer to \"why does Brahman create?\" \u015aa\u1e45kara's commentary: just as a powerful king engages in sport without need or purpose external to the sport, Brahman creates without
