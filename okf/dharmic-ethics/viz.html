as never the heat, and it was certainly never the iron's suffering. The point is the blade that could not exist without the forge.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.1, 2.32, 2.43 \u2014 tapas as a kriy\u0101-yoga limb and the third niyama; perfection of body and senses as its fruit\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 17.14-19 \u2014 the threefold tapas of body, speech, and mind, graded s\u0101ttvic / r\u0101jasic / t\u0101masic\n3. [\u1e5agveda](/references/rigveda.md) 10.129 \u2014 tapas as a creative, world-generating heat", "references/bhagavad-gita": "# Bhagavad G\u012bt\u0101\n\n## What It Is\n\nThe dialogue between K\u1e5b\u1e63\u1e47a and Arjuna embedded in the Mah\u0101bh\u0101rata's Bh\u012b\u1e63ma Parva. It teaches karma-yoga, the path of desireless action: the right to action but not its fruits (2.47), yoga as skill in action (2.50), and the superiority of one's own dharma to another's (3.35, 18.45-48). Its seventeenth chapter grades tapas (17.14-19) and d\u0101na (17.20-22) by gu\u1e47a, providing the tradition's clearest account of how the manner of an act determines its worth. It also locates surrender (\u012b\u015bvara-pra\u1e47idh\u0101na, 9.27; the charama-\u015bloka 18.66) at the heart of the path.\n\n## Why It Matters Here\n\nThe primary source for the Tier 3 concepts (nishkama-karma, svadharma, dana) and a key witness for tapas and ishvara-pranidhana. The s\u0101ttvic/r\u0101jasic/t\u0101masic gradings of tapas and d\u0101na are the textual ground for the bundle's insistence that dharmic ethics is measured by the manner and the inner orientation, not the outward act alone.", "references/mahabharata": "# Mah\u0101bh\u0101rata\n\n## What It Is\n\nThe great epic (itih\u0101sa) attributed to Vy\u0101sa, and the tradition's largest repository of dharma teaching, containing the Bhagavad G\u012bt\u0101 within it. Its didactic books, especially the \u015a\u0101nti Parva and Anu\u015b\u0101sana Parva, treat dharma at length: the maxim ahi\u1e43s\u0101 paramo dharma\u1e25 (non-harm is the highest dharma) and its careful qualification for the k\u1e63atriya; an extended teaching on d\u0101na, its forms, recipients, and the merit of gupta-d\u0101na; and the recurring dictum that dharma is subtle (s\u016bk\u1e63ma), dramatized in the moral dilemmas of the narrative where duties collide.\n\n## Why It Matters Here\n\nA primary witness for ahimsa (the highest-dharma maxim held with the warrior's duty), dana (the Anu\u015b\u0101sana Parva teaching), and svadharma (the epic's hard cases). Its insistence that dharma is subtle supports the bundle's refusal to reduce dharmic ethics to a flat rulebook.", "references/manusmriti": "# Manusm\u1e5bti (M\u0101nava Dharma\u015b\u0101stra)\n\n## What It Is\n\nThe best known of the Dharma\u015b\u0101stra texts, a verse treatise on dharma covering conduct, duty, law, and the ordering of life by stage (\u0101\u015brama) and station. It enumerates the sources of dharma (2.6, 2.12: Veda, sm\u1e5bti, the conduct of the good, and the satisfaction of one's own conscience) and famously elevates \u0101c\u0101ra, right conduct, to the rank of highest dharma (1.108). It treats giving (d\u0101na), purification (\u015bauca), the duties of the student stage, and much of the social-ethical vocabulary this bundle draws on.\n\n## Why It Matters Here\n\nA primary source for \u0101c\u0101ra and d\u0101na, and a supporting witness for asteya, brahmacharya (the \u0101\u015brama), saucha, and svadharma. Cited with the bundle's own guardrail in view: \u0101c\u0101ra is honored as sad\u0101c\u0101ra, the conduct of the good measured against the universal dharma, never as a warrant for inherited injustice. Where Dharma\u015b\u0101stra prescriptions conflict with the universal yamas, the bundle subordinates custom to the universal, as the tradition's own appeal to viveka requires.", "references/rigveda": "# \u1e5agveda\n\n## What It Is\n\nThe oldest of the four Vedas, a collection of hymns (s\u016bktas) to the devas. It is the earliest and richest source for \u1e5bta, the cosmic order by which the sun keeps its path, the waters flow, and the year turns, an order that is at once physical and moral and that even the gods serve. Varu\u1e47a is its guardian; an\u1e5bta (against \u1e5bta) is the Vedic word for falsehood and transgression. The late hymn 10.190 has the ordered world (\u1e5bta and satya) born from tapas, linking cosmic order, truth, and disciplined heat at the root of the tradition.\n\n## Why It Matters Here\n\nThe primary source for \u1e5bta, the concept that grounds the whole bundle's framing: dharmic ethics is alignment with a real cosmic-moral order, not obedience to a command. The \u1e5bta-satya pairing also anchors satya, and the \u1e5bta-tapas link in 10.190 connects the cosmic order to the disciplines that align one with it.", "references/taittiriya-upanishad": "# Taittir\u012bya Upani\u1e63ad\n\n## What It Is\n\nAn Upani\u1e63ad of the K\u1e5b\u1e63\u1e47a Yajurveda, in three sections (vall\u012bs). Its first section, the \u015a\u012bk\u1e63\u0101 Vall\u012b, contains the famous convocation address to the departing student (1.11): satya\u1e43 vada, dharma\u1e43 cara, speak the truth, walk in dharma, followed by the instruction to follow only the good conduct of the teachers and not their lapses. Earlier (1.9) it names sv\u0101dhy\u0101ya and pravacana (study and teaching) as duties to be upheld alongside truth, austerity, and self-control. It pairs \u1e5bta and satya directly.\n\n## Why It Matters Here\n\nA primary witness for satya (the truthfulness charge), svadhyaya (study and teaching as paired duties), achara (follow only the good conduct of the noble), and rta (the \u1e5bta-satya pairing). Its convocation address is the tradition's compact statement of dharmic ethics as truthful, conduct-embodied practice.", "references/yoga-sutra": "# Yoga S\u016btra (Pata\u00f1jali)\n\n## What It Is\n\nThe foundational text of the Yoga Dar\u015bana, roughly 196 aphorisms in four p\u0101das. Its second p\u0101da sets out the practical path: kriy\u0101-yoga (2.1, tapas + sv\u0101dhy\u0101ya + \u012b\u015bvara-pra\u1e47idh\u0101na), then the eight limbs (a\u1e63\u1e6d\u0101\u1e45ga), of which the first two are the yamas (2.30-31, 2.35-39) and the niyamas (2.32, 2.40-45). For each restraint and observance, Pata\u00f1jali states the siddhi-like fruit that arises when it is firmly established (prati\u1e63\u1e6dh\u0101), which is the textual basis for reading the yama-niyama as transformative disciplines rather than commandments. Vy\u0101sa's bh\u0101\u1e63ya is the standard commentary.\n\n## Why It Matters Here\n\nThe primary source for ten of this bundle's fifteen concepts: the five yamas (ahimsa, satya, asteya, brahmacharya, aparigraha) and the five niyamas (saucha, santosha, tapas, svadhyaya, ishvara-pranidhana). The \"when established, this fruit follows\" structure (2.35-45) is the bundle's evidence that dharmic ethics is alignment and transformation, not rule-obedience."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
