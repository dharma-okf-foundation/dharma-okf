<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "dharmic-ethics";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/achara", "label": "\u0100c\u0101ra \u2014 Right Conduct as Embodied Norm", "type": "Concept", "description": "Righteous conduct, the embodied and transmitted norm of how a good person actually lives; sad\u0101c\u0101ra is its honored form. Not mere custom, not etiquette, and not blind tradition or social convention used to justify injustice.", "resource": "", "tags": ["achara", "conduct", "dharmashastra", "tier-3"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/ahimsa", "label": "Ahi\u1e43s\u0101 \u2014 Harmlessness as the Ground of All Conduct", "type": "Concept", "description": "The disposition of non-harm rooted in seeing the one Self in all beings; the first and root yama. Not the political tactic of non-violence, not pacifism, not a dietary rule, not passivity.", "resource": "", "tags": ["ahimsa", "yama", "ethics", "tier-1"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/aparigraha", "label": "Aparigraha \u2014 Non-Grasping, Inner and Outer", "type": "Concept", "description": "Freedom from the clutch of ownership: taking and holding only what is needed, and releasing the grip of possessiveness itself. The fifth yama. Not minimalism as aesthetic, not poverty, and not asteya.", "resource": "", "tags": ["aparigraha", "yama", "non-attachment", "tier-1"], "color": "#f59e0b", "size": 45}}, {"data": {"id": "concepts/asteya", "label": "Asteya \u2014 Non-Misappropriation in Every Form", "type": "Concept", "description": "Non-stealing extended to every subtle form of taking what is not freely given: credit, time, attention, ideas. The third yama. Not merely refraining from theft of property, and not a legal standard.", "resource": "", "tags": ["asteya", "yama", "ethics", "tier-1"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/brahmacharya", "label": "Brahmacharya \u2014 Conduct That Moves Toward Brahman", "type": "Concept", "description": "The disciplined gathering and conservation of energy, conduct that moves toward Brahman; the fourth yama. Not mere celibacy, not sexual repression, and not the same as the student life-stage that shares the name.", "resource": "", "tags": ["brahmacharya", "yama", "energy", "tier-1"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/dana", "label": "D\u0101na \u2014 Giving as Sacrificial Act", "type": "Concept", "description": "Giving as a dharmic and sacrificial act whose value lies in the manner and the giver's non-attachment, graded by how it is given; the social face of the bundle. Not charity, not philanthropy, not a transactional donation, and not almsgiving.", "resource": "", "tags": ["dana", "giving", "ethics", "tier-3"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/ishvara-pranidhana", "label": "\u012a\u015bvara-Pra\u1e47idh\u0101na \u2014 Surrender of Action and Fruit to the Lord", "type": "Concept", "description": "The offering of all one's actions, and their fruits, to the Lord as a yogic discipline; the fifth niyama and third limb of kriy\u0101-yoga. Not submission to a deity out of fear, not the bhakti self-surrender of \u015bara\u1e47\u0101gati, and not the metaphysics of \u012a\u015bvara treated in the yoga bundle.", "resource": "", "tags": ["ishvara-pranidhana", "niyama", "surrender", "tier-2"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/nishkama-karma", "label": "Ni\u1e63k\u0101ma-Karma \u2014 Desireless Action (Karma-Yoga)", "type": "Concept", "description": "Action performed with full engagement but without attachment to its fruit, offered as discipline and duty; the method of karma-yoga. Not inaction, not indifference to outcomes, not careless work, and not identical with bhakti's sev\u0101.", "resource": "", "tags": ["nishkama-karma", "karma-yoga", "action", "tier-3"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/rta", "label": "\u1e5ata \u2014 The Cosmic Order, Root of Dharma", "type": "Concept", "description": "The Vedic cosmic-moral order, the truth-aligned course that the gods themselves obey; the pre-Vedic root from which dharma later individualizes. Not 'law' in the legislative sense, not fate, not nature as mere physics.", "resource": "", "tags": ["rta", "cosmic-order", "vedic", "tier-3"], "color": "#f59e0b", "size": 51}}, {"data": {"id": "concepts/santosha", "label": "Santo\u1e63a \u2014 Contentment Independent of Conditions", "type": "Concept", "description": "Active equanimity that does not depend on getting what one wants; the second niyama. Not complacency, not settling, not mere satisfaction, and not the dispassion (vair\u0101gya) of the foundation bundle.", "resource": "", "tags": ["santosha", "niyama", "contentment", "tier-2"], "color": "#f59e0b", "size": 45}}, {"data": {"id": "concepts/satya", "label": "Satya \u2014 Truthfulness as Alignment with the Real", "type": "Concept", "description": "Truthfulness as the alignment of thought, word, and deed with what is, in harmony with \u1e5bta; the second yama. Not mere factual accuracy, not honesty as a social virtue, and not the epistemic or ontological 'truth' of the vedanta bundle.", "resource": "", "tags": ["satya", "yama", "truth", "tier-1"], "color": "#f59e0b", "size": 47}}, {"data": {"id": "concepts/saucha", "label": "\u015aauca \u2014 Purity of Body, Speech, and Mind", "type": "Concept", "description": "Inner and outer purification as a discipline that clarifies the instrument of practice; the first niyama. Not hygiene, not ritual cleanliness as superstition, and not a purity-pollution social code.", "resource": "", "tags": ["saucha", "niyama", "purity", "tier-2"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/svadharma", "label": "Svadharma \u2014 One's Own Dharma, the Contextual Duty", "type": "Concept", "description": "The duty proper to one's own nature, role, and stage of life, as distinct from another's; the contextual pole of dharmic ethics held alongside the universal. Not job or career, not self-interest, and not a caste-determined fate.", "resource": "", "tags": ["svadharma", "duty", "dharma", "tier-3"], "color": "#f59e0b", "size": 52}}, {"data": {"id": "concepts/svadhyaya", "label": "Sv\u0101dhy\u0101ya \u2014 Study That Returns One to the Self", "type": "Concept", "description": "Disciplined study and recitation of liberating scripture, and the self-inquiry it occasions; the fourth niyama. Not academic study, not casual reading, and deeper than a bare niyama mention; distinct from the vedanta study-path of \u015brava\u1e47a-manana-nididhy\u0101sana.", "resource": "", "tags": ["svadhyaya", "niyama", "study", "tier-2"], "color": "#f59e0b", "size": 50}}, {"data": {"id": "concepts/tapas", "label": "Tapas \u2014 The Heat of Transformative Discipline", "type": "Concept", "description": "The focused heat of disciplined effort that burns away impurity and transforms the practitioner; the third niyama. Not self-punishment, not penance for guilt, not grim asceticism for its own sake.", "resource": "", "tags": ["tapas", "niyama", "discipline", "tier-2"], "color": "#f59e0b", "size": 45}}, {"data": {"id": "references/bhagavad-gita", "label": "Bhagavad G\u012bt\u0101", "type": "Reference", "description": "K\u1e5b\u1e63\u1e47a's teaching to Arjuna; the locus of karma-yoga (2.47-48), svadharma (3.35, 18.47), and the threefold typologies of tapas and d\u0101na (17.14-22).", "resource": "", "tags": ["primary-source", "smriti", "karma-yoga"], "color": "#10b981", "size": 34}}, {"data": {"id": "references/mahabharata", "label": "Mah\u0101bh\u0101rata", "type": "Reference", "description": "The great epic and dharma-encyclopedia; source of ahi\u1e43s\u0101 paramo dharma\u1e25, the Anu\u015b\u0101sana Parva's teaching on d\u0101na, and the hard cases that test svadharma.", "resource": "", "tags": ["primary-source", "itihasa", "smriti"], "color": "#10b981", "size": 34}}, {"data": {"id": "references/manusmriti", "label": "Manusm\u1e5bti (M\u0101nava Dharma\u015b\u0101stra)", "typ karma", "target": "concepts/santosha"}}, {"data": {"id": "concepts/nishkama-karma__concepts/dana", "source": "concepts/nishkama-karma", "target": "concepts/dana"}}, {"data": {"id": "concepts/nishkama-karma__references/bhagavad-gita", "source": "concepts/nishkama-karma", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/nishkama-karma__references/mahabharata", "source": "concepts/nishkama-karma", "target": "references/mahabharata"}}, {"data": {"id": "concepts/nishkama-karma__references/yoga-sutra", "source": "concepts/nishkama-karma", "target": "references/yoga-sutra"}}, {"data": {"id": "concepts/rta__concepts/satya", "source": "concepts/rta", "target": "concepts/satya"}}, {"data": {"id": "concepts/rta__concepts/svadharma", "source": "concepts/rta", "target": "concepts/svadharma"}}, {"data": {"id": "concepts/rta__concepts/achara", "source": "concepts/rta", "target": "concepts/achara"}}, {"data": {"id": "concepts/rta__concepts/nishkama-karma", "source": "concepts/rta", "target": "concepts/nishkama-karma"}}, {"data": {"id": "concepts/rta__references/rigveda", "source": "concepts/rta", "target": "references/rigveda"}}, {"data": {"id": "concepts/rta__references/taittiriya-upanishad", "source": "concepts/rta", "target": "references/taittiriya-upanishad"}}, {"data": {"id": "concepts/rta__references/mahabharata", "source": "concepts/rta", "target": "references/mahabharata"}}, {"data": {"id": "concepts/santosha__concepts/aparigraha", "source": "concepts/santosha", "target": "concepts/aparigraha"}}, {"data": {"id": "concepts/santosha__concepts/saucha", "source": "concepts/santosha", "target": "concepts/saucha"}}, {"data": {"id": "concepts/santosha__concepts/ishvara-pranidhana", "source": "concepts/santosha", "target": "concepts/ishvara-pranidhana"}}, {"data": {"id": "concepts/santosha__concepts/nishkama-karma", "source": "concepts/santosha", "target": "concepts/nishkama-karma"}}, {"data": {"id": "concepts/santosha__references/yoga-sutra", "source": "concepts/santosha", "target": "references/yoga-sutra"}}, {"data": {"id": "concepts/santosha__references/bhagavad-gita", "source": "concepts/santosha", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/santosha__references/mahabharata", "source": "concepts/santosha", "target": "references/mahabharata"}}, {"data": {"id": "concepts/satya__concepts/ahimsa", "source": "concepts/satya", "target": "concepts/ahimsa"}}, {"data": {"id": "concepts/satya__concepts/rta", "source": "concepts/satya", "target": "concepts/rta"}}, {"data": {"id": "concepts/satya__concepts/achara", "source": "concepts/satya", "target": "concepts/achara"}}, {"data": {"id": "concepts/satya__concepts/svadhyaya", "source": "concepts/satya", "target": "concepts/svadhyaya"}}, {"data": {"id": "concepts/satya__references/yoga-sutra", "source": "concepts/satya", "target": "references/yoga-sutra"}}, {"data": {"id": "concepts/satya__references/taittiriya-upanishad", "source": "concepts/satya", "target": "references/taittiriya-upanishad"}}, {"data": {"id": "concepts/satya__references/rigveda", "source": "concepts/satya", "target": "references/rigveda"}}, {"data": {"id": "concepts/saucha__concepts/santosha", "source": "concepts/saucha", "target": "concepts/santosha"}}, {"data": {"id": "concepts/saucha__concepts/tapas", "source": "concepts/saucha", "target": "concepts/tapas"}}, {"data": {"id": "concepts/saucha__concepts/brahmacharya", "source": "concepts/saucha", "target": "concepts/brahmacharya"}}, {"data": {"id": "concepts/saucha__concepts/svadhyaya", "source": "concepts/saucha", "target": "concepts/svadhyaya"}}, {"data": {"id": "concepts/saucha__references/yoga-sutra", "source": "concepts/saucha", "target": "references/yoga-sutra"}}, {"data": {"id": "concepts/saucha__references/bhagavad-gita", "source": "concepts/saucha", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/saucha__references/manusmriti", "source": "concepts/saucha", "target": "references/manusmriti"}}, {"data": {"id": "concepts/svadharma__concepts/rta", "source": "concepts/svadharma", "target": "concepts/rta"}}, {"data": {"id": "concepts/svadharma__concepts/nishkama-karma", "source": "concepts/svadharma", "target": "concepts/nishkama-karma"}}, {"data": {"id": "concepts/svadharma__concepts/ahimsa", "source": "concepts/svadharma", "target": "concepts/ahimsa"}}, {"data": {"id": "concepts/svadharma__concepts/achara", "source": "concepts/svadharma", "target": "concepts/achara"}}, {"data": {"id": "concepts/svadharma__references/bhagavad-gita", "source": "concepts/svadharma", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/svadharma__references/manusmriti", "source": "concepts/svadharma", "target": "references/manusmriti"}}, {"data": {"id": "concepts/svadharma__references/mahabharata", "source": "concepts/svadharma", "target": "references/mahabharata"}}, {"data": {"id": "concepts/svadhyaya__concepts/tapas", "source": "concepts/svadhyaya", "target": "concepts/tapas"}}, {"data": {"id": "concepts/svadhyaya__concepts/ishvara-pranidhana", "source": "concepts/svadhyaya", "target": "concepts/ishvara-pranidhana"}}, {"data": {"id": "concepts/svadhyaya__concepts/satya", "source": "concepts/svadhyaya", "target": "concepts/satya"}}, {"data": {"id": "concepts/svadhyaya__concepts/saucha", "source": "concepts/svadhyaya", "target": "concepts/saucha"}}, {"data": {"id": "concepts/svadhyaya__references/yoga-sutra", "source": "concepts/svadhyaya", "target": "references/yoga-sutra"}}, {"data": {"id": "concepts/svadhyaya__references/taittiriya-upanishad", "source": "concepts/svadhyaya", "target": "references/taittiriya-upanishad"}}, {"data": {"id": "concepts/svadhyaya__references/bhagavad-gita", "source": "concepts/svadhyaya", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/tapas__concepts/svadhyaya", "source": "concepts/tapas", "target": "concepts/svadhyaya"}}, {"data": {"id": "concepts/tapas__concepts/ishvara-pranidhana", "source": "concepts/tapas", "target": "concepts/ishvara-pranidhana"}}, {"data": {"id": "concepts/tapas__concepts/brahmacharya", "source": "concepts/tapas", "target": "concepts/brahmacharya"}}, {"data": {"id": "concepts/tapas__concepts/saucha", "source": "concepts/tapas", "target": "concepts/saucha"}}, {"data": {"id": "concepts/tapas__references/yoga-sutra", "source": "concepts/tapas", "target": "references/yoga-sutra"}}, {"data": {"id": "concepts/tapas__references/bhagavad-gita", "source": "concepts/tapas", "target": "references/bhagavad-gita"}}, {"data": {"id": "concepts/tapas__references/rigveda", "source": "concepts/tapas", "target": "references/rigveda"}}], "bodies": {"concepts/achara": "# \u0100c\u0101ra \u2014 \u0906\u091a\u093e\u0930\n\n**Not:** custom (mere), etiquette, blind tradition, social convention (as justification)\n\n\u0100c\u0101ra is right conduct: the embodied, transmitted norm of how a good person actually lives, learned more from example than from precept. In its honored form, sad\u0101c\u0101ra (the conduct of the good), it is held by the Dharma\u015b\u0101stra to be among the very roots of dharma, the place where ethics stops being abstract and becomes a way of moving through a day.\n\n## Etymology\n\nFrom *\u0101* (toward, near) + \u221a*car* (to move, to walk, to conduct oneself), the same root as in brahmacarya. \u0100c\u0101ra is \"the way one moves, one's manner of conducting oneself.\" Conduct here is literally how you walk through life, the gait of a character, not a set of stated rules.\n\n## What It Actually Means\n\nManusm\u1e5bti names \u0101c\u0101ra as the highest dharma (1.108) and lists it among the sources of dharma alongside the Veda, sm\u1e5bti, and the satisfaction of conscience (2.6, 2.12). The reason is practical: most of right living is not deducible from texts in the moment; it is caught from the conduct of those who already embody dharma, the \u015bi\u1e63\u1e6das (the cultivated, disciplined good). \u0100c\u0101ra is dharma made visible and imitable. This is why the tradition cares so much about the company one keeps and the examples one follows: character is transmitted by \u0101c\u0101ra, person to person, far more than by argument.\n\n## The Guardrail Against Misuse\n\nBecause \u0101c\u0101ra appeals to what the good have always done, it can be misused to sanctify inherited injustice as time-honored custom. The tradition supplies its own correction. Sad\u0101c\u0101ra is the conduct of the good, and conduct that violates the universal dharma, the yamas binding on all, is by definition not the conduct of the good, no matter how old or widespread. \u0100c\u0101ra is subordinate to \u1e5bta and to s\u0101dh\u0101ra\u1e47a-dharma, and it must answer to viveka (discernment). A practice is dharmic because it traces the order of the real, not merely because it is customary. Naming this is part of representing \u0101c\u0101ra honestly.\n\n## Why the Substitutes Fail\n\n\"Custom\" and \"social convention\" drop the honored qualifier and let any habit pass as \u0101c\u0101ra, when sad\u0101c\u0101ra is specifically the dharma-embodying conduct of the good. \"Etiquette\" shrinks it to manners. \"Blind tradition\" is precisely the corruption the tradition guards against by tying \u0101c\u0101ra to the universal dharma and to discernment.\n\n## Cross-References\n- [\u1e5ata](rta.md) \u2014 \u0101c\u0101ra is right conduct only insofar as it traces the cosmic order\n- [Satya](satya.md) \u2014 truthfulness is among the embodied norms that constitute sad\u0101c\u0101ra\n- [Svadharma](svadharma.md) \u2014 \u0101c\u0101ra is how one's own duty is actually lived in daily conduct\n- [Ahi\u1e43s\u0101](ahimsa.md) \u2014 the universal yama that any genuine sad\u0101c\u0101ra must honor; custom cannot override it\n\n## Audience Metaphor\n\nThink of how you learned to be a guest in someone's home, not from a manual but from watching, as a child, how the adults you respected behaved: taking off shoes, helping clear, thanking the host. The knowing went in through the eyes and the hands, not through a list. \u0100c\u0101ra is that kind of moral learning, conduct absorbed from the example of the good. And just as you would not keep imitating a rude or cruel host simply because it was what you saw, sad\u0101c\u0101ra means the conduct worth absorbing is the conduct of the genuinely good, measured against what is truly right, not merely the conduct that happens to be around you.\n\n## Citations\n\n1. [Manusm\u1e5bti](/references/manusmriti.md) 1.108, 2.6, 2.18 \u2014 \u0101c\u0101ra as the highest dharma and a root-source of dharma; the conduct of the \u015bi\u1e63\u1e6das\n2. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 sad\u0101c\u0101ra praised, and the hard cases where custom and dharma diverge\n3. [Taittir\u012bya Upani\u1e63ad](/references/taittiriya-upanishad.md) 1.11 \u2014 the graduate told to follow only the good conduct of the teachers, not their lapses", "concepts/ahimsa": "# Ahi\u1e43s\u0101 \u2014 \u0905\u0939\u093f\u0902\u0938\u093e\n\n**Not:** non-violence (as political tactic), pacifism, vegetarianism (as a mere rule), passivity\n\nAhi\u1e43s\u0101 is the disposition of non-harm: the established refusal to injure any being in thought, word, or deed, grounded in the recognition that the same Self dwells in all. It is the first of the five yamas and the root from which the rest grow, because every other restraint is a particular form of not-harming.\n\n## Etymology\n\nFrom *a-* (not) + \u221a*hi\u1e43s* (to injure, to strike, desiderative of \u221ahan, to kill). Literally \"the state of not wishing to harm.\" The word names an absence, but the tradition reads it as a positive inner condition: not the mere lack of a blow, but the extinction of the will to strike.\n\n## What It Actually Means\n\nPata\u00f1jali ranks ahi\u1e43s\u0101 first because the other yamas are its specifications (Vy\u0101sa-bh\u0101\u1e63ya on YS 2.30): truthfulness, non-stealing, continence, and non-grasping are each a way of not harming. Its measure is internal. YS 2.35 states that when ahi\u1e43s\u0101 is firmly established in a person, beings in their presence give up enmity, even those naturally hostile. The fruit is relational and effortless, which tells you the cause is a settled state of being, not a performed behavior.\n\n## Harmlessness and the K\u1e63atriya's Duty\n\nThe hardest case is the one the G\u012bt\u0101 opens with: Arjuna lays down his bow in the name of not-harming, and K\u1e5b\u1e63\u1e47a corrects him. Ahi\u1e43s\u0101 does not collapse into refusal of all force, because the deciding factor is the interior one, the presence or absence of hatred and the craving to injure. Duty discharged without malice, without attachment to the harm, can be ahi\u1e43s\u0101; withdrawal driven by aversion and self-protection is not. This is why ahi\u1e43s\u0101 is paired in this bundle with svadharma and ni\u1e63k\u0101ma-karma: harmlessness is held inside right action, not against it.\n\n## Why the Substitutes Fail\n\n\"Non-violence\" as a political tactic and \"pacifism\" both move the test outward to behavior and results, missing that ahi\u1e43s\u0101 is an established inner state whose proof is that enmity dissolves around it. \"Vegetarianism\" names one practice and mistakes it for the whole. \"Passivity\" inverts the concept entirely, since ahi\u1e43s\u0101 is a strenuous discipline of the will, not the easy option of doing nothing.\n\n## Cross-References\n- [Satya](satya.md) \u2014 truthfulness is subordinated to ahi\u1e43s\u0101: a truth told to wound is not satya\n- [Asteya](asteya.md) \u2014 non-stealing is a form of not-harming applied to what is another's\n- [Ni\u1e63k\u0101ma-Karma](nishkama-karma.md) \u2014 action without the craving to harm is how ahi\u1e43s\u0101 survives inside duty\n- [Svadharma](svadharma.md) \u2014 one's own duty (including protective force) is performed within, not against, harmlessness\n\n## Audience Metaphor\n\nThink of a surgeon's hands. The surgeon cuts, draws blood, breaks the body open, and yet there is no violence in it, because there is no will to harm and the whole act is bent toward healing. Now picture someone who never lifts a hand but seethes with contempt for everyone around them. The first is ahi\u1e43s\u0101 in action; the second is hi\u1e43s\u0101 in stillness. The blade is not the question. The heart that moves it is.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.30, 2.35 \u2014 ahi\u1e43s\u0101 as the first yama; enmity ceases in the presence of one established in it\n2. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 ahi\u1e43s\u0101 paramo dharma\u1e25: non-harm as the highest dharma, held alongside the warrior's duty\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 13.7, 16.2 \u2014 ahi\u1e43s\u0101 listed among the marks of knowledge and the divine endowment", "concepts/aparigraha": "# Aparigraha \u2014 \u0905\u092a\u0930\u093f\u0917\u094d\u0930\u0939\n\n**Not:** minimalism, poverty, non-stealing (asteya), renunciation of all property\n\nAparigraha is non-grasping: holding what one needs without the clutch of ownership, and releasing the inner grip of possessiveness itself. As the fifth and final yama it completes the restraints by addressing not the act of taking but the deeper attachment of keeping and identifying with the held.\n\n## Etymology\n\nFrom *a-* (not) + *parigraha* (grasping all around, seizing, accumulation; from *pari*, around, + \u221a*grah*, to grasp). Parigraha is the encircling grip by which we make things mine; aparigraha is the loosening of that grip. The image is of hands that hold open rather than clenched.\n\n## What It Actually Means\n\nYS 2.39 states that when aparigraha is firmly established, knowledge of the how and why of births arises: freed from clinging, the practitioner gains insight into the very mechanism of becoming. The fruit is a release from the chain of acquisition that binds one to sa\u1e43s\u0101ra. Aparigraha is inward first. One may handle wealth and possessions and still practice it, provided the sense of mine, the anxiety of holding, and the identification of self with property are released. It is the antidote to the restless accumulation that the modern economy treats as natural.\n\n## Why the Substitutes Fail\n\n\"Minimalism\" and \"renunciation of all property\" both fix on the quantity of objects, when aparigraha is about the quality of one's relation to them; one can own little and grasp hard, or steward much and hold loosely. \"Poverty\" confuses a chosen inner freedom with an imposed material lack. \"Non-stealing\" (asteya) is the complementary yama, not a synonym: asteya restrains taking, aparigraha restrains keeping.\n\n## Cross-References\n- [Asteya](asteya.md) \u2014 the complementary yama: asteya restrains taking, aparigraha restrains holding\n- [Santo\u1e63a](santosha.md) \u2014 contentment is the felt fruit of non-grasping; they reinforce each other\n- [Brahmacharya](brahmacharya.md) \u2014 both order the appetites, brahmacarya the energies and aparigraha the possessions\n- [D\u0101na](dana.md) \u2014 giving freely is non-grasping enacted toward others\n\n## Audience Metaphor\n\nThink of how a child holds a fistful of sand at the beach. Clench tight and the sand streams out between the fingers; the harder the grip, the faster it goes. Hold the hand open and flat, and the sand simply rests there. Aparigraha is the open hand. It is not refusing to touch the sand, and it is not having no sand; it is the discovery that things actually stay better when you stop strangling them, and that the clenched fist costs you more than the open palm ever does.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.30, 2.39 \u2014 aparigraha as the fifth yama; knowledge of the rounds of birth arises in the one established in it\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 6.10, 18.49 \u2014 the renunciation of possessiveness and the freedom of the unattached\n3. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 moderation in acquisition among the conduct of the wise", "concepts/asteya": "# Asteya \u2014 \u0905\u0938\u094d\u0924\u0947\u092f\n\n**Not:** not stealing (property only), honesty about money, legal compliance\n\nAsteya is non-stealing understood at full depth: the refusal to take, in any form, what has not been freely given. As the third yama it governs not only property but credit, time, attention, and ideas, and at its root the very impulse to grasp at what is another's.\n\n## Etymology\n\nFrom *a-* (not) + *steya* (theft, from \u221a*st\u0101* / *stena*, a thief). \"The state of non-theft.\" As with ahi\u1e43s\u0101, the grammatical form names an absence, but the discipline targets the inner craving whose outward shape is theft.\n\n## What It Actually Means\n\nYS 2.37 states that when asteya is firmly established, all jewels present themselves: the one who has wholly given up taking finds abundance arriving unsought. The fruit reveals the cause, which is the extinction of the grasping reflex, not merely keeping one's hands off others' goods. The tradition reads asteya broadly. To take credit for another's work, to consume someone's time and attention without leave, to use what was lent as if owned, to harbor the wish to possess what belongs to another, all are forms of steya. Asteya is the cleaning of that whole impulse.\n\n## Why the Substitutes Fail\n\n\"Not stealing property\" and \"honesty about money\" both shrink asteya to the material and visible, missing the subtle thefts and the inner covetousness that are its real field. \"Legal compliance\" sets the bar at what is permitted, but much that is legal still takes what was not freely given. Asteya is measured by the heart's relation to what is another's, not by the statute book.\n\n## Cross-References\n- [Ahi\u1e43s\u0101](ahimsa.md) \u2014 taking what is another's is a form of harm; asteya specifies ahi\u1e43s\u0101 toward property and due\n- [Aparigraha](aparigraha.md) \u2014 non-stealing restrains taking; non-grasping restrains keeping\n- [D\u0101na](dana.md) \u2014 the giver's posture is the inverse of the taker's; d\u0101na and asteya complete each other\n- [Satya](satya.md) \u2014 claiming another's credit is both theft and untruth\n\n## Audience Metaphor\n\nThink of how easily a meeting is stolen. No one takes an object; someone simply repeats a colleague's idea as their own, and the credit quietly changes hands. No law is broken, no property moves, and yet something real was taken from someone who gave it freely only as a thought aloud. Asteya is the discipline that notices exactly this kind of taking, the kind that leaves the room looking undisturbed, and refuses it.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.30, 2.37 \u2014 asteya as the third yama; abundance arrives to the one established in non-stealing\n2. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 theft in its gross and subtle forms among the conduct prohibitions\n3. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 covetousness (lobha) as the root of taking, named across the dharma teachings", "concepts/brahmacharya": "# Brahmacharya \u2014 \u092c\u094d\u0930\u0939\u094d\u092e\u091a\u0930\u094d\u092f\n\n**Not:** celibacy, sexual repression, abstinence (as a rule), the student stage (\u0101\u015brama)\n\nBrahmacarya is the gathering and right direction of vital energy: conduct that moves the whole person toward Brahman rather than scattering force through unchecked appetite. As the fourth yama it is far wider than sexual continence, governing the disciplined economy of all one's energies.\n\n## Etymology\n\nA compound of *brahman* (the Absolute, also the Veda) and \u221a*car* (to move, to walk, to conduct oneself), so brahmacarya is \"moving in Brahman\" or \"conduct directed toward the highest.\" The word builds the goal into the discipline: it is not abstention for its own sake but motion toward the real.\n\n## What It Actually Means\n\nYS 2.38 states that when brahmacarya is firmly established, v\u012brya (vital energy, potency, vigor) is gained. The fruit is an accumulation of force, which tells you the discipline is conservation and transmutation, not denial. Energy not dissipated through the senses is available for the inner work. Sexual continence is the most discussed instance because sexual energy is the most concentrated, but the tradition applies brahmacarya to speech, appetite, and attention as well: the householder who keeps faith with a spouse and orders their desires is practicing brahmacarya no less than the monk.\n\n## The Yama and the \u0100\u015brama (a Distinction to Keep)\n\nThe same word names the first \u0101\u015brama, the celibate student stage in which one lives with a teacher and studies. That is a period of life. The yama is a discipline of energy that any person at any stage can practice. Collapsing the two produces the common error that brahmacarya is \"for the young and unmarried,\" when in fact the Yoga S\u016btra commends the yama to every aspirant.\n\n## Why the Substitutes Fail\n\n\"Celibacy\" and \"abstinence\" name a single prohibition and miss the positive, energetic core of the discipline, the gathering of force toward Brahman. \"Sexual repression\" is its near-enemy and its inversion: repression jams desire down and leaves it warring; brahmacarya redirects it and yields vigor. Reading the yama as merely \"the student stage\" loses its general application.\n\n## Cross-References\n- [Tapas](tapas.md) \u2014 both concentrate energy; tapas is the heat of effort, brahmacarya its conservation\n- [Aparigraha](aparigraha.md) \u2014 non-grasping frees the outer life as brahmacarya orders the inner energies\n- [Santo\u1e63a](santosha.md) \u2014 contentment removes the restlessness that drives dissipation\n- [Sv\u0101dhy\u0101ya](svadhyaya.md) \u2014 energy conserved is energy available for study and self-inquiry\n\n## Audience Metaphor\n\nThink of a river and a hydroelectric dam. Left to spread across a flood plain, the water's power dissipates into mud and marsh. Gathered and channeled, the same water turns turbines and lights a city. Brahmacarya is not damming the river to stop it; it is gathering a force that would otherwise scatter and directing it to do real work. Repression builds a wall and lets the water rot behind it. Brahmacarya builds the channel.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.30, 2.38 \u2014 brahmacarya as the fourth yama; v\u012brya is gained by the one established in it\n2. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 the brahmacarya \u0101\u015brama and the conduct of the student, distinct from the yama\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 6.14, 17.14 \u2014 brahmacarya among the disciplines of body and mind", "concepts/dana": "# D\u0101na \u2014 \u0926\u093e\u0928\n\n**Not:** charity, philanthropy, donation (transactional), almsgiving\n\nD\u0101na is giving raised to a sacrificial act: the offering of what is one's own in a way whose entire worth lies in the manner of the giving and the non-attachment of the giver. It is the social face of this bundle, the point where the inner disciplines turn outward into the world of others, and the tradition measures it not by the size of the gift but by how it is given.\n\n## Etymology\n\nFrom \u221a*d\u0101* (to give). D\u0101na is \"the act of giving, the gift.\" The same root underlies the Latin *donum* and the English *donate*, but where the modern descendants drifted toward the object transferred, d\u0101na keeps the accent on the act and the giver's disposition within it.\n\n## What It Actually Means\n\nThe G\u012bt\u0101 states the heart of it by grading d\u0101na into three (17.20-22). S\u0101ttvic d\u0101na is given as a matter of duty, to a worthy recipient (p\u0101tra), at the right place and time, to one who can make no return, with no expectation of anything back. R\u0101jasic d\u0101na is given grudgingly, or for the sake of a return, or for the fruit it will bring the giver. T\u0101masic d\u0101na is given at the wrong place and time, to the unworthy, without respect, or with contempt. The striking implication is that the same material gift can be the highest or the lowest d\u0101na depending entirely on the manner: a large gift given for recognition is inferior; a small one given anonymously to one who cannot repay is superior. D\u0101na also functions as yaj\u00f1a: giving discharges the \u1e5b\u1e47as, the debts a person is born owing, and so it is woven into the cosmic economy, not an optional benevolence. The honored form is gupta-d\u0101na, the gift given in secret, precisely because hiddenness strips away the last residue of self-seeking.\n\n## Why the Substitutes Fail\n\n\"Charity\" and \"philanthropy\" both center the giver and measure by the recipient-outcome (relief delivered, scale achieved, the named wing of a hospital), missing that d\u0101na is graded by the giver's manner and inner freedom and that its high form is anonymous. \"Donation\" makes giving a transfer of surplus, often with a receipt or expected goodwill, where d\u0101na is a sacrificial discharge of debt that purifies the one who gives. \"Almsgiving\" assumes a hierarchy of superior-giver over beggar-receiver that d\u0101na specifically dissolves.\n\n## D\u0101na and Sev\u0101 (a Neighbor to Keep Distinct)\n\nD\u0101na is the gift transferred; sev\u0101 (in `okf/bhakti-marga/`) is the service rendered with one's own hands. Both are selfless, and both can be offered to the Divine in all. But d\u0101na gives a thing, while sev\u0101 gives labor and presence; one can perform sev\u0101 with nothing to give materially, and one can give d\u0101na without serving. Held together with ni\u1e63k\u0101ma-karma, d\u0101na is simply desireless action in the specific form of giving.\n\n## Audience Metaphor\n\nThink of two people who each give the same large sum to the same cause. The first gives at a gala, name on the program, photograph taken, the warm glow of being seen to give. The second wires it quietly, anonymously, having checked that it reaches someone who can never thank or repay them, and tells no one. The cause receives identical money. But the tradition is unembarrassed about which is the higher d\u0101na, and it is not the louder one. D\u0101na asks a question philanthropy never quite does: not how much did you give, but what was left of your ego when you gave it.\n\n## Cross-References\n- [Asteya](asteya.md) \u2014 the giver's open posture is the exact inverse of the taker's grasp\n- [Aparigraha](aparigraha.md) \u2014 giving freely is non-grasping enacted toward others\n- [Ni\u1e63k\u0101ma-Karma](nishkama-karma.md) \u2014 d\u0101na is desireless action in the particular form of giving\n- [Satya](satya.md) \u2014 d\u0101na given for show is a kind of untruth about one's own motive\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 17.20-22 \u2014 d\u0101na graded s\u0101ttvic, r\u0101jasic, and t\u0101masic by the manner of giving\n2. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 d\u0101na among the foremost duties; the worthy recipient (p\u0101tra) and the merit of right giving\n3. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 the Anu\u015b\u0101sana Parva's extended teaching on d\u0101na, its forms, and gupta-d\u0101na", "concepts/ishvara-pranidhana": "# \u012a\u015bvara-Pra\u1e47idh\u0101na \u2014 \u0908\u0936\u094d\u0935\u0930\u092a\u094d\u0930\u0923\u093f\u0927\u093e\u0928\n\n**Not:** submission (out of fear), \u015bara\u1e47\u0101gati (bhakti surrender), \u012a\u015bvara (the Yoga doctrine of the Lord), resignation / fatalism\n\n\u012a\u015bvara-pra\u1e47idh\u0101na is the offering of all one's actions and their fruits to the Lord, taken up as a yogic discipline. As the fifth niyama and the third limb of kriy\u0101-yoga, it loosens the ego's grip on outcomes by laying both the deed and its result at a reality larger than the self.\n\n## Etymology\n\nA compound of *\u012b\u015bvara* (the Lord, the capable one; from \u221a*\u012b\u015b*, to rule, to be master) + *pra\u1e47idh\u0101na* (placing down before, application, profound offering; *pra* + *ni* + \u221a*dh\u0101*, to set down). The image is of setting one's whole activity down before the Lord, a laying-before rather than a giving-up.\n\n## What It Actually Means\n\nPata\u00f1jali gives \u012b\u015bvara-pra\u1e47idh\u0101na two roles. As the third limb of kriy\u0101-yoga (YS 2.1), alongside tapas and sv\u0101dhy\u0101ya, it is the surrender that completes disciplined effort and study. As the fifth niyama (YS 2.45), its fruit is the attainment of sam\u0101dhi: the offering of self-will dissolves the agitation of the ego enough that absorption becomes possible. Earlier (YS 1.23) Pata\u00f1jali names \u012b\u015bvara-pra\u1e47idh\u0101na as itself a direct route to the goal. So this is not piety added on top of yoga; it is a yogic technique whose effect is the quieting of the I that obstructs absorption.\n\n## The Third Treatment of Surrender (a Disambiguation to Keep)\n\nThis concept is the library's third treatment of surrender and the Lord-relation, and an agent holding several bundles must keep all three distinct.\n\n| Bundle | Concept | What it names |\n|--------|---------|---------------|\n| `okf/yoga-darshana/` | `ishvara-yoga` | the metaphysics of \u012a\u015bvara: a special, ever-free puru\u1e63a, the first teacher (what \u012a\u015bvara IS) |\n| `okf/bhakti-marga/` | `sharanagati` | total loving self-surrender as the very means and goal of the devotional path |\n| `okf/dharmic-ethics/` (this bundle) | `ishvara-pranidhana` | a yogic discipline: offering action and fruit to the Lord to loosen the ego (what the yog\u012b DOES) |\n\n\u012a\u015bvara-pra\u1e47idh\u0101na is a practice within a\u1e63\u1e6d\u0101\u1e45ga yoga; \u015bara\u1e47\u0101gati is the whole posture of the bhakta; ishvara-yoga is a doctrine about the Lord. Same neighborhood of words, three different things.\n\n## Why the Substitutes Fail\n\n\"Submission out of fear\" and \"resignation\" both read surrender as either appeasement or the abandonment of effort, when \u012b\u015bvara-pra\u1e47idh\u0101na is the offering of fully engaged action. Collapsing it into bhakti's \u015bara\u1e47\u0101gati erases the difference between one yogic limb and an entire path; collapsing it into the Yoga doctrine of \u012a\u015bvara confuses a practice with a metaphysics.\n\n## Cross-References\n- [Tapas](tapas.md) \u2014 with sv\u0101dhy\u0101ya, the three limbs of kriy\u0101-yoga (YS 2.1)\n- [Sv\u0101dhy\u0101ya](svadhyaya.md) \u2014 study and surrender are the inward two of the three kriy\u0101-yoga limbs\n- [Ni\u1e63k\u0101ma-Karma](nishkama-karma.md) \u2014 offering the fruit to the Lord and renouncing attachment to the fruit are kindred movements\n- [Santo\u1e63a](santosha.md) \u2014 surrender of outcomes and contentment with what comes are one motion\n\n## Audience Metaphor\n\nThink of a singer who finally stops watching the audience. As long as the performer is calculating the applause, every note is half-strangled by self-consciousness, and the ego stands between the singer and the song. The moment the singer offers the whole performance up, to the music itself, to something beyond the verdict, the voice opens and the singing becomes effortless. \u012a\u015bvara-pra\u1e47idh\u0101na is that letting-go offered as a discipline: not singing worse, not refusing to sing, but laying down the anxious self that was managing the result, so that what remains can finally pour through.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 1.23, 2.1, 2.32, 2.45 \u2014 \u012b\u015bvara-pra\u1e47idh\u0101na as a direct route, a kriy\u0101-yoga limb, and the fifth niyama whose fruit is sam\u0101dhi\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 9.27, 12.6-7 \u2014 offering all action to the Lord and the grace that meets it\n3. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 the dedication of works to the Lord among the duties of the disciplined", "concepts/nishkama-karma": "# Ni\u1e63k\u0101ma-Karma \u2014 \u0928\u093f\u0937\u094d\u0915\u093e\u092e \u0915\u0930\u094d\u092e\n\n**Not:** inaction, indifference to outcomes, careless / detached work, sev\u0101 (bhakti service)\n\nNi\u1e63k\u0101ma-karma is desireless action: doing one's work with full skill and engagement while releasing attachment to its fruit. It is the method of karma-yoga, the G\u012bt\u0101's answer to the question of how one can act in the world without being bound by action, and it is the karma-yoga treatment held over from the bhakti bundle's account of sev\u0101.\n\n## Etymology\n\nA compound of *ni\u1e63k\u0101ma* (free of desire; *ni\u1e25*, without, + *k\u0101ma*, desire) + *karma* (action; from \u221a*k\u1e5b*, to do). Literally \"action without desire,\" more precisely action without craving for its personal fruit. The k\u0101ma negated is not the wish to act well but the egoic appetite for the reward.\n\n## What It Actually Means\n\nThe G\u012bt\u0101's pivotal teaching: you have a right to action, never to its fruits; let not the fruit be your motive, nor let attachment draw you to inaction (2.47). One acts because action is unavoidable and because one's svadharma calls for it, but one offers up the result rather than clinging to it. Far from licensing carelessness, this is the condition of excellence: yoga is skill in action (2.50), because attention freed from the anxiety of outcomes can give itself wholly to the doing. The fruit is twofold: the work is done better, and the doer is not bound by it, acting without accumulating the bondage that selfish action breeds (3.9, 5.10, the lotus-leaf untouched by water).\n\n## The Reserved Thread (a Distinction to Keep)\n\nThe bhakti-marga bundle's `seva.md` deliberately held this treatment over to here, because sev\u0101 and ni\u1e63k\u0101ma-karma are close but not identical. Both renounce attachment to fruit. The difference is relational. Ni\u1e63k\u0101ma-karma offers action as discipline and duty, the fruit released; bhakti's sev\u0101 offers action TO a Beloved as love, delighting in the serving itself. The karma-yog\u012b acts rightly and lets the fruit go; the devotee serves the Lord and savors the service. When desireless action is further offered to the Lord, it shades into \u012b\u015bvara-pra\u1e47idh\u0101na and toward sev\u0101; the concepts are kin, and naming the relation is the point.\n\n## Why the Substitutes Fail\n\n\"Inaction\" and \"indifference\" both miss that ni\u1e63k\u0101ma-karma is full, skillful, caring action with only the egoic clinging removed. \"Careless work\" inverts it, since non-attachment heightens skill rather than lowering it. And sev\u0101 (in `okf/bhakti-marga/`) is the devotional cousin: the same selflessness in the key of love-toward-a-Beloved rather than duty-without-craving.\n\n## Cross-References\n- [\u012a\u015bvara-Pra\u1e47idh\u0101na](ishvara-pranidhana.md) \u2014 desireless action offered to the Lord becomes the kriy\u0101-yoga surrender of the fruit\n- [Svadharma](svadharma.md) \u2014 one's own duty is precisely what is to be performed desirelessly\n- [Santo\u1e63a](santosha.md) \u2014 contentment is what makes acting without clinging to fruit livable rather than grim\n- [D\u0101na](dana.md) \u2014 giving without expectation of return is ni\u1e63k\u0101ma applied to the act of giving\n\n## Audience Metaphor\n\nThink of a nurse on a long night shift who has learned not to ride the outcome of every case. She works with total skill and real care, she wants each patient to live, and yet she does not stake her inner steadiness on results she cannot finally control, because a nurse who is wrecked by every loss cannot work the next bed. The skill is undiminished, the caring is real, and the clinging is gone. That is ni\u1e63k\u0101ma-karma: not caring less, but holding the fruit loosely enough that you can give the work everything and still walk out whole. A surgeon who needs each operation to validate them is more dangerous, not more devoted.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 2.47-48, 2.50, 3.19, 5.10 \u2014 the right to action but not its fruits; yoga as skill in action; the lotus-leaf untouched\n2. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 the karma-yoga teaching set within the epic's account of duty under pressure\n3. [Yoga S\u016btra](/references/yoga-sutra.md) 2.1 \u2014 kriy\u0101-yoga, where offered action (\u012b\u015bvara-pra\u1e47idh\u0101na) meets desireless discipline", "concepts/rta": "# \u1e5ata \u2014 \u090b\u0924\n\n**Not:** law (legislative), fate, nature (as mere physics), dharma (as identical)\n\n\u1e5ata is the cosmic order: the truth-aligned course of reality that holds the turning of the seasons, the rising of the sun, and the rightness of true speech and right action in one fabric. It is the Vedic root from which the later, more individual concept of dharma grows, and the order that the gods themselves serve rather than legislate.\n\n## Etymology\n\nFrom \u221a*\u1e5b* (to move, to go, to fit), so \u1e5bta is \"that which is fitted, the well-ordered, the right course.\" The same root yields words for fitting and joining. \u1e5ata is reality in proper joint, the way things move when they move truly. Its guardian in the Veda is Varu\u1e47a, and its twin is satya, truthful speech.\n\n## What It Actually Means\n\nIn the \u1e5agveda, \u1e5bta is the order by which the cosmos coheres: the sun keeps its path, the waters flow, the year turns, all \"by \u1e5bta.\" But \u1e5bta is never merely physical. The same word governs the truth of utterance and the rightness of sacrifice and conduct, so the order of nature and the order of value are one order. To speak truly (satya) is to align speech with \u1e5bta; to act rightly is to move with \u1e5bta; to lie or transgress is an\u1e5bta, against the order. The later tradition individualizes this cosmic order into dharma, the sustaining duty proper to each being and station, but the root intuition is here: ethics is not obedience to a command but alignment with the way things truly are.\n\n## Why \u1e5ata Grounds the Whole Bundle\n\n\u1e5ata is placed in this bundle because it answers the question the framing tension raises: why are the yamas and niyamas disciplines of alignment rather than commandments? Because dharmic ethics rests on \u1e5bta. Right conduct is not arbitrary rule-following; it is attunement to a real cosmic-moral order that one can move with or against. Satya, svadharma, \u0101c\u0101ra, and ni\u1e63k\u0101ma-karma all presuppose \u1e5bta as the order they align to.\n\n## Why the Substitutes Fail\n\n\"Law\" imports a legislator and the possibility of repeal, when \u1e5bta is the inherent, unlegislated order of the real. \"Fate\" makes it a verdict that voids action, when \u1e5bta is precisely what action aligns with or violates. \"Nature as mere physics\" keeps the regularity and discards the moral dimension that is half of \u1e5bta. And \u1e5bta is not simply \"dharma\": it is dharma's wider, older, cosmic root.\n\n## Cross-References\n- [Satya](satya.md) \u2014 \u1e5bta's twin: truthful speech is the human articulation of cosmic order\n- [Svadharma](svadharma.md) \u2014 one's own duty is a local expression of the universal order of \u1e5bta\n- [\u0100c\u0101ra](achara.md) \u2014 right conduct is the embodied tracing of \u1e5bta in daily life\n- [Ni\u1e63k\u0101ma-Karma](nishkama-karma.md) \u2014 desireless action is action performed in accord with \u1e5bta rather than personal craving\n\n## Audience Metaphor\n\nThink of the grain in a piece of wood. A skilled carver does not impose a shape by force; they read the grain and cut with it, and the work comes out clean and strong. Cut against the grain and the wood splinters and fights you, no matter how sharp the tool or how legal the cut. \u1e5ata is the grain of reality. Dharmic ethics is learning to read it and move with it. Wrongdoing is not breaking a rule someone posted; it is cutting against the grain of the way things actually are, and the splintering that follows is not a punishment imposed from outside but the grain having its say.\n\n## Citations\n\n1. [\u1e5agveda](/references/rigveda.md) 1.164, 4.23, 10.190 \u2014 \u1e5bta as the cosmic order guarded by Varu\u1e47a; from tapas and \u1e5bta the ordered world is born\n2. [Taittir\u012bya Upani\u1e63ad](/references/taittiriya-upanishad.md) 1.11 \u2014 \u1e5bta and satya named together in the charge to the departing student\n3. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 dharma as the sustaining order, the later individualization of the Vedic \u1e5bta\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy):\n\n- Dharma boxed into the Western category \"religion\" (and its shadow renderings duty and law) was constructed by colonial administration and census categories (19th c.) and fixed by missionary/colonial lexicography (Monier-Williams, 1899). See [G6 \u2014 Dharma = religion](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/santosha": "# Santo\u1e63a \u2014 \u0938\u0902\u0924\u094b\u0937\n\n**Not:** complacency, settling (for less), satisfaction, dispassion (vair\u0101gya)\n\nSanto\u1e63a is contentment that does not depend on conditions: an active equanimity that remains steady whether or not one gets what one wants. As the second niyama it is not the dullness of having given up but the freedom of no longer being ruled by the next acquisition.\n\n## Etymology\n\nFrom *sam-* (fully, completely) + \u221a*tu\u1e63* (to be pleased, to be satisfied). Santo\u1e63a is \"full satisfaction,\" but the tradition specifies a satisfaction that is complete in itself rather than completed by an external object. The prefix sam- signals wholeness: a contentment that is entire, not the partial relief of a craving met.\n\n## What It Actually Means\n\nYS 2.42 makes the strongest claim of any niyama: from santo\u1e63a comes unsurpassed happiness (santo\u1e63\u0101d anuttama\u1e25 sukha-l\u0101bha\u1e25). This is not the pleasure of getting; it is the happiness available precisely because one has stopped staking one's peace on getting. Santo\u1e63a is therefore compatible with vigorous, ambitious action: one works wholeheartedly and yet is not destabilized by the result, which connects it directly to ni\u1e63k\u0101ma-karma. It is the felt interior of non-grasping (aparigraha).\n\n## Why the Substitutes Fail\n\n\"Complacency\" and \"settling\" both read santo\u1e63a as a slackening of effort or aim, when it is in fact the steadiness that lets one act without anxiety. \"Satisfaction\" is conditional and temporary, ending when desire restarts; santo\u1e63a is unconditional, which is the whole point. And vair\u0101gya (in `okf/dharma-foundation/`) is the prior turning-away from craving; santo\u1e63a is the positive peace that occupies the cleared ground.\n\n## Cross-References\n- [Aparigraha](aparigraha.md) \u2014 santo\u1e63a is the felt fruit of non-grasping\n- [\u015aauca](saucha.md) \u2014 a purified, clear mind settles naturally into contentment\n- [\u012a\u015bvara-Pra\u1e47idh\u0101na](ishvara-pranidhana.md) \u2014 surrender of outcomes and contentment with what comes are one movement\n- [Ni\u1e63k\u0101ma-Karma](nishkama-karma.md) \u2014 contentment is what makes desireless action livable, not grim\n\n## Audience Metaphor\n\nThink of two travelers caught in the same delayed flight. One paces, refreshes the app, snaps at the staff, and is miserable for six hours over a thing entirely outside their control. The other, equally inconvenienced, reads, rests, and is fine. Nothing differs in their circumstances; everything differs in where their peace is anchored. Santo\u1e63a is the second traveler, and the lesson is not \"lower your standards\" but \"stop renting your happiness to events.\" The flight is just as late. Only one of them is free.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.32, 2.42 \u2014 santo\u1e63a as the second niyama; unsurpassed happiness as its fruit\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 2.55, 12.13-14 \u2014 the sthitapraj\u00f1a and the devotee content and steady in all conditions\n3. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 contentment praised as a foremost source of happiness in the dharma teachings", "concepts/satya": "# Satya \u2014 \u0938\u0924\u094d\u092f\n\n**Not:** factual accuracy, honesty (as social virtue), truth (epistemological), sat / reality (ontological)\n\nSatya is truthfulness: the alignment of thought, word, and deed with what is. As the second yama it is the practice of living so that one's speech and one's being are not at odds with reality, and it is held under ahi\u1e43s\u0101, so that truth is never weaponized into harm.\n\n## Etymology\n\nFrom *sat*, the present participle of \u221a*as* (to be), so satya is \"that which pertains to being, that which is.\" Truthfulness is therefore not primarily about reporting facts but about conforming oneself to what genuinely is. To speak satya is to let one's word participate in being rather than in distortion.\n\n## What It Actually Means\n\nYS 2.36 promises that when truthfulness is firmly established, the fruit of action follows the word: the speech of such a person comes true, because there is no gap between what they say and what is. This is satya as a state, not a policy. The Taittir\u012bya Upani\u1e63ad's parting injunction to the student, satya\u1e43 vada, dharma\u1e43 cara (speak truth, walk in dharma), sets satya and conduct side by side. And in the Veda, satya is twinned with \u1e5bta: \u1e5bta is the cosmic order, satya is its truthful articulation in human speech and life. To be truthful is to align with the order of the real.\n\n## Satya Under Ahi\u1e43s\u0101 (a Subordination to Keep)\n\nThe tradition is explicit that satya serves ahi\u1e43s\u0101, not the reverse. A truth spoken to wound, a fact deployed to injure, is not satya but cruelty wearing accuracy as a mask. Where a bare fact would harm and a kinder silence would not betray the real, silence can be the truthful act. This is the opposite of the modern instinct that \"honesty\" licenses any disclosure. Satya is truth in the service of the good, governed by harmlessness.\n\n## Why the Substitutes Fail\n\n\"Factual accuracy\" and \"honesty\" both flatten satya into a reporting standard and lose its grounding in being and its subordination to ahi\u1e43s\u0101. The epistemological and ontological senses (covered in `okf/vedanta-epistemology/`) are about how knowledge is valid and how reality is structured; satya the yama is the ethical discipline of a life lived in accord with the real, which is a different question entirely.\n\n## Cross-References\n- [Ahi\u1e43s\u0101](ahimsa.md) \u2014 satya is held under harmlessness; a truth told to harm is not satya\n- [\u1e5ata](rta.md) \u2014 satya is the human articulation of \u1e5bta, the cosmic order\n- [\u0100c\u0101ra](achara.md) \u2014 truthful speech is one of the embodied norms of right conduct\n- [Sv\u0101dhy\u0101ya](svadhyaya.md) \u2014 study of the real and truthfulness about oneself reinforce each other\n\n## Audience Metaphor\n\nThink of a tuning fork. A true note is not just a \"correct\" sound; it is a vibration in exact agreement with the pitch it claims to be, and when it is true, other strings nearby begin to ring in sympathy. Satya is the person tuned to the real: their word rings true because they are not sounding one pitch while being another. A merely \"accurate\" statement can still come from a person badly out of tune. Satya is the agreement of the whole instrument with what is.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.30, 2.36 \u2014 satya as the second yama; the word of the truth-established becomes efficacious\n2. [Taittir\u012bya Upani\u1e63ad](/references/taittiriya-upanishad.md) 1.11 \u2014 satya\u1e43 vada, dharma\u1e43 cara: the graduating student's charge\n3. [\u1e5agveda](/references/rigveda.md) \u2014 the \u1e5bta\u1e43-satya\u1e43 pairing: cosmic order and its truthful articulation", "concepts/saucha": "# \u015aauca \u2014 \u0936\u094c\u091a\n\n**Not:** hygiene, ritual cleanliness (as superstition), purity-pollution social code\n\n\u015aauca is purification: the disciplined clearing of body, speech, and mind so that the instrument of practice becomes clear. As the first niyama it has an outer face (cleanliness of body and surroundings) and an inner face (clarity, sattva, freedom from the agitations that cloud the mind), and the inner is the one that matters.\n\n## Etymology\n\nFrom *\u015buci* (clear, clean, bright, pure; related to \u221a*\u015buc*, to gleam, to shine). \u015aauca is the quality of brightness or clarity. The root meaning is luminous cleanness, which already points past mere absence of dirt to a positive clearing that lets light through.\n\n## What It Actually Means\n\nPata\u00f1jali gives \u015bauca two consequences. YS 2.40 notes that purification of one's own body brings a certain disinterest in the body and in contact with others' bodies, loosening identification with the physical. YS 2.41 gives the inner fruits: purity of sattva, cheerfulness, one-pointedness, mastery of the senses, and the fitness to behold the Self. The outer practices (cleanliness, s\u0101ttvic diet, ordered surroundings) are in service of this inner clarification. A clouded mind cannot see clearly; \u015bauca is the wiping of the lens.\n\n## Why the Substitutes Fail\n\n\"Hygiene\" captures only the outer half and severs it from its purpose, the clarity of mind that fits one for Self-vision. \"Ritual cleanliness as superstition\" mistakes the means for a magic, forgetting that the rite serves the inward clearing. And the \"purity-pollution social code\" is a grave distortion: \u015bauca is a discipline one practices on oneself, never a license to rank other people as contaminated.\n\n## Cross-References\n- [Santo\u1e63a](santosha.md) \u2014 the next niyama; a clear mind settles naturally into contentment\n- [Tapas](tapas.md) \u2014 disciplined effort and purification work together to refine the instrument\n- [Brahmacharya](brahmacharya.md) \u2014 conserved energy and a clear mind reinforce one another\n- [Sv\u0101dhy\u0101ya](svadhyaya.md) \u2014 a purified mind is the fit ground for fruitful study\n\n## Audience Metaphor\n\nThink of a camera lens smeared with fingerprints. You can own the finest optics in the world, but every photograph comes back hazy and flared until the glass is wiped. Cleaning the lens does not add anything to the scene; it simply lets what is already there come through undistorted. \u015aauca is wiping the lens of the mind. Hygiene cleans the body's surface; \u015bauca clears the seeing itself, so that what is real can register without the smear.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.32, 2.40-41 \u2014 \u015bauca as the first niyama; its outer and inner fruits, culminating in fitness for Self-vision\n2. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 17.14-16 \u2014 purity of body, speech, and mind among the forms of tapas\n3. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 outer purification practices in service of inner clarity", "concepts/svadharma": "# Svadharma \u2014 \u0938\u094d\u0935\u0927\u0930\u094d\u092e\n\n**Not:** job / career, self-interest, caste-determined fate, universal dharma (s\u0101dh\u0101ra\u1e47a-dharma)\n\nSvadharma is one's own dharma: the duty proper to one's particular nature, role, and stage of life, as distinct from anyone else's. It is the contextual pole of dharmic ethics, the recognition that while some duties bind everyone, the concrete shape of right action is irreducibly situated.\n\n## Etymology\n\nA compound of *sva* (own) + *dharma* (that which sustains, duty, right order). Svadharma is \"one's own sustaining duty.\" The sva does not mean for-oneself; it means belonging-to-oneself, the duty that is yours to carry because of who and where you actually are.\n\n## What It Actually Means\n\nThe Bhagavad G\u012bt\u0101 is the locus. K\u1e5b\u1e63\u1e47a tells Arjuna that one's own dharma, even imperfectly performed, is better than another's dharma performed well, and that it is safer to die in one's own dharma than to take up another's (3.35). The point is not mediocrity but fidelity: right action is fitted to one's actual nature (svabh\u0101va), capacities, and station, and abandoning that to perform a borrowed role, however impressive, courts danger. The G\u012bt\u0101 grounds svadharma in svabh\u0101va, the qualities one is actually constituted by (18.41-44), and frees action of attachment to its fruit (which is why svadharma leans on ni\u1e63k\u0101ma-karma). Crucially, svadharma is held in tension with s\u0101dh\u0101ra\u1e47a-dharma, the universal ethics: the yamas bind everyone, and svadharma is how those universals take concrete form in a particular life, never a license to violate them.\n\n## Why the Substitutes Fail\n\n\"Job\" and \"career\" make svadharma a chosen occupation optimized for gain, losing its rootedness in one's actual nature and its character as a calling. \"Self-interest\" inverts the sva, which means own-duty, not own-benefit. The \"caste-determined fate\" reading freezes a qualities-based, living calling into birth-determinism, against the G\u012bt\u0101's own grounding of svadharma in svabh\u0101va. And svadharma is not the universal dharma; it is the contextual layer held alongside it.\n\n## Why the Two Layers Must Stay Together\n\nRead alone, svadharma can be misheard as relativism (everyone has their own truth) and the universal yamas as rigid absolutism. Dharmic ethics is neither. The yamas are s\u0101rvabhauma, the great vows binding regardless of birth, place, time, or circumstance; svadharma is how a real person, with this nature and in this situation, lives those universals concretely. The universal without the contextual is abstract; the contextual without the universal is arbitrary. \u1e5ata is the order that holds both.\n\n## Cross-References\n- [\u1e5ata](rta.md) \u2014 svadharma is a local, situated expression of the universal cosmic order\n- [Ni\u1e63k\u0101ma-Karma](nishkama-karma.md) \u2014 one's own duty is to be performed without attachment to its fruit\n- [Ahi\u1e43s\u0101](ahimsa.md) \u2014 a universal yama that constrains and shapes how any svadharma is carried out\n- [\u0100c\u0101ra](achara.md) \u2014 the conduct through which svadharma is actually lived day to day\n\n## Audience Metaphor\n\nThink of an orchestra. The cellist's duty is not the flautist's, and a cellist who abandons the cello part to play the flute's line, however beautifully, wrecks the symphony. Yet every player, whatever their part, is bound by the same tempo and key, the universal frame no one is exempt from. Svadharma is your part; s\u0101dh\u0101ra\u1e47a-dharma is the tempo and key that bind the whole orchestra. Playing your own part imperfectly serves the music better than playing someone else's perfectly, and no virtuosity excuses you from the shared time signature.\n\n## Citations\n\n1. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 3.35, 18.45-48 \u2014 one's own dharma, grounded in svabh\u0101va, is better than another's; perfection through one's own work\n2. [Manusm\u1e5bti](/references/manusmriti.md) \u2014 the duties proper to station and stage, and the universal duties binding on all\n3. [Mah\u0101bh\u0101rata](/references/mahabharata.md) \u2014 svadharma tested in the hard cases of the epic's moral dilemmas\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy):\n\n- Reading \u1e5ag Veda 10.90 (and the var\u1e47a verses) as the origin-charter of birth-based caste hardened via colonial ethnography and census operations (H.H. Risley, Census of India 1901), then projected backward onto the s\u016bkta (Nicholas Dirks, *Castes of Mind*, 2001). See [G10 \u2014 Puru\u1e63a S\u016bkta and the colonial construction of caste](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/svadhyaya": "# Sv\u0101dhy\u0101ya \u2014 \u0938\u094d\u0935\u093e\u0927\u094d\u092f\u093e\u092f\n\n**Not:** academic study, reading (casual), self-help, \u015brava\u1e47a-manana-nididhy\u0101sana\n\nSv\u0101dhy\u0101ya is study that returns one to the Self: the disciplined, reverent engagement with liberating scripture, together with the recitation of sacred sound, undertaken not to acquire information but to be transformed by it. As the fourth niyama and the second limb of kriy\u0101-yoga, it is the practice by which the teaching is internalized until it works on the practitioner.\n\n## Etymology\n\nA compound of *sva* (own, self) + *adhy\u0101ya* (lesson, study, a portion for recitation; from *adhi* + \u221a*i*, to go over, to study). The word can be read two ways at once, and the tradition intends both: \"study of one's own (texts, the recitation assigned to one)\" and \"study that goes toward the Self.\" The very name folds the object of study back into the studier.\n\n## What It Actually Means\n\nYS 2.44 states that from sv\u0101dhy\u0101ya comes communion with one's chosen deity or ideal (i\u1e63\u1e6da-devat\u0101-samprayoga). Study here is sacramental: the repeated taking-in of a liberating text, and the recitation of mantra and pra\u1e47ava (o\u1e43), open a relationship with the reality the text points to. The Taittir\u012bya Upani\u1e63ad pairs sv\u0101dhy\u0101ya with pravacana (teaching what one has studied) as twin duties. So sv\u0101dhy\u0101ya is study that is recited, embodied, and passed on, not silently consumed.\n\n## Deeper Than the Bare Niyama, and Not the Ved\u0101nta Method (a Disambiguation to Keep)\n\nTwo clarifications matter for any agent holding more than one bundle. First, this is the library's first full treatment of sv\u0101dhy\u0101ya; the yoga-dar\u015bana bundle lists it among the niyamas but does not unfold it, and the depth lives here: sv\u0101dhy\u0101ya is not one item on a checklist but a transformative discipline of returning to the words that reveal the Self. Second, it is not the Advaita study-path of \u015brava\u1e47a (hearing), manana (reflection), and nididhy\u0101sana (contemplative absorption), which is the formal j\u00f1\u0101na method and is reserved for the upanishadic-core bundle. Sv\u0101dhy\u0101ya is the broader devotional-disciplinary practice of study and recitation that any path uses; that triad is one specific Ved\u0101ntic procedure within the wider field.\n\n## Why the Substitutes Fail\n\n\"Academic study\" and \"casual reading\" both keep the text outside the reader as an object; sv\u0101dhy\u0101ya is meant to enter and change the reader. \"Self-help\" aims at the empirical self, while the word itself bends study back toward the Self that all such selves presuppose. And collapsing sv\u0101dhy\u0101ya into \u015brava\u1e47a-manana-nididhy\u0101sana mistakes one school's method for the general discipline.\n\n## Cross-References\n- [Tapas](tapas.md) \u2014 with \u012b\u015bvara-pra\u1e47idh\u0101na, the three limbs of kriy\u0101-yoga (YS 2.1)\n- [\u012a\u015bvara-Pra\u1e47idh\u0101na](ishvara-pranidhana.md) \u2014 study and surrender are the inward two of the three kriy\u0101-yoga limbs\n- [Satya](satya.md) \u2014 study of the real and truthfulness about oneself reinforce each other\n- [\u015aauca](saucha.md) \u2014 a purified mind is the fit ground for fruitful study\n\n## Audience Metaphor\n\nThink of the difference between reading a recipe and learning to cook from your grandmother. You can read the recipe a hundred times and master it as a document, able to recite every measurement, and still not be changed by it. The grandmother's way is to make the dish again and again at her side until the knowing is in your hands and you no longer consult the page. Sv\u0101dhy\u0101ya is the second kind of study. The text is not information to be filed; it is a practice repeated until it becomes part of how you see, and the studying quietly turns into a knowing of yourself.\n\n## Citations\n\n1. [Yoga S\u016btra](/references/yoga-sutra.md) 2.1, 2.32, 2.44 \u2014 sv\u0101dhy\u0101ya as a kriy\u0101-yoga limb and the fourth niyama; communion with the chosen ideal as its fruit\n2. [Taittir\u012bya Upani\u1e63ad](/references/taittiriya-upanishad.md) 1.9 \u2014 sv\u0101dhy\u0101ya and pravacana paired as standing duties\n3. [Bhagavad G\u012bt\u0101](/references/bhagavad-gita.md) 17.15 \u2014 recitation and study (abhy\u0101sa / sv\u0101dhy\u0101ya) among the tapas of speech", "concepts/tapas": "# Tapas \u2014 \u0924\u092a\u0938\u094d\n\n**Not:** self-punishment, penance, asceticism (grim, for its own sake), mortification of the flesh\n\nTapas is the heat of disciplined effort: the focused intensity that burns away impurity and transforms the one who practices it. As the third niyama, and the first limb of kriy\u0101-yoga, it is the friction by which a raw nature is refined, not a punishment inflicted on the self.\n\n## Etymology\n\nFrom \u221a*tap* (to heat, to burn, to glow). Tapas is literally \"heat,\" and the cosmogonic hymns even have creation arise from the tapas of the creator. The metaphor is metallurgical and agricultural at once: heat that smelts ore into metal, that ripens what is raw. Discipline is the heat; transformation is what the heat is for.\n\n## What It Actually Means\n\nYS 2.43 states that from tapas, through the dwindling of impurity, comes perfection of the body and the senses. The discipline refines the instrument. The G\u012bt\u0101 gives tapas its richest treatment, dividing it into three kinds (17.14-16): tapas of the body (purity, reverence, ahi\u1e43s\u0101), of speech (truthful, beneficial, non-agitating words, and sv\u0101dhy\u0101ya), and of the mind (serenity, gentleness, silence, self-control). It then grades tapas by gu\u1e47a (17.17-19): s\u0101ttvic tapas is done with faith and no craving for fruit; r\u0101jasic tapas is done for respect, honor, and show; t\u0101masic tapas is done with deluded self-torture or to harm another. So not all austerity is tapas in the honored sense, and self-torment is named as its degenerate form.\n\n## Why the Substitutes Fail\n\n\"Self-punishment,\" \"penance,\" and \"mortification\" all read tapas through a lens of guilt and atonement, when its logic is transformation: the heat is for refining, not for hurting. \"Grim asceticism for its own sake\" is precisely the r\u0101jasic or t\u0101masic tapas the G\u012bt\u0101 condemns. The honored form is undertaken with faith, free of craving for reward, and measured by what it purifies, never by the quantity of suffering produced.\n\n## Cross-References\n- [Sv\u0101dhy\u0101ya](svadhyaya.md) \u2014 with tapas and \u012b\u015bvara-pra\u1e47idh\u0101na, one of the three limbs of kriy\u0101-yoga (YS 2.1)\n- [\u012a\u015bvara-Pra\u1e47idh\u0101na](ishvara-pranidhana.md) \u2014 the third kriy\u0101-yoga limb; effort offered, not hoarded\n- [Brahmacharya](brahmacharya.md) \u2014 both concentrate energy toward transformation\n- [\u015aauca](saucha.md) \u2014 tapas and purification together refine the instrument of practice\n\n## Audience Metaphor\n\nThink of forging a blade. The smith does not heat the iron to hurt it; the heat is the only way the metal becomes a blade at all. Beaten cold, the iron just cracks. Held in the fire and worked, the same iron takes an edge it could never have had. Tapas is that fire. The point w
