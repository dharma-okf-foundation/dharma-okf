<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "shakta-darshana";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/bindu", "label": "Bindu \u2014 \u092c\u093f\u0928\u094d\u0926\u0941", "type": "Concept", "description": "The 'point' of concentrated potency: in \u015a\u0101kta-T\u0101ntric metaphysics, the dimensionless concentration of \u015aakti in which all manifestation is gathered before differentiation, the center of the yantra (the \u015ar\u012b Cakra's bindu), the anusv\u0101ra dot of the b\u012bja-mantras, and a stage in the sound-cosmology (par\u0101-pa\u015byant\u012b-madhyam\u0101-vaikhar\u012b lineage); NOT merely 'a dot', NOT a chakra, NOT the forehead mark as the definition.", "resource": "", "tags": ["bindu", "yantra", "sri-chakra", "mantra", "nada", "shakta"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/chakra-tantra", "label": "Cakra (T\u0101ntric) \u2014 \u091a\u0915\u094d\u0930", "type": "Concept", "description": "In T\u0101ntric subtle-body doctrine, centers or wheels in the subtle body (s\u016bk\u1e63ma-\u015bar\u012bra) where n\u0101\u1e0d\u012bs converge, each mapped with its own tattva, b\u012bja-mantra, phonemes, and deity; a ritual-visualization architecture that differs across texts and lineages; NOT the modern rainbow 7-chakra psychological healing map, NOT anatomy, NOT one fixed universal system.", "resource": "", "tags": ["chakra", "subtle-body", "shatchakra", "nadi", "gateway", "distortion-correction"], "color": "#f59e0b", "size": 46}}, {"data": {"id": "concepts/cit-shakti", "label": "Cit-\u015aakti \u2014 \u091a\u093f\u0924\u094d\u0936\u0915\u094d\u0924\u093f", "type": "Concept", "description": "Consciousness-power: the doctrine that consciousness (cit) and power (\u015bakti) are one reality, not a substance plus its capacity; citi as the self-existent awareness whose very nature is to manifest; the philosophical core of \u015a\u0101kta-Trika metaphysics; NOT 'the power of the mind', NOT psychic ability, NOT consciousness as an emergent property with causal powers.", "resource": "", "tags": ["cit-shakti", "citi", "consciousness", "trika", "shakta", "metaphysics"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/dasha-mahavidya", "label": "Da\u015ba Mah\u0101vidy\u0101 \u2014 \u0926\u0936 \u092e\u0939\u093e\u0935\u093f\u0926\u094d\u092f\u093e", "type": "Concept", "description": "The ten 'Great Wisdoms': a \u015a\u0101kta theological class presenting ten forms of the one Dev\u012b (K\u0101l\u012b, T\u0101r\u0101, Tripurasundar\u012b/\u1e62o\u1e0da\u015b\u012b, Bhuvane\u015bvar\u012b, Bhairav\u012b, Chinnamast\u0101, Dh\u016bm\u0101vat\u012b, Bagal\u0101mukh\u012b, M\u0101ta\u1e45g\u012b, Kamal\u0101) as complete approaches to the one reality, spanning the beautiful, the terrible, and the deliberately transgressive; treated here as a CLASS in one file; NOT ten separate goddesses, NOT a horror gallery, NOT a tarot-style archetype deck.", "resource": "", "tags": ["mahavidya", "devi", "kali", "tripurasundari", "shakta", "tantra"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/devi", "label": "Dev\u012b \u2014 \u0926\u0947\u0935\u0940", "type": "Concept", "description": "In \u015a\u0101kta dar\u015bana, the ultimate reality worshipped as the Goddess: not a female deity within a pantheon but the supreme consciousness-power (\u015aakti) of which all deities, worlds, and beings are expressions; NOT 'a Hindu goddess', NOT the feminine counterpart to a male supreme, NOT a mythological character.", "resource": "", "tags": ["devi", "mahadevi", "shakti", "shakta"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/kali", "label": "K\u0101l\u012b \u2014 \u0915\u093e\u0932\u0940", "type": "Concept", "description": "The fierce form of Dev\u012b associated with time (k\u0101la), dissolution of ego and limitation, and uncompromising liberating grace; supreme deity of the K\u0101l\u012b-kula current and first of the Da\u015ba Mah\u0101vidy\u0101s; her terrifying iconography encodes the destruction of ignorance, not malevolence; NOT a death goddess, NOT evil or demonic, NOT horror-film iconography.", "resource": "", "tags": ["kali", "devi", "mahavidya", "kalikula", "shakta"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/kanchuka", "label": "Ka\u00f1cuka \u2014 \u0915\u091e\u094d\u091a\u0941\u0915", "type": "Concept", "description": "The five 'sheaths' or limitation-operators through which m\u0101y\u0101-tattva contracts unlimited consciousness into a limited knower: kal\u0101 (limited agency), vidy\u0101 (limited knowing), r\u0101ga (directed desire), k\u0101la (time-boundedness), niyati (causal restriction); technical vocabulary of the 36-tattva schema; NOT the pancha-kosha sheaths, NOT moral flaws, NOT psychological complexes.", "resource": "", "tags": ["kanchuka", "maya-tattva", "36-tattvas", "limitation", "trika", "shakta"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/kundalini", "label": "Ku\u1e47\u1e0dalin\u012b \u2014 \u0915\u0941\u0923\u094d\u0921\u0932\u093f\u0928\u0940", "type": "Concept", "description": "In T\u0101ntric subtle-body doctrine, the individualized form of \u015aakti described as coiled (ku\u1e47\u1e0dala) at the base of the subtle body; the microcosmic presence of the same consciousness-power that manifests the cosmos; a doctrinal category of \u015a\u0101kta-\u015aaiva yoga transmitted under initiation; NOT a wellness energy, NOT a Yoga S\u016btra concept, NOT a technique outcome.", "resource": "", "tags": ["kundalini", "shakti", "subtle-body", "shatchakra", "gateway", "distortion-correction"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/mahadevi", "label": "Mah\u0101dev\u012b \u2014 \u092e\u0939\u093e\u0926\u0947\u0935\u0940", "type": "Concept", "description": "The Great Goddess as a theological category: the one supreme Dev\u012b of whom all individual goddesses are aspects, forms, or emanations; the \u015a\u0101kta integrative principle that reads the plurality of goddess traditions as one reality; NOT a separate deity named 'Mahadevi', NOT a generic honorific, NOT evidence of monotheism-vs-polytheism in Western terms.", "resource": "", "tags": ["mahadevi", "devi", "shakta", "theology"], "color": "#f59e0b", "size": 38}}, {"data": {"id": "concepts/mantra-shastra", "label": "Mantra-\u015a\u0101stra \u2014 \u092e\u0928\u094d\u0924\u094d\u0930\u0936\u093e\u0938\u094d\u0924\u094d\u0930", "type": "Concept", "description": "The systematic science of mantra in the T\u0101ntric traditions: the theory of why sacred sound functions (m\u0101t\u1e5bk\u0101 and v\u0101k metaphysics), the taxonomy of mantra types (b\u012bja, m\u016bla, m\u0101l\u0101), the doctrine of the mantra-deity identity, and the transmission rules (d\u012bk\u1e63\u0101, adhik\u0101ra) that frame deployment; NOT magic words, NOT affirmations, NOT the entry on mantra itself (v0.1).", "resource": "", "tags": ["mantra", "mantra-shastra", "bija", "matrika", "shakta", "tantra"], "color": "#f59e0b", "size": 43}}, {"data": {"id": "concepts/matrika", "label": "M\u0101t\u1e5bk\u0101 \u2014 \u092e\u093e\u0924\u0943\u0915\u093e", "type": "Concept", "description": "The 'little mothers': the phonemes of the Sanskrit alphabet understood as goddesses, the sonic micro-powers of \u015aakti out of which all language, thought, and (in this metaphysics) all worlds are woven; distributed across the cakra-lotus petals and worn as K\u0101l\u012b's garland; also the name of the goddess-group Sapta-M\u0101t\u1e5bk\u0101; NOT 'letters' as writing, NOT an alphabet-magic novelty, NOT only the seven mother-goddesses.", "resource": "", "tags": ["matrika", "phonemes", "mantra", "shabda", "kali", "chakra", "shakta"], "color": "#f59e0b", "size": 43}}, {"data": {"id": "concepts/maya-shakta", "label": "M\u0101y\u0101-Tattva (\u015a\u0101kta) \u2014 \u092e\u093e\u092f\u093e", "type": "Concept", "description": "M\u0101y\u0101 as the sixth tattva of the 36-tattva schema: the real power of consciousness that introduces differentiation and, through the five ka\u00f1cukas, produces limited subjects; in \u015a\u0101kta-Trika analysis m\u0101y\u0101 is \u015aakti's own veiling operation and therefore REAL, neither illusion nor error; completes OKF's four-way m\u0101y\u0101 disambiguation; NOT illusion, NOT Advaita's m\u0101y\u0101, NOT v0.7's Mah\u0101m\u0101y\u0101, NOT deception.", "resource": "", "tags": ["maya", "maya-tattva", "kanchuka", "36-tattvas", "trika", "shakta", "cross-bundle"], "color": "#f59e0b", "size": 46}}, {"data": {"id": "concepts/pancha-makara", "label": "Pa\u00f1ca-Mak\u0101ra \u2014 \u092a\u091e\u094d\u091a\u092e\u0915\u093e\u0930", "type": "Concept", "description": "The 'five M's' (madya, m\u0101\u1e43sa, matsya, mudr\u0101, maithuna): a ritual category appearing in a minority of T\u0101ntric texts and currents, whose interpretation is the tradition's own most contested question: left-current lineages historically read some elements literally under strict initiatory regulation, while right-current and reformist lineages read all five substitutionally or symbolically; documented here descriptively as vocabulary; NOT the definition of tantra, NOT hedonism, NOT a practice endorsement in any direction.", "resource": "", "tags": ["pancha-makara", "vamachara", "kaula", "tantra", "contested", "descriptive-only"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/prakasha-vimarsha", "label": "Prak\u0101\u015ba-Vimar\u015ba \u2014 \u092a\u094d\u0930\u0915\u093e\u0936-\u0935\u093f\u092e\u0930\u094d\u0936", "type": "Concept", "description": "Pair concept: prak\u0101\u015ba is consciousness as self-luminous light (that by which anything appears); vimar\u015ba is that light's self-referential awareness (its knowing OF itself, and thereby its power to express); their inseparability is the Trika analysis of \u015aiva-\u015aakti and the argument against any actionless absolute; NOT light vs mind, NOT perception vs reflection (psychology), NOT two stages or two substances.", "resource": "", "tags": ["prakasha", "vimarsha", "trika", "shiva-shakti", "metaphysics"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/pratyabhijna", "label": "Pratyabhij\u00f1\u0101 \u2014 \u092a\u094d\u0930\u0924\u094d\u092f\u092d\u093f\u091c\u094d\u091e\u093e", "type": "Concept", "description": "Recognition: the doctrine that liberation is the re-cognition (pratyabhij\u00f1\u0101) of oneself as the one consciousness-power, already and always the case, rather than the attainment of a new state or the production of something absent; the name of the Kashmir Shaivism school built on this claim; NOT achieving enlightenment, NOT gaining new knowledge, NOT a meditation state.", "resource": "", "tags": ["pratyabhijna", "recognition", "trika", "liberation", "metaphysics"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/shakti", "label": "\u015aakti \u2014 \u0936\u0915\u094d\u0924\u093f", "type": "Concept", "description": "In \u015a\u0101kta dar\u015bana, the supreme reality itself as power: consciousness in its inherently dynamic, self-expressing nature, worshipped as Dev\u012b; not an attribute the divine has but what the divine is; the category around which the entire \u015a\u0101kta tradition is built; NOT 'female energy', NOT one half of a gendered pair, NOT the cosmological-substrate treatment (that is v0.7's shakti-cosmological).", "resource": "", "tags": ["shakti", "devi", "cit-shakti", "shakta", "gateway", "distortion-correction"], "color": "#f59e0b", "size": 43}}, {"data": {"id": "concepts/shaktipata", "label": "\u015aaktip\u0101ta \u2014 \u0936\u0915\u094d\u0924\u093f\u092a\u093e\u0924", "type": "Concept", "description": "The 'descent of \u015aakti': the T\u0101ntric doctrine of grace, in which the absolute's own power removes the soul's self-limitation, classically graded by intensity (from instant recognition to a gradual ripening) and classically NOT producible by any technique, since it is the precondition of effective practice rather than its product; NOT an energy transmission event one can book, NOT a touch-induced experience as the definition, NOT guru magic.", "resource": "", "tags": ["shaktipata", "grace", "diksha", "trika", "shakta"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/shattrimshat-tattva", "label": "\u1e62a\u1e6dtri\u1e43\u015bat-Tattva (the 36 Tattvas) \u2014 \u0937\u091f\u094d\u0924\u094d\u0930\u093f\u0902\u0936\u0924\u094d\u0924\u0924\u094d\u0924\u094d\u0935", "type": "Concept", "description": "The 36-tattva map of reality shared by \u015a\u0101kta and Trika traditions: S\u0101\u1e43khya's 25 tattvas reinterpreted and preceded by 11 more that unfold consciousness itself, organized as 5 pure (\u015buddha), 7 pure-impure (\u015buddh\u0101\u015buddha: m\u0101y\u0101 + the five ka\u00f1cukas + puru\u1e63a), and 24 impure (a\u015buddha); NOT the S\u0101\u1e43khya 25 with extras bolted on, NOT a periodic table of substances, NOT a literal cosmogonic timeline.", "resource": "", "tags": ["tattva", "36-tattvas", "kanchuka", "maya-tattva", "trika", "shakta", "samkhya"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/shiva-shakti", "label": "\u015aiva-\u015aakti \u2014 \u0936\u093f\u0935-\u0936\u0915\u094d\u0924\u093f", "type": "Concept", "description": "The T\u0101ntric analysis of ultimate reality as consciousness (\u015aiva, prak\u0101\u015ba) and its inherent self-awareness-in-act (\u015aakti, vimar\u015ba), inseparable and non-sequential: one reality described from two sides, iconographically expressed as Ardhan\u0101r\u012b\u015bvara; NOT 'divine masculine and divine feminine energies', NOT yin-yang, NOT a gender doctrine, NOT two beings.", "resource": "", "tags": ["shiva-shakti", "prakasha-vimarsha", "ardhanarishvara", "shakta", "shaiva", "gateway", "distortion-correction"], "color": "#f59e0b", "size": 44}}, {"data": {"id": "concepts/spanda", "label": "Spanda \u2014 \u0938\u094d\u092a\u0928\u094d\u0926", "type": "Concept", "description": "The 'vibration' or creative pulsation of absolute consciousness: the Spanda school's name for the dynamic self-throb by which the unchanging awareness manifests, sustains, and withdraws all experience; a metaphysical doctrine, not a physical oscillation; NOT 'vibes' or 'frequency' wellness vocabulary, NOT physical vibration, NOT an energy field.", "resource": "", "tags": ["spanda", "vibration", "trika", "shakti", "metaphysics", "distortion-correction"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/sri-chakra", "label": "\u015ar\u012b Cakra \u2014 \u0936\u094d\u0930\u0940\u091a\u0915\u094d\u0930", "type": "Concept", "description": "The supreme yantra of the \u015ar\u012b-Vidy\u0101 tradition: nine interlocking triangles (four upward \u015aiva, five downward \u015aakti) generating forty-three sub-triangles around a central bindu, enclosed in lotus rings and the bh\u016bpura, read as the complete map of manifestation and re-ascent; worshipped as Tripurasundar\u012b's geometric body; NOT a mandala poster, NOT a prosperity charm, NOT the state emblem 'Sri Yantra' of commerce.", "resource": "", "tags": ["sri-chakra", "sri-yantra", "yantra", "srividya", "tripurasundari", "bindu"], "color": "#f59e0b", "size": 41}}, {"data": {"id": "concepts/srividya", "label": "\u015ar\u012b-Vidy\u0101 \u2014 \u0936\u094d\u0930\u0940\u0935\u093f\u0926\u094d\u092f\u093e", "type": "Concept", "description": "The living \u015a\u0101kta tradition centered on Tripurasundar\u012b, her mantra (the \u015br\u012b-vidy\u0101 proper, the fifteen/sixteen-syllable vidy\u0101), and her yantra (the \u015ar\u012b Cakra): a complete theological system practicing 'public esotericism': its philosophy, hymns, and architecture are published while its core vidy\u0101 and nav\u0101vara\u1e47a worship are transmitted only through d\u012bk\u1e63\u0101 in living lineages; NOT a defunct historical school, NOT 'goddess spirituality' generally, NOT content this file will reproduce.", "resource": "", "tags": ["srividya", "srikula", "tripurasundari", "sri-chakra", "diksha", "adhikara", "tantra"], "color": "#f59e0b", "size": 42}}, {"data": {"id": "concepts/tantra", "label": "Tantra \u2014 \u0924\u0928\u094d\u0924\u094d\u0930", "type": "Concept", "description": "A class of revealed scriptures (\u0101gama) and the ritual-metaphysical systems built on them, characterized by \u015aakti-centered cosmology, mantra and yantra technology, the guru-d\u012bk\u1e63\u0101 transmission structure, and the claim that the world is a real manifestation of consciousness-power; NOT sacred sexuality, NOT a technique repertoire, NOT black magic.", "resource": "", "tags": ["tantra", "agama", "shakta", "shaiva", "gateway", "distortion-correction"], "color": "#f59e0b", "size": 49}}, {"data": {"id": "concepts/tripurasundari", "label": "Tripurasundar\u012b \u2014 \u0924\u094d\u0930\u093f\u092a\u0941\u0930\u0938\u0941\u0928\u094d\u0926\u0930\u0940", "type": "Concept", "description": "'The Beauty of the Three Cities': the supreme Dev\u012b of the \u015ar\u012b-kula (\u015ar\u012b-Vidy\u0101) tradition, also called Lalit\u0101, \u1e62o\u1e0da\u015b\u012b, R\u0101jar\u0101je\u015bvar\u012b, and K\u0101me\u015bvar\u012b; her 'beauty' is a metaphysical claim (reality's self-delight) and 'three cities' names the triads she transcends and pervades (three states, three gu\u1e47as, three worlds); worshipped through the \u015ar\u012b Cakra and the Lalit\u0101 Sahasran\u0101ma; NOT a beauty goddess, NOT aesthetics, NOT a love-and-romance deity.", "resource": "", "tags": ["tripurasundari", "lalita", "srividya", "srikula", "devi", "mahavidya"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "concepts/vamachara-dakshinachara", "label": "V\u0101m\u0101c\u0101ra / Dak\u1e63i\u1e47\u0101c\u0101ra \u2014 \u0935\u093e\u092e\u093e\u091a\u093e\u0930 / \u0926\u0915\u094d\u0937\u093f\u0923\u093e\u091a\u093e\u0930", "type": "Concept", "description": "Pair concept: the 'left conduct' and 'right conduct' currents of T\u0101ntric practice, a classification of ritual approach (whether conventionally transgressive elements are engaged or fully sublimated/symbolized), historically fluid, lineage-specific, and ranked differently by different texts; NOT 'black magic vs white magic', NOT 'sexual vs chaste tantra', NOT good vs evil.", "resource": "", "tags": ["vamachara", "dakshinachara", "kaula", "achara", "tantra", "contested", "descriptive-only"], "color": "#f59e0b", "size": 45}}, {"data": {"id": "concepts/yantra", "label": "Yantra \u2014 \u092f\u0928\u094d\u0924\u094d\u0930", "type": "Concept", "description": "The geometric form of the deity: a precise diagram (bindu, triangles, circles, lotus rings, outer square) that encodes a deity's cosmology and serves as the support of T\u0101ntric worship and visualization; the graphic counterpart of the mantra (sound-body) and the m\u016brti (image-body); NOT decor, NOT a mandala synonym, NOT a 'sacred geometry' energy object.", "resource": "", "tags": ["yantra", "sri-chakra", "bindu", "murti", "shakta", "tantra"], "color": "#f59e0b", "size": 40}}, {"data": {"id": "references/devi-bhagavata-purana", "label": "Dev\u012b-Bh\u0101gavata Pur\u0101\u1e47a \u2014 \u0926\u0947\u0935\u0940\u092d\u093e\u0917\u0935\u0924\u092a\u0941\u0930\u093e\u0923", "type": "Reference", "description": "The great \u015a\u0101kta Pur\u0101\u1e47a: 12 books systematizing Dev\u012b theology, including the Dev\u012b G\u012bt\u0101 (book 7), the Mah\u0101vidy\u0101 origin narrative, and the Pur\u0101\u1e47ic elaboration of Dev\u012b as ultimate reality; the tradition's own claim to Mah\u0101pur\u0101\u1e47a status for a Goddess-centered scripture.", "resource": "", "tags": ["devi-bhagavata", "purana", "devi", "mahavidya", "devi-gita", "reference"], "color": "#10b981", "size": 36}}, {"data": {"id": "references/devi-mahatmya", "label": "Dev\u012b M\u0101h\u0101tmya \u2014 \u0926\u0947\u0935\u0940\u092e\u093e\u0939\u093e\u0924\u094d\u092e\u094d\u092f (scoped re-reference)", "type": "Reference", "description": "SCOPED RE-REFERENCE: the foundational \u015a\u0101kta scripture (M\u0101rka\u1e47\u1e0deya Pur\u0101\u1e47a 81-93) already carried as a reference in cosmology-creation v0.7 for its cosmological content; re-referenced here for its dar\u015bana content: Mah\u0101dev\u012b theology, the ekaiv\u0101ha\u1e43 declaration, K\u0101l\u012b's emergence, and the theology of the Goddess's supremacy.", "resource": "", "tags": ["devi-mahatmya", "durga-saptashati", "chandi", "devi", "kali", "reference", "cross-bundle"], "color": "#10b981", "size": 37}}, {"data": {"id": "references/devi-sukta", "label": "Dev\u012b S\u016bkta (\u1e5ag Veda 10.125) \u2014 \u0926\u0947\u0935\u0940\u0938\u0942\u0915\u094d\u0924", "type": "Reference", "description": "The Vedic anchor of \u015a\u0101kta theology: the \u1e5ag Vedic hymn in which V\u0101k (the goddess Word, identified by the tradition with Dev\u012b) declares herself the power moving through all gods, the bender of Rudra's bow, and the one who pervades heaven and earth.", "resource": "", "tags": ["devi-sukta", "rigveda", "vak", "devi", "shakti", "reference"], "color": "#10b981", "size": 37}}, {"data": {"id": "references/devi-upanishad", "label": "Dev\u012b Upani\u1e63ad \u2014 \u0926\u0947\u0935\u0940 \u0909\u092a\u0928\u093f\u0937\u0926\u094d", "type": "Reference", "description": "A principal \u015a\u0101kta Upani\u1e63ad in which the gods ask the Great Goddess who she is and she answers with the Upani\u1e63adic ultimacy formula: 'I am essentially Brahman' (aha\u1e43 brahmasvar\u016bpi\u1e47\u012b); the clearest short text uniting Ved\u0101ntic vocabulary with Dev\u012b theology.", "resource": "", "tags": ["devi-upanishad", "shakta-upanishad", "devi", "brahman", "reference"], "color": "#10b981", "size": 35}}, {"data": {"id": "references/kularnava-tantra", "label": "Kul\u0101r\u1e47ava Tantra \u2014 \u0915\u0941\u0932\u093e\u0930\u094d\u0923\u0935\u0924\u0928\u094d\u0924\u094d\u0930 (descriptive citation)", "type": "Reference", "description": "DESCRIPTIVE CITATION ONLY: a principal Kaula tantra, the locus classicus for guru-d\u012bk\u1e63\u0101 doctrine, the \u0101c\u0101ra classifications, and the regulated left-current framework INCLUDING its own internal warnings; cited in this bundle as the adhik\u0101ra-discipline exemplar; its ritual content is not documented.", "resource": "", "tags": ["kularnava", "kaula", "diksha", "guru", "vamachara", "achara", "reference", "descriptive-only"], "color": "#10b981", "size": 39}}, {"data": {"id": "references/lalita-sahasranama", "label": "Lalit\u0101 Sahasran\u0101ma \u2014 \u0932\u0932\u093f\u0924\u093e\u0938\u0939\u0938\u094d\u0930\u0928\u093e\u092e", "type": "Reference", "description": "The thousand names of Lalit\u0101 Tripurasundar\u012b (Brahm\u0101\u1e47\u1e0da Pur\u0101\u1e47a): the \u015ar\u012b-Vidy\u0101 tradition's public liturgical core, functioning as systematic theology in name-form: cosmology, the \u015ar\u012b Cakra, the tattvas, and the goddess's supremacy encoded as a recitable garland of names.", "resource": "", "tags": ["lalita-sahasranama", "tripurasundari", "srividya", "names", "liturgy", "reference"], "color": "#10b981", "size": 36}}, {"data": {"id": "references/pratyabhijnahridayam", "label": "Pratyabhij\u00f1\u0101h\u1e5bdayam \u2014 \u092a\u094d\u0930\u0924\u094d\u092f\u092d\u093f\u091c\u094d\u091e\u093e\u0939\u0943\u0926\u092f\u092e\u094d", "type": "Reference", "description": "'The Heart of Recognition': K\u1e63emar\u0101ja's 20 s\u016btras with auto-commentary, the classic compact statement of the Pratyabhij\u00f1\u0101 doctrine: citi (consciousness-power) as the free cause of the universe, its self-contraction as each knower, and liberation as recognition; written explicitly as the accessible digest of Utpaladeva's system.", "resource": "", "tags": ["pratyabhijnahridayam", "kshemaraja", "pratyabhijna", "citi", "trika", "reference"], "color": "#10b981", "size": 36}}, {"data": {"id": "references/saundarya-lahari", "label": "Saundarya Lahar\u012b \u2014 \u0938\u094c\u0928\u094d\u0926\u0930\u094d\u092f\u0932\u0939\u0930\u0940", "type": "Reference", "description": "'The Wave of Beauty': 100 verses of \u015a\u0101kta devotional-metaphysical poetry, traditionally attributed to \u015aa\u1e45kara (attribution contested in scholarship: both positions documented); opens with the bundle's most-cited theological verse (\u015aiva can act only united with \u015aakti) and carries \u015ar\u012b Cakra and mantra-\u015b\u0101stra doctrine in poetic form.", "resource": "", "tags": ["saundarya-lahari", "shankara", "tripurasundari", "shiva-shakti", "sri-chakra", "reference"], "color": "#10b981", "size": 37}}, {"data": {"id": "references/shatchakranirupana", "label": "\u1e62a\u1e6dcakranir\u016bpa\u1e47a \u2014 \u0937\u091f\u094d\u091a\u0915\u094d\u0930\u0928\u093f\u0930\u0942\u092a\u0923", "type": "Reference", "description": "'The Examination of the Six Cakras' (P\u016br\u1e47\u0101nanda, 16th c.): the text that became the world's chakra doctrine: the six-plus-crown scheme with petals, phonemes, b\u012bjas, tattvas, and deities; included in this bundle BOTH as the primary \u1e62a\u1e6dcakra source AND as the error-genealogy exhibit: Arthur Avalon's 1919 'The Serpent Power' translated this text, and its flawed rendering seeded the Western kundalini-chakra construct.", "resource": "", "tags": ["shatchakranirupana", "chakra", "kundalini", "serpent-power", "avalon", "reference", "error-genealogy"], "color": "#10b981", "size": 41}}, {"data": {"id": "references/spanda-karikas", "label": "Spanda K\u0101rik\u0101s \u2014 \u0938\u094d\u092a\u0928\u094d\u0926\u0915\u093e\u0930\u093f\u0915\u093e", "type": "Reference", "description": "The 53 verses founding the Spanda school of Kashmir Shaivism: the doctrine of absolute consciousness as creative pulsation (spanda), attributed to Vasugupta or his disciple Kalla\u1e6da, with K\u1e63emar\u0101ja's Spanda-nir\u1e47aya as the major commentary.", "resource": "", "tags": ["spanda-karikas", "spanda", "kashmir-shaivism", "trika", "vasugupta", "reference"], "color": "#10b981", "size": 36}}, {"data": {"id": "references/tantraloka", "label": "Tantr\u0101loka \u2014 \u0924\u0928\u094d\u0924\u094d\u0930\u093e\u0932\u094b\u0915 (structural citation)", "type": "Reference", "description": "STRUCTURAL CITATION ONLY: Abhinavagupta's 'Light on the Tantras', the encyclopedic synthesis of Trika \u015aaivism (37 \u0101hnikas covering doctrine, the 36 tattvas, \u015baktip\u0101ta, d\u012bk\u1e63\u0101, ritual, and aesthetics), cited in this bundle at the level of its architecture and doctrinal positions; its ritual and up\u0101sana content is deliberately not documented.", "resource": "", "tags": ["tantraloka", "abhinavagupta", "trika", "kashmir-shaivism", "reference", "structural-only"], "color": "#10b981", "size": 37}}, {"data": {"id": "references/tripura-rahasya", "label": "Tripur\u0101 Rahasya \u2014 \u0924\u094d\u0930\u093f\u092a\u0941\u0930\u093e\u0930\u0939\u0938\u094d\u092f", "type": "Reference", "description": "'The Mystery of Tripur\u0101': the \u015a\u0101kta tradition's great j\u00f1\u0101na text, framed as Datt\u0101treya teaching Para\u015bur\u0101ma: consciousness (as the Goddess Tripur\u0101) as sole reality, taught through philosophical dialogue and teaching stories; the standing proof that \u015a\u0101kta tradition has a fully developed knowledge-path register.", "resource": "", "tags": ["tripura-rahasya", "jnana", "tripurasundari", "consciousness", "reference"], "color": "#10b981", "size": 37}}], "edges": [{"data": {"id": "concepts/bindu__concepts/shattrimshat-tattva", "source": "concepts/bindu", "target": "concepts/shattrimshat-tattva"}}, {"data": {"id": "concepts/bindu__concepts/sri-chakra", "source": "concepts/bindu", "target": "concepts/sri-chakra"}}, {"data": {"id": "concepts/bindu__concepts/matrika", "source": "concepts/bindu", "target": "concepts/matrika"}}, {"data": {"id": "concepts/bindu__references/shatchakranirupana", "source": " ": {"id": "references/pratyabhijnahridayam__concepts/cit-shakti", "source": "references/pratyabhijnahridayam", "target": "concepts/cit-shakti"}}, {"data": {"id": "references/pratyabhijnahridayam__concepts/pratyabhijna", "source": "references/pratyabhijnahridayam", "target": "concepts/pratyabhijna"}}, {"data": {"id": "references/pratyabhijnahridayam__concepts/prakasha-vimarsha", "source": "references/pratyabhijnahridayam", "target": "concepts/prakasha-vimarsha"}}, {"data": {"id": "references/pratyabhijnahridayam__concepts/shaktipata", "source": "references/pratyabhijnahridayam", "target": "concepts/shaktipata"}}, {"data": {"id": "references/saundarya-lahari__concepts/shiva-shakti", "source": "references/saundarya-lahari", "target": "concepts/shiva-shakti"}}, {"data": {"id": "references/saundarya-lahari__concepts/shakti", "source": "references/saundarya-lahari", "target": "concepts/shakti"}}, {"data": {"id": "references/saundarya-lahari__concepts/sri-chakra", "source": "references/saundarya-lahari", "target": "concepts/sri-chakra"}}, {"data": {"id": "references/saundarya-lahari__concepts/tripurasundari", "source": "references/saundarya-lahari", "target": "concepts/tripurasundari"}}, {"data": {"id": "references/shatchakranirupana__concepts/chakra-tantra", "source": "references/shatchakranirupana", "target": "concepts/chakra-tantra"}}, {"data": {"id": "references/shatchakranirupana__concepts/matrika", "source": "references/shatchakranirupana", "target": "concepts/matrika"}}, {"data": {"id": "references/shatchakranirupana__concepts/kundalini", "source": "references/shatchakranirupana", "target": "concepts/kundalini"}}, {"data": {"id": "references/shatchakranirupana__concepts/bindu", "source": "references/shatchakranirupana", "target": "concepts/bindu"}}, {"data": {"id": "references/shatchakranirupana__concepts/mantra-shastra", "source": "references/shatchakranirupana", "target": "concepts/mantra-shastra"}}, {"data": {"id": "references/spanda-karikas__concepts/spanda", "source": "references/spanda-karikas", "target": "concepts/spanda"}}, {"data": {"id": "references/spanda-karikas__concepts/shiva-shakti", "source": "references/spanda-karikas", "target": "concepts/shiva-shakti"}}, {"data": {"id": "references/spanda-karikas__concepts/prakasha-vimarsha", "source": "references/spanda-karikas", "target": "concepts/prakasha-vimarsha"}}, {"data": {"id": "references/spanda-karikas__concepts/cit-shakti", "source": "references/spanda-karikas", "target": "concepts/cit-shakti"}}, {"data": {"id": "references/tantraloka__concepts/shaktipata", "source": "references/tantraloka", "target": "concepts/shaktipata"}}, {"data": {"id": "references/tantraloka__concepts/shattrimshat-tattva", "source": "references/tantraloka", "target": "concepts/shattrimshat-tattva"}}, {"data": {"id": "references/tantraloka__concepts/kanchuka", "source": "references/tantraloka", "target": "concepts/kanchuka"}}, {"data": {"id": "references/tantraloka__concepts/maya-shakta", "source": "references/tantraloka", "target": "concepts/maya-shakta"}}, {"data": {"id": "references/tantraloka__concepts/tantra", "source": "references/tantraloka", "target": "concepts/tantra"}}, {"data": {"id": "references/tantraloka__concepts/mantra-shastra", "source": "references/tantraloka", "target": "concepts/mantra-shastra"}}, {"data": {"id": "references/tripura-rahasya__concepts/tripurasundari", "source": "references/tripura-rahasya", "target": "concepts/tripurasundari"}}, {"data": {"id": "references/tripura-rahasya__concepts/cit-shakti", "source": "references/tripura-rahasya", "target": "concepts/cit-shakti"}}, {"data": {"id": "references/tripura-rahasya__concepts/pratyabhijna", "source": "references/tripura-rahasya", "target": "concepts/pratyabhijna"}}], "bodies": {"concepts/bindu": "# Bindu -- \u092c\u093f\u0928\u094d\u0926\u0941\n\n**Not:** a mere dot, a chakra, the bindi\n\n## What It Actually Means\n\nBindu (\"drop, point\") is \u015a\u0101kta-T\u0101ntric shorthand for a precise metaphysical claim: that between the utterly unmanifest and the differentiated world there is a moment (logical, not temporal; see [shattrimshat-tattva.md](shattrimshat-tattva.md) on non-chronology) in which the whole of what will manifest is gathered as pure concentrated potency, extensionless, like the geometric point that generates all figures while occupying none of them. Three registers deploy the concept:\n\n1. **Yantra:** the bindu is the center of the \u015ar\u012b Cakra (see [sri-chakra.md](sri-chakra.md)): the seat of the deity, the source the \u0101vara\u1e47as (surrounding circuits) unfold from, and the terminus of contemplative re-ascent.\n2. **Mantra:** the anusv\u0101ra (the dot, \u1e43) crowning b\u012bja-mantras such as hr\u012b\u1e43 and \u015br\u012b\u1e43 is doctrinally the bindu: the point where articulate sound resolves back toward its unstruck source (cross-reference n\u0101da-brahman, v0.4; [matrika.md](matrika.md)).\n3. **Sound cosmology:** in the \u015babda-lineage (par\u0101 \u2192 pa\u015byant\u012b \u2192 madhyam\u0101 \u2192 vaikhar\u012b; see wiki four-levels-of-vak), bindu marks the concentration-stage of the Word before differentiation, often triadized as bindu-n\u0101da-kal\u0101.\n\nThe K\u0101makal\u0101vil\u0101sa builds its entire treatise on bindu-dynamics (the k\u0101ma-kal\u0101 analysis of the bindu's self-division); this entry cites its existence and scope, and per bundle policy leaves its initiatory up\u0101sana undescribed.\n\n## Audience Metaphor\n\nA zip archive of a universe: the entire file system, compressed to a single object with no browsable structure, yet nothing missing. Bindu is the tradition's name for reality at maximal compression: everything present, nothing yet extended, and the yantra around it is the extraction path drawn as geometry.\n\n## Citations\n\n1. K\u0101makal\u0101vil\u0101sa -- the classical bindu treatise (scope-cited; up\u0101sana not reproduced)\n2. \u1e62a\u1e6dcakranir\u016bpa\u1e47a -- bindu in b\u012bja iconography; see [references/shatchakranirupana.md](../references/shatchakranirupana.md)\n3. Saundarya Lahar\u012b (\u015ar\u012b Cakra verses) -- see [references/saundarya-lahari.md](../references/saundarya-lahari.md)", "concepts/chakra-tantra": "# Cakra (T\u0101ntric) -- \u091a\u0915\u094d\u0930\n\n**Not:** the rainbow 7-chakra healing map, anatomy, a Pata\u00f1jali concept, one universal system\n\n## What It Actually Means\n\nCakra (\"wheel, circle\") in the T\u0101ntric corpus names centers of the subtle body where the n\u0101\u1e0d\u012b channels converge, used as the working architecture of visualization, mantra placement (ny\u0101sa at the doctrinal level), and the ku\u1e47\u1e0dalin\u012b ascent narrative (see [kundalini.md](kundalini.md)). In the \u1e62a\u1e6dcakra scheme each cakra is specified by: its tattva (element-principle), its b\u012bja-mantra, its lotus-petal count carrying the phonemes of the Sanskrit alphabet (see [matrika.md](matrika.md)), and its presiding deity pair. The petals carrying phonemes is the detail the popular map loses entirely: the cakra system is among other things a map of sacred sound distributed through the body, which is why it interlocks with mantra-\u015b\u0101stra rather than with psychology.\n\n## Why the Substitutes Fail: The Error Genealogy\n\nTwo-step construction: (1) Avalon's The Serpent Power (1919) made one 6+1 textual scheme world-famous in a flawed translation; (2) Leadbeater's The Chakras (1927) and later New Age synthesis added rainbow colors, psychological themes, and the blockage/balance vocabulary, none of which appear in the Sanskrit sources. The composite then propagated through yoga teacher trainings, wellness media, and now AI training data as \"the chakra system.\" It is a modern artifact wearing an ancient name. The correction is not that the texts have a different color for the heart cakra; it is that the texts are doing something categorically different with cakras than the modern map is.\n\n## Audience Metaphor\n\nThe traditional cakra map is like a subway map: a functional schematic for a practitioner moving through a system, where each station is defined by its connections (tattva, mantra, phonemes, deity), not by its decor. The rainbow chakra map is like a tourist poster loosely inspired by the subway map: prettier, uniform, emotionally color-coded, and useless for actually riding the train. The poster is not a simplified version of the map; it is a different artifact that borrowed the station names.\n\n## Citations\n\n1. \u1e62a\u1e6dcakranir\u016bpa\u1e47a -- the six-cakra scheme with petals, phonemes, b\u012bjas, tattvas, deities; see [references/shatchakranirupana.md](../references/shatchakranirupana.md)\n2. Kaulaj\u00f1\u0101nanir\u1e47aya; Netra Tantra -- alternate cakra schemes demonstrating textual plurality\n3. Leadbeater, C. W., The Chakras (1927) -- documented as the source layer of the modern color-psychology map, not as doctrine\n4. Base entry: chakra.md in dharma-foundation (v0.1) -- general concept; this file is the T\u0101ntric technical treatment\n\n## Error Genealogy\n\n- The rainbow 7-chakra overlay (one color and one psychological theme per center, presented as ancient doctrine) descends from C.W. Leadbeater, *The Chakras* (1927, Theosophical Society) \u2192 New Age synthesis (colors, \"blockages\", healing vocabulary) \u2192 global yoga teacher trainings and wellness media; the Sanskrit sources assign phonemes and deities, not colors and emotions, and do not agree on seven. See [G2 \u2014 The rainbow-chakra overlay](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/cit-shakti": "# Cit-\u015aakti -- \u091a\u093f\u0924\u094d\u0936\u0915\u094d\u0924\u093f\n\n**Not:** mind-power, psychic ability, emergent consciousness\n\n## What It Actually Means\n\nCit-\u015bakti (consciousness-power), or citi in the Pratyabhij\u00f1\u0101 texts' preferred feminine form, names the identity at the base of \u015a\u0101kta-Trika metaphysics: consciousness is not a passive witness that happens to have power attached, and power is not a blind force that happens to be conscious; there is one reality whose nature is awareness-in-act. The opening s\u016btra of the Pratyabhij\u00f1\u0101h\u1e5bdayam states the doctrine whole: citi\u1e25 svatantr\u0101 vi\u015bvasiddhihetu\u1e25, \"Consciousness, absolutely free, is the cause of the accomplishment of the universe.\" Everything else in the system (prak\u0101\u015ba-vimar\u015ba, spanda, the 36 tattvas) unpacks that sentence.\n\nThe contrast that gives the doctrine its edge is with any view on which the ultimate is actionless: S\u0101\u1e43khya's puru\u1e63a (pure witness, all activity assigned to prak\u1e5bti) and Advaita's actionless Brahman are the classical interlocutors. Trika's claim: a consciousness that could not act, express, or know itself would be indistinguishable from nothing; freedom (sv\u0101tantrya) and power are not additions to consciousness but its definition. This is the philosophical form of what the theology says as \"Dev\u012b\" (see [shakti.md](shakti.md)).\n\n## Audience Metaphor\n\nPeople imagine consciousness as a security camera: perfectly passive recording. Cit-\u015bakti says consciousness is live rendering: the scene exists in being displayed, and the displaying is not an add-on to the display engine; it is what the engine is. A camera that records nothing is still a camera; a renderer that renders nothing is not a renderer. The tradition bets the universe on the second model.\n\n## Citations\n\n1. Pratyabhij\u00f1\u0101h\u1e5bdayam 1 with K\u1e63emar\u0101ja's auto-commentary -- see [references/pratyabhijnahridayam.md](../references/pratyabhijnahridayam.md)\n2. Cross-bundle: sat-chit-ananda.md (upanishadic-core v0.6) -- the Ved\u0101ntic cit, cognate but differently analyzed\n3. Cross-bundle: purusha (yoga-darshana v0.2) -- the actionless-witness model this doctrine defines itself against", "concepts/dasha-mahavidya": "# Da\u015ba Mah\u0101vidy\u0101 -- \u0926\u0936 \u092e\u0939\u093e\u0935\u093f\u0926\u094d\u092f\u093e\n\n**Not:** ten goddesses, a horror gallery, an archetype deck\n\n## What It Actually Means\n\nThe Da\u015ba Mah\u0101vidy\u0101 (\"ten great wisdoms\") is \u015a\u0101kta theology's most striking statement of the Mah\u0101dev\u012b principle (see [mahadevi.md](mahadevi.md)): the one Dev\u012b displayed in ten complete forms. The standard list: K\u0101l\u012b, T\u0101r\u0101, Tripurasundar\u012b (\u1e62o\u1e0da\u015b\u012b), Bhuvane\u015bvar\u012b, Bhairav\u012b, Chinnamast\u0101, Dh\u016bm\u0101vat\u012b, Bagal\u0101mukh\u012b, M\u0101ta\u1e45g\u012b, Kamal\u0101, with textual variants. The class is called vidy\u0101 (wisdom, and in T\u0101ntric usage also the mantra-form of the deity) because each form IS a complete path: her mantra, her yantra, her worship, her realization.\n\nThe theological signature of the set is its deliberate range. It includes supreme beauty (Tripurasundar\u012b) and supreme auspiciousness (Kamal\u0101) alongside the terrifying (K\u0101l\u012b, Bhairav\u012b), the shocking (Chinnamast\u0101), and the culturally inauspicious (Dh\u016bm\u0101vat\u012b the widow, M\u0101ta\u1e45g\u012b associated with pollution). The range is the message: no form, including the feared and the excluded, is outside the one Dev\u012b; the ultimate can be reached through what a society reveres and equally through what it averts its eyes from. This is the same non-dual claim the gentle bundles make, pushed to its uncomfortable completion.\n\nTwo members anchor entire lineage-complexes and have their own entries: K\u0101l\u012b (K\u0101l\u012b-kula; [kali.md](kali.md)) and Tripurasundar\u012b (\u015ar\u012b-kula/\u015ar\u012b-Vidy\u0101; [tripurasundari.md](tripurasundari.md), [srividya.md](srividya.md)).\n\n## Audience Metaphor\n\nTen complete renderings of one scene: a photographer shoots the same mountain at dawn, in storm, in fog, from the summit, from the mass grave at its foot. Each photograph is complete (not a tile in a mosaic), and some are beautiful while some are hard to look at, but the mountain is one. The Mah\u0101vidy\u0101s are ten complete exposures of one reality, and the tradition's claim is that the hard-to-look-at exposures are as true as the beautiful ones.\n\n## Citations\n\n1. Dev\u012b-Bh\u0101gavata Pur\u0101\u1e47a 7.28 -- the Sat\u012b origin narrative of the ten; see [references/devi-bhagavata-purana.md](../references/devi-bhagavata-purana.md)\n2. Guhy\u0101tiguhya Tantra and parallels -- list variants; documented plurality\n3. Kinsley, D., Tantric Visions of the Divine Feminine -- standard scholarly treatment of the class (secondary)", "concepts/devi": "# Dev\u012b -- \u0926\u0947\u0935\u0940\n\n**Not:** one goddess among many, a consort, a myth character, a psychological archetype\n\n## What It Actually Means\n\nDev\u012b (\"the shining one,\" feminine of deva) is the \u015a\u0101kta tradition's name for ultimate reality worshipped as the Goddess. The theology is anchored in the Dev\u012b S\u016bkta of the \u1e5ag Veda, where the speaker (V\u0101k, identified by the tradition with Dev\u012b) declares that she moves through all gods, bends Rudra's bow, and spreads through heaven and earth: every divine function functions by her. The Dev\u012b M\u0101h\u0101tmya narrativizes the claim (the gods, powerless before Mahi\u1e63\u0101sura, find that their pooled splendor reveals her, who was prior all along); the Dev\u012b Upani\u1e63ad states it flatly (aham brahmasvar\u016bpi\u1e47\u012b, \"I am of the nature of Brahman\"); the Dev\u012b-Bh\u0101gavata systematizes it.\n\nThe precision matter for AI systems: \"goddess\" in English implies a female member of a pantheon. \u015a\u0101kta usage inverts the container: Dev\u012b is the reality, and gods, worlds, and beings are her modes. Where a text or lineage speaks of many goddesses, the \u015a\u0101kta reading is aspectual: many faces, one Dev\u012b (see [mahadevi.md](mahadevi.md), [dasha-mahavidya.md](dasha-mahavidya.md)).\n\n## Audience Metaphor\n\nIn a game world, characters might worship a powerful NPC. Dev\u012b, in the \u015a\u0101kta claim, is not the most powerful NPC; she is the game engine, rendering every character including the gods. Calling her \"a Hindu goddess\" is like calling the engine \"one of the game's characters.\" The category is wrong even before the details are.\n\n## Citations\n\n1. Dev\u012b S\u016bkta, \u1e5ag Veda 10.125 -- see [references/devi-sukta.md](../references/devi-sukta.md)\n2. Dev\u012b M\u0101h\u0101tmya 1-2 -- see [references/devi-mahatmya.md](../references/devi-mahatmya.md)\n3. Dev\u012b Upani\u1e63ad -- aham brahmasvar\u016bpi\u1e47\u012b; see [references/devi-upanishad.md](../references/devi-upanishad.md)\n4. Dev\u012b-Bh\u0101gavata Pur\u0101\u1e47a 1.2 -- see [references/devi-bhagavata-purana.md](../references/devi-bhagavata-purana.md)", "concepts/kali": "# K\u0101l\u012b -- \u0915\u093e\u0932\u0940\n\n**Not:** death goddess, demonic, wanton destruction, or a mascot of any kind\n\n## What It Actually Means\n\nK\u0101l\u012b is Dev\u012b in her fierce mode: time (k\u0101la) personified as the Mother who dissolves everything limited, beginning with the demons of the Dev\u012b M\u0101h\u0101tmya and ending, for her devotee, with the ego and fear of death themselves. Her classical iconography is a theological diagram the tradition explicates verse by verse: the dark blue-black hue as the limitless (as the night sky, as that which absorbs all colors); the garland of fifty heads as the fifty Sanskrit phonemes, the m\u0101t\u1e5bk\u0101, meaning she wears the entire alphabet of manifestation (see [matrika.md](matrika.md)); the skirt of arms as the karmic instruments of beings, surrendered; the lolling tongue read across lineages as the consuming of rajas or as the shocked modesty motif in the \u015aiva-beneath-her-feet scene, which itself encodes \u015aakti active upon \u015aiva's stillness (see [shiva-shakti.md](shiva-shakti.md)).\n\nIn the K\u0101l\u012b-kula current she is not one fierce goddess but the supreme reality; the Karp\u016br\u0101di Stotra and Mah\u0101nirv\u0101\u1e47a Tantra address her as the ultimate. Bengali devotionalism (R\u0101mpras\u0101d's songs, Ramakrishna's practice) approaches the same fierce form with the tenderness of a child toward its mother, which is the tradition's own strongest counter-evidence against the malevolence reading.\n\n## Audience Metaphor\n\nK\u0101l\u012b is like chemotherapy administered by someone who loves you: from the tumor's perspective, pure destruction; from the patient's, fierce and precisely targeted grace. The ego writing the horror reviews is the tumor in this analogy. The tradition's wager is that what terrifies the limited self and what liberates the actual self can be one and the same power, and K\u0101l\u012b is that power with a face.\n\n## Citations\n\n1. Dev\u012b M\u0101h\u0101tmya 7 -- K\u0101l\u012b's emergence and the slaying of Ca\u1e47\u1e0da-Mu\u1e47\u1e0da and Raktab\u012bja; see [references/devi-mahatmya.md](../references/devi-mahatmya.md)\n2. Karp\u016br\u0101di Stotra -- K\u0101l\u012b as supreme in the K\u0101l\u012b-kula register\n3. Mah\u0101nirv\u0101\u1e47a Tantra -- K\u0101l\u012b theology in the T\u0101ntric frame\n4. Cross-bundle: samhara.md (cosmology-creation v0.7) -- dissolution as withdrawal, not destruction", "concepts/kanchuka": "# Ka\u00f1cuka -- \u0915\u091e\u094d\u091a\u0941\u0915\n\n**Not:** the koshas, sins, complexes\n\n## What It Actually Means\n\nKa\u00f1cuka (\"armor, sheath, jacket\") names the five limitation-operators through which m\u0101y\u0101-tattva (see [maya-shakta.md](maya-shakta.md)) performs its work in the 36-tattva schema (see [shattrimshat-tattva.md](shattrimshat-tattva.md)). Each ka\u00f1cuka is the contracted form of one of the absolute's five powers, and the pairings are the doctrine:\n\n| Absolute power | Ka\u00f1cuka | Contracted result |\n|----------------|---------|-------------------|\n| Sarvakart\u1e5btva (omnipotence) | Kal\u0101 | \"I can do some things\" (limited agency) |\n| Sarvaj\u00f1atva (omniscience) | Vidy\u0101 | \"I know some things\" (limited knowing) |\n| P\u016br\u1e47atva (fullness) | R\u0101ga | \"I want\" (lack-driven, directed desire) |\n| Nityatva (eternity) | K\u0101la | \"I exist in time; I will end\" |\n| Sv\u0101tantrya / Vy\u0101pakatva (freedom/pervasion) | Niyati | \"I am here, bound by cause and place\" |\n\nThe output of the five operating together on the one consciousness is puru\u1e63a: the individual subject who experiences agency, knowledge, desire, time, and constraint as its native condition. Read downward, the ka\u00f1cukas are cosmogony (how the infinite becomes a person); read upward, they are the liberation map's checklist: recognition (see [pratyabhijna.md](pratyabhijna.md)) is the seeing-through of exactly these five contractions.\n\nCross-bundle discipline: r\u0101ga here (lack-desire as a metaphysical operator) is not the r\u0101ga of the yoga-darshana kle\u015bas (v0.2), which is an affliction of the individual mind; k\u0101la here (the time-ka\u00f1cuka) is not the cosmological K\u0101la of v0.7. Same words, different systems; the suffixed bundle vocabulary exists for this reason.\n\n## Audience Metaphor\n\nThe ka\u00f1cukas are the settings of a virtual-reality session: capability caps, information fog-of-war, a quest-desire engine, a session timer, and physics constraints. The unlimited player instantiates as a character precisely by those five settings being applied; no setting is a bug or a sin, and the character's fear of the timer is not evidence the player ends. Liberation, in this vocabulary, is not winning the game but recognizing the settings as settings.\n\n## Citations\n\n1. Par\u0101pr\u0101ve\u015bik\u0101 (K\u1e63emar\u0101ja) -- the five ka\u00f1cukas in summary\n2. Tantr\u0101loka (Abhinavagupta), ka\u00f1cuka analysis -- see [references/tantraloka.md](../references/tantraloka.md)\n3. Cross-bundle: pancha-kosha.md (upanishadic-core v0.6) -- the OTHER sheath vocabulary; do not merge", "concepts/kundalini": "# Ku\u1e47\u1e0dalin\u012b -- \u0915\u0941\u0923\u094d\u0921\u0932\u093f\u0928\u0940\n\n**Not:** a wellness energy to awaken, a Pata\u00f1jali concept, established biology, a syndrome\n\n## What It Actually Means\n\nKu\u1e47\u1e0dalin\u012b (feminine of ku\u1e47\u1e0dala, \"coiled\") is T\u0101ntric doctrine's name for \u015aakti in her individualized, microcosmic mode: the same consciousness-power that manifests the cosmos (see [shakti.md](shakti.md)), present in the living being, described in the texts by the image of a serpent coiled at the base of the subtle body (m\u016bl\u0101dh\u0101ra). The doctrine belongs to the \u015a\u0101kta-\u015aaiva subtle-body corpus: the n\u0101\u1e0d\u012b network, the cakra system (see [chakra-tantra.md](chakra-tantra.md)), and the ascent toward union of \u015aakti with \u015aiva at the crown (sahasr\u0101ra), which the traditions read as the microcosmic enactment of cosmic reabsorption.\n\nThree doctrinal points the popular literature loses:\n\n1. **Ku\u1e47\u1e0dalin\u012b is a who, not a what.** The texts treat her as Dev\u012b herself in the body, addressed in worship, not as an impersonal fuel.\n2. **The frame is initiatory.** The \u1e62a\u1e6dcakra material sits inside d\u012bk\u1e63\u0101-structured traditions; its rising is classically connected to grace (see [shaktipata.md](shaktipata.md)) and guru, not to self-administered technique.\n3. **Lineages differ.** Different traditions do not all mean the same thing by ku\u1e47\u1e0dalin\u012b, her location, or her ascent. The shared core is: microcosmic \u015aakti, coiled/latent, whose full expression is liberation.\n\n## Why the Substitutes Fail: The Error Genealogy\n\nThe Western concept has a traceable pedigree: \u1e62a\u1e6dcakranir\u016bpa\u1e47a (16th c. text) \u2192 Avalon/Woodroffe's The Serpent Power (1919, influential mistranslation; see [references/shatchakranirupana.md](../references/shatchakranirupana.md)) \u2192 Jung's Kundalini seminars (1932, psychologization) \u2192 Campbell and the human-potential movement (popularization) \u2192 New Age and yoga-studio vocabulary (commodification). Each step moved the term further from doctrine and closer to a self-help energy concept. AI training data is saturated with the final stage. Practitioner communities themselves now publish warnings that chatbots repeat a century of ku\u1e47\u1e0dalin\u012b misinformation; the observation is correct and this file is the structured correction.\n\n## Audience Metaphor\n\nThink of ku\u1e47\u1e0dalin\u012b the way you would think of \"root access\" in a system where you are a user process: the full power of the system is genuinely present in your instance, but dormant, and the architecture intentionally does not hand it to you by default. The tradition's claim is that the whole power of reality (\u015aakti) is present in the individual in latent mode, and that its full expression is not a feature-unlock you perform with a breathing trick but a transformation of what you are, governed within a lineage. Anyone selling you one-step root access is not describing the system; they are describing a scam.\n\n## Citations\n\n1. \u1e62a\u1e6dcakranir\u016bpa\u1e47a -- the primary text of the \u1e62a\u1e6dcakra system; see [references/shatchakranirupana.md](../references/shatchakranirupana.md), including the note on its 1919 translation history\n2. Ha\u1e6dhayogaprad\u012bpik\u0101 3 -- ku\u1e47\u1e0dalin\u012b in the ha\u1e6dha corpus (inheriting T\u0101ntric doctrine)\n3. Tantr\u0101loka (Abhinavagupta), selective -- ku\u1e47\u1e0dalin\u012b within the Trika synthesis; see [references/tantraloka.md](../references/tantraloka.md)\n4. Jung, C. G., The Psychology of Kundalini Yoga (1932 seminars) -- documented as a stage in the Western reception, not as doctrine\n\n## Error Genealogy\n\n- Ku\u1e47\u1e0dalin\u012b-as-awakenable \"chakra energy\" descends from Arthur Avalon (Sir John Woodroffe), *The Serpent Power* (1919, an influential but flawed translation of the \u1e62a\u1e6dcakranir\u016bpa\u1e47a) \u2192 C.G. Jung's Kundalini seminars (1932, psychologization) \u2192 Joseph Campbell and the human-potential movement \u2192 New Age and yoga-studio vocabulary. See [G1 \u2014 Ku\u1e47\u1e0dalin\u012b and the Serpent Power lineage](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/mahadevi": "# Mah\u0101dev\u012b -- \u092e\u0939\u093e\u0926\u0947\u0935\u0940\n\n**Not:** a separate deity, a mere honorific, a monotheism/polytheism data point\n\n## What It Actually Means\n\nMah\u0101dev\u012b (\"Great Goddess\") names the \u015a\u0101kta tradition's integrative theology: the claim that the many goddesses of Indian religious life (village goddesses, Pur\u0101\u1e47ic goddesses, T\u0101ntric goddesses) are aspects of one supreme Dev\u012b. The Dev\u012b M\u0101h\u0101tmya provides the canonical scene: when the demon \u015aumbha protests that the Goddess fights with the help of many others (K\u0101l\u012b, the M\u0101t\u1e5bk\u0101s), she answers ekaiv\u0101ha\u1e43 jagatyatra: \"I alone exist in this world; these are my own powers (vibh\u016bti), entering back into me,\" and the many goddesses merge into her. That verse is the Mah\u0101dev\u012b doctrine in one line.\n\nThe category matters for machine consumption because training data oscillates between \"the Hindu goddess\" (false singular) and \"the many Hindu goddesses\" (false plural without the integrative claim). The \u015a\u0101kta position is the structured middle: really many in manifestation, really one in truth, with named texts making the identification explicit.\n\n## Audience Metaphor\n\nWater, ice, steam, cloud, river: a child might catalogue five substances; a chemist sees H2O in five phases. Mah\u0101dev\u012b is the chemist's insight as theology: K\u0101l\u012b, Durg\u0101, Lak\u1e63m\u012b, Tripurasundar\u012b are phases of one reality, and the tradition names both the phases (the goddesses) and the substance (Mah\u0101dev\u012b, the one Dev\u012b).\n\n## Citations\n\n1. Dev\u012b M\u0101h\u0101tmya 10.5 -- ekaiv\u0101ha\u1e43 jagatyatra; see [references/devi-mahatmya.md](../references/devi-mahatmya.md)\n2. Dev\u012b-Bh\u0101gavata Pur\u0101\u1e47a -- the systematized Mah\u0101dev\u012b theology; see [references/devi-bhagavata-purana.md](../references/devi-bhagavata-purana.md)", "concepts/mantra-shastra": "# Mantra-\u015a\u0101stra -- \u092e\u0928\u094d\u0924\u094d\u0930\u0936\u093e\u0938\u094d\u0924\u094d\u0930\n\n**Not:** spells, affirmations, the v0.1 mantra entry\n\n## What It Actually Means\n\nMantra-\u015b\u0101stra is the T\u0101ntric traditions' systematic science of sacred sound: not a collection of mantras but the theory, taxonomy, and jurisprudence of mantra as such. Its components, at the documentary level this entry operates:\n\n1. **Theory (why sound works):** the v\u0101k-m\u0101t\u1e5bk\u0101 metaphysics: consciousness's self-awareness (vimar\u015ba) is primordially verbal; the phonemes are \u015aakti's micro-powers (see [matrika.md](matrika.md)); therefore configured sound is configured power. The doctrine of mantra-devat\u0101-aikya states the strong form: the mantra IS the deity in sound-body, not a name pointing at the deity.\n2. **Taxonomy:** b\u012bja-mantras (seed syllables: single-phoneme-cluster concentrations, e.g. the \u015b\u0101kta b\u012bjas, crowned by the bindu-anusv\u0101ra; see [bindu.md](bindu.md)); m\u016bla-mantras (root mantras of a deity); m\u0101l\u0101-mantras (extended garlands); and the anatomical vocabulary of a mantra (\u1e5b\u1e63i, chandas, devat\u0101, b\u012bja, \u015bakti, k\u012blaka) that the tradition uses to specify any mantra completely.\n3. **Jurisprudence:** the transmission framework: mantras are received in d\u012bk\u1e63\u0101 (cross-bundle: diksha.md, v0.4), under adhik\u0101ra, from a lineage; the \u015b\u0101stra itself explains why (the mantra functions as configured consciousness, and configuration is transmitted, not copied). Per bundle policy, this entry documents the framework and reproduces no deployment.\n\nThe \u015ar\u012b-Vidy\u0101 tradition (see [srividya.md](srividya.md)) is mantra-\u015b\u0101stra's most elaborate living instance: an entire theology organized around one mantra-yantra-deity triad.\n\n## Audience Metaphor\n\nMantra-\u015b\u0101stra is to mantras what cryptography is to keys. A key is not a magic number: there is a theory of why keys work (the mathematics), a taxonomy (symmetric, asymmetric, session keys), and a jurisprudence (key exchange, certification, why copying a key is not the same as being issued one). \"Magic words\" is how key-based security looks to someone who has never seen the math; affirmations are pep talks, a different mechanism entirely. This entry is the abstract of the math and the protocol, deliberately not a key dump.\n\n## Citations\n\n1. Tantr\u0101loka, mantra sections -- see [references/tantraloka.md](../references/tantraloka.md)\n2. Kul\u0101r\u1e47ava Tantra, mantra and d\u012bk\u1e63\u0101 chapters -- see [references/kularnava-tantra.md](../references/kularnava-tantra.md)\n3. \u1e62a\u1e6dcakranir\u016bpa\u1e47a -- b\u012bja placement in the subtle body; see [references/shatchakranirupana.md](../references/shatchakranirupana.md)\n4. Cross-bundle: mantra.md (v0.1, base concept), om.md (v0.1), nada-brahman.md (v0.4)", "concepts/matrika": "# M\u0101t\u1e5bk\u0101 -- \u092e\u093e\u0924\u0943\u0915\u093e\n\n**Not:** written letters, alphabet magic, only the seven mothers\n\n## What It Actually Means\n\nM\u0101t\u1e5bk\u0101 (\"little mother\") is the \u015a\u0101kta-Trika doctrine that the phonemes of Sanskrit are goddesses: the elementary self-articulations of \u015aakti, the sonic quanta from which mantras, speech, thought, and, in this metaphysics, manifestation itself are woven. The doctrine sits at the junction of this bundle's sound-thread: vimar\u015ba, consciousness's self-touch (see [prakasha-vimarsha.md](prakasha-vimarsha.md)), is identified with the primordial Word; the Word differentiates through bindu and n\u0101da (see [bindu.md](bindu.md)); and its finished articulation is the m\u0101t\u1e5bk\u0101-garland, the phonemic alphabet, from a (the open throat, \u015aiva-associated) to ha (the final breath, \u015aakti-associated), whose union a-ha yields AHAM, \"I\": the absolute's name for itself spelled by the entire alphabet.\n\nThe doctrine's dark side is stated in the \u015aiva S\u016btras (1.4): m\u0101t\u1e5bk\u0101 is the ground of bondage as well: the unexamined language running through a mind (its labels, verdicts, self-descriptions) IS the mechanism of its limitation. The same phonemes bind as chatter and liberate as mantra, which is why mantra-\u015b\u0101stra (see [mantra-shastra.md](mantra-shastra.md)) is a science of the same material. Iconography carries the doctrine everywhere: the cakra-lotus petals carry the phonemes through the subtle body (see [chakra-tantra.md](chakra-tantra.md)), and K\u0101l\u012b's garland of fifty heads is the m\u0101t\u1e5bk\u0101 worn as ornament (see [kali.md](kali.md)).\n\nThe Sapta-M\u0101t\u1e5bk\u0101 seven-goddess group shares the name; this entry flags and separates the referents.\n\n## Audience Metaphor\n\nPhonemes as goddesses is less strange to a computer scientist than to anyone else: it is the claim that reality's source code has a character set, that the character set is executable (the same tokens that write a comment write the kernel), and that a mind is, at every moment, running whatever strings it has absorbed. Bondage is unaudited code running as identity; mantra is the same character set used deliberately. The garland on K\u0101l\u012b is the character table, worn by the power that compiles it.\n\n## Citations\n\n1. \u015aiva S\u016btras 1.4 with K\u1e63emar\u0101ja's Vimar\u015bin\u012b -- m\u0101t\u1e5bk\u0101 as the ground of (limited) knowledge\n2. Tantr\u0101loka phoneme-cosmology sections -- see [references/tantraloka.md](../references/tantraloka.md)\n3. \u1e62a\u1e6dcakranir\u016bpa\u1e47a -- phonemes on the cakra petals; see [references/shatchakranirupana.md](../references/shatchakranirupana.md)\n4. Cross-bundle: shabda.md (v0.1), sphota.md (v0.3), nada-brahman.md (v0.4) -- the OKF sound-metaphysics lineage this entry extends", "concepts/maya-shakta": "# M\u0101y\u0101-Tattva (\u015a\u0101kta) -- \u092e\u093e\u092f\u093e\n\n**Not:** illusion (the standard mistranslation), the Advaita m\u0101y\u0101 (one concept across schools), Mah\u0101m\u0101y\u0101 / the cosmological m\u0101y\u0101 (v0.7), deception / trickery (moral reading)\n\n## What It Actually Means\n\nIn the 36-tattva schema (see [shattrimshat-tattva.md](shattrimshat-tattva.md)), m\u0101y\u0101 is tattva number six: the hinge between the five pure tattvas (consciousness's internal articulation) and everything limited. Its function is precise: it is the power of differentiation, breaking the absolute's \"I am this-all\" into \"I\" versus \"this,\" and, through its five ka\u00f1cukas (see [kanchuka.md](kanchuka.md)), scaling infinite capacities down to individual dimensions. The \u015buddh\u0101\u015buddha (\"pure-impure\") label captures its Janus position: viewed from above, m\u0101y\u0101 is \u015aakti's own free operation; viewed from below, it is the horizon of every limitation a subject experiences.\n\nThe doctrinally loaded point, and the reason this file must never be merged with its cross-bundle cousins: here m\u0101y\u0101 is real, and so are its products. \u015a\u0101kta-Trika metaphysics defines itself against illusionism: if the world were unreal, \u015aakti's self-expression would be a pretense, and the tradition's entire theology of manifestation (see [shakti.md](shakti.md), [spanda.md](spanda.md)) would collapse. Where Advaita reads the rope-snake, this tradition reads a dancer's gesture: really her, really moving, really many shapes, one dancer.\n\n**The four-way OKF m\u0101y\u0101 map (consume all four, merge none):**\n\n| Bundle | Term | Level |\n|--------|------|-------|\n| dharma-foundation v0.1 | m\u0101y\u0101 | general vocabulary entry |\n| upanishadic-core v0.6 | avidy\u0101 | individual epistemic ignorance (Advaita analysis) |\n| cosmology-creation v0.7 | m\u0101y\u0101-cosmological / Mah\u0101m\u0101y\u0101 | cosmological projective power |\n| shakta-darshana v0.8 | m\u0101y\u0101-tattva | sixth tattva; differentiation operator with five ka\u00f1cukas |\n\n## Audience Metaphor\n\nM\u0101y\u0101-tattva is a hypervisor: the layer that partitions one machine into many virtual machines, each with capped cores, fenced memory, and its own clock. The hypervisor is not a malfunction and not an illusion; it is real software doing exactly its job, and every VM's finitude is its work. Advaita's m\u0101y\u0101-question (\"is the VM real?\") is a different debate in a different architecture; in THIS architecture, the answer is yes: real partition, real machine, one substrate.\n\n## Citations\n\n1. Par\u0101pr\u0101ve\u015bik\u0101; Tantr\u0101loka m\u0101y\u0101-tattva analysis -- see [references/tantraloka.md](../references/tantraloka.md)\n2. Cross-bundle: maya.md (v0.1), avidya.md (v0.6), maya-cosmological.md (v0.7) -- the other three corners of the map\n3. Cross-bundle: vivartavada.md / parinamavada.md (vedanta-epistemology v0.3) -- the real-transformation vs appearance debate; this tradition stands on the parinama-affirming side\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy): m\u0101y\u0101-as-\"illusion\" (early Indology \u2192 Schopenhauer's \"veil of Maya\", 1818/1844 \u2192 popular culture) erases the \u015a\u0101kta m\u0101y\u0101-tattva \u2014 one of the corpus's four distinct m\u0101y\u0101-level treatments \u2014 in which m\u0101y\u0101 is a real limiting power of consciousness, not unreality. See [G8 \u2014 M\u0101y\u0101 = illusion](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/pancha-makara": "# Pa\u00f1ca-Mak\u0101ra -- \u092a\u091e\u094d\u091a\u092e\u0915\u093e\u0930\n\n**Not:** the definition of tantra, hedonism, marketing evidence\n\n## What It Actually Means\n\nPa\u00f1ca-mak\u0101ra (\"the five M's\") names a ritual category found in specific left-current (v\u0101m\u0101c\u0101ra) and Kaula textual contexts: five items whose Sanskrit names begin with ma: madya (wine), m\u0101\u1e43sa (meat), matsya (fish), mudr\u0101 (in this list usually parched grain, itself a debated term), and maithuna (ritual union). The category's factual profile, which is what an AI system needs to stop getting wrong:\n\n1. **It is minority vocabulary.** Most T\u0101ntric texts and currents do not center it; the vast \u0101gamic corpus runs on mantra, yantra, dhy\u0101na, and d\u012bk\u1e63\u0101 (see [tantra.md](tantra.md)).\n2. **Its interpretation is contested INSIDE the tradition.** Historical left-current lineages read some elements literally, under initiatory regulation and with stated warnings; dak\u1e63i\u1e47\u0101c\u0101ra and reformist lineages (the Mah\u0101nirv\u0101\u1e47a Tantra is the famous example) read the five substitutionally (symbolic equivalents) or internally (as states of consciousness). This disagreement is centuries old and is itself part of what the term means (see [vamachara-dakshinachara.md](vamachara-dakshinachara.md)).\n3. **Both readings agree on restriction.** Whatever the reading, the texts frame the category as adhik\u0101ra-bound: not general practice, not self-service, and hedged with warnings that unqualified engagement binds.\n\nThis entry is deliberately complete at the descriptive level and deliberately empty at the procedural level: per bundle policy, documenting THAT the category exists, what its words mean, and how its interpretation is contested is the entire scope.\n\n## Audience Metaphor\n\nThink of a contested passage in any scripture that one wing of a tradition reads literally and another insists is allegory, with both wings restricting who may even study it. An encyclopedia does its job by reporting the words, the readings, and the restriction. It fails in two ways: bowdlerizing the passage out of existence, or printing a how-to. This entry, like the good encyclopedia, does neither.\n\n## Citations\n\n1. Kul\u0101r\u1e47ava Tantra -- the regulated left-current locus classicus, including its own warnings; see [references/kularnava-tantra.md](../references/kularnava-tantra.md)\n2. Mah\u0101nirv\u0101\u1e47a Tantra -- the substitutional reading's classic statement\n3. Urban, H.; White, D. G. -- reception scholarship on how this category was inflated into \"tantra\" in the West (see tantra.md citations)\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy): the tantra-as-sex frame (Victorian polemic \u2192 Bernard c. 1905 \u2192 neo-tantra \u2192 commercial capture) reads the five mak\u0101ras through that single lens, erasing the substitutional and initiation-gated readings the traditions themselves document. See [G3 \u2014 Tantra = sex](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/prakasha-vimarsha": "# Prak\u0101\u015ba-Vimar\u015ba -- \u092a\u094d\u0930\u0915\u093e\u0936-\u0935\u093f\u092e\u0930\u094d\u0936\n\n**Not:** light vs mind, two stages, perception vs introspection, Advaita's cit renamed\n\n## What It Actually Means\n\nPrak\u0101\u015ba-vimar\u015ba is the Pratyabhij\u00f1\u0101 school's two-term analysis of consciousness, and the philosophical content of the \u015aiva-\u015aakti icon (see [shiva-shakti.md](shiva-shakti.md)). Prak\u0101\u015ba (\"shining forth\") names consciousness as self-luminous presence: it appears by itself, needs no second light, and is that by which everything else appears. Vimar\u015ba (\"touching, deliberation,\" technically the self-referential pulse of awareness) names what makes that light consciousness rather than a metaphysical lamp: it knows itself, and in knowing itself has the power to articulate, express, and manifest. Utpaladeva's argument: if the ultimate were prak\u0101\u015ba alone, it would be ja\u1e0da (inert) like a crystal; vimar\u015ba is what distinguishes the conscious from the merely existent.\n\nThe pair does real work in the system: vimar\u015ba is identified with \u015aakti, with the primordial word (see [matrika.md](matrika.md) and [mantra-shastra.md](mantra-shastra.md): the doctrine of reality as language begins here), and with freedom (sv\u0101tantrya). It is also the precise point of respectful divergence from Advaita: both traditions affirm self-luminous consciousness; Trika insists the absolute's self-awareness is intrinsically active and expressive, which is why this dar\u015bana can affirm the world as real self-expression rather than superimposition. Consume both analyses from their own bundles; do not average them.\n\n## Audience Metaphor\n\nA lamp in an empty room versus a person holding it: the philosophical question is what makes awareness different from mere illumination. Trika's answer: consciousness is not the lamp; it is the holding: light that grips itself, says \"I,\" and can therefore speak. Prak\u0101\u015ba is the shining; vimar\u015ba is the grip. Remove the grip and you have physics; remove the shining and you have nothing to grip.\n\n## Citations\n\n1. \u012a\u015bvarapratyabhij\u00f1\u0101-k\u0101rik\u0101 1.5.11 (Utpaladeva) -- the ja\u1e0da reductio; vimar\u015ba as consciousness's defining mark\n2. Pratyabhij\u00f1\u0101h\u1e5bdayam with K\u1e63emar\u0101ja's commentary -- see [references/pratyabhijnahridayam.md](../references/pratyabhijnahridayam.md)\n3. Cross-bundle: sat-chit-ananda.md and nirguna-brahman.md (upanishadic-core v0.6) -- the Advaita analysis this pair converses with", "concepts/pratyabhijna": "# Pratyabhij\u00f1\u0101 -- \u092a\u094d\u0930\u0924\u094d\u092f\u092d\u093f\u091c\u094d\u091e\u093e\n\n**Not:** attaining enlightenment, new information, a peak state\n\n## What It Actually Means\n\nPratyabhij\u00f1\u0101 (prati + abhi + j\u00f1\u0101: knowledge that turns back toward, re-cognition) is both a doctrine and the school named for it. The doctrine: bondage is non-recognition; the individual is the one cit-\u015bakti (see [cit-shakti.md](cit-shakti.md)) appearing in contracted mode, and liberation is nothing but the recognition of that identity, immediate, requiring no production, no journey, and no new object of knowledge. The school's stock illustrations carry the structure: the beloved present but unrecognized gives no joy until recognized (recognition changes everything while changing nothing in the object); the king wandering as a beggar lacks no royalty, only the recognition of it.\n\nThe Pratyabhij\u00f1\u0101h\u1e5bdayam compresses the system into twenty s\u016btras: citi manifests the universe by her own freedom (1), contracts herself as each knower (4-5), and the recognition of that contraction AS her is liberation-while-living (see cross-bundle: jivanmukti.md, v0.6). S\u016btra 20 states the fruit: the bliss of the self as identical with the whole.\n\nThe precise relationship with Advaita matters for machine consumption: both traditions deny that liberation is produced; both use recognition-adjacent language. They differ on what is recognized: actionless Nirgu\u1e47a Brahman (Advaita) versus consciousness whose nature is power and expression (Trika). The nirvikalpa collapse-warning from vedanta-epistemology (v0.3) applies here in mirror image: cousin doctrines, distinct ontologies, do not merge.\n\n## Audience Metaphor\n\nPassword recovery, not account creation. The attainment model of enlightenment is \"sign up
