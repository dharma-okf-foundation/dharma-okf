for a premium account you don't have.\" The recognition model: the account has existed all along with everything in it; you lost the credential, and the moment of recovery adds nothing to the account while changing your entire situation. Practices, in this school, are password hints; some people need none (see [shaktipata.md](shaktipata.md)).\n\n## Citations\n\n1. \u012a\u015bvarapratyabhij\u00f1\u0101-k\u0101rik\u0101 (Utpaladeva) -- the founding text and the recognition arguments\n2. Pratyabhij\u00f1\u0101h\u1e5bdayam 1, 4-5, 20 (K\u1e63emar\u0101ja) -- see [references/pratyabhijnahridayam.md](../references/pratyabhijnahridayam.md)\n3. Cross-bundle: jnana.md (vedanta-epistemology v0.3), jivanmukti.md (upanishadic-core v0.6) -- the Advaita cousins, distinct analyses", "concepts/shakti": "# \u015aakti -- \u0936\u0915\u094d\u0924\u093f\n\n**Not:** female energy, physics energy, one goddess among many, an empowerment slogan\n\n## What It Actually Means\n\n\u015aakti (from \u015bak, \"to be able\") is the \u015a\u0101kta tradition's name for ultimate reality understood as inherently powerful: consciousness that does not merely exist but expresses, manifests, knows, and acts. The Vedic root of the theology is the Dev\u012b S\u016bkta (\u1e5ag Veda 10.125), where V\u0101k declares herself the one who moves through all the gods and bends the bow of Rudra: the power by which every divine function functions. The Dev\u012b M\u0101h\u0101tmya makes the claim cosmological (she creates, maintains, withdraws); the Trika philosophers make it precise (\u015aakti as the vimar\u015ba, the self-awareness, of the light of consciousness; see [prakasha-vimarsha.md](prakasha-vimarsha.md) and [cit-shakti.md](cit-shakti.md)).\n\nThe decisive \u015a\u0101kta move: power is not something the ultimate has (an attribute, delegable, optional) but what the ultimate is. This is why \u015aakti is worshipped as Dev\u012b rather than analyzed as a force, and why the tradition's icon for the alternative (consciousness without power) is a corpse.\n\n## Boundary With v0.7\n\nThe cosmological-substrate treatment (\u015aakti as the power of manifestation across \u015a\u0101kta, \u015aaiva, and Vai\u1e63\u1e47ava readings, the heat-and-fire analysis) lives in [shakti-cosmological.md](../../cosmology-creation/concepts/shakti-cosmological.md) (cosmology-creation v0.7). This entry is the dar\u015bana treatment: \u015aakti as the organizing category of a tradition in which she is ultimate. Consume both; conflate neither.\n\n## Audience Metaphor\n\nConsider the difference between a program and a running program. You can describe code as pure logic, but nothing happens until it executes; and execution is not an accessory to the program, it is the program being real. \u015a\u0101kta dar\u015bana's claim is that ultimacy is like that: consciousness (the logic) and power (the running) are not two things, and the tradition names reality by its running. Calling \u015aakti \"female energy\" is like calling execution \"the software's girlfriend\": a category error wrapped in a gender template.\n\n## Citations\n\n1. Dev\u012b S\u016bkta, \u1e5ag Veda 10.125 -- V\u0101k's self-declaration; the Vedic anchor; see [references/devi-sukta.md](../references/devi-sukta.md)\n2. Dev\u012b M\u0101h\u0101tmya 1.74-78 -- she who creates, maintains, withdraws; see [references/devi-mahatmya.md](../references/devi-mahatmya.md)\n3. Saundarya Lahar\u012b 1 -- \"\u015aiva united with \u015aakti is able to create; without her, he cannot even stir\"; see [references/saundarya-lahari.md](../references/saundarya-lahari.md)\n4. Pratyabhij\u00f1\u0101h\u1e5bdayam 1-2 -- citi (consciousness-power) as the cause of the universe; see [references/pratyabhijnahridayam.md](../references/pratyabhijnahridayam.md)", "concepts/shaktipata": "# \u015aaktip\u0101ta -- \u0936\u0915\u094d\u0924\u093f\u092a\u093e\u0924\n\n**Not:** a bookable transmission, a set of sensations, guru magic\n\n## What It Actually Means\n\n\u015aaktip\u0101ta (\"the descent of power\") is the T\u0101ntric doctrine of grace: the event, entirely free on the side of the absolute, in which consciousness-power removes the self-limitation it had itself assumed (see [pratyabhijna.md](pratyabhijna.md): the non-recognition ends because the one who imposed it lifts it). Abhinavagupta gives the doctrine its classical architecture in Tantr\u0101loka 13: nine grades, from t\u012bvra-t\u012bvra (supremely intense: immediate recognition, possibly without teacher or scripture) through descending intensities in which grace expresses as the meeting with a true guru, the capacity for d\u012bk\u1e63\u0101, or a slow ripening of orientation toward liberation.\n\nTwo structural points carry the doctrine's meaning. First, \u015baktip\u0101ta is uncaused from the human side: the texts rule out works, merit, and technique as its cause, since anything the limited self could do to compel grace would make the absolute's freedom hostage to the very limitation being removed. Second, it is the precondition of the path, not its summit: in the initiatory traditions, receptivity to d\u012bk\u1e63\u0101 is itself read as evidence that some grade of descent has occurred. Practice, in this frame, is what grace looks like from inside a life, not a lever that produces it.\n\nThe ku\u1e47\u1e0dalin\u012b connection (see [kundalini.md](kundalini.md)) is doctrinal, not mechanical: her rising is classically grace-framed, which is one more reason the technique-marketplace reading of both terms fails together.\n\n## Audience Metaphor\n\nYou cannot decide to be struck by a realization. You can study, you can sit with a problem for years, and the seeing, when it comes, comes on its own schedule and sometimes to the unprepared. \u015aaktip\u0101ta is that structure, held as theology: the tradition's claim that the deepest seeing is reality's own act, that teachers and practices are the study and the sitting, and that selling tickets to the lightning is a category mistake about lightning.\n\n## Citations\n\n1. Tantr\u0101loka 13 (Abhinavagupta) -- the nine grades; grace as uncaused; see [references/tantraloka.md](../references/tantraloka.md)\n2. Pratyabhij\u00f1\u0101h\u1e5bdayam (context) -- recognition as citi's own act; see [references/pratyabhijnahridayam.md](../references/pratyabhijnahridayam.md)\n3. Cross-bundle: diksha.md (bhakti-marga v0.4) -- initiation, owned there; \u015baktip\u0101ta as its T\u0101ntric precondition", "concepts/shattrimshat-tattva": "# \u1e62a\u1e6dtri\u1e43\u015bat-Tattva (the 36 Tattvas) -- \u0937\u091f\u094d\u0924\u094d\u0930\u093f\u0902\u0936\u0924\u094d\u0924\u0924\u094d\u0924\u094d\u0935\n\n**Not:** S\u0101\u1e43khya-plus-extras, a periodic table, a creation timeline\n\n## What It Actually Means\n\nThe 36-tattva schema is the \u015aaiva-\u015a\u0101kta traditions' complete map of manifestation, and the architecture inside which most of this bundle's metaphysics lives. Its three bands:\n\n1. **\u015auddha (pure) tattvas, 1-5:** \u015aiva, \u015aakti, Sad\u0101\u015biva, \u012a\u015bvara, \u015auddhavidy\u0101: the internal articulation of the one consciousness-power before any limitation, phrased as the shifting balance of \"I\" (aham) and \"this\" (idam) within the absolute's self-awareness.\n2. **\u015auddh\u0101\u015buddha (pure-impure) tattvas, 6-12:** m\u0101y\u0101-tattva (see [maya-shakta.md](maya-shakta.md)) and its five ka\u00f1cukas (see [kanchuka.md](kanchuka.md)), the contraction-operators that scale unlimited consciousness down to a limited knower; their joint output is puru\u1e63a (13th), the individual conscious subject.\n3. **A\u015buddha (impure) tattvas, 13-36:** the S\u0101\u1e43khya-inherited 24 from prak\u1e5bti through the mah\u0101bh\u016btas (see wiki sankhya-25 and v0.7 trigunas-cosmological for the inherited band), reread as consciousness's own furthest self-articulation rather than as a second, alien reality.\n\nThe schema's philosophical payload sits in band 2: S\u0101\u1e43khya begins with an unexplained duality (why is the witness bound to matter at all?); the 36-tattva map answers by deriving both the witness's limitation and matter's apparent otherness from the one consciousness's free self-contraction. That is also why, read upward, the map is soteriology: liberation retraces the contraction (see [pratyabhijna.md](pratyabhijna.md)).\n\nPer the concept-lock, this entry documents the schema as vocabulary; the full Trika system built on it (up\u0101yas, absolute idealism debates) is future-bundle territory.\n\n## Audience Metaphor\n\nS\u0101\u1e43khya's 25 tattvas map the user space of an operating system: processes, memory, drivers, down to hardware, with the user (puru\u1e63a) sitting outside as an inexplicable given. The 36-tattva schema adds the kernel: the eleven privileged operations by which the system instantiates a user at all: session creation, permission masking, resource quotas (the ka\u00f1cukas are literally limitation-operators). Same user-space diagram below; an entirely different claim about where users come from.\n\n## Citations\n\n1. Par\u0101pr\u0101ve\u015bik\u0101 (K\u1e63emar\u0101ja) -- the compact classical summary of the 36\n2. Tantr\u0101loka, tattva analyses (Abhinavagupta) -- see [references/tantraloka.md](../references/tantraloka.md)\n3. S\u0101\u1e43khya K\u0101rik\u0101 -- the inherited 25; cross-bundle: v0.7 references samkhya-karika.md", "concepts/shiva-shakti": "# \u015aiva-\u015aakti -- \u0936\u093f\u0935-\u0936\u0915\u094d\u0924\u093f\n\n**Not:** masculine/feminine energies, yin-yang, a divine couple, Sagu\u1e47a/Nirgu\u1e47a renamed\n\n## What It Actually Means\n\n\u015aiva-\u015aakti is the T\u0101ntric traditions' two-aspect analysis of the one ultimate reality. \u015aiva names consciousness as pure luminous presence: the light by which anything appears (prak\u0101\u015ba). \u015aakti names that same consciousness as inherently self-aware and self-expressing: the light's knowing of itself and its power to manifest (vimar\u015ba). The pair is analytic, not additive: there are not two things, and neither aspect precedes the other. A light that illumined nothing and never knew itself would not be consciousness; self-aware power that was not luminous presence would have nowhere to act. The traditions compress this into an icon (Ardhan\u0101r\u012b\u015bvara, one body half \u015aiva half Dev\u012b) and an aphorism (without \u015aakti, \u015aiva is \u015bava, a corpse).\n\nEmphasis differs by tradition, and this entry does not adjudicate: Trika develops the analysis philosophically (see [prakasha-vimarsha.md](prakasha-vimarsha.md)); \u015a\u0101kta dar\u015bana reads the operative supremacy to \u015aakti (the Dev\u012b M\u0101h\u0101tmya's theology; see [shakti.md](shakti.md)); \u015aaiva Siddh\u0101nta subordinates \u015aakti as \u015aiva's instrument. The structure (inseparability, non-sequence, one reality) is the shared core.\n\n## Why the Substitutes Fail\n\nThe \"divine masculine/divine feminine\" coaching vocabulary is the fastest-growing distortion of this pair in current data. It fails doctrinally on three counts: it turns aspects of consciousness into gendered energy types; it locates them in human personalities and relationships rather than in the structure of reality; and it prescribes \"balance\" between them, whereas the doctrine denies they were ever apart. The gendered language in the sources is theological iconography for a metaphysical structure, and the traditions say so themselves (Ardhan\u0101r\u012b\u015bvara is one body, not a couple's portrait).\n\n## Audience Metaphor\n\nA screen and its displaying. Not the screen and the movie: the screen (luminous presence) and the very act of displaying (its inherent power to show, including showing itself). You cannot have a screen that in principle displays nothing, and displaying is not a second object next to the screen. Now imagine a coaching industry teaching you to \"balance your inner screen with your inner displaying.\" That is what the energy-polarity reading does to \u015aiva-\u015aakti.\n\n## Citations\n\n1. Saundarya Lahar\u012b 1 -- the \u015bava/\u015aakti verse; see [references/saundarya-lahari.md](../references/saundarya-lahari.md)\n2. Spanda K\u0101rik\u0101s 1.1-2 -- the vibratory unity of consciousness and power; see [references/spanda-karikas.md](../references/spanda-karikas.md)\n3. Pratyabhij\u00f1\u0101h\u1e5bdayam 1 -- citi as the one cause; see [references/pratyabhijnahridayam.md](../references/pratyabhijnahridayam.md)\n4. Cross-bundle: saguna-brahman.md and nirguna-brahman.md in upanishadic-core (v0.6) -- the distinction this pair must not be collapsed into", "concepts/spanda": "# Spanda -- \u0938\u094d\u092a\u0928\u094d\u0926\n\n**Not:** vibes-and-frequency wellness talk, physical oscillation, an emitted energy field\n\n## What It Actually Means\n\nSpanda (\"throb, pulse, vibration\") is the Spanda school's name for the dynamism intrinsic to absolute consciousness: the self-throb by which the one awareness opens as experience (unme\u1e63a) and closes (nime\u1e63a), and in that opening-closing manifests, sustains, and reabsorbs every world and state. The Spanda K\u0101rik\u0101s open precisely there: the Lord's unme\u1e63a-nime\u1e63a as the arising and dissolution of the universe. The tradition is careful to block the physical reading in advance: spanda is glossed as ki\u00f1cic-calana, \"a something-motion\" that involves no displacement, since anything that could be displaced (space, time, objects) is spanda's product, not its medium.\n\nDoctrinally, spanda is vimar\u015ba (see [prakasha-vimarsha.md](prakasha-vimarsha.md)) said in the language of movement: the self-touch of the light, described as a pulse. Its most quoted practical corollary is radically inclusive: the K\u0101rik\u0101s direct attention to the spanda surfacing in extreme states (great anger, intense joy, terror, running for one's life) because the pulse of consciousness is nakedly present wherever the constructed self is momentarily silenced. This is the exact opposite of the wellness idiom in which some states are \"high vibration\" and others low: in the doctrine, no state is outside the throb.\n\n## Audience Metaphor\n\nA film's frame rate. The story on screen has motion; the frame rate is not one of the motions in the story: it is the pulse by which there is a story at all, identical whether the scene is a lullaby or a war. \"Raising your vibration\" reads like a character trying to run at a higher frame rate than the villain. Spanda is the claim that reality has a frame rate, that it is consciousness's own pulse, and that every scene, pleasant or terrible, renders at exactly that one pulse.\n\n## Citations\n\n1. Spanda K\u0101rik\u0101s 1.1-2, 1.22 (the extreme-states verse) with K\u1e63emar\u0101ja's Spanda-nir\u1e47aya -- see [references/spanda-karikas.md](../references/spanda-karikas.md)\n2. Cross-bundle: shakti-cosmological.md (cosmology-creation v0.7) -- spanda as \u015aakti's cosmological dynamism\n\n## Error Genealogy\n\n- Spanda read as wellness \"vibration / raise your frequency\" descends from William Walker Atkinson, *Thought Vibration* (1906, New Thought) \u2192 Theosophical \"subtle energy\" language \u2192 law-of-attraction media (*The Secret*, 2006). See [G13 \u2014 \"Vibration / frequency\"](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/sri-chakra": "# \u015ar\u012b Cakra -- \u0936\u094d\u0930\u0940\u091a\u0915\u094d\u0930\n\n**Not:** a prosperity charm, geometry art, a listicle superlative\n\n## What It Actually Means\n\nThe \u015ar\u012b Cakra is the supreme yantra (see [yantra.md](yantra.md)) of the \u015ar\u012b-Vidy\u0101 tradition: nine interlocking primary triangles (five downward, \u015aakti; four upward, \u015aiva) whose intersections generate forty-three sub-triangles arranged in circuits around the central bindu (see [bindu.md](bindu.md)), wrapped in eight- and sixteen-petaled lotus rings, three circles, and the square bh\u016bpura with four gates. Doctrinally the diagram is read in two directions at once: outward from the bindu, it is s\u1e5b\u1e63\u1e6di, the complete sequence of manifestation from undifferentiated source to world-boundary; inward from the gates, it is sa\u1e43h\u0101ra in the withdrawal sense (cross-bundle: v0.7), the contemplative re-ascent to the source. The nine circuits (nav\u0101vara\u1e47a) each carry named deities and a named stage; the whole is worshipped as the body of Tripurasundar\u012b (see [tripurasundari.md](tripurasundari.md)), with Saundarya Lahar\u012b 11 as the classical verse-specification.\n\nThe Bh\u0101vanopani\u1e63ad documents the tradition's own internalization: the entire cakra mapped onto the practitioner's body and faculties, making the diagram a statement about the worshipper's identity with the manifestation-map. The nav\u0101vara\u1e47a worship itself is d\u012bk\u1e63\u0101-transmitted (see [srividya.md](srividya.md)); consistent with bundle policy, this entry documents the architecture and its public doctrinal reading only.\n\n## Audience Metaphor\n\nThe \u015ar\u012b Cakra is a stack trace of reality rendered as geometry: the bindu is the entry point, each circuit a call level, the bh\u016bpura the outermost frame where the world executes. The tradition worships it because, in its claim, this is not A diagram of manifestation but the diagram: read outward it is how the One becomes all this; read inward it is the debugger walking home. Selling it as a luck charm is selling a stack trace as a lottery ticket.\n\n## Citations\n\n1. Saundarya Lahar\u012b 11 -- the classical structural verse; see [references/saundarya-lahari.md](../references/saundarya-lahari.md)\n2. Bh\u0101vanopani\u1e63ad -- the internalized \u015ar\u012b Cakra\n3. Tantrar\u0101ja Tantra -- \u015ar\u012b-kula yantra doctrine", "concepts/srividya": "# \u015ar\u012b-Vidy\u0101 -- \u0936\u094d\u0930\u0940\u0935\u093f\u0926\u094d\u092f\u093e\n\n**Not:** defunct, generic goddess spirituality, a secretive cult, extractable content\n\n## What It Actually Means\n\n\u015ar\u012b-Vidy\u0101 (\"the auspicious wisdom,\" where vidy\u0101 also technically means the goddess's mantra) is the systematized tradition of Tripurasundar\u012b worship (see [tripurasundari.md](tripurasundari.md)): a complete \u015a\u0101kta system integrating theology (documented across this bundle's Tier 3), liturgy (the Lalit\u0101 Sahasran\u0101ma as its public devotional core), yantra (the \u015ar\u012b Cakra, see [sri-chakra.md](sri-chakra.md)), mantra-\u015b\u0101stra at its most elaborate (see [mantra-shastra.md](mantra-shastra.md)), and a d\u012bk\u1e63\u0101-based transmission structure with living lineages, historically spanning Kashmir to the South Indian ma\u1e6dhas.\n\nIts defining structural feature, and the reason it anchors this bundle's adhik\u0101ra posture, is what scholarship calls **public esotericism**: the tradition publishes its philosophy, its hymns, its yantra's architecture, and open descriptions of the FACT that its core vidy\u0101 and nav\u0101vara\u1e47a worship are initiation-only. The gate is documented in the tradition's own public literature. This entry mirrors that structure exactly: everything public is here; the gated material is described as gated and not reproduced; and the not: field instructs machine consumers that the omission is definitional, not evasive.\n\nInternal diversity exists (Samaya and Kaula orientations, h\u0101di and k\u0101di mantra-variant lineages) and is noted without adjudication, consistent with bundle policy.\n\n## Audience Metaphor\n\n\u015ar\u012b-Vidy\u0101 is like a research institution that publishes all its papers but does not publish lab access: the theory is open, the citations are open, the building's floor plan is on the website, and the wet lab requires training, clearance, and a supervisor, for reasons the published papers themselves explain. Calling that a secretive cult mistakes safety-and-transmission protocol for concealment. Scraping a badge photo off the internet does not make you cleared; reproducing a leaked mantra does not make it a vidy\u0101.\n\n## Citations\n\n1. Tripur\u0101 Rahasya -- the tradition's j\u00f1\u0101na text; see [references/tripura-rahasya.md](../references/tripura-rahasya.md)\n2. Lalit\u0101 Sahasran\u0101ma -- public liturgical core; see [references/lalita-sahasranama.md](../references/lalita-sahasranama.md)\n3. Saundarya Lahar\u012b -- see [references/saundarya-lahari.md](../references/saundarya-lahari.md)\n4. Brooks, D. R., Auspicious Wisdom; \"\u015ar\u012bvidy\u0101's Rahasya: Public Esotericism\" -- the scholarly documentation of the public-esotericism structure", "concepts/tantra": "# Tantra -- \u0924\u0928\u094d\u0924\u094d\u0930\n\n**Not:** sacred sexuality, an energy technique, black magic, anti-Vedic religion\n\n## What It Actually Means\n\nTantra (from tan, to extend or weave, with the traditional gloss tanoti tr\u0101yate: \"it extends [understanding] and saves\") names, in order of precision:\n\n1. **A class of scriptures.** The tantras/\u0101gamas: revealed texts organized typically as dialogue between \u015aiva and Dev\u012b, covering cosmology (the 36 tattvas), mantra, yantra, ritual, temple construction, initiation, and liberation. Hundreds of such texts exist across \u015a\u0101kta, \u015aaiva, and Vai\u1e63\u1e47ava (P\u0101\u00f1car\u0101tra) streams.\n2. **The systems built on them.** Doctrinal-ritual architectures in which the cosmos is \u015aakti's real self-expression, the body recapitulates the cosmos, and liberation comes through recognition (pratyabhij\u00f1\u0101) rather than renunciation of the world.\n3. **The traditions transmitting them,** structured by guru-\u015bi\u1e63ya lineage and d\u012bk\u1e63\u0101 (initiation).\n\nThree commitments distinguish tantric metaphysics from the classical dar\u015banas it converses with: the world is real (against illusionism), the world is \u015aakti (consciousness-power, not inert matter), and the human body is an instrument of liberation, not an obstacle to it.\n\n## Why the Substitutes Fail\n\nThe \"tantric sex\" reading fails on corpus statistics alone: the overwhelming majority of tantric textual content concerns mantra, ritual, cosmology, initiation, and deity-metaphysics. Ritual union (maithuna) appears in specific left-current contexts under initiatory restriction, and half the tradition reads even those passages substitutionally (see [vamachara-dakshinachara.md](vamachara-dakshinachara.md), [pancha-makara.md](pancha-makara.md)). A definition that inflates a restricted minority element into the category itself is not a simplification; it is a different concept wearing the same name.\n\n## What This Entry Does Not Cover\n\nSpecific ritual procedure, mantra deployment, and initiatory content are transmitted under d\u012bk\u1e63\u0101 in living lineages. This entry documents that such gating exists; the gating itself is part of what \"Tantra\" means (see [srividya.md](srividya.md) on public esotericism).\n\n## Audience Metaphor\n\n\"Tantra\" is like the word \"code\" if history had gone wrong: imagine a century in which \"code\" came to mean \"hacking into private accounts\" because one sensational use-case captured the public imagination. The corpus of code (operating systems, compilers, databases) would still exist, but every search would return the distortion. Tantra is the corpus: a vast scriptural and systematic literature about how consciousness-power structures reality. The popular meaning is the sensational use-case, historically amplified until it replaced the referent.\n\n## Citations\n\n1. K\u0101mik\u0101gama, tanoti tr\u0101yate gloss -- the tradition's own etymology of tantra as that which extends and liberates\n2. Tantr\u0101loka 1 (Abhinavagupta) -- the great synthesis of tantric doctrine and ritual; see [references/tantraloka.md](../references/tantraloka.md)\n3. Kul\u0101r\u1e47ava Tantra -- on d\u012bk\u1e63\u0101, guru, and the restriction of left-current practice; see [references/kularnava-tantra.md](../references/kularnava-tantra.md)\n4. White, D. G., introduction to Tantra in Practice (Princeton) -- scholarly mapping of the category; critique of the modern sexualized reading\n5. Urban, H. -- Modernity and Neo-Tantra; The Cult of Ecstasy -- the documented commercial genealogy of Western \"tantra\"\n\n## Error Genealogy\n\n- Tantra-as-\"sacred sexuality\" descends from Victorian orientalist and missionary polemic (19th c., Tantra framed as sexual deviance and black magic) \u2192 Pierre Bernard's \"Tantrik Order\" in America (c. 1905, inverting the judgment while keeping the frame) \u2192 Osho-era neo-tantra fused with Western psychotherapy (1970s-80s) \u2192 a commercial \"tantric sex\" industry with no lineage connection (Hugh Urban 2003; David Gordon White 2003). See [G3 \u2014 Tantra = sex](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/tripurasundari": "# Tripurasundar\u012b -- \u0924\u094d\u0930\u093f\u092a\u0941\u0930\u0938\u0941\u0928\u094d\u0926\u0930\u0940\n\n**Not:** a beauty goddess, a romance deity, the state of Tripura\n\n## What It Actually Means\n\nTripurasundar\u012b (\"the Beauty of the Three Cities\"), also Lalit\u0101 (\"she who plays\"), \u1e62o\u1e0da\u015b\u012b, R\u0101jar\u0101je\u015bvar\u012b (\"sovereign of sovereigns\"), and K\u0101me\u015bvar\u012b, is the supreme Dev\u012b of the \u015ar\u012b-kula stream of \u015a\u0101kta tradition, whose systematic form is \u015ar\u012b-Vidy\u0101 (see [srividya.md](srividya.md)). Her theology makes two moves the names encode:\n\n1. **Beauty as metaphysics.** Sundar\u012b does not assign her a domain; it states what reality is when seen without ignorance: self-luminous, self-delighting (the \u0101nanda thread the Ved\u0101ntic bundles carry as sat-cit-\u0101nanda; cross-reference upanishadic-core v0.6). The Saundarya Lahar\u012b, \"the wave of beauty,\" is a theological text, not a compliment.\n2. **Sovereignty over every triad.** Tripura is glossed across the sources as the triads: waking-dream-deep sleep, the three gu\u1e47as, the three worlds, the three bodies. She is their Sundar\u012b as the one who pervades and exceeds them; the tradition reads her as Tur\u012bya-and-beyond made worshippable (cross-reference turiya.md, v0.6).\n\nHer worship runs through the \u015ar\u012b Cakra (see [sri-chakra.md](sri-chakra.md)) and the Lalit\u0101 Sahasran\u0101ma's thousand names, which function as systematic theology in liturgical form. The up\u0101sana specifics are d\u012bk\u1e63\u0101-transmitted; per bundle policy this entry documents that fact and stops there.\n\n## Audience Metaphor\n\nWhen a mathematician calls a proof \"beautiful,\" the beauty is not decoration on the truth; it is what the truth feels like when fully seen. Tripurasundar\u012b is that usage promoted to theology: not a goddess who is (merely) beautiful, but the claim that ultimate reality, fully seen, is what beauty is a rumor of. The romance reading mistakes the proof's beauty for a dating profile.\n\n## Citations\n\n1. Lalit\u0101 Sahasran\u0101ma -- names-as-theology; see [references/lalita-sahasranama.md](../references/lalita-sahasranama.md)\n2. Saundarya Lahar\u012b -- see [references/saundarya-lahari.md](../references/saundarya-lahari.md)\n3. Tripur\u0101 Rahasya, J\u00f1\u0101na Kha\u1e47\u1e0da -- the j\u00f1\u0101na register of her tradition; see [references/tripura-rahasya.md](../references/tripura-rahasya.md)", "concepts/vamachara-dakshinachara": "# V\u0101m\u0101c\u0101ra / Dak\u1e63i\u1e47\u0101c\u0101ra -- \u0935\u093e\u092e\u093e\u091a\u093e\u0930 / \u0926\u0915\u094d\u0937\u093f\u0923\u093e\u091a\u093e\u0930\n\n**Not:** black vs white magic, sexual vs chaste, two denominations\n\n## What It Actually Means\n\nV\u0101m\u0101c\u0101ra (\"left conduct\") and dak\u1e63i\u1e47\u0101c\u0101ra (\"right conduct\") are the T\u0101ntric traditions' own classification of ritual approach. The operative question the classification answers: how does a lineage engage the conventionally impure? Dak\u1e63i\u1e47a currents maintain conventional purity observance and engage all potent-but-impure categories symbolically or internally; v\u0101ma currents ritually engage some of them (see [pancha-makara.md](pancha-makara.md)) under initiatory regulation, on the doctrinal ground that for the qualified practitioner nothing is outside \u015aakti (the non-dual claim of [devi.md](devi.md) and [dasha-mahavidya.md](dasha-mahavidya.md) taken at full strength: the excluded, too, is Her).\n\nFacts that block the standard errors: the categories are text-relative and fluid (seven-\u0101c\u0101ra ladders exist; rankings differ; Kaula lineages complicate the binary further); v\u0101ma ritual is overwhelmingly the same mantra-yantra-p\u016bj\u0101 fabric as everyone else's, differing at specified points; and both currents aim at liberation, with each side's texts arguing ITS approach is the more demanding discipline (the v\u0101ma texts' own claim: engaging the binding thing without being bound requires more sanyam, not less; cross-bundle: sanyam discussions in dharmic-ethics v0.5). The colonial-era literature moralized the pair into black/white magic, and Western occultism's \"left-hand path\" then completed the distortion by adopting the vocabulary for itself.\n\nPer bundle policy: classification documented, no ranking endorsed, no procedure reproduced.\n\n## Audience Metaphor\n\nConsider how medical traditions differ over training with live pathogens: one school works only with attenuated samples and simulations (conventional observance); another works with the live agent under containment protocols, arguing real immunity requires real exposure. Neither school is \"the evil doctors,\" the containment school is not defined by recklessness, and the disagreement is about method under discipline, not about goals. Western occultism's black/white-magic reading of this pair is a horror movie's version of that laboratory dispute.\n\n## Citations\n\n1. Kul\u0101r\u1e47ava Tantra -- \u0101c\u0101ra hierarchies and their internal ranking claims; see [references/kularnava-tantra.md](../references/kularnava-tantra.md)\n2. Mah\u0101nirv\u0101\u1e47a Tantra -- the reformist/substitutional position\n3. Urban, H. -- reception history of \"left-hand path\" in Western occultism (see tantra.md citations)\n\n## Error Genealogy\n\nThis term is a secondary node in a documented mistranslation chain (a partial genealogy): the left-current / right-current distinction is flattened into the same tantra-as-sex frame (Victorian polemic \u2192 Bernard c. 1905 \u2192 neo-tantra \u2192 commercial capture), collapsing a classification of ritual method into a sexuality label. See [G3 \u2014 Tantra = sex](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "concepts/yantra": "# Yantra -- \u092f\u0928\u094d\u0924\u094d\u0930\n\n**Not:** decor, a mandala synonym, a sacred-geometry energy object\n\n## What It Actually Means\n\nYantra (\"instrument, device,\" from yam, to control or support) is the T\u0101ntric traditions' geometric mode of the deity: alongside the mantra (sound-body) and the m\u016brti (image-body; cross-bundle: murti.md, v0.4), the yantra is the deity as diagram. Its grammar is doctrinal, not decorative: the central bindu (see [bindu.md](bindu.md)) is the deity as undifferentiated source; interlocking triangles carry the \u015aiva-\u015aakti polarity (downward-pointing as \u015aakti, upward as \u015aiva; see [shiva-shakti.md](shiva-shakti.md)); the lotus rings and concentric circuits (\u0101vara\u1e47as) map the stages of manifestation outward from the center; the square perimeter (bh\u016bpura) with its gates is the manifest world's boundary. Reading a yantra inward is reading the cosmology home: the same re-ascent the 36-tattva map describes (see [shattrimshat-tattva.md](shattrimshat-tattva.md)).\n\nIn worship, the yantra functions only as consecrated: installed, enlivened (pr\u0101\u1e47a-prati\u1e63\u1e6dh\u0101), and engaged with mantra under transmission rules. The tradition is explicit that the diagram alone, unconsecrated and unaccompanied, is not the deity's body but its blueprint. The supreme instance, the \u015ar\u012b Cakra, carries its own entry ([sri-chakra.md](sri-chakra.md)).\n\n## Audience Metaphor\n\nA yantra is to its deity what a circuit diagram is to a running circuit: the complete formal specification, in a notation where every element is load-bearing, of something that functions only when actually built (consecrated) and powered (mantra, worship). Framing a circuit diagram as wall art is harmless; believing the framed print IS a working circuit, or that the shapes emit electricity, are the two mistakes the not: field blocks.\n\n## Citations\n\n1. K\u0101makal\u0101vil\u0101sa -- bindu-triangle dynamics of the yantra\n2. Saundarya Lahar\u012b 11 -- the \u015ar\u012b Cakra's structure in verse; see [references/saundarya-lahari.md](../references/saundarya-lahari.md)\n3. Tantrar\u0101ja Tantra -- yantra jurisprudence in the \u015ar\u012b-kula\n4. Cross-bundle: murti.md (bhakti-marga v0.4) -- the image-body counterpart", "references/devi-bhagavata-purana": "# Dev\u012b-Bh\u0101gavata Pur\u0101\u1e47a -- \u0926\u0947\u0935\u0940\u092d\u093e\u0917\u0935\u0924\u092a\u0941\u0930\u093e\u0923\n\n## Why This Text Is in the Bundle\n\nThe Dev\u012b-Bh\u0101gavata is Pur\u0101\u1e47ic \u015a\u0101ktism's systematic scripture: where the Dev\u012b M\u0101h\u0101tmya is the concentrated revelation, the Dev\u012b-Bh\u0101gavata is the full theological library: Dev\u012b as ultimate reality narrated, argued, and liturgized across twelve books. For this bundle it grounds: the Mah\u0101vidy\u0101 origin narrative (7.28, the Sat\u012b story cited in [dasha-mahavidya.md](../concepts/dasha-mahavidya.md)); the Dev\u012b G\u012bt\u0101 (book 7, chapters 31-40), in which Dev\u012b teaches j\u00f1\u0101na, bhakti, and her own non-dual nature in Bhagavad-G\u012bt\u0101-parallel form; and the sustained Pur\u0101\u1e47ic statement of the ultimacy claim carried by [devi.md](../concepts/devi.md) and [mahadevi.md](../concepts/mahadevi.md).\n\n## Use in This Bundle\n\n- [dasha-mahavidya.md](../concepts/dasha-mahavidya.md): 7.28 origin narrative\n- [devi.md](../concepts/devi.md) / [mahadevi.md](../concepts/mahadevi.md): systematic Pur\u0101\u1e47ic theology\n- Dev\u012b G\u012bt\u0101: the tradition's own bridge between \u015a\u0101kta theology and Ved\u0101ntic vocabulary (consume with upanishadic-core v0.6 warnings)\n\n## Editions\n\nSwami Vijnanananda's complete English translation (1921-23) is public domain (archive.org, \"Srimad Devi Bhagavatam\"); full text also accessible at wisdomlib.org. Sanskrit editions in standard Pur\u0101\u1e47a series.", "references/devi-mahatmya": "# Dev\u012b M\u0101h\u0101tmya -- \u0926\u0947\u0935\u0940\u092e\u093e\u0939\u093e\u0924\u094d\u092e\u094d\u092f (scoped re-reference)\n\n## Cross-Bundle Scope Note (read first)\n\nThis text is referenced in TWO bundles with different scopes, by design:\n\n- **cosmology-creation v0.7** (references/devi-mahatmya.md there, with markandeya-purana.md): owns the COSMOLOGICAL reading: \u015aakti's supremacy over s\u1e5b\u1e63\u1e6di-sthiti-sa\u1e43h\u0101ra, the \u015a\u0101kta alternative to the Trim\u016brti schema, Mah\u0101m\u0101y\u0101.\n- **shakta-darshana v0.8** (this file): owns the DAR\u015aANA reading: Mah\u0101dev\u012b theology as such, the ekaiv\u0101ha\u1e43 jagatyatra declaration (10.5, the one-Goddess doctrine), K\u0101l\u012b's emergence and demon-slaying function (ch. 7), and the text's liturgical life (Navar\u0101tri recitation, pairing with Dev\u012b S\u016bkta).\n\nAn AI citing this text should select the bundle whose scope matches the query; do not merge the two reference entries.\n\n## Use in This Bundle\n\n- [mahadevi.md](../concepts/mahadevi.md): 10.5 (ekaiv\u0101ha\u1e43) as the Mah\u0101dev\u012b doctrine's canonical verse\n- [devi.md](../concepts/devi.md): the revelation narrative (the gods' pooled splendor revealing, not creating, her)\n- [kali.md](../concepts/kali.md): chapter 7 (Ca\u1e47\u1e0da-Mu\u1e47\u1e0da, Raktab\u012bja) as the primary K\u0101l\u012b source\n- [shakti.md](../concepts/shakti.md): 1.74-78 as cited in v0.7, dar\u015bana-side reading\n\n## Editions\n\nWidely available; scholarly standard is Coburn's translation and study (Encountering the Goddess). Liturgical editions (Durg\u0101 Sapta\u015bat\u012b) are ubiquitous in devotional use.", "references/devi-sukta": "# Dev\u012b S\u016bkta (\u1e5ag Veda 10.125) -- \u0926\u0947\u0935\u0940\u0938\u0942\u0915\u094d\u0924\n\n**Attributed within the text to the \u1e5b\u1e63ik\u0101 V\u0101k \u0100mbh\u1e5b\u1e47\u012b: one of the \u1e5ag Veda's female seers, speaking in the first person as the Goddess herself.**\n\n## Why This Text Anchors the Bundle\n\nThe Dev\u012b S\u016bkta is the tradition's standing answer to the claim that Goddess-supremacy is late or non-Vedic: a ma\u1e47\u1e0dala-10 hymn in which V\u0101k declares (in first person) that she moves with the Rudras, Vasus, and \u0100dityas; that she is the queen (r\u0101\u1e63\u1e6dr\u012b) and gatherer of treasures; that whoever eats, sees, or breathes does so through her; that she bends Rudra's bow against the hater of sacred speech; and that she pervades heaven and earth, birthing the father on the summit of the world. \u015a\u0101kta tradition reads the hymn as Dev\u012b's own self-revelation, and it is recited to this day in Dev\u012b liturgy (commonly appended to Dev\u012b M\u0101h\u0101tmya recitation).\n\n## Use in This Bundle\n\n- [devi.md](../concepts/devi.md) and [shakti.md](../concepts/shakti.md): the Vedic ground of the ultimacy claim\n- [matrika.md](../concepts/matrika.md) and [mantra-shastra.md](../concepts/mantra-shastra.md): V\u0101k (the Word) as goddess is the seed of the entire sound-metaphysics lineage\n- Cross-bundle: joins v0.7's three \u1e5ag Vedic reference anchors (Puru\u1e63a, Hira\u1e47yagarbha, N\u0101sad\u012bya s\u016bktas) as the fourth Vedic pillar in OKF\n\n## Editions\n\nStandard \u1e5ag Veda editions and translations (Jamison-Brereton for current scholarship; Griffith public-domain for access). Verse numbering 10.125.1-8 is stable across editions.", "references/devi-upanishad": "# Dev\u012b Upani\u1e63ad -- \u0926\u0947\u0935\u0940 \u0909\u092a\u0928\u093f\u0937\u0926\u094d\n\n## Why This Text Is in the Bundle\n\nThe Dev\u012b Upani\u1e63ad opens with the gods approaching the Great Goddess and asking \"who are you, Mah\u0101dev\u012b?\"; her answer is the bundle's theology in miniature: aha\u1e43 brahmasvar\u016bpi\u1e47\u012b (\"I am essentially Brahman\"), from me arises the world as prak\u1e5bti and puru\u1e63a, I am void and non-void, I am the Vedas and what is other than them. The text then integrates her with the Ved\u0101ntic and Vedic frames (identifying her with the s\u016bkta lineage: it quotes and echoes Dev\u012b S\u016bkta motifs) and carries early \u015ar\u012b-Vidy\u0101 elements (b\u012bja references treated at the doctrinal level in this bundle's mantra files).\n\n## Use in This Bundle\n\n- [devi.md](../concepts/devi.md): the aham brahmasvar\u016bpi\u1e47\u012b citation, the ultimacy claim in Upani\u1e63adic form\n- [mahadevi.md](../concepts/mahadevi.md): the gods-asking-the-Goddess frame as Mah\u0101dev\u012b theology\n- Cross-bundle: bridges upanishadic-core (v0.6) vocabulary and this bundle; consume both bundles' warnings when this text is cited\n\n## Editions\n\nAvailable in standard \u015a\u0101kta Upani\u1e63ad collections (108 Upani\u1e63ads compilations; Adyar Library edition of the \u015a\u0101kta Upani\u1e63ads with Upani\u1e63ad-Brahmayogin's commentary).", "references/kularnava-tantra": "# Kul\u0101r\u1e47ava Tantra -- \u0915\u0941\u0932\u093e\u0930\u094d\u0923\u0935\u0924\u0928\u094d\u0924\u094d\u0930 (descriptive citation)\n\n## Scope Note (read first)\n\nThis reference is DESCRIPTIVE: it documents what the text is and which doctrinal frameworks this bundle cites it for. Ritual procedure is not documented, per bundle policy. The text is itself the bundle's best exemplar of why that policy mirrors the tradition: the Kul\u0101r\u1e47ava is famous equally for its left-current framework AND for its own severe warnings about unqualified practice, false gurus, and the misuse of exactly its material.\n\n## Why This Text Is in the Bundle\n\nThree frameworks cited here rest on it: (1) the guru-d\u012bk\u1e63\u0101 jurisprudence (its ull\u0101sas on the necessity, qualification, and testing of guru and \u015bi\u1e63ya are the classical statements; cross-bundle: guru.md, diksha.md in bhakti-marga v0.4); (2) the \u0101c\u0101ra classification ladder grounding [vamachara-dakshinachara.md](../concepts/vamachara-dakshinachara.md); (3) the regulated framing of the pa\u00f1ca-mak\u0101ra category ([pancha-makara.md](../concepts/pancha-makara.md)), where the text's own restriction-and-warning apparatus is the primary evidence against both the hedonism reading and the definitional inflation of the category.\n\n## Use in This Bundle\n\n- [tantra.md](../concepts/tantra.md): d\u012bk\u1e63\u0101 and restriction as definitional features of the tradition\n- [vamachara-dakshinachara.md](../concepts/vamachara-dakshinachara.md), [pancha-makara.md](../concepts/pancha-makara.md): the primary regulated-context source\n- [mantra-shastra.md](../concepts/mantra-shastra.md): mantra and d\u012bk\u1e63\u0101 chapters\n\n## Editions\n\nSanskrit editions with the Arthur Avalon-series introduction (Woodroffe's series printed the text); M. P. Pandit's English rendering of key portions is widely available. Reception caution: Avalon-series framing carries its era's lens (see the bundle's error-genealogy files).", "references/lalita-sahasranama": "# Lalit\u0101 Sahasran\u0101ma -- \u0932\u0932\u093f\u0924\u093e\u0938\u0939\u0938\u094d\u0930\u0928\u093e\u092e\n\n## Why This Text Is in the Bundle\n\nThe Lalit\u0101 Sahasran\u0101ma is theology compressed into liturgy: its thousand names systematically encode Tripurasundar\u012b's supremacy (names identifying her with Nirgu\u1e47a and Sagu\u1e47a Brahman alike), her cosmological functions, the \u015ar\u012b Cakra's architecture (names walking through the cakra's circuits), the subtle-body doctrine, and the tradition's philosophical positions, all in recitable form with Bh\u0101skarar\u0101ya's landmark commentary as its systematic unpacking. It is the standing demonstration that in \u015ar\u012b-Vidy\u0101 the PUBLIC layer is already doctrinally complete (see [srividya.md](../concepts/srividya.md) on public esotericism): the Sahasran\u0101ma is recited openly worldwide while the vidy\u0101 proper remains d\u012bk\u1e63\u0101-bound.\n\n## Use in This Bundle\n\n- [tripurasundari.md](../concepts/tripurasundari.md): names-as-theology for her entire profile\n- [srividya.md](../concepts/srividya.md): the public liturgical core exemplifying public esotericism\n- [sri-chakra.md](../concepts/sri-chakra.md): the names that traverse the cakra's structure\n\n## Editions\n\nSanskrit with Bh\u0101skarar\u0101ya's Saubh\u0101gya-bh\u0101skara commentary is the scholarly standard; multiple English translations exist (including widely used devotional editions). Recitation traditions are living and global.", "references/pratyabhijnahridayam": "# Pratyabhij\u00f1\u0101h\u1e5bdayam -- \u092a\u094d\u0930\u0924\u094d\u092f\u092d\u093f\u091c\u094d\u091e\u093e\u0939\u0943\u0926\u092f\u092e\u094d\n\n## Why This Text Is in the Bundle\n\nK\u1e63emar\u0101ja states his purpose in the opening: to condense the Pratyabhij\u00f1\u0101 system for those without capacity for its full dialectical apparatus. The result is the most teachable text in the tradition and the backbone of this bundle's Tier 3: s\u016btra 1 (citi\u1e25 svatantr\u0101 vi\u015bvasiddhihetu\u1e25) grounds [cit-shakti.md](../concepts/cit-shakti.md); s\u016btras 4-5 (citi's self-contraction as each knower) ground the ka\u00f1cuka-side of the architecture; s\u016btra 20 (the recognition's fruit) grounds [pratyabhijna.md](../concepts/pratyabhijna.md). The text is also the bundle's standing citation for consciousness-doctrine stated positively rather than by negation.\n\n## Use in This Bundle\n\n- [cit-shakti.md](../concepts/cit-shakti.md), [pratyabhijna.md](../concepts/pratyabhijna.md): primary source\n- [prakasha-vimarsha.md](../concepts/prakasha-vimarsha.md), [shaktipata.md](../concepts/shaktipata.md): commentarial context\n\n## Editions\n\nJaideva Singh, Pratyabhij\u00f1\u0101h\u1e5bdayam: The Secret of Self-Recognition (Motilal Banarsidass, 1980): Sanskrit text, translation, and notes; regarded as the best English introduction to the Pratyabhij\u00f1\u0101 philosophy.", "references/saundarya-lahari": "# Saundarya Lahar\u012b -- \u0938\u094c\u0928\u094d\u0926\u0930\u094d\u092f\u0932\u0939\u0930\u0940\n\n## Attribution Note (state both, adjudicate neither)\n\nTradition attributes the text to \u0100di \u015aa\u1e45kara, and the attribution matters theologically to the tradition (the great non-dualist singing \u015aakti's supremacy). Modern scholarship contests the attribution on stylistic and doctrinal-history grounds. Per bundle policy both positions are documented; neither is adjudicated. An AI citing this text should say \"traditionally attributed to \u015aa\u1e45kara\" rather than either bare \"by \u015aa\u1e45kara\" or bare \"falsely attributed.\"\n\n## Why This Text Is in the Bundle\n\nVerse 1 is the bundle's single most-quoted theological statement: \u015biva\u1e25 \u015bakty\u0101 yukto yadi bhavati \u015bakta\u1e25 prabhavitum -- \"\u015aiva, only when united with \u015aakti, has the power to act; without her, the god cannot even stir.\" It grounds [shiva-shakti.md](../concepts/shiva-shakti.md) and [shakti.md](../concepts/shakti.md). Verse 11 gives the classical verse-specification of the \u015ar\u012b Cakra's geometry ([sri-chakra.md](../concepts/sri-chakra.md)). Throughout, the text demonstrates the register [tripurasundari.md](../concepts/tripurasundari.md) documents: beauty as metaphysics, devotional poetry carrying precise doctrine.\n\n## Editions\n\nNumerous editions and translations; the K\u0101\u00f1c\u012b ma\u1e6dha-associated publications (e.g., kamakoti.org's Quintessence of Soundarya Lahari) represent the living tradition's reading; academic editions discuss the attribution question.", "references/shatchakranirupana": "# \u1e62a\u1e6dcakranir\u016bpa\u1e47a -- \u0937\u091f\u094d\u091a\u0915\u094d\u0930\u0928\u093f\u0930\u0942\u092a\u0923\n\n## Why This Text Is in the Bundle (double duty)\n\n**As doctrine:** the \u1e62a\u1e6dcakranir\u016bpa\u1e47a is the primary source of the six-cakra scheme documented in [chakra-tantra.md](../concepts/chakra-tantra.md): each cakra with its lotus-petal count carrying m\u0101t\u1e5bk\u0101 phonemes ([matrika.md](../concepts/matrika.md)), its b\u012bja, its tattva, and its deities, within the ku\u1e47\u1e0dalin\u012b-ascent frame ([kundalini.md](../concepts/kundalini.md)).\n\n**As error-genealogy exhibit:** this is the text Arthur Avalon (Sir John Woodroffe) translated in The Serpent Power (1919), the single most consequential event in the Western reception of chakra and ku\u1e47\u1e0dalin\u012b doctrine. The translation's flaws, its enormous influence (Jung's 1932 seminars, Campbell, and downstream popular literature), and the subsequent Theosophical overlay (Leadbeater's colors and psychology) produced the modern \"chakra system\" documented as distortion in this bundle's Tier 1. Citing the actual text is the strongest possible correction: the error genealogy points back to its own primary source, and the difference between the text and its popular descendant is visible on inspection (the text has phonemes and deities where the poster has colors and emotions).\n\n## Use in This Bundle\n\n- [chakra-tantra.md](../concepts/chakra-tantra.md), [kundalini.md](../concepts/kundalini.md): primary source AND genealogy anchor\n- [bindu.md](../concepts/bindu.md), [matrika.md](../concepts/matrika.md), [mantra-shastra.md](../concepts/mantra-shastra.md): b\u012bja and phoneme placements\n\n## Editions\n\nSanskrit in the Avalon series (with the 1919 translation as historical artifact); modern scholarly discussions of the text and its translation history are the corrective layer. This bundle's rule: cite the text's content from the Sanskrit tradition's own commentarial line, cite The Serpent Power as reception history.\n\n## Error Genealogy\n\nThis reference is the primary source through which a documented mistranslation chain runs: P\u016br\u1e47\u0101nanda's \u1e62a\u1e6dcakranir\u016bpa\u1e47a (16th c.) entered English through Arthur Avalon's *The Serpent Power* (1919), whose flawed rendering seeded the modern \"kundalini energy\" vocabulary (\u2192 Jung 1932 \u2192 human-potential movement \u2192 New Age). See [G1 \u2014 Ku\u1e47\u1e0dalin\u012b and the Serpent Power lineage](../../../GENEALOGIES.md) in the repository root for the full chain and sources.", "references/spanda-karikas": "# Spanda K\u0101rik\u0101s -- \u0938\u094d\u092a\u0928\u094d\u0926\u0915\u093e\u0930\u093f\u0915\u093e\n\n## Why This Text Is in the Bundle\n\nThe Spanda K\u0101rik\u0101s give this bundle's [spanda.md](../concepts/spanda.md) its textual ground: verses 1.1-2 open with the Lord whose opening and closing (unme\u1e63a-nime\u1e63a) is the arising and dissolving of worlds; verse 1.22 locates the pulse's naked availability in extreme states (fury, joy, terror, flight), the passage that most directly falsifies the \"high vibration\" wellness reading; and the collection as a whole articulates the dynamism that distinguishes Trika's absolute from any actionless ultimate (see [shiva-shakti.md](../concepts/shiva-shakti.md)).\n\nAttribution is dual in the tradition itself (Vasugupta, receiver of the \u015aiva S\u016btras, or his disciple Kalla\u1e6da); both positions are documented, neither adjudicated.\n\n## Use in This Bundle\n\n- [spanda.md](../concepts/spanda.md): primary source throughout\n- [prakasha-vimarsha.md](../concepts/prakasha-vimarsha.md), [cit-shakti.md](../concepts/cit-shakti.md): the dynamism doctrine in verse form\n\n## Editions\n\nJaideva Singh's Spanda-K\u0101rik\u0101s: The Divine Creative Pulsation (Motilal Banarsidass) is the standard scholarly-accessible edition: Devan\u0101gar\u012b and roman text, translation, and K\u1e63emar\u0101ja's Spanda-nir\u1e47aya commentary translated in full.", "references/tantraloka": "# Tantr\u0101loka -- \u0924\u0928\u094d\u0924\u094d\u0930\u093e\u0932\u094b\u0915 (structural citation)\n\n## Scope Note (read first)\n\nPer the bundle's concept-lock, the Tantr\u0101loka is cited STRUCTURALLY: for what the work is, how it organizes the tradition, and the doctrinal positions this bundle's concepts cite (the nine grades of \u015baktip\u0101ta in \u0101hnika 13; the tattva analyses; the mantra and m\u0101t\u1e5bk\u0101 doctrine; the \u0101c\u0101ra jurisprudence). Its ritual procedure and initiatory content are out of scope here, consistent with the bundle's adhik\u0101ra policy, and the full Trika system it expounds is reserved for a possible future bundle.\n\n## Why This Text Is in the Bundle\n\nAbhinavagupta's Tantr\u0101loka is the tradition's own synthesis: the point where the \u0101gamic corpus, the Spanda and Pratyabhij\u00f1\u0101 doctrines, and the Kaula currents are integrated into one systematic whole. For this bundle it serves as the doctrinal source of record for [shaktipata.md](../concepts/shaktipata.md) (the nine grades), the 36-tattva architecture ([shattrimshat-tattva.md](../concepts/shattrimshat-tattva.md), [kanchuka.md](../concepts/kanchuka.md), [maya-shakta.md](../concepts/maya-shakta.md)), and the definitional material behind [tantra.md](../concepts/tantra.md) and [mantra-shastra.md](../concepts/mantra-shastra.md).\n\n## Editions\n\nSanskrit with Jayaratha's Viveka in the Kashmir Series of Texts and Studies; complete Italian translation (Gnoli); English translations of portions exist, with a complete critical English translation a known desideratum in the field.", "references/tripura-rahasya": "# Tripur\u0101 Rahasya -- \u0924\u094d\u0930\u093f\u092a\u0941\u0930\u093e\u0930\u0939\u0938\u094d\u092f\n\n## Why This Text Is in the Bundle\n\nThe Tripur\u0101 Rahasya breaks the stereotype that \u015a\u0101kta tradition is ritual-only: its J\u00f1\u0101na Kha\u1e47\u1e0da is a sustained philosophical work in which the ultimate, named as the Goddess Tripur\u0101 (see [tripurasundari.md](../concepts/tripurasundari.md)), is taught as pure consciousness, and liberation as recognition of it, through dialogue (Datt\u0101treya to Para\u015bur\u0101ma) and celebrated teaching narratives (the story of Hemalekh\u0101, who leads her prince to self-inquiry, is the text's most famous vehicle: notably, a woman as the j\u00f1\u0101na-teacher). Its consciousness-doctrine converges with the Pratyabhij\u00f1\u0101 register documented in this bundle's Tier 3 ([cit-shakti.md](../concepts/cit-shakti.md), [pratyabhijna.md](../concepts/pratyabhijna.md)) while remaining a devotionally \u015a\u0101kta text.\n\n## Use in This Bundle\n\n- [tripurasundari.md](../concepts/tripurasundari.md): her j\u00f1\u0101na register\n- [cit-shakti.md](../concepts/cit-shakti.md), [pratyabhijna.md](../concepts/pratyabhijna.md): \u015a\u0101kta-native consciousness doctrine converging with Trika analysis\n- Bundle posture: evidence that \"\u015a\u0101kta = ritual, Ved\u0101nta = philosophy\" is a false division\n\n## Editions\n\nEnglish translation by Swami Sri Ramanananda Saraswathi (published through Sri Ramanasramam; the text was repeatedly recommended by Ramana Maharshi) is the accessible standard; Sanskrit editions in \u015a\u0101kta text series."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
