<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = "sankhya-darshana";
window.BUNDLE = {"nodes": [{"data": {"id": "concepts/anumana-samkhya", "label": "Anum\u0101na (S\u0101\u1e43khya)", "type": "Concept", "description": "Inference as Samkhya treats it -- brief, school-scoped pointer noting Samkhya's specific classification of inference types, the FOURTH cross-bundle referent for this term after vedanta-epistemology (v0.3, Advaita), nyaya-vaisheshika (v0.9, the lead technical treatment), and Samkhya's own use of inference to argue for the unmanifest (avyakta) and purusha's existence.", "resource": "", "tags": ["anumana", "inference", "samkhya", "epistemology"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/avidya-samkhya", "label": "Avidy\u0101 (S\u0101\u1e43khya)", "type": "Concept", "description": "Non-discrimination -- the specifically Samkhya sense of ignorance: the failure to distinguish purusha from prakriti (especially from buddhi), the root cause of bondage. SCHOOL-SCOPED against upanishadic-core's avidya (v0.6), which operates within a non-dual, single-Self framework rather than Samkhya's dualist one.", "resource": "", "tags": ["avidya", "ignorance", "samkhya", "bondage"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/bandha-samkhya", "label": "Bandha (S\u0101\u1e43khya)", "type": "Concept", "description": "Bondage -- the apparent (not literal) condition of purusha appearing entangled in prakriti's activity due to non-discrimination, NOT a real change undergone by purusha itself, and NOT a punitive or moral state.", "resource": "", "tags": ["bandha", "bondage", "samkhya", "avidya"], "color": "#f59e0b", "size": 34}}, {"data": {"id": "concepts/guna-samkhya", "label": "Gu\u1e47a (S\u0101\u1e43khya)", "type": "Concept", "description": "The three constituent strands of prakriti -- sattva, rajas, tamas -- whose dynamic equilibrium and disturbance constitute all of manifest reality. This is guna's DOCTRINAL SOURCE: the term appears downstream, as an applied or cross-referenced concept, in bhakti-marga (v0.4), cosmology-creation (v0.7), nyaya-vaisheshika (v0.9, an unrelated ontological sense), and ayurveda-consciousness (v0.11). This file is the origin point, not another peer usage.", "resource": "", "tags": ["guna", "triguna", "samkhya", "sattva", "rajas", "tamas"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/kaivalya-samkhya", "label": "Kaivalya (S\u0101\u1e43khya)", "type": "Concept", "description": "Absolute isolation of purusha from prakriti -- Samkhya's term for final liberation, SCHOOL-SCOPED against yoga-darshana's already-published kaivalya (v0.2): same word, same general sense (isolation/aloneness), but reached by a different method (viveka-khyati here vs. nirodha there) and without any Ishvara-inclusive framing.", "resource": "", "tags": ["kaivalya", "liberation", "samkhya", "isolation"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/kapila", "label": "Kapila", "type": "Concept", "description": "The traditional founder-sage of the Samkhya school -- a semi-legendary figure credited with the earliest systematization of Samkhya doctrine, distinct from any deity or avatara named Kapila in Puranic literature.", "resource": "", "tags": ["kapila", "founder", "samkhya", "history"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/nirishvara", "label": "Nir\u012b\u015bvara", "type": "Concept", "description": "Without-Ishvara -- classical Samkhya's atheistic stance: no creator deity is philosophically required or admitted, argued textually at Samkhya-Pravacana-Sutra 1.92 ('Ishvara is unproved'). This is the PRIMARY framing for this bundle; Sesvara (theistic) Samkhya is a distinct, later-associated strand, named-and-deferred (see sesvara-samkhya.md).", "resource": "", "tags": ["nirishvara", "atheism", "samkhya", "ishvara"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/parinamavada", "label": "Pari\u1e47\u0101mav\u0101da", "type": "Concept", "description": "The specific mechanism by which satkaryavada operates: real transformation of the cause into the effect (not mere appearance) -- distinguished from Advaita Vedanta's vivartavada (v0.3), where the effect is an apparent, not a real, transformation of the cause.", "resource": "", "tags": ["parinamavada", "transformation", "samkhya", "causation"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/prakriti", "label": "Prak\u1e5bti", "type": "Concept", "description": "Primordial, unconscious, ever-active matter/nature -- the sole material cause of the entire manifest world, NOT 'Nature' in a modern ecological sense, and NOT the same prakriti already gestured at in dharma-foundation (v0.1) as a loose synonym for 'nature'; here it is a precise metaphysical category with two named phases, avyakta (unmanifest) and vyakta (manifest).", "resource": "", "tags": ["prakriti", "matter", "samkhya", "dualism", "cause"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/pramana-samkhya", "label": "Pram\u0101\u1e47a (S\u0101\u1e43khya)", "type": "Concept", "description": "Samkhya's three-pramana epistemology -- pratyaksha (perception), anumana (inference), and shabda/aptavachana (verbal testimony) -- SCHOOL-SCOPED as the third referent after vedanta-epistemology's Advaita pramanas (v0.3) and nyaya-vaisheshika's Nyaya pramanas (v0.9). Same functional category, different school-specific enumeration and epistemic weighting.", "resource": "", "tags": ["pramana", "epistemology", "samkhya", "knowledge"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/purusha", "label": "Puru\u1e63a", "type": "Concept", "description": "Pure, inactive consciousness -- the passive witness-principle of S\u0101\u1e43khya, explicitly PLURAL (countless individual puru\u1e63as, no hierarchy among them) and NOT the same as Ved\u0101ntic \u0101tman/brahman, NOT a soul that acts, NOT Vai\u015be\u1e63ika \u0101tman (which is a substance bearing qualities).", "resource": "", "tags": ["purusha", "consciousness", "samkhya", "dualism", "witness"], "color": "#f59e0b", "size": 37}}, {"data": {"id": "concepts/rajas", "label": "Rajas", "type": "Concept", "description": "The guna of activity, motion, and restlessness -- the constituent responsible for change and effort in prakriti, paired here with sattva; tamas is treated within guna-samkhya's body rather than as a fourth standalone file, keeping this tier tight per the concept-lock's distinctiveness discipline.", "resource": "", "tags": ["rajas", "guna", "samkhya", "activity"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/samkhya-as-enumeration", "label": "S\u0101\u1e43khya (as Enumeration)", "type": "Concept", "description": "The school's own self-naming logic -- 'samkhya' means enumeration/counting, referring to the school's method of exhaustively enumerating the tattvas (categories of reality) as the path to discriminative knowledge. This concept treats the METHOD of enumeration, not the tattva ladder's content itself (already published elsewhere).", "resource": "", "tags": ["samkhya", "enumeration", "method", "tattva"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/samkhya-karika", "label": "S\u0101\u1e43khya-K\u0101rik\u0101 (as concept)", "type": "Concept", "description": "The primary text of classical Samkhya -- 72 teaching stanzas by Isvarakrishna (c. 4th-5th century CE), treated here as an index-anchor concept naming the text's role and structure, complementary to its full Reference entry.", "resource": "", "tags": ["samkhya-karika", "text", "isvarakrishna", "primary-source"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/samkhya-pravacana-sutra", "label": "S\u0101\u1e43khya-Pravacana-S\u016btra (as concept)", "type": "Concept", "description": "The secondary sutra-collection text grounding Samkhya's nirishvara doctrine explicitly (1.92, 'Ishvara is unproved') -- a later compilation attributed to the Kapila tradition, treated here as an index-anchor concept, complementary to its full Reference entry.", "resource": "", "tags": ["samkhya-pravacana-sutra", "text", "kapila", "primary-source"], "color": "#f59e0b", "size": 34}}, {"data": {"id": "concepts/satkaryavada", "label": "Satk\u0101ryav\u0101da", "type": "Concept", "description": "The doctrine that the effect pre-exists, latently, in its material cause -- the signature Samkhya causal theory (shared in modified form by Yoga and Vedanta), directly OPPOSED to Nyaya-Vaisheshika's asatkaryavada/arambhavada (v0.9), which holds the effect is a wholly new entity.", "resource": "", "tags": ["satkaryavada", "causation", "samkhya", "epistemology", "metaphysics"], "color": "#f59e0b", "size": 36}}, {"data": {"id": "concepts/sattva", "label": "Sattva", "type": "Concept", "description": "The guna of lucidity, clarity, and manifestation -- one of the three constituent strands of prakriti, NOT a synonym for 'goodness' in a simple moral sense, and NOT the same word as sattva/sat meaning 'existence' or 'being' used elsewhere in the corpus.", "resource": "", "tags": ["sattva", "guna", "samkhya", "lucidity"], "color": "#f59e0b", "size": 34}}, {"data": {"id": "concepts/sesvara-samkhya", "label": "Se\u015bvara S\u0101\u1e43khya", "type": "Concept", "description": "Theistic Samkhya -- a distinct, less prominent historical strand that incorporates Ishvara as an ideal Purusha to emulate (not a creator), named-and-deferred here as a future-bundle pointer (following the v0.9 Navya-Nyaya precedent) rather than given full treatment, to keep this bundle's primary nirishvara framing clean.", "resource": "", "tags": ["sesvara", "samkhya", "theism", "history", "deferred"], "color": "#f59e0b", "size": 39}}, {"data": {"id": "concepts/viveka-khyati", "label": "Viveka-Khy\u0101ti", "type": "Concept", "description": "Discriminative knowledge -- the specifically Samkhya METHOD of liberation: intellectual discernment of purusha's absolute distinctness from prakriti (including buddhi, ahamkara, manas). NOT the same method as Yoga's path via nirodha (cessation of mental modifications through the eight limbs) -- same end-state word (kaivalya), different method.", "resource": "", "tags": ["viveka-khyati", "discernment", "samkhya", "liberation", "method"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "concepts/vyakta-avyakta", "label": "Vyakta-Avyakta", "type": "Concept", "description": "The two phases of prakriti -- avyakta, the unmanifest root-state of guna-equilibrium, and vyakta, the manifest, differentiated world -- named here as the minimal structural concept needed to state prakriti's causal role, NOT a restatement of the full 24-tattva evolution sequence (already published across yoga-darshana v0.2, cosmology-creation v0.7, and ayurveda-consciousness v0.11).", "resource": "", "tags": ["vyakta", "avyakta", "samkhya", "manifestation", "tattva"], "color": "#f59e0b", "size": 35}}, {"data": {"id": "references/bhagavad-gita-ch13", "label": "Bhagavad G\u012bt\u0101, Chapter 13 (K\u1e63etra-K\u1e63etraj\u00f1a)", "type": "Reference", "description": "The Gita's chapter on the Field (kshetra, prakriti's domain) and the Knower of the Field (kshetrajna, purusha), a well-known cross-traditional parallel to Samkhya's purusha-prakriti dualism, cited here as a secondary, non-Samkhya-specific anchor illustrating the dualism's wider resonance in the corpus -- not treated as a Samkhya-school primary text.", "resource": "", "tags": ["reference", "bhagavad-gita", "kshetra-kshetrajna", "secondary-parallel"], "color": "#10b981", "size": 31}}, {"data": {"id": "references/gaudapada-bhashya", "label": "Gau\u1e0dap\u0101da-Bh\u0101\u1e63ya (on the S\u0101\u1e43khya-K\u0101rik\u0101)", "type": "Reference", "description": "An early commentary on the Samkhya-Karika attributed to Gaudapada, providing verse-by-verse elaboration used to ground the interpretation of purusha's plurality and the guna apparatus in this bundle.", "resource": "", "tags": ["reference", "gaudapada-bhashya", "commentary", "samkhya-karika"], "color": "#10b981", "size": 31}}, {"data": {"id": "references/samkhya-karika", "label": "S\u0101\u1e43khya-K\u0101rik\u0101", "type": "Reference", "description": "The foundational extant systematic text of classical Samkhya, composed by Isvarakrishna circa the 4th-5th century CE. Its 72 teaching stanzas state the satkaryavada argument (Karika 9), the 25-tattva structure with purusha's plurality, the triguna apparatus, and the viveka-khyati path to kaivalya. This bundle's primary textual anchor for purusha, prakriti, satkaryavada, parinamavada, vyakta-avyakta, guna-samkhya, sattva, rajas, viveka-khyati, kaivalya-samkhya, avidya-samkhya, bandha-samkhya, pramana-samkhya, anumana-samkhya, and samkhya-as-enumeration.", "resource": "", "tags": ["reference", "samkhya-karika", "isvarakrishna", "primary-text"], "color": "#10b981", "size": 32}}, {"data": {"id": "references/samkhya-pravacana-sutra", "label": "S\u0101\u1e43khya-Pravacana-S\u016btra", "type": "Reference", "description": "A sutra-format collection attributed to the Kapila tradition of Samkhya, extant as a later compilation. Verse 1.92 states directly that Ishvara is unproved, anchoring classical Samkhya's nirishvara doctrine. This bundle's secondary textual anchor for nirishvara, sesvara-samkhya, and kapila.", "resource": "", "tags": ["reference", "samkhya-pravacana-sutra", "kapila", "primary-text"], "color": "#10b981", "size": 31}}, {"data": {"id": "references/samkhya-tattva-kaumudi", "label": "S\u0101\u1e43khya-Tattva-Kaumud\u012b", "type": "Reference", "description": "Vachaspati Mishra's influential commentary on the Samkhya-Karika, a major secondary elaboration of classical Samkhya doctrine widely used to clarify Isvarakrishna's compact verses, including the causal arguments underlying satkaryavada and the structure of prakriti's avyakta phase.", "resource": "", "tags": ["reference", "samkhya-tattva-kaumudi", "vachaspati-mishra", "commentary"], "color": "#10b981", "size": 31}}, {"data": {"id": "references/tattva-samasa", "label": "Tattva-Sam\u0101sa", "type": "Reference", "description": "A very short, aphoristic Samkhya text enumerating the tattvas in condensed form, sometimes considered an even earlier or parallel systematization to the Samkhya-Karika. Referenced here as supporting background for the samkhya-as-enumeration concept's discussion of the school's enumerative method.", "resource": "", "tags": ["reference", "tattva-samasa", "primary-text", "enumeration"], "color": "#10b981", "size": 31}}, {"data": {"id": "references/yuktidipika", "label": "Yuktid\u012bpik\u0101", "type": "Reference", "description": "An anonymous, philosophically rich early commentary on the Samkhya-Karika, valued for its detailed engagement with rival schools' objections to Samkhya's causal and epistemological positions, useful background for this bundle's satkaryavada and pramana-samkhya treatments.", "resource": "", "tags": ["reference", "yuktidipika", "commentary", "samkhya-karika"], "color": "#10b981", "size": 31}}], "edges": [{"data": {"id": "concepts/anumana-samkhya__references/samkhya-karika", "source": "concepts/anumana-samkhya", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/anumana-samkhya__concepts/pramana-samkhya", "source": "concepts/anumana-samkhya", "target": "concepts/pramana-samkhya"}}, {"data": {"id": "concepts/anumana-samkhya__concepts/purusha", "source": "concepts/anumana-samkhya", "target": "concepts/purusha"}}, {"data": {"id": "concepts/avidya-samkhya__references/samkhya-karika", "source": "concepts/avidya-samkhya", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/avidya-samkhya__concepts/viveka-khyati", "source": "concepts/avidya-samkhya", "target": "concepts/viveka-khyati"}}, {"data": {"id": "concepts/avidya-samkhya__concepts/bandha-samkhya", "source": "concepts/avidya-samkhya", "target": "concepts/bandha-samkhya"}}, {"data": {"id": "concepts/bandha-samkhya__references/samkhya-karika", "source": "concepts/bandha-samkhya", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/bandha-samkhya__concepts/avidya-samkhya", "source": "concepts/bandha-samkhya", "target": "concepts/avidya-samkhya"}}, {"data": {"id": "concepts/bandha-samkhya__concepts/viveka-khyati", "source": "concepts/bandha-samkhya", "target": "concepts/viveka-khyati"}}, {"data": {"id": "concepts/guna-samkhya__references/samkhya-karika", "source": "concepts/guna-samkhya", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/guna-samkhya__concepts/prakriti", "source": "concepts/guna-samkhya", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/guna-samkhya__concepts/sattva", "source": "concepts/guna-samkhya", "target": "concepts/sattva"}}, {"data": {"id": "concepts/guna-samkhya__concepts/rajas", "source": "concepts/guna-samkhya", "target": "concepts/rajas"}}, {"data": {"id": "concepts/kaivalya-samkhya__references/samkhya-karika", "source": "concepts/kaivalya-samkhya", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/kaivalya-samkhya__concepts/viveka-khyati", "source": "concepts/kaivalya-samkhya", "target": "concepts/viveka-khyati"}}, {"data": {"id": "concepts/kaivalya-samkhya__concepts/purusha", "source": "concepts/kaivalya-samkhya", "target": "concepts/purusha"}}, {"data": {"id": "concepts/kaivalya-samkhya__concepts/nirishvara", "source": "concepts/kaivalya-samkhya", "target": "concepts/nirishvara"}}, {"data": {"id": "concepts/kapila__references/samkhya-pravacana-sutra", "source": "concepts/kapila", "target": "references/samkhya-pravacana-sutra"}}, {"data": {"id": "concepts/kapila__concepts/samkhya-as-enumeration", "source": "concepts/kapila", "target": "concepts/samkhya-as-enumeration"}}, {"data": {"id": "concepts/kapila__concepts/samkhya-pravacana-sutra", "source": "concepts/kapila", "target": "concepts/samkhya-pravacana-sutra"}}, {"data": {"id": "concepts/nirishvara__references/samkhya-pravacana-sutra", "source": "concepts/nirishvara", "target": "references/samkhya-pravacana-sutra"}}, {"data": {"id": "concepts/nirishvara__concepts/purusha", "source": "concepts/nirishvara", "target": "concepts/purusha"}}, {"data": {"id": "concepts/nirishvara__concepts/sesvara-samkhya", "source": "concepts/nirishvara", "target": "concepts/sesvara-samkhya"}}, {"data": {"id": "concepts/nirishvara__concepts/samkhya-pravacana-sutra", "source": "concepts/nirishvara", "target": "concepts/samkhya-pravacana-sutra"}}, {"data": {"id": "concepts/parinamavada__references/samkhya-karika", "source": "concepts/parinamavada", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/parinamavada__concepts/satkaryavada", "source": "concepts/parinamavada", "target": "concepts/satkaryavada"}}, {"data": {"id": "concepts/parinamavada__concepts/prakriti", "source": "concepts/parinamavada", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/prakriti__references/samkhya-karika", "source": "concepts/prakriti", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/prakriti__references/samkhya-tattva-kaumudi", "source": "concepts/prakriti", "target": "references/samkhya-tattva-kaumudi"}}, {"data": {"id": "concepts/prakriti__concepts/purusha", "source": "concepts/prakriti", "target": "concepts/purusha"}}, {"data": {"id": "concepts/prakriti__concepts/vyakta-avyakta", "source": "concepts/prakriti", "target": "concepts/vyakta-avyakta"}}, {"data": {"id": "concepts/prakriti__concepts/guna-samkhya", "source": "concepts/prakriti", "target": "concepts/guna-samkhya"}}, {"data": {"id": "concepts/prakriti__concepts/satkaryavada", "source": "concepts/prakriti", "target": "concepts/satkaryavada"}}, {"data": {"id": "concepts/pramana-samkhya__references/samkhya-karika", "source": "concepts/pramana-samkhya", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/pramana-samkhya__concepts/anumana-samkhya", "source": "concepts/pramana-samkhya", "target": "concepts/anumana-samkhya"}}, {"data": {"id": "concepts/pramana-samkhya__concepts/satkaryavada", "source": "concepts/pramana-samkhya", "target": "concepts/satkaryavada"}}, {"data": {"id": "concepts/purusha__references/samkhya-karika", "source": "concepts/purusha", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/purusha__references/samkhya-pravacana-sutra", "source": "concepts/purusha", "target": "references/samkhya-pravacana-sutra"}}, {"data": {"id": "concepts/purusha__concepts/prakriti", "source": "concepts/purusha", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/purusha__concepts/viveka-khyati", "source": "concepts/purusha", "target": "concepts/viveka-khyati"}}, {"data": {"id": "concepts/purusha__concepts/kaivalya-samkhya", "source": "concepts/purusha", "target": "concepts/kaivalya-samkhya"}}, {"data": {"id": "concepts/rajas__references/samkhya-karika", "source": "concepts/rajas", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/rajas__concepts/guna-samkhya", "source": "concepts/rajas", "target": "concepts/guna-samkhya"}}, {"data": {"id": "concepts/rajas__concepts/sattva", "source": "concepts/rajas", "target": "concepts/sattva"}}, {"data": {"id": "concepts/samkhya-as-enumeration__references/samkhya-karika", "source": "concepts/samkhya-as-enumeration", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/samkhya-as-enumeration__concepts/kapila", "source": "concepts/samkhya-as-enumeration", "target": "concepts/kapila"}}, {"data": {"id": "concepts/samkhya-as-enumeration__concepts/vyakta-avyakta", "source": "concepts/samkhya-as-enumeration", "target": "concepts/vyakta-avyakta"}}, {"data": {"id": "concepts/samkhya-karika__references/samkhya-karika", "source": "concepts/samkhya-karika", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/samkhya-karika__concepts/kapila", "source": "concepts/samkhya-karika", "target": "concepts/kapila"}}, {"data": {"id": "concepts/samkhya-karika__concepts/satkaryavada", "source": "concepts/samkhya-karika", "target": "concepts/satkaryavada"}}, {"data": {"id": "concepts/samkhya-pravacana-sutra__references/samkhya-pravacana-sutra", "source": "concepts/samkhya-pravacana-sutra", "target": "references/samkhya-pravacana-sutra"}}, {"data": {"id": "concepts/samkhya-pravacana-sutra__concepts/nirishvara", "source": "concepts/samkhya-pravacana-sutra", "target": "concepts/nirishvara"}}, {"data": {"id": "concepts/samkhya-pravacana-sutra__concepts/kapila", "source": "concepts/samkhya-pravacana-sutra", "target": "concepts/kapila"}}, {"data": {"id": "concepts/satkaryavada__references/samkhya-karika", "source": "concepts/satkaryavada", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/satkaryavada__concepts/parinamavada", "source": "concepts/satkaryavada", "target": "concepts/parinamavada"}}, {"data": {"id": "concepts/satkaryavada__concepts/prakriti", "source": "concepts/satkaryavada", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/sattva__references/samkhya-karika", "source": "concepts/sattva", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/sattva__concepts/guna-samkhya", "source": "concepts/sattva", "target": "concepts/guna-samkhya"}}, {"data": {"id": "concepts/sattva__concepts/rajas", "source": "concepts/sattva", "target": "concepts/rajas"}}, {"data": {"id": "concepts/sesvara-samkhya__concepts/nirishvara", "source": "concepts/sesvara-samkhya", "target": "concepts/nirishvara"}}, {"data": {"id": "concepts/viveka-khyati__references/samkhya-karika", "source": "concepts/viveka-khyati", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/viveka-khyati__concepts/purusha", "source": "concepts/viveka-khyati", "target": "concepts/purusha"}}, {"data": {"id": "concepts/viveka-khyati__concepts/kaivalya-samkhya", "source": "concepts/viveka-khyati", "target": "concepts/kaivalya-samkhya"}}, {"data": {"id": "concepts/viveka-khyati__concepts/avidya-samkhya", "source": "concepts/viveka-khyati", "target": "concepts/avidya-samkhya"}}, {"data": {"id": "concepts/vyakta-avyakta__references/samkhya-karika", "source": "concepts/vyakta-avyakta", "target": "references/samkhya-karika"}}, {"data": {"id": "concepts/vyakta-avyakta__concepts/prakriti", "source": "concepts/vyakta-avyakta", "target": "concepts/prakriti"}}, {"data": {"id": "concepts/vyakta-avyakta__concepts/satkaryavada", "source": "concepts/vyakta-avyakta", "target": "concepts/satkaryavada"}}], "bodies": {"concepts/anumana-samkhya": "# Anum\u0101na (S\u0101\u1e43khya) -- \u0905\u0928\u0941\u092e\u093e\u0928\n\n**Not:** the Nyaya five-membered syllogism apparatus (v0.9)\n\n## What It Actually Means\n\nS\u0101\u1e43khya's use of anum\u0101na is principally argumentative rather than logically elaborated: it is the tool used to establish the existence of things not directly perceivable -- the unmanifest root-cause (avyakta) inferred from its manifest effects, and puru\u1e63a inferred from the very fact that prak\u1e5bti's activity requires a witness for whose sake it operates. This is a leaner, more applied treatment of inference than Nyaya's formal apparatus.\n\n## Audience Metaphor\n\nS\u0101\u1e43khya uses inference the way a detective uses a single decisive clue to establish that an unseen party must exist, rather than building an entire forensic laboratory around the method itself -- the laboratory is Nyaya's job (v0.9); S\u0101\u1e43khya just needs the one solid inference to make its case.\n\n## Citations\n\n1. Samkhya-Karika 6-8 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle pointer: for the developed technical apparatus, see nyaya-vaisheshika v0.9's anumana.md (the lead treatment); this is the fourth, briefest cross-bundle referent after v0.3 and v0.9", "concepts/avidya-samkhya": "# Avidy\u0101 (S\u0101\u1e43khya) -- \u0905\u0935\u093f\u0926\u094d\u092f\u093e\n\n**Not:** ignorance of Brahman (upanishadic-core v0.6 sense)\n\n## What It Actually Means\n\nAvidy\u0101, in S\u0101\u1e43khya, is specifically the failure of discrimination between puru\u1e63a and prak\u1e5bti: mistaking buddhi's reflected consciousness, or any product of prak\u1e5bti, for puru\u1e63a itself. This is not a general cognitive error or a moral failing; it is a precise metaphysical confusion, and its precise remedy (viveka-khy\u0101ti) is equally exact -- discriminate correctly, and avidy\u0101's grip ends immediately, without further steps.\n\n## Audience Metaphor\n\nSamkhya avidy\u0101 is like a control-panel operator who forgets they are the operator and starts believing they are the machine's own readouts -- the fix is not to shut the machine down, but for the operator to remember, with total clarity, that they were never the readout at all.\n\n## Citations\n\n1. Samkhya-Karika 63-64 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle warning: avidya in upanishadic-core v0.6 operates within a non-dual framework -- a structurally different error from this dualist sense", "concepts/bandha-samkhya": "# Bandha (S\u0101\u1e43khya) -- \u092c\u0928\u094d\u0927\n\n**Not:** a real change or affliction undergone by purusha, moral punishment or sin\n\n## What It Actually Means\n\nBandha names the condition, from within confused buddhi, of appearing entangled in prak\u1e5bti's experiences and changes -- pleasure, pain, effort, memory -- as though puru\u1e63a itself were the one undergoing them. Because puru\u1e63a cannot actually change, this bondage is, strictly, buddhi's own confusion about whose experience it is reflecting, sustained only as long as viveka-khy\u0101ti has not yet arisen.\n\n## Audience Metaphor\n\nBandha is like a monitor displaying an error and the technician mistakenly believing the error is happening to them personally -- nothing has actually gone wrong with the technician; the confusion clears the instant they remember they are reading a display, not living inside it.\n\n## Citations\n\n1. Samkhya-Karika 62 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)", "concepts/guna-samkhya": "# Gu\u1e47a (S\u0101\u1e43khya) -- \u0917\u0941\u0923\n\n**Not:** the Vaisheshika padartha sense of guna (v0.9), a moral or virtue framework\n\n## What It Actually Means\n\nThe three gu\u1e47as -- sattva (lucidity, manifestation), rajas (activity, motion), and tamas (inertia, restraint) -- are not qualities prak\u1e5bti has, they are what prak\u1e5bti is made of: three inseparable constituent strands whose ever-shifting proportion and balance produce every state of matter and mind. This is the source doctrine. Where the other eleven bundles in this corpus use the word trigu\u1e47a or gu\u1e47a in the S\u0101\u1e43khya sense (bhakti-marga's discussion of gu\u1e47a-transcendence, cosmology-creation's t\u0101masic cosmic phases, ayurveda-consciousness's gu\u1e47a as the third referent for mental constitution), they are drawing on this doctrine as their common source, not offering competing definitions of it.\n\n## Audience Metaphor\n\nThink of the three gu\u1e47as as three dials on a single mixing board -- brightness (sattva), drive (rajas), and drag (tamas) -- present in every channel of reality at once, in constantly shifting ratios, never fully absent, never fully isolated from each other.\n\n## Citations\n\n1. Samkhya-Karika 11-13 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle note (source framing, D4): downstream/applied referents in bhakti-marga v0.4, cosmology-creation v0.7 (trigunas-cosmological), ayurveda-consciousness v0.11 (third referent) all trace to this doctrine\n3. Cross-bundle warning: unrelated ontological sense in nyaya-vaisheshika v0.9's guna.md -- shared word, no shared doctrine", "concepts/kaivalya-samkhya": "# Kaivalya (S\u0101\u1e43khya) -- \u0915\u0948\u0935\u0932\u094d\u092f\n\n**Not:** union with a divine being (bhakti-marga sense of liberation), the Yoga-darshana kaivalya reached via nirodha (v0.2)\n\n## What It Actually Means\n\nKaivalya in S\u0101\u1e43khya is puru\u1e63a's absolute aloneness, finally recognized rather than newly achieved: once viveka-khy\u0101ti is stable, prak\u1e5bti ceases producing experience for that puru\u1e63a's sake, much as a dancer stops once she realizes her sole spectator has left. There is no residue, no further becoming, and -- distinctively for classical S\u0101\u1e43khya -- no \u012a\u015bvara involved in bringing it about; it is the direct, unmediated fruit of discrimination alone.\n\n## Audience Metaphor\n\nKaivalya is less like arriving somewhere and more like realizing you were never actually inside the room you thought you were trapped in -- the walls dissolve not because you broke them, but because you finally saw they were never real barriers around you.\n\n## Citations\n\n1. Samkhya-Karika 68 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle warning: kaivalya in yoga-darshana v0.2 -- same word, reached via nirodha rather than viveka-khyati; reciprocal related: link patched into v0.2's kaivalya.md per this bundle's concept-lock", "concepts/kapila": "# Kapila -- \u0915\u092a\u093f\u0932\n\n**Not:** a deity or divine avatara\n\n## What It Actually Means\n\nKapila is traditionally credited as the founder of the S\u0101\u1e43khya dar\u015bana, the figure to whom the school's earliest systematization is attributed, though the historical Kapila is semi-legendary and no securely dated text survives directly from him. The extant S\u0101\u1e43khya-Pravacana-S\u016btra is attributed to his tradition rather than confidently to his own hand; the earliest fully extant systematic text is \u012a\u015bvarak\u1e5b\u1e63\u1e47a's S\u0101\u1e43khya-K\u0101rik\u0101, centuries later.\n\n## Audience Metaphor\n\nKapila functions for S\u0101\u1e43khya somewhat like a discipline's founding figure whose name anchors a school of thought even though the field's actual textbook (the K\u0101rik\u0101) was written by a later systematizer working within the tradition he founded.\n\n## Citations\n\n1. Samkhya-Pravacana-Sutra, traditional attribution -- see [references/samkhya-pravacana-sutra.md](../references/samkhya-pravacana-sutra.md)\n2. Cross-bundle note: the Puranic Kapila-as-avatara this file excludes (see the not: field) has a named primary text -- Kapila Gita, Bhagavata Purana 3.24-33 -- identified and cited at sesvara-samkhya.md, not treated here", "concepts/nirishvara": "# Nir\u012b\u015bvara -- \u0928\u093f\u0930\u0940\u0936\u094d\u0935\u0930\n\n**Not:** a settled, monolithic position across all of Samkhya's history, Yoga-darshana's Ishvara-inclusive framing (v0.2)\n\n## What It Actually Means\n\nNir\u012b\u015bvara names classical S\u0101\u1e43khya's stance that no creator deity is needed, or admissible, within its causal and soteriological system: prak\u1e5bti evolves by its own internal logic once disturbed by proximity to puru\u1e63a, and liberation is reached through viveka-khy\u0101ti alone, with no divine intermediary. The S\u0101\u1e43khya-Pravacana-S\u016btra states this directly at 1.92: \u012a\u015bvara is unproved. This makes classical S\u0101\u1e43khya one of the clearest atheistic systems within the six dar\u015banas, standing in explicit contrast to Yoga's \u012a\u015bvara-inclusive framing of the very same underlying metaphysics.\n\n## Audience Metaphor\n\nNir\u012b\u015bvara S\u0101\u1e43khya is like a self-contained physical system that runs on its own internal thermodynamics -- no external engineer is required to keep it running, and adding one would not explain anything the system's own internal logic does not already account for.\n\n## Citations\n\n1. Samkhya-Pravacana-Sutra 1.92 -- see [references/samkhya-pravacana-sutra.md](../references/samkhya-pravacana-sutra.md)\n2. Cross-bundle warning: Yoga-darshana v0.2 introduces Ishvara (Yoga Sutra 1.24) into the shared metaphysics; classical Samkhya explicitly does not", "concepts/parinamavada": "# Pari\u1e47\u0101mav\u0101da -- \u092a\u0930\u093f\u0923\u093e\u092e\u0935\u093e\u0926\n\n**Not:** illusory appearance / vivartavada (Advaita Vedanta, v0.3)\n\n## What It Actually Means\n\nPari\u1e47\u0101mav\u0101da is the transformation-model of satk\u0101ryav\u0101da: the cause really becomes the effect, the way milk really becomes curd. Nothing is added from outside and the change is not a trick of perception -- prak\u1e5bti's gu\u1e47a-equilibrium genuinely reorganizes into the manifest tattvas. This is what keeps S\u0101\u1e43khya's causal realism intact: the world is not a dream to be dispelled by insight alone, it is prak\u1e5bti's own actual unfolding, even though liberation still depends on puru\u1e63a recognizing its distinctness from that unfolding.\n\n## Audience Metaphor\n\nPari\u1e47\u0101ma is like ice becoming water: a real, physical transformation, not a costume change. Compare this to Advaita's vivarta, closer to a rope in dim light briefly looking like a snake -- the rope never truly became a snake at all.\n\n## Citations\n\n1. Samkhya-Karika 9, 16 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle warning: vivartavada in vedanta-epistemology v0.3 -- the contrasting apparent-transformation model, never a synonym", "concepts/prakriti": "# Prak\u1e5bti -- \u092a\u094d\u0930\u0915\u0943\u0924\u093f\n\n**Not:** 'Nature' in the ecological or romantic sense, a generic background sense of 'nature' (dharma-foundation v0.1)\n\n## What It Actually Means\n\nPrak\u1e5bti is unconscious, ever-active, and self-sufficient as a material cause: it requires no external agent to begin evolving, only a disturbance in the equilibrium of its three gu\u1e47as (sattva, rajas, tamas). From prak\u1e5bti, by its own internal logic, evolves the entire apparatus of mind and world -- buddhi, aha\u1e43k\u0101ra, manas, the senses, the elements -- everything, that is, except puru\u1e63a. Prak\u1e5bti itself has two phases: avyakta, the unmanifest root-state in perfect gu\u1e47a-equilibrium, and vyakta, the manifest, differentiated world that results once that equilibrium is disturbed by proximity to puru\u1e63a.\n\n## Audience Metaphor\n\nPrak\u1e5bti is like a vast reservoir of raw material and instructions compressed into a single seed-state (avyakta), which unpacks into an entire running system (vyakta) once triggered -- not because anyone flips a switch, but because the seed's own internal tension resolves once conditions allow it to.\n\n## Citations\n\n1. Samkhya-Karika 3, 10-11, 22 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Samkhya-Tattva-Kaumudi (Vachaspati Mishra, commentary on Karika 3) -- see [references/samkhya-tattva-kaumudi.md](../references/samkhya-tattva-kaumudi.md)", "concepts/pramana-samkhya": "# Pram\u0101\u1e47a (S\u0101\u1e43khya) -- \u092a\u094d\u0930\u092e\u093e\u0923\n\n**Not:** the Advaita seven-pramana or Nyaya four-pramana lists (v0.3, v0.9)\n\n## What It Actually Means\n\nS\u0101\u1e43khya recognizes exactly three pram\u0101\u1e47as -- pratyak\u1e63a (direct perception), anum\u0101na (inference), and \u015babda or \u0101ptavacana (the testimony of a reliable authority) -- treating other candidate means of knowledge accepted by rival schools as reducible to one of these three rather than as independent categories. This narrower, tighter epistemology matches S\u0101\u1e43khya's broader style: a compact, enumerable system rather than an expansive one.\n\n## Audience Metaphor\n\nWhere Advaita's epistemology is a wide toolbox with many specialized tools, S\u0101\u1e43khya's is a compact three-tool kit -- fewer instruments, but the school insists every job can be done with just these three, with no loss of coverage.\n\n## Citations\n\n1. Samkhya-Karika 4-6 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle warning: this is the THIRD school-scoped pramana referent, after vedanta-epistemology v0.3 (Advaita) and nyaya-vaisheshika v0.9 (Nyaya) -- school-contrast, not consolidation", "concepts/purusha": "# Puru\u1e63a -- \u092a\u0941\u0930\u0941\u0937\n\n**Not:** atman / brahman (Advaita Vedanta), the soul that acts or thinks, a creator or moral agent\n\n## What It Actually Means\n\nPuru\u1e63a is S\u0101\u1e43khya's name for pure, changeless consciousness: the silent witness in whose presence prak\u1e5bti's activity becomes visible. It has no qualities, does nothing, and is never modified by anything it witnesses. Classical S\u0101\u1e43khya holds that puru\u1e63as are plural and countless -- each bound person corresponds to a distinct puru\u1e63a, none ranked above another, none merging with the rest. This plurality is not incidental; it is the metaphysical backbone that keeps S\u0101\u1e43khya's dualism strict and its causal account free of any single cosmic agent.\n\n## Audience Metaphor\n\nThink of puru\u1e63a as a cinema screen. The screen does nothing -- it does not run, act, or change with the film -- but the film's drama is legible only because the screen holds still and reflects the light. Prak\u1e5bti is the projector, the reel, and the drama; puru\u1e63a is the screen. Mistaking the screen for a character in the story is exactly the error S\u0101\u1e43khya's boundary work exists to prevent.\n\n## Citations\n\n1. Samkhya-Karika 17-19, 61-62 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Samkhya-Pravacana-Sutra 1.61-66 (plurality of purushas argued explicitly) -- see [references/samkhya-pravacana-sutra.md](../references/samkhya-pravacana-sutra.md)\n3. Cross-bundle warning: atman/brahman in upanishadic-core v0.6 -- a non-dual, singular account; never merge with plural purusha", "concepts/rajas": "# Rajas -- \u0930\u091c\u0938\u094d\n\n**Not:** 'passion' in a purely emotional or romantic sense\n\n## What It Actually Means\n\nRajas is the gu\u1e47a of activity and motion: it is what makes prak\u1e5bti's equilibrium unstable enough to evolve at all, and what drives ongoing change, effort, and restlessness at every level from cosmic manifestation down to an individual's agitation of mind. Rajas is neither good nor bad in itself -- without it nothing would move, including the very process that eventually leads toward viveka-khy\u0101ti -- but an excess of rajas relative to sattva produces distraction and turbulence rather than clarity.\n\n## Audience Metaphor\n\nRajas is the engine's throttle: necessary for any motion at all, but if it dominates every other system in the vehicle, the ride becomes a straight line of noise rather than a controlled, purposeful drive.\n\n## Citations\n\n1. Samkhya-Karika 12-13 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Tamas (inertia, restraint) is treated within this concept's sibling file guna-samkhya.md rather than as a standalone fourth file, per the v0.13 concept-lock's tight-scope discipline", "concepts/samkhya-as-enumeration": "# S\u0101\u1e43khya (as Enumeration) -- \u0938\u093e\u0902\u0916\u094d\u092f\n\n**Not:** 'reflection' or 'analysis' in a loose general sense, the tattva ladder's content (already published)\n\n## What It Actually Means\n\nThe word s\u0101\u1e43khya derives from a root meaning 'to count' or 'enumerate' -- the school takes its very name from its method: fixing an exact, closed count of the fundamental categories of reality (the tattvas) and deriving liberation from correctly discriminating among them. This enumerative method is S\u0101\u1e43khya's signature intellectual style, distinct from Vedanta's more exegetical approach to scripture or Nyaya's dialectical approach to debate.\n\n## Audience Metaphor\n\nS\u0101\u1e43khya's method is closer to a taxonomist's than a storyteller's: fix the exact number and boundary of every category first, and liberation follows from correctly sorting experience into the right boxes, especially the crucial two -- puru\u1e63a's box and everything-else's box.\n\n## Citations\n\n1. Samkhya-Karika 1-2 (opening statement of purpose) -- see [references/samkhya-karika.md](../references/samkhya-karika.md)", "concepts/samkhya-karika": "# S\u0101\u1e43khya-K\u0101rik\u0101 (as concept) -- \u0938\u093e\u0902\u0916\u094d\u092f\u0915\u093e\u0930\u093f\u0915\u093e\n\n**Not:** a late or minor Samkhya text\n\n## What It Actually Means\n\nThe S\u0101\u1e43khya-K\u0101rik\u0101, composed by \u012a\u015bvarak\u1e5b\u1e63\u1e47a around the 4th-5th century CE, is 72 teaching stanzas that give classical S\u0101\u1e43khya its systematic, extant form: the satk\u0101ryav\u0101da argument (K\u0101rik\u0101 9), the 25-tattva structure with puru\u1e63a's plurality, the trigu\u1e47a apparatus, and the viveka-khy\u0101ti path to kaivalya are all stated or implied within this single compact text. Nearly every later S\u0101\u1e43khya commentary, including Gau\u1e0dap\u0101da's bh\u0101\u1e63ya and V\u0101caspati Mi\u015bra's Tattva-Kaumud\u012b, takes the K\u0101rik\u0101 as its base text.\n\n## Audience Metaphor\n\nThe S\u0101\u1e43khya-K\u0101rik\u0101 functions for this dar\u015bana the way a tight, foundational specification document functions for a whole software ecosystem -- compact, load-bearing, and the reference point every later implementation and commentary has to stay compatible with.\n\n## Citations\n\n1. See the full Reference entry: [references/samkhya-karika.md](../references/samkhya-karika.md)", "concepts/samkhya-pravacana-sutra": "# S\u0101\u1e43khya-Pravacana-S\u016btra (as concept) -- \u0938\u093e\u0902\u0916\u094d\u092f\u092a\u094d\u0930\u0935\u091a\u0928\u0938\u0942\u0924\u094d\u0930\n\n**Not:** the earliest or most historically primary Samkhya text\n\n## What It Actually Means\n\nThe S\u0101\u1e43khya-Pravacana-S\u016btra is a s\u016btra-format collection attributed to the Kapila tradition, extant in a form generally considered a later compilation rather than the school's earliest textual layer. Its enduring significance for this bundle is verse 1.92's direct statement that \u012a\u015bvara is unproved -- the textual anchor for classical S\u0101\u1e43khya's nir\u012b\u015bvara stance, cited alongside the S\u0101\u1e43khya-K\u0101rik\u0101 as this bundle's second primary text.\n\n## Audience Metaphor\n\nWhere the K\u0101rik\u0101 is the compact founding specification, the Pravacana-S\u016btra is closer to a later, more explicit legal ruling on a specific contested point -- in this case, settling the \u012a\u015bvara question directly and citably rather than leaving it implicit.\n\n## Citations\n\n1. See the full Reference entry: [references/samkhya-pravacana-sutra.md](../references/samkhya-pravacana-sutra.md)", "concepts/satkaryavada": "# Satk\u0101ryav\u0101da -- \u0938\u0924\u094d\u0915\u093e\u0930\u094d\u092f\u0935\u093e\u0926\n\n**Not:** creation from nothing, the Nyaya-Vaisheshika asatkaryavada / arambhavada position (v0.9)\n\n## What It Actually Means\n\nSatk\u0101ryav\u0101da answers the question 'does the effect pre-exist in its cause?' with yes. S\u0101\u1e43khya-K\u0101rik\u0101 9 gives five arguments for this: a non-existent effect could never be produced by any means (asadakara\u1e47\u0101t); a specific material is always sought for a specific effect (up\u0101d\u0101nagraha\u1e47\u0101t); anything cannot come from anything (sarvasambhav\u0101bh\u0101v\u0101t); a competent cause produces only what it is capable of (\u015baktasya \u015bakyakara\u1e47\u0101t); and the effect is non-different in essence from the cause (k\u0101ra\u1e47abh\u0101v\u0101t). The world, on this view, is prak\u1e5bti's own latent potential becoming visible -- not creation, but disclosure.\n\n## Audience Metaphor\n\nSatk\u0101ryav\u0101da is like unfolding a pre-printed map rather than drawing a new one: every road was already encoded in the folded paper, and unfolding does not add roads, it reveals what was already there in compressed form.\n\n## Citations\n\n1. Samkhya-Karika 9 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle warning: asatkaryavada/arambhavada in nyaya-vaisheshika v0.9 -- the named philosophical opponent, never a variant of this doctrine", "concepts/sattva": "# Sattva -- \u0938\u0924\u094d\u0924\u094d\u0935\n\n**Not:** 'goodness' as a simple moral virtue, sat / existence (unrelated homophone-adjacent root)\n\n## What It Actually Means\n\nSattva is the gu\u1e47a responsible for lucidity, lightness, and the capacity of prak\u1e5bti to manifest and reveal -- it is what allows buddhi to reflect puru\u1e63a's consciousness with the least distortion. A predominance of sattva in the mental apparatus produces clarity, calm, and discernment; this is why viveka-khy\u0101ti (Tier 3) depends on a sattva-dominant buddhi. Sattva never occurs alone -- it is always in dynamic tension with rajas and tamas, the way light is always mixed with some motion and some inertia in any real system.\n\n## Audience Metaphor\n\nSattva is like a clean signal in a noisy channel -- never the whole channel, but the component that lets information (here, puru\u1e63a's reflected light) come through with the least static.\n\n## Citations\n\n1. Samkhya-Karika 12-13 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)", "concepts/sesvara-samkhya": "# Se\u015bvara S\u0101\u1e43khya -- \u0938\u0947\u0936\u094d\u0935\u0930 \u0938\u093e\u0902\u0916\u094d\u092f\n\n**Not:** a creationist deity comparable to theistic traditions elsewhere, the primary framing of this bundle\n\n## What It Actually Means\n\nSe\u015bvara S\u0101\u1e43khya is a historically distinct, less prominent strand of S\u0101\u1e43khya thought that incorporates \u012a\u015bvara, understood as a perfect, ideal Puru\u1e63a rather than a creator, into an otherwise S\u0101\u1e43khya framework. It appears associated with earlier layers of S\u0101\u1e43khya-adjacent thought and resurfaces in what scholarship calls 'Later S\u0101\u1e43khya,' after the classical school's decline past roughly the eighth century CE. This file names the strand and its distinguishing feature honestly without developing it further -- a genuinely separate future-bundle undertaking, not a variant reading of the concepts built here.\n\n## Audience Metaphor\n\nSe\u015bvara S\u0101\u1e43khya is like a lesser-known regional dialect of the same language family as classical S\u0101\u1e43khya -- related, historically real, but a distinct enough system that fairly representing it needs its own dedicated treatment rather than a footnote inside the main grammar.\n\n## Citations\n\n1. Kapila G\u012bt\u0101 (Bh\u0101gavata Pur\u0101\u1e47a 3.24-33, the Kapila-Devah\u016bti dialogue) -- verified 2026-07-10 against gitasupersite.in (IIT Kanpur / Ministry of Culture): opens at 1.1 \"devah\u016btir uv\u0101ca,\" Kapila teaching S\u0101\u1e43khya-yoga to his mother Devah\u016bti as a theistic avat\u0101ra-figure. This is the closest thing to a primary text for the Se\u015bvara strand named in this file -- identified but not treated in full here, per the concept-lock's deferral (a Bh\u0101gavata-sourced, devotional Kapila-as-avat\u0101ra text is a different textual register from the S\u0101\u1e43khya-K\u0101rik\u0101/S\u0101\u1e43khya-Pravacana-S\u016btra line this bundle's primary nir\u012b\u015bvara treatment draws on, and deserves its own dedicated pass, not a folded-in citation)\n2. General scholarly consensus on Later Samkhya historiography\n3. Deferred per the v0.13 concept-lock, following the v0.9 nyaya-vaisheshika Navya-Nyaya precedent -- named, not built", "concepts/viveka-khyati": "# Viveka-Khy\u0101ti -- \u0935\u093f\u0935\u0947\u0915\u0916\u094d\u092f\u093e\u0924\u093f\n\n**Not:** meditative cessation / nirodha (Yoga, v0.2)\n\n## What It Actually Means\n\nViveka-khy\u0101ti is the discriminative knowledge that 'I am not this' -- the correct, stable cognition that puru\u0219a is utterly distinct from prak\u1e5bti and all its evolutes, including buddhi, the subtlest and most puru\u0219a-like of prak\u1e5bti's products. This discernment is not a feeling or a practiced stillness; it is a knowledge-event that, once firmly established, causes prak\u1e5bti to withdraw from further activity on that puru\u0219a's behalf, the way a dancer stops performing once the audience she was performing for has left.\n\n## Audience Metaphor\n\nViveka-khy\u0101ti is like finally recognizing, with total certainty, that the reflection in a mirror is not you -- not by looking away or stilling the mirror, but by seeing through the reflection's apparent selfhood once and for all.\n\n## Citations\n\n1. Samkhya-Karika 64 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle warning: nirodha in yoga-darshana v0.2 -- same destination (kaivalya), different method; see reciprocal link patched into v0.2's kaivalya.md", "concepts/vyakta-avyakta": "# Vyakta-Avyakta -- \u0935\u094d\u092f\u0915\u094d\u0924-\u0905\u0935\u094d\u092f\u0915\u094d\u0924\n\n**Not:** the full 24-tattva evolution ladder\n\n## What It Actually Means\n\nAvyakta names prak\u1e5bti in its root, unmanifest state: the three gu\u1e47as held in perfect, undifferentiated equilibrium, with no separable qualities yet apparent. Vyakta names prak\u1e5bti once that equilibrium is disturbed and its gu\u1e47as begin to differentiate into the recognizable apparatus of mind, senses, and elements. The avyakta/vyakta pair is S\u0101\u1e43khya's own name for the boundary between potential and actual -- the hinge concept that satk\u0101ryav\u0101da and pari\u1e47\u0101mav\u0101da both presuppose.\n\n## Audience Metaphor\n\nAvyakta is a fully compiled but unexecuted program sitting in memory; vyakta is that same program actually running, its variables now holding real, differentiated values. Nothing was added at runtime -- the program's full logic was already there, unmanifest, before execution began.\n\n## Citations\n\n1. Samkhya-Karika 10-11 -- see [references/samkhya-karika.md](../references/samkhya-karika.md)\n2. Cross-bundle pointer: the full 24-evolute ladder is published in yoga-darshana v0.2, cosmology-creation v0.7, and ayurveda-consciousness v0.11 -- not restated here", "references/bhagavad-gita-ch13": "# Bhagavad G\u012bt\u0101, Chapter 13 (K\u1e63etra-K\u1e63etraj\u00f1a)\n\nThe Gita's chapter on the Field (kshetra, prakriti's domain) and the Knower of the Field (kshetrajna, purusha), a well-known cross-traditional parallel to Samkhya's purusha-prakriti dualism, cited here as a secondary, non-Samkhya-specific anchor illustrating the dualism's wider resonance in the corpus -- not treated as a Samkhya-school primary text.", "references/gaudapada-bhashya": "# Gau\u1e0dap\u0101da-Bh\u0101\u1e63ya (on the S\u0101\u1e43khya-K\u0101rik\u0101)\n\nAn early commentary on the Samkhya-Karika attributed to Gaudapada, providing verse-by-verse elaboration used to ground the interpretation of purusha's plurality and the guna apparatus in this bundle.", "references/samkhya-karika": "# S\u0101\u1e43khya-K\u0101rik\u0101\n\nThe foundational extant systematic text of classical Samkhya, composed by Isvarakrishna circa the 4th-5th century CE. Its 72 teaching stanzas state the satkaryavada argument (Karika 9), the 25-tattva structure with purusha's plurality, the triguna apparatus, and the viveka-khyati path to kaivalya. This bundle's primary textual anchor for purusha, prakriti, satkaryavada, parinamavada, vyakta-avyakta, guna-samkhya, sattva, rajas, viveka-khyati, kaivalya-samkhya, avidya-samkhya, bandha-samkhya, pramana-samkhya, anumana-samkhya, and samkhya-as-enumeration.", "references/samkhya-pravacana-sutra": "# S\u0101\u1e43khya-Pravacana-S\u016btra\n\nA sutra-format collection attributed to the Kapila tradition of Samkhya, extant as a later compilation. Verse 1.92 states directly that Ishvara is unproved, anchoring classical Samkhya's nirishvara doctrine. This bundle's secondary textual anchor for nirishvara, sesvara-samkhya, and kapila.", "references/samkhya-tattva-kaumudi": "# S\u0101\u1e43khya-Tattva-Kaumud\u012b\n\nVachaspati Mishra's influential commentary on the Samkhya-Karika, a major secondary elaboration of classical Samkhya doctrine widely used to clarify Isvarakrishna's compact verses, including the causal arguments underlying satkaryavada and the structure of prakriti's avyakta phase.", "references/tattva-samasa": "# Tattva-Sam\u0101sa\n\nA very short, aphoristic Samkhya text enumerating the tattvas in condensed form, sometimes considered an even earlier or parallel systematization to the Samkhya-Karika. Referenced here as supporting background for the samkhya-as-enumeration concept's discussion of the school's enumerative method.", "references/yuktidipika": "# Yuktid\u012bpik\u0101\n\nAn anonymous, philosophically rich early commentary on the Samkhya-Karika, valued for its detailed engagement with rival schools' objections to Samkhya's causal and epistemological positions, useful background for this bundle's satkaryavada and pramana-samkhya treatments."}, "types": ["Concept", "Reference"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981", "Concept": "#f59e0b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
